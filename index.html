    'min-width:120px}' +
    '.kpi .lbl{font-size:10px;color:#6b7280;text-transform:uppercase}' +
    '.kpi .val{font-size:18px;font-weight:700;margin-top:2px}';
  const h =
    '<!DOCTYPE html><html><head><meta charset="utf-8"><title>' + title +
    '</title><style>' + css + '</style></head><body>' +
    '<h1>' + title + '</h1>' +
    '<p class="sub">' + MN[S.m] + ' ' + S.y +
    ' \u2014 \u00e9dit\u00e9 le ' + new Date().toLocaleDateString('fr-FR') + '</p>' +
    bodyHtml +
    '<scr' + 'ipt>window.onload=function(){window.focus();' +
    'window.print();};<' + '/scr' + 'ipt></body></html>';
  const win = window.open('', '_blank', 'width=960,height=700');
  if (!win) { alert('Autorisez les popups pour imprimer.'); return; }
  win.document.write(h);
  win.document.close();
}

/* RAPPORT — Coût main-d'œuvre vs CA */
/* ═══════════════════════════════════════════════════════════════════════════
   RAPPORT — Tableau de bord (5 KPIs clés du mois)
   1. Ratio masse salariale / CA
   2. Ticket moyen (vs N-1)
   3. CA par heure travaillée
   4. Couverts (vs N-1)
   5. Heures supplémentaires du mois (réel au-delà du contrat)
   ═══════════════════════════════════════════════════════════════════════════ */
function mDashboard(box) {
  const D = dim(S.y, S.m);
  box.classList.add('mo--wide');
  mHdr(box, '\uD83C\uDFAF Tableau de bord \u2014 ' + MN[S.m] + ' ' + S.y);

  // ── Agrégats du mois ──────────────────────────────────────────────────
  let totCA = 0, totCAN1 = 0, totCouv = 0, totCouvN1 = 0;
  let totCout = 0, coutComplet = true;
  let totHeuresMin = 0;                 // heures réelles (minutes), tout le mois
  const empMin = {};                    // minutes réelles par employé
  for (let d = 1; d <= D; d++) {
    const dd = getDaily(S.y, S.m, d);
    const ddN1 = getDailyN1(S.y, S.m, d);
    if (dd && dd.ca) totCA += dd.ca;
    if (dd && dd.couv) totCouv += dd.couv;
    if (ddN1 && ddN1.ca) totCAN1 += ddN1.ca;
    if (ddN1 && ddN1.couv) totCouvN1 += ddN1.couv;
    const lc = dayLaborCost(S.y, S.m, d);
    if (lc.cout > 0) { totCout += lc.cout; if (!lc.complet) coutComplet = false; }
    S.emps.forEach(e => {
      const r = getReal(S.y, S.m, d, e.id);
      if (r && r.total) {
        totHeuresMin += r.total;
        empMin[e.id] = (empMin[e.id] || 0) + r.total;
      }
    });
  }
  const totHeures = totHeuresMin / 60;

  // Heures supplémentaires : par employé, réel au-delà du contrat mensuel
  let totHS = 0;
  S.emps.forEach(e => {
    const hReel = (empMin[e.id] || 0) / 60;
    const contrat = e.h || 0;
    if (contrat > 0 && hReel > contrat) totHS += (hReel - contrat);
  });

  // ── Calculs des KPIs ──────────────────────────────────────────────────
  const ratioMS = totCA ? (totCout / totCA * 100) : null;
  const ticket = totCouv ? totCA / totCouv : null;
  const ticketN1 = totCouvN1 ? totCAN1 / totCouvN1 : null;
  const evolTicket = (ticket && ticketN1)
    ? ((ticket - ticketN1) / ticketN1 * 100) : null;
  const caParHeure = totHeures ? totCA / totHeures : null;
  const evolCouv = totCouvN1 ? ((totCouv - totCouvN1) / totCouvN1 * 100) : null;

  // ── Rendu : grille de cartes KPI ──────────────────────────────────────
  function evolTxt(v) {
    if (v == null) return '';
    const c = v >= 0 ? '#16a34a' : '#dc2626';
    return "<span style='color:" + c + ";font-weight:700;font-size:13px'>" +
      (v >= 0 ? '\u25B2 +' : '\u25BC ') + v.toFixed(1) + "%</span>" +
      "<span style='color:#9ca3af;font-size:11px'> vs N-1</span>";
  }
  function card(icon, label, value, sub, valColor) {
    return "<div style='border:1px solid #e5e7eb;border-radius:14px;" +
      "padding:16px 18px;background:#fff'>" +
      "<div style='font-size:11px;color:#6b7280;text-transform:uppercase;" +
      "letter-spacing:.03em;font-weight:600'>" + icon + ' ' + label +
      '</div>' +
      "<div style='font-size:26px;font-weight:800;margin-top:6px;color:" +
      (valColor || '#111827') + "'>" + value + '</div>' +
      "<div style='margin-top:4px;min-height:16px'>" + (sub || '') +
      '</div></div>';
  }

  const ratioColor = ratioMS == null ? '#6b7280'
    : (ratioMS < 35 ? '#16a34a' : (ratioMS <= 45 ? '#d97706' : '#dc2626'));
  const ratioSub = ratioMS == null
    ? "<span style='color:#9ca3af;font-size:11px'>données manquantes</span>"
    : "<span style='font-size:11px;color:" + ratioColor + "'>" +
      (ratioMS < 35 ? 'bon' : (ratioMS <= 45 ? '\u00e0 surveiller' : '\u00e9lev\u00e9')) +
      '</span>';

  const grid = document.createElement('div');
  grid.style.cssText =
    'display:grid;gap:14px;grid-template-columns:repeat(auto-fit,' +
    'minmax(210px,1fr));margin:8px 0 4px';
  grid.innerHTML =
    card('\uD83D\uDCB0', 'Masse salariale / CA',
      ratioMS == null ? '\u2014' : ratioMS.toFixed(1) + '%',
      ratioSub, ratioColor) +
    card('\uD83C\uDF7D', 'Ticket moyen',
      ticket ? fmtEur(ticket) : '\u2014', evolTxt(evolTicket)) +
    card('\u26A1', 'CA / heure travaill\u00e9e',
      caParHeure ? fmtEur(caParHeure) : '\u2014',
      totHeures ? "<span style='color:#9ca3af;font-size:11px'>" +
        Math.round(totHeures) + 'h travaill\u00e9es</span>' : '') +
    card('\uD83D\uDC65', 'Couverts',
      totCouv ? totCouv.toLocaleString('fr-FR') : '\u2014', evolTxt(evolCouv)) +
    card('\u23F1', 'Heures suppl\u00e9mentaires',
      totHS ? '+' + (Math.round(totHS * 10) / 10) + 'h' : '0h',
      totHS ? "<span style='color:#d97706;font-size:11px'>au-del\u00e0 des " +
        'contrats</span>'
        : "<span style='color:#16a34a;font-size:11px'>dans les contrats</span>");
  box.appendChild(grid);

  // Note bas de modal
  const note = document.createElement('p');
  note.style.cssText = 'font-size:12px;color:#9ca3af;margin:14px 0 0';
  note.innerHTML = 'CA par heure et heures sup. calcul\u00e9s sur les ' +
    'heures r\u00e9ellement saisies (onglet \u23F1 Heures). ' +
    (coutComplet ? '' : 'Certains salari\u00e9s sans r\u00e9mun\u00e9ration : ' +
      'ratio masse salariale sous-estim\u00e9.');
  box.appendChild(note);

  // ── Pied : imprimer / fermer ──────────────────────────────────────────
  const foot = document.createElement('div');
  foot.className = 'modal-foot';
  foot.appendChild(mBtn('Fermer', false, closeModal));
  const printBtn = mBtn('\uD83D\uDDA8 Imprimer', true, () => {
    function pRow(label, val, sub) {
      return '<tr><td>' + label + '</td>' +
        '<td style="font-weight:700">' + val + '</td>' +
        '<td>' + (sub || '') + '</td></tr>';
    }
    const body = '<table><thead><tr><th>Indicateur</th><th>Valeur</th>' +
      '<th>Comparaison</th></tr></thead><tbody>' +
      pRow('Masse salariale / CA',
        ratioMS == null ? '\u2014' : ratioMS.toFixed(1) + '%',
        ratioMS == null ? '' :
          (ratioMS < 35 ? 'bon' : (ratioMS <= 45 ? '\u00e0 surveiller' : '\u00e9lev\u00e9'))) +
      pRow('Ticket moyen', ticket ? fmtEur(ticket) : '\u2014',
        evolTicket == null ? '' :
          (evolTicket >= 0 ? '+' : '') + evolTicket.toFixed(1) + '% vs N-1') +
      pRow('CA / heure travaill\u00e9e', caParHeure ? fmtEur(caParHeure) : '\u2014',
        totHeures ? Math.round(totHeures) + 'h travaill\u00e9es' : '') +
      pRow('Couverts', totCouv || '\u2014',
        evolCouv == null ? '' :
          (evolCouv >= 0 ? '+' : '') + evolCouv.toFixed(1) + '% vs N-1') +
      pRow('Heures suppl\u00e9mentaires',
        totHS ? '+' + (Math.round(totHS * 10) / 10) + 'h' : '0h',
        'au-del\u00e0 des contrats') +
      '</tbody></table>';
    printReportHTML('Tableau de bord', body);
  });
  foot.appendChild(printBtn);
  box.appendChild(foot);
}

function mRapLabor(box) {
  const D = dim(S.y, S.m);
  box.classList.add('mo--wide');
  mHdr(box, '\uD83D\uDCB0 Co\u00fbt main-d\u2019\u0153uvre vs CA \u2014 ' + MN[S.m] + ' ' + S.y);

  let totCA = 0, totCout = 0, complet = true;
  const rows = [];
  for (let d = 1; d <= D; d++) {
    const dd = getDaily(S.y, S.m, d);
    const ca = dd && dd.ca ? dd.ca : 0;
    const lc = dayLaborCost(S.y, S.m, d);
    if (ca) totCA += ca;
    if (lc.cout > 0) { totCout += lc.cout; if (!lc.complet) complet = false; }
    if (ca || lc.cout > 0) {
      const ratio = (lc.cout > 0 && ca) ? (lc.cout / ca * 100) : null;
      rows.push({ d: d, ca: ca, cout: lc.cout, ratio: ratio });
    }
  }
  const ratioGlobal = totCA ? (totCout / totCA * 100) : null;
  const ratioColor = ratioGlobal == null ? '#6b7280'
    : (ratioGlobal < 35 ? '#16a34a' : (ratioGlobal <= 45 ? '#d97706' : '#dc2626'));

  const kpis = document.createElement('div');
  kpis.style.cssText = 'display:flex;gap:14px;flex-wrap:wrap;margin:6px 0 16px';

      "padding:12px 16px;min-width:130px'>" +
      "<div style='font-size:10px;color:#6b7280;text-transform:uppercase'>" +
      lbl + '</div>' +
      "<div style='font-size:20px;font-weight:700;margin-top:2px;color:" +
      (color || '#1f2937') + "'>" + val + '</div></div>';

    kpiHtml('Masse salariale', fmtEur(totCout) + (complet ? '' : ' *')) +
    kpiHtml('Ratio MO / CA',
      ratioGlobal == null ? '\u2014' : ratioGlobal.toFixed(1) + '%', ratioColor);
  box.appendChild(kpis);

  const hint = document.createElement('p');
  hint.style.cssText = 'font-size:12px;color:#6b7280;margin:0 0 12px';

    '<b style="color:#d97706">35\u201345%</b> \u00e0 surveiller \u00b7 ' +
    '<b style="color:#dc2626">&gt; 45%</b> \u00e9lev\u00e9.' +
    (complet ? '' : ' <br>* certains salari\u00e9s n\u2019ont pas de ' +
      'r\u00e9mun\u00e9ration d\u00e9finie : co\u00fbt sous-estim\u00e9.');

    '<thead><tr style="background:#f9fafb">' +
    '<th style="text-align:left;padding:6px 8px">Jour</th>' +
    '<th style="text-align:right;padding:6px 8px">CA</th>' +
    '<th style="text-align:right;padding:6px 8px">Co\u00fbt MO</th>' +
    '<th style="text-align:right;padding:6px 8px">Ratio</th></tr></thead><tbody>';
  rows.forEach(r => {
    const w = dow(S.y, S.m, r.d);
    const rc = r.ratio == null ? '#9ca3af'
      : (r.ratio < 35 ? '#16a34a' : (r.ratio <= 45 ? '#d97706' : '#dc2626'));
    html += '<tr style="border-top:1px solid #f1f5f9">' +
      '<td style="padding:5px 8px">' + DLn[w] + ' ' + r.d + '</td>' +
      '<td style="text-align:right;padding:5px 8px">' +
      (r.ca ? fmtEur(r.ca) : '\u2014') + '</td>' +
      '<td style="text-align:right;padding:5px 8px">' +
      (r.cout > 0 ? fmtEur(r.cout) : '\u2014') + '</td>' +
      '<td style="text-align:right;padding:5px 8px;font-weight:700;color:' +
      rc + '">' + (r.ratio == null ? '\u2014' : r.ratio.toFixed(1) + '%') +
      '</td></tr>';

  html += '</tbody><tfoot><tr style="border-top:2px solid #e5e7eb;' +
    'background:#f9fafb;font-weight:700">' +
    '<td style="padding:6px 8px">Total</td>' +
    '<td style="text-align:right;padding:6px 8px">' + fmtEur(totCA) + '</td>' +
    '<td style="text-align:right;padding:6px 8px">' + fmtEur(totCout) + '</td>' +
    '<td style="text-align:right;padding:6px 8px;color:' + ratioColor + '">' +
    (ratioGlobal == null ? '\u2014' : ratioGlobal.toFixed(1) + '%') +
    '</td></tr></tfoot></table>';

  const wrap = document.createElement('div');
  wrap.style.cssText = 'max-height:48vh;overflow:auto;border:1px solid ' +

/* RAPPORT — Synthèse CA mensuelle (+ N-1) */
function mRapCA(box) {
  const D = dim(S.y, S.m);
  box.classList.add('mo--wide');
  mHdr(box, '\uD83D\uDCC8 Synth\u00e8se CA \u2014 ' + MN[S.m] + ' ' + S.y);

  let totCA = 0, totCAN1 = 0, totCouv = 0, totCouvN1 = 0;
  const pay = { cb: 0, vad: 0, amex: 0, ancv: 0, cbanque: 0, esp: 0,
    encaisser: 0, bons: 0, credit: 0, acompte: 0, depenses: 0 };
  for (let d = 1; d <= D; d++) {
    const dd = getDaily(S.y, S.m, d);
    const ddN1 = getDailyN1(S.y, S.m, d);
    if (dd && dd.ca) totCA += dd.ca;
    if (dd && dd.couv) totCouv += dd.couv;
    if (ddN1 && ddN1.ca) totCAN1 += ddN1.ca;
    if (ddN1 && ddN1.couv) totCouvN1 += ddN1.couv;
    if (dd && dd.reel) {
      Object.keys(pay).forEach(k => { if (dd.reel[k]) pay[k] += dd.reel[k]; });
    }
  }
  const ticket = totCouv ? totCA / totCouv : null;
  const ticketN1 = totCouvN1 ? totCAN1 / totCouvN1 : null;
  const evolCA = totCAN1 ? ((totCA - totCAN1) / totCAN1 * 100) : null;
  const evolCouv = totCouvN1 ? ((totCouv - totCouvN1) / totCouvN1 * 100) : null;

  function evolBadge(v) {
    if (v == null) return '<span style="color:#9ca3af">\u2014</span>';
    const c = v >= 0 ? '#16a34a' : '#dc2626';
    return '<span style="color:' + c + ';font-weight:700">' +
      (v >= 0 ? '+' : '') + v.toFixed(1) + '%</span>';
  }

  const cmp = document.createElement('table');
  cmp.className = 'stats-table';
  cmp.style.cssText = 'width:100%;font-size:13px;margin:6px 0 18px';
  cmp.innerHTML =
    '<thead><tr style="background:#f9fafb">' +
    '<th style="text-align:left;padding:8px">Indicateur</th>' +
    '<th style="text-align:right;padding:8px">' + S.y + '</th>' +
    '<th style="text-align:right;padding:8px">' + (S.y - 1) + '</th>' +
    '<th style="text-align:right;padding:8px">\u00c9volution</th></tr></thead>' +
    '<tbody>' +
    '<tr><td style="padding:6px 8px">Chiffre d\u2019affaires</td>' +
    '<td style="text-align:right;padding:6px 8px;font-weight:700">' +
    fmtEur(totCA) + '</td><td style="text-align:right;padding:6px 8px">' +
    (totCAN1 ? fmtEur(totCAN1) : '\u2014') + '</td>' +
    '<td style="text-align:right;padding:6px 8px">' + evolBadge(evolCA) +
    '</td></tr>' +
    '<tr><td style="padding:6px 8px">Couverts</td>' +
    '<td style="text-align:right;padding:6px 8px;font-weight:700">' +
    totCouv + '</td><td style="text-align:right;padding:6px 8px">' +
    (totCouvN1 || '\u2014') + '</td>' +
    '<td style="text-align:right;padding:6px 8px">' + evolBadge(evolCouv) +
    '</td></tr>' +
    '<tr><td style="padding:6px 8px">Ticket moyen</td>' +
    '<td style="text-align:right;padding:6px 8px;font-weight:700">' +
    (ticket ? fmtEur(ticket) : '\u2014') + '</td>' +
    '<td style="text-align:right;padding:6px 8px">' +
    (ticketN1 ? fmtEur(ticketN1) : '\u2014') + '</td>' +
    '<td style="text-align:right;padding:6px 8px">' +
    (ticket && ticketN1
      ? evolBadge((ticket - ticketN1) / ticketN1 * 100)
      : '<span style="color:#9ca3af">\u2014</span>') + '</td></tr>' +
    '</tbody>';
  box.appendChild(cmp);

  const payLabels = {
    cb: 'CB', vad: 'VAD', amex: 'Amex', ancv: 'ANCV', cbanque: 'Ch. banque',
    esp: 'Esp\u00e8ces', encaisser: '\u00c0 encaisser', bons: 'Bons cadeaux',
    credit: 'Cr\u00e9dit', acompte: 'Acompte', depenses: 'D\u00e9penses'
  };
  const totPay = Object.keys(pay).reduce((s, k) => s + pay[k], 0);
  const title2 = document.createElement('div');
  title2.style.cssText =
    'font-weight:700;color:#374151;margin:4px 0 8px;font-size:14px';
  title2.textContent = 'Modes de paiement (r\u00e9el)';
  box.appendChild(title2);

  let payHtml = '<table class="stats-table" style="width:100%;font-size:12px">' +
    '<tbody>';
  let hasPay = false;
  Object.keys(payLabels).forEach(k => {
    if (!pay[k]) return;
    hasPay = true;
    const pct = totPay ? (pay[k] / totPay * 100) : 0;
    payHtml += '<tr style="border-top:1px solid #f1f5f9">' +
      '<td style="padding:5px 8px">' + payLabels[k] + '</td>' +
      '<td style="text-align:right;padding:5px 8px;font-weight:600">' +
      fmtEur(pay[k]) + '</td>' +
      '<td style="text-align:right;padding:5px 8px;color:#6b7280">' +
      pct.toFixed(0) + '%</td></tr>';
  });
  payHtml += '</tbody></table>';
  const payWrap = document.createElement('div');
  payWrap.style.cssText = 'border:1px solid #e5e7eb;border-radius:8px;' +
    'overflow:hidden';
  payWrap.innerHTML = hasPay ? payHtml :
    '<p style="padding:14px;color:#9ca3af;font-size:13px;margin:0">' +
    'Aucun encaissement r\u00e9el saisi ce mois.</p>';
  box.appendChild(payWrap);

  const foot = document.createElement('div');
  foot.className = 'modal-foot';
  foot.appendChild(mBtn('Fermer', false, closeModal));
  const printBtn = mBtn('\uD83D\uDDA8 Imprimer', true, () => {
    printReportHTML('Synth\u00e8se CA', cmp.outerHTML +
      '<h2>Modes de paiement</h2>' +
      (hasPay ? payHtml : '<p>Aucun encaissement r\u00e9el saisi.</p>'));
  });
  foot.appendChild(printBtn);
  box.appendChild(foot);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function mSuiviCredits(box) {
  box.classList.add('mo--stats');
  if (S.suiviScope === undefined) S.suiviScope = 'month'; // 'month' | 'year'
  if (S.suiviShowPaid === undefined) S.suiviShowPaid = false;
  mHdr(box, '🧾 Suivi crédits & notes — ' +
    (S.suiviScope === 'year' ? S.y : MN[S.m] + ' ' + S.y));

  // Barre d'options : portée mois/année + filtre impayés
  const opts = document.createElement('div');
  opts.className = 'suivi-opts';
  const scopeBtn = (label, val) => {
    const b = document.createElement('button');
    b.className = 'btn ' + (S.suiviScope === val ? 'bgen' : 'bg') + ' btn-sm';
    b.textContent = label;
    b.onclick = () => { S.suiviScope = val; render(); };
    return b;
  };
  opts.appendChild(scopeBtn('Ce mois', 'month'));
  opts.appendChild(scopeBtn("Cette année", 'year'));
  opts.appendChild(scopeBtn('Tout', 'all'));
  const paidLbl = document.createElement('label');
  paidLbl.className = 'suivi-filter';
  const paidChk = document.createElement('input');
  paidChk.type = 'checkbox';
  paidChk.checked = S.suiviShowPaid;
  paidChk.onchange = () => { S.suiviShowPaid = paidChk.checked; render(); };
  paidLbl.appendChild(paidChk);
  paidLbl.appendChild(document.createTextNode(' Afficher aussi les réglés'));
  opts.appendChild(paidLbl);
  box.appendChild(opts);

  // Champ de recherche par mot-clé (sur la portée choisie)
  const searchRow = document.createElement('div');
  searchRow.className = 'suivi-search';
  const searchInp = document.createElement('input');
  searchInp.type = 'text';
  searchInp.className = 'form-input--sm';
  searchInp.placeholder = '🔍 Rechercher un mot-clé (nom, note, observation…)';
  searchInp.value = S.suiviQuery || '';
  searchInp.oninput = () => {
    S.suiviQuery = searchInp.value;
    if (S._suiviSearchT) clearTimeout(S._suiviSearchT);
    S._suiviSearchT = setTimeout(() => render(), 250);
  };
  searchRow.appendChild(searchInp);
  if (S.suiviQuery) {
    const clr = document.createElement('button');
    clr.className = 'emp-search-clear';
    clr.textContent = '✕';
    clr.onclick = () => { S.suiviQuery = ''; render(); };
    searchRow.appendChild(clr);
  }
  box.appendChild(searchRow);

  const q = (S.suiviQuery || '').trim().toLowerCase();
  const matchQ = (txt) => !q || (txt || '').toLowerCase().indexOf(q) >= 0;

  // Collecte des données sur la portée choisie
  const months = [];
  if (S.suiviScope === 'all') {
    // Toutes les années/mois présents dans S.daily
    const seen = {};
    Object.keys(S.daily || {}).forEach(mk => {
      // mk au format 'YYYY-MM'
      const parts = mk.split('-');
      if (parts.length === 2) {
        const y = parseInt(parts[0], 10), m = parseInt(parts[1], 10) - 1;
        if (!isNaN(y) && !isNaN(m)) { seen[y + '-' + m] = [y, m]; }
      }
    });
    Object.keys(seen).sort().forEach(k => months.push(seen[k]));
    if (!months.length) months.push([S.y, S.m]);
  } else if (S.suiviScope === 'year') {
    for (let m = 0; m < 12; m++) months.push([S.y, m]);
  } else {
    months.push([S.y, S.m]);
  }
  const creditRows = [], bonsRows = [], obsRows = [];
  months.forEach(([y, m]) => {
    const D = dim(y, m);
    for (let d = 1; d <= D; d++) {
      const dd = getDaily(y, m, d);
      if (!dd) continue;
      const dateLbl = String(d).padStart(2, '0') + '/' +
        String(m + 1).padStart(2, '0') + '/' + String(y).slice(2);
      const ne = dd.notesEnc || {};
      const credMontant = (dd.reel && dd.reel.credit) || 0;
      const credNote = (ne.credit && ne.credit.note) || '';
      if ((credMontant || (ne.credit && (ne.credit.note || ne.credit.paid)))
          && matchQ(credNote)) {
        creditRows.push({ y, m, d, date: dateLbl, montant: credMontant,
          note: credNote, paid: !!(ne.credit && ne.credit.paid) });
      }
      const bonMontant = (dd.reel && dd.reel.bons) || 0;
      const bonNote = (ne.bons && ne.bons.note) || '';
      if ((bonMontant || (ne.bons && (ne.bons.note || ne.bons.paid)))
          && matchQ(bonNote)) {
        bonsRows.push({ y, m, d, date: dateLbl, montant: bonMontant,
          note: bonNote, paid: !!(ne.bons && ne.bons.paid) });
      }
      if (dd.obs && dd.obs.trim() && matchQ(dd.obs)) {
        obsRows.push({ y, m, d, date: dateLbl, obs: dd.obs.trim() });
      }
    }
  });

  const eur2 = (n) => n.toLocaleString('fr-FR',
    { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';

  // Construit une section liste (crédits ou bons)
  const buildList = (title, rows, paidWord) => {
    const sec = document.createElement('div');
    sec.className = 'suivi-section';
    const visibles = rows.filter(r => S.suiviShowPaid || !r.paid);
    const countTxt = () => {
      const totalDu = rows.filter(r => !r.paid).reduce((s, r) => s + r.montant, 0);
      return totalDu ? 'reste ' + eur2(totalDu) : 'rien en attente';
    };
    const countId = 'suivi-count-' + (title.indexOf('Crédit') >= 0 ? 'cr' : 'bo');
    sec.innerHTML = '<h4 class="suivi-h">' + title +
      ' <span class="suivi-count" id="' + countId + '">' +
      countTxt() + '</span></h4>';
    const updateCount = () => {
      const el = document.getElementById(countId);
      if (el) el.textContent = countTxt();
    };
    if (!visibles.length) {
      const e = document.createElement('p');
      e.className = 'suivi-empty';
      e.textContent = 'Aucune ligne.';
      sec.appendChild(e);
      return sec;
    }
    visibles.forEach(r => {
      const item = document.createElement('div');
      item.className = 'suivi-item' + (r.paid ? ' suivi-item--paid' : '');
      const left = document.createElement('div');
      left.className = 'suivi-item-main';
      left.innerHTML = "<span class='suivi-date'>" + r.date + '</span>' +
        "<span class='suivi-montant'>" + eur2(r.montant) + '</span>' +
        (r.note ? "<span class='suivi-note'>" + escapeHtml(r.note) + '</span>'
          : "<span class='suivi-note suivi-note--empty'>(sans note)</span>");
      const toggle = document.createElement('button');
      const refreshToggle = () => {
        toggle.className = 'suivi-toggle ' + (r.paid ? 'is-paid' : 'is-due');
        toggle.textContent = r.paid
          ? '✓ ' + paidWord + ' — annuler'
          : 'Noter comme ' + paidWord.toLowerCase();
        item.classList.toggle('suivi-item--paid', r.paid);
      };
      refreshToggle();
      toggle.onclick = () => {
        const dd = getDaily(r.y, r.m, r.d);
        if (!dd) return;
        if (!dd.notesEnc) dd.notesEnc = {};
        const key = title.indexOf('Crédit') >= 0 ? 'credit' : 'bons';
        if (!dd.notesEnc[key]) dd.notesEnc[key] = { note: '', paid: false };
        dd.notesEnc[key].paid = !dd.notesEnc[key].paid;
        r.paid = dd.notesEnc[key].paid;
        setDaily(r.y, r.m, r.d, dd);
        save();
        refreshToggle();
        // Si on masque les réglés, retirer la ligne en douceur
        if (r.paid && !S.suiviShowPaid) {
          item.style.transition = 'opacity .2s';
          item.style.opacity = '0';
          setTimeout(() => { item.remove(); updateCount(); }, 200);
        } else {
          updateCount();
        }
      };
      item.appendChild(left);
      item.appendChild(toggle);
      sec.appendChild(item);
    });
    return sec;
  };

  box.appendChild(buildList('💳 Crédits', creditRows, 'Réglé'));
  box.appendChild(buildList('🎁 Bons cadeaux', bonsRows, 'Utilisé'));

  // Observations du jour
  const obsSec = document.createElement('div');
  obsSec.className = 'suivi-section';
  obsSec.innerHTML = '<h4 class="suivi-h">📝 Observations du jour</h4>';
  if (!obsRows.length) {
    const e = document.createElement('p');
    e.className = 'suivi-empty';
    e.textContent = 'Aucune observation.';
    obsSec.appendChild(e);
  } else {
    obsRows.forEach(r => {
      const item = document.createElement('div');
      item.className = 'suivi-obs';
      item.innerHTML = "<span class='suivi-date'>" + r.date + '</span>' +
        "<span class='suivi-obs-txt'>" + escapeHtml(r.obs) + '</span>';
      obsSec.appendChild(item);
    });
  }
  box.appendChild(obsSec);

  const foot = document.createElement('div');
  foot.className = 'modal-foot--end-only';
  foot.appendChild(mBtn('Fermer', false, closeModal));
  box.appendChild(foot);
}

/* Fiche par salarié : tableau global (heures/contrat/écart + CA/couverts)
   avec clic pour le détail d'un salarié. */
function mFicheSalarie(box) {
  box.classList.add('mo--stats');
  const eur2 = (n) => n.toLocaleString('fr-FR',
    { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
  const h1 = (n) => (Math.round(n * 10) / 10) + 'h';

  // CA + couverts d'un serveur sur le mois
  const svTotals = (empId) => {
    const k = S.y + '-' + String(S.m + 1).padStart(2, '0');
    const md = S.daily[k] || {};
    let ca = 0, couv = 0, jours = 0;
    Object.keys(md).forEach(day => {
      const sv = (md[day].serveurs || {})[empId];
      if (sv) {
        if (sv.ca) ca += sv.ca;
        if (sv.couv) couv += sv.couv;
        if (sv.ca || sv.couv) jours++;
      }
    });
    return { ca, couv, jours };
  };
  // Nombre de jours réellement travaillés
  const joursTravailles = (empId) => {
    const k = S.y + '-' + String(S.m + 1).padStart(2, '0');
    const mr = S.real[k] || {};
    let n = 0;
    Object.keys(mr).forEach(day => {
      const r = (mr[day] || {})[String(empId)];
      if (r && r.total != null && r.total > 0) n++;
    });
    return n;
  };

  // ── Détail d'un salarié sélectionné ──────────────────────────────────────
  if (S.ficheEmp != null) {
    const e = findEmp(S.ficheEmp);
    if (e) {
      const back = document.createElement('button');
      back.className = 'btn bg btn-sm';
      back.style.marginBottom = '14px';
      back.textContent = '← Tous les salariés';
      back.onclick = () => { S.ficheEmp = null; render(); };
      box.appendChild(back);

      const head = document.createElement('div');
      head.className = 'fiche-head';
      const col = eColor(e.id);
      head.innerHTML =
        "<span class='fiche-dot' style='background:" + col.bg +
        ';border:3px solid ' + col.text + "'></span>" +
        "<div><div class='fiche-name'>" + e.n + '</div>' +
        "<div class='fiche-sub'>" + (e.s === 'cuisine' ? 'Cuisine' : 'Salle') +
        ' · ' + (e.t === 'extra' ? 'Extra' : 'Contrat') +
        (e.h ? ' · ' + e.h + 'h/mois' : '') + '</div></div>';
      box.appendChild(head);

      const hReal = empRealHoursMonth(S.y, S.m, e.id);
      const contrat = e.h || 0;
      const ecart = contrat ? hReal - contrat : null;
      const jours = joursTravailles(e.id);

      const stats = document.createElement('div');
      stats.className = 'fiche-stats';
      const card = (lbl, val, cls) =>
        "<div class='fiche-stat " + (cls || '') + "'>" +
        "<div class='fiche-stat-val'>" + val + '</div>' +
        "<div class='fiche-stat-lbl'>" + lbl + '</div></div>';
      let html = card('Heures réelles', h1(hReal)) +
        (contrat ? card('Contrat', h1(contrat)) : '') +
        (ecart != null ? card('Écart', (ecart >= 0 ? '+' : '') + h1(ecart),
          ecart > 0 ? 'fiche-stat--over' : ecart < 0 ? 'fiche-stat--under' : '') : '') +
        card('Jours travaillés', jours);
      if (e.s === 'salle') {
        const sv = svTotals(e.id);
        const tm = sv.couv ? sv.ca / sv.couv : 0;
        html += card('CA déclaré', eur2(sv.ca)) +
          card('Couverts', sv.couv) +
          card('Ticket moyen', sv.couv ? eur2(tm) : '—');
      }
      stats.innerHTML = html;
      box.appendChild(stats);
    }
    const foot = document.createElement('div');
    foot.className = 'modal-foot--end-only';
    foot.appendChild(mBtn('Fermer', false, closeModal));
    box.appendChild(foot);
    return;
  }

  // ── Tableau global de tous les salariés ──────────────────────────────────
  const tbl = document.createElement('table');
  tbl.className = 'fiche-table';
  tbl.innerHTML =
    '<thead><tr><th>Salarié</th><th>Réelles</th><th>Contrat</th>' +
    '<th>Écart</th><th>Jours</th><th>CA</th><th>Couv.</th></tr></thead>';
  const tb = document.createElement('tbody');

  // Ne montrer que les salariés ayant travaillé ce mois (ou tous ? → tous
  // ceux avec des heures réelles, triés par heures décroissantes)
  const rows = S.emps.map(e => ({
    e, h: empRealHoursMonth(S.y, S.m, e.id), j: joursTravailles(e.id),
    sv: e.s === 'salle' ? svTotals(e.id) : null
  })).filter(r => r.h > 0 || r.j > 0)
    .sort((a, b) => b.h - a.h);

  if (!rows.length) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="7" class="fiche-empty">' +
      'Aucune heure saisie ce mois.</td>';
    tb.appendChild(tr);
  }
  rows.forEach(({ e, h, j, sv }) => {
    const contrat = e.h || 0;
    const ecart = contrat ? h - contrat : null;
    const col = eColor(e.id);
    const tr = document.createElement('tr');
    tr.className = 'fiche-row';
    tr.innerHTML =
      "<td class='fiche-td-name'><span class='emp-dot' style='background:" +
      col.bg + ';border:2px solid ' + col.text + "'></span>" + e.n + '</td>' +
      '<td>' + h1(h) + '</td>' +
      '<td>' + (contrat ? h1(contrat) : '—') + '</td>' +
      "<td class='" + (ecart > 0 ? 'fiche-over' : ecart < 0 ? 'fiche-under' : '') +
      "'>" + (ecart != null ? (ecart >= 0 ? '+' : '') + h1(ecart) : '—') + '</td>' +
      '<td>' + j + '</td>' +
      '<td>' + (sv && sv.ca ? eur2(sv.ca) : '—') + '</td>' +
      '<td>' + (sv && sv.couv ? sv.couv : '—') + '</td>';
    tr.onclick = () => { S.ficheEmp = e.id; render(); };
    tb.appendChild(tr);
  });
  tbl.appendChild(tb);
  box.appendChild(tbl);

  const foot = document.createElement('div');
  foot.className = 'modal-foot--end-only';
  foot.appendChild(mBtn('Fermer', false, closeModal));
  box.appendChild(foot);
}

function mStats(box) {
  const D = dim(S.y, S.m);
  box.classList.add('mo--stats');
  mHdr(box, '📊 Statistiques — ' + MN[S.m] + ' ' + S.y);

  const descP = document.createElement('p');
  descP.className = 'stats-desc';
  descP.textContent =
    'Nombre de fois où chaque employé a été affecté à chaque poste ce mois.';
  box.appendChild(descP);

  // Initialise le dico stats[empId][postCode] = 0
  const stats = {};
  S.emps.forEach(e => {
    stats[e.id] = {};
    AP.forEach(p => { stats[e.id][p.c] = 0; });
  });
  // Compte les affectations du mois
  for (let d = 1; d <= D; d++) {
    AP.forEach(p => {
      const eid = getSlot(d, p.c);
      if (eid !== null && stats[eid]) stats[eid][p.c]++;
    });
  }

  // Un tableau par section (cuisine inclut les polyvalents)
  ['cuisine', 'salle'].forEach(sec => {
    const sectionEmps = S.emps.filter(
      e => e.s === sec || (e.ec && sec === 'cuisine')
    );
    if (!sectionEmps.length) return;
    const posts = sec === 'cuisine' ? PC : PS;

    const sectionHeader = document.createElement('div');
    sectionHeader.className = 'stats-section-title';
    sectionHeader.style.color = sec === 'cuisine' ? '#c2410c' : '#1d4ed8';
    sectionHeader.textContent = sec === 'cuisine' ? '🍳 Cuisine' : '🍽 Salle';
    box.appendChild(sectionHeader);

    const table = document.createElement('table');
    table.className = 'stats-table';

    const thead = document.createElement('thead');
    const hr = document.createElement('tr');
    hr.style.background = '#f9fafb';

    const thName = document.createElement('th');
    thName.className = 'stats-th stats-th--name';
    thName.textContent = 'Employé';
    hr.appendChild(thName);

    posts.forEach(p => {
      const th = document.createElement('th');
      th.className = 'stats-th';
      th.style.background = p.hbg;
      th.textContent = p.l.substring(0, 5);
      hr.appendChild(th);
    });
    const thTot = document.createElement('th');
    thTot.className = 'stats-th';
    thTot.textContent = 'Total';
    hr.appendChild(thTot);
    thead.appendChild(hr);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    sectionEmps.forEach((e, i) => {
      const col = eColor(e.id);
      const tr = document.createElement('tr');
      tr.className = 'stats-row' + (i % 2 ? ' stats-row--alt' : '');

      const tdName = document.createElement('td');
      tdName.className = 'stats-name-cell';
      tdName.innerHTML =
        "<div style='display:flex;align-items:center;gap:6px'>" +
          "<span class='emp-dot emp-dot--sm' style='background:" +
          col.bg + ';border:1.5px solid ' + col.text + "'></span>" +
          e.n +
        '</div>';
      tr.appendChild(tdName);

      let totalDays = 0, totalH = 0;
      posts.forEach(p => {
        const cnt = stats[e.id] ? (stats[e.id][p.c] || 0) : 0;
        totalDays += cnt;
        totalH    += cnt * postH(p.c);
        const td = document.createElement('td');
        td.className = 'stats-cell';
        if (cnt > 0) {
          td.innerHTML =
            "<span class='stats-cell-badge' style='background:" +
            p.bg + "'>" + cnt + 'j</span>';
        } else {
          td.innerHTML = "<span style='color:#e5e7eb'>—</span>";
        }
        tr.appendChild(td);
      });

      const tdTotal = document.createElement('td');
      tdTotal.className = 'stats-total-cell';
      if (totalDays) {
        tdTotal.innerHTML =
          totalDays + 'j<br>' +
          "<span class='stats-total-hours'>" +
          (Math.round(totalH * 10) / 10) + 'h</span>';
      } else {
        tdTotal.innerHTML = '—';
      }
      tr.appendChild(tdTotal);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    box.appendChild(table);
  });

  const foot = document.createElement('div');
  foot.className = 'modal-foot--end-only';
  foot.appendChild(mBtn('Fermer', false, closeModal));
  box.appendChild(foot);
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL — 📅 Suivi annuel (vue 12 mois)
   ───────────────────────────────────────────────────────────────────────────
   Tableau : lignes = employés, colonnes = 12 mois.
   Pour chaque cellule on affiche le nombre de jours travaillés ce mois-là.
   Les mois futurs sans données affichent "—".
   Colonnes de droite : Total j, Total h (+ barre progression), Objectif, Écart.
   Objectif annuel = contrat mensuel × 12.
   ═══════════════════════════════════════════════════════════════════════════ */

function mAnnuel(box) {
  const year = S.y;
  const mnShort = [
    'Jan', 'Fev', 'Mar', 'Avr', 'Mai', 'Jun',
    'Jul', 'Aou', 'Sep', 'Oct', 'Nov', 'Dec'
  ];
  const now = new Date();

  box.classList.add('mo--wide');
  mHdr(box, '📅 Suivi annuel — ' + year);

  const descP = document.createElement('p');
  descP.className = 'annuel-desc';
  descP.textContent =
    'Heures travaillées cumulées. Objectif = contrat mensuel × 12.';
  box.appendChild(descP);

  const tblWrap = document.createElement('div');
  tblWrap.className = 'annuel-wrap';

  const table = document.createElement('table');
  table.className = 'annuel-table';

  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  hrow.className = 'annuel-thead-row';

  // Helper pour construire les TH
  function makeTh(text, minWidth, align) {
    const t = document.createElement('th');
    t.className = 'annuel-th' + (align === 'left' ? ' annuel-th--left' : '');
    if (minWidth) t.style.minWidth = minWidth;
    t.innerHTML = text;
    return t;
  }

  hrow.appendChild(makeTh('Employé', '130px', 'left'));
  for (let m = 0; m < 12; m++) {
    const isCurrentMonth =
      m === now.getMonth() && year === now.getFullYear();
    const th = document.createElement('th');
    th.className = 'annuel-th-month' +
      (isCurrentMonth ? ' annuel-th-month--current' : '');
    th.textContent = mnShort[m];
    hrow.appendChild(th);
  }
  hrow.appendChild(makeTh('Total j',  '55px'));
  hrow.appendChild(makeTh('Total h',  '60px'));
  hrow.appendChild(makeTh('Objectif', '65px'));
  hrow.appendChild(makeTh('Ecart',    '55px'));
  thead.appendChild(hrow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  S.emps.forEach((e, idx) => {
    const col = eColor(e.id);
    const isAlt = idx % 2 === 1;
    const tr = document.createElement('tr');
    tr.className = 'annuel-row' + (isAlt ? ' annuel-row--alt' : '');

    // Cellule nom sticky gauche
    const tdName = document.createElement('td');
    tdName.className = 'annuel-name-cell ' +
      (isAlt ? 'annuel-name-cell--alt' : 'annuel-name-cell--normal');
    tdName.innerHTML =
      "<div style='display:flex;align-items:center;gap:6px'>" +
        "<span class='emp-dot' style='background:" + col.bg +
        ';border:2px solid ' + col.text + "'></span>" +
        "<span style='font-size:12px;font-weight:500'>" + e.n + '</span>' +
      '</div>';
    tr.appendChild(tdName);

    let totalJ = 0, totalH = 0;
    for (let m = 0; m < 12; m++) {
      const wj = workedDaysInMonth(e.id, year, m);
      totalJ += wj;
      const monthH = workedHoursInMonth(e.id, year, m);
      totalH += monthH;

      // Détection mois futur sans données (pour afficher "—" au lieu de 0)
      const key = year + '-' + String(m + 1).padStart(2, '0');
      const hasData = !!S.pl[key] && Object.keys(S.pl[key]).length > 0;
      const isFuture = new Date(year, m, 1) > now && !hasData;

      const td = document.createElement('td');
      td.className = 'annuel-month-cell';
      if (isFuture) {
        td.innerHTML = "<span class='annuel-month-empty'>—</span>";
      } else if (wj === 0) {
        td.innerHTML = "<span class='annuel-month-zero'>0</span>";
      } else {
        td.innerHTML =
          "<span class='annuel-month-value'>" + wj + '</span>';
      }
      tr.appendChild(td);
    }

    totalH = Math.round(totalH * 10) / 10;
    const objectif = e.h * 12;
    const diff = Math.round((totalH - objectif) * 10) / 10;
    const pct = Math.min(100, Math.round(totalH / objectif * 100));
    const progressColor = pct >= 100 ? '#16a34a'
                        : pct >=  70 ? '#3b82f6'
                        : '#f59e0b';

    const tdJ = document.createElement('td');
    tdJ.className = 'annuel-sum-cell annuel-sum-cell--days';
    tdJ.textContent = totalJ;

    const tdH = document.createElement('td');
    tdH.className = 'annuel-sum-cell';
    tdH.innerHTML =
      totalH + 'h' +
      "<div class='pb annuel-progress'>" +
        "<div class='f' style='width:" + pct + '%;background:' +
        progressColor + "'></div>" +
      '</div>';

    const tdO = document.createElement('td');
    tdO.className = 'annuel-sum-cell annuel-sum-cell--obj';
    tdO.textContent = objectif + 'h';

    const tdD = document.createElement('td');
    tdD.className = 'annuel-sum-cell annuel-sum-cell--diff';
    tdD.style.color = diff >= 0 ? '#16a34a' : '#dc2626';
    tdD.textContent = (diff >= 0 ? '+' : '') + diff + 'h';

    tr.appendChild(tdJ);
    tr.appendChild(tdH);
    tr.appendChild(tdO);
    tr.appendChild(tdD);
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  tblWrap.appendChild(table);
  box.appendChild(tblWrap);

  const foot = document.createElement('div');
  foot.className = 'modal-foot--end-only';
  foot.appendChild(mBtn('Fermer', false, closeModal));
  box.appendChild(foot);
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL — 📋 Copier un planning depuis un autre mois
   ───────────────────────────────────────────────────────────────────────────
   Copie brute de S.pl[source] → S.pl[mois courant]. Avertit avant écrasement.
   ═══════════════════════════════════════════════════════════════════════════ */

function mCopier(box) {
  mHdr(box, '📋 Copier un planning');

  const descP = document.createElement('p');
  descP.className = 'copier-desc';
  descP.textContent =
    "Copiez les affectations d'un mois précédent comme base pour " +
    MN[S.m] + ' ' + S.y + '.';
  box.appendChild(descP);

  const row = document.createElement('div');
  row.className = 'copier-selectors';

  const yearSelect = document.createElement('select');
  yearSelect.className = 'form-select copier-select-year';
  const curYear = new Date().getFullYear();
  for (let y = curYear - 1; y <= curYear + 1; y++) {
    const o = document.createElement('option');
    o.value = y;
    o.textContent = y;
    if (y === S.y) o.selected = true;
    yearSelect.appendChild(o);
  }

  const monthSelect = document.createElement('select');
  monthSelect.className = 'form-select copier-select-month';
  // Par défaut : mois précédent
  const defaultMonth = S.m === 0 ? 11 : S.m - 1;
  MN.forEach((mn, i) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = mn;
    if (i === defaultMonth) o.selected = true;
    monthSelect.appendChild(o);
  });

  row.appendChild(yearSelect);
  row.appendChild(monthSelect);
  box.appendChild(row);

  const warnDiv = document.createElement('div');
  warnDiv.className = 'copier-warn';
  warnDiv.textContent =
    '⚠ Cette action remplacera le planning de ' +
    MN[S.m] + ' ' + S.y + ' par une copie du mois sélectionné.';
  box.appendChild(warnDiv);

  const foot = document.createElement('div');
  foot.className = 'modal-foot';
  foot.appendChild(mBtn('Annuler', false, closeModal));
  foot.appendChild(mBtn('Copier', true, () => {
    const srcKey = yearSelect.value + '-' +
      String(parseInt(monthSelect.value) + 1).padStart(2, '0');
    const srcPl = S.pl[srcKey];
    if (!srcPl || Object.keys(srcPl).length === 0) {
      alert('Aucun planning trouvé pour ' +
        MN[parseInt(monthSelect.value)] + ' ' + yearSelect.value);
      return;
    }
    // Deep clone pour éviter la partage de référence
    S.pl[mk()] = JSON.parse(JSON.stringify(srcPl));
    save();
    closeModal();

/* ═══════════════════════════════════════════════════════════════════════════
   EXPORT — Planning par employé (PDF via fenêtre imprimable A5 paysage)
   ───────────────────────────────────────────────────────────────────────────
   Une page par employé, présentée comme un calendrier mensuel 7 colonnes
   (Di-Lu-Ma-Me-Je-Ve-Sa) avec :
     • Le poste affecté ce jour-là (badge coloré)
     • Ou mention CP / Maladie / Indispo / absence visible
     • Le texte de note du jour si présent (tronqué à 18 car.)
   La fenêtre lance automatiquement window.print() au chargement.
   ═══════════════════════════════════════════════════════════════════════════ */

function exportParEmploye() {
  const D = dim(S.y, S.m);
  const pages = [];

  S.emps.forEach(e => {
    const jours = [];
    for (let d = 1; d <= D; d++) {
      const w = dow(S.y, S.m, d);
      const isWeekend = w === 0 || w === 6;
      const isToday = isTod(S.y, S.m, d);

      // Cherche le poste affecté pour cet employé ce jour
      let poste = null, posteName = '', posteBg = '';
      for (let i = 0; i < AP.length; i++) {
        if (getSlot(d, AP[i].c) === e.id) {
          poste = AP[i];
          posteName = poste.l;
          posteBg = poste.bg;
          break;
        }
      }
      const cpDay  = getCp (e.id).indexOf(d) >= 0;
      const malDay = getMal(e.id).indexOf(d) >= 0;
      const indDay = getInd(e.id).indexOf(d) >= 0;
      const note = getNote(d);

      jours.push({
        d: d, w: w, we: isWeekend, tod: isToday,
        poste: posteName, posteCode: poste ? poste.c : null,
        posteBg: posteBg, cp: cpDay, mal: malDay, ind: indDay, note: note
      });
    }

    const wj = workedDays(e.id);
    const hw = workedHours(e.id);
    const diff = Math.round((hw - e.h) * 10) / 10;
    const cpCount  = getCp (e.id).filter(d => d >= 1 && d <= D).length;
    const malCount = getMal(e.id).filter(d => d >= 1 && d <= D).length;
    const col = ECOLS.filter(c => c.id === e.col)[0] ||
      { bg: '#f1f5f9', text: '#374151' };

    pages.push({
      emp: e, jours: jours, wj: wj, hw: hw, diff: diff,
      cpCount: cpCount, malCount: malCount, col: col
    });
  });

  const h = [];
  h.push(
    "<!DOCTYPE html><html><head><meta charset='utf-8'>" +
    '<title>Planning individuel ' + MN[S.m] + ' ' + S.y + '</title>'
  );
  h.push('<style>');
  h.push('*{box-sizing:border-box;margin:0;padding:0}');
  h.push('body{font-family:Arial,sans-serif;font-size:11px;background:#fff}');
  h.push('.page{width:210mm;min-height:148mm;padding:10mm 12mm;' +
         'page-break-after:always;display:flex;flex-direction:column;gap:8px}');
  h.push('.page:last-child{page-break-after:auto}');
  h.push('@page{size:A5 landscape;margin:0}');
  h.push('@media print{body{margin:0}}');
  h.push('.header{display:flex;align-items:center;' +
         'justify-content:space-between;padding-bottom:6px;' +
         'border-bottom:2px solid #e5e7eb}');
  h.push('.name{font-size:16px;font-weight:700;display:flex;' +
         'align-items:center;gap:8px}');
  h.push('.badge{padding:3px 10px;border-radius:20px;' +
         'font-size:10px;font-weight:700}');
  h.push('.info{font-size:10px;color:#6b7280;text-align:right;' +
         'line-height:1.6}');
  h.push('.grid{display:grid;grid-template-columns:repeat(7,1fr);' +
         'gap:3px;flex:1}');
  h.push('.day-hdr{text-align:center;font-size:8px;font-weight:700;' +
         'text-transform:uppercase;color:#9ca3af;padding:2px 0}');
  h.push('.day{border-radius:6px;padding:4px 3px;text-align:center;' +
         'min-height:22mm;display:flex;flex-direction:column;' +
         'align-items:center;justify-content:flex-start;gap:2px;' +
         'border:0.5px solid #f1f5f9}');
  h.push('.day.we{background:#f8fafc}');
  h.push('.day.tod{border:2px solid #3b82f6}');
  h.push('.day.empty{background:#fafafa}');
  h.push('.day .num{font-size:12px;font-weight:700;color:#111827}');
  h.push('.day.we .num{color:#9ca3af}');
  h.push('.day .dn{font-size:8px;color:#9ca3af}');
  h.push('.day .post{display:inline-block;padding:2px 5px;border-radius:3px;' +
         'font-size:8px;font-weight:700;margin-top:2px;max-width:100%;' +
         'overflow:hidden;text-overflow:ellipsis;white-space:nowrap}');
  h.push('.day .cp{font-size:8px;font-weight:700;color:#16a34a;margin-top:2px}');
  h.push('.day .mal{font-size:8px;font-weight:700;color:#ef4444;' +
         'margin-top:2px}');
  h.push('.day .ind{font-size:8px;color:#9ca3af;margin-top:2px}');
  h.push('.day .note{font-size:7px;color:#f59e0b;margin-top:2px;' +
         'font-style:italic}');
  h.push('</style></head><body>');

  pages.forEach(pg => {
    const e = pg.emp;
    const col = pg.col;
    const isExtra = (e.t || 'contrat') === 'extra';

    h.push("<div class='page'>");

    // Header : nom + tags contrat/section + infos à droite
    h.push("<div class='header'>");
    h.push(
      "<div class='name'>" +
        "<span style='width:14px;height:14px;border-radius:50%;background:" +
        col.bg + ';border:2px solid ' + col.text +
        ";display:inline-block;flex-shrink:0'></span>" + e.n +
      '</div>'
    );
    h.push("<div style='display:flex;gap:6px;align-items:center'>");
    h.push(
      "<span class='badge' style='background:" +
      (isExtra ? '#fef9c3' : '#eff6ff') + ';color:' +
      (isExtra ? '#92400e' : '#1d4ed8') + ';border:1px solid ' +
      (isExtra ? '#fde68a' : '#bfdbfe') + "'>" +
      (isExtra ? 'Extra' : 'Contrat') + '</span>'
    );
    h.push(
      "<span class='badge' style='background:" +
      (e.s === 'cuisine' ? '#fff7ed' : '#eff6ff') + ';color:' +
      (e.s === 'cuisine' ? '#c2410c' : '#1d4ed8') + ';border:1px solid ' +
      (e.s === 'cuisine' ? '#fed7aa' : '#bfdbfe') + "'>" +
      (e.s === 'cuisine' ? 'Cuisine' : 'Salle') + '</span>'
    );
    h.push('</div>');
    h.push(
      "<div class='info'>Planning " + MN[S.m] + ' ' + S.y +
      '<br>Contrat : ' + e.h + 'h/mois' +
      (e.tel ? '<br>📞 ' + e.tel : '') + '</div>'
    );
    h.push('</div>');

    // En-têtes jours de semaine
    h.push("<div class='grid'>");
    ['Di', 'Lu', 'Ma', 'Me', 'Je', 'Ve', 'Sa'].forEach(dn => {
      h.push("<div class='day-hdr'>" + dn + '</div>');
    });

    // Padding avant le 1er jour (pour aligner avec le bon jour de semaine)
    const firstW = dow(S.y, S.m, 1);
    for (let i = 0; i < firstW; i++) h.push('<div></div>');

    pg.jours.forEach(j => {
      const cls = 'day' + (j.we ? ' we' : '') + (j.tod ? ' tod' : '');
      h.push("<div class='" + cls + "'>");
      h.push("<div class='num'>" + j.d + '</div>');
      if (j.cp) {
        h.push("<div class='cp'>CP</div>");
      } else if (j.mal) {
        h.push("<div class='mal'>Maladie</div>");
      } else if (j.ind) {
        h.push("<div class='ind'>Indispo</div>");
      } else if (j.poste) {
        h.push(
          "<div class='post' style='background:" + j.posteBg +
          ";color:#1f2937'>" + j.poste + '</div>'
        );
      }
      if (j.note) {
        h.push(
          "<div class='note'>📌 " + j.note.substring(0, 18) + '</div>'
        );
      }
      h.push('</div>');
    });
    h.push('</div>');       // fin .grid
    h.push('</div></div>'); // fin .page (le double </div> est dans l'original)
  });

  // Auto-print au chargement (split du tag script pour éviter la casse
  // du parsing HTML si ce code est lui-même dans un fichier HTML)
  h.push(
    '<scr' + 'ipt>window.onload=function(){window.focus();' +
    'window.print();};<' + '/scr' + 'ipt></body></html>'
  );

  const win = window.open('', '_blank', 'width=960,height=700');
  if (!win) { alert('Autorisez les popups.'); return; }
  win.document.write(h.join(''));
  win.document.close();
}

/* ═══════════════════════════════════════════════════════════════════════════
   EXPORT — PDF global via jsPDF + jspdf-autotable (chargés dynamiquement)
   ───────────────────────────────────────────────────────────────────────────
   A4 paysage. La taille de police et padding s'ajustent pour tenir sur 1 page.
   ═══════════════════════════════════════════════════════════════════════════ */

function exportPdf() {
  // Chargement dynamique de jsPDF, puis de autotable
  const script = document.createElement('script');
  script.src =
    'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/' +
    'jspdf.umd.min.js';

  script.onload = () => {
    const s2 = document.createElement('script');
    s2.src =
      'https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/' +
      'jspdf.plugin.autotable.min.js';

    s2.onload = () => {
      try {
        const jsPDF = window.jspdf.jsPDF;
        const doc = new jsPDF({
          orientation: 'landscape', unit: 'mm', format: 'a4'
        });
        const D = dim(S.y, S.m);
        const activePosts = getActivePosts(1);
        const cols = AP.filter(p => activePosts.indexOf(p.c) >= 0);

        doc.setFontSize(11);
        doc.setFont(undefined, 'bold');
        doc.text('Planning ' + MN[S.m] + ' ' + S.y, 14, 11);

        const head = [
          ['Jour', 'J'].concat(cols.map(p => p.l.substring(0, 8)))
        ];
        const body = [];
        for (let d = 1; d <= D; d++) {
          const row = [String(d), DN[dow(S.y, S.m, d)]];
          cols.forEach(p => {
            const eid = getSlot(d, p.c);
            row.push(eid !== null ? eName(eid) : '');
          });
          body.push(row);
        }

        // A4 paysage : 297mm - 2*14mm marges = 269mm utiles
        const usable = 269;
        const fixedW = 8 + 5; // Colonnes "Jour" et "J"
        const colWidth = Math.floor((usable - fixedW) / cols.length);
        const columnStyles = {
          0: { cellWidth: 8, fontStyle: 'bold' },
          1: { cellWidth: 5 }
        };
        cols.forEach((p, i) => { columnStyles[i + 2] = { cellWidth: colWidth }; });

        // Adaptation taille/padding pour tenir sur 1 page (190mm dispo)
        const rowH = (190 - 16) / D;
        const fs = Math.min(6.5, Math.max(3.5, rowH * 0.55));
        const cellPad = Math.min(1.5, rowH * 0.2);

        doc.autoTable({
          head: head, body: body,
          startY: 14, pageBreak: 'avoid', showHead: 'firstPage',
          styles: {
            fontSize: fs, cellPadding: cellPad,
            halign: 'center', overflow: 'ellipsize'
          },
          columnStyles: columnStyles,
          headStyles: {
            fillColor: [241, 245, 249],
            textColor: [107, 114, 128],
            fontStyle: 'bold', fontSize: fs
          },
          alternateRowStyles: { fillColor: [249, 250, 251] },
          margin: { left: 14, right: 14, top: 14, bottom: 14 }
        });

        doc.save('planning_' + MN[S.m] + '_' + S.y + '.pdf');
      } catch (err) {
        alert('Erreur PDF: ' + err.message);
      }
    };
    s2.onerror = () => { alert('Erreur PDF.'); };
    document.head.appendChild(s2);
  };
  script.onerror = () => { alert('Erreur PDF.'); };
  document.head.appendChild(script);
}

/* ═══════════════════════════════════════════════════════════════════════════
   HELPERS POUR LA SAISIE FLUIDE
   ═══════════════════════════════════════════════════════════════════════════ */

/* Génère un <select> d'horaires par tranches de 15 min de 6h00 à 2h00.
   value initiale en minutes depuis minuit (ou null). id pour récupération. */
/* Convertit une saisie libre d'heure en minutes réelles (0..1439) ou null.
   Accepte : "845", "8h45", "8:45", "8.45", "8", "8h", "20h30", etc. */
function parseTimeInput(raw) {
  if (raw == null) return null;
  let s = String(raw).trim().toLowerCase();
  if (!s) return null;
  s = s.replace(/[hH:.\s]/g, ':');
  let h, mn;
  if (s.indexOf(':') >= 0) {
    const parts = s.split(':').filter(p => p !== '');
    h = parseInt(parts[0], 10);
    mn = parts.length > 1 ? parseInt(parts[1], 10) : 0;
  } else {
    // Chiffres collés : "845" → 8h45, "1230" → 12h30, "8" → 8h00
    const digits = s.replace(/\D/g, '');
    if (!digits) return null;
    if (digits.length <= 2) { h = parseInt(digits, 10); mn = 0; }
    else {
      mn = parseInt(digits.slice(-2), 10);
      h = parseInt(digits.slice(0, -2), 10);
    }
  }
  if (isNaN(h)) return null;
  if (isNaN(mn)) mn = 0;
  if (h > 23) h = h % 24;
  if (mn > 59) mn = 59;
  return h * 60 + mn;
}

/* Formate des minutes réelles (0..1439) en "8h45". */
function fmtTimeInput(realMin) {
  if (realMin == null) return '';
  const h = Math.floor(realMin / 60);
  const mn = realMin % 60;
  return h + 'h' + (mn < 10 ? '0' : '') + mn;
}

/* Lit la valeur d'un champ heure (texte libre) → minutes réelles ou null. */
function readTimeField(el) {
  if (!el) return null;
  if (el.dataset && el.dataset.min !== undefined && el.dataset.min !== '') {
    const v = parseInt(el.dataset.min, 10);
    if (!isNaN(v)) return v;
  }
  return parseTimeInput(el.value);
}

/* Champ de saisie d'heure en texte libre : on tape "845" → devient "8h45".
   Stocke les minutes réelles dans data-min pour une lecture fiable. */
function timeSelect(id, valueMin) {
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'form-input--sm saisie-time-inp saisie-enter';
  inp.id = id;
  inp.autocomplete = 'off';
  inp.inputMode = 'numeric';
  inp.placeholder = '—';
  if (valueMin != null) {
    inp.value = fmtTimeInput(valueMin);
    inp.dataset.min = valueMin;
  } else {
    inp.dataset.min = '';
  }
  // Normalise à la sortie du champ : "845" → "8h45"
  const normalize = () => {
    const m = parseTimeInput(inp.value);
    if (m == null) { inp.value = ''; inp.dataset.min = ''; }
    else { inp.value = fmtTimeInput(m); inp.dataset.min = m; }
  };
  inp.addEventListener('blur', normalize);
  // Met à jour data-min en direct pour les recalculs instantanés
  inp.addEventListener('input', () => {
    const m = parseTimeInput(inp.value);
    inp.dataset.min = (m == null ? '' : m);
  });
  return inp;
}

/* Active la navigation au clavier : Entrée → focus sur le champ suivant.
   Cible tous les éléments .saisie-enter du formulaire, dans l'ordre du DOM. */
function enableEnterNavigation(form) {
  const focusables = Array.prototype.slice.call(
    form.querySelectorAll('.saisie-enter')
  );
  focusables.forEach((el, i) => {
    el.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        const next = focusables[i + 1];
        if (next) {
          next.focus();
          if (next.select) { try { next.select(); } catch (e) { /* select */ } }
        } else {
          el.blur();
        }
      }
    });
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL — 📋 Saisie quotidienne (caisse + CA + couverts + heures réelles)
   ───────────────────────────────────────────────────────────────────────────
   Remplace la feuille de caisse papier. Blocs :
     1. CA & couverts du jour : CALCULÉS depuis les serveurs (+ fonds de caisse)
     2. CA / couverts par serveur (présents modifiables)
     3. Heures réelles par salarié (listes déroulantes, présents modifiables)
     4. Encaissements : deux colonnes CLYO (théorique) vs RÉEL (caisse) + écart
   Les données sont stockées dans S.daily (caisse) et S.real (heures).
   ═══════════════════════════════════════════════════════════════════════════ */

/* Contexte actif de la saisie : la vue pleine page utilise S._saisieCtx,
   l'ancienne pop-up utilisait S.modal. Les helpers partagés passent par ici. */
function saisieCtx() {
  return (S.view === 'saisie') ? (S._saisieCtx || (S._saisieCtx = {})) : S.modal;
}

/* Ouvre la saisie du jour en VUE pleine page (plus de pop-up). */
function openSaisie(d) {
  const now = new Date();
  S._freqTimes = null; // recalcul des horaires fréquents à chaque ouverture
  const def = (now.getFullYear() === S.y && now.getMonth() === S.m)
    ? now.getDate() : 1;
  // Mémorise l'écran d'origine pour y revenir (planning, caisse…).
  // Si on est déjà sur la saisie, on conserve l'origine déjà enregistrée.
  if (S.view !== 'saisie') S.saisieFrom = S.view || 'month';
  S.saisieDay = d || def;
  S.modal = null;
  S.view = 'saisie';
  render();
}

/* Libellé + action de retour depuis la saisie, selon l'écran d'origine. */
function saisieBackLabel() {
  return S.saisieFrom === 'caisse' ? '← Retour à Caisse & CA' :
         S.saisieFrom === 'heures' ? '← Retour aux Heures' :
         '← Retour au planning';
}
function saisieBack(box, d) {
  if (box) saveSaisieForm(box, d);
  S.modal = null;
  S.view = S.saisieFrom || 'month';
  render();
}

/* Vue pleine page de la saisie du jour (remplace l'ancienne pop-up).
   Réutilise toute la logique de mSaisie via un flag asView.
   En mode vue, le contexte (jour + présents) vit dans S._saisieCtx, PAS dans
   S.modal — ainsi un éventuel modal par-dessus (photo, synthèse) n'est pas
   écrasé au re-render. */
function rSaisie() {
  const outer = document.createElement('div');
  outer.className = 'caisse-wrap saisie-page';
  if (!S.saisieDay) {
    const now = new Date();
    S.saisieDay = (now.getFullYear() === S.y && now.getMonth() === S.m)
      ? now.getDate() : 1;
  }
  // Contexte dédié à la vue (réutilisé entre re-renders)
  if (!S._saisieCtx) S._saisieCtx = {};
  S._saisieCtx.type = 'saisie';
  S._saisieCtx.d = S.saisieDay;
  S._saisieCtx._asView = true;
  mSaisie(outer, true);
  return outer;
}

/* Retourne les horaires (arr et dep) les plus fréquents dans l'historique,
   pour proposer des raccourcis. Fallback sur des valeurs typiques. */
function frequentTimes() {
  const arrCount = {}, depCount = {};
  Object.keys(S.real || {}).forEach(mk => {
    const days = S.real[mk];
    Object.keys(days).forEach(day => {
      Object.keys(days[day]).forEach(eid => {
        const r = days[day][eid];
        if (r && r.arr != null) arrCount[r.arr] = (arrCount[r.arr] || 0) + 1;
        if (r && r.dep != null) depCount[r.dep] = (depCount[r.dep] || 0) + 1;
      });
    });
  });
  const top = (obj, fallback) => {
    const arr = Object.keys(obj).map(k => [parseInt(k, 10), obj[k]])
      .sort((a, b) => b[1] - a[1]).slice(0, 3).map(x => x[0]);
    return arr.length ? arr : fallback;
  };
  return {
    arr: top(arrCount, [8 * 60 + 45, 9 * 60, 11 * 60]),
    dep: top(depCount, [14 * 60 + 30, 15 * 60, 23 * 60])
  };
}

/* Boutons de raccourcis d'horaires fréquents sous un champ heure. */
function buildQuickTimes(inputEl, col) {
  const wrap = document.createElement('div');
  wrap.className = 'saisie-quick';
  const freq = S._freqTimes || (S._freqTimes = frequentTimes());
  (col === 'arr' ? freq.arr : freq.dep).forEach(min => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'saisie-quick-btn';
    b.textContent = fmtTimeInput(min);
    b.tabIndex = -1;
    b.onclick = () => {
      inputEl.value = fmtTimeInput(min);
      inputEl.dataset.min = min;
      inputEl.dispatchEvent(new Event('input', { bubbles: true }));
      inputEl.dispatchEvent(new Event('blur', { bubbles: true }));
    };
    wrap.appendChild(b);
  });
  return wrap;
}

/* Navigation verticale ↑/↓ entre champs heures de même colonne. */
function moveVertical(el, dir) {
  const col = el.dataset.col;
  const all = Array.prototype.slice.call(
    document.querySelectorAll('.saisie-time-inp[data-col="' + col + '"]'));
  const i = all.indexOf(el);
  if (i < 0) return;
  const next = all[i + dir];
  if (next) { next.focus(); try { next.select(); } catch (e) { /* select */ } }
}

/* Trouve l'horaire de la ligne (tr) précédente ayant des champs heures. */
function findPrevRowTimes(tr) {
  let row = tr.previousElementSibling;
  while (row) {
    const arr = row.querySelector('.saisie-time-inp[data-col="arr"]');
    const dep = row.querySelector('.saisie-time-inp[data-col="dep"]');
    if (arr || dep) {
      return {
        arr: arr ? arr.value : '', arrMin: arr ? arr.dataset.min : '',
        dep: dep ? dep.value : '', depMin: dep ? dep.dataset.min : ''
      };
    }
    row = row.previousElementSibling;
  }
  return null;
}

/* Enregistrement automatique (debounce) pendant la saisie. */
function scheduleAutosave() {
  if (S._autosaveT) clearTimeout(S._autosaveT);
  S._autosaveT = setTimeout(() => {
    const box = document.querySelector('.saisie-form');
    if (box && (S.view === 'saisie' || S.modal)) {
      const day = (S.view === 'saisie') ? S.saisieDay : (S.modal && S.modal.day);
      if (day != null) {
        saveSaisieForm(box, day);
        setSaveStatus(GAS_URL ? 'saving' : 'local');
      }
    }
  }, 1200);
}

    render();
  };

  const prevBtn = mBtn('◀', false, () => {
    saveSaisieForm(box, d);

  function recalcTotaux() {
    const c = saisieCtx();
    if (!c || !Array.isArray(c._presentIds)) return; // saisie fermée entre-temps
    let totCa = 0, totCv = 0, hasCa = false, hasCv = false;
    c._presentIds.forEach(eid => {
      const caEl = document.getElementById('sv_ca_' + eid);
      const cvEl = document.getElementById('sv_cv_' + eid);
      if (caEl && caEl.value !== '') {
        const v = parseFloat(caEl.value); if (!isNaN(v)) { totCa += v; hasCa = true; }
      }
      if (cvEl && cvEl.value !== '') {
        const v = parseFloat(cvEl.value); if (!isNaN(v)) { totCv += v; hasCv = true; }
      }
    });
    const caEl = document.getElementById('saisie-ca-total');
    const cvEl = document.getElementById('saisie-couv-total');
    if (caEl) caEl.textContent = hasCa ? fmtEur(totCa) : '—';
    if (cvEl) cvEl.textContent = hasCv ? totCv : '—';

    // ── Alertes de cohérence : couverts sans heures, ou inverse en salle ────
    const alertBox = document.getElementById('saisie-alerts');
    if (alertBox) {
      const warns = [];
      c._presentIds.forEach(eid => {
        const e = findEmp(eid);
        if (!e || realSect(S.y, S.m, d, eid) !== 'salle') return;
        const cvEl2 = document.getElementById('sv_cv_' + eid);
        const arrEl = document.getElementById('hr_arr_' + eid);
        const depEl = document.getElementById('hr_dep_' + eid);
        const aCouv = cvEl2 && cvEl2.value !== '' && parseFloat(cvEl2.value) > 0;
        const aHeures = arrEl && depEl && arrEl.value !== '' && depEl.value !== '';
        if (aCouv && !aHeures) {
          warns.push(e.n + ' a des couverts mais pas d\u2019heures saisies');
        } else if (aHeures && !aCouv) {
          warns.push(e.n + ' a des heures mais aucun couvert');
        }
      });
      if (warns.length) {
        alertBox.style.display = '';
        alertBox.innerHTML = warns.map(w =>
          "<div class='saisie-alert'>⚠️ " + w + '</div>').join('');
      } else {
        alertBox.style.display = 'none';
        alertBox.innerHTML = '';
      }
    }
  }

  // ── SECTION CUISINE — heures uniquement ─────────────────────────────────
  // Salariés dont la section RÉELLE du jour = cuisine (inclut les polyvalents
  // basculés en cuisine, exclut les polyvalents salle restés en salle).
  function sectionDuJour(eid) { return realSect(S.y, S.m, d, eid); }

  const cuisineIds = saisieCtx()._presentIds.filter(id => {
    const e = findEmp(id); return e && sectionDuJour(id) === 'cuisine';

  // Construit une ligne d'heures (arrivée/départ/total) réutilisable.
  function buildHeureCells(tr, eid) {
    const r = getReal(S.y, S.m, d, eid);
    const arrTd = document.createElement('td');
    const arrSel = timeSelect('hr_arr_' + eid, r && r.arr != null ? r.arr : null);
    arrSel.dataset.col = 'arr';
    arrTd.appendChild(arrSel);
    // Boutons horaires fréquents sous le champ arrivée
    arrTd.appendChild(buildQuickTimes(arrSel, 'arr'));

    const depTd = document.createElement('td');
    const depSel = timeSelect('hr_dep_' + eid, r && r.dep != null ? r.dep : null);
    depSel.dataset.col = 'dep';
    depTd.appendChild(depSel);
    depTd.appendChild(buildQuickTimes(depSel, 'dep'));

    const totTd = document.createElement('td');
    totTd.className = 'saisie-total';
    totTd.id = 'hr_tot_' + eid;
    totTd.textContent = r && r.total != null ? fmtDur(r.total) : '—';
    const recalc = () => {
      const a = readTimeField(arrSel);
      const dp = readTimeField(depSel);
      const dur = (a != null && dp != null && dp > a) ? dp - a : null;
      totTd.textContent = (dur != null && dur > 0) ? fmtDur(dur) : '—';
      recalcTotaux();
      scheduleAutosave();
    };
    arrSel.addEventListener('input', recalc);
    arrSel.addEventListener('blur', recalc);
    depSel.addEventListener('input', recalc);
    depSel.addEventListener('blur', recalc);
    // Navigation flèches ↑ / ↓ entre lignes (même colonne)
    [arrSel, depSel].forEach(el => {
      el.addEventListener('keydown', (ev) => {
        if (ev.key === 'ArrowUp' || ev.key === 'ArrowDown') {
          ev.preventDefault();
          moveVertical(el, ev.key === 'ArrowDown' ? 1 : -1);

    // Bouton « même que dessus » : recopie l'horaire de la ligne précédente
    const copyTd = document.createElement('td');
    copyTd.className = 'saisie-copy-cell';
    const copyBtn = document.createElement('button');
    copyBtn.type = 'button';
    copyBtn.className = 'saisie-copy-above';
    copyBtn.title = 'Recopier l\u2019horaire de la ligne du dessus';
    copyBtn.textContent = '↓ idem';
    copyBtn.onclick = () => {
      const prev = findPrevRowTimes(tr);
      if (!prev) { toast('Aucune ligne au-dessus à recopier', 'inf'); return; }
      if (prev.arr) { arrSel.value = prev.arr; arrSel.dataset.min = prev.arrMin; }
      if (prev.dep) { depSel.value = prev.dep; depSel.dataset.min = prev.depMin; }
      recalc();
    };
    copyTd.appendChild(copyBtn);

    tr.appendChild(arrTd);
    tr.appendChild(depTd);
    tr.appendChild(totTd);
    tr.appendChild(copyTd);
  }

  ctrlBox.className = 'cash-ctrl';
  ctrlBox.innerHTML =
    "<div class='cash-ctrl-line'><span>CA réel (caisse)</span>" +
      "<b id='cc-reel'>—</b></div>" +
    "<div class='cash-ctrl-line'><span>CA déclaré (serveurs)</span>" +
      "<b id='cc-decl'>—</b></div>" +
    "<div class='cash-ctrl-line'><span>Variation fonds de caisse " +
      "(jour − veille)</span><b id='cc-fdc'>—</b></div>" +
    "<div class='cash-ctrl-res' id='cc-res-wrap'>" +
      "<span>Différence</span><b id='cc-res'>—</b></div>" +
    "<div class='cash-ctrl-note' id='cc-note'></div>";
  bCtrl.appendChild(ctrlBox);
  form.appendChild(bCtrl);

  function recalcControle() {
    // CA réel = total colonne Réel
    let caReel = 0, hasReel = false;
    encRows.forEach(row => {
      if (row.key === 'encaisser') return; // exclu du contrôle de caisse
      const v = parseFloat((document.getElementById('reel_' + row.key) || {}).value);
      if (!isNaN(v)) { caReel += v; hasReel = true; }
    });
    // CA déclaré = somme des CA serveurs
    let caDecl = 0, hasDecl = false;
    saisieCtx()._presentIds.forEach(eid => {
      const el = document.getElementById('sv_ca_' + eid);
      if (el) { const v = parseFloat(el.value); if (!isNaN(v)) { caDecl += v; hasDecl = true; } }
    });
    const fv = parseFloat((document.getElementById('fdcVeille') || {}).value) || 0;
    const fj = parseFloat((document.getElementById('fdcJour') || {}).value) || 0;
    const varFond = fj - fv;
    const diff = (caReel - caDecl) + varFond;

    const eur2 = (n) => n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
    const set = (id, txt) => { const e = document.getElementById(id); if (e) e.textContent = txt; };
    set('cc-reel', hasReel ? eur2(caReel) : '—');
    set('cc-decl', hasDecl ? eur2(caDecl) : '—');
    set('cc-fdc', (varFond >= 0 ? '+' : '') + eur2(varFond));
    const resEl = document.getElementById('cc-res');
    const wrap = document.getElementById('cc-res-wrap');
    const note = document.getElementById('cc-note');
    if (resEl) resEl.textContent = (diff > 0 ? '+' : '') + eur2(diff);
    if (wrap) {
      wrap.classList.remove('cc-ok', 'cc-warn', 'cc-bad');
      const a = Math.abs(diff);
      wrap.classList.add(a < 0.01 ? 'cc-ok' : a < 5 ? 'cc-warn' : 'cc-bad');
    }
    if (note) {
      const a = Math.abs(diff);
      note.textContent = a < 0.01 ? '✓ Caisse juste'
        : diff > 0 ? 'Excédent en caisse de ' + eur2(a)
        : 'Manque en caisse de ' + eur2(a);
    }
  }
  // Brancher le recalcul sur tous les champs concernés
  setTimeout(() => {
    encRows.forEach(row => {
      const er = document.getElementById('reel_' + row.key);
      if (er) { const prev = er.oninput; er.oninput = (e) => { if (prev) prev(e); recalcControle(); }; }
    });
    ['fdcVeille', 'fdcJour'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.oninput = recalcControle;
    });
    saisieCtx()._presentIds.forEach(eid => {
      const el = document.getElementById('sv_ca_' + eid);
      if (el) { const prev = el.oninput; el.oninput = (e) => { if (prev) prev(e); recalcControle(); }; }
    });
    recalcControle();
  }, 60);
  const b5 = saisieBlock('📝 Observations');
  const obs = document.createElement('textarea');
  obs.id = 'saisie_obs';
  obs.className = 'form-input saisie-obs';
  obs.rows = 2;
  obs.placeholder = 'Ex : Carole balaie 10€, incident, remarque…';
  obs.value = dd.obs || '';
  b5.appendChild(obs);
  form.appendChild(b5);

  box.appendChild(form);

  // Navigation au clavier : Entrée → champ suivant
  setTimeout(() => { enableEnterNavigation(form); }, 60);

  const foot = document.createElement('div');
  foot.className = 'modal-foot modal-foot--between';
  if (asView) foot.classList.add('saisie-foot-view');

  const synthBtn = mBtn('📊 Voir la synthèse du mois', false, () => {
    saveSaisieForm(box, d);
    S.modal = { type: 'saisie_synth' };
    render();
  });

  const rightWrap = document.createElement('div');
  rightWrap.style.display = 'flex';
  rightWrap.style.gap = '8px';
  const closeBtn = mBtn(asView ? saisieBackLabel() : 'Fermer', false, () => {
    if (asView) {
      saisieBack(box, d);
    } else {
      saveSaisieForm(box, d);
      closeModal();
    }
  });
  const saveBtn = mBtn('✓ Enregistrer', true, () => {
    saveSaisieForm(box, d);
    toast('Saisie du ' + d + ' ' + MN[S.m] + ' enregistrée', 'ok');
    render();
  });
  rightWrap.appendChild(closeBtn);
  rightWrap.appendChild(saveBtn);

  foot.appendChild(synthBtn);
  foot.appendChild(rightWrap);
  box.appendChild(foot);
}

/* Bouton "retirer" un salarié présent ce jour (croix discrète). */
function makeRemovePresentBtn(eid, d) {
  const btn = document.createElement('button');
  btn.className = 'saisie-remove-btn';

/* Ligne "ajouter un salarié" : champ de recherche tapée + suggestions.
   section = 'cuisine' | 'salle' | 'tous'. À l'ajout, si l'employé est
   polyvalent et que la section diffère de sa section habituelle, on marque
   sa section travaillée du jour. */
function makeAddPresentRow(d, section) {
  const wrap = document.createElement('div');
  wrap.className = 'saisie-add-row';
  wrap.style.position = 'relative';

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'form-input--sm';
  input.placeholder = '+ Rechercher un salarié…';
  input.style.width = '100%';
  input.autocomplete = 'off';
  wrap.appendChild(input);

  const list = document.createElement('div');
  list.style.cssText =
    'position:absolute;left:0;right:0;top:100%;z-index:30;background:#fff;' +
    'border:1px solid var(--border,#e5e7eb);border-radius:8px;margin-top:2px;' +
    'max-height:220px;overflow:auto;box-shadow:0 6px 18px rgba(0,0,0,.1);' +
    'display:none';
  wrap.appendChild(list);

  function candidates() {
    return S.emps
      .filter(e => saisieCtx()._presentIds.indexOf(e.id) < 0)
      .filter(e => {
        if (section === 'tous') return true;
        if (e.s === section) return true;
        // Les polyvalents (ec) peuvent travailler dans l'autre section
        return !!e.ec;
      });
  }

  function addEmp(eid) {
    const box = document.querySelector('.saisie-form') ||
      document.querySelector('.mo') || document.querySelector('.caisse-wrap');
    if (box) saveSaisieForm(box, d);
    if (saisieCtx()._presentIds.indexOf(eid) < 0) saisieCtx()._presentIds.push(eid);
    const dd = getDaily(S.y, S.m, d) || emptyDaily();
    dd.presentIds = saisieCtx()._presentIds.slice();
    setDaily(S.y, S.m, d, dd);
    // Polyvalent ajouté dans une section ≠ sa section habituelle : marquer
    // sa section travaillée du jour (via le champ sect des heures réelles).
    const e = findEmp(eid);
    if (e && (section === 'cuisine' || section === 'salle') &&
        section !== e.s && e.ec) {
      const prev = getReal(S.y, S.m, d, eid) || {
        arr: null, dep: null, total: null, note: '' };
      setReal(S.y, S.m, d, eid, Object.assign({}, prev, { sect: section }));
    }
    render();
    // Fluidité : place le curseur directement sur le champ « arrivée »
    // du salarié qu'on vient d'ajouter, prêt à taper l'heure.
    setTimeout(() => {
      const arrField = document.getElementById('hr_arr_' + eid);
      if (arrField) {
        arrField.focus();
        try { arrField.select(); } catch (err) { /* select */ }
        arrField.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }
    }, 80);
  }

  function refresh() {
    const q = input.value.trim().toLowerCase();
    const matches = candidates().filter(e =>
      e.n.toLowerCase().indexOf(q) >= 0);
    list.innerHTML = '';
    if (!matches.length) {
      list.style.display = q ? 'block' : 'none';
      if (q) {
        const none = document.createElement('div');
        none.style.cssText = 'padding:8px 12px;color:#9ca3af;font-size:13px';
        none.textContent = 'Aucun salarié trouvé';
        list.appendChild(none);
      }
      return;
    }
    matches.slice(0, 12).forEach(e => {
      const col = eColor(e.id);
      const row = document.createElement('div');
      row.style.cssText =
        'padding:7px 12px;cursor:pointer;display:flex;align-items:center;' +
        'gap:8px;font-size:13px';
      row.onmouseenter = () => { row.style.background = '#f1f5f9'; };
      row.onmouseleave = () => { row.style.background = '#fff'; };
      row.innerHTML =
        (e.s === 'cuisine' ? '🍳' : '🍽') +
        " <span class='emp-dot' style='background:" + col.bg +
        ';border:2px solid ' + col.text + "'></span>" + e.n;
      row.onclick = () => addEmp(e.id);
      list.appendChild(row);
    });
    list.style.display = 'block';
  }

  input.oninput = refresh;
  input.onfocus = refresh;
  input.onkeydown = (ev) => {
    if (ev.key === 'Enter') {
      ev.preventDefault();
      const q = input.value.trim().toLowerCase();
      const matches = candidates().filter(e =>
        e.n.toLowerCase().indexOf(q) >= 0);
      if (matches.length) addEmp(matches[0].id);
    } else if (ev.key === 'Escape') {
      list.style.display = 'none';
    }
  };
  // Fermer la liste si on clique ailleurs
  input.onblur = () => { setTimeout(() => { list.style.display = 'none'; }, 150); };

  return wrap;
}

/* Employés présents (planifiés) un jour, filtrés par section. */
function presentEmployees(d, section) {
  const k = mk();
  const day = (S.pl[k] || {})[String(d)] || {};
  const ids = [];
  Object.values(day).forEach(eid => {
    if (eid != null && ids.indexOf(eid) < 0) ids.push(eid);
  });
  return S.emps.filter(e => {
    if (ids.indexOf(e.id) < 0) return false;
    if (section === 'tous') return true;
    return e.s === section;
  });
}
