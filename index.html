// ═══════════════════════════════════════════════════════════════════════════
//   STOCK MODEL — types, defaults, and data migration
// ═══════════════════════════════════════════════════════════════════════════
//
// Each article has two new fields used by the stock subsystem:
//
//   stockType : 'recipe' | 'consumable'
//     'recipe'     → outflows are computed from sales × recipes
//     'consumable' → outflows are computed from average consumption between
//                    inventories (gloves, cups, cleaning products, etc.)
//
//   trackStock : boolean
//     true  → article appears in stock views and gets alerts
//     false → article is bought but not stock-tracked (e.g. a one-off purchase)
//
// Existing articles (created before stock support was added) are migrated
// automatically: they all become { stockType: 'recipe', trackStock: true }.
// New articles created from the IA invoice scan or manual entry inherit
// the same defaults — the user can change them later in the article editor.

const STOCK_TYPES = {
  RECIPE: 'recipe',
  CONSUMABLE: 'consumable',
};

const DEFAULT_STOCK_TYPE = STOCK_TYPES.RECIPE;
const DEFAULT_TRACK_STOCK = true;

/**
 * Adds stock-related fields to articles that don't have them yet.
 * Idempotent: safe to call on data that has already been migrated.
 *
 * Returns a new array of articles with the new fields, or the same
 * reference if no migration was needed (so React's reference equality
 * checks can short-circuit re-renders downstream).
 */
function migrateArticlesForStock(articles) {
  if (!Array.isArray(articles) || articles.length === 0) return articles;

  let changed = false;
  const migrated = articles.map((ing) => {
    const needsType = ing.stockType === undefined;
    const needsTrack = ing.trackStock === undefined;
    // 'type' separates food (enters recipes) from consumable (non-food: paper
    // towels, gloves, cleaning supplies...). All pre-existing products are
    // migrated to 'food' silently since every historical import was edible.
    const needsKind = ing.type === undefined;
    if (!needsType && !needsTrack && !needsKind) return ing;
    changed = true;
    return {
      ...ing,
      stockType: needsType ? DEFAULT_STOCK_TYPE : ing.stockType,
      trackStock: needsTrack ? DEFAULT_TRACK_STOCK : ing.trackStock,
      alertStock: ing.alertStock !== false, // default: alerts enabled
      type: needsKind ? 'food' : ing.type,
    };
  });

  return changed ? migrated : articles;
}

/**
 * Adds the `source` field to purchases that don't have one yet (Approach A:
 * a "cash purchase" / off-invoice purchase is just a Purchase with
 * source='cash' instead of source='invoice'). All historical purchases
 * default to 'invoice'.
 */
function migratePurchasesForStock(purchases) {
  if (!Array.isArray(purchases) || purchases.length === 0) return purchases;

  let changed = false;
  const migrated = purchases.map((p) => {
    if (p.source !== undefined) return p;
    changed = true;
    return { ...p, source: 'invoice' };
  });

  return changed ? migrated : purchases;
}

/**
 * Adds yield/assortment fields to recipes that don't have them yet.
 *
 * New fields:
 *   yieldPortions     : number — how many plates the recipe yields when
 *                        prepared at the quantities listed in `articles`.
 *                        Defaults to 1 (compatibility with old per-portion
 *                        recipes that have NOT been converted to bulk volumes).
 *   includesAssortment: boolean — when true, the cost-per-plate calculation
 *                        adds the global assortment base on top. Defaults to
 *                        false for safety (better to under-report than to
 *                        double-count by accident on existing data).
 *   isAssortmentBase  : boolean — true ONLY for the single global "Base
 *                        assiette" recipe. Used to flag it in the UI and to
 *                        exclude it from the regular recipe lists.
 */
function migrateRecipesForPlateCost(recipes) {
  if (!Array.isArray(recipes) || recipes.length === 0) return recipes;

  let changed = false;
  const migrated = recipes.map((r) => {
    const needsYield = r.yieldPortions === undefined;
    const needsIncludes = r.includesAssortment === undefined;
    const needsIsBase = r.isAssortmentBase === undefined;
    if (!needsYield && !needsIncludes && !needsIsBase) return r;
    changed = true;
    return {
      ...r,
      yieldPortions: needsYield ? 1 : r.yieldPortions,
      includesAssortment: needsIncludes ? false : r.includesAssortment,
      isAssortmentBase: needsIsBase ? false : r.isAssortmentBase,
    };
  });

  return changed ? migrated : recipes;
}

//   TOAST SYSTEM
// ═══════════════════════════════════════════════════════════════════════════

const mc_toastBus = {
  listeners: [],
  subscribe(fn) { this.listeners.push(fn); return () => { this.listeners = this.listeners.filter((l) => l !== fn); }; },
  emit(toast) { this.listeners.forEach((fn) => fn(toast)); },
};

const mcToast = {
  success: (message, opts = {}) => mc_toastBus.emit({ type: 'success', message, duration: opts.duration ?? 2500, id: Math.random() }),
  error:   (message, opts = {}) => mc_toastBus.emit({ type: 'error',   message, duration: opts.duration ?? 4500, id: Math.random() }),
  info:    (message, opts = {}) => mc_toastBus.emit({ type: 'info',    message, duration: opts.duration ?? 3000, id: Math.random() }),
  undo:    (message, onUndo, opts = {}) => mc_toastBus.emit({ type: 'undo', message, onUndo, duration: opts.duration ?? 5500, id: Math.random() }),
};

function ToastContainer() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    const unsub = mc_toastBus.subscribe((toast) => {
      setToasts((prev) => [...prev, toast]);
      setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== toast.id)), toast.duration);
    });
    return unsub;
  }, []);
  const dismiss = (id) => setToasts((prev) => prev.filter((t) => t.id !== id));
  const handleUndo = (toast) => { try { toast.onUndo?.(); } catch (e) { console.error('Undo error:', e); } dismiss(toast.id); };

  // ─── Raccourcis clavier ────────────────────────────────────────────────
  //  · Esc           → dismisser le toast le plus récent
  //  · Cmd/Ctrl + Z  → déclencher l'undo du toast `undo` le plus récent
  // On utilise un ref pour lire toujours la dernière version de `toasts`
  // sans avoir à re-binder l'event listener à chaque changement.
  const toastsRef = useRef(toasts);
  useEffect(() => { toastsRef.current = toasts; }, [toasts]);

  useEffect(() => {
    const onKeyDown = (e) => {
      const current = toastsRef.current;
      if (current.length === 0) return;

      // Ne pas intercepter si l'utilisateur est en train de taper dans un champ.
      const target = e.target;
      const isEditable = target && (
        target.tagName === 'INPUT' ||
        target.tagName === 'TEXTAREA' ||
        target.tagName === 'SELECT' ||
        target.isContentEditable
      );

      // Esc → dismisser le dernier toast (sauf si focus dans un champ : Esc sert souvent
      // à fermer une modale ou perdre le focus, on ne veut pas voler ce comportement).
      if (e.key === 'Escape' && !isEditable) {
        const latest = current[current.length - 1];
        dismiss(latest.id);
        e.preventDefault();
        return;
      }

      // Cmd/Ctrl + Z → undo le dernier toast de type 'undo' (on intercepte même
      // dans un champ pour offrir l'undo global même pendant la saisie).
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) {
        const lastUndo = [...current].reverse().find((t) => t.type === 'undo' && t.onUndo);
        if (lastUndo) {
          handleUndo(lastUndo);
          e.preventDefault();
        }
      }
    };
    window.addEventListener('keydown', onKeyDown);
    return () => window.removeEventListener('keydown', onKeyDown);
  }, []);

  if (toasts.length === 0) return null;
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 9999, display: 'flex', flexDirection: 'column-reverse', gap: 10, pointerEvents: 'none', maxWidth: 'calc(100vw - 48px)' }}>
      {toasts.map((toast) => {
        const colors = { success: { bg: palette.sage, fg: '#FFF', icon: '✓' }, error: { bg: palette.wine, fg: '#FFF', icon: '⚠' }, info: { bg: palette.ink, fg: '#FFF', icon: 'ℹ' }, undo: { bg: palette.ink, fg: '#FFF', icon: '↺' } }[toast.type] || { bg: palette.ink, fg: '#FFF', icon: 'ℹ' };
        return (
          <div key={toast.id} className="mc-toast-anim" style={{ background: colors.bg, color: colors.fg, padding: '12px 16px', borderRadius: 8, boxShadow: '0 8px 24px rgba(0,0,0,0.20)', display: 'flex', alignItems: 'center', gap: 12, fontSize: 14, fontWeight: 500, minWidth: 280, maxWidth: 480, pointerEvents: 'auto' }}>
            <span style={{ fontSize: 16, opacity: 0.9 }}>{colors.icon}</span>
            <span style={{ flex: 1 }}>{toast.message}</span>
            {toast.type === 'undo' && toast.onUndo && (
              <button onClick={() => handleUndo(toast)} title="Annuler (Ctrl/Cmd + Z)" style={{ background: 'rgba(255,255,255,0.18)', color: colors.fg, border: 'none', padding: '6px 12px', borderRadius: 5, fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>
                Annuler
              </button>
            )}
            <button onClick={() => dismiss(toast.id)} title="Fermer (Esc)" style={{ background: 'none', color: colors.fg, border: 'none', padding: '4px 6px', fontSize: 16, cursor: 'pointer', opacity: 0.6 }}>×</button>
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   STORAGE HELPERS
// ═══════════════════════════════════════════════════════════════════════════
//
// We prefer window.storage (Claude.ai sandbox) when available, but fall back
// to localStorage so the app also runs on Netlify, locally, in Safari, etc.
// Both APIs are wrapped to share the same async signature.

const storageAdapter = (() => {
  if (typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function') {
    return {
      get:  (key)        => window.storage.get(key),
      set:  (key, value) => window.storage.set(key, value),
      name: 'window.storage',
    };
  }
  // Fallback: localStorage, wrapped in the same { key, value } shape.
  return {
    get: async (key) => {
      try {
        const raw = (typeof localStorage !== 'undefined') ? localStorage.getItem(key) : null;
        return raw === null ? null : { key, value: raw };
      } catch { return null; }
    },
    set: async (key, value) => {
      try {
        if (typeof localStorage !== 'undefined') localStorage.setItem(key, value);
      } catch (e) { console.error('localStorage error:', e); }
    },
    name: 'localStorage',
  };
})();

async function storageGet(key, fallback) {
  try {
    const result = await storageAdapter.get(key);
    return result ? JSON.parse(result.value) : fallback;
  } catch {
    return fallback;
  }
}

async function storageSet(key, value) {
  try {
    await storageAdapter.set(key, JSON.stringify(value));
  } catch (error) {
    console.error('Storage error:', error);
  }
}

function formatEuro(amount) {
  return new Intl.NumberFormat('fr-FR', {
    style: 'currency',
    currency: 'EUR',
  }).format(amount || 0);
}

function formatPercent(ratio) {
  return ((ratio || 0) * 100).toFixed(1).replace('.', ',') + ' %';
}

/**
 * Format a YYYY-MM-DD as a short, human-readable French date.
 *
 * Default (no options)        → "29 mai"        (for graphes axis labels)
 * { withYear: true }          → "29 mai 2026"   (for tables, modales, alertes)
 * { withYear: '2-digit' }     → "29 mai 26"     (compact label si l'espace est rare)
 */
function formatShortDate(dateString, { withYear = false } = {}) {
  const yearOpt = withYear === '2-digit' ? '2-digit'
                : withYear ? 'numeric'
                : null;
  return parseLocalDate(dateString).toLocaleDateString('fr-FR', {
    day: '2-digit',
    month: 'short',
    ...(yearOpt ? { year: yearOpt } : {}),
  });
}

function generateId(prefix = 'x') {
  return prefix + Math.random().toString(36).slice(2, 10);
}

// ═══════════════════════════════════════════════════════════════════════════
//   DUPLICATE DETECTION
// ═══════════════════════════════════════════════════════════════════════════

function normalizeText(text) {
  return (text || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim().replace(/\s+/g, ' ');
}

/**
 * Parse a YYYY-MM-DD string as LOCAL time (not UTC).
 * new Date("2025-01-06") = UTC midnight = Jan 5 at 20:00 in UTC-4 → wrong display.
 * new Date("2025-01-06T00:00:00") = local midnight → correct display.
 */
function parseLocalDate(dateString) {
  if (!dateString) return new Date(NaN);
  if (dateString instanceof Date) return dateString;
  if (/^\d{4}-\d{2}-\d{2}$/.test(dateString)) return new Date(dateString + 'T00:00:00');
  // French format dd/mm/yyyy
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(dateString)) {
    const [d, m, y] = dateString.split('/');
    return new Date(`${y}-${m}-${d}T00:00:00`);
  }
  // Fallback: try native Date parse (no recursion)
  const d = new Date(dateString);
  return isNaN(d) ? new Date(NaN) : d;
}

function detectDuplicate(candidate, existingPurchases) {
  if (!candidate.supplier) return null;

  const candidateSupplier = normalizeText(candidate.supplier);
  const candidateInvoice = normalizeText(candidate.invoiceNumber);
  const candidateTotal = candidate.total || 0;
  const candidateLineCount = (candidate.items || []).length;

  for (const existing of existingPurchases) {
    if (candidate.id && existing.id === candidate.id) continue;

    const existingSupplier = normalizeText(existing.supplier);
    if (existingSupplier !== candidateSupplier) continue;

    const existingInvoice = normalizeText(existing.invoiceNumber);
    const existingTotal = existing.total || 0;
    const existingLineCount = (existing.items || []).length;
    const sameDate = existing.date === candidate.date;
    const sameTotal = Math.abs(existingTotal - candidateTotal) < 0.01;
    const dayDelta = daysBetween(existing.date, candidate.date);

    if (candidateInvoice && existingInvoice && candidateInvoice === existingInvoice) {
      return { level: 'exact', match: existing, reason: 'Même n° de facture' };
    }

    if (sameDate && sameTotal && candidateTotal > 0) {
      return { level: 'strong', match: existing, reason: 'Même date et même total' };
    }

    if (
      dayDelta <= 1 &&
      sameTotal &&
      candidateTotal > 0 &&
      existingLineCount === candidateLineCount &&
      candidateLineCount > 0
    ) {
      return {
        level: 'weak',
        match: existing,
        reason: 'Date proche, même total et même nombre de lignes',
      };
    }
  }

  return null;
}

// ═══════════════════════════════════════════════════════════════════════════
//   PRICING / STOCK / ALERT HELPERS
// ═══════════════════════════════════════════════════════════════════════════
//
// Trois familles de helpers regroupées ici car elles partagent les mêmes
// données (purchases / sales / inventories) et le même pattern de mémoïsation
// par période. Sous-sections (cherche `// ─── X ───` pour naviguer) :
//
//   • PRICING                 — getPriceHistory, calculateRecipeCost,
//                                buildPriceIndex, plate-cost helpers
//   • STOCK SUMMARY HELPERS   — calculateCurrentStock, computeStockSummary,
//                                buildOutflowIndex, consumable rates
//   • ALERT CALCULATION       — saisonnalité, seuils auto, supplier price gaps
//
// L'ordre est volontaire : stock dépend de pricing, alerts dépendent
// de stock — on définit dans l'ordre des dépendances.
//
// ─── PRICING ──────────────────────────────────────────────────────────────

/**
 * Returns all purchase entries for a given article (master) within an
 * optional date range. Each entry now also carries variantId so callers can
 * filter or group by variant.
 */
function getPriceHistory(articleId, purchases, dateFrom, dateTo) {
  const entries = [];

  purchases.forEach((purchase) => {
    if (dateFrom && purchase.date < dateFrom) return;
    if (dateTo && purchase.date > dateTo) return;

    purchase.items.forEach((item) => {
      if (item.articleId === articleId && item.pricePerMasterUnit > 0) {
        entries.push({
          date: purchase.date,
          unitPrice: item.pricePerMasterUnit,
          qty: item.convertedQty,
          supplier: purchase.supplier,
          label: item.label || '',
          rawQty: item.rawQty,
          rawUnit: item.rawUnit,
          variantId: item.variantId || null,
        });
      }
    });
  });

  return entries.sort((a, b) => a.date.localeCompare(b.date));
}

/**
 * Same as getPriceHistory but filtered down to a single variant.
 */
function getVariantPriceHistory(articleId, variantId, purchases, dateFrom, dateTo) {
  return getPriceHistory(articleId, purchases, dateFrom, dateTo).filter(
    (entry) => entry.variantId === variantId
  );
}

function calculateWeightedAverage(entries) {
  if (!entries.length) return null;
  const totalValue = entries.reduce((sum, e) => sum + e.unitPrice * e.qty, 0);
  const totalQty = entries.reduce((sum, e) => sum + e.qty, 0);
  return totalQty > 0 ? totalValue / totalQty : null;
}

/**
 * Weighted average price across ALL variants of an article master.
 * This is the default price used when computing recipe costs.
 */
function getAveragePrice(articleId, purchases, dateFrom, dateTo) {
  return calculateWeightedAverage(getPriceHistory(articleId, purchases, dateFrom, dateTo));
}

/**
 * Weighted average price restricted to a single variant. Useful for
 * "if I only used this variant, what would the recipe cost?" simulations.
 */
function getVariantAveragePrice(articleId, variantId, purchases, dateFrom, dateTo) {
  return calculateWeightedAverage(
    getVariantPriceHistory(articleId, variantId, purchases, dateFrom, dateTo)
  );
}

function calculateRecipeCost(recipe, purchases, dateFrom, dateTo) {
  if (!recipe || !recipe.articles) return 0;
  return recipe.articles.reduce((total, line) => {
    const price = getAveragePrice(line.id, purchases, dateFrom, dateTo);
    return total + (price != null ? price * line.qty : 0);
  }, 0);
}

/**
 * Computes recipe cost using OVERRIDE prices for specific articles.
 * `priceOverrides` is a map of { articleId: priceOrNull }.
 * If an article has no override, the regular weighted average is used.
 * Used by the simulation feature.
 */
function calculateRecipeCostWithOverrides(recipe, purchases, dateFrom, dateTo, priceOverrides) {
  if (!recipe || !recipe.articles) return 0;
  return recipe.articles.reduce((total, line) => {
    const overridePrice = priceOverrides[line.id];
    const price =
      overridePrice != null
        ? overridePrice
        : getAveragePrice(line.id, purchases, dateFrom, dateTo);
    return total + (price != null ? price * line.qty : 0);
  }, 0);
}

// ─── Memoized price index ──────────────────────────────────────────────────
//
// The functions above (getPriceHistory, getAveragePrice, calculateRecipeCost…)
// each iterate ALL purchases × items every time they're called. That's fine
// when you call them once or twice, but the dashboard, recipe cards, simulator,
// and analytics views call them in tight loops — the cost compounds quickly.
//
// To fix this we build a "price index" ONCE per period, then look up prices
// in O(1) instead of re-scanning purchases for every cell on screen. The
// index is keyed by period (dateFrom-dateTo), so switching periods rebuilds
// it but switching tabs doesn't.
//
// Index shape:
//   {
//     master: { articleId: { totalValue, totalQty, avg } },
//     variant: { articleId: { variantId: { totalValue, totalQty, avg } } },
//     hasData: true
//   }

/**
 * Builds the price index in a single pass over `purchases`. O(N×L) where N is
 * the number of purchases and L the average lines per purchase.
 */
function buildPriceIndex(purchases, dateFrom, dateTo) {
  const masterAgg = {};   // { articleId: { totalValue, totalQty, count, lastDate, lastPrice } }
  const variantAgg = {};  // { articleId: { variantId: { totalValue, totalQty, count, lastDate, lastPrice } } }

  for (const purchase of purchases) {
    if (dateFrom && purchase.date < dateFrom) continue;
    if (dateTo && purchase.date > dateTo) continue;

    for (const item of purchase.items) {
      if (!item.articleId || !(item.pricePerMasterUnit > 0) || !(item.convertedQty > 0)) continue;

      const value = item.pricePerMasterUnit * item.convertedQty;
      const qty = item.convertedQty;
      const date = purchase.date;

      // Master aggregation (across all variants)
      const masterEntry = masterAgg[item.articleId] || {
        totalValue: 0, totalQty: 0, count: 0, lastDate: '', lastPrice: null,
      };
      masterEntry.totalValue += value;
      masterEntry.totalQty += qty;
      masterEntry.count += 1;
      if (date >= masterEntry.lastDate) {
        masterEntry.lastDate = date;
        masterEntry.lastPrice = item.pricePerMasterUnit;
      }
      masterAgg[item.articleId] = masterEntry;

      // Variant aggregation (per-variant breakdown)
      if (item.variantId) {
        const ingMap = variantAgg[item.articleId] || {};
        const variantEntry = ingMap[item.variantId] || {
          totalValue: 0, totalQty: 0, count: 0, lastDate: '', lastPrice: null,
        };
        variantEntry.totalValue += value;
        variantEntry.totalQty += qty;
        variantEntry.count += 1;
        if (date >= variantEntry.lastDate) {
          variantEntry.lastDate = date;
          variantEntry.lastPrice = item.pricePerMasterUnit;
        }
        ingMap[item.variantId] = variantEntry;
        variantAgg[item.articleId] = ingMap;
      }
    }
  }

  // Compute final averages on each entry
  const master = {};
  for (const [ingId, agg] of Object.entries(masterAgg)) {
    master[ingId] = {
      totalValue: agg.totalValue,
      totalQty: agg.totalQty,
      count: agg.count,
      lastDate: agg.lastDate,
      lastPrice: agg.lastPrice,
      avg: agg.totalQty > 0 ? agg.totalValue / agg.totalQty : null,
    };
  }
  const variant = {};
  for (const [ingId, ingMap] of Object.entries(variantAgg)) {
    variant[ingId] = {};
    for (const [varId, agg] of Object.entries(ingMap)) {
      variant[ingId][varId] = {
        totalValue: agg.totalValue,
        totalQty: agg.totalQty,
        count: agg.count,
        lastDate: agg.lastDate,
        lastPrice: agg.lastPrice,
        avg: agg.totalQty > 0 ? agg.totalValue / agg.totalQty : null,
      };
    }
  }

  return { master, variant, hasData: Object.keys(master).length > 0 };
}

/**
 * Merges a period-filtered price index with an all-time fallback.
 *
 * Pour chaque article :
 *   • Si l'index de période le connaît → on garde ses valeurs (avg, lastPrice…)
 *   • Sinon, on copie l'entrée all-time avec `isFallback: true` pour que
 *     l'UI puisse afficher un avertissement ("prix estimé – pas d'achat sur
 *     cette période").
 *
 * Résultat : les recettes ne tombent plus à 0,00€ quand un ingrédient n'a
 * pas été acheté sur la période sélectionnée (ex: 30J). Le food cost reste
 * indicatif mais réaliste plutôt que faussement nul.
 */
function mergePriceIndexWithFallback(periodIndex, allTimeIndex) {
  if (!allTimeIndex || !allTimeIndex.master) return periodIndex;

  const master = { ...periodIndex.master };
  const variant = { ...periodIndex.variant };

  for (const [articleId, allTimeEntry] of Object.entries(allTimeIndex.master)) {
    if (master[articleId]) continue; // period already has data → skip
    // Copy all-time entry, flag it so UI can show "pas d'achat récent"
    master[articleId] = { ...allTimeEntry, isFallback: true };
  }

  // Same for variant-level entries
  for (const [articleId, variantMap] of Object.entries(allTimeIndex.variant || {})) {
    if (variant[articleId]) continue;
    variant[articleId] = Object.fromEntries(
      Object.entries(variantMap).map(([vId, e]) => [vId, { ...e, isFallback: true }])
    );
  }

  return { master, variant, hasData: periodIndex.hasData || Object.keys(master).length > 0 };
}

/**
 * O(1) lookup: average price of an article across all variants for the
 * already-built index's period.
 */
function indexedAveragePrice(priceIndex, articleId) {
  return priceIndex.master[articleId]?.avg ?? null;
}

/**
 * O(1) lookup: average price of a specific variant.
 */
function indexedVariantAveragePrice(priceIndex, articleId, variantId) {
  return priceIndex.variant[articleId]?.[variantId]?.avg ?? null;
}

/**
 * O(R) lookup where R = recipe.articles.length. Replaces calculateRecipeCost
 * for hot paths (dashboard, recipe cards, analytics).
 */
function indexedRecipeCost(recipe, priceIndex) {
  if (!recipe || !recipe.articles) return 0;
  let total = 0;
  for (const line of recipe.articles) {
    const price = priceIndex.master[line.id]?.avg;
    if (price != null) total += price * line.qty;
  }
  return total;
}

/**
 * Same as indexedRecipeCost but with optional overrides for specific articles.
 * Used by the simulator (priceOverrides[ingId] → forced price for that article).
 */
function indexedRecipeCostWithOverrides(recipe, priceIndex, priceOverrides) {
  if (!recipe || !recipe.articles) return 0;
  let total = 0;
  for (const line of recipe.articles) {
    const override = priceOverrides[line.id];
    const price = override != null ? override : priceIndex.master[line.id]?.avg;
    if (price != null) total += price * line.qty;
  }
  return total;
}

/**
 * Cost per portion (= per plate, article-side only).
 * For a recipe with yieldPortions = 20 and totalCost = 35 €, this returns 1.75.
 * Falls back gracefully if yieldPortions is missing/zero (treats as 1).
 */
function indexedCostPerPortion(recipe, priceIndex) {
  const total = indexedRecipeCost(recipe, priceIndex);
  const portions = recipe.yieldPortions > 0 ? recipe.yieldPortions : 1;
  return total / portions;
}

/**
 * Finds the global "Base assiette" recipe (the one with isAssortmentBase=true).
 * There should be only one. Returns null if not yet created.
 */
function findAssortmentBase(recipes) {
  if (!Array.isArray(recipes)) return null;
  return recipes.find((r) => r.isAssortmentBase) || null;
}

/**
 * Full cost of a "plate" served to the customer:
 *   plateCost = costPerPortion(recipe) + (recipe.includesAssortment ? assortmentBaseCost : 0)
 *
 * Returns { recipeCost, portionCost, assortmentCost, plateCost, includesAssortment, hasFallback }
 * hasFallback=true means at least one ingredient price comes from the all-time
 * average (not from the currently selected period) — the UI shows a subtle
 * warning to let the user know the food cost may not reflect current prices.
 */
function indexedPlateCost(recipe, priceIndex, assortmentBase) {
  let recipeCost = 0;
  let hasFallback = false;
  for (const line of (recipe?.articles || [])) {
    const entry = priceIndex.master[line.id];
    if (entry?.avg != null) {
      recipeCost += entry.avg * line.qty;
      if (entry.isFallback) hasFallback = true;
    }
  }
  const portions = recipe.yieldPortions > 0 ? recipe.yieldPortions : 1;
  const portionCost = recipeCost / portions;

  let assortmentCost = 0;
  let includesAssortment = false;
  if (recipe.includesAssortment && assortmentBase) {
    for (const line of (assortmentBase?.articles || [])) {
      const entry = priceIndex.master[line.id];
      if (entry?.avg != null) {
        assortmentCost += entry.avg * line.qty;
        if (entry.isFallback) hasFallback = true;
      }
    }
    const basePortions = assortmentBase.yieldPortions > 0 ? assortmentBase.yieldPortions : 1;
    assortmentCost = assortmentCost / basePortions;
    includesAssortment = true;
  }

  return {
    recipeCost,
    portionCost,
    assortmentCost,
    plateCost: portionCost + assortmentCost,
    includesAssortment,
    hasFallback,
  };
}

/**
 * Same as indexedPlateCost but with price overrides applied to specific
 * articles. Used by the simulator to project "what if I used variant X?"
 *
 * Overrides apply BOTH to the recipe AND to the assortment if it includes
 * the affected article. This is what makes the simulator give correct
 * answers when changing a variant of e.g. rice (which lives in the assortment).
 */
function indexedPlateCostWithOverrides(recipe, priceIndex, assortmentBase, priceOverrides) {
  const recipeCost = indexedRecipeCostWithOverrides(recipe, priceIndex, priceOverrides);
  const portions = recipe.yieldPortions > 0 ? recipe.yieldPortions : 1;
  const portionCost = recipeCost / portions;

  let assortmentCost = 0;
  if (recipe.includesAssortment && assortmentBase) {
    const baseRaw = indexedRecipeCostWithOverrides(assortmentBase, priceIndex, priceOverrides);
    const basePortions = assortmentBase.yieldPortions > 0 ? assortmentBase.yieldPortions : 1;
    assortmentCost = baseRaw / basePortions;
  }

  return {
    recipeCost,
    portionCost,
    assortmentCost,
    plateCost: portionCost + assortmentCost,
    includesAssortment: recipe.includesAssortment && !!assortmentBase,
  };
}

// ─── STOCK SUMMARY HELPERS ────────────────────────────────────────────────
//
// These functions compute per-article stock data for the Stocks view.
// They're kept here next to the pricing helpers because they use the same
// purchases/inventories data and follow the same memoization pattern.

/**
 * For one article, sums the converted_qty bought across all purchases
 * within the date range. Returns { qty, value } where qty is in master_unit
 * (kg/L) and value is the total cost in €.
 */
function calculatePurchasesForArticle(articleId, purchases, dateFrom, dateTo) {
  let qty = 0;
  let value = 0;
  for (const purchase of purchases) {
    if (dateFrom && purchase.date < dateFrom) continue;
    if (dateTo && purchase.date > dateTo) continue;
    for (const item of purchase.items) {
      if (item.articleId !== articleId) continue;
      if (item.convertedQty > 0) qty += item.convertedQty;
      if (item.total > 0) value += item.total;
    }
  }
  return { qty, value };
}

/**
 * Returns the most recent COMPLETED inventory entry for a given article,
 * or null if no completed inventory has ever been done for it.
 *
 * Drafts are intentionally ignored here: only finalized inventories should
 * influence the calculated stock. The draft is just a work-in-progress.
 *
 * An "entry" is one line within an inventory: { articleId, quantity, note }.
 */
function findLatestInventoryEntry(articleId, inventories) {
  if (!Array.isArray(inventories) || inventories.length === 0) return null;
  const completed = inventories.filter((inv) => inv.status !== 'draft');
  if (completed.length === 0) return null;

  const sorted = [...completed].sort((a, b) => b.date.localeCompare(a.date));
  for (const inv of sorted) {
    const entry = (inv.entries || []).find((e) => e.articleId === articleId);
    if (entry) {
      return { date: inv.date, quantity: entry.quantity, type: inv.type, note: entry.note };
    }
  }
  return null;
}

/**
 * Returns the currently-open draft inventory if any, or null.
 * There can only be one draft at a time (enforced by the UI).
 */
function findDraftInventory(inventories) {
  if (!Array.isArray(inventories)) return null;
  return inventories.find((inv) => inv.status === 'draft') || null;
}

/**
 * Legacy helper: returns just the numeric stock value without outflow info.
 * Kept for the inventory editor (which shows "theoretical" before the user's
 * own current draft is committed). For the main StocksView, use the richer
 * `computeStockSummary` which returns {value, isEstimate, etc.}.
 *
 * This version intentionally does NOT subtract outflows — it gives the
 * "post-purchase, pre-consumption" stock, which is what the inventory editor
 * wants to compare against the user's count.
 */
function calculateCurrentStock(articleId, purchases, inventories) {
  const latestInv = findLatestInventoryEntry(articleId, inventories);
  if (!latestInv) return null;

  let stock = latestInv.quantity;
  for (const purchase of purchases) {
    if (purchase.date < latestInv.date) continue;
    for (const item of purchase.items) {
      if (item.articleId !== articleId) continue;
      if (item.convertedQty > 0) stock += item.convertedQty;
    }
  }
  return stock;
}

/**
 * Builds an index of theoretical outflows from sales × recipes.
 * Returns: { articleId: { byDate: [{date, cumulative}], total } }
 *
 * Per-article outflow for one sale is:
 *
 *   For each recipe line in the recipe:
 *     out = (line.qty / recipe.yieldPortions) × sale.qty
 *
 *   PLUS if recipe.includesAssortment AND assortmentBase exists:
 *     For each line in assortmentBase.articles:
 *       out += (line.qty / assortmentBase.yieldPortions) × sale.qty
 *
 * This properly models the new "bulk volume + yield" recipe layout AND the
 * assortment base contribution. The `byDate` cumulative array lets callers
 * ask "how much went out since D?" in O(log N).
 *
 * O((S × R) + (S × A)) where S = sales count, R = avg recipe lines,
 * A = assortment lines. Built once per data change.
 */
function buildOutflowIndex(sales, recipes) {
  const recipeMap = {};
  for (const r of recipes) recipeMap[r.id] = r;

  // Find the assortment base (if any) once for the whole index build
  const assortmentBase = findAssortmentBase(recipes);
  const baseYield = assortmentBase
    ? (assortmentBase.yieldPortions > 0 ? assortmentBase.yieldPortions : 1)
    : 1;
  const baseLines = assortmentBase ? (assortmentBase.articles || []) : [];

  // For each article, accumulate outflows by date
  const perArticle = {};

  /** Pushes `qty` into the date-cumulative array for `articleId`. */
  function record(articleId, qty, date) {
    if (!perArticle[articleId]) perArticle[articleId] = { byDate: [], total: 0 };
    perArticle[articleId].total += qty;
    const arr = perArticle[articleId].byDate;
    const last = arr[arr.length - 1];
    if (last && last.date === date) {
      last.cumulative += qty;
    } else {
      const prevCum = last ? last.cumulative : 0;
      arr.push({ date, cumulative: prevCum + qty });
    }
  }

  // Sort sales by date ascending so cumulative totals are monotonic
  const sorted = [...sales].sort((a, b) => a.date.localeCompare(b.date));

  for (const sale of sorted) {
    const recipe = recipeMap[sale.recipeId];
    if (!recipe || !recipe.articles) continue;

    // Skip if for some reason this sale points to the assortment base
    // (shouldn't happen normally — the base doesn't have a sale price)
    if (recipe.isAssortmentBase) continue;

    const recipeYield = recipe.yieldPortions > 0 ? recipe.yieldPortions : 1;

    // Recipe articles (per portion)
    for (const line of recipe.articles) {
      const qtyPerPlate = line.qty / recipeYield;
      const out = qtyPerPlate * sale.qty;
      if (out > 0) record(line.id, out, sale.date);
    }

    // Assortment articles (per plate, only if recipe opts in)
    if (recipe.includesAssortment && assortmentBase) {
      for (const line of baseLines) {
        const qtyPerPlate = line.qty / baseYield;
        const out = qtyPerPlate * sale.qty;
        if (out > 0) record(line.id, out, sale.date);
      }
    }
  }

  return perArticle;
}

/**
 * Returns the total outflow for article X since date D using the prebuilt
 * outflowIndex. O(log N) via binary search on the byDate array.
 */
function outflowSince(outflowIndex, articleId, fromDate) {
  const data = outflowIndex[articleId];
  if (!data || data.byDate.length === 0) return 0;

  // The cumulative AT or BEFORE fromDate is what we subtract from total
  // We need the entry with the largest date < fromDate (sales on fromDate
  // are considered "after" the inventory snapshot, since the inventory is
  // the snapshot at start of day).
  const arr = data.byDate;
  // Binary search for largest date < fromDate
  let lo = 0, hi = arr.length - 1, before = -1;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (arr[mid].date < fromDate) {
      before = mid;
      lo = mid + 1;
    } else {
      hi = mid - 1;
    }
  }
  const cumulativeBefore = before >= 0 ? arr[before].cumulative : 0;
  return data.total - cumulativeBefore;
}

/**
 * For a consumable article, computes the average daily consumption from
 * the two most recent completed inventories.
 *
 * Returns { perDay, periodDays, isReliable } or null if not enough data.
 *
 * Method:
 *   conso_period = inv_prev.qty + Σ purchases between inv_prev and inv_last − inv_last.qty
 *   per_day      = conso_period / days_between_inventories
 *
 * `isReliable` flags when we have ≥ 2 inventories AND ≥ 14 days of history;
 * shorter periods are too noisy to project forward.
 */
function calculateConsumableRate(articleId, purchases, inventories) {
  const completed = inventories
    .filter((inv) => inv.status !== 'draft')
    .filter((inv) => (inv.entries || []).some((e) => e.articleId === articleId))
    .sort((a, b) => b.date.localeCompare(a.date));

  if (completed.length >= 2) {
    // ── Best case: 2+ inventories → real consumption rate ────────────────
    const last = completed[0];
    const prev = completed[1];
    const lastEntry = last.entries.find((e) => e.articleId === articleId);
    const prevEntry = prev.entries.find((e) => e.articleId === articleId);
    if (lastEntry && prevEntry) {
      let purchasedBetween = 0;
      for (const p of purchases) {
        if (p.date <= prev.date || p.date > last.date) continue;
        for (const item of p.items) {
          if (item.articleId === articleId && item.convertedQty > 0) purchasedBetween += item.convertedQty;
        }
      }
      const consumed = prevEntry.quantity + purchasedBetween - lastEntry.quantity;
      const periodDays = Math.max(1, daysBetween(prev.date, last.date));
      return {
        perDay: Math.max(0, consumed / periodDays),
        periodDays,
        isReliable: periodDays >= 14,
        source: 'inventories',
      };
    }
  }

  // ── Fallback: 0 or 1 inventory → use purchase frequency as proxy ──────
  // Collect all purchase events for this article
  const events = [];
  for (const p of purchases) {
    let qty = 0;
    for (const item of (p.items || [])) {
      if (item.articleId === articleId && item.convertedQty > 0) qty += item.convertedQty;
    }
    if (qty > 0 && p.date) events.push({ date: p.date, qty });
  }
  if (events.length < 2) return null;
  events.sort((a, b) => a.date.localeCompare(b.date));

  let totalGap = 0;
  for (let i = 1; i < events.length; i++) totalGap += daysBetween(events[i-1].date, events[i].date);
  const avgInterval = totalGap / (events.length - 1);
  const avgQty = events.reduce((s, e) => s + e.qty, 0) / events.length;

  return {
    perDay: avgInterval > 0 ? avgQty / avgInterval : 0,
    periodDays: avgInterval,
    isReliable: false, // purchase-based estimate, less reliable
    source: 'purchases',
  };
}

/** Days between two YYYY-MM-DD dates (always positive). */
function daysBetween(dateA, dateB) {
  const a = parseLocalDate(dateA);
  const b = parseLocalDate(dateB);
  return Math.abs(Math.round((b - a) / 86400000));
}

/**
 * The big one. Returns a complete stock summary for an article:
 *
 *   {
 *     value:        Number    — current theoretical stock
 *     isEstimate:   Boolean   — true if `value` includes projected consumption
 *                                (consumables between inventories)
 *     isNegative:   Boolean   — value < 0 ("épuisé selon le modèle")
 *     hasNoOutflows:Boolean   — true if the period has no sales OR consumable
 *                                rate couldn't be computed → outflows = 0
 *     baseInventoryDate: 'YYYY-MM-DD'  — date of the last inventory used
 *     baseInventoryQty:  Number        — qty at that inventory
 *     purchasesSince:    Number        — total bought since the inventory
 *     outflowsSince:     Number        — total consumed since the inventory
 *   }
 *
 * Or null if no completed inventory exists for this article.
 */
/**
 * Estimates current stock purely from purchase history, without any inventory.
 *
 * Algorithm:
 *  1. Sum all purchases of this article → total bought
 *  2. Estimate daily consumption from purchase frequency
 *     (avgQty / avgInterval = qty used per day between orders)
 *  3. Stock estimate = total bought - (consumption/day × days since first purchase)
 *
 * This is inherently imprecise (we don't know the starting stock), so we
 * assume stock was 0 before the first purchase (conservative / safe).
 *
 * Returns { value, perDay, firstPurchaseDate, lastPurchaseDate, daysElapsed }
 * or null if fewer than 2 purchases (can't compute consumption rate).
 */
function computeEstimatedStockFromPurchases(articleId, purchases, today) {
  const events = [];
  for (const p of purchases) {
    let qty = 0;
    for (const item of (p.items || [])) {
      if (item.articleId === articleId && item.convertedQty > 0) qty += item.convertedQty;
    }
    if (qty > 0 && p.date) events.push({ date: p.date, qty });
  }
  if (events.length < 2) return null;
  events.sort((a, b) => a.date.localeCompare(b.date));

  // Average daily consumption from purchase intervals
  let totalGap = 0;
  for (let i = 1; i < events.length; i++) {
    totalGap += daysBetween(events[i - 1].date, events[i].date);
  }
  const avgInterval = totalGap / (events.length - 1);
  const avgQty = events.reduce((s, e) => s + e.qty, 0) / events.length;
  const perDay = avgInterval > 0 ? avgQty / avgInterval : 0;

  // Total purchased
  const totalBought = events.reduce((s, e) => s + e.qty, 0);

  // Days elapsed since first purchase
  const firstDate = events[0].date;
  const lastDate = events[events.length - 1].date;
  const daysElapsed = daysBetween(firstDate, today);

  // Estimated stock = total bought - estimated consumption
  const estimated = totalBought - (perDay * daysElapsed);

  return {
    value: estimated,
    perDay,
    firstPurchaseDate: firstDate,
    lastPurchaseDate: lastDate,
    daysElapsed,
    isEstimate: true,
    isNegative: estimated < 0,
    purchaseCount: events.length,
  };
}

function computeStockSummary(article, outflowIndex, purchases, inventories, sales, today) {
  const articleId = article.id;
  const latestInv = findLatestInventoryEntry(articleId, inventories);
  if (!latestInv) return null;

  // Purchases since
  let purchasesSince = 0;
  for (const p of purchases) {
    if (p.date < latestInv.date) continue;
    for (const item of p.items) {
      if (item.articleId === articleId && item.convertedQty > 0) {
        purchasesSince += item.convertedQty;
      }
    }
  }

  // Outflows since — depends on stockType
  let outflowsSince = 0;
  let hasNoOutflows = false;
  let isEstimate = false;

  if (article.stockType === STOCK_TYPES.CONSUMABLE) {
    // Average daily consumption × days elapsed since inventory
    const rate = calculateConsumableRate(articleId, purchases, inventories);
    if (rate) {
      const days = daysBetween(latestInv.date, today);
      outflowsSince = rate.perDay * days;
      isEstimate = true; // consumable outflow is always projected
      // Store rate source for display in alerts
      if (rate.source) article._rateSource = rate.source;
      if (!rate.isReliable) article._rateSourceWeak = true;
    } else {
      hasNoOutflows = true; // can't compute rate yet
    }
  } else {
    // Recipe article: sum sales × recipe lines
    if (outflowIndex) {
      outflowsSince = outflowSince(outflowIndex, articleId, latestInv.date);
    }
    if (outflowsSince === 0) {
      // Either no sales since inventory, or article not in any recipe
      // We flag this so the UI can surface a warning
      const hasAnySales = sales && sales.some((s) => s.date >= latestInv.date);
      if (!hasAnySales) hasNoOutflows = true;
    }
  }

  const value = latestInv.quantity + purchasesSince - outflowsSince;

  return {
    value,
    isEstimate,
    isNegative: value < 0,
    hasNoOutflows,
    baseInventoryDate: latestInv.date,
    baseInventoryQty: latestInv.quantity,
    purchasesSince,
    outflowsSince,
  };
}

// ─── ALERT CALCULATION HELPERS ────────────────────────────────────────────
//
// These functions support the "Alertes" view. They compute three things:
//   1. Seasonal consumption rate per article (forward projection)
//   2. Purchase frequency per article (deduces supplier lead time)
//   3. Auto-threshold = consumption × (lead_time + safety margin)
//
// Together they produce the alert index that powers the dashboard badge and
// the dedicated Alertes view.

/**
 * Number of days that an article has historical sales data covering.
 * Used to gate alerts: don't alert on articles with < 30 days of history
 * (Q7 = A: silence rather than noise).
 */
function articleDataHistoryDays(articleId, sales, recipes, today) {
  // Find the first sale that produced any outflow of this article.
  // We rely on the same logic as buildOutflowIndex but cheaper since we only
  // need the first hit (no cumulative needed).
  const recipeMap = {};
  for (const r of recipes) recipeMap[r.id] = r;
  const assortmentBase = findAssortmentBase(recipes);
  const baseUsesIt = assortmentBase
    ? (assortmentBase.articles || []).some((l) => l.id === articleId)
    : false;

  let earliestDate = null;
  for (const sale of sales) {
    const recipe = recipeMap[sale.recipeId];
    if (!recipe || recipe.isAssortmentBase) continue;
    const usedDirectly = (recipe.articles || []).some((l) => l.id === articleId);
    const usedViaBase = recipe.includesAssortment && baseUsesIt;
    if (!usedDirectly && !usedViaBase) continue;
    if (!earliestDate || sale.date < earliestDate) earliestDate = sale.date;
  }
  if (!earliestDate) return 0;
  return daysBetween(earliestDate, today);
}

/**
 * Sums all outflows for an article between two dates (inclusive of
 * fromDate, exclusive of toDate). Uses the outflowIndex for O(log N) lookup.
 */
function outflowsBetween(outflowIndex, articleId, fromDate, toDate) {
  const data = outflowIndex[articleId];
  if (!data || data.byDate.length === 0) return 0;
  const arr = data.byDate;

  // Cumulative up to (and including) the largest date < toDate
  let lo = 0, hi = arr.length - 1, beforeTo = -1;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (arr[mid].date < toDate) { beforeTo = mid; lo = mid + 1; }
    else hi = mid - 1;
  }
  const cumBeforeTo = beforeTo >= 0 ? arr[beforeTo].cumulative : 0;

  // Cumulative up to (but NOT including) fromDate
  lo = 0; hi = arr.length - 1;
  let beforeFrom = -1;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (arr[mid].date < fromDate) { beforeFrom = mid; lo = mid + 1; }
    else hi = mid - 1;
  }
  const cumBeforeFrom = beforeFrom >= 0 ? arr[beforeFrom].cumulative : 0;

  return cumBeforeTo - cumBeforeFrom;
}

/**
 * Returns the projected consumption rate (qty/day) for an article.
 *
 * Algorithm tiers based on available history:
 *   < 60 days       : simple average over all available history
 *   60d to 12mo     : weighted (60% last 30 days, 40% prior 30 days)
 *   >= 12mo         : seasonal — 50% current month + 50% same month N-1
 *
 * Returns { perDay, mode, sourceWindow } where:
 *   perDay        : qty consumed per day (number)
 *   mode          : 'simple' | 'weighted' | 'seasonal' | 'insufficient'
 *   sourceWindow  : { from, to } describing the window(s) used (for tooltip)
 *
 * Returns mode='insufficient' if there's not enough data to project.
 */
function calculateSeasonalConsumptionRate(articleId, outflowIndex, sales, recipes, today) {
  const historyDays = articleDataHistoryDays(articleId, sales, recipes, today);
  if (historyDays < 30) {
    return { perDay: 0, mode: 'insufficient', historyDays, sourceWindow: null };
  }

  const todayDate = parseLocalDate(today);

  // ─── Tier 1: < 60 days → simple average over the full history ──────────
  if (historyDays < 60) {
    const from = parseLocalDate(todayDate);
    from.setDate(from.getDate() - historyDays);
    const fromStr = from.toISOString().slice(0, 10);
    const total = outflowsBetween(outflowIndex, articleId, fromStr, today);
    return {
      perDay: total / historyDays,
      mode: 'simple',
      historyDays,
      sourceWindow: { from: fromStr, to: today, days: historyDays },
    };
  }

  // ─── Tier 2: 60 days – 12 months → weighted recent vs older ────────────
  if (historyDays < 365) {
    const win1End = today;
    const win1Start = parseLocalDate(todayDate); win1Start.setDate(win1Start.getDate() - 30);
    const win2End = win1Start.toISOString().slice(0, 10);
    const win2Start = new Date(win1Start); win2Start.setDate(win2Start.getDate() - 30);

    const recent = outflowsBetween(outflowIndex, articleId, win1Start.toISOString().slice(0, 10), win1End);
    const prior = outflowsBetween(outflowIndex, articleId, win2Start.toISOString().slice(0, 10), win2End);

    const recentPerDay = recent / 30;
    const priorPerDay = prior / 30;
    const perDay = 0.6 * recentPerDay + 0.4 * priorPerDay;
    return {
      perDay,
      mode: 'weighted',
      historyDays,
      sourceWindow: {
        recent: { from: win1Start.toISOString().slice(0, 10), to: win1End, days: 30, perDay: recentPerDay },
        prior:  { from: win2Start.toISOString().slice(0, 10), to: win2End, days: 30, perDay: priorPerDay },
      },
    };
  }

  // ─── Tier 3: >= 12 months → seasonal (50% current month + 50% same month N-1) ──
  // "Current month" = last 30 days
  // "Same month N-1" = same 30-day window one year ago
  const win1End = today;
  const win1Start = parseLocalDate(todayDate); win1Start.setDate(win1Start.getDate() - 30);
  const win2End_d = parseLocalDate(todayDate); win2End_d.setFullYear(win2End_d.getFullYear() - 1);
  const win2Start_d = new Date(win2End_d); win2Start_d.setDate(win2Start_d.getDate() - 30);

  const recent = outflowsBetween(outflowIndex, articleId, win1Start.toISOString().slice(0, 10), win1End);
  const sameMonthLastYear = outflowsBetween(
    outflowIndex, articleId,
    win2Start_d.toISOString().slice(0, 10),
    win2End_d.toISOString().slice(0, 10)
  );

  const recentPerDay = recent / 30;
  const lastYearPerDay = sameMonthLastYear / 30;
  const perDay = 0.5 * recentPerDay + 0.5 * lastYearPerDay;

  return {
    perDay,
    mode: 'seasonal',
    historyDays,
    sourceWindow: {
      recent: { from: win1Start.toISOString().slice(0, 10), to: win1End, days: 30, perDay: recentPerDay },
      lastYear: {
        from: win2Start_d.toISOString().slice(0, 10),
        to: win2End_d.toISOString().slice(0, 10),
        days: 30,
        perDay: lastYearPerDay,
      },
    },
  };
}

/**
 * Calculates the average days between purchases for an article. Used as
 * a proxy for supplier lead time (how often you re-stock = how often you
 * need to anticipate running out).
 *
 * Returns { avgIntervalDays, supplierCount, lastPurchaseDate } or null if
 * there are fewer than 2 purchases for this article.
 */
function calculatePurchaseFrequency(articleId, purchases) {
  // Collect all purchase dates that include this article
  const dates = [];
  const suppliers = new Set();
  for (const p of purchases) {
    let hasIt = false;
    for (const item of p.items) {
      if (item.articleId === articleId && item.convertedQty > 0) {
        hasIt = true;
        break;
      }
    }
    if (hasIt) {
      dates.push(p.date);
      if (p.supplier) suppliers.add(p.supplier);
    }
  }
  if (dates.length < 2) return null;
  dates.sort();

  let totalGap = 0;
  for (let i = 1; i < dates.length; i++) {
    totalGap += daysBetween(dates[i - 1], dates[i]);
  }
  return {
    avgIntervalDays: totalGap / (dates.length - 1),
    supplierCount: suppliers.size,
    lastPurchaseDate: dates[dates.length - 1],
    purchaseCount: dates.length,
  };
}

/**
 * Computes an alert threshold based purely on purchase history, without
 * needing sales data. Useful when ventes CLYO are not yet imported.
 *
 * Logic:
 *  1. Collect all purchase events for this article (date + qty)
 *  2. Calculate average qty per purchase and average interval between purchases
 *  3. Estimate daily consumption = avgQty / avgIntervalDays
 *  4. Threshold = dailyConsumption × avgIntervalDays × safetyFactor (1.2)
 *     → "alert me when I have less than 1.2 purchase-cycles worth of stock"
 *  5. Also compute daysUntilNextPurchase based on last purchase date + avgInterval
 *
 * Requires at least 2 purchase events to compute meaningful stats.
 * Returns null if not enough data.
 */
function calculatePurchaseBasedThreshold(articleId, purchases) {
  const events = []; // { date, qty }
  for (const p of purchases) {
    let qty = 0;
    for (const item of (p.items || [])) {
      if (item.articleId === articleId && item.convertedQty > 0) {
        qty += item.convertedQty;
      }
    }
    if (qty > 0 && p.date) events.push({ date: p.date, qty });
  }
  if (events.length < 2) return null;
  events.sort((a, b) => a.date.localeCompare(b.date));

  // Average quantity per purchase
  const totalQty = events.reduce((s, e) => s + e.qty, 0);
  const avgQtyPerPurchase = totalQty / events.length;

  // Average interval between purchases (in days)
  let totalGap = 0;
  for (let i = 1; i < events.length; i++) {
    totalGap += daysBetween(events[i - 1].date, events[i].date);
  }
  const avgIntervalDays = totalGap / (events.length - 1);
  if (avgIntervalDays <= 0) return null;

  // Estimated daily consumption
  const perDay = avgQtyPerPurchase / avgIntervalDays;

  // Threshold = enough stock for 1 full purchase cycle + 20% safety buffer
  const safetyFactor = 1.2;
  const threshold = avgQtyPerPurchase * safetyFactor;

  const lastDate = events[events.length - 1].date;
  const daysSinceLastPurchase = daysBetween(lastDate, new Date().toISOString().slice(0, 10));
  const daysUntilNextPurchase = Math.max(0, avgIntervalDays - daysSinceLastPurchase);

  return {
    threshold,
    perDay,
    avgIntervalDays,
    avgQtyPerPurchase,
    lastPurchaseDate: lastDate,
    daysUntilNextPurchase,
    purchaseCount: events.length,
    source: 'purchase_history',
  };
}

/**
 * Computes the automatic stock threshold for an article.
 *   threshold = consumption_per_day × (lead_time + safety_margin)
 *
 * lead_time = avg purchase frequency (clamped 3–21 days for sanity)
 * safety_margin = 3 days hardcoded for now (Q3 = C said adjustable; in 5A we
 *   ship the auto value, manual override comes via the article editor in
 *   a later micro-step)
 *
 * Returns { threshold, leadTime, safetyMargin } or null if we can't compute
 * (no consumption data or no purchase frequency).
 */
function calculateAutoThreshold(consumptionRate, purchaseFreq) {
  if (!consumptionRate || consumptionRate.mode === 'insufficient' || consumptionRate.perDay <= 0) {
    return null;
  }
  // Default lead time = 7 days if no purchase history (typical wholesale cycle)
  let leadTime = purchaseFreq ? purchaseFreq.avgIntervalDays : 7;
  // Sanity clamp: 3 days minimum (even instant suppliers need time), 21 max
  leadTime = Math.max(3, Math.min(21, leadTime));
  const safetyMargin = 3;
  const threshold = consumptionRate.perDay * (leadTime + safetyMargin);
  return { threshold, leadTime, safetyMargin };
}

/**
 * Detects a price trend on an article.
 * Algorithm: compare avg price over last 30 days vs avg price over the 30
 * days before that. If recent avg > prior avg × 1.15 (i.e. +15% or more),
 * flag it as a price alert.
 *
 * Returns { recentAvg, priorAvg, deltaPct } or null if not enough data
 * (need at least 1 purchase in each 30-day window).
 */
function detectPriceTrend(articleId, purchases, today) {
  const todayDate = parseLocalDate(today);
  const win1Start = parseLocalDate(todayDate); win1Start.setDate(win1Start.getDate() - 30);
  const win2Start = new Date(win1Start); win2Start.setDate(win2Start.getDate() - 30);

  const win1StartStr = win1Start.toISOString().slice(0, 10);
  const win2StartStr = win2Start.toISOString().slice(0, 10);

  let recentValue = 0, recentQty = 0;
  let priorValue = 0, priorQty = 0;

  for (const p of purchases) {
    for (const item of p.items) {
      if (item.articleId !== articleId) continue;
      if (!(item.convertedQty > 0) || !(item.total > 0)) continue;
      if (p.date >= win1StartStr && p.date <= today) {
        recentValue += item.total;
        recentQty += item.convertedQty;
      } else if (p.date >= win2StartStr && p.date < win1StartStr) {
        priorValue += item.total;
        priorQty += item.convertedQty;
      }
    }
  }

  if (recentQty <= 0 || priorQty <= 0) return null;
  const recentAvg = recentValue / recentQty;
  const priorAvg = priorValue / priorQty;
  const deltaPct = ((recentAvg - priorAvg) / priorAvg) * 100;
  return { recentAvg, priorAvg, deltaPct };
}

};

/**
 * Builds the alerts list for all tracked articles.
 *
 * Returns an array of { article, type, severity, details... } sorted by
 * urgency (empty first, then lowest days-of-cover, then biggest price delta).
 *
 * "Severity" is a single bucket per Q5 = A (one level only). All entries are
 * considered "to act on" — the order just helps you triage which to look at
 * first.
 *
 * Q7 = A: articles with < 30 days of data are silently skipped.
 */
const PRICE_TREND_THRESHOLD_PCT = 15; // +15% on rolling 30-day average
const SUPPLIER_GAP_THRESHOLD_PCT_DEFAULT = 20; // user-adjustable in settings

// Defaults pour alertSettings, regroupés ici pour qu'un futur réglage soit
// ajouté à un seul endroit (à la fois le défaut et le merge sont géré).
const DEFAULT_ALERT_SETTINGS = {
  supplierGapThresholdPct: SUPPLIER_GAP_THRESHOLD_PCT_DEFAULT,
};

/**
 * Fusionne les alertSettings chargés du storage avec les défauts. Même
 * pattern que `mergeUserSettings` : permet d'ajouter de nouveaux réglages
 * sans casser les utilisateurs existants (le nouveau champ apparaîtra
 * automatiquement avec sa valeur par défaut).
 */
function mergeAlertSettings(loaded) {
  if (!loaded || typeof loaded !== 'object') return { ...DEFAULT_ALERT_SETTINGS };
  return { ...DEFAULT_ALERT_SETTINGS, ...loaded };
}

/**
 * Detect articles where the same product is bought from multiple suppliers
 * at significantly different prices.
 *
 * For each article that has been purchased from ≥ 2 suppliers, compute the
 * per-supplier weighted-average price (over the last `windowDays` days), then
 * compare cheapest to most expensive. If the gap exceeds `thresholdPct`, emit
 * a SUPPLIER_PRICE_GAP alert with the breakdown.
 *
 * Why a sliding window: a supplier seen once 6 months ago at a lower price
 * isn't relevant signal — we want to highlight gaps that exist *right now*.
 *
 * Returns an array of alert payloads (one per article with a notable gap),
 * NOT pushed to the global alerts list directly (caller does that).
 */
function detectSupplierPriceGaps(articles, purchases, today, thresholdPct, windowDays = 90) {
  const cutoff = parseLocalDate(today);
  cutoff.setDate(cutoff.getDate() - windowDays);
  const cutoffStr = cutoff.toISOString().slice(0, 10);

  // articleId → supplier → { totalValue, totalQty, count, lastDate, lastPrice }
  const buckets = {};
  for (const p of purchases) {
    if (!p.date || p.date < cutoffStr) continue;
    const supplier = (p.supplier || '').trim();
    if (!supplier) continue;
    for (const it of (p.items || [])) {
      if (!it.articleId) continue;
      if (!(it.pricePerMasterUnit > 0) || !(it.convertedQty > 0)) continue;
      const ingMap = buckets[it.articleId] || (buckets[it.articleId] = {});
      const entry = ingMap[supplier] || (ingMap[supplier] = {
        totalValue: 0, totalQty: 0, count: 0, lastDate: '', lastPrice: 0,
      });
      entry.totalValue += it.pricePerMasterUnit * it.convertedQty;
      entry.totalQty += it.convertedQty;
      entry.count += 1;
      if (p.date >= entry.lastDate) {
        entry.lastDate = p.date;
        entry.lastPrice = it.pricePerMasterUnit;
      }
    }
  }

  const results = [];
  for (const [ingId, ingMap] of Object.entries(buckets)) {
    const suppliers = Object.entries(ingMap)
      .filter(([, b]) => b.totalQty > 0)
      .map(([name, b]) => ({
        supplier: name,
        avg: b.totalValue / b.totalQty,
        totalQty: b.totalQty,
        count: b.count,
        lastDate: b.lastDate,
        lastPrice: b.lastPrice,
      }))
      .sort((a, b) => a.avg - b.avg); // cheapest first

    if (suppliers.length < 2) continue; // need ≥ 2 suppliers to compare

    const cheapest = suppliers[0];
    const dearest = suppliers[suppliers.length - 1];
    if (!(cheapest.avg > 0)) continue;
    const gapPct = ((dearest.avg - cheapest.avg) / cheapest.avg) * 100;
    if (gapPct < thresholdPct) continue;

    results.push({
      articleId: ingId,
      suppliers,   // sorted cheap → expensive
      cheapest,
      dearest,
      gapPct,
      windowDays,
    });
  }
  return results;
}

function buildAlertsIndex({ articles, outflowIndex, purchases, sales, recipes, inventories, today, supplierGapThresholdPct, equipment, equipmentInventories }) {
  const alerts = [];

  for (const article of articles) {
    if (article.trackStock === false) continue;
    if (article.alertStock === false) continue; // user disabled alerts for this article

    // ─── Stock-side calculations ─────────────────────────────────────────
    const summary = computeStockSummary(
      article, outflowIndex, purchases, inventories, sales, today
    );

    const consumptionRate = calculateSeasonalConsumptionRate(
      article.id, outflowIndex, sales, recipes, today
    );
    const hasEnoughData = consumptionRate.mode !== 'insufficient';

    // ─── Stock empty / low ───────────────────────────────────────────────

    // Use purchase-based estimate ONLY if no completed inventory exists for this article
    const hasInventory = inventories.some((inv) =>
      inv.status === 'completed' &&
      (inv.entries || []).some((e) => e.articleId === article.id)
    );

    if (!hasInventory) {
      // No inventory → use purchase-based estimate
      const estimatedStock = computeEstimatedStockFromPurchases(article.id, purchases, today);
      if (estimatedStock) {
        const manualThreshold = article.manualThreshold;
        const avgInterval = estimatedStock.daysElapsed / Math.max(1, estimatedStock.purchaseCount);
        const autoThreshold = estimatedStock.perDay > 0
          ? estimatedStock.perDay * (avgInterval || 30) * 1.2
          : null;
        const threshold = manualThreshold != null ? manualThreshold : autoThreshold;
        if (threshold != null && estimatedStock.value < threshold) {
          const daysOfCover = estimatedStock.perDay > 0 ? Math.max(0, estimatedStock.value) / estimatedStock.perDay : null;
          alerts.push({
            article,
            type: ALERT_TYPES.STOCK_LOW,
            sortKey: estimatedStock.isNegative ? -900 : (daysOfCover ?? 50),
            currentStock: estimatedStock.value,
            isEstimate: true,
            estimatedFromPurchases: true,
            consumptionPerDay: estimatedStock.perDay,
            daysOfCover,
            threshold,
            thresholdSource: manualThreshold != null ? 'manual' : 'purchase_history',
            recommendation: estimatedStock.perDay > 0 ? estimatedStock.perDay * 30 : null,
          });
          continue;
        }
      }
    }

    // Inventory exists → use real stock summary
    if (summary && summary.isNegative) {
      // Always alert on empty stock, regardless of data history (it's a fact)
      alerts.push({
        article,
        type: ALERT_TYPES.STOCK_EMPTY,
        sortKey: -1000, // highest priority: pinned at top
        currentStock: summary.value,
        recommendation: consumptionRate.perDay > 0
          ? Math.max(consumptionRate.perDay * 10, Math.abs(summary.value))
          : null,
      });
    } else if (summary && summary.value != null) {
      const purchaseFreq = calculatePurchaseFrequency(article.id, purchases);
      const manualThreshold = article.manualThreshold;

      let threshold = null;
      let thresholdSource = 'manual';
      let perDay = 0;
      let daysOfCover = null;
      let recommendation = null;
      let leadTime = null;

      if (manualThreshold != null) {
        // 1. Manual threshold — always wins
        threshold = manualThreshold;
        thresholdSource = 'manual';
      } else if (hasEnoughData) {
        // 2. Auto threshold from sales consumption
        const auto = calculateAutoThreshold(consumptionRate, purchaseFreq);
        threshold = auto?.threshold ?? null;
        thresholdSource = 'auto';
        perDay = consumptionRate.perDay;
        leadTime = auto?.leadTime;
      } else {
        // 3. Fallback: purchase-history based threshold (no sales needed)
        const purchaseBased = calculatePurchaseBasedThreshold(article.id, purchases);
        if (purchaseBased) {
          threshold = purchaseBased.threshold;
          thresholdSource = 'purchase_history';
          perDay = purchaseBased.perDay;
        }
      }

      if (threshold != null && summary.value < threshold) {
        daysOfCover = perDay > 0 ? summary.value / perDay : null;
        recommendation = perDay > 0 ? perDay * (leadTime || 30) * 2 : null;
        alerts.push({
          article,
          type: ALERT_TYPES.STOCK_LOW,
          sortKey: daysOfCover ?? 999,
          currentStock: summary.value,
          isEstimate: summary.isEstimate,
          consumptionPerDay: perDay,
          daysOfCover,
          threshold,
          thresholdSource,
          leadTime,
          recommendation,
        });
      }
    }

    // ─── Price trend ─────────────────────────────────────────────────────
    // Skip if the user disabled price alerts for this article (alertPrice === false).
    if (article.alertPrice !== false) {
      const priceTrend = detectPriceTrend(article.id, purchases, today);
      if (priceTrend && priceTrend.deltaPct >= PRICE_TREND_THRESHOLD_PCT) {
        alerts.push({
          article,
          type: ALERT_TYPES.PRICE_TREND,
          sortKey: 500 - priceTrend.deltaPct, // bigger delta = higher in list
          recentAvg: priceTrend.recentAvg,
          priorAvg: priceTrend.priorAvg,
          deltaPct: priceTrend.deltaPct,
        });
      }
    }
  }

  // ─── Supplier price gaps (cross-article, runs once) ──────────────────
  const gapThreshold = (typeof supplierGapThresholdPct === 'number' && supplierGapThresholdPct > 0)
    ? supplierGapThresholdPct
    : SUPPLIER_GAP_THRESHOLD_PCT_DEFAULT;
  const supplierGaps = detectSupplierPriceGaps(articles, purchases, today, gapThreshold);
  for (const gap of supplierGaps) {
    const article = articles.find((i) => i.id === gap.articleId);
    if (!article) continue;
    alerts.push({
      article,
      type: ALERT_TYPES.SUPPLIER_PRICE_GAP,
      sortKey: 300 - gap.gapPct, // bigger gap = higher in list
      suppliers: gap.suppliers,
      cheapest: gap.cheapest,
      dearest: gap.dearest,
      gapPct: gap.gapPct,
      windowDays: gap.windowDays,
    });
  }

  // ─── Equipment stock-low (based on last inventory count) ───────────────
  if (Array.isArray(equipment) && Array.isArray(equipmentInventories)) {
    // Build a fast lookup: equipmentId → most recent inventory entry
    const lastByEq = {};
    for (const inv of equipmentInventories) {
      const date = inv.date || '';
      for (const entry of (inv.entries || [])) {
        const prev = lastByEq[entry.equipmentId];
        if (!prev || (date > prev.date)) {
          lastByEq[entry.equipmentId] = { date, qty: entry.qty };
        }
      }
    }
    for (const eq of equipment) {
      const last = lastByEq[eq.id];
      if (!last) continue; // no inventory yet — can't alert
      const threshold = eq.threshold;
      if (!(threshold > 0)) continue;
      if (last.qty < threshold) {
        alerts.push({
          article: { id: eq.id, name: eq.name, category: '🔧 ' + (eq.categoryLabel || 'Équipement'), unit: 'pièce' },
          type: ALERT_TYPES.EQUIPMENT_LOW,
          sortKey: 100 + (last.qty - threshold),
          equipment: eq,
          currentStock: last.qty,
          threshold,
          lastInventoryDate: last.date,
        });
      }
    }
  }

  alerts.sort((a, b) => a.sortKey - b.sortKey);
  return alerts;
}

//   ALIAS / VARIANT MATCHING
// ═══════════════════════════════════════════════════════════════════════════

/**
 * Finds the (article, variant) pair matching a supplier label.
 * Returns { article, variant } or null if not found.
 *
 * Matching priority:
 *   1. Exact alias on a variant
 *   2. Variant name match (exact or partial)
 *   3. Article master name match (returns the first variant as fallback)
 *   4. Partial alias match on a variant
 */
function findArticleByLabel(label, articles) {
  const target = normalizeText(label);
  if (!target) return null;

  // 1. Exact alias on a variant
  for (const article of articles) {
    for (const variant of article.variants || []) {
      if (variant.aliases?.some((a) => normalizeText(a.label) === target)) {
        return { article, variant };
      }
    }
  }

  // 2. Variant name match — exact only
  for (const article of articles) {
    for (const variant of article.variants || []) {
      const variantName = normalizeText(variant.name);
      if (variantName === target) {
        return { article, variant };
      }
    }
  }

  // 3. Article master name match — exact only → return first variant
  for (const article of articles) {
    const ingName = normalizeText(article.name);
    if (ingName === target) {
      const firstVariant = article.variants?.[0];
      if (firstVariant) return { article, variant: firstVariant };
    }
  }

  // 4. Partial alias match
  for (const article of articles) {
    for (const variant of article.variants || []) {
      if (
        variant.aliases?.some((a) => {
          const aliasLabel = normalizeText(a.label);
          return aliasLabel.includes(target) || target.includes(aliasLabel);
        })
      ) {
        return { article, variant };
      }
    }
  }

  return null;
}

/** Strip diacritics. "café" → "cafe", "DÉTERGENT" → "DETERGENT". */
function stripAccents(text) {
  return (text || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

/**
 * List of suppliers known to sell exclusively (or near-exclusively) non-food
 * products: cleaning supplies, packaging, hygiene gear, disposables.
 *
 * When the invoice supplier matches one of these names (case- and accent-
 * insensitive substring match), EVERY new product proposed from that invoice
 * is suggested as 'consumable' by default — independently of whether its
 * individual label triggers a keyword match. The user can still flip any
 * line back to 'food' in the review screen.
 *
 * Matching is loose on purpose: "MHE" matches both "MHE" and
 * "MARTINIQUE HYGIENE EMBALLAGE - MHE" or any variation.
 */
const NON_FOOD_SUPPLIERS = [
  'MHE',
  'MARTINIQUE HYGIENE EMBALLAGE',
  'MHP',
  'MAITRISE HYGIENE PROFESSIONNELLE',
  'CORESTEL',
  'CORESTEL MARTINIQUE',
  'LEVERT EMBALLAGES',
];

function isNonFoodSupplier(supplierName) {
  if (!supplierName) return false;
  const norm = stripAccents(supplierName).toUpperCase();
  for (const known of NON_FOOD_SUPPLIERS) {
    const knownNorm = stripAccents(known).toUpperCase();
    if (norm.includes(knownNorm)) return true;
  }
  return false;
}

/**
 * Suppliers known to bill exclusively for energy (electricity, gas, water).
 * Matched by case-insensitive substring on the invoice supplier name.
 *
 * When a supplier name matches this list and the JSON has no explicit `kind`
 * field, the import flow infers `kind: 'energy'` and routes the invoice to
 * the energy store instead of the regular purchases store.
 *
 * The user can add their actual local suppliers here later. Initial list
 * covers French mainland + DOM-TOM common providers.
 */
const ENERGY_SUPPLIERS = [
  // Électricité
  'EDF',
  'EDF SEI',                            // DOM-TOM service insulaire

  'GENERALE DES EAUX',
];

function isEnergySupplier(supplierName) {
  if (!supplierName) return false;
  const norm = stripAccents(supplierName).toUpperCase();
  for (const known of ENERGY_SUPPLIERS) {
    const knownNorm = stripAccents(known).toUpperCase();
    if (norm.includes(knownNorm)) return true;
  }
  return false;
}

/**
 * Determines the effective `kind` of an invoice from the parsed JSON.
 *
 * Priority:
 *   1. Explicit `kind` field in the JSON wins ('supply' or 'energy')
 *   2. If no kind, infer from supplier name → energy if it matches ENERGY_SUPPLIERS
 *   3. Default to 'supply' (food / consumable / classic supplier invoice)
 *
 * This rule is intentionally lenient: it lets historical imports without a
 * `kind` field keep working (they all become 'supply'), while new energy
 * invoices get routed correctly even if the user forgets to set kind.
 */
function inferInvoiceKind(invoice) {
  if (invoice.kind === 'energy' || invoice.kind === 'supply' || invoice.kind === 'equipment') return invoice.kind;
  if (isEnergySupplier(invoice.supplier)) return 'energy';
  return 'supply';
}

/**
 * Parses MHE-style pack units like "Bte*100", "PK*40", "CT*250", "RL*25",
 * "Pk*5", "Poch*10", "Bte*1000".
 *
 * Returns:
 *   { multiplier: 100, packLabel: 'Bte', volumeL: null }
 *      → when the unit explicitly encodes a count (Bte*100 = 100 pieces)
 *   { multiplier: 1, packLabel: 'Bidon 5 L', volumeL: 5 }
 *      → when the unit contains an explicit volume (Bidon 5 L, Bidon 5 Kg, Bidon 5L)
 *   { multiplier: 1, packLabel: 'Rouleau', volumeL: null }
 *      → for unitary packs (Rouleau, Paire, Bidon without volume, Carton...)
 *   null when no recognizable pattern is found
 *
 * The "*" in MHE notation reads as "of N", so "Bte*100" = "boîte de 100 pièces".
 * Note: MHE writes "Bidon 5 Kg" but it really means liters (cleaning liquids),
 * so we treat any Kg suffix on a Bidon as a volume in liters.
 */
function parsePackUnit(rawUnit) {
  if (!rawUnit) return null;
  const cleaned = rawUnit.trim();

  // Count-based packs: Bte*100, PK*40, CT*250, Carton x3, Carton X3...
  // Accepts both '*' (MHE notation) and 'x'/'X' (CORESTEL notation) as separator.
  const packMatch = cleaned.match(/^([A-Za-z]+\.?)\s*[*xX]\s*(\d+)/);
  if (packMatch) {
    const n = parseInt(packMatch[2], 10);
    if (n > 0) {
      return { multiplier: n, packLabel: packMatch[1], volumeL: null };
    }
  }

  // Volume-bearing containers: "Bidon 5L", "Bidon 5 Kg", "Cartouche 1.3L"...
  // MHE/CORESTEL convention: cleaning products labeled "Kg" are actually liquid liters.
  // Added: Cartouche (CORESTEL soap/foam dispensers), Pot, Seau.
  const volMatch = cleaned.match(/^(Bidon|Jerrycan|Flacon|Spray|Pulverisateur|Cartouche|Pot|Seau)\s*(\d+(?:[.,]\d+)?)\s*(L|ML|KG|K)\b/i);
  if (volMatch) {
    const volume = parseFloat(volMatch[2].replace(',', '.'));
    const unit = volMatch[3].toUpperCase();
    const volumeL = unit === 'ML' ? volume / 1000 : volume;
    if (volumeL > 0) {
      return { multiplier: 1, packLabel: cleaned, volumeL };
    }
  }

  // Unitary packs without volume info
  const unitaryWords = /^(Rouleau|Paire|Bidon|Carton|Cartouche|Pièce|Piece|Unité|Unite|U)\b/i;
  if (unitaryWords.test(cleaned)) {
    return { multiplier: 1, packLabel: cleaned, volumeL: null };
  }

  return null;
}

/**
 * Category detection: maps label keywords to product categories.
 *
 * Rules:
 * - Label match wins over everything (label-first strategy)
 * - If no keyword matches → category stays 'À trier'
 * - Longer/more specific keywords take priority (first match wins,
 *   so put specific terms before generic ones within each group)
 * - All matching is accent-insensitive and case-insensitive
 * - Word-boundary matching: keyword must not be preceded/followed by a letter

//

const DEFAULT_USER_SETTINGS = {

  thresholds: {

    foodCostGreen: 0.30,   // sous ce seuil : sage (bien)
    foodCostAmber: 0.35,   // entre les deux : amber ; au-dessus : wine
    // Tendance de prix : seuil au-delà duquel on alerte sur une hausse

    // Écart entre fournisseurs : seuil au-delà duquel on alerte
    supplierGapPct: 20,

  // Cibles de food cost PAR CATÉGORIE de recette (en %). Servent à calculer

  },
  // Catégories de recettes (éditables dans Réglages). L'ordre de la liste
  // définit l'ordre d'affichage des groupes dans l'onglet Recettes.
  recipeCategories: ['Entrée', 'Plat', 'Dessert', 'Accompagnement', 'Boisson', 'Autre'],
};

// Fusionne les réglages chargés du storage avec les défauts pour gérer
// l'évolution du modèle (nouveaux champs ajoutés en cours de route).
function mergeUserSettings(loaded) {
  const d = DEFAULT_USER_SETTINGS;
  if (!loaded || typeof loaded !== 'object') return {
    articleCategories: d.articleCategories.slice(),
    equipmentCategories: d.equipmentCategories.slice(),
    assetCategories: d.assetCategories.slice(),
    thresholds: { ...d.thresholds },
    foodCostTargets: { ...d.foodCostTargets },
    recipeCategories: d.recipeCategories.slice(),
  };
  return {
    articleCategories: Array.isArray(loaded.articleCategories) && loaded.articleCategories.length > 0
      ? loaded.articleCategories
      : d.articleCategories.slice(),
    equipmentCategories: Array.isArray(loaded.equipmentCategories) && loaded.equipmentCategories.length > 0
      ? loaded.equipmentCategories
      : d.equipmentCategories.slice(),
    assetCategories: Array.isArray(loaded.assetCategories) && loaded.assetCategories.length > 0
      ? loaded.assetCategories
      : d.assetCategories.slice(),
    thresholds: { ...d.thresholds, ...(loaded.thresholds || {}) },
    foodCostTargets: { ...d.foodCostTargets, ...(loaded.foodCostTargets || {}) },
    recipeCategories: Array.isArray(loaded.recipeCategories) && loaded.recipeCategories.length > 0
      ? loaded.recipeCategories
      : d.recipeCategories.slice(),
  };
}
