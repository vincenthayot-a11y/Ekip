/**
 * Detects the best matching category for a product label.
 * Returns the category string, or null if nothing matches (→ keep 'À trier').
 * Uses accent-insensitive matching with word boundaries.
 */
function detectCategoryFromLabel(label) {
  if (!label) return null;
  const norm = stripAccents(label).toUpperCase();
  for (const { kw, cat } of CATEGORY_KEYWORDS) {
    const escaped = stripAccents(kw).toUpperCase()
      .replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
      .replace(/\s+/g, '\\s+');
    const regex = new RegExp(`(^|[^A-Z])${escaped}([^A-Z]|$)`);
    if (regex.test(norm)) return cat;
  }
  return null;
}

function detectConsumableFromLabel(label) {
  if (!label) return null;
  const norm = stripAccents(label).toUpperCase();
  for (const { kw, cat } of CONSUMABLE_KEYWORDS) {
    // Escape regex specials, allow flexible whitespace inside the keyword,
    // require non-letter boundaries on both sides.
    const escaped = kw
      .replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
      .replace(/\s+/g, '\\s+');
    const re = new RegExp(`(^|[^A-Z])${escaped}([^A-Z]|$)`);
    if (re.test(norm)) {
      return { matched: true, keyword: kw, category: cat };
    }
  }
  return null;
}

/**
 * Detects an embedded weight/volume in a product label and returns a
 * suggested packaging if one can be inferred.
 *
 * Example matches:
 *   "CREVET 6/8 800G VIET"            → { factor: 0.8, unit: 'kg' }
 *   "RATATOUILLE 2K5 PP"              → { factor: 2.5, unit: 'kg' }  ('K5' is SOFRIMA decimal)
 *   "LAIT COCO 400ML"                 → { factor: 0.4, unit: 'L' }
 *   "RIZ LONG 5KG"                    → { factor: 5,   unit: 'kg' }
 *   "PAVE DORADE SP110/140 5K PEROU"  → { factor: 5,   unit: 'kg' }
 *
 * Returns null if no recognizable packaging hint is found.
 * The returned `factor` is in master unit (kg for solids, L for liquids).
 * The detected `unit` ('kg' or 'L') hints at what the master article unit
 * should be — useful when proposing a new article.
 */
function detectPackagingFromLabel(label) {
  if (!label) return null;
  const upper = label.toUpperCase();

  // ── Strip out "portion weight ranges" first ────────────────────────────
  // These are NOT packaging — they describe the weight of an individual piece.
  // Examples: "350-550G" (each chicken thigh weighs 350-550g),
  //           "2/4LBS" (each piece is 2 to 4 pounds).
  // If we don't remove them, the next regex would catch "550G" and falsely
  // claim the packaging is 0.55 kg.
  //
  // Pattern: digit(s) + (-or/) + digit(s) + (G or LBS or any of the gram aliases)
  const cleaned = upper.replace(
    /\d+\s*[/\-]\s*\d+\s*(GRAMMES?|GRS?|G|LBS?|LB)\b/g, ''
  );

  // ── Now look for actual packaging hints, in order of specificity ───────
  //
  // Important ordering notes:
  //   - More specific patterns first (KG, GR, GRS, GRAMMES) before
  //     short ones (G, K, L) so we don't half-match.
  //   - Decimal patterns (1,5K, 2K5, 1L5) before "K alone" / "L bare" so
  //     they don't match the wrong number.
  //   - LITRE(S) and ML before bare "L" so we don't match "L" inside "ML"
  //     or "LITRE".
  //   - The "4/4" box code (SOFRIMA shorthand for the standard 850ml can)
  //     comes first because it's an exact lexical token, not a measurement.

  // Standard French canned-goods sizes (SOFRIMA shorthand):
  //   4/4 → 850 g  (standard can, ~850g net)
  //   5/1 → 4250 g (large can, ~4.25kg net — tomatoes, concentrate, sauce)
  //   3/1 → 2550 g
  // Unit is kg (not L): canned goods are used by weight in kitchen context.
  const boxStandards = {
    '4/4': 0.85,
    '5/1': 4.25,
    '3/1': 2.55,
  };
  for (const [code, factor] of Object.entries(boxStandards)) {
    const escaped = code.replace('/', '\\/');
    const re = new RegExp(`(?:^|[\\s.,])${escaped}(?=[\\s.,]|$)`);
    if (re.test(cleaned)) {
      return { factor, unit: 'kg' };
    }
  }

  // 1,5K / 2,5K → comma decimal (French) → kg
  const kCommaDecimal = cleaned.match(/(\d+),(\d+)\s*K\b(?!G|ILO)/);
  if (kCommaDecimal) {
    const value = parseFloat(`${kCommaDecimal[1]}.${kCommaDecimal[2]}`);
    if (isFinite(value) && value > 0) {
      return { factor: value, unit: 'kg' };
    }
  }

  // 1L5 → 1.5 L (SOFRIMA convention: L acts as decimal separator, symmetrical to 2K5)
  //   MUST come before LITRE(S) and bare L patterns.
  const lSofrima = cleaned.match(/(\d+)L(\d+)\b/);
  if (lSofrima) {
    const value = parseFloat(`${lSofrima[1]}.${lSofrima[2]}`);
    if (isFinite(value) && value > 0) {
      return { factor: value, unit: 'L' };
    }
  }

  // NxNxML or NxMLxN — beer-case double multiplication.
  //   "LORRAINE BOUTEILLE 4X6X33CL" → 4 × 6 × 0.33 = 7.92 L
  //   "MALTA LORRAINE 6X33CLX4"     → 6 × 4 × 0.33 = 7.92 L
  // Must come before the bare CL pattern which would otherwise grab just 33CL.
  const multiPackFwd = cleaned.match(
    /\b(\d+)\s*[xX]\s*(\d+)\s*[xX]\s*(\d+(?:[.,]\d+)?)\s*(CL|ML|L)\b/
  );
  if (multiPackFwd) {
    const n1 = parseInt(multiPackFwd[1], 10);
    const n2 = parseInt(multiPackFwd[2], 10);
    const v  = parseFloat(multiPackFwd[3].replace(',', '.'));
    const u  = multiPackFwd[4].toUpperCase();
    const totalL = n1 * n2 * (u === 'CL' ? v / 100 : u === 'ML' ? v / 1000 : v);
    if (isFinite(totalL) && totalL > 0) return { factor: totalL, unit: 'L' };
  }
  const multiPackRev = cleaned.match(
    /\b(\d+)\s*[xX]\s*(\d+(?:[.,]\d+)?)\s*(CL|ML)\s*[xX]\s*(\d+)\b/
  );
  if (multiPackRev) {
    const n1 = parseInt(multiPackRev[1], 10);
    const v  = parseFloat(multiPackRev[2].replace(',', '.'));
    const u  = multiPackRev[3].toUpperCase();
    const n2 = parseInt(multiPackRev[4], 10);
    const totalL = n1 * n2 * (u === 'CL' ? v / 100 : v / 1000);
    if (isFinite(totalL) && totalL > 0) return { factor: totalL, unit: 'L' };
  }

  // PACK <N>X<volume>L — Source Didier-style multi-pack.
  //   Format: "PACK 6X1,25L", "PACK 8X0,50L", "PACK 6X1,50L"
  //   The pack contains N bottles/units of <volume> each, so the total
  //   volume is N × volume. This MUST come before the bare L detection,
  //   which would otherwise grab the per-bottle volume (1.25L) instead
  //   of the full pack volume (6 × 1.25 = 7.5L).
  const packVolMatch = cleaned.match(/\bPACK\s+(\d+)\s*[xX]\s*(\d+(?:[.,]\d+)?)\s*(L|ML)\b/);
  if (packVolMatch) {
    const count = parseInt(packVolMatch[1], 10);
    const vol = parseFloat(packVolMatch[2].replace(',', '.'));
    const unit = packVolMatch[3].toUpperCase();
    const totalL = unit === 'ML' ? (count * vol / 1000) : (count * vol);
    if (isFinite(totalL) && totalL > 0) {
      return { factor: totalL, unit: 'L' };
    }
  }

  // BOX <number> KG — CAREX-style explicit carton weight.
  //   Format: "sac 6*1.5 kg box 9kg INDONESIE" or "box 10kg Caraibes".
  //   This MUST come before the generic kgWhole pattern, because the per-sachet
  //   weight (e.g. "6*1.5 kg" or "5*2kg") may appear EARLIER in the label and
  //   would otherwise be picked first. The "BOX" keyword authoritatively marks
  //   the carton total weight.
  //   \b before BOX prevents matching unrelated words ending in "BOX" (e.g. "TIBOX").
  const boxKg = cleaned.match(/\bBOX\s+(\d+(?:[.,]\d+)?)\s*KG\b/);
  if (boxKg) {
    const value = parseFloat(boxKg[1].replace(',', '.'));
    if (isFinite(value) && value > 0) {
      return { factor: value, unit: 'kg' };
    }
  }

  // 2K5 → 2.5 kg (SOFRIMA: K acts as decimal separator)
  const kSofrima = cleaned.match(/(\d+)K(\d+)\b/);
  if (kSofrima) {
    const value = parseFloat(`${kSofrima[1]}.${kSofrima[2]}`);
    if (isFinite(value) && value > 0) {
      return { factor: value, unit: 'kg' };
    }
  }

  // SOFRIMA decimal kg with no boundary after: "4,54KGUYA" → 4.54 kg
  //   Some SOFRIMA labels glue the country code right after "KG" with no space
  //   (e.g. "VIVANEAU 3/4-1LBS BT 4,54KGUYA" where "GUYA" = Guyana origin).
  //   Standard \bKG\b fails here, so we look explicitly for "KG" followed by
  //   any uppercase letter (a country/region prefix) and accept it.
  const kgDecimalGlued = cleaned.match(/(\d+),(\d+)\s*KG(?=[A-Z])/);
  if (kgDecimalGlued) {
    const value = parseFloat(`${kgDecimalGlued[1]}.${kgDecimalGlued[2]}`);
    if (isFinite(value) && value > 0) {
      return { factor: value, unit: 'kg' };
    }
  }

  // 5KG, 25KG, 2.5KG, 5KILO, 5KILOS → kg (explicit unit, no ambiguity)
  const kgWhole = cleaned.match(/(\d+(?:[.,]\d+)?)\s*(?:KG|KILOS?)\b/);
  if (kgWhole) {
    const value = parseFloat(kgWhole[1].replace(',', '.'));
    if (isFinite(value) && value > 0) {
      return { factor: value, unit: 'kg' };
    }
  }

  // 10K (no digit or letter after K, just a word boundary) → kg
  // Negative lookahead (?!G|ILO) prevents matching "10KG" or "10KILO" twice.
  const kAlone = cleaned.match(/(\d+)\s*K\b(?!G|ILO)/);
  if (kAlone) {
    const value = parseFloat(kAlone[1]);
    if (isFinite(value) && value > 0) {
      return { factor: value, unit: 'kg' };
    }
  }

  // 250GRS, 120GR, 410GRAMMES, 800G, 250G9PP — gram aliases → kg
  // Tested in this order so longer suffix wins (GRAMMES before GRS, GRS before G).
  //
  // The lookahead (?=[A-Z\d]|\b) allows the gram suffix to be IMMEDIATELY
  // followed by a letter OR a digit — SOFRIMA's data sometimes has missing
  // spaces (e.g. "800GBANG" or "250G9PP"). The leading digit + required G/GR
  // anchor the match, so unrelated words containing "G" (like "GUYANE") are
  // not affected.
  const grams = cleaned.match(/(\d+(?:[.,]\d+)?)\s*(?:GRAMMES?|GRS|GR|G)(?=[A-Z\d]|\b)/);
  if (grams) {
    const value = parseFloat(grams[1].replace(',', '.'));
    if (isFinite(value) && value > 0) {
      return { factor: value / 1000, unit: 'kg' };
    }
  }

  // 400ML → 0.4 L (must come BEFORE the bare "L" pattern)
  const ml = cleaned.match(/(\d+(?:[.,]\d+)?)\s*ML\b/);
  if (ml) {
    const value = parseFloat(ml[1].replace(',', '.'));
    if (isFinite(value) && value > 0) {
      return { factor: value / 1000, unit: 'L' };
    }
  }

  // 50CL, 75CLS, 25CENTILITRES → L (1 cL = 0.01 L)
  const cl = cleaned.match(/(\d+(?:[.,]\d+)?)\s*(?:CENTILITRES?|CLS|CL)\b/);
  if (cl) {
    const value = parseFloat(cl[1].replace(',', '.'));
    if (isFinite(value) && value > 0) {
      return { factor: value / 100, unit: 'L' };
    }
  }

  // 1,25 LITRE / 2 LITRES — "litre" written in full → L
  const litreWord = cleaned.match(/(\d+(?:[.,]\d+)?)\s*LITRES?\b/);
  if (litreWord) {
    const value = parseFloat(litreWord[1].replace(',', '.'));
    if (isFinite(value) && value > 0) {
      return { factor: value, unit: 'L' };
    }
  }

  // 1L, 2,5L → L (bare). Negative lookahead (?!BS?|ITRE) avoids matching
  // "L" inside "LBS" (pounds) or "LITRE".
  const liters = cleaned.match(/(\d+(?:[.,]\d+)?)\s*L\b(?!BS?|ITRE)/);
  if (liters) {
    const value = parseFloat(liters[1].replace(',', '.'));
    if (isFinite(value) && value > 0) {
      return { factor: value, unit: 'L' };
    }
  }

  return null;
}

// ═══════════════════════════════════════════════════════════════════════════
//   USE IS MOBILE HOOK
// ═══════════════════════════════════════════════════════════════════════════
//
// Returns true when the viewport is narrow enough to be considered mobile.
// Used by the inventory editor to switch to a touch-friendly layout.
// Threshold: 600px — covers all phones in portrait, even large ones.

function useIsMobile(threshold = 600) {
  const [isMobile, setIsMobile] = useState(
    typeof window !== 'undefined' ? window.innerWidth < threshold : false
  );

  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < threshold);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, [threshold]);

  return isMobile;
}

// ═══════════════════════════════════════════════════════════════════════════
//   PERIOD FILTER HOOK
// ═══════════════════════════════════════════════════════════════════════════

function usePeriodFilter() {
  const [period, setPeriod] = useState('365j');

  // Custom range state — used only when period === 'custom'
  // Initialized to "today minus 30 days" → today, so the user has a sensible default
  const today = new Date().toISOString().slice(0, 10);
  const thirtyDaysAgo = (() => {
    const d = new Date();
    d.setDate(d.getDate() - 30);
    return d.toISOString().slice(0, 10);
  })();

  const [customFrom, setCustomFrom] = useState(thirtyDaysAgo);
  const [customTo, setCustomTo] = useState(today);

  const range = useMemo(() => {
    if (period === 'custom') {
      // Defensive: if user inverts the dates, swap them so queries don't break
      if (customFrom && customTo && customFrom > customTo) {
        return { from: customTo, to: customFrom };
      }
      return { from: customFrom || null, to: customTo || null };
    }

    const todayStr = new Date().toISOString().slice(0, 10);
    const start = new Date();

    if (period === '7j') start.setDate(start.getDate() - 7);
    else if (period === '30j') start.setDate(start.getDate() - 30);
    else if (period === '90j') start.setDate(start.getDate() - 90);
    else if (period === '365j') start.setDate(start.getDate() - 365);
    else return { from: null, to: null };

    return { from: start.toISOString().slice(0, 10), to: todayStr };
  }, [period, customFrom, customTo]);

  return {
    period,
    setPeriod,
    dateFrom: range.from,
    dateTo: range.to,
    customFrom,
    setCustomFrom,
    customTo,
    setCustomTo,
  };
}


// ═══════════════════════════════════════════════════════════════════════════
//   GOOGLE DRIVE SYNC (via Apps Script Web App)
// ═══════════════════════════════════════════════════════════════════════════
//
//   Architecture:
//   - All data is always saved locally first (window.storage) for instant UI
//   - When sync is enabled, changes are debounced-pushed to a Google Drive
//     folder via a Web App built in Google Apps Script
//   - Storage uses MULTIPLE files for performance:
//
//        articles.json       (catalogue, small)
//        recipes.json           (small)
//        purchases-YYYY.json    (one file per year)
//        sales-YYYY.json        (one file per year)
//
//   - Only the files that changed are pushed (incremental sync)
//   - Past years become read-only archives, loaded lazily when needed
//
// ═══════════════════════════════════════════════════════════════════════════

const DRIVE_DEBOUNCE_MS = 1000; // wait 1s of inactivity before pushing
const DRIVE_POLL_INTERVAL_MS = 10000; // pull every 10s when app is visible

const DRIVE_STORAGE_KEYS = {
  enabled: 'mc5:driveSyncEnabled',
  endpoint: 'mc5:driveEndpoint',           // Apps Script Web App URL
  token: 'mc5:driveToken',                 // user-chosen secret token
  lastSyncedAt: 'mc5:driveLastSyncedAt',
  lastBackupDate: 'mc5:driveLastBackupDate',  // 'YYYY-MM-DD' du dernier snapshot daté
  dirtyFiles: 'mc5:driveDirtyFiles',       // array of filenames waiting to be pushed
};

// Filenames used in the Drive folder
const DRIVE_FILES = {
  articles: 'ingredients.json',         // legacy name kept for Drive compatibility
  recipes: 'recipes.json',
  menus: 'menus.json',
  inventories: 'inventories.json',
  energy: 'energy.json',
  equipment: 'equipment.json',          // petit équipement (articles)
  equipmentPurchases: 'equipment-purchases.json',
  equipmentInventories: 'equipment-inventories.json',
  assets: 'assets.json',                // gros équipement
  assetMaintenance: 'asset-maintenance.json',
  assetInterventions: 'asset-interventions.json',
  alertSettings: 'alert-settings.json',
  purchasesForYear: (year) => 'purchases-' + year + '.json',
  salesForYear: (year) => 'sales-' + year + '.json',
};

/**
 * Splits the in-memory data into the per-file chunks that we sync to Drive.
 * Returns an object: { 'articles.json': [...], 'sales-2026.json': [...], ... }
 *
 * Inventories live in a single file (low volume — typically one entry per
 * month per article = a few hundred rows max even after years of usage).
 */
function splitDataIntoFiles({ articles, recipes, menus, purchases, sales, inventories, energy,
  equipment, equipmentPurchases, equipmentInventories,
  assets, assetMaintenance, assetInterventions, alertSettings } = {}) {
  const result = {
    [DRIVE_FILES.articles]: Array.isArray(articles) ? articles : [],
    [DRIVE_FILES.recipes]: Array.isArray(recipes) ? recipes : [],
    [DRIVE_FILES.menus]: Array.isArray(menus) ? menus : [],
    [DRIVE_FILES.inventories]: Array.isArray(inventories) ? inventories : [],
    [DRIVE_FILES.energy]: Array.isArray(energy) ? energy : [],
    [DRIVE_FILES.equipment]: Array.isArray(equipment) ? equipment : [],
    [DRIVE_FILES.equipmentPurchases]: Array.isArray(equipmentPurchases) ? equipmentPurchases : [],
    [DRIVE_FILES.equipmentInventories]: Array.isArray(equipmentInventories) ? equipmentInventories : [],
    [DRIVE_FILES.assets]: Array.isArray(assets) ? assets : [],
    [DRIVE_FILES.assetMaintenance]: Array.isArray(assetMaintenance) ? assetMaintenance : [],
    [DRIVE_FILES.assetInterventions]: Array.isArray(assetInterventions) ? assetInterventions : [],
    [DRIVE_FILES.alertSettings]: alertSettings || {},
  };

  // Group purchases by year
  const purchasesByYear = {};
  (purchases || []).forEach((p) => {
    const year = (p.date || '').slice(0, 4) || 'undated';
    if (!purchasesByYear[year]) purchasesByYear[year] = [];
    purchasesByYear[year].push(p);
  });
  Object.entries(purchasesByYear).forEach(([year, list]) => {
    result[DRIVE_FILES.purchasesForYear(year)] = list;
  });

  // Group sales by year
  const salesByYear = {};
  (sales || []).forEach((s) => {
    const year = (s.date || '').slice(0, 4) || 'undated';
    if (!salesByYear[year]) salesByYear[year] = [];
    salesByYear[year].push(s);
  });
  Object.entries(salesByYear).forEach(([year, list]) => {
    result[DRIVE_FILES.salesForYear(year)] = list;
  });

  return result;
}

/**
 * Determines which collection a filename belongs to and which year (if applicable).
 * Returns { kind: 'articles' | 'recipes' | 'inventories' | 'purchases' | 'sales', year? }
 */
function parseFilename(filename) {
  if (filename === DRIVE_FILES.articles) return { kind: 'articles' };
  if (filename === DRIVE_FILES.recipes) return { kind: 'recipes' };
  if (filename === DRIVE_FILES.menus) return { kind: 'menus' };
  if (filename === DRIVE_FILES.inventories) return { kind: 'inventories' };
  if (filename === DRIVE_FILES.energy) return { kind: 'energy' };
  if (filename === DRIVE_FILES.equipment) return { kind: 'equipment' };
  if (filename === DRIVE_FILES.equipmentPurchases) return { kind: 'equipmentPurchases' };
  if (filename === DRIVE_FILES.equipmentInventories) return { kind: 'equipmentInventories' };
  if (filename === DRIVE_FILES.assets) return { kind: 'assets' };
  if (filename === DRIVE_FILES.assetMaintenance) return { kind: 'assetMaintenance' };
  if (filename === DRIVE_FILES.assetInterventions) return { kind: 'assetInterventions' };
  if (filename === DRIVE_FILES.alertSettings) return { kind: 'alertSettings' };

  const purchasesMatch = filename.match(/^purchases-(\d{4})\.json$/);
  if (purchasesMatch) return { kind: 'purchases', year: purchasesMatch[1] };

  const salesMatch = filename.match(/^sales-(\d{4})\.json$/);
  if (salesMatch) return { kind: 'sales', year: salesMatch[1] };

  return null;
}

/**
 * Determines which files are dirty by comparing two snapshots of split data.
 * Returns an array of filenames that need to be pushed.
 */
function diffFiles(prevSplit, nextSplit) {
  const dirty = new Set();
  const allKeys = new Set([...Object.keys(prevSplit || {}), ...Object.keys(nextSplit || {})]);
  for (const key of allKeys) {
    if (JSON.stringify(prevSplit?.[key]) !== JSON.stringify(nextSplit?.[key])) {
      dirty.add(key);
    }
  }
  return [...dirty];
}

// ─── HTTP layer ──────────────────────────────────────────────────────────

/**
 * Reads a single file from the Apps Script Web App.
 * Returns { exists: boolean, content: any, modifiedAt: string|null }
 */
async function driveReadFile(endpoint, token, filename) {
  console.log('[Drive] Reading', filename);
  const url = endpoint + '?token=' + encodeURIComponent(token) +
              '&action=read&file=' + encodeURIComponent(filename);

  const response = await fetch(url, { method: 'GET' });

  if (!response.ok) {
    throw new Error('HTTP ' + response.status + ' lors de la lecture de ' + filename);
  }

  const data = await response.json();
  if (!data.ok) {
    throw new Error('Apps Script: ' + (data.error || 'erreur inconnue'));
  }

  return data.file;
}

/**
 * Writes a single file to the Apps Script Web App.
 * Returns { name, modifiedAt, size }
 */
async function driveWriteFile(endpoint, token, filename, content) {
  const serialized = JSON.stringify(content ?? []);
  console.log('[Drive] Writing', filename, serialized.length, 'bytes');

  const response = await fetch(endpoint, {
    method: 'POST',
    // Apps Script Web Apps require text/plain to avoid CORS preflight rejection.
    // The body is still JSON, but we declare it as plain text.
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      token,
      action: 'write',
      file: filename,
      content,
    }),
  });

  if (!response.ok) {
    throw new Error('HTTP ' + response.status + ' lors de l\'écriture de ' + filename);
  }

  const data = await response.json();
  if (!data.ok) {
    throw new Error('Apps Script: ' + (data.error || 'erreur inconnue'));
  }

  return data.file;
}

/**
 * Lists all files in the LaTambouille Drive folder.
 * Returns array of { name, modifiedAt, size }
 */
async function driveListFiles(endpoint, token) {
  console.log('[Drive] Listing files');
  const url = endpoint + '?token=' + encodeURIComponent(token) + '&action=list';

  const response = await fetch(url, { method: 'GET' });
  if (!response.ok) {
    throw new Error('HTTP ' + response.status + ' lors du listing');
  }

  const data = await response.json();
  if (!data.ok) {
    throw new Error('Apps Script: ' + (data.error || 'erreur inconnue'));
  }

  const files = data.files || [];
  console.log('[Drive] Listed', files.length, 'file(s):', files.map(f => f.name).join(', ') || '(aucun)');
  return files;
}

/**
 * Reads ALL data files from Drive and reassembles them into the in-memory shape
 * { articles, recipes, purchases, sales }. Returns null if the folder is empty.
 */
async function driveReadAll(endpoint, token) {
  const files = await driveListFiles(endpoint, token);
  if (files.length === 0) return null;

  const result = { articles: [], recipes: [], menus: [], purchases: [], sales: [], inventories: [], energy: [], equipment: [], equipmentPurchases: [], equipmentInventories: [], assets: [], assetMaintenance: [], assetInterventions: [], alertSettings: null };
  let foundAny = false;

  // Read each file individually
  for (const meta of files) {
    const parsed = parseFilename(meta.name);
    if (!parsed) continue;

    const file = await driveReadFile(endpoint, token, meta.name);
    if (!file.exists || !file.content) continue;

    // Defensive: allow arrays (most data) and objects (alertSettings).
    // Skip anything else (null, string, number) which would crash consumers.
    const isArray = Array.isArray(file.content);
    const isObject = file.content && typeof file.content === 'object' && !isArray;
    const isAlertSettings = parsed.kind === 'alertSettings';
    if (!isArray && !(isAlertSettings && isObject)) {
      console.warn('[Drive] Skipping unexpected file content', meta.name, typeof file.content);
      continue;
    }

    foundAny = true;

    if (parsed.kind === 'articles') {
      result.articles = file.content;
    } else if (parsed.kind === 'recipes') {
      result.recipes = file.content;
    } else if (parsed.kind === 'menus') {
      result.menus = file.content;
    } else if (parsed.kind === 'inventories') {
      result.inventories = file.content;
    } else if (parsed.kind === 'energy') {
      result.energy = file.content;
    } else if (parsed.kind === 'equipment') {
      result.equipment = file.content;
    } else if (parsed.kind === 'equipmentPurchases') {
      result.equipmentPurchases = file.content;
    } else if (parsed.kind === 'equipmentInventories') {
      result.equipmentInventories = file.content;
    } else if (parsed.kind === 'assets') {
      result.assets = file.content;
    } else if (parsed.kind === 'assetMaintenance') {
      result.assetMaintenance = file.content;
    } else if (parsed.kind === 'assetInterventions') {
      result.assetInterventions = file.content;
    } else if (parsed.kind === 'alertSettings') {
      result.alertSettings = file.content; // object, not array
    } else if (parsed.kind === 'purchases') {
      result.purchases = result.purchases.concat(file.content);
    } else if (parsed.kind === 'sales') {
      result.sales = result.sales.concat(file.content);
    }
  }

  return foundAny ? result : null;
}

/**
 * Writes the listed files (by filename) to Drive. Used for incremental sync.
 * Returns the number of files successfully written.
 */
async function driveWriteSpecificFiles(endpoint, token, filesToWrite) {
  let count = 0;
  for (const [filename, content] of Object.entries(filesToWrite)) {
    await driveWriteFile(endpoint, token, filename, content);
    count++;
  }
  return count;
}

// ─── Snapshots de sauvegarde horodatés ──────────────────────────────────────
// Filet de sécurité : dépose une copie COMPLÈTE et datée des données sous
// `backup-YYYY-MM-DD.json`. Ces fichiers ne sont jamais relus au démarrage
// (parseFilename renvoie null → ignorés au pull), donc ils ne peuvent pas
// écraser les données courantes. Ils servent uniquement d'archive à restaurer
// manuellement en cas d'accident.
//
// Règles :
//   • 1 snapshot par jour maximum (le nom inclut la date → réécriture du jour)
//   • rotation à 30 : si 30 snapshots existent déjà et qu'on en crée un
//     nouveau (date encore absente), on réutilise le nom du PLUS ANCIEN.
//     Comme l'Apps Script n'expose pas d'action "delete", écraser le plus
//     vieux fichier revient au même que le supprimer puis recréer.

const BACKUP_PREFIX = 'backup-';
const BACKUP_MAX = 30;

function backupFilenameForDate(d = new Date()) {
  // Date locale (Martinique UTC-4) — on ne veut pas que le nom saute d'un jour
  // à cause d'une conversion UTC.
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${BACKUP_PREFIX}${y}-${m}-${day}.json`;
}

function isBackupFilename(name) {
  return /^backup-\d{4}-\d{2}-\d{2}\.json$/.test(name);
}

/**
 * Crée (ou met à jour) le snapshot du jour, avec rotation à BACKUP_MAX.
 * `fullData` est l'enveloppe complète { articles, recipes, menus, ... }.
 * Retourne le nom du fichier écrit, ou null si rien n'a été fait.
 */
async function driveWriteDatedBackup(endpoint, token, fullData) {
  const todayName = backupFilenameForDate();

  // Liste des snapshots existants
  const allFiles = await driveListFiles(endpoint, token);
  const backups = allFiles.filter((f) => isBackupFilename(f.name)).map((f) => f.name).sort();

  // Si le snapshot du jour existe déjà, on l'écrase (1/jour) — sinon rotation
  let targetName = todayName;
  if (!backups.includes(todayName) && backups.length >= BACKUP_MAX) {
    // On réutilise le nom du plus ancien (premier dans l'ordre alphabétique =
    // chronologique pour ce format de date). Le contenu daté reste correct car
    // le snapshot lui-même porte sa propre date d'export à l'intérieur.
    targetName = backups[0];
  }

  const payload = {
    ...fullData,
    _backupMeta: {
      exportedAt: new Date().toISOString(),
      label: todayName,
      appVersion: 5,
    },
  };

  await driveWriteFile(endpoint, token, targetName, payload);
  console.log('[Drive] Snapshot écrit :', targetName, '(', backups.length, 'snapshots existants )');
  return targetName;
}


// ═══════════════════════════════════════════════════════════════════════════
//   DRIVE SYNC HOOK
// ═══════════════════════════════════════════════════════════════════════════

/**
 * Manages Google Drive synchronization via the Apps Script Web App.
 * The hook is intentionally non-blocking: the app remains fully usable even if
 * Drive is unreachable.
 *
 * Status values:
 *   'disabled'  → sync is off, nothing happens
 *   'idle'      → sync is on, everything is up to date
 *   'dirty'     → local has unsynced changes, push is scheduled
 *   'syncing'   → push or pull is in flight
 *   'error'     → last sync attempt failed, retry on next change
 */
function useDriveSync({ data, applyRemoteData }) {
  const [enabled, setEnabled] = useState(false);
  const [endpoint, setEndpoint] = useState('');
  const [token, setToken] = useState('');
  const [status, setStatus] = useState('disabled');
  const [lastSyncedAt, setLastSyncedAt] = useState(null);
  const [error, setError] = useState(null);

  // Conflict prompt state — shown when remote is non-empty at enable-time
  const [pendingConflict, setPendingConflict] = useState(null);

  // Refs to avoid stale closures inside the debounce timer
  const debounceTimer = useRef(null);
  const dataRef = useRef(data);
  const enabledRef = useRef(enabled);
  const endpointRef = useRef(endpoint);
  const tokenRef = useRef(token);
  const lastSyncedSplitRef = useRef(null); // snapshot of last successfully-pushed split
  const lastBackupDateRef = useRef(null);  // 'YYYY-MM-DD' du dernier snapshot daté créé

  useEffect(() => { dataRef.current = data; }, [data]);
  useEffect(() => { enabledRef.current = enabled; }, [enabled]);
  useEffect(() => { endpointRef.current = endpoint; }, [endpoint]);
  useEffect(() => { tokenRef.current = token; }, [token]);

  // ─── Initial load: read persisted sync preferences ───────────────────────
  useEffect(() => {
    (async () => {
      const wasEnabled = await storageGet(DRIVE_STORAGE_KEYS.enabled, false);
      const savedEndpoint = await storageGet(DRIVE_STORAGE_KEYS.endpoint, '');
      const savedToken = await storageGet(DRIVE_STORAGE_KEYS.token, '');
      const lastSync = await storageGet(DRIVE_STORAGE_KEYS.lastSyncedAt, null);
      lastBackupDateRef.current = await storageGet(DRIVE_STORAGE_KEYS.lastBackupDate, null);

      setEnabled(wasEnabled);
      setEndpoint(savedEndpoint);
      setToken(savedToken);
      setLastSyncedAt(lastSync);
      setStatus(wasEnabled ? 'idle' : 'disabled');
    })();
  }, []);

  // ─── Push: serialize local data and write changed files to Drive ─────────
  const push = useCallback(async () => {
    if (!enabledRef.current) return;
    if (!endpointRef.current || !tokenRef.current) return;

    setStatus('syncing');
    setError(null);

    try {
      const d = dataRef.current;
      console.log('[Drive] Push start — état local:', {
        articles: d?.articles?.length ?? '?',
        recipes: d?.recipes?.length ?? '?',
        menus: d?.menus?.length ?? '?',
        purchases: d?.purchases?.length ?? '?',
        sales: d?.sales?.length ?? '?',
        energy: d?.energy?.length ?? '?',
        equipment: d?.equipment?.length ?? '?',
        assets: d?.assets?.length ?? '?',
      });
      const nextSplit = splitDataIntoFiles(dataRef.current);
      const filesToPush = lastSyncedSplitRef.current
        ? Object.fromEntries(
            diffFiles(lastSyncedSplitRef.current, nextSplit)
              .map((name) => [name, nextSplit[name]])
              .filter(([, v]) => v !== undefined) // skip deleted/missing files
          )
        : nextSplit; // first push: write everything

      const fileCount = Object.keys(filesToPush).length;
      if (fileCount === 0) {
        console.log('[Drive] Nothing to push');
        setStatus('idle');
        return;
      }

      const pushDetails = Object.entries(filesToPush).map(([name, val]) => {
        const size = Array.isArray(val) ? val.length + ' items' : typeof val;
        return name + '(' + size + ')';
      }).join(', ');
      console.log('[Drive] Pushing', fileCount, 'file(s):', pushDetails);
      await driveWriteSpecificFiles(endpointRef.current, tokenRef.current, filesToPush);

      lastSyncedSplitRef.current = nextSplit;
      const now = new Date().toISOString();
      setLastSyncedAt(now);
      setStatus('idle');
      await storageSet(DRIVE_STORAGE_KEYS.lastSyncedAt, now);

      console.log('[Drive] Push succeeded at', now);

      // ─── Snapshot daté (max 1/jour) ───────────────────────────────────────
      // Best-effort : un échec de snapshot ne doit jamais faire échouer le sync.
      // On ne crée un snapshot qu'une fois par jour calendaire local.
      const todayKey = backupFilenameForDate().replace('backup-', '').replace('.json', '');
      if (lastBackupDateRef.current !== todayKey) {
        try {
          await driveWriteDatedBackup(endpointRef.current, tokenRef.current, dataRef.current);
          lastBackupDateRef.current = todayKey;
          await storageSet(DRIVE_STORAGE_KEYS.lastBackupDate, todayKey);
        } catch (backupErr) {
          // On log mais on n'interrompt pas : le sync principal a réussi.
          console.warn('[Drive] Snapshot quotidien échoué (sync OK):', backupErr.message);
        }
      }
    } catch (err) {
      console.error('[Drive] Push failed:', err);
      setError(err.message || String(err));
      setStatus('error');
    }
  }, []);

  // ─── Pull: read all Drive files and apply them to local state ────────────
  const pull = useCallback(async () => {
    if (!enabledRef.current) return null;
    if (!endpointRef.current || !tokenRef.current) return null;

    setStatus('syncing');
    setError(null);

    try {
      const remoteData = await driveReadAll(endpointRef.current, tokenRef.current);

      if (!remoteData) {
        setStatus('idle');
        return null;
      }

      console.log('[Drive] Pull received:', {
        articles: remoteData.articles?.length ?? 'n/a',
        recipes: remoteData.recipes?.length ?? 'n/a',
        menus: remoteData.menus?.length ?? 'n/a',
        purchases: remoteData.purchases?.length ?? 'n/a',
        sales: remoteData.sales?.length ?? 'n/a',
        inventories: remoteData.inventories?.length ?? 'n/a',
        energy: remoteData.energy?.length ?? 'n/a',
        equipment: remoteData.equipment?.length ?? 'n/a',
        assets: remoteData.assets?.length ?? 'n/a',
      });
      applyRemoteData(remoteData);
      lastSyncedSplitRef.current = splitDataIntoFiles(remoteData);

      const now = new Date().toISOString();
      setLastSyncedAt(now);
      setStatus('idle');
      await storageSet(DRIVE_STORAGE_KEYS.lastSyncedAt, now);

      console.log('[Drive] Pull succeeded at', now);
      return remoteData;
    } catch (err) {
      console.error('[Drive] Pull failed:', err);
      setError(err.message || String(err));
      setStatus('error');
      return null;
    }
  }, [applyRemoteData]);

  // ─── scheduleSync: called whenever local data changes (debounced) ────────
  const scheduleSync = useCallback(() => {
    if (!enabledRef.current) return;
    console.log('[Drive] scheduleSync → push dans', DRIVE_DEBOUNCE_MS, 'ms');
    setStatus('dirty');
    if (debounceTimer.current) clearTimeout(debounceTimer.current);
    debounceTimer.current = setTimeout(() => { push(); }, DRIVE_DEBOUNCE_MS);
  }, [push]);

  // ─── Auto-pull: poll Drive every DRIVE_POLL_INTERVAL_MS for remote changes ─
  // Visibility-aware: skip when the tab is hidden (saves quotas + battery).
  // Also skipped when status is 'syncing' or 'dirty' (a push is in flight or
  // pending — we don't want to pull stale data over our local changes).
  const pullRef = useRef(pull);
  useEffect(() => { pullRef.current = pull; }, [pull]);

  useEffect(() => {
    if (!enabled) return;
    if (typeof document === 'undefined') return;

    const tick = () => {
      if (document.hidden) return;
      if (!enabledRef.current) return;
      // Don't pull while a push is queued or in flight, or we'd risk pulling
      // stale data right before our push lands.
      if (debounceTimer.current) return;
      // Use the latest pull via ref to avoid restarting the interval each render.
      pullRef.current();
    };

    const intervalId = setInterval(tick, DRIVE_POLL_INTERVAL_MS);

    // Also pull immediately when the tab becomes visible again (no need to
    // wait up to 10s if the user just came back).
    const visibilityHandler = () => {
      if (!document.hidden) tick();
    };
    document.addEventListener('visibilitychange', visibilityHandler);

    return () => {
      clearInterval(intervalId);
      document.removeEventListener('visibilitychange', visibilityHandler);
    };
  }, [enabled]);

  // ─── enable: turn sync on, with conflict detection ───────────────────────
  // Requires endpoint and token to be saved first via setCredentials()
  const enable = useCallback(async (newEndpoint, newToken) => {
    setStatus('syncing');
    setError(null);

    try {
      // Persist credentials
      const finalEndpoint = newEndpoint || endpointRef.current;
      const finalToken = newToken || tokenRef.current;

      if (!finalEndpoint || !finalToken) {
        throw new Error('URL ou token manquant');
      }

      setEndpoint(finalEndpoint);
      setToken(finalToken);
      await storageSet(DRIVE_STORAGE_KEYS.endpoint, finalEndpoint);
      await storageSet(DRIVE_STORAGE_KEYS.token, finalToken);

      // Read what's currently on Drive
      const remoteData = await driveReadAll(finalEndpoint, finalToken);

      if (!remoteData) {
        // Folder is empty → push our local data as the initial save
        const split = splitDataIntoFiles(dataRef.current);
        await driveWriteSpecificFiles(finalEndpoint, finalToken, split);
        lastSyncedSplitRef.current = split;

        const now = new Date().toISOString();
        setLastSyncedAt(now);
        setEnabled(true);
        setStatus('idle');
        await storageSet(DRIVE_STORAGE_KEYS.lastSyncedAt, now);
        await storageSet(DRIVE_STORAGE_KEYS.enabled, true);
        return;
      }

      // Remote data exists → user must choose
      const remoteCounts = {
        articles: remoteData.articles?.length || 0,
        recipes: remoteData.recipes?.length || 0,
        purchases: remoteData.purchases?.length || 0,
        sales: remoteData.sales?.length || 0,
      };
      setPendingConflict({
        remoteData,
        remoteCounts,
        // No single timestamp (we have many files); we just say "Drive a déjà des données"
      });
      setStatus('idle');
    } catch (err) {
      console.error('[Drive] Enable failed:', err);
      setError(err.message || String(err));
      setStatus('error');
    }
  }, []);

  // ─── User chose to keep their LOCAL data and overwrite remote ────────────
  const resolveConflictKeepLocal = useCallback(async () => {
    if (!pendingConflict) return;
    setStatus('syncing');

    try {
      const split = splitDataIntoFiles(dataRef.current);
      await driveWriteSpecificFiles(endpointRef.current, tokenRef.current, split);
      lastSyncedSplitRef.current = split;

      const now = new Date().toISOString();
      setLastSyncedAt(now);
      setEnabled(true);
      setStatus('idle');
      setPendingConflict(null);
      await storageSet(DRIVE_STORAGE_KEYS.lastSyncedAt, now);
      await storageSet(DRIVE_STORAGE_KEYS.enabled, true);
    } catch (err) {
      console.error('[Drive] Conflict resolution (keep local) failed:', err);
      setError(err.message || String(err));
      setStatus('error');
    }
  }, [pendingConflict]);

  // ─── User chose to LOAD remote and replace local ─────────────────────────
  const resolveConflictKeepRemote = useCallback(async () => {
    if (!pendingConflict) return;

    applyRemoteData(pendingConflict.remoteData);
    lastSyncedSplitRef.current = splitDataIntoFiles(pendingConflict.remoteData);

    const now = new Date().toISOString();
    setLastSyncedAt(now);
    setEnabled(true);
    setStatus('idle');
    setPendingConflict(null);
    await storageSet(DRIVE_STORAGE_KEYS.lastSyncedAt, now);
    await storageSet(DRIVE_STORAGE_KEYS.enabled, true);
  }, [pendingConflict, applyRemoteData]);

  const cancelConflict = useCallback(() => {
    setPendingConflict(null);
    setStatus(enabledRef.current ? 'idle' : 'disabled');
  }, []);

  // ─── disable: turn sync off (does not delete the Drive folder) ───────────
  const disable = useCallback(async () => {
    if (debounceTimer.current) clearTimeout(debounceTimer.current);
    setEnabled(false);
    setStatus('disabled');
    setError(null);
    lastSyncedSplitRef.current = null;
    await storageSet(DRIVE_STORAGE_KEYS.enabled, false);
  }, []);

  // ─── forceSync: manual button to push immediately ────────────────────────
  const forceSync = useCallback(() => {
    if (debounceTimer.current) clearTimeout(debounceTimer.current);
    push();
  }, [push]);

  // ─── backupNow: crée un snapshot daté immédiatement (bouton manuel) ───────
  // Contourne la limite "1/jour" : force la création/écrasement du snapshot
  // du jour. Utile pour créer le premier filet de sécurité tout de suite.
  const backupNow = useCallback(async () => {
    if (!endpointRef.current || !tokenRef.current) {
      throw new Error('Sync Drive non configurée');
    }
    setStatus('syncing');
    try {
      const name = await driveWriteDatedBackup(endpointRef.current, tokenRef.current, dataRef.current);
      const todayKey = backupFilenameForDate().replace('backup-', '').replace('.json', '');
      lastBackupDateRef.current = todayKey;
      await storageSet(DRIVE_STORAGE_KEYS.lastBackupDate, todayKey);
      setStatus('idle');
      return name;
    } catch (err) {
      setStatus('error');
      setError(err.message || String(err));
      throw err;
    }
  }, []);

  // Cleanup any pending timer on unmount
  useEffect(() => {
    return () => {
      if (debounceTimer.current) clearTimeout(debounceTimer.current);
    };
  }, []);

  return {
    enabled,
    endpoint,
    token,
    status,
    lastSyncedAt,
    error,
    pendingConflict,
    enable,
    disable,
    scheduleSync,
    forceSync,
    backupNow,
    pull,
    resolveConflictKeepLocal,
    resolveConflictKeepRemote,
    cancelConflict,
  };
}

//   AI INVOICE SCAN PROMPT
// ═══════════════════════════════════════════════════════════════════════════

const DEFAULT_SCAN_PROMPT = `Tu es expert en factures fournisseurs pour la restauration (Antilles/Martinique + Métropole).
Fournisseurs courants : SOFRIMA, CAREX SAS, MULTIGROS, CARIDRINK, MHE, MHP, CALYPSO, ERPEM, SAS EDOUARD, ROGER ALBERT, LEVERT EMBALLAGES, EQUIP'PRO.

RÈGLE CRITIQUE HT vs TTC :
Tous les montants doivent être en HT. Utilise toujours la colonne "Prix U. HT" (ou PUHT, Prix Net HT) × Qté.
Ne jamais utiliser la colonne TTC. Vérification : somme des items ≈ Total HT affiché en bas.

LIGNES À EXCLURE (ne pas créer d'item) :
- COTISATION LOCALE / IMPORT, ECO-PARTICIPATION, PLV, STOP TROTTOIR : taxes et pub
- CONSIGNE, DEPOT DE GARANTIE : consignes de bouteilles/fûts
- FRAIS DE PORT, MAIN D'OEUVRE, LIVRAISON si ligne séparée

RÈGLES DE QUANTITÉ PAR FOURNISSEUR :

SOFRIMA — colonnes : Article | colis | Qté/poids | U/V | Désignation | Prix Net HT | Montant HT | TVA | V.effectif | Pcb
- Qté/poids = quantité TOTALE (déjà multipliée par colis), pareil que MULTIGROS
- U/V : "K" = kg (la quantité est DÉJÀ en kg) ; "U" = unité (à convertir selon poids/volume du libellé)
- V.effectif = volume effectif PAR UNITÉ (1,000 = 1 L ; 5,000 = 5 L ; 50,000 = 50 cl)
- Pcb = unités par colis (info indicative, ne pas l'utiliser pour calculer rawQty)
- Codes TVA : 1 = 0% / 2 = 2,10% / 3 = 8,50% (alcools)
- "2K5" = 2.5kg, "10K" = 10kg, "800G" = 0.8kg, "1L5" = 1.5L
PRODUITS SOFRIMA À RÈGLES SPÉCIFIQUES :
- Code 1308010 "COCA-COLA BTLLE 50CL" : 1 U = pack de 8 bouteilles 50cl
  → rawQty = nb_U × 8 × 0.5 en L, rawUnit = "L" (~0,98€/btl, ~1,96€/L)
- Code 1302156 "COCA-COLA ZERO 50CL" : bouteille individuelle
  → rawQty = nb_U × 0.5 en L, rawUnit = "L" (~0,85€/btl)
- "LAIT NEUTRE 1/2 ECREME" : briques 1L
  → rawQty = nb_U en L, rawUnit = "L"
- "CABRI DECOUPE 2KG X 5" : prix indiqué = 19,14€/kg, la Qté est en kg même si affichée "U"
  → rawQty = Qté en kg

MULTIGROS — colonnes : Colis | Qté | T | Prix U.HT | Montant HT
- Qté = quantité TOTALE (ne pas multiplier Colis × Qté)
- Vérification OBLIGATOIRE : Prix U.HT × Qté = Montant HT
- Exemple : Colis=2, Qté=24, Prix=2.50 → rawQty=24, total=60€

CAREX SAS — libellés avec "box Nkg" ou "BOX Nkg"
- unit_weight_kg = N (poids du carton, pas du sachet)
- Exemple : "sac 6*1.5kg box 9kg" → unit_weight_kg=9

RÈGLES DE CONVERSION D'UNITÉS :

MULTIPLICATEUR "NKG X M" (PRIORITAIRE) :
- "CABRI DECOUPE 2KG X 5" = 1 colis de 5 pièces × 2kg = 10kg → unit_weight_kg=10
- Vérification : prix/kg viande > 5€, poisson noble > 8€. Si trop bas → recalculer.

BOISSONS et CONSERVES EN COLIS → toujours en pièces :
- "C12", "C24", "X6", "X12" dans le libellé = nb d'unités par colis
- "COCA COLA 50CL C24", 2 colis → rawQty=48, rawUnit="pièce"
- "MAXI MAINS 450F BLANC ECO X6", 2 colis → rawQty=12, rawUnit="pièce"
- Exception : fûts (FUT, KEG) restent en U

CONSERVES de fruits/légumes/lait concentré → en kg :
- rawQty = nb_boîtes × poids_unitaire_kg
- "ANANAS SIR TR 3/4 565G", 24 pièces → rawQty=13.56, rawUnit="kg"
- "TOMATES CONCASSEES 5/1", 3 boîtes → rawQty=12 (3×4kg), rawUnit="kg"
- Lait UHT/frais en brique (ex: "LAIT 1/2 ECREME 1L", "LAIT NEUTRE 1/2 ECREME") → reste en L

PRODUITS LIQUIDES en bidon/seau → en litres :
- rawQty = nb_unités × volume_L
- "HUILE TOURNESOL 5L", 6 pièces → rawQty=30, rawUnit="L"
- "MOUTARDE DIJON SEAU 5L", 2 pièces → rawQty=10, rawUnit="L"
- Exception : bidons non-alimentaires (détergent, javel) → restent en pièce

OEUFS en plateaux → en pièces :
- "PL 30/OEUF" = plateau de 30 → rawQty = nb_plateaux × 30, rawUnit="pièce"

DOUZAINES :
- "DZ" en préfixe = douzaine → rawQty = nb × 12
- "DZ CTX STEAK", 9 → rawQty=108, rawUnit="pièce"

ÉQUIPEMENTS (matériel durable) → kind="equipment" :
- Outillage, vaisselle pro, mobilier, électroménager, bacs gastro
- Exemple : "ASSIETTE A STEAK TIVOLI", 10 → kind="equipment", rawQty=10, rawUnit="pièce"

Réponds UNIQUEMENT en JSON strict (zéro markdown) :
{
  "supplier": "...",
  "date": "YYYY-MM-DD",
  "invoice_number": "...",
  "total_ht": 0.00,
  "total_ttc": 0.00,
  "kind": "supply",
  "items": [
    {
      "raw_label": "libellé exact",
      "product_name": "nom simplifié",
      "raw_qty": 0,
      "raw_unit": "kg|L|pièce|U|sachet",
      "unit_weight_kg": 0.0,

      "master_unit": "kg",
      "total_ht": 0.00,

    }
  ]
}

Exemples clés :
- "CREVET.EAU DOUCE 6/8 800G VIET", 40 U → 40×0.8=32kg → 11.31€/kg
- "CUISSE DE POULET VRAC 10K", 4 U → 40kg → 2.82€/kg
- "CABRI DECOUPE 2KG X 5", 1 colis → 10kg → 19.14€/kg
- "LENTILLE BLONDE 1KG BINA" MULTIGROS Qté=24 → rawQty=24, rawUnit="kg"
- "COCA COLA 50CL" MULTIGROS Qté=80 → rawQty=80, rawUnit="pièce"

- SOFRIMA "LAIT NEUTRE 1/2 ECREME", 6 U → rawQty=6 L`;

/**
 * Reads a JSON object from a possibly-noisy LLM response.
 * Strips code fences and slices between the first '{' and last '}' to be
 * tolerant of preamble/postamble text.
 */
function extractInvoiceJson(rawText) {
  if (!rawText) throw new Error('Réponse vide du modèle');
  const cleaned = rawText.replace(/```json|```/g, '').trim();
  const firstBrace = cleaned.indexOf('{');
  const lastBrace = cleaned.lastIndexOf('}');
  if (firstBrace === -1 || lastBrace === -1 || lastBrace < firstBrace) {
    throw new Error('Aucun objet JSON trouvé dans la réponse');
  }
  return JSON.parse(cleaned.slice(firstBrace, lastBrace + 1));
}

/**
 * Scans a single PDF/image file with Claude and returns a normalized invoice object,
 * already mapped against the provided articles catalog (so each line has
 * articleId/variantId set when a match is found).
 *
 * Used by both single-scan and batch-scan flows. The `articles` argument
 * is the latest snapshot — for batch flows the caller should pass an updated
 * snapshot between invoices to leverage progressive learning of aliases.
 */
async function scanInvoiceFile(file, articles) {
  // Step 1: read file as base64
  const base64 = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = () => reject(new Error('Lecture du fichier échouée'));
    reader.readAsDataURL(file);
  });

  // Step 2: build content block matching file type
  const sourceBlock = file.type.startsWith('image/')
    ? { type: 'image', source: { type: 'base64', media_type: file.type, data: base64 } }
    : { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } };

  // Step 3: call API with the user's chosen model + API key
  const chosenModel = await storageGet(STORAGE_KEYS.aiModel, DEFAULT_AI_MODEL);
  const scanPrompt = await storageGet(STORAGE_KEYS.scanPrompt, DEFAULT_SCAN_PROMPT);
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: chosenModel,
      max_tokens: 4096,
      messages: [{ role: 'user', content: [sourceBlock, { type: 'text', text: scanPrompt }] }],
    }),
  });

  if (!response.ok) {
    const errText = await response.text();
    throw new Error('HTTP ' + response.status + ' : ' + errText.slice(0, 200));
  }

  const data = await response.json();
  if (data.error) {
    throw new Error('Erreur API : ' + (data.error.message || JSON.stringify(data.error)));
  }

  const textBlock = data.content?.find((c) => c.type === 'text');
  const rawText = textBlock ? textBlock.text : '';
  if (!rawText) throw new Error("Le modèle n'a renvoyé aucun texte");

  const parsed = extractInvoiceJson(rawText);
  if (!parsed.items || !Array.isArray(parsed.items)) {
    throw new Error('Le JSON ne contient pas de tableau "items"');
  }

  // Step 4: map each scanned line against existing articles/variants
  const mappedItems = parsed.items.map((item) => {
    const match = findArticleByLabel(item.raw_label || item.product_name || '', articles);
    return {
      articleId: match ? match.article.id : '',
      variantId: match ? match.variant.id : '',
      productName: item.product_name || '',
      label: item.raw_label || item.product_name || '',
      rawQty: item.raw_qty || 0,
      rawUnit: item.raw_unit || 'kg',
      convertedQty: item.converted_qty || 0,
      masterUnit: item.master_unit || 'kg',
      pricePerMasterUnit: item.price_per_master_unit || 0,
      total: item.total_ht || 0,
      packagingDesc: item.packaging_description || '',
    };
  });

  return {
    date: parsed.date || new Date().toISOString().slice(0, 10),
    supplier: parsed.supplier || '',
    invoiceNumber: parsed.invoice_number || '',
    total: parsed.total_ht || parsed.total_ttc || 0,
    items: mappedItems,
  };
}

function PeriodSelector({ period, setPeriod, customFrom, setCustomFrom, customTo, setCustomTo }) {
  const options = [
    // 7 jours retiré : trop bruité en restauration (variabilité hebdomadaire forte).
    // On commence à 30 jours, qui est le plus petit horizon vraiment lisible.
    ['30j', '30J'],
    ['90j', '90J'],
    ['365j', '1A'],
    ['all', 'Tout'],
    ['custom', 'Personnalisé'],
  ];

  const buttonStyle = (isActive) => ({
    padding: '6px 12px',
    borderRadius: 6,
    fontSize: 12,
    fontWeight: 600,
    cursor: 'pointer',
    fontFamily: 'DM Sans, sans-serif',
    background: isActive ? palette.ink : 'transparent',
    color: isActive ? palette.cream : palette.inkSoft,
    border: '1px solid ' + (isActive ? palette.ink : palette.rule),
  });

  // Format YYYY-MM-DD → DD/MM for the active "Personnalisé" pill
  const formatDateShort = (iso) => {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    return `${d}/${m}`;
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 8 }}>
      {/* Buttons row */}
      <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', justifyContent: 'flex-end' }}>
        {options.map(([key, label]) => {
          const isActive = period === key;
          const showRange = key === 'custom' && isActive && customFrom && customTo;

          return (
            <button key={key} onClick={() => setPeriod(key)} style={buttonStyle(isActive)}>
              {label}
              {showRange && (
                <span style={{ marginLeft: 6, opacity: 0.7, fontWeight: 500 }}>
                  {formatDateShort(customFrom)} – {formatDateShort(customTo)}
                </span>
              )}
            </button>
          );
        })}
      </div>

      {/* Date inputs revealed when "Personnalisé" is active */}
      {period === 'custom' && (
        <div
          style={{
            display: 'flex',
            alignItems: 'center',
            gap: 8,
            padding: '8px 12px',
            background: palette.paper,
            borderRadius: 6,
            border: `1px solid ${palette.rule}`,
          }}
        >
          <span style={{ fontSize: 11, fontWeight: 600, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: 0.5 }}>
            Du
          </span>
          <input
            type="date"
            className="mc-input"
            value={customFrom}
            onChange={(e) => setCustomFrom(e.target.value)}
            style={{ width: 140, padding: '4px 8px', fontSize: 12 }}
          />
          <span style={{ fontSize: 11, fontWeight: 600, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: 0.5 }}>
            au
          </span>
          <input
            type="date"
            className="mc-input"
            value={customTo}
            onChange={(e) => setCustomTo(e.target.value)}
            style={{ width: 140, padding: '4px 8px', fontSize: 12 }}
          />
        </div>
      )}
    </div>
  );
}

// ─── SegmentedToggle ──────────────────────────────────────────────────────
//
// Sélecteur en mode segmenté (style iOS) pour basculer entre 2-4 vues. Utilisé
// p.ex. dans RecipesView (Recettes | Menus) et EquipmentView (Petit | Gros).
//
// Props :
//   options   : [{ id: string, label: ReactNode }]  — 2 à 4 segments
//   value     : id du segment actif
//   onChange  : (id) => void
//   align     : 'start' (défaut) | 'center' | 'end' — alignement horizontal
//   size      : 'md' (défaut) | 'sm' — réduit padding/font pour usages compacts
//
// L'implémentation est volontairement plate (boutons, pas de input radio),
// car les segments n'ont pas vocation à être inclus dans un formulaire HTML.

function SegmentedToggle({ options, value, onChange, align = 'start', size = 'md' }) {
  const padding = size === 'sm' ? '6px 12px' : '8px 16px';
  const fontSize = size === 'sm' ? 12 : 13;
  const alignSelf = align === 'center' ? 'center' : align === 'end' ? 'flex-end' : 'flex-start';

  return (
    <div style={{
      display: 'inline-flex',
      alignSelf,
      background: palette.paper,
      border: `1px solid ${palette.rule}`,
      borderRadius: 8,
      padding: 3,
      gap: 2,
    }}>
      {options.map((opt) => {
        const active = value === opt.id;
        return (
          <button
            key={opt.id}
            type="button"
            onClick={() => onChange(opt.id)}
            style={{
              padding,
              background: active ? palette.cream : 'transparent',
              border: 'none',
              borderRadius: 6,
              color: active ? palette.wine : palette.inkSoft,
              fontWeight: active ? 600 : 400,
              cursor: 'pointer',
              fontSize,
              boxShadow: active ? '0 1px 2px rgba(0,0,0,0.05)' : 'none',
              fontFamily: 'inherit',
              transition: 'background 140ms ease, color 140ms ease',
            }}
          >
            {opt.label}
          </button>
        );
      })}
    </div>
  );
}

//
// État vide unifié : utilisé partout où une liste/section est vide. Centralise
// le pattern "carte grise + message + (optionnel) icône + (optionnel) CTA"
// répété ~10 fois dans l'app avec des styles légèrement différents.
//
// Props :
//   icon        : composant lucide-react (ex: Package) — optionnel
//   title       : message principal (ex: "Aucun menu")
//   description : ligne secondaire (ex: 'Cliquez sur "Nouveau menu" pour commencer')
//   action      : { label, onClick } — bouton CTA optionnel
//   compact     : true pour un rendu inline plus discret (inline-block, padding réduit)

function EmptyState({ icon: Icon, title, description, action, compact = false }) {
  if (compact) {
    return (
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,
        padding: 6, fontSize: 11, color: palette.inkSoft,
      }}>
        {Icon && <Icon size={14} style={{ flexShrink: 0, opacity: 0.6 }} />}
        <span>{title}</span>
      </div>
    );
  }
  return (
    <div
      className="mc-card"
      style={{
        padding: 32, textAlign: 'center', color: palette.inkSoft,
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10,
      }}
    >
      {Icon && (
        <div style={{
          width: 44, height: 44, borderRadius: 999,
          background: palette.paper, display: 'flex',
          alignItems: 'center', justifyContent: 'center',
        }}>
          <Icon size={20} style={{ color: palette.inkSoft }} />
        </div>
      )}
      <div style={{ fontSize: 14, fontWeight: 600, color: palette.ink }}>
        {title}
      </div>
      {description && (
        <div style={{ fontSize: 13, color: palette.inkSoft, maxWidth: 380, lineHeight: 1.5 }}>
          {description}
        </div>
      )}
      {action && (
        <button
          onClick={action.onClick}
          className="mc-btn mc-btn-primary"
          style={{ marginTop: 4 }}
        >
          {action.label}
        </button>
      )}
    </div>
  );
}

// ─── Skeleton ─────────────────────────────────────────────────────────────
//
// Bloc gris animé qui occupe l'espace pendant un chargement. Préférable à
// un spinner pour le perçu : l'utilisateur voit déjà la structure de la page,
// pas juste un blanc + cercle qui tourne.
//
// Props :
//   width   : largeur (ex: '100%', 200) — défaut '100%'
//   height  : hauteur (ex: 16, 60) — défaut 14
//   radius  : border-radius — défaut 4 (8 pour cards, 999 pour pills)
//   block   : true → display:block + margin top, sinon inline-block

function Skeleton({ width = '100%', height = 14, radius = 4, block = false, style = {} }) {
  return (
    <span
      aria-hidden="true"
      style={{
        display: block ? 'block' : 'inline-block',
        width, height, borderRadius: radius,
        background: `linear-gradient(90deg, ${palette.paper} 0%, ${palette.rule} 50%, ${palette.paper} 100%)`,
        backgroundSize: '200% 100%',
        animation: 'mc-skeleton-shimmer 1.4s ease-in-out infinite',
        ...style,
      }}
    />
  );
}

// ─── ErrorBoundary ────────────────────────────────────────────────────────

class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null, info: null };
  }

  static getDerivedStateFromError(error) {
    return { error };
  }

  componentDidCatch(error, info) {
    console.error('[ErrorBoundary] Caught error:', error);
    console.error('[ErrorBoundary] Component stack:', info?.componentStack);
    this.setState({ info });
  }

  render() {
    if (!this.state.error) return this.props.children;

    return (
      <div style={{
        padding: 32, maxWidth: 800, margin: '64px auto', fontFamily: 'system-ui, sans-serif',
      }}>
        <h2 style={{ color: palette.wine, margin: '0 0 16px' }}>
          Erreur dans l'application
        </h2>
        <p style={{ fontSize: 14, color: palette.inkSoft }}>
          La Tambouille a rencontré un problème pendant l'affichage. Les détails
          techniques ci-dessous aident à diagnostiquer.
        </p>
        <pre style={{
          background: palette.paper, padding: 16, borderRadius: 6, fontSize: 12,
          overflow: 'auto', marginTop: 16, color: palette.wine, fontWeight: 600,
        }}>
          {this.state.error.message || String(this.state.error)}
        </pre>
        {this.state.info && (
          <details style={{ marginTop: 16, fontSize: 11 }}>
            <summary style={{ cursor: 'pointer', color: palette.inkSoft }}>
              Pile d'appels (component stack)
            </summary>
            <pre style={{
              background: palette.paper, padding: 12, borderRadius: 6,
              overflow: 'auto', marginTop: 8, color: palette.inkSoft,
            }}>
              {this.state.info.componentStack}
            </pre>
          </details>
        )}
        <div style={{ marginTop: 24, display: 'flex', gap: 8 }}>
          <button
            onClick={() => window.location.reload()}
            style={{
              padding: '10px 18px', background: palette.wine, color: palette.cream,
              border: 'none', borderRadius: 6, cursor: 'pointer',
              fontSize: 13, fontWeight: 600,
            }}
          >
            Recharger l'application
          </button>
          <button
            onClick={() => this.setState({ error: null, info: null })}
            style={{
              padding: '10px 18px', background: 'transparent', color: palette.inkSoft,
              border: `1px solid ${palette.rule}`, borderRadius: 6, cursor: 'pointer',
              fontSize: 13,
            }}
          >
            Réessayer
          </button>
        </div>
      </div>
    );
  }
}

/**
 * Compact status indicator shown in the header. Click to open the settings modal.
 */
function SyncStatusIndicator({ syncState, onClick }) {
  const { enabled, status, lastSyncedAt, error } = syncState;

  // Visual config per status
  // Note pour l'état "non connecté" : on traite ce cas comme une vraie CTA
  // (icône +, libellé invitant, accent wine) plutôt qu'un état neutre, pour
  // que la première chose qu'un nouvel utilisateur voie en haut à droite soit
  // une invitation explicite à sauvegarder dans Drive.
  const config = (() => {
    if (!enabled) {
      return {
        color: palette.wine,
        icon: '+',
        label: 'Connecter Drive',
        cta: true,
      };
    }
    switch (status) {
      case 'syncing':
        return { color: palette.amber, icon: '◔', label: 'Sync en cours...', spin: true };
      case 'dirty':
        return { color: palette.amber, icon: '◐', label: 'Modifié, sync prévue' };
      case 'error':
        return { color: palette.wine, icon: '⚠', label: 'Échec sync' };
      case 'idle':
      default:
        return { color: palette.sage, icon: '●', label: 'Synchronisé' };
    }
  })();

  // Format relative time for last sync
  const formatRelative = (iso) => {
    if (!iso) return null;
    const ageMin = Math.floor((Date.now() - parseLocalDate(iso).getTime()) / 60000);
    if (ageMin < 1) return 'à l\'instant';
    if (ageMin < 60) return 'il y a ' + ageMin + ' min';
    const ageH = Math.floor(ageMin / 60);
    if (ageH < 24) return 'il y a ' + ageH + ' h';
    return parseLocalDate(iso).toLocaleDateString('fr-FR');
  };

  const subtitle =
    enabled && status === 'idle' && lastSyncedAt
      ? formatRelative(lastSyncedAt)
      : enabled && status === 'error'
      ? (error || '').slice(0, 40)
      : !enabled
      ? 'Sauvegarder vos données →'
      : null;

  return (
    <button
      onClick={onClick}
      title={config.cta ? 'Activer la synchronisation Drive' : 'Paramètres de synchronisation Drive'}
      style={{
        display: 'inline-flex',
        alignItems: 'center',
        gap: 8,
        padding: '6px 12px',
        borderRadius: 6,
        // Bordure plus marquée et fond légèrement teinté pour l'état CTA
        // (non connecté), afin de le distinguer des indicateurs neutres.
        border: '1px solid ' + (config.cta ? palette.wine + '60' : palette.rule),
        background: config.cta ? palette.wine + '08' : 'transparent',
        cursor: 'pointer',
        fontFamily: 'DM Sans, sans-serif',
        fontSize: 12,
      }}
    >
      <span
        style={{
          fontSize: config.cta ? 14 : 16,
          fontWeight: config.cta ? 700 : 400,
          color: config.color,
          lineHeight: 1,
          animation: config.spin ? 'spin 1.5s linear infinite' : undefined,
        }}
      >
        {config.icon}
      </span>
      <span style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start', lineHeight: 1.2 }}>
        <span style={{ fontWeight: 600, color: config.cta ? palette.wine : palette.ink }}>{config.label}</span>
        {subtitle && (
          <span style={{ fontSize: 10, color: palette.inkSoft, fontWeight: 400 }}>{subtitle}</span>
        )}
      </span>
    </button>
  );
}

/**
 * Settings modal: configure Apps Script endpoint + token, enable/disable sync.
 */
function SyncSettingsModal({ syncState, onClose, onExportBackup }) {
  const {
    enabled,
    endpoint: savedEndpoint,
    token: savedToken,
    status,
    lastSyncedAt,
    error,
    enable,
    disable,
    forceSync,
    backupNow,
    pull,
  } = syncState;

  // Form state for the endpoint and token (pre-filled with saved values)
  const [endpointInput, setEndpointInput] = useState(savedEndpoint || '');
  const [tokenInput, setTokenInput] = useState(savedToken || '');
  const [busy, setBusy] = useState(false);

  // Keep inputs in sync if saved values change after a successful enable
  useEffect(() => { setEndpointInput(savedEndpoint || ''); }, [savedEndpoint]);
  useEffect(() => { setTokenInput(savedToken || ''); }, [savedToken]);

  const wrapAction = async (fn) => {
    setBusy(true);
    try { await fn(); } finally { setBusy(false); }
  };

  const canEnable = endpointInput.trim().startsWith('https://') && tokenInput.trim().length >= 8;

  return (
    <div className="mc-overlay" onClick={onClose}>
      <div className="mc-modal" style={{ maxWidth: 640, padding: 32 }} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
          <div>
            <h3 className="mc-display" style={{ fontSize: 22, fontWeight: 600, margin: 0 }}>
              Synchronisation Google Drive
            </h3>
            <p style={{ margin: '4px 0 0', fontSize: 13, color: palette.inkSoft }}>
              Sauvegarde automatique de vos données dans votre Drive personnel via Apps Script
            </p>
          </div>
          <button className="mc-btn mc-btn-ghost" onClick={onClose}><X size={14} /></button>
        </div>

        {/* Status card */}
        <div
          style={{
            padding: 16,
            background: enabled ? palette.sage + '08' : palette.paper,
            borderRadius: 8,
            border: `1px solid ${enabled ? palette.sage + '30' : palette.rule}`,
            marginBottom: 20,
          }}
        >
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
            <span style={{ fontSize: 13, fontWeight: 600 }}>
              État :{' '}
              <span style={{ color: enabled ? palette.sage : palette.inkSoft }}>
                {enabled ? 'Activé' : 'Désactivé'}
              </span>
            </span>
            {enabled && status === 'syncing' && (
              <Loader2 size={14} style={{ color: palette.amber, animation: 'spin 1s linear infinite' }} />
            )}
          </div>

          {enabled && lastSyncedAt && (
            <div style={{ fontSize: 12, color: palette.inkSoft }}>
              Dernière synchronisation : {new Date(lastSyncedAt).toLocaleString('fr-FR')}
            </div>
          )}

          {error && (
            <div style={{ fontSize: 12, color: palette.wine, marginTop: 6 }}>
              <strong>Erreur :</strong> {error}
            </div>
          )}
        </div>

        {/* Setup form (only when disabled) */}
        {!enabled && (
          <>
            <div style={{ marginBottom: 16 }}>
              <InfoBanner icon={RefreshCw} color={palette.wine}>
                <strong>Setup en 2 étapes :</strong> (1) déployez le script Apps Script fourni
                en Web App sur votre compte Google, (2) collez l'URL de déploiement et votre
                token ci-dessous. Ensuite la sync est automatique (8 secondes après chaque
                modification).
              </InfoBanner>
            </div>

            <div style={{ marginBottom: 12 }}>
              <label className="mc-label">URL du Web App Apps Script</label>
              <input
                className="mc-input"
                placeholder="https://script.google.com/macros/s/.../exec"
                value={endpointInput}
                onChange={(e) => setEndpointInput(e.target.value)}
                spellCheck={false}
                style={{ fontFamily: 'monospace', fontSize: 12 }}
              />
              <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 4 }}>
                Doit se terminer par <code>/exec</code>
              </div>
            </div>

            <div style={{ marginBottom: 16 }}>
              <label className="mc-label">Token (le même que dans le script)</label>
              <input
                className="mc-input"
                placeholder="ex: abc123XYZ-monRestoMartinique-89X"
                value={tokenInput}
                onChange={(e) => setTokenInput(e.target.value)}
                spellCheck={false}
                style={{ fontFamily: 'monospace', fontSize: 12 }}
              />
              <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 4 }}>
                Une chaîne aléatoire que vous avez choisie en configurant le script (8 caractères minimum)
              </div>
            </div>
          </>
        )}

        {/* Active info */}
        {enabled && (
          <div style={{ marginBottom: 16 }}>
            <InfoBanner icon={RefreshCw} color={palette.sage}>
              La sync est active. Toute modification est poussée vers Drive après quelques secondes.
              Les fichiers sont stockés dans le dossier <code>LaTambouille</code> à la racine
              de votre Drive.
            </InfoBanner>
          </div>
        )}

        {/* Actions */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {!enabled ? (
            <button
              className="mc-btn mc-btn-primary"
              onClick={() => wrapAction(() => enable(endpointInput.trim(), tokenInput.trim()))}
              disabled={busy || !canEnable}
              style={{
                justifyContent: 'center',
                padding: '12px 16px',
                opacity: !canEnable ? 0.5 : 1,
                cursor: !canEnable ? 'not-allowed' : 'pointer',
              }}
            >
              {busy ? (
                <><Loader2 size={14} style={{ animation: 'spin 1s linear infinite' }} /> Activation...</>
              ) : (
                <><RefreshCw size={14} /> Activer la synchronisation Drive</>
              )}
            </button>
          ) : (
            <>
              <button
                className="mc-btn mc-btn-ghost"
                onClick={() => wrapAction(forceSync)}
                disabled={busy || status === 'syncing'}
                style={{ justifyContent: 'center', padding: '10px 16px' }}
              >
                <RefreshCw size={14} /> Synchroniser maintenant (push local → Drive)
              </button>
              <button
                className="mc-btn mc-btn-ghost"
                onClick={() => {
                  if (window.confirm('Récupérer la dernière version depuis Drive ? Vos données locales non synchronisées seront perdues.')) {
                    wrapAction(pull);
                  }
                }}
                disabled={busy || status === 'syncing'}
                style={{ justifyContent: 'center', padding: '10px 16px' }}
              >
                <Upload size={14} style={{ transform: 'rotate(180deg)' }} /> Récupérer Drive (pull → local)
              </button>
              <button
                className="mc-btn mc-btn-ghost"
                onClick={() => wrapAction(async () => {
                  const name = await backupNow();
                  mcToast.success(`Snapshot créé sur Drive : ${name}`);
                })}
                disabled={busy || status === 'syncing' || !enabled}
                style={{ justifyContent: 'center', padding: '10px 16px', color: palette.sage }}
                title="Crée une copie datée non-écrasable sur Drive (filet de sécurité)"
              >
                <Download size={14} /> Créer un snapshot daté maintenant
              </button>
              <button
                className="mc-btn mc-btn-ghost"
                onClick={() => onExportBackup && onExportBackup()}
                style={{ justifyContent: 'center', padding: '10px 16px', color: palette.sage }}
              >
                <Download size={14} /> Télécharger une sauvegarde JSON
              </button>
              <button
                className="mc-btn mc-btn-danger"
                onClick={() => {
                  if (window.confirm('Désactiver la sync Drive ? Les fichiers sur Drive sont conservés.')) {
                    wrapAction(disable);
                  }
                }}
                disabled={busy}
                style={{ justifyContent: 'center', padding: '10px 16px', border: `1px solid ${palette.wine}40` }}
              >
                Désactiver la synchronisation
              </button>
            </>
          )}
        </div>

        {/* AI model selector — always shown (independent of Drive sync state) */}
        <div style={{ marginTop: 24, paddingTop: 24, borderTop: `1px solid ${palette.rule}` }}>
          <AiModelSelector />
        </div>

        {/* Scan prompt editor — lets the user add new rules without rebuilding the HTML */}
        <div style={{ marginTop: 24, paddingTop: 24, borderTop: `1px solid ${palette.rule}` }}>
          <ScanPromptEditor />
        </div>
      </div>
    </div>
  );
}
