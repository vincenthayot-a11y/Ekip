<!-- ═══════════════════════════════════════════════════════════════════════════
     PROTECTION PAR MOT DE PASSE (SHA-256)
     ═══════════════════════════════════════════════════════════════════════════
     Le mot de passe courant est stocké sous forme de hash dans la constante
     PASSWORD_HASH ci-dessous. Pour le changer :
       1. Générer un nouveau hash via generateur_mot_de_passe.html
       2. Remplacer la valeur de PASSWORD_HASH
     L'authentification est mémorisée dans localStorage (clé AUTH_STORAGE_KEY).
     Mot de passe par défaut : Lamentin2026!
     ═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  const PASSWORD_HASH =
    '1c76b2828615edb590a34800b4ea8e1ddf092dd917ca561c24e9b9fc9ca80627';
  const AUTH_STORAGE_KEY = 'planning_auth_v1';

  async function sha256(text) {
    const buffer = await crypto.subtle.digest(
      'SHA-256',
      new TextEncoder().encode(text)
    );
    return Array.from(new Uint8Array(buffer))
      .map(byte => byte.toString(16).padStart(2, '0'))
      .join('');
  }

  // Déjà authentifié sur cet appareil → on laisse l'app se charger
  if (localStorage.getItem(AUTH_STORAGE_KEY) === PASSWORD_HASH) {
    return;
  }

  // Bloquer le rendu de l'app tant que l'utilisateur n'est pas authentifié
  const blockStyle = document.createElement('style');
  blockStyle.id = 'auth-block-style';
  blockStyle.textContent =
    'body > *:not(#auth-overlay){display:none!important}' +
    'body{background:#0f172a!important;margin:0!important}';
  (document.head || document.documentElement).appendChild(blockStyle);

  function buildLoginScreen() {
    const overlay = document.createElement('div');
    overlay.id = 'auth-overlay';
    overlay.className = 'auth-overlay';
    overlay.innerHTML =
      '<div class="auth-card">' +
        '<div class="auth-icon">🔒</div>' +
        '<h2 class="auth-title">Planning Restaurant</h2>' +
        '<p class="auth-subtitle">Espace privé</p>' +
        '<input id="auth-input" type="password" ' +
          'placeholder="Mot de passe" ' +
          'autocomplete="current-password" ' +
          'class="auth-input">' +
        '<div id="auth-error" class="auth-error"></div>' +
        '<button id="auth-submit" class="auth-submit">Entrer</button>' +
      '</div>';
    document.body.appendChild(overlay);

    const input = document.getElementById('auth-input');
    const submit = document.getElementById('auth-submit');
    const errorEl = document.getElementById('auth-error');
    setTimeout(() => input.focus(), 50);

    async function tryLogin() {
      const password = input.value;
      if (!password) return;
      submit.disabled = true;
      submit.textContent = '…';

      const hash = await sha256(password);
      if (hash === PASSWORD_HASH) {
        localStorage.setItem(AUTH_STORAGE_KEY, hash);
        overlay.remove();
        blockStyle.remove();
      } else {
        errorEl.textContent = 'Mot de passe incorrect';
        input.value = '';
        input.focus();
        submit.disabled = false;
        submit.textContent = 'Entrer';
      }
    }

    submit.onclick = tryLogin;
    input.addEventListener('keydown', ev => {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        tryLogin();
      } else {
        errorEl.textContent = '';
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', buildLoginScreen);
  } else {
    buildLoginScreen();
  }
})();
</script>

   VARIABLES DESIGN SYSTEM

  /* Accent — vert profond identitaire */

  --accent-hover: #0F4C2E;
  --accent-soft: #1B5E3F12;

  /* Sémantique */
  --success: #3A9D52;
  --success-soft: #3A9D5218;
  --warn: #C9A24B;

  /* Couleurs identitaires complémentaires */
  --green-deep: #0F4C2E;
  --green-bright: #3A9D52;
  --gold: #C9A24B;
  --sage: #6B8E6F;

  /* Ombres */
  --shadow-sm: 0 1px 2px rgba(20, 50, 31, .05);
  --shadow: 0 2px 8px rgba(20, 50, 31, .08);
  --shadow-md: 0 4px 16px rgba(20, 50, 31, .10);
  --shadow-lg: 0 12px 40px rgba(20, 50, 31, .18);

  /* Rayons */

  --radius-lg: 12px;
  --radius-xl: 16px;

  /* Transition par défaut */
  --t: 160ms cubic-bezier(.4, 0, .2, 1);

  --font-display: 'Fraunces', Georgia, serif;

/* ═══════════════════════════════════════════════════════════════════════════

  justify-content: space-between;
}
.dcol-number { font-size: 13px; font-weight: 700; color: var(--text); }
.dcol-number--today { color: #1d4ed8; }
.dcol-weekday { font-size: 10px; color: var(--text-3); }
.dcol-note-icon { font-size: 10px; }
.dcol-plus-icon { font-size: 9px; color: var(--text-3); }

/* En-tête poste */
.phd {
  text-align: center;
  padding: 11px 6px;
  font-size: 10px;
  font-weight: 800;
  min-width: 90px;
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 3;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text);
  background: var(--surface-2);
  border-bottom: 2px solid var(--border-strong) !important;
}
/* Séparation visuelle entre les postes CUISINE et les postes SALLE */
.post-sep-left { border-left: 2px solid var(--accent) !important; }

/* Cellule d'affectation */
.cell {
  min-width: 90px;
  height: 38px;
  vertical-align: middle;
  text-align: center;
  cursor: pointer;
  padding: 0 4px;
  transition: background var(--t), filter var(--t), outline var(--t);
  position: relative;
}
.cell:hover { filter: brightness(.95); }
.cell.dragging { opacity: .35; }
.cell.drop-target {
  outline: 2px dashed var(--accent);
  outline-offset: -3px;
  box-shadow: inset 0 0 0 2px rgba(79, 70, 229, .15);
}
.cell.drop-invalid {
  outline: 2px dashed var(--danger);
  outline-offset: -3px;
  cursor: not-allowed;
}
.cell.cell-just-set { animation: cellPulse .45s ease; }
@keyframes cellPulse {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.06); box-shadow: inset 0 0 0 2px var(--accent); }
  100% { transform: scale(1); }
}

.plus {
  font-size: 18px;
  color: rgba(0, 0, 0, .18);
  user-select: none;
  transition: color var(--t);
}
.cell:hover .plus { color: rgba(0, 0, 0, .4); }

.etag {
  display: inline-block;
  padding: 3px 9px;
  border-radius: var(--radius-sm);
  font-size: 10.5px;
  font-weight: 700;
  max-width: 84px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: grab;
  user-select: none;
  transition: transform var(--t);
}
.etag:hover { transform: translateY(-1px); }
.etag:active { cursor: grabbing; }

/* Petit point rouge indiquant un dépassement de contrat */
.over-contract-dot {
  display: inline-block;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: #dc2626;
  vertical-align: super;
  margin-left: 2px;
}

/* Lignes spéciales (fériés + fermés) — v8 */
.row-ferie { background: #fef9c3; }
.row-closed {
  background: #f1f5f9;
  opacity: 0.6;
}
.dcol--ferie {
  border-left: 2.5px solid #f59e0b;
  background: #fef9c3;
}
.dcol-number--ferie { color: #92400e; }
.dcol-number--closed { color: #9ca3af; }

/* Tags affichés à droite du numéro de jour (férié / fermé) */
.day-tag {
  font-size: 8px;
  padding: 1px 4px;
  border-radius: 3px;
  font-weight: 600;
  margin-left: 2px;
}
.day-tag--ferie {
  background: #fef3c7;
  color: #92400e;
}
.day-tag--closed {
  background: #fee2e2;
  color: #dc2626;
  font-weight: 700;
}

/* Pastille verte "pointage enregistré ce jour" */
.real-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #16a34a;
}

/* Conteneur d'icônes à droite dans la cellule jour */
.dcol-icons {
  display: flex;
  gap: 3px;
  align-items: center;
}

/* Cellule d'un poste un jour fermé : désactivée */
.cell--closed {
  background: #e5e7eb !important;
  cursor: default !important;
}

.we-row .dcol {
  color: var(--text-3);
  font-style: italic;
}

/* Légende sous la grille */
.grid-legend {
  padding: 4px 10px;
  font-size: 10px;
  color: #9ca3af;
  border-top: 0.5px solid #f1f5f9;
  display: flex;
  align-items: center;
  gap: 12px;
}
.grid-legend-item {
  display: flex;
  align-items: center;
  gap: 3px;
}
.grid-legend-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #dc2626;
}
.grid-legend-shortcut {
  margin-left: auto;
  color: #d1d5db;
}

/* ═══════════════════════════════════════════════════════════════════════════
   BANDEAU D'ALERTE (postes non couverts)
   ═══════════════════════════════════════════════════════════════════════════ */
.warn {
  background: var(--warn-soft);
  border: 1px solid #fde68a;
  border-radius: var(--radius-lg);
  margin: 12px 18px 0;
  padding: 12px 16px;
  font-size: 12px;
  color: #92400e;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.warn-badge {
  background: #fef3c7;
  padding: 1px 5px;
  border-radius: 4px;
  font-weight: 700;
}

/* Bandeau d'alerte mode colonne (v8) */
.warn--column {
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
}
.warn-details {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  font-size: 11px;
}
.warn-detail-tag {
  background: #fef3c7;
  padding: 3px 8px;
  border-radius: 5px;
  cursor: pointer;
  transition: all .15s;
  border: 1px solid #fde68a;
}
.warn-detail-tag:hover { background: #fde68a; }
.warn-detail-reason {
  color: #78716c;
  font-size: 10px;
}
.warn-detail-more {
  padding: 3px 8px;
  font-size: 10px;
  color: #78716c;
}

/* Bandeaux de statut de synchronisation Drive (v8) */
.sync-banner {
  margin: 12px 18px 0;
  padding: 10px 16px;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-radius: var(--radius-lg);
  border: 1px solid;
}
.sync-banner--offline {
  background: var(--warn-soft);
  border-color: #fde68a;
  color: #92400e;
}
.sync-banner--local {
  background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
  border-color: #bae6fd;
  color: #0c4a6e;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.sync-banner-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
.sync-banner-icon { font-size: 14px; }
.sync-banner-btn {
  background: #0284c7 !important;
  color: #fff !important;
  font-size: 11px;
  padding: 6px 14px;
  white-space: nowrap;
}

/* Variantes de bouton Pointage (bleu ciel) et Paie (vert) */
.btn-point-outline {
  border-color: #0ea5e9 !important;
  color: #0284c7 !important;
}
.btn-paie-outline {
  border-color: #16a34a !important;
  color: #15803d !important;
}

/* ── Saisie quotidienne ───────────────────────────────────────────────── */
.saisie-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.saisie-day-select {
  flex: 1;
  min-width: 160px;
  margin-bottom: 0 !important;
  font-weight: 600;
}
.saisie-photo-btn { margin-left: auto; }

.saisie-form { display: flex; flex-direction: column; gap: 16px; }

.saisie-block {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px;
  background: var(--surface);
}
.saisie-block-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
}

.saisie-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 16px;
}
.saisie-field { display: flex; flex-direction: column; gap: 4px; }
.saisie-field-lbl {
  font-size: 11px;
  color: var(--text-2);
  font-weight: 600;
}
.saisie-num { width: 100%; box-sizing: border-box; margin-bottom: 0 !important; }

.saisie-table { width: 100%; border-collapse: collapse; }
.saisie-table th {
  text-align: left;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--text-3);
  font-weight: 700;
  padding: 4px 8px;
  border-bottom: 1px solid var(--border);
}
.saisie-table td {
  padding: 4px 8px;
  border-bottom: 0.5px solid var(--border);
  vertical-align: middle;
}
.saisie-table input {
  margin-bottom: 0 !important;
  width: 100%;
  box-sizing: border-box;
}
.saisie-name {
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.saisie-name .emp-dot { margin-right: 5px; }
.saisie-time { max-width: 80px; }
.saisie-total {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  text-align: right;
}
.saisie-na { text-align: center; color: var(--text-3); }
.saisie-empty {
  font-size: 12px;
  color: var(--text-3);
  padding: 8px 0;
  font-style: italic;
}

.saisie-enc-table th:nth-child(2) { color: #0284c7; }
.saisie-enc-table th:nth-child(3) { color: #16a34a; }
.enc-clyo { background: rgba(2, 132, 199, .05); }
.enc-reel { background: rgba(22, 163, 74, .05); }

.saisie-enc-tot td {
  font-weight: 800;
  font-size: 13px;
  border-top: 2px solid var(--border-strong);
  padding-top: 8px;
}
.saisie-enc-ecart td {
  font-weight: 800;
  font-size: 13px;
  text-align: center;
}
.saisie-ec-ok   { color: var(--success); }
.saisie-ec-warn { color: var(--warn); }
.saisie-ec-bad  { color: var(--danger); }

.saisie-obs { width: 100%; box-sizing: border-box; resize: vertical; }

/* Totaux calculés (CA / couverts auto) */
.saisie-totaux {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.saisie-totbox {
  flex: 1;
  min-width: 130px;
  background: var(--accent-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  text-align: center;
}
.saisie-totbox-val {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
}
.saisie-totbox-lbl {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 2px;
}

/* Liste déroulante d'heures */
.saisie-time-sel { max-width: 90px; cursor: pointer; }
.saisie-time-inp {
  max-width: 90px; text-align: center; font-variant-numeric: tabular-nums;
  letter-spacing: .02em;
}
.saisie-time-inp::placeholder { color: #c7c7c7; }

/* Raccourcis horaires fréquents */
.saisie-quick { display: flex; gap: 3px; margin-top: 3px; flex-wrap: wrap; }
.saisie-quick-btn {
  font-size: 10px; padding: 1px 6px; border-radius: 6px;
  border: 1px solid var(--border, #e5e7eb); background: #f8fafc;
  color: var(--text-2, #6b7280); cursor: pointer; font-family: inherit;
  white-space: nowrap;
}
.saisie-quick-btn:hover { background: var(--accent, #1B5E3F); color: #fff; border-color: transparent; }
/* Bouton « idem » recopier ligne du dessus */
.saisie-copy-cell { vertical-align: middle; }
.saisie-copy-above {
  font-size: 10px; padding: 3px 8px; border-radius: 7px;
  border: 1px dashed var(--border-strong, #cbd5e1); background: transparent;
  color: var(--text-2, #6b7280); cursor: pointer; font-family: inherit; white-space: nowrap;
}
.saisie-copy-above:hover { background: #f0f7f2; border-style: solid; color: var(--accent, #1B5E3F); }
/* Barre pré-remplir depuis planning */
.saisie-prefill-bar { margin-bottom: 10px; }

/* Bouton retirer un présent */
.saisie-remove-btn {
  border: none;
  background: transparent;
  color: var(--text-3);
  font-size: 13px;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 5px;
  transition: all var(--t);
}
.saisie-remove-btn:hover { background: var(--danger-soft); color: var(--danger); }

/* Ligne ajouter un présent */
.saisie-add-row { margin-top: 8px; }
.saisie-add-select {
  width: 100%;
  cursor: pointer;
  color: var(--accent);
  font-weight: 600;
  border-style: dashed !important;
}

/* Synthèse mensuelle */
.synth-kpis { border-radius: var(--radius-lg); margin-bottom: 16px; }
.synth-section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin: 18px 0 8px;
}
.synth-table th {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--text-3);
}
.synth-name {
  font-weight: 600;
  white-space: nowrap;
}
.synth-name .emp-dot { margin-right: 5px; }
.synth-total-row td {
  border-top: 2px solid var(--border-strong);
  padding-top: 8px;
}
.synth-note {
  font-size: 11px;
  color: var(--text-3);
  line-height: 1.5;
  margin: 8px 0 4px;
  font-style: italic;
}
.form-section-sep {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  margin: 16px 0 8px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* ── Vue Caisse (tableau de bord mensuel) ─────────────────────────────── */
.caisse-wrap { padding: 0 0 24px; }
.caisse-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  flex-wrap: wrap;
  gap: 10px;
}
.caisse-bar-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}
.caisse-bar-actions { display: flex; gap: 8px; }

/* Vue Paramètres */
.params-section { margin: 0 18px 22px; }
.params-h {
  font-size: 14px; font-weight: 700; color: var(--text);
  margin: 0 0 12px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.params-config-box { /* hérite du contenu mConfig */ }
.params-data-grid { display: flex; flex-wrap: wrap; gap: 10px; }
.params-data-btn { display: inline-flex; align-items: center; gap: 7px; }
.params-data-ico { font-size: 15px; }

/* Panneau config postes dans le planning (dépliable) */
.posts-config-panel {
  margin: 0 18px 14px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg, 12px);
}
.posts-config-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.params-desc {
  font-size: 13px; color: var(--text-2, #6b7280);
  margin: 0 0 10px; line-height: 1.55;
}
.params-desc a, .drive-link { color: var(--accent, #1B5E3F); }
.params-inline-row {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.params-unit { font-size: 13px; color: #6b7280; }

/* Aide-mémoire raccourcis */
.shortcuts-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
.shortcuts-table tr { border-bottom: 0.5px solid var(--border); }
.shortcuts-key { padding: 9px 8px; white-space: nowrap; width: 1%; }
.shortcuts-desc { padding: 9px 8px; font-size: 13px; color: var(--text-2); }
.shortcuts-table kbd {
  display: inline-block; min-width: 20px; text-align: center;
  padding: 2px 7px; font-family: var(--font-sans); font-size: 12px;
  font-weight: 600; color: var(--text);
  background: var(--surface-2); border: 1px solid var(--border-strong);
  border-radius: 5px; box-shadow: 0 1px 0 var(--border-strong);
}
.shortcuts-note { font-size: 12px; color: var(--text-3); margin: 12px 2px 0; }

/* Recherche d'un salarié dans le planning */
.emp-search { position: relative; display: flex; align-items: center; gap: 6px; }
.emp-search-input { min-width: 150px; }
.emp-search-clear {
  border: none; background: var(--surface-2); color: var(--text-2);
  width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
  font-size: 12px; flex-shrink: 0;
}
.emp-search-clear:hover { background: var(--border); }
.emp-search-hours {
  font-size: 12px; color: var(--text-2); white-space: nowrap;
  background: var(--surface-2); padding: 4px 9px; border-radius: 7px;
}
.emp-search-hours b { color: var(--accent); }
.emp-search-hours--over b { color: var(--danger); }
.emp-search-list {
  position: absolute; top: 100%; left: 0; margin-top: 4px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-md);
  z-index: 60; min-width: 200px; overflow: hidden;
}
.emp-search-opt {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 12px; font-size: 13px; cursor: pointer; color: var(--text);
}
.emp-search-opt:hover { background: var(--surface-2); }
.emp-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
/* Surlignage des cellules lors d'une recherche */
.cell--search-hit {
  outline: 3px solid var(--gold); outline-offset: -3px;
  position: relative; z-index: 1;
}
.cell--search-dim { opacity: .3; }

/* Contrôle de caisse */
.cash-ctrl { display: flex; flex-direction: column; gap: 2px; }
.cash-ctrl-line {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 4px; font-size: 13px; color: var(--text-2);
  border-bottom: 0.5px solid var(--border);
}
.cash-ctrl-line b { color: var(--text); font-size: 14px; }
.cash-ctrl-res {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px; margin-top: 10px; border-radius: var(--radius);
  font-size: 14px; font-weight: 600;
}
.cash-ctrl-res b { font-size: 18px; }
.cash-ctrl-res.cc-ok { background: var(--success-soft); color: var(--success); }
.cash-ctrl-res.cc-warn { background: var(--warn-soft); color: #8a6d1f; }
.cash-ctrl-res.cc-bad { background: var(--danger-soft); color: var(--danger); }
.cash-ctrl-note { font-size: 12px; color: var(--text-3); margin-top: 6px; padding: 0 4px; }

/* Annotations Crédit / Bons cadeaux dans la saisie */
.enc-annot-row td { padding: 0 0 8px !important; border: none !important; }
.enc-annot {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; margin: 0 0 2px;
  background: #fdf8ec; border: 1px solid #f0e3bf; border-radius: 9px;
}
.enc-annot-note { flex: 1; min-width: 0; }
.enc-annot-paid {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 13px; font-weight: 600; color: var(--text-2);
  white-space: nowrap; cursor: pointer;
}
.enc-annot-paid input { width: 16px; height: 16px; cursor: pointer; }

/* Suivi crédits & notes */
.suivi-opts {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 14px;
}
.btn-sm { padding: 6px 12px; font-size: 12px; }
.suivi-filter {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text-2); cursor: pointer; margin-left: auto;
}
.suivi-section { margin-bottom: 20px; }
.suivi-h {
  font-size: 14px; font-weight: 700; color: var(--text);
  margin: 0 0 10px; display: flex; align-items: center; gap: 8px;
}
.suivi-count {
  font-size: 12px; font-weight: 600; color: var(--accent);
  background: var(--surface-2); padding: 2px 9px; border-radius: 20px;
}
.suivi-empty { font-size: 13px; color: var(--text-3); margin: 0; }
.suivi-item {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; padding: 10px 12px; border-radius: 9px;
  background: var(--surface-2); margin-bottom: 6px;
}
.suivi-item--paid { opacity: .6; }
.suivi-item-main { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; flex: 1; min-width: 0; }
.suivi-date { font-size: 12px; font-weight: 700; color: var(--text-2); white-space: nowrap; }
.suivi-montant { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; }
.suivi-note { font-size: 13px; color: var(--text-2); }
.suivi-note--empty { font-style: italic; color: var(--text-3); }
.suivi-toggle {
  border: none; border-radius: 7px; padding: 6px 12px; cursor: pointer;
  font-size: 12px; font-weight: 600; font-family: inherit; white-space: nowrap;
}
.suivi-toggle.is-due { background: #fde8c8; color: #92600f; }
.suivi-toggle.is-paid { background: var(--success-soft); color: var(--success); }
.suivi-obs {
  display: flex; gap: 12px; padding: 9px 12px; border-radius: 9px;
  background: var(--surface-2); margin-bottom: 6px;
}
.suivi-obs-txt { font-size: 13px; color: var(--text); line-height: 1.5; }

/* Vue rapport pleine page */
.caisse-back-btn { margin-right: 12px; }
.rapport-content { padding: 4px 0; }
.rap-period {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin: 0 0 16px; padding: 10px 14px;
  background: var(--surface-2); border-radius: var(--radius); width: fit-content;
}
.rap-period-sel { min-width: 90px; }
.rap-period-year { font-size: 16px; font-weight: 700; color: var(--text); padding: 0 12px; }
.suivi-search {
  position: relative; display: flex; align-items: center; gap: 6px;
  margin-bottom: 16px;
}
.suivi-search input { flex: 1; }

/* Fiche par salarié */
.fiche-table { width: 100%; border-collapse: collapse; }
.fiche-table th {
  text-align: left; font-size: 11px; text-transform: uppercase;
  letter-spacing: .04em; color: var(--text-3); font-weight: 700;
  padding: 8px 10px; border-bottom: 2px solid var(--border);
}
.fiche-table td { padding: 10px; font-size: 13px; border-bottom: 0.5px solid var(--border); }
.fiche-row { cursor: pointer; transition: background .1s; }
.fiche-row:hover { background: var(--surface-2); }
.fiche-td-name { display: flex; align-items: center; gap: 8px; font-weight: 600; }
.fiche-over { color: var(--danger); font-weight: 600; }
.fiche-under { color: #8a6d1f; }
.fiche-empty { text-align: center; color: var(--text-3); padding: 20px; }
.fiche-head { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
.fiche-dot { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }
.fiche-name { font-size: 20px; font-weight: 700; font-family: var(--font-display); color: var(--text); }
.fiche-sub { font-size: 13px; color: var(--text-2); margin-top: 2px; }
.fiche-stats {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 10px;
}
.fiche-stat {
  background: var(--surface-2); border-radius: 12px; padding: 14px;
  text-align: center;
}
.fiche-stat-val { font-size: 20px; font-weight: 700; color: var(--text); }
.fiche-stat-lbl { font-size: 11px; color: var(--text-3); margin-top: 4px; text-transform: uppercase; letter-spacing: .03em; }
.fiche-stat--over .fiche-stat-val { color: var(--danger); }
.fiche-stat--under .fiche-stat-val { color: #8a6d1f; }

/* Bandeau de complétude du coût main-d'œuvre */
.cost-banner {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 0 18px 14px;
  padding: 11px 16px;
  background: #fef9ec;
  border: 1px solid #f5e0a3;
  border-radius: var(--radius-lg, 12px);
  font-size: 13px;
  color: #7a5b12;
}
.cost-banner-ico { font-size: 16px; flex-shrink: 0; }
.cost-banner-txt { flex: 1; line-height: 1.5; }
.cost-banner-names { color: #9a7b22; }
.cost-banner-btn { flex-shrink: 0; white-space: nowrap; }

/* État de saisie du mois (pastilles) */
.saisie-status { margin: 0 18px 16px; }
.saisie-status-head {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px; margin-bottom: 8px;
}
.saisie-status-title { font-size: 13px; font-weight: 700; color: var(--text); }
.saisie-status-legend {
  display: flex; gap: 14px; font-size: 11px; color: #6b7280; flex-wrap: wrap;
}
.saisie-status-legend span { display: inline-flex; align-items: center; gap: 5px; }
.saisie-status-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(34px, 1fr));
  gap: 5px;
}
.ssq {
  display: inline-block; width: 14px; height: 14px; border-radius: 4px;
  flex-shrink: 0;
}
.ssq--cell {
  width: auto; height: 30px; border: none; cursor: pointer;
  font-size: 11px; font-weight: 600; font-family: inherit;
  color: #374151; transition: transform .1s, filter .1s;
}
.ssq--cell:hover { transform: translateY(-1px); filter: brightness(0.95); }
.ssq--full  { background: #bbf7d0; }
.ssq--ca    { background: #bfdbfe; }
.ssq--hr    { background: #fed7aa; }
.ssq--empty { background: #eceae0; color: #9ca3af; }

/* Alertes de cohérence dans la saisie */
.saisie-alerts { margin: 10px 0 0; display: flex; flex-direction: column; gap: 5px; }
.saisie-alert {
  font-size: 12px; color: #92400e; background: #fef3c7;
  border-radius: 8px; padding: 6px 12px;
}

/* Saisie en vue pleine page (ex-pop-up) */
.saisie-page { padding: 0 18px 24px; }
.saisie-page .saisie-form { margin-top: 4px; }
.saisie-foot-view {
  position: sticky;
  bottom: 0;
  background: var(--surface, #fff);
  border-top: 1px solid var(--border, #e5e7eb);
  padding: 12px 0;
  margin-top: 16px;
  z-index: 5;
}
.caisse-kpis { margin: 0 18px 16px; border-radius: var(--radius-lg);
  border: 1px solid var(--border); }
.kpi-evol { font-size: 11px; font-weight: 700; margin-top: 4px; }
.kpi-evol.up { color: var(--success); }
.kpi-evol.down { color: var(--danger); }

.caisse-scroll { overflow-x: auto; padding: 0 18px; }
.caisse-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  background: var(--surface);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.caisse-table thead th {
  background: var(--surface-2);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--text-2);
  font-weight: 700;
  padding: 10px 12px;
  text-align: right;
  border-bottom: 2px solid var(--border-strong);
  position: sticky;
  top: 0;
  z-index: 2;
}
.caisse-table thead th:first-child { text-align: left; }
.caisse-table tbody td {
  padding: 9px 12px;
  text-align: right;
  border-bottom: 0.5px solid var(--border);
}
.caisse-row { cursor: pointer; transition: background var(--t); }
.caisse-row:hover { background: var(--accent-soft); }
.caisse-row--we { background: rgba(79, 70, 229, .03); }
.caisse-row--ferie { background: var(--warn-soft); }
.caisse-row--closed { opacity: .5; }
.caisse-row--empty .caisse-ca { color: var(--text-3); }

.caisse-day {
  text-align: left !important;
  font-weight: 600;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.caisse-daynum { font-weight: 800; font-size: 14px; min-width: 20px; }
.caisse-dow { font-size: 11px; color: var(--text-3); text-transform: uppercase; }
.caisse-ferie-dot { color: var(--warn); font-size: 11px; }
.caisse-closed-tag {
  font-size: 9px;
  background: var(--danger-soft);
  color: var(--danger);
  padding: 1px 5px;
  border-radius: 4px;
  font-weight: 700;
}
.caisse-ca { font-weight: 700; color: var(--text); }
.caisse-can1, .caisse-couvn1 { color: var(--text-3); }
.caisse-reel { font-weight: 600; }
.caisse-cout-cell { font-weight: 600; }
.caisse-cout { color: var(--text); }
.caisse-cout-partial { color: var(--warn); font-weight: 700; margin-left: 1px; }

/* ── Bloc paramètre coût employeur (mConfig) ──────────────────────────── */
.cfg-charges-block {
  margin-top: 16px;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--surface-2);
}
.cfg-charges-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}
.cfg-charges-desc {
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.5;
  margin: 0 0 10px;
}
.cfg-charges-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.cfg-charges-hint {
  font-size: 12px;
  color: var(--text-3);
  flex: 1;
  min-width: 140px;
}
.caisse-na { color: var(--text-3); }
.caisse-evol { font-weight: 700; font-size: 12px; }
.caisse-evol.up { color: var(--success); }
.caisse-evol.down { color: var(--danger); }

.caisse-total {
  cursor: default;
  background: var(--surface-2) !important;
  font-weight: 800;
}
.caisse-total:hover { background: var(--surface-2) !important; }
.caisse-total td {
  border-top: 2px solid var(--border-strong);
  border-bottom: none;
  padding-top: 12px;
  padding-bottom: 12px;
}

/* Toggle "Restaurant fermé" dans mNote (v8) */
.closed-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  border: 1.5px solid #e5e7eb;
  border-radius: 10px;
  margin-bottom: 14px;
  cursor: pointer;
  transition: all .15s;
  background: #fff;
}
.closed-toggle--active {
  border-color: #dc2626;
  background: #fef2f2;
}
.closed-toggle-label {
  display: flex;
  align-items: center;
  gap: 8px;
}
.closed-toggle-icon { font-size: 18px; }
.closed-toggle-title {
  font-size: 13px;
  font-weight: 600;
  color: #374151;
}
.closed-toggle-title--on { color: #dc2626; }
.closed-toggle-subtitle {
  font-size: 10px;
  color: #9ca3af;
}
.closed-toggle-switch {
  width: 44px;
  height: 24px;
  border-radius: 12px;
  background: #d1d5db;
  position: relative;
  transition: background .2s;
  flex-shrink: 0;
}
.closed-toggle-switch--on { background: #dc2626; }
.closed-toggle-knob {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #fff;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: left .2s;
  box-shadow: 0 1px 3px rgba(0, 0, 0, .2);
}
.closed-toggle-knob--on { left: 22px; }

/* ═══════════════════════════════════════════════════════════════════════════
   MODALS
   .ov    — overlay semi-transparent
   .mo    — boîte modale blanche
   ═══════════════════════════════════════════════════════════════════════════ */
.ov {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(15, 23, 42, .45);
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  overflow-y: auto;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  animation: fadeIn .18s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.mo {
  background: var(--surface);
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  padding: 1.6rem;
  width: 100%;
  max-width: 500px;
  max-height: 84vh;
  overflow-y: auto;
  animation: slideUp .24s cubic-bezier(.34, 1.2, .64, 1);
}
@keyframes slideUp {
  from { transform: translateY(12px) scale(.98); opacity: 0; }
  to   { transform: translateY(0) scale(1); opacity: 1; }
}
.mo h3 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 1rem;
  color: var(--text);
}
/* Variantes de largeur pour certains modals (Annuel, Absences) */
.mo--wide { max-width: 1000px; max-height: 88vh; }
.mo--wide-absences { max-width: 960px; max-height: 88vh; }
.mo--stats { max-width: 700px; }

/* En-tête de modal : titre + bouton ✕ */
.modal-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
}
.modal-hdr h3 { margin: 0; }

.modal-foot {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 1rem;
}
.modal-foot--no-margin { margin-top: 0; }
.modal-foot--tight { margin-top: 0.5rem; }
.modal-foot--spaced { margin-top: 1.5rem; }
.modal-foot--between {
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}
.modal-foot--end-only {
  justify-content: flex-end;
  margin-top: 1rem;
}

/* ═══════════════════════════════════════════════════════════════════════════
   COMPOSANTS DE MODAL : options employé, tags, progress, jour pickers
   ═══════════════════════════════════════════════════════════════════════════ */
.eopt {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 13px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
  border: 1px solid var(--border);
  margin-bottom: 5px;
  transition: all var(--t);
}
.eopt:hover {
  background: var(--surface-2);
  border-color: var(--border-strong);
  transform: translateX(2px);
}
.eopt.sel { border-color: var(--accent); background: var(--accent-soft); }
.eopt.busy { opacity: .35; cursor: not-allowed; pointer-events: none; }

/* Mini-jauge d'heures dans la liste de candidats */
.eopt-gauge {
  display: inline-block;
  width: 42px;
  height: 6px;
  background: var(--surface-3);
  border-radius: 3px;
  overflow: hidden;
}
.eopt-gauge-fill {
  display: block;
  height: 100%;
  border-radius: 3px;
  transition: width var(--t);
}

/* Tags de statut (Cuisine / Salle / Polyvalent / Extra) */
.ctag {
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 600;
}
.tc  { background: #fff7ed; color: #c2410c; }  /* Cuisine */
.ts  { background: var(--accent-soft); color: #4338ca; } /* Salle */
.tp  { background: #f5f3ff; color: #7c3aed; } /* Polyvalent */
.tex { background: #fef9c3; color: #92400e; } /* Extra */
.ctag-contrat { background: #f9fafb; color: #9ca3af; }
.ctag-sm { font-size: 9px; }

/* Barres de progression */
.pb {
  height: 6px;
  border-radius: 3px;
  background: var(--surface-2);
  overflow: hidden;
}
.pb .f {
  height: 100%;
  border-radius: 3px;
  transition: width .4s cubic-bezier(.4, 0, .2, 1);
}

/* Label de section (ex: "Nom", "Heures / mois") */
.lbl {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-3);
  margin-bottom: 6px;
}

/* Pastilles sélecteur de jour (Lu Ma Me ...) */
.dp {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  border: 1.5px solid var(--border-strong);
  color: var(--text-2);
  user-select: none;
  transition: all var(--t);
}
.dp:hover { border-color: var(--accent); color: var(--accent); }
.dp.on { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Boutons type/section (Contrat/Extra, Cuisine/Salle) */
.tb,
.sb {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 9px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  border: 1.5px solid var(--border-strong);
  background: transparent;
  color: var(--text-2);
  font-family: inherit;
  transition: all var(--t);
}
.tb:hover,
.sb:hover { border-color: var(--accent); color: var(--accent); }

/* ═══════════════════════════════════════════════════════════════════════════
   TABLEAU DE RÉCAPITULATIF (bas de page)
   ═══════════════════════════════════════════════════════════════════════════ */
.ri {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 0;
  font-size: 11px;
  border-bottom: 0.5px solid var(--border);
}
.ri:last-child { border: none; }
.rd {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
  margin-top: 4px;
}
.recap tbody tr { transition: background var(--t); }
.recap tbody tr:hover td { background: var(--surface-2); }

.recap-wrap { border-top: 1.5px solid var(--border); margin-top: 16px; }
.recap-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  cursor: pointer;
  background: var(--surface);
  transition: background var(--t);
}
.recap-hdr:hover { background: var(--surface-2); }
.recap-hdr-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}
.recap-hdr-arrow {
  font-size: 11px;
  color: var(--text-3);
}

/* Barre de KPIs */
.recap-kpis {
  display: flex;
  gap: 12px;
  padding: 16px 18px;
  flex-wrap: wrap;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}
.kpi {
  flex: 1;
  min-width: 110px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}
.kpi-val {
  font-size: 26px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--text);
}
.kpi-lbl {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 6px;
  font-weight: 500;
}

.recap-scroll { overflow-x: auto; }
.recap-table {
  width: 100%;
  border-collapse: collapse;
}
.recap-thead-row {
  background: #f9fafb;
  border-bottom: 1px solid #e5e7eb;
}
.recap-th {
  padding: 6px 8px;
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: #6b7280;
  white-space: nowrap;
}
.recap-th--first { padding: 6px 10px; text-align: left; }
.recap-row { border-bottom: 0.5px solid #f1f5f9; }
.recap-row--alt { background: var(--surface-2); }
.recap-td { padding: 6px 8px; text-align: center; font-size: 12px; }
.recap-td--name { padding: 6px 10px; font-size: 12px; }
.recap-td--days { padding: 6px 8px; text-align: center; font-weight: 700; }
.recap-td--max { padding: 6px 8px; text-align: center; font-size: 11px; color: #9ca3af; }
.recap-td--progress { padding: 6px 10px; }
.recap-td--contract { color: #9ca3af; }
.recap-emp-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.recap-alert-icon {
  color: #dc2626;
  font-size: 14px;
  cursor: help;
}
.recap-progress-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.recap-progress-bar { width: 70px; }
.recap-progress-label { font-size: 10px; color: #9ca3af; }

/* Pastille colorée employé (réutilisée partout) */
.emp-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.emp-dot--sm { width: 8px; height: 8px; }
.emp-dot--lg { width: 12px; height: 12px; }
.emp-dot--xl { width: 14px; height: 14px; }

/* ═══════════════════════════════════════════════════════════════════════════
   ONGLETS DE VUE (Mois/Semaine)
   ═══════════════════════════════════════════════════════════════════════════ */
.vtab {
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
  font-size: 11px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-2);
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: all var(--t);
}
.vtab:hover { color: var(--text); }
.vtab.on { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ═══════════════════════════════════════════════════════════════════════════
   ASSISTANT IA (FAB + panel flottant)
   ═══════════════════════════════════════════════════════════════════════════ */
.ai-fab {
  position: fixed;
  bottom: 90px;
  right: 24px;
  width: 54px;
  height: 54px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  border: none;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(124, 58, 237, .45);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  z-index: 200;
  transition: all var(--t);
}
.ai-fab:hover {
  transform: scale(1.1);
  box-shadow: 0 8px 28px rgba(124, 58, 237, .55);
}

/* FAB Saisie du jour — vert identitaire, en bas à droite (IA empilée au-dessus) */
.saisie-fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 54px;
  height: 54px;
  border-radius: 50%;
  background: linear-gradient(135deg, #3A9D52, #1f7a3a);
  border: none;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(31, 122, 58, .45);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  z-index: 200;
  transition: all var(--t);
}
.saisie-fab:hover {
  transform: scale(1.1);
  box-shadow: 0 8px 28px rgba(31, 122, 58, .55);
}
/* Sur mobile la sidebar passe en bas → on remonte les deux FAB au-dessus,
   empilés à droite (saisie au-dessus de l'IA). */
@media (max-width: 720px) {
  .saisie-fab { bottom: 84px; right: 16px; }
  .ai-fab { bottom: 150px; right: 16px; }
}
.ai-panel {
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 360px;
  max-width: calc(100vw - 32px);
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  z-index: 200;
  display: flex;
  flex-direction: column;
  max-height: 540px;
  animation: slideUp .22s cubic-bezier(.4, 0, .2, 1);
}
.ai-panel-hdr {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.ai-panel-title {
  font-size: 13px;
  font-weight: 700;
  color: #4c1d95;
}
.ai-panel-hdr-btns {
  display: flex;
  gap: 6px;
  align-items: center;
}
.ai-key-btn {
  border: none;
  background: #f5f3ff;
  border-radius: 6px;
  padding: 3px 8px;
  cursor: pointer;
  font-size: 10px;
  color: #7c3aed;
}
.ai-clear-btn {
  border: none;
  background: #f9fafb;
  border-radius: 6px;
  padding: 3px 8px;
  cursor: pointer;
  font-size: 10px;
  color: #6b7280;
}
.ai-close-btn {
  border: none;
  background: none;
  cursor: pointer;
  font-size: 16px;
  color: #9ca3af;
  padding: 0 2px;
}
.ai-msgs {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.ai-msg {
  padding: 9px 13px;
  border-radius: 12px;
  font-size: 12px;
  line-height: 1.5;
  max-width: 90%;
  white-space: pre-wrap;
}
.ai-msg.user {
  background: var(--accent-soft);
  color: #3730a3;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.ai-msg.ai {
  background: #f5f3ff;
  color: #5b21b6;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.ai-msg.sys {
  background: var(--surface-2);
  color: var(--text-3);
  align-self: center;
  font-size: 10px;
  font-style: italic;
}
.ai-input-row {
  padding: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.ai-input {
  flex: 1;
  padding: 9px 11px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  font-size: 12px;
  font-family: inherit;
  resize: none;
  height: 38px;
  max-height: 100px;
  overflow-y: auto;
  transition: border var(--t);
}
.ai-input:focus { outline: none; border-color: var(--accent); }
.ai-send {
  padding: 9px 16px;
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
  transition: opacity var(--t);
}
.ai-send:hover:not(:disabled) { opacity: .9; }
.ai-send:disabled { opacity: .5; cursor: not-allowed; }

/* Champ de saisie de la clé API Anthropic (injecté dans mConfirm) */
.ai-key-input {
  width: 100%;
  padding: 8px;
  border: 1px solid #d1d5db;
  border-radius: 7px;
  font-size: 13px;
  font-family: inherit;
  margin-top: 4px;
  box-sizing: border-box;
}
.ai-key-hint {
  font-size: 10px;
  color: #9ca3af;
  margin-top: 6px;
}
.ai-key-hint a { color: #7c3aed; }

/* ═══════════════════════════════════════════════════════════════════════════
   TOASTS (notifications bas-centre, au-dessus du FAB)
   ═══════════════════════════════════════════════════════════════════════════ */
.toasts {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 900;
  pointer-events: none;
  align-items: center;
}
.toast {
  padding: 12px 18px;
  border-radius: var(--radius-lg);
  font-size: 12.5px;
  font-weight: 600;
  box-shadow: var(--shadow-md);
  display: flex;
  align-items: center;
  gap: 8px;
  animation: tin .28s cubic-bezier(.34, 1.2, .64, 1);
  max-width: 360px;
}
@keyframes tin {
  from { transform: translateY(12px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.toast.ok     { background: #ecfdf5; border: 1px solid #6ee7b7; color: #065f46; }
.toast.err    { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
.toast.inf    { background: var(--accent-soft); border: 1px solid #a5b4fc; color: #3730a3; }
.toast.warn2  { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }

/* ═══════════════════════════════════════════════════════════════════════════
   TOUR D'ONBOARDING
   ═══════════════════════════════════════════════════════════════════════════ */
.tour-ov {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, .7);
  z-index: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(3px);
  animation: fadeIn .25s ease;
}
.tour-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 30px;
  max-width: 440px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  animation: slideUp .3s cubic-bezier(.4, 0, .2, 1);
  text-align: center;
}
.tour-icon { font-size: 42px; margin-bottom: 12px; line-height: 1; }
.tour-title { font-size: 19px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.tour-body {
  font-size: 13.5px;
  color: var(--text-2);
  line-height: 1.65;
  margin-bottom: 22px;
  text-align: left;
}
.tour-body code {
  background: var(--surface-2);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 12px;
  color: var(--accent);
}
.tour-progress {
  display: flex;
  gap: 5px;
  justify-content: center;
  margin-bottom: 22px;
}
.tour-dot {
  width: 26px;
  height: 4px;
  background: var(--surface-3);
  border-radius: 2px;
  transition: background var(--t);
}
.tour-dot.on { background: var(--accent); }
.tour-actions {
  display: flex;
  gap: 10px;
  justify-content: space-between;
  align-items: center;
}
.tour-skip {
  background: none;
  border: none;
  color: var(--text-3);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: color var(--t);
  padding: 6px 8px;
}
.tour-skip:hover { color: var(--text-2); }
.tour-nav { display: flex; gap: 8px; }
.tour-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 9px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all var(--t);
}
.tour-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
.tour-btn.ghost {
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--border-strong);
}
.tour-btn.ghost:hover {
  background: var(--surface-2);
  color: var(--text);
  transform: none;
}

/* ═══════════════════════════════════════════════════════════════════════════
   FORMULAIRES (modaux d'édition)
   ═══════════════════════════════════════════════════════════════════════════ */
.form-col {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.form-input {
  width: 100%;
  padding: 8px;
  border: 1px solid var(--border-strong);
  border-radius: 7px;
  font-size: 13px;
  font-family: inherit;
  background: var(--surface);
  color: var(--text);
}
.form-input--sm {
  padding: 8px 10px;
  font-size: 12px;
  margin-bottom: 8px;
  box-sizing: border-box;
}
.form-input--search {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: inherit;
  margin-bottom: 10px;
  box-sizing: border-box;
  transition: border-color var(--t), box-shadow var(--t);
}
.form-input--search:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.form-select {
  padding: 7px;
  border: 1px solid #d1d5db;
  border-radius: 7px;
  font-size: 13px;
  font-family: inherit;
}
.form-select--block {
  width: 100%;
  font-size: 13px;
  padding: 6px;
  border: 1px solid #d1d5db;
  border-radius: 7px;
  margin-bottom: 8px;
}
.form-textarea {
  width: 100%;
  height: 100px;
  padding: 10px;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
  margin-bottom: 12px;
}
.form-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.form-grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.form-inline {
  display: flex;
  align-items: center;
}
.form-hint {
  font-size: 11px;
  color: #9ca3af;
  margin-left: 8px;
}
.form-hint-sm {
  font-size: 10px;
  color: #9ca3af;
  line-height: 1.4;
}
.form-prio-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.form-prio-input {
  width: 65px;
  padding: 7px;
  border: 1px solid #d1d5db;
  border-radius: 7px;
  font-size: 13px;
  font-family: inherit;
}
.form-h-input { width: 90px; }
.form-cp-input { width: 70px; }

/* Picker de couleur employé */
.color-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.color-swatch {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid #e5e7eb;
  flex-shrink: 0;
}
.color-swatch--selected { border-width: 3px; }

/* Sélecteur multiple (boutons type/section) */
.choice-row { display: flex; gap: 8px; }

/* Pastilles jour en mode "custom" */
.pill-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}

/* Case à cocher "polyvalent" */
.poly-checkbox {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  padding: 10px 12px;
  border-radius: 8px;
}
.poly-checkbox input {
  accent-color: #7c3aed;
  width: 16px;
  height: 16px;
}
.poly-label {
  font-size: 12px;
  font-weight: 500;
}

/* Liste de postes cochables (rôles cuisine / postes salle autorisés) */
.roles-col {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.role-item {
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  font-size: 12px;
  padding: 6px 9px;
  border: 0.5px solid #e5e7eb;
  border-radius: 6px;
}

/* Affectation fixe : liste des tags + ligne d'ajout */
.fix-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  min-height: 24px;
  margin-bottom: 8px;
}
.fix-list-empty {
  font-size: 11px;
  color: #9ca3af;
  font-style: italic;
}
.fix-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  color: #1f2937;
}
.fix-tag-remove {
  border: none;
  background: rgba(0, 0, 0, .12);
  border-radius: 50%;
  width: 14px;
  height: 14px;
  cursor: pointer;
  font-size: 9px;
  padding: 0;
  color: #374151;
  margin-left: 3px;
  flex-shrink: 0;
}
.fix-row {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}
.fix-dow-select {
  padding: 6px;
  border: 1px solid #d1d5db;
  border-radius: 7px;
  font-size: 12px;
  font-family: inherit;
  width: 110px;
}
.fix-post-select {
  padding: 6px;
  border: 1px solid #d1d5db;
  border-radius: 7px;
  font-size: 12px;
  font-family: inherit;
  flex: 1;
}
.fix-add-btn {
  padding: 6px 12px;
  border-radius: 7px;
  border: 1.5px solid #16a34a;
  background: #f0fdf4;
  color: #15803d;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL AUTO-GÉNÉRATION (liste des règles métier)
   ═══════════════════════════════════════════════════════════════════════════ */
.rules-box {
  background: #f9fafb;
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 1rem;
  max-height: 28vh;
  overflow-y: auto;
}
.autogen-desc {
  font-size: 11px;
  color: #9ca3af;
  margin-bottom: 1rem;
}
.assign-post-badge {
  padding: 2px 8px;
  border-radius: 4px;
  color: #1f2937;
  font-size: 12px;
  margin-left: 6px;
}

/* Message de modal de confirmation générique */
.confirm-msg {
  font-size: 13px;
  color: #6b7280;
  margin-bottom: 1.25rem;
  line-height: 1.6;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL EMPLOYÉS (liste)
   ═══════════════════════════════════════════════════════════════════════════ */
.emps-scroll {
  max-height: 460px;
  overflow-y: auto;
}
/* Variante pleine page (vue Équipe) : pas de plafond de hauteur modal */
.emps-page {
  padding: 16px 20px 32px;
}
.emps-page-bar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 14px;
}
.emps-scroll--page {
  max-height: none;
  overflow-y: visible;
}
.emps-add-btn {
  padding: 5px 10px;
  font-size: 11px;
  margin-bottom: 1rem;
}
.emps-section-header {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
}
.emps-section-cuisine { color: #c2410c; }
.emps-section-salle { color: #1d4ed8; }
.emps-count-hint {
  font-weight: 400;
  color: #9ca3af;
}
.emps-table {
  width: 100%;
  border-collapse: collapse;
  border: 0.5px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.emps-row { border-bottom: 0.5px solid var(--border); }
.emps-row--alt { background: var(--surface-2); }
.emps-name-cell { padding: 7px 10px; font-size: 12px; font-weight: 500; }
.emps-prio-cell { padding: 7px 6px; text-align: center; }
.emps-prio-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #f1f5f9;
  font-size: 10px;
  font-weight: 700;
  color: #374151;
  border: 1px solid #e5e7eb;
}
.emps-td { padding: 7px 8px; }
.emps-td--center { text-align: center; font-size: 12px; color: #9ca3af; }
.emps-td--phone { font-size: 11px; color: #9ca3af; }
.emps-td--actions {
  padding: 7px 8px;
  white-space: nowrap;
}

/* Vue Équipe en cartes (plus lisible que la table) */
.emps-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.emp-card {
  border: 1px solid var(--border, #e5e7eb);
  border-radius: 14px;
  padding: 14px 16px;
  background: var(--surface, #fff);
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-left: 4px solid var(--border, #e5e7eb);
  transition: box-shadow .15s, transform .15s;
}
.emp-card:hover {
  box-shadow: 0 4px 14px rgba(0, 0, 0, .07);
  transform: translateY(-1px);
}
.emp-card-top {
  display: flex;
  align-items: center;
  gap: 10px;
}
.emp-card-name {
  font-size: 15px;
  font-weight: 700;
  flex: 1;
  line-height: 1.2;
}
.emp-card-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.emp-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: .02em;
}
.emp-badge--contrat { background: #ecfdf5; color: #047857; }
.emp-badge--extra   { background: #fef3c7; color: #92400e; }
.emp-badge--poly    { background: #ede9fe; color: #6d28d9; }
.emp-badge--manual  { background: #f1f5f9; color: #475569; }
.emp-card-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  border-top: 1px solid var(--border, #f1f5f9);
  padding-top: 10px;
}
.emp-stat { text-align: center; }
.emp-stat-val { font-size: 15px; font-weight: 700; color: #111827; }
.emp-stat-val--missing { color: #dc2626; font-size: 13px; }
.emp-stat-lbl {
  font-size: 10px;
  color: #9ca3af;
  text-transform: uppercase;
  margin-top: 1px;
}
.emp-card-actions {
  display: flex;
  gap: 6px;
  justify-content: flex-end;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL ABSENCES / INDISPOS (grille employés × jours)
   ═══════════════════════════════════════════════════════════════════════════ */
.abs-type-row {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.abs-type-btn {
  padding: 5px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
  font-size: 11px;
}
.abs-filter-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-left: auto;
}
.abs-filter-btn {
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 20px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
}
.abs-wrap {
  overflow: auto;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  max-height: 58vh;
}
.abs-table {
  border-collapse: collapse;
  width: max-content;
  min-width: 100%;
}
.abs-thead-row {
  position: sticky;
  top: 0;
  z-index: 3;
}
.abs-th-emp {
  position: sticky;
  left: 0;
  z-index: 4;
  background: #f8fafc;
  padding: 8px 12px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  color: #6b7280;
  min-width: 160px;
  border-right: 0.5px solid #e5e7eb;
  border-bottom: 1px solid #e5e7eb;
  text-align: left;
}
.abs-th-day {
  min-width: 28px;
  width: 28px;
  padding: 3px 0;
  text-align: center;
  background: #f8fafc;
  border-bottom: 2px solid #e2e8f0;
  border-left: 0.5px solid #e5e7eb;
}
.abs-th-day--today {
  background: #dbeafe;
  border-bottom-color: #3b82f6;
}
.abs-th-day-name { font-size: 9px; font-weight: 700; }
.abs-th-day-num { font-size: 11px; font-weight: 700; }
.abs-th-total {
  position: sticky;
  right: 0;
  z-index: 4;
  background: #f8fafc;
  padding: 8px;
  font-size: 10px;
  font-weight: 700;
  color: #6b7280;
  min-width: 44px;
  border-left: 1px solid #d1d5db;
  border-bottom: 1px solid #e5e7eb;
  text-align: center;
}
.abs-row { border-bottom: 0.5px solid #e5e7eb; }
/* Vue Heures : cellules de la matrice employés × jours */
.abs-td-emp {
  position: sticky;
  left: 0;
  z-index: 1;
  padding: 6px 8px 6px 12px;
  min-width: 160px;
  white-space: nowrap;
  border-right: 0.5px solid #e5e7eb;
}
.abs-td-emp .emp-dot { vertical-align: middle; margin-right: 6px; }
.abs-cell {
  min-width: 28px;
  width: 28px;
  padding: 4px 0;
  border-left: 0.5px solid #f1f5f9;
}
.abs-cell:hover { background: #eff6ff !important; }
.abs-td-total {
  position: sticky;
  right: 0;
  z-index: 1;
  background: #fff;
  padding: 4px 8px;
  min-width: 56px;

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════════════════
   ÉTAT GLOBAL (`S`) — contient toutes les données de l'application
   ───────────────────────────────────────────────────────────────────────────
   S.y        année sélectionnée
   S.m        mois sélectionné (0 = janvier, 11 = décembre)
   S.modal    descripteur de modal ouverte (null si aucune)
   S.recap    booléen : panneau récapitulatif affiché/replié
   S.pl       plannings {moisKey: {jour: {poste: empId}}}
   S.ind      indisponibilités souhaitées {moisKey: {empId: [jours]}}
   S.cp       congés payés              {moisKey: {empId: [jours]}}
   S.mal      maladies                  {moisKey: {empId: [jours]}}
   S.notes    notes par jour            {moisKey: {jour: "texte"}}
   S.dc       config des postes actifs  {moisKey: {jour|__week__|__month__: ...}}
   S.emps     liste des employés (copie modifiable de EMPLOYEES_INIT)
   S.view     "month" | "week"
   S.weekOf   index de la semaine affichée en vue "week"
   ─────────────────────────────────────────────────────────────────────────── */

/* ───────────────────────────────────────────────────────────────────────────
   TOAST — notifications éphémères bas-centre
   ─────────────────────────────────────────────────────────────────────────── */
let _toastContainer = null;

function toast(message, type, duration) {
  if (!_toastContainer) {
    _toastContainer = document.createElement('div');
    _toastContainer.className = 'toasts';
    document.body.appendChild(_toastContainer);
  }
  const el = document.createElement('div');
  el.className = 'toast ' + (type || 'ok');
  const iconMap = { ok: '✅', err: '❌', inf: 'ℹ️', warn2: '⚠️' };
  const icon = iconMap[type || 'ok'] || '✅';
  el.innerHTML = '<span>' + icon + '</span><span>' + message + '</span>';
  _toastContainer.appendChild(el);

  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transition = 'opacity .3s';
    setTimeout(() => {
      if (el.parentNode) el.parentNode.removeChild(el);
    }, 320);
  }, duration || 2600);
}

/* ───────────────────────────────────────────────────────────────────────────
   UNDO — pile de snapshots (max 10) pour annuler les modifications
   ─────────────────────────────────────────────────────────────────────────── */
const _undoStack = [];

function pushUndo() {
  const snap = JSON.stringify({
    pl: S.pl, ind: S.ind, cp: S.cp, mal: S.mal, pm: S.pm,
    notes: S.notes, dc: S.dc, real: S.real, daily: S.daily, closed: S.closed
  });
  _undoStack.push(snap);
  if (_undoStack.length > 10) _undoStack.shift();
}

function undo() {
  if (!_undoStack.length) {
    toast('Rien à annuler', 'inf');
    return;
  }
  const snap = JSON.parse(_undoStack.pop());
  if (snap.pl)     S.pl     = snap.pl;
  if (snap.ind)    S.ind    = snap.ind;
  if (snap.cp)     S.cp     = snap.cp;
  if (snap.mal)    S.mal    = snap.mal;
  if (snap.pm)     S.pm     = snap.pm;
  if (snap.notes)  S.notes  = snap.notes;
  if (snap.dc)     S.dc     = snap.dc;
  if (snap.real)   S.real   = snap.real;
  if (snap.daily)  S.daily  = snap.daily;
  if (snap.closed) S.closed = snap.closed;
  save();
  render();
  toast('Action annulée', 'warn2');
}

/* ───────────────────────────────────────────────────────────────────────────
   RACCOURCIS CLAVIER
   ← / →    : mois précédent / suivant
   Échap    : fermer la modal
   Ctrl + Z : annuler
   Désactivé quand le focus est dans un champ de saisie
   ─────────────────────────────────────────────────────────────────────────── */
document.addEventListener('keydown', ev => {
  const tag = ev.target && ev.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

  if (ev.key === 'Escape' && S.modal) {
    closeModal();
    return;
  }

  if (!S.modal) {
    if (ev.key === 'ArrowLeft') {
      S.m--;
      if (S.m < 0) { S.m = 11; S.y--; }
      S.weekOf = 0;
      render();
    }
    if (ev.key === 'ArrowRight') {
      S.m++;
      if (S.m > 11) { S.m = 0; S.y++; }
      S.weekOf = 0;
      render();
    }
    if ((ev.ctrlKey || ev.metaKey) && ev.key === 'z') {
      ev.preventDefault();
      undo();
    }
    // Raccourcis lettres (sans modificateur)
    if (!ev.ctrlKey && !ev.metaKey && !ev.altKey) {
      const key = ev.key.toLowerCase();
      if (key === 'g') { S.modal = { type: 'autogen', mode: 'replace' }; render(); }
      else if (key === 'e') { S.view = 'emps'; S.modal = null; render(); }
      else if (key === 'a') { S.modal = { type: 'indispos', flt: 'tous', absType: 'ind' }; render(); }
      else if (key === 'r') { S.recap = !S.recap; render(); }
      else if (key === 's') { openSaisie(); }
      else if (key === 'c') { S.view = 'caisse'; render(); }
      else if (key === 'h' || ev.key === '?') { S.modal = { type: 'shortcuts' }; render(); }
    }
  }
});

/* ═══════════════════════════════════════════════════════════════════════════
   HELPERS CALENDRIER / PLANNING
   ───────────────────────────────────────────────────────────────────────────
   mk()       clé du mois courant au format "YYYY-MM" (pour S.pl, S.ind, ...)
   dim(y,m)   nombre de jours dans le mois (days in month)
   dow(y,m,d) jour de la semaine (0=dimanche … 6=samedi)
   isWE       le jour est un samedi ou dimanche
   isTod      le jour est aujourd'hui
   canWork    l'employé peut-il travailler ce jour selon son pattern (jt) ?
   ─────────────────────────────────────────────────────────────────────────── */
function mk() {
  return S.y + '-' + String(S.m + 1).padStart(2, '0');
}

function dim(year, month) {
  return new Date(year, month + 1, 0).getDate();
}

function dow(year, month, day) {
  return new Date(year, month, day).getDay();
}

function isWE(year, month, day) {
  const w = dow(year, month, day);
  return w === 0 || w === 6;
}

/* ═══════════════════════════════════════════════════════════════════════════
   JOURS FÉRIÉS (Martinique = nationaux + Abolition + Victor Schoelcher)
   ───────────────────────────────────────────────────────────────────────────
   Les fériés sont traités comme des dimanches dans l'algorithme : même
   config de postes, mêmes règles (Natacha S1, Agnès pas de Chaud, etc.).
   ═══════════════════════════════════════════════════════════════════════════ */

/* Date de Pâques pour une année donnée (algorithme Meeus/Jones/Butcher). */
function easterDate(y) {
  const a = y % 19;
  const b = Math.floor(y / 100);
  const c = y % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  return { m: month - 1, d: day };
}

/* Liste complète des fériés d'une année (13 entrées en Martinique). */
function getFeries(y) {
  const e = easterDate(y);
  const easterD = new Date(y, e.m, e.d);
  const lundiPaq = new Date(easterD);   lundiPaq.setDate(lundiPaq.getDate() + 1);
  const ascension = new Date(easterD);  ascension.setDate(ascension.getDate() + 39);
  const lundiPent = new Date(easterD);  lundiPent.setDate(lundiPent.getDate() + 50);
  return [
    { m: 0, d: 1,  n: "Jour de l'an" },
    { m: lundiPaq.getMonth(),  d: lundiPaq.getDate(),  n: 'Lundi de Pâques' },
    { m: 4, d: 1,  n: 'Fête du Travail' },
    { m: 4, d: 8,  n: 'Victoire 1945' },
    { m: ascension.getMonth(), d: ascension.getDate(), n: 'Ascension' },
    { m: 4, d: 22, n: 'Abolition esclavage' },  // spécifique Martinique
    { m: lundiPent.getMonth(), d: lundiPent.getDate(), n: 'Lundi Pentecôte' },
    { m: 6, d: 14, n: 'Fête Nationale' },
    { m: 6, d: 21, n: 'Victor Schoelcher' },   // spécifique Martinique
    { m: 7, d: 15, n: 'Assomption' },
    { m: 10, d: 1, n: 'Toussaint' },
    { m: 10, d: 11, n: 'Armistice' },
    { m: 11, d: 25, n: 'Noël' }
  ];
}

/* Cache par année (les fériés ne changent pas dans une même année). */
const _ferieCache = {};
function isFerie(y, m, d) {
  if (!_ferieCache[y]) _ferieCache[y] = getFeries(y);
  const list = _ferieCache[y];
  for (let i = 0; i < list.length; i++) {
    if (list[i].m === m && list[i].d === d) return list[i];
  }
  return null;
}

function isWEorFerie(y, m, d) {
  return isWE(y, m, d) || !!isFerie(y, m, d);
}

function isTod(year, month, day) {
  const t = new Date();
  return t.getFullYear() === year
      && t.getMonth() === month
      && t.getDate() === day;
}

/* canWork : vérifie si l'employé peut travailler selon son pattern (jt).
   Les jours fériés sont traités comme des dimanches :
   - "weekdays"  : NE peut PAS travailler un férié (c'est un dimanche)
   - "weekends"  : PEUT travailler un férié
   - "custom"    : autorisé si dimanche (0) est dans ses jours configurés
   - "all"       : toujours autorisé */
function canWork(employee, year, month, day) {
  const w = dow(year, month, day);
  const ferie = !!isFerie(year, month, day);
  if (employee.jt === 'weekdays') return !ferie && w >= 1 && w <= 5;
  if (employee.jt === 'weekends') return ferie || w === 0 || w === 6;
  if (employee.jt === 'custom') {
    if (ferie) return (employee.jours || []).indexOf(0) >= 0;
    return (employee.jours || []).indexOf(w) >= 0;
  }
  return true;
}

/* ───────────────────────────────────────────────────────────────────────────
   ACCESSEURS ABSENCES / CONGÉS / MALADIE / NOTES / CRÉNEAUX
   ─────────────────────────────────────────────────────────────────────────── */
function getInd(empId)  { return ((S.ind[mk()]   || {})[empId] || []); }
function getCp(empId)   { return ((S.cp[mk()]    || {})[empId] || []); }
function getMal(empId)  { return ((S.mal[mk()]   || {})[empId] || []); }
function getPm(empId)   { return ((S.pm[mk()]    || {})[empId] || []); }
function getNote(day)   { return ((S.notes[mk()] || {})[day]   || ''); }

/* Postes considérés comme "matin" (l'employé en PM-only ne peut pas y être placé)
   Cuisine entière + Ouvertures = matin. Tout le reste (S3-S7, PL, EX) = après-midi. */
const MORNING_POSTS = ['CH', 'DC', 'CR', 'DS', 'AI', 'S1', 'S2'];
function isMorningPost(postCode) {
  return MORNING_POSTS.indexOf(postCode) >= 0;
}
function isPmOnly(empId, day) {
  /* 1. PM ponctuel coché dans le mois */
  if (getPm(empId).indexOf(day) >= 0) return true;
  /* 2. Règle récurrente (pmDow = liste de jours de semaine PM-only en permanence) */
  const emp = findEmp(empId);
  if (emp && emp.pmDow && emp.pmDow.indexOf(dow(S.y, S.m, day)) >= 0) return true;
  return false;
}

function isAbsent(empId, day) {
  return getInd(empId).indexOf(day) >= 0
      || getCp(empId).indexOf(day)  >= 0
      || getMal(empId).indexOf(day) >= 0;
}

/* Jour fermé (restaurant) : défini dans S.closed[mk] = [jours]. Aucune
   affectation n'est possible ni générée automatiquement ce jour. */
function isClosed(day) {
  const arr = S.closed[mk()] || [];
  return arr.indexOf(day) >= 0;
}

function getSlot(day, postCode) {
  const v = ((S.pl[mk()] || {})[String(day)] || {})[postCode];
  return v !== undefined ? v : null;
}

function setSlot(day, postCode, empId) {
  pushUndo();
  if (!S.pl[mk()]) S.pl[mk()] = {};
  const k = String(day);
  if (!S.pl[mk()][k]) S.pl[mk()][k] = {};
  S.pl[mk()][k][postCode] = empId;
  save();
}

function findEmp(empId) {
  for (let i = 0; i < S.emps.length; i++) {
    if (S.emps[i].id === empId) return S.emps[i];
  }
  return null;
}

function eName(empId) {
  const e = findEmp(empId);
  return e ? e.n : '?';
}

function eColor(empId) {
  const e = findEmp(empId);
  const fallback = { bg: '#f1f5f9', text: '#374151' };
  if (!e || !e.col) return fallback;
  for (let i = 0; i < ECOLS.length; i++) {
    if (ECOLS[i].id === e.col) return ECOLS[i];
  }
  return fallback;
}

/* ───────────────────────────────────────────────────────────────────────────
   POSTES ACTIFS SUR UN JOUR DONNÉ
   Résout par ordre de priorité :
     1. Override spécifique à ce jour            S.dc[mk][day]
     2. Férié → utiliser la config du dimanche (effectiveDay = 0)
     3. Config du jour de la semaine             S.dc[mk]["__week__"][dow]
     4. Config du mois entier                    S.dc[mk]["__month__"]
     5. Défaut (mêmes postes tous les jours)     [CH,DC,CR,DS,S1,S2,S3,S4,EX]
   ─────────────────────────────────────────────────────────────────────────── */
function getActivePosts(day) {
  const monthCfg = S.dc[mk()] || {};
  if (monthCfg[day]) return monthCfg[day];

  const w = dow(S.y, S.m, day);
  const ferie = isFerie(S.y, S.m, day);
  // Férié traité comme un dimanche (effectiveDay = 0)
  const effectiveDay = ferie ? 0 : w;

  const weekCfg = monthCfg['__week__'];
  if (weekCfg && weekCfg[effectiveDay]) {
    const cfg = weekCfg[effectiveDay];
    return (cfg.cuisine || []).concat(cfg.salle || []);
  }

  const monthWide = monthCfg['__month__'];
  if (monthWide) return (monthWide.cuisine || []).concat(monthWide.salle || []);

  // Défaut du v8 : inclut S1+S2 + "EX" (caisse/extra)
  return ['CH', 'DC', 'CR', 'DS', 'S1', 'S2', 'S3', 'S4', 'EX'];
}

/* ───────────────────────────────────────────────────────────────────────────
   STATS D'AFFECTATION POUR UN JOUR / EMPLOYÉ
   assignedOnDay   : set des empIds déjà affectés ce jour
   workedDays      : nb de jours travaillés ce mois (ou mois précis)
   workedHours     : heures totales travaillées ce mois (ou mois précis)
   ─────────────────────────────────────────────────────────────────────────── */
function assignedOnDay(day) {
  const set = {};
  for (let i = 0; i < AP.length; i++) {
    const e = getSlot(day, AP[i].c);
    if (e !== null) set[e] = 1;
  }
  return set;
}

function workedDays(empId) {
  const D = dim(S.y, S.m);
  const set = {};
  for (let d = 1; d <= D; d++) {
    for (let i = 0; i < AP.length; i++) {
      if (getSlot(d, AP[i].c) === empId) { set[d] = 1; break; }
    }
  }
  return Object.keys(set).length;
}

function workedDaysInMonth(empId, year, month) {
  const key = year + '-' + String(month + 1).padStart(2, '0');
  const pl = S.pl[key] || {};
  const D = new Date(year, month + 1, 0).getDate();
  const set = {};
  for (let d = 1; d <= D; d++) {
    const dd = pl[String(d)] || {};
    for (let i = 0; i < AP.length; i++) {
      if (dd[AP[i].c] === empId) { set[d] = 1; break; }
    }
  }
  return Object.keys(set).length;
}

function workedHours(empId) {
  const D = dim(S.y, S.m);
  let total = 0;
  for (let d = 1; d <= D; d++) {
    for (let i = 0; i < AP.length; i++) {
      if (getSlot(d, AP[i].c) === empId) {
        total += postH(AP[i].c);
        break;
      }
    }
  }
  return Math.round(total * 10) / 10;
}

function workedHoursInMonth(empId, year, month) {
  const key = year + '-' + String(month + 1).padStart(2, '0');
  const pl = S.pl[key] || {};
  const D = new Date(year, month + 1, 0).getDate();
  let total = 0;
  for (let d = 1; d <= D; d++) {
    const dd = pl[String(d)] || {};
    for (let i = 0; i < AP.length; i++) {
      if (dd[AP[i].c] === empId) {
        total += postH(AP[i].c);
        break;
      }
    }
  }
  return Math.round(total * 10) / 10;
}

/* ───────────────────────────────────────────────────────────────────────────
   RÈGLES D'AFFECTATION
   canAssign(e,d,pc)     : valide tout (dispo, absent, pattern) + compat poste
   canAssignPost(e,d,pc) : valide uniquement pattern + compat poste
                           (utilisé en drag&drop : on ignore les absences)
   ─────────────────────────────────────────────────────────────────────────── */
function canAssign(employee, day, postCode) {
  if (isAbsent(employee.id, day)) return false;
  if (!canWork(employee, S.y, S.m, day)) return false;
  /* Si l'employé est restreint à l'après-midi ce jour, bloquer les postes du matin */
  if (isPmOnly(employee.id, day) && isMorningPost(postCode)) return false;

  const isCuisinePost = POSTES_CUISINE.some(p => p.c === postCode);
  if (isCuisinePost) {
    const hasRole = (employee.r || []).indexOf(postCode) >= 0;
    // Autorisé si : (section cuisine) OU (salle polyvalent avec ce rôle)
    return (employee.s === 'cuisine' || (employee.ec && hasRole)) && hasRole;
  }
  if (employee.s !== 'salle') return false;
  const rsList = employee.rs || [];
  return rsList.length === 0 || rsList.indexOf(postCode) >= 0;
}

function canAssignPost(employee, day, postCode) {
  if (!canWork(employee, S.y, S.m, day)) return false;

  const isCuisinePost = POSTES_CUISINE.some(p => p.c === postCode);
  if (isCuisinePost) {
    const hasRole = (employee.r || []).indexOf(postCode) >= 0;
    return (employee.s === 'cuisine' || (employee.ec && hasRole)) && hasRole;
  }
  if (employee.s !== 'salle') return false;
  const rsList = employee.rs || [];
  return rsList.length === 0 || rsList.indexOf(postCode) >= 0;
}

/* ───────────────────────────────────────────────────────────────────────────
   ICÔNE D'ABSENCE (CP / maladie / indispo souhaitée)
   ─────────────────────────────────────────────────────────────────────────── */
function absIcon(empId, day) {
  if (getCp(empId).indexOf(day) >= 0) {
    return '<span class="abs-icon abs-icon--cp" title="Congé payé">CP</span>';
  }
  if (getMal(empId).indexOf(day) >= 0) {
    return '<span class="abs-icon abs-icon--mal" title="Maladie">🤒</span>';
  }
  if (getInd(empId).indexOf(day) >= 0) {
    return '<span class="abs-icon abs-icon--ind" ' +
           'title="Indisponibilité souhaitée">⚠</span>';
  }
  return '';
}

/* ───────────────────────────────────────────────────────────────────────────
   ANALYSE TEMPORELLE — JOURS CONSÉCUTIFS & CONTRAINTES DÉRIVÉES
   consecBefore : nombre de jours travaillés consécutivement AVANT `day`
   needsRest2   : faut-il imposer un repos de 2 jours à partir de `day` ?
                  Déclenché lorsque l'employé a atteint maxConsec la veille
                  ET n'a pas travaillé hier (hier = 1er jour de repos).
   wasChaudSun  : l'employé était-il sur Chaud dimanche dernier ?
                  (utilisé pour éviter l'enchaînement Chaud dim → Chaud lun)
   wasS1x2      : l'employé était-il sur S1 les 2 jours précédents ?
                  (règle "pas 3j consécutifs sur l'Ouverture")
   postInWeek   : nb de fois où `empId` a été sur `pc` dans la semaine courante
   daysInWeek   : nb de jours travaillés par `empId` cette semaine
   uncovered    : liste "JourN:PosteCode" des postes non affectés
   ─────────────────────────────────────────────────────────────────────────── */
function consecBefore(empId, day) {
  let count = 0;
  for (let x = day - 1; x >= 1; x--) {
    let found = false;
    for (let i = 0; i < AP.length; i++) {
      if (getSlot(x, AP[i].c) === empId) { found = true; break; }
    }
    if (found) count++;
    else break;
  }
  return count;
}

function needsRest2(empId, day) {
  if (day < 3) return false;
  const employee = findEmp(empId);
  const maxConsec = (employee && employee.maxConsec) ? employee.maxConsec : RL.mjc;

  // A-t-il travaillé hier ? Si oui, on n'est pas dans un repos forcé.
  let workedYesterday = false;
  for (let i = 0; i < AP.length; i++) {
    if (getSlot(day - 1, AP[i].c) === empId) { workedYesterday = true; break; }
  }
  if (workedYesterday) return false;

  // Il n'a pas travaillé hier → hier est le 1er jour de repos.
  // S'il avait maxConsec jours travaillés à J-2, il doit ENCORE se reposer.
  return consecBefore(empId, day - 1) >= maxConsec;
}

function wasChaudSun(empId, day) {
  // `day` est un lundi (dow=1) ET la veille (dimanche) il était sur CH
  return dow(S.y, S.m, day) === 1 && day >= 2 && getSlot(day - 1, 'CH') === empId;
}

function wasS1x2(empId, day) {
  return day >= 3
      && getSlot(day - 1, 'S1') === empId
      && getSlot(day - 2, 'S1') === empId;
}

/* Nb de jours consécutifs au poste Chaud juste avant `day` (max 2 autorisé). */
function consecChaudBefore(empId, day) {
  let count = 0;
  for (let x = day - 1; x >= 1; x--) {
    if (getSlot(x, 'CH') === empId) count++;
    else break;
  }
  return count;
}

/* Nb de jours depuis le dernier Chaud de `empId` (ou 99 s'il n'en a jamais fait
   ce mois-ci). Utilisé pour la rotation : on préfère celui qui n'a pas fait
   Chaud depuis longtemps. */
function lastChaudGap(empId, day) {
  for (let x = day - 1; x >= 1; x--) {
