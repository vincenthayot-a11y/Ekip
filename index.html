// ═══════════════════════════════════════════════════════════════════════════
//   DASHBOARD VIEW
// ═══════════════════════════════════════════════════════════════════════════

function DashboardView({ context }) {
  const { articles, recipes, purchases, sales, energy, priceIndex, dateFrom, dateTo, alertsIndex, equipmentPurchases, assetMaintenance, assetInterventions } = context;
  const isMobile = useIsMobile(720);

  // Find the global assortment base once, then build a map of plate cost per recipe.
  // "Plate cost" = recipe cost ÷ yield portions + (assortment cost if includesAssortment).
  // This is what's actually served to the customer, so it's the right number for
  // food cost analysis.
  const assortmentBase = useMemo(() => findAssortmentBase(recipes), [recipes]);
  const recipeCostMap = useMemo(() => {
    const map = {};
    for (const recipe of recipes) {
      map[recipe.id] = indexedPlateCost(recipe, priceIndex, assortmentBase).plateCost;
    }
    return map;
  }, [recipes, priceIndex, assortmentBase]);

  // Build a fast lookup of product type by article id, so we can split each
  // purchase line into food vs consumable. Pre-existing products (no type field)
  // default to 'food' — matches the silent migration.
  const productTypeById = useMemo(() => {
    const map = {};
    for (const ing of articles) map[ing.id] = ing.type || 'food';
    return map;
  }, [articles]);

  const stats = useMemo(() => {
    const filteredSales = sales.filter(
      (s) => (!dateFrom || s.date >= dateFrom) && (!dateTo || s.date <= dateTo)
    );
    const totalRevenue = filteredSales.reduce((sum, s) => sum + s.revenue, 0);
    const totalFoodCost = filteredSales.reduce((sum, s) => {
      const cost = recipeCostMap[s.recipeId] || 0;
      return sum + cost * s.qty;
    }, 0);
    const filteredPurchases = purchases.filter(
      (p) => (!dateFrom || p.date >= dateFrom) && (!dateTo || p.date <= dateTo)
    );
    // Split each line's total based on its product type. Lines without an
    // articleId (legacy / orphan) fall back to food so they're not lost.
    let purchasesFood = 0;
    let purchasesConsumable = 0;
    for (const p of filteredPurchases) {
      for (const item of (p.items || [])) {
        const type = productTypeById[item.articleId] || 'food';
        const itemTotal = item.total || 0;
        if (type === 'consumable') purchasesConsumable += itemTotal;
        else purchasesFood += itemTotal;
      }
    }

    // Energy: total TTC across all energy invoices in the same period filter.
    // We use TTC because that's the real out-of-pocket cost for the restaurant
    // (energy taxes are not recoverable like product VAT on most contracts).
    let energyTotal = 0;
    for (const e of (energy || [])) {
      if ((!dateFrom || (e.date || '') >= dateFrom) && (!dateTo || (e.date || '') <= dateTo)) {
        energyTotal += e.totalTTC || e.totalHT || 0;
      }
    }

    // Equipment purchases (vaisselle, couverts, etc.) — filtered to same period
    const filteredEquipment = (equipmentPurchases || []).filter(
      (p) => (!dateFrom || p.date >= dateFrom) && (!dateTo || p.date <= dateTo)
    );
    const equipmentTotal = filteredEquipment.reduce((sum, p) => sum + (p.total || 0), 0);

    // Asset maintenance (recurring contracts): we compute the share of the
    // annualized cost that falls within the filter window. If no period is
    // set, default to 12 months of annual cost (= the contract's annual cost).
    //
    // Why prorated: a quarterly contract billed 80€ on Jan 1st shouldn't
    // count as 80€ for January alone — it's effectively 320€/year, so over
    // a one-month window we count 320/12 ≈ 27€.
    const periodDays = (dateFrom && dateTo)
      ? Math.max(1, Math.round((parseLocalDate(dateTo) - parseLocalDate(dateFrom)) / 86400000) + 1)
      : 365;
    const periodFraction = periodDays / 365;
    let assetMaintenanceTotal = 0;
    for (const m of (assetMaintenance || [])) {
      if (m.active === false) continue;
      const freq = CONTRACT_FREQUENCIES.find((f) => f.id === m.frequency);
      const annual = (m.amount || 0) * (freq?.perYear || 0);
      assetMaintenanceTotal += annual * periodFraction;
    }
    // Asset interventions (ponctual repairs): only those within the period
    const filteredInterventions = (assetInterventions || []).filter(
      (i) => (!dateFrom || (i.date || '') >= dateFrom) && (!dateTo || (i.date || '') <= dateTo)
    );
    const assetInterventionsTotal = filteredInterventions.reduce((sum, i) => sum + (i.cost || 0), 0);

    const equipmentGrandTotal = equipmentTotal + assetMaintenanceTotal + assetInterventionsTotal;

    return {
      totalRevenue,
      totalFoodCost,
      foodCostRatio: totalRevenue > 0 ? totalFoodCost / totalRevenue : 0,
      totalPurchases: filteredPurchases.reduce((sum, p) => sum + p.total, 0),
      purchasesFood,
      purchasesConsumable,
      energyTotal,
      equipmentTotal,        // petite vaisselle seulement (achats)
      equipmentCount: filteredEquipment.length,
      assetMaintenanceTotal,
      assetInterventionsTotal,
      equipmentGrandTotal,   // total combiné (petite + gros)
      dishesSold: filteredSales.reduce((sum, s) => sum + s.qty, 0),
    };
  }, [sales, purchases, energy, recipeCostMap, dateFrom, dateTo, productTypeById, equipmentPurchases, assetMaintenance, assetInterventions]);

  const dailyActivity = useMemo(() => {
    const map = {};
    sales
      .filter((s) => (!dateFrom || s.date >= dateFrom) && (!dateTo || s.date <= dateTo))
      .forEach((s) => {
        if (!map[s.date]) map[s.date] = { date: s.date, revenue: 0, cost: 0 };
        const cost = recipeCostMap[s.recipeId] || 0;
        map[s.date].revenue += s.revenue;
        map[s.date].cost += cost * s.qty;
      });
    return Object.values(map)
      .sort((a, b) => a.date.localeCompare(b.date))
      .map((d) => ({ ...d, label: formatShortDate(d.date), margin: d.revenue - d.cost }));
  }, [sales, recipeCostMap, dateFrom, dateTo]);

  const alerts = useMemo(() => {
    const result = [];
    recipes.forEach((recipe) => {
      if (recipe.isAssortmentBase) return; // base doesn't sell, skip
      const cost = recipeCostMap[recipe.id] || 0;
      const ratio = recipe.salePrice > 0 ? cost / recipe.salePrice : 0;
      if (ratio > 0.35) {
        result.push({
          isDanger: ratio > 0.5,
          message: `${recipe.name} : food cost ${formatPercent(ratio)}`,
        });
      }
    });
    return result;
  }, [recipes, recipeCostMap]);

  const foodCostColor =
    stats.foodCostRatio < 0.30 ? palette.sage :
    stats.foodCostRatio < 0.35 ? palette.amber : palette.wine;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: isMobile ? 16 : 20 }}>

      {/* ─── HERO : Food cost — la métrique #1 du restaurant ─────────────── */}
      <KpiCard
        variant="hero"
        label="Food cost"
        value={formatPercent(stats.foodCostRatio)}
        sub={stats.foodCostRatio < 0.30
          ? `✓ Sous 30 % · Sain (sur ${stats.dishesSold} plats vendus)`
          : stats.foodCostRatio < 0.35
            ? `Entre 30 et 35 % · à surveiller (sur ${stats.dishesSold} plats vendus)`
            : `⚠ Au-dessus de 35 % · marges sous pression (sur ${stats.dishesSold} plats vendus)`}
        accentColor={foodCostColor}
      />

      {/* ─── Secondaires : volume d'activité + coûts directs ─────────────── */}
      <div style={{
        display: 'grid',
        gridTemplateColumns: isMobile
          ? 'repeat(2, 1fr)'
          : 'repeat(auto-fit, minmax(180px, 1fr))',
        gap: isMobile ? 10 : 16,
      }}>
        <KpiCard label="Chiffre d'affaires" value={formatEuro(stats.totalRevenue)} sub={`${stats.dishesSold} plats vendus`} accentColor={palette.ink} />
        <KpiCard label="Coût matière" value={formatEuro(stats.totalFoodCost)} sub="Théorique selon recettes" />
        <KpiCard label="Achats alimentaires" value={formatEuro(stats.purchasesFood)} sub={`${purchases.length} factures`} />
      </div>

      {/* ─── Pied : coûts indirects (consommables, énergie, équipement) ─── */}
      <div style={{
        display: 'grid',
        gridTemplateColumns: isMobile
          ? 'repeat(2, 1fr)'
          : 'repeat(auto-fit, minmax(160px, 1fr))',
        gap: isMobile ? 8 : 12,
      }}>
        <KpiCard variant="compact" label="Consommables" value={formatEuro(stats.purchasesConsumable)} sub="Hors alimentaire" accentColor={palette.amber} />
        <KpiCard variant="compact" label="Énergie" value={formatEuro(stats.energyTotal)} sub={`${(energy || []).length} facture${(energy || []).length > 1 ? 's' : ''} · TTC`} accentColor={ENERGY_TYPES.electricity.color} />
        <KpiCard
          variant="compact"
          label="Équipement"
          value={formatEuro(stats.equipmentGrandTotal)}
          sub={`Vaisselle · Entretien · Pannes`}
          accentColor={palette.sage}
        />
      </div>

      {alerts.length > 0 && (
        <div className="mc-card" style={{ padding: 16, background: palette.amber + '10', borderColor: palette.amber + '40' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
            <AlertCircle size={16} style={{ color: palette.amber }} />
            <span style={{ fontWeight: 600, fontSize: 14 }}>Alertes</span>
          </div>
          {alerts.map((alert, i) => (
            <div key={i} style={{ fontSize: 13, color: alert.isDanger ? palette.wine : palette.inkSoft }}>
              · {alert.message}
            </div>
          ))}
        </div>
      )}

      {/* ── Supplier price gap summary ──────────────────────────────────── */}
      {(() => {
        const gaps = (alertsIndex || []).filter((a) => a.type === ALERT_TYPES.SUPPLIER_PRICE_GAP);
        if (gaps.length === 0) return null;
        const top = gaps.slice(0, 3); // show only the 3 biggest gaps
        return (
          <div
            className="mc-card"
            style={{ padding: 16, background: palette.wine + '08', borderColor: palette.wine + '30' }}
          >
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <TrendingUp size={16} style={{ color: palette.wine }} />
                <span style={{ fontWeight: 600, fontSize: 14 }}>
                  Écarts de prix entre fournisseurs
                </span>
                <span className="mc-pill" style={{ background: palette.wine + '20', color: palette.wine, fontWeight: 600 }}>
                  {gaps.length}
                </span>
              </div>
              <div style={{ fontSize: 11, color: palette.inkSoft }}>
                90 derniers jours · voir l'onglet Alertes pour le détail
              </div>
            </div>
            {top.map((alert) => (
              <div
                key={alert.article.id}
                style={{
                  display: 'grid',
                  gridTemplateColumns: '2fr 2fr auto',
                  gap: 12,
                  alignItems: 'center',
                  padding: '6px 0',
                  fontSize: 13,
                }}
              >
                <div style={{ fontWeight: 600, color: palette.ink }}>{alert.article.name}</div>
                <div style={{ fontSize: 12, color: palette.inkSoft }}>
                  <span style={{ color: palette.sage }}>{alert.cheapest.supplier}</span>
                  {' '}<span style={{ color: palette.inkSoft }}>vs</span>{' '}
                  <span style={{ color: palette.wine }}>{alert.dearest.supplier}</span>
                </div>
                <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 600, color: palette.wine, textAlign: 'right' }}>
                  +{alert.gapPct.toFixed(0)} %
                </div>
              </div>
            ))}
            {gaps.length > 3 && (
              <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 6, fontStyle: 'italic' }}>
                + {gaps.length - 3} autre{gaps.length - 3 > 1 ? 's' : ''} écart{gaps.length - 3 > 1 ? 's' : ''}…
              </div>
            )}
          </div>
        );
      })()}

      <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 16 }}>
        <div className="mc-card" style={{ padding: 20 }}>
          <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 16px' }}>
            Activité quotidienne
          </h3>
          <ResponsiveContainer width="100%" height={240}>
            <BarChart data={dailyActivity}>
              <CartesianGrid strokeDasharray="3 3" stroke={palette.rule} />
              <XAxis dataKey="label" stroke={palette.inkSoft} fontSize={11} />
              <YAxis stroke={palette.inkSoft} fontSize={11} />
              <Tooltip contentStyle={{ background: palette.cream, border: `1px solid ${palette.rule}`, borderRadius: 6, fontSize: 12 }} formatter={(v) => formatEuro(v)} />
              <Bar dataKey="cost" stackId="a" fill={palette.wine} name="Coût" />
              <Bar dataKey="margin" stackId="a" fill={palette.sage} name="Marge" radius={[3, 3, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>

        <div className="mc-card" style={{ padding: 20 }}>
          <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 16px' }}>
            Food cost par recette
          </h3>
          {recipes.filter((r) => !r.isAssortmentBase).map((recipe) => {
            const cost = recipeCostMap[recipe.id] || 0;
            const ratio = recipe.salePrice > 0 ? cost / recipe.salePrice : 0;
            return (
              <div
                key={recipe.id}
                style={{
                  display: 'flex',
                  justifyContent: 'space-between',
                  alignItems: 'center',
                  paddingBottom: 12,
                  marginBottom: 12,
                  borderBottom: `1px solid ${palette.rule}`,
                }}
              >
                <div>
                  <div style={{ fontSize: 13, fontWeight: 500 }}>{recipe.name}</div>
                  <div style={{ fontSize: 11, color: palette.inkSoft }}>Coût {formatEuro(cost)}</div>
                </div>
                <StatusPill ratio={ratio} />
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── extractBottleCapacityL ───────────────────────────────────────────────
//
// Pour les articles "Boissons & alcools" en unité L, déduit la capacité
// de la bouteille (en litres) à partir du nom ou des labels de variantes,
// afin d'afficher un prix indicatif par bouteille dans le catalogue.
//
// On cherche dans cet ordre :
//   1. article.name         (ex: "RHUM JM 1L BLANC")
//   2. variant.label        (première variante avec une capacité)
//   3. variant.aliases      (premier alias avec une capacité)
//
// Retourne null si aucune capacité n'est trouvée.
//
// Limites volontaires :
//   • n'est utilisé QUE pour l'affichage (n'affecte aucun calcul)
//   • pas de fallback par défaut (ex: "toujours 75cl") pour éviter les
//     faux positifs sur des articles atypiques (magnums, demi-bouteilles…)

function extractBottleCapacityL(article) {
  if (article.unit !== 'L') return null;
  if (article.category !== 'Boissons & alcools') return null;

  // Regex qui détecte les volumes dans un label texte.
  // Ordre : cL en premier car "75CL" est plus courant que "0.75L"
  const parseVolume = (str) => {
    if (typeof str !== 'string' || !str) return null;
    const s = str.toUpperCase().replace(',', '.');
    const cl = s.match(/(\d+(?:\.\d+)?)\s*CL\b/);
    if (cl) return parseFloat(cl[1]) / 100;
    const ml = s.match(/(\d+(?:\.\d+)?)\s*ML\b/);
    if (ml) return parseFloat(ml[1]) / 1000;
    // L mais pas 'LITRE' ni 'L.' (pour éviter "ALCOOL" → faux positif)
    const l = s.match(/(\d+(?:\.\d+)?)\s*L(?!ITRE|\.)\b/);
    if (l) return parseFloat(l[1]);
    return null;
  };

  // 1. Nom de l'article
  const fromName = parseVolume(article.name);
  if (fromName && fromName >= 0.15 && fromName <= 3) return fromName;

  // 2. Noms et aliases des variantes
  //    (variant a un champ `name` ; alias = objet { label, supplier })
  for (const v of (article.variants || [])) {
    const fromName2 = parseVolume(v.name);
    if (fromName2 && fromName2 >= 0.15 && fromName2 <= 3) return fromName2;
    for (const alias of (v.aliases || [])) {
      const fromAlias = parseVolume(alias && alias.label);
      if (fromAlias && fromAlias >= 0.15 && fromAlias <= 3) return fromAlias;
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════════════════
//   ARTICLES VIEW
// ═══════════════════════════════════════════════════════════════════════════

function ArticlesView({ context }) {
  const {
    articles, setArticles,
    purchases, setPurchases,
    recipes, setRecipes,
    priceIndex, allTimePriceIndex,
    dateFrom, dateTo,
    articleCategories,
  } = context;

  const [editingArticle, setEditingArticle] = useState(null);
  const [detailArticle, setDetailArticle] = useState(null);
  const [mergingArticle, setMergingArticle] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [categoryFilter, setCategoryFilter] = useState('all');
  const [typeFilter, setTypeFilter] = useState('all');
  const [supplierFilter, setSupplierFilter] = useState('all');
  const [reclassifyCount, setReclassifyCount] = useState(null);

  // Reclassify all products that are still in "À trier" by running the label
  // detection on their first alias (= the original supplier label). Products
  // that already have a real category are left untouched.
  const handleReclassify = () => {
    let count = 0;
    const updated = articles.map((ing) => {
      if ((ing.category || 'À trier') !== 'À trier') return ing;
      let detected = null;
      for (const variant of (ing.variants || [])) {
        for (const alias of (variant.aliases || [])) {
          // aliases are objects { label, supplier } — use .label
          detected = detectCategoryFromLabel(alias.label);
          if (detected) break;
        }
        if (detected) break;
      }
      if (!detected) detected = detectCategoryFromLabel(ing.name);
      if (detected) {
        count++;
        return { ...ing, category: detected };
      }
      return ing;
    });
    setArticles(updated);
    setReclassifyCount(count);
    setTimeout(() => setReclassifyCount(null), 4000);
  };

  const enrichedArticles = useMemo(() => {
    return articles.map((article) => {
      const periodEntry = priceIndex.master[article.id];
      const allTimeEntry = allTimePriceIndex.master[article.id];

      return {
        ...article,
        avg: periodEntry?.avg ?? null,
        last: allTimeEntry?.lastPrice ?? null,
        purchaseCount: periodEntry?.count ?? 0,
        variantCount: (article.variants || []).length,
      };
    });
  }, [articles, priceIndex, allTimePriceIndex]);

  // Build the list of unique categories present in the catalog (sorted A→Z).
  // Empty/missing categories are bucketed under "Sans catégorie".
  const availableCategories = useMemo(() => {
    const set = new Set();
    let hasUncategorized = false;
    for (const i of articles) {
      const cat = (i.category || '').trim();
      if (cat) set.add(cat);
      else hasUncategorized = true;
    }
    const sorted = Array.from(set).sort((a, b) => a.localeCompare(b));
    if (hasUncategorized) sorted.push('__uncategorized__');
    return sorted;
  }, [articles]);

  // Map articleId → Set<supplier> dérivée des achats. Permet de filtrer la liste
  // par fournisseur sans recalculer à chaque render. Un article peut avoir
  // plusieurs fournisseurs si on l'a acheté chez plusieurs sources.
  const articleSuppliers = useMemo(() => {
    const map = new Map();
    for (const p of purchases) {
      const sup = (p.supplier || '').trim();
      if (!sup) continue;
      for (const item of (p.items || [])) {
        if (!item.articleId) continue;
        if (!map.has(item.articleId)) map.set(item.articleId, new Set());
        map.get(item.articleId).add(sup);
      }
    }
    return map;
  }, [purchases]);

  // Liste plate de tous les fournisseurs présents dans les achats (triée A→Z)
  // pour peupler le dropdown de filtre.
  const availableSuppliers = useMemo(() => {
    const set = new Set();
    for (const p of purchases) {
      const sup = (p.supplier || '').trim();
      if (sup) set.add(sup);
    }
    return Array.from(set).sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }));
  }, [purchases]);

  const filteredArticles = enrichedArticles.filter((article) => {
    const query = searchQuery.toLowerCase();
    const matchesQuery =
      !query ||
      article.name.toLowerCase().includes(query) ||
      (article.category || '').toLowerCase().includes(query);

    let matchesCategory = true;
    if (categoryFilter !== 'all') {
      const cat = (article.category || '').trim();
      if (categoryFilter === '__uncategorized__') {
        matchesCategory = !cat;
      } else {
        matchesCategory = cat === categoryFilter;
      }
    }

    let matchesType = true;
    if (typeFilter !== 'all') {
      matchesType = (article.type || 'food') === typeFilter;
    }

    let matchesSupplier = true;
    if (supplierFilter !== 'all') {
      const suppliers = articleSuppliers.get(article.id);
      matchesSupplier = !!(suppliers && suppliers.has(supplierFilter));
    }

    return matchesQuery && matchesCategory && matchesType && matchesSupplier;
  });

  const handleSave = (data) => {
    // Normalize manualThreshold: empty string → null (so auto-threshold kicks in)
    const normalized = {
      ...data,
      manualThreshold: data.manualThreshold !== '' && data.manualThreshold != null
        ? Number(data.manualThreshold)
        : null,
    };
    if (normalized.id) {
      setArticles(articles.map((i) => (i.id === normalized.id ? normalized : i)));
    } else {
      setArticles([
        ...articles,
        {
          ...normalized,
          id: generateId('i'),
          type: normalized.type || 'food',
          variants: normalized.variants && normalized.variants.length > 0
            ? normalized.variants
            : [{ id: generateId('v'), name: normalized.name, aliases: [], packagings: [] }],
        },
      ]);
    }
    setEditingArticle(null);
    mcToast.success(data.id ? `Article modifié : ${data.name}` : `Article créé : ${data.name}`);
  };

  const handleDelete = (id) => {
    const article = articles.find((i) => i.id === id);
    if (!article) return;
    const _snap = articles;
    setArticles(articles.filter((i) => i.id !== id));
    mcToast.undo(`Article supprimé : ${article.name}`, () => { setArticles(_snap); mcToast.success('Annulé'); });
  };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
        <div>
          <h2 className="mc-display" style={{ fontSize: 24, fontWeight: 600, margin: 0 }}>
            Catalogue
          </h2>
          <p style={{ margin: '4px 0 0', fontSize: 13, color: palette.inkSoft }}>
            Tous vos produits (alimentaire + consommable). Cliquez pour voir variantes et historique de prix.
          </p>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          {reclassifyCount !== null && (
            <span style={{ fontSize: 12, color: palette.sage, fontWeight: 600 }}>
              ✓ {reclassifyCount} produit{reclassifyCount > 1 ? 's' : ''} reclassé{reclassifyCount > 1 ? 's' : ''}
            </span>
          )}
          <button
            className="mc-btn"
            onClick={handleReclassify}
            title="Applique la détection automatique aux produits encore en 'À trier'"
          >
            <RefreshCw size={14} /> Reclasser catalogue
          </button>
          <button
            className="mc-btn mc-btn-primary"
            onClick={() => setEditingArticle({ variants: [], aliases: [], packagings: [] })}
          >
            <Plus size={16} /> Nouveau produit
          </button>
        </div>
      </div>

      <div style={{ marginBottom: 20 }}>
        <InfoBanner icon={Layers} color={palette.sage}>
          <strong style={{ color: palette.sage }}>Variantes :</strong> un article maître
          (ex: "Lait de coco") peut avoir plusieurs variantes commerciales (ex: "La Créole 400ml",
          "Chaiko 1L"). Le prix utilisé dans les recettes est la <strong>moyenne pondérée</strong>{' '}
          de toutes les variantes. Utilisez l'onglet Simulateur pour comparer le coût en
          n'utilisant qu'une seule variante.
        </InfoBanner>
      </div>

      <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 16, flexWrap: 'wrap' }}>
        <div style={{ position: 'relative', flex: '1 1 280px', minWidth: 220 }}>
          <Search size={16} style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: palette.inkSoft }} />
          <input
            className="mc-input"
            style={{ paddingLeft: 40, width: '100%' }}
            placeholder="Rechercher..."
            value={searchQuery}
            onChange={(e) => setSearchQuery(e.target.value)}
          />
        </div>
        <select
          className="mc-input"
          style={{ flex: '0 0 auto', minWidth: 180 }}
          value={categoryFilter}
          onChange={(e) => setCategoryFilter(e.target.value)}
          title="Filtrer par catégorie"
        >
          <option value="all">Toutes catégories</option>
          {availableCategories.map((cat) => (
            <option key={cat} value={cat}>
              {cat === '__uncategorized__' ? '— Sans catégorie —' : cat}
            </option>
          ))}
        </select>
        <select
          className="mc-input"
          style={{ flex: '0 0 auto', minWidth: 160 }}
          value={typeFilter}
          onChange={(e) => setTypeFilter(e.target.value)}
          title="Filtrer par type de produit"
        >
          <option value="all">Tous types</option>
          <option value="food">Alimentaire</option>
          <option value="consumable">Consommable</option>
        </select>
        {availableSuppliers.length > 0 && (
          <select
            className="mc-input"
            style={{ flex: '0 0 auto', minWidth: 180 }}
            value={supplierFilter}
            onChange={(e) => setSupplierFilter(e.target.value)}
            title="Filtrer par fournisseur"
          >
            <option value="all">Tous fournisseurs</option>
            {availableSuppliers.map((sup) => (
              <option key={sup} value={sup}>{sup}</option>
            ))}
          </select>
        )}
        {(searchQuery || categoryFilter !== 'all' || typeFilter !== 'all' || supplierFilter !== 'all') && (
          <span style={{ fontSize: 12, color: palette.inkSoft, whiteSpace: 'nowrap' }}>
            {filteredArticles.length} sur {articles.length} affichés
          </span>
        )}
      </div>

      <div className="mc-card" style={{ overflow: 'hidden' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr>
              <th className="mc-th">Article</th>
              <th className="mc-th">Cat.</th>
              <th className="mc-th">Suivi</th>
              <th className="mc-th">Variantes</th>
              <th className="mc-th">Prix moy. (toutes variantes)</th>
              <th className="mc-th">Dernier</th>
              <th className="mc-th">Achats</th>
              <th className="mc-th"></th>
            </tr>
          </thead>
          <tbody>
            {filteredArticles.map((article) => {
              const lastVsAvgColor =
                article.avg != null && article.last != null
                  ? article.last > article.avg * 1.05 ? palette.wine
                  : article.last < article.avg * 0.95 ? palette.sage
                  : palette.inkSoft
                  : palette.inkSoft;

              return (
                <tr
                  key={article.id}
                  className="mc-row"
                  style={{ cursor: 'pointer' }}
                  onClick={() => setDetailArticle(article)}
                >
                  <td className="mc-td" style={{ fontWeight: 500 }}>
                    {article.name}{' '}
                    <span style={{ fontSize: 11, color: palette.inkSoft }}>({article.unit})</span>
                    {(article.type || 'food') === 'consumable' && (
                      <span
                        className="mc-pill"
                        style={{ background: palette.amber + '20', color: palette.amber, marginLeft: 6, fontSize: 10 }}
                      >
                        Consommable
                      </span>
                    )}
                  </td>
                  <td className="mc-td">
                    <span className="mc-pill" style={{ background: palette.paper, color: palette.inkSoft }}>
                      {article.category || '—'}
                    </span>
                  </td>
                  <td className="mc-td" onClick={(e) => e.stopPropagation()}>
                    <button
                      title={article.stockType === STOCK_TYPES.CONSUMABLE ? 'Suivi consommable — cliquer pour passer en recette' : 'Suivi recette — cliquer pour passer en consommable'}
                      onClick={() => {
                        const newType = article.stockType === STOCK_TYPES.CONSUMABLE
                          ? STOCK_TYPES.RECIPE
                          : STOCK_TYPES.CONSUMABLE;
                        setArticles(articles.map((i) =>
                          i.id === article.id ? { ...i, stockType: newType } : i
                        ));
                      }}
                      style={{
                        padding: '3px 8px',
                        borderRadius: 99,
                        fontSize: 11,
                        fontWeight: 600,
                        fontFamily: 'DM Sans, sans-serif',
                        cursor: 'pointer',
                        border: '1px solid',
                        transition: 'all 0.15s',
                        background: article.stockType === STOCK_TYPES.CONSUMABLE
                          ? palette.amber + '20'
                          : palette.sage + '20',
                        color: article.stockType === STOCK_TYPES.CONSUMABLE
                          ? palette.amber
                          : palette.sage,
                        borderColor: article.stockType === STOCK_TYPES.CONSUMABLE
                          ? palette.amber + '60'
                          : palette.sage + '60',
                      }}
                    >
                      {article.stockType === STOCK_TYPES.CONSUMABLE ? 'Consomm.' : 'Recette'}
                    </button>
                  </td>
                  <td className="mc-td">
                    {article.variantCount > 1 ? (
                      <span className="mc-pill" style={{ background: palette.sage + '15', color: palette.sage }}>
                        <Layers size={10} />
                        {article.variantCount} variantes
                      </span>
                    ) : (
                      <span style={{ fontSize: 12, color: palette.inkSoft }}>1 variante</span>
                    )}
                  </td>
                  <td className="mc-td" style={{ fontWeight: 600, fontFamily: 'Fraunces, serif' }}>
                    {article.avg != null ? formatEuro(article.avg) + '/' + article.unit : '—'}
                    {(() => {
                      if (article.avg == null) return null;
                      const capL = extractBottleCapacityL(article);
                      if (!capL) return null;
                      const pricePerBottle = article.avg * capL;
                      const clLabel = capL >= 1 ? capL.toFixed(2).replace(/\.?0+$/, '') + ' L'
                                               : Math.round(capL * 100) + ' cl';
                      return (
                        <div style={{ fontSize: 11, fontWeight: 400, color: palette.inkSoft, fontFamily: 'DM Sans, sans-serif', marginTop: 2 }}>
                          ≈ {formatEuro(pricePerBottle)}/btl · {clLabel}
                        </div>
                      );
                    })()}
                  </td>
                  <td className="mc-td">
                    {article.last != null ? (
                      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, color: lastVsAvgColor }}>
                        {formatEuro(article.last)}
                        {article.avg && article.last > article.avg * 1.05 && <ArrowUpRight size={12} />}
                        {article.avg && article.last < article.avg * 0.95 && <ArrowDownRight size={12} />}
                      </span>
                    ) : '—'}
                  </td>
                  <td className="mc-td">
                    <span
                      className="mc-pill"
                      style={{
                        background: article.purchaseCount > 0 ? palette.sage + '15' : palette.amber + '15',
                        color: article.purchaseCount > 0 ? palette.sage : palette.amber,
                      }}
                    >
                      {article.purchaseCount}
                    </span>
                  </td>
                  <td className="mc-td" style={{ textAlign: 'right' }} onClick={(e) => e.stopPropagation()}>
                    <button className="mc-btn mc-btn-ghost" style={{ padding: '4px 10px' }} onClick={() => setEditingArticle(article)} title="Modifier">
                      <Edit3 size={14} />
                    </button>
                    <button
                      className="mc-btn mc-btn-ghost"
                      style={{ padding: '4px 8px', color: article.alertStock === false ? palette.inkSoft : palette.wine, opacity: article.alertStock === false ? 0.4 : 1 }}
                      onClick={() => {
                        const updated = { ...article, alertStock: article.alertStock === false ? true : false };
                        setArticles(articles.map((a) => a.id === article.id ? updated : a));
                        mcToast.success(updated.alertStock ? `Alerte stock activée : ${article.name}` : `Alerte stock désactivée : ${article.name}`);
                      }}
                      title={article.alertStock === false ? 'Alerte stock désactivée — cliquer pour activer' : 'Alerte stock activée — cliquer pour désactiver'}
                    >
                      <AlertCircle size={14} />
                    </button>
                    <button
                      className="mc-btn mc-btn-ghost"
                      style={{ padding: '4px 8px', color: article.alertPrice === false ? palette.inkSoft : palette.amber, opacity: article.alertPrice === false ? 0.4 : 1 }}
                      onClick={() => {
                        const updated = { ...article, alertPrice: article.alertPrice === false ? true : false };
                        setArticles(articles.map((a) => a.id === article.id ? updated : a));
                        mcToast.success(updated.alertPrice ? `Alerte prix activée : ${article.name}` : `Alerte prix désactivée : ${article.name}`);
                      }}
                      title={article.alertPrice === false ? 'Alerte prix désactivée — cliquer pour activer' : 'Alerte prix activée — cliquer pour désactiver'}
                    >
                      <TrendingUp size={14} />
                    </button>
                    <button
                      className="mc-btn mc-btn-ghost"
                      style={{ padding: '4px 10px' }}
                      onClick={() => setMergingArticle(article)}
                      title="Fusionner vers un autre article"
                    >
                      <Link2 size={14} />
                    </button>
                    <button className="mc-btn mc-btn-danger" style={{ padding: '4px 10px' }} onClick={() => handleDelete(article.id)} title="Supprimer">
                      <Trash2 size={14} />
                    </button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {editingArticle && (
        <ArticleModal
          initial={editingArticle}
          onSave={handleSave}
          onClose={() => setEditingArticle(null)}
          categories={articleCategories}
        />
      )}

      {detailArticle && (
        <ArticleDetailModal
          article={detailArticle}
          purchases={purchases}
          onClose={() => setDetailArticle(null)}
          dateFrom={dateFrom}
          dateTo={dateTo}
        />
      )}

      {mergingArticle && (
        <ArticleMergeModal
          sourceArticle={mergingArticle}
          articles={articles}
          setArticles={setArticles}
          purchases={purchases}
          setPurchases={setPurchases}
          recipes={recipes}
          setRecipes={setRecipes}
          onClose={() => setMergingArticle(null)}
        />
      )}
    </div>
  );
}

// ─── Article editor modal ──────────────────────────────────────────────

function ArticleModal({ initial, onSave, onClose, categories }) {
  // Fallback sur la constante par défaut si jamais l'appelant n'a pas fourni
  // la liste (rétrocompat avec d'éventuels usages futurs).
  const articleCategories = categories || ARTICLE_CATEGORIES;
  const [form, setForm] = useState({
    name: initial.name || '',
    unit: initial.unit || 'kg',
    category: initial.category || '',
    variants: initial.variants && initial.variants.length > 0
      ? initial.variants
      : [{ id: generateId('v'), name: initial.name || 'Standard', aliases: [], packagings: [] }],
    type: initial.type || 'food',
    stockType: initial.stockType || DEFAULT_STOCK_TYPE,
    trackStock: initial.trackStock !== false,
    alertStock: initial.alertStock !== false,
    alertPrice: initial.alertPrice !== false,
    manualThreshold: initial.manualThreshold ?? '',
    id: initial.id,
  });

  const [expandedVariantIdx, setExpandedVariantIdx] = useState(0);

  const addVariant = () => {
    setForm({
      ...form,
      variants: [
        ...form.variants,
        { id: generateId('v'), name: '', aliases: [], packagings: [] },
      ],
    });
    setExpandedVariantIdx(form.variants.length);
  };

  const updateVariant = (index, updates) => {
    const newVariants = [...form.variants];
    newVariants[index] = { ...newVariants[index], ...updates };
    setForm({ ...form, variants: newVariants });
  };

  const removeVariant = (index) => {
    if (form.variants.length === 1) {
      mcToast.error('Un article doit avoir au moins une variante.');
      return;
    }
    const _snapV = form.variants;
    const _removedV = form.variants[index];
    setForm({ ...form, variants: form.variants.filter((_, i) => i !== index) });
    mcToast.undo(`Variante supprimée : ${_removedV?.label || 'sans nom'}`, () => setForm({ ...form, variants: _snapV }));
  };

  return (
    <div className="mc-overlay" onClick={onClose}>
      <div className="mc-modal" style={{ maxWidth: 820, padding: 32 }} onClick={(e) => e.stopPropagation()}>
        <h3 className="mc-display" style={{ fontSize: 22, fontWeight: 600, margin: '0 0 24px' }}>
          {initial.id ? 'Modifier' : 'Nouvel'} article
        </h3>

        {/* Master article fields */}
        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 12, marginBottom: 20 }}>
          <div>
            <label className="mc-label">Nom (article maître)</label>
            <input
              className="mc-input"
              placeholder="Ex: Lait de coco"
              value={form.name}
              onChange={(e) => setForm({ ...form, name: e.target.value })}
            />
          </div>
          <div>
            <label className="mc-label">Unité maître</label>
            <select className="mc-input" value={form.unit} onChange={(e) => setForm({ ...form, unit: e.target.value })}>
              {['kg', 'g', 'L', 'cL', 'pièce', 'botte'].map((u) => <option key={u}>{u}</option>)}
            </select>
          </div>
          <div style={{ gridColumn: '1 / -1' }}>
            <label className="mc-label">Catégorie</label>
            <select
              className="mc-input"
              value={form.category || 'À trier'}
              onChange={(e) => setForm({ ...form, category: e.target.value })}
            >
              {articleCategories.map((cat) => (
                <option key={cat} value={cat}>{cat}</option>
              ))}
              {form.category && !articleCategories.includes(form.category) && (
                <option value={form.category}>{form.category}</option>
              )}
            </select>
          </div>
          <div style={{ gridColumn: '1 / -1' }}>
            <label className="mc-label">Type de produit</label>
            <div style={{ display: 'flex', gap: 6 }}>
              <button
                type="button"
                onClick={() => setForm({ ...form, type: 'food' })}
                style={{
                  flex: 1, padding: '8px 10px', borderRadius: 6, fontSize: 12,
                  fontWeight: 600, cursor: 'pointer', fontFamily: 'DM Sans, sans-serif',
                  background: form.type === 'food' ? palette.sage + '20' : 'transparent',
                  color: form.type === 'food' ? palette.sage : palette.inkSoft,
                  border: '1px solid ' + (form.type === 'food' ? palette.sage : palette.rule),
                }}
              >
                Alimentaire
              </button>
              <button
                type="button"
                onClick={() => setForm({
                  ...form,
                  type: 'consumable',
                  // Convenience: when switching to non-food, also flip the stock
                  // calculation to consumption-based (non-recipe). User can still
                  // change it back if they really want.
                  stockType: STOCK_TYPES.CONSUMABLE,
                })}
                style={{
                  flex: 1, padding: '8px 10px', borderRadius: 6, fontSize: 12,
                  fontWeight: 600, cursor: 'pointer', fontFamily: 'DM Sans, sans-serif',
                  background: form.type === 'consumable' ? palette.amber + '20' : 'transparent',
                  color: form.type === 'consumable' ? palette.amber : palette.inkSoft,
                  border: '1px solid ' + (form.type === 'consumable' ? palette.amber : palette.rule),
                }}
              >
                Consommable (non-alimentaire)
              </button>
            </div>
            <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 6, lineHeight: 1.5 }}>
              {form.type === 'food'
                ? 'Entre dans les recettes et le calcul du food cost.'
                : 'Hors recettes (essuie-tout, gants, produits d\'entretien…). Comptabilisé séparément du food cost.'}
            </div>

        </div>

        {/* Stock management */}
        <section style={{
          padding: 16,
          background: palette.paper,
          borderRadius: 8,

            <div>
              <label className="mc-label">Type de sortie</label>
              <div style={{ display: 'flex', gap: 6 }}>
                <button
                  type="button"
                  onClick={() => setForm({ ...form, stockType: STOCK_TYPES.RECIPE })}
                  style={{
                    flex: 1, padding: '8px 10px', borderRadius: 6, fontSize: 12,
                    fontWeight: 600, cursor: 'pointer', fontFamily: 'DM Sans, sans-serif',
                    background: form.stockType === STOCK_TYPES.RECIPE ? palette.sage + '20' : 'transparent',
                    color: form.stockType === STOCK_TYPES.RECIPE ? palette.sage : palette.inkSoft,
                    border: '1px solid ' + (form.stockType === STOCK_TYPES.RECIPE ? palette.sage : palette.rule),
                  }}
                >
                  Recette
                </button>
                <button
                  type="button"
                  onClick={() => setForm({ ...form, stockType: STOCK_TYPES.CONSUMABLE })}
                  style={{
                    flex: 1, padding: '8px 10px', borderRadius: 6, fontSize: 12,
                    fontWeight: 600, cursor: 'pointer', fontFamily: 'DM Sans, sans-serif',
                    background: form.stockType === STOCK_TYPES.CONSUMABLE ? palette.amber + '20' : 'transparent',
                    color: form.stockType === STOCK_TYPES.CONSUMABLE ? palette.amber : palette.inkSoft,
                    border: '1px solid ' + (form.stockType === STOCK_TYPES.CONSUMABLE ? palette.amber : palette.rule),
                  }}
                >
                  Consommable
                </button>
              </div>
              <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 6, lineHeight: 1.5 }}>
                {form.stockType === STOCK_TYPES.RECIPE
                  ? 'Sortie calculée à partir des ventes × recettes (alimentaire utilisé en cuisine).'
                  : 'Sortie calculée à partir de la consommation moyenne entre inventaires (gobelets, gants, produits d\'entretien…).'}
              </div>
            </div>

            {/* Tracking toggle */}
            <div>
              <label className="mc-label">Suivi du stock</label>
              <label
                style={{
                  display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px',
                  border: '1px solid ' + palette.rule, borderRadius: 6, cursor: 'pointer',
                  background: form.trackStock ? palette.sage + '08' : 'transparent',
                }}
              >
                <input
                  type="checkbox"
                  checked={form.trackStock}
                  onChange={(e) => setForm({ ...form, trackStock: e.target.checked })}
                />
                <span style={{ fontSize: 12, fontWeight: 600 }}>
                  {form.trackStock ? 'Suivi activé' : 'Suivi désactivé'}
                </span>
              </label>
              <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 6, lineHeight: 1.5 }}>
                {form.trackStock
                  ? 'Apparaît dans l\'onglet Stocks et sera inclus dans les inventaires.'
                  : 'L\'article reste utilisable dans les recettes mais n\'est pas suivi en stock.'}
              </div>
            </div>

            {/* Alert toggles — stock + prix, indépendants du suivi de stock */}
            <div style={{ gridColumn: '1 / -1' }}>
              <label className="mc-label">Alertes</label>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                <label
                  style={{
                    flex: '1 1 200px',
                    display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px',
                    border: '1px solid ' + palette.rule, borderRadius: 6, cursor: 'pointer',
                    background: form.alertStock !== false ? palette.wine + '08' : 'transparent',
                  }}
                >
                  <input
                    type="checkbox"
                    checked={form.alertStock !== false}
                    onChange={(e) => setForm({ ...form, alertStock: e.target.checked })}
                  />
                  <span style={{ fontSize: 12, fontWeight: 600 }}>
                    Alerte stock {form.alertStock !== false ? 'activée' : 'désactivée'}
                  </span>
                </label>

                <label
                  style={{
                    flex: '1 1 200px',
                    display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px',
                    border: '1px solid ' + palette.rule, borderRadius: 6, cursor: 'pointer',
                    background: form.alertPrice !== false ? palette.amber + '12' : 'transparent',
                  }}
                >
                  <input
                    type="checkbox"
                    checked={form.alertPrice !== false}
                    onChange={(e) => setForm({ ...form, alertPrice: e.target.checked })}
                  />
                  <span style={{ fontSize: 12, fontWeight: 600 }}>
                    Alerte prix {form.alertPrice !== false ? 'activée' : 'désactivée'}
                  </span>
                </label>
              </div>
              <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 6, lineHeight: 1.5 }}>
                <strong>Stock</strong> : alerte quand le stock passe sous le seuil.{' '}
                <strong>Prix</strong> : alerte quand le prix moyen grimpe de plus de {PRICE_TREND_THRESHOLD_PCT}% sur 30 jours.

            {/* Manual threshold */}
            <div>

              <input
                type="number"
                className="mc-input"
                step="0.01"
                min="0"
                value={form.manualThreshold}
                onChange={(e) => setForm({ ...form, manualThreshold: e.target.value === '' ? '' : parseFloat(e.target.value) })}
                placeholder="Ex: 5"
              />
              <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 6, lineHeight: 1.5 }}>
                Alerte dans l'onglet Alertes quand le stock passe sous ce seuil.
                Laisser vide = calcul automatique basé sur la consommation.

            </div>
          </div>
        </section>

        {/* Variants */}
        <section style={{ marginBottom: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, fontWeight: 600, color: palette.sage }}>
              <Layers size={14} /> Variantes commerciales
            </div>
            <button className="mc-btn mc-btn-sage" onClick={addVariant}>
              <Plus size={13} /> Variante
            </button>
          </div>

          <p style={{ fontSize: 12, color: palette.inkSoft, marginBottom: 10 }}>

            sont définis <strong>par variante</strong>.

          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {form.variants.map((variant, idx) => (
              <VariantEditor
                key={variant.id}
                variant={variant}
                masterUnit={form.unit}
                isExpanded={expandedVariantIdx === idx}
                onToggle={() => setExpandedVariantIdx(expandedVariantIdx === idx ? -1 : idx)}
                onUpdate={(updates) => updateVariant(idx, updates)}
                onRemove={() => removeVariant(idx)}

        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <button className="mc-btn mc-btn-ghost" onClick={onClose}>Annuler</button>
          <button className="mc-btn mc-btn-primary" onClick={() => onSave(form)}>
            <Save size={14} /> Enregistrer
