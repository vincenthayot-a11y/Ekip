          "label": "label exact du produit tel qu'écrit sur la facture",
          "rawQty": 40,
          "rawUnit": "sachet",
          "total": 362.00
        }
      ],
      "total": 649.68
    }
  ]
}

Règles strictes :
- Conserve EXACTEMENT le label original (ne reformule pas, ne traduis pas, garde les abréviations, accents, ponctuation telles quelles)
- Donne les quantités telles qu'écrites sur la facture (rawQty + rawUnit)
- Pour rawUnit, utilise les unités telles qu'écrites par le fournisseur :
  · alimentaire : kg, L, U, sachet, carton, boîte, brique, sac, pièce
  · MHE / hygiène / emballage : conserve les notations "Bte*100", "PK*40", "CT*250", "PK*50", "Pk*5", "Poch*10", "Rouleau", "Paire", "Bidon 5 L", "Bidon 5 Kg" telles quelles
- Montants en euros HT, point décimal (jamais de virgule)
- total = montant HT de la ligne ; total de la facture = somme des items uniquement (voir règle d'exclusion ci-dessous)
- Si une info manque, mets null (pas "" ni "N/A")

RÈGLE CRITIQUE HT vs TTC :
Tous les montants extraits doivent être en HT (hors taxes), JAMAIS en TTC.
Certains fournisseurs (SAS EDOUARD, CARIDRINK, etc.) affichent la colonne TTC plus visiblement que le HT.
Procédure obligatoire :
1. Identifier la colonne "Prix Unitaire HT" (PUHT, P.U. HT, Prix U. HT) — c'est la SOURCE DE VÉRITÉ
2. Calculer le montant ligne = PUHT × Qté
3. Vérifier que la somme des items = "Total HT" affiché en bas de facture (PAS "Total TTC")
4. Si l'écart entre ta somme et le Total HT est > 1%, tu as probablement pris du TTC quelque part — recommence
Cas particuliers :
- TVA 0% (alcools Martinique) : HT = TTC, pas de risque
- Si seulement "Total" est affiché (sans HT/TTC), regarder le tableau TVA en bas pour vérifier
- SAS EDOUARD : la colonne "Total TTC" est visible mais c'est la colonne PUHT qui doit être utilisée

RÈGLE MULTIGROS (format spécifique) :
La facture MULTIGROS a deux colonnes de quantité : "Colis" (nb de cartons) ET "Qté" (quantité TOTALE d'unités).
- rawQty = valeur de la colonne "Qté" directement — NE PAS multiplier Colis × Qté
- Exemples :
  · Colis=2, Qté=24, Prix U.HT=2,50€ → rawQty=24 (pas 48), total=60€ → 2,50€/unité ✅
  · Colis=15, Qté=120, Prix U.HT=1,00€ → rawQty=120, total=120€ → 1,00€/pièce ✅
  · Colis=8, Qté=80, Prix U.HT=8,50€ → rawQty=80, total=680€ → 8,50€/pièce ✅
- Vérification : Prix U.HT × Qté doit égaler le Montant HT de la ligne

RÈGLE BOISSONS ET CONSERVES EN COLIS :
Pour les boissons (eau, soda, jus, bière en bouteille) et conserves (boîtes, briques) vendues en colis :
- Convertis toujours en nombre de pièces individuelles (rawUnit = "pièce")
- rawQty = nombre de colis × nombre d'unités par colis
- Le nombre d'unités par colis est souvent dans le libellé ("C12" = 12, "C24" = 24, "1X20L" = 1, "6*1L" = 6)
- Ou dans la colonne "Qté totale" chez MULTIGROS (ex: 15 colis, Qté = 120 → 120/15 = 8 unités/colis → rawQty = 120)
- Notations du nombre d'unités par colis dans le libellé :
  · "C12", "C24", "C6"... → 12, 24, 6 unités par colis
  · "X6", "X12", "X24", "X100"... → idem, notation alternative (ex: "MAXI MAINS 450F X6" = carton de 6)
  · "6*1L", "12*50CL"... → 6 bouteilles de 1L, 12 bouteilles de 50CL
  · "1X20L" → 1 fût de 20L
- Exemples :
  · "COCA COLA 50CL", 15 colis, Qté totale 120 → rawQty=120, rawUnit="pièce", prix/pièce=total/120
  · "COMPAL 100% MANGUE 1L C12", 2 colis → rawQty=24, rawUnit="pièce"
  · "MAXI MAINS 450F BLANC ECO X6", 2 colis → rawQty=12, rawUnit="pièce" (2×6)
  · "TOMATES CONCASSEES 5/1 C3", 2 colis → rawQty=6, rawUnit="pièce"
- Exception : les fûts (FUT, KEG) restent en "U" car ce sont des unités individuelles
- "DZ" en préfixe = douzaine → rawQty = nb_douzaines × 12
  · Exemple : "DZ CTX STEAK ALIDA/HOTEL", 9 → rawQty=108, rawUnit="pièce" → 1,64€/pièce

RÈGLE CONSERVES (fruits/légumes/lait concentré) :
Les conserves (ananas, tomates, haricots, maïs, ratatouille, légumes au sirop, lait CONCENTRÉ...)
sont toujours trackées en kilos quand le poids unitaire est indiqué :
IMPORTANT : "Concentré" = conserve épaisse en boîte → kg. À NE PAS confondre avec :
- Lait UHT/frais en brique ou bouteille (ex: "LAIT 1/2 ECREME 1L", "LAIT MATIN CLAIR BK 1L") → reste en L
- Crème liquide UHT (ex: "CREME LIQUIDE 1L EVEN") → reste en L
Règle : si le produit est liquide à température ambiante (lait, crème, jus) → L. Si c'est épais/pâteux en conserve (lait concentré, tomate concassée, confiture) → kg.

- rawQty = nb_boîtes × poids_unitaire_kg
- rawUnit = "kg"
- Exemples :
  · "ANANAS SIR TR 3/4 565G PSP", 24 pièces → rawQty=13.56 (24×0.565), rawUnit="kg"
  · "RATATOUILLE 2K5 PP", 4 pièces → rawQty=10 (4×2.5), rawUnit="kg"
  · "TOMATE CONCASSEE 800G", 12 pièces → rawQty=9.6, rawUnit="kg"
- Format de boîte sans poids explicite (4/4, 5/1, 3/1...) :
  · 4/4 ≈ 0.85 kg, 5/1 ≈ 4 kg, 3/1 ≈ 2.5 kg, 1/2 ≈ 0.4 kg, 1/4 ≈ 0.2 kg
  · Exemple : "TOMATES CONCASSEES 5/1 C3", 1 colis de 3 → rawQty=12 (3×4), rawUnit="kg"
- Privilégier toujours le poids EXPLICITE du libellé si présent

RÈGLE PRODUITS EN BIDON/SEAU/JERRYCAN :
Les produits liquides (huile, vinaigre, moutarde, sauce, sirop...) vendus en bidon/seau/jerrycan
avec le volume indiqué dans le libellé sont toujours trackés en litres :
- rawQty = nb_unités × volume_unitaire_en_L
- rawUnit = "L"
- Exemples :
  · "HUILE TOURNESOL 5L", 6 pièces → rawQty=30, rawUnit="L" → 2,00€/L
  · "MOUTARDE DIJON SEAU 5L", 1 pièce → rawQty=5, rawUnit="L" → 2,63€/L
  · "VINAIGRE BIDON 5L", 4 pièces → rawQty=20, rawUnit="L"
  · "SIROP GRENADINE 1L", 3 pièces → rawQty=3, rawUnit="L"
- Exception : les bidons de produits non-alimentaires (détergent, javel...) restent en pièce

RÈGLE ŒUFS EN PLATEAUX :
Les œufs sont toujours trackés à la pièce (pas au kg, pas au plateau) :
- "PL 30/OEUF" = plateau de 30 œufs → rawQty = nb_plateaux × 30, rawUnit = "pièce"
- "PL 12/OEUF" = plateau de 12 → rawQty = nb_plateaux × 12, rawUnit = "pièce"
- Exemple : 5 plateaux de 30 → rawQty=150, rawUnit="pièce", prix/œuf = total/150

Lignes à EXCLURE du JSON (ne pas créer d'item pour elles) :
- "COTISATION LOCALE", "COTISATION IMPORT", "COTISATION IMPORT AUTRE" : ce sont des taxes sur alcools, pas des produits
- "TAXE", "ECO-PARTICIPATION", "ECO-CONTRIBUTION" : taxes diverses
- "PUBLICITE", "PLV", "STOP TROTTOIR", "BON DE LIVRAISON" : matériel marketing gratuit ou ligne administrative
- "FRAIS DE PORT", "FRANCO", "LIVRAISON" SI mentionnés comme ligne séparée non chiffrée
- "CONSIGNE", "DEPOT DE GARANTIE" : consignes de bouteilles/fûts, pas de la marchandise
- Le total racine du JSON doit être la SOMME des items inclus, pas le total HT du PDF qui contient parfois ces taxes additionnelles

Cas particulier des AVOIRS (factures avec total négatif) :
- Si le document est marqué "AVOIR" en gros, ou si le total est négatif : extrais-le quand même normalement
- Conserve les montants négatifs tels quels (total ligne ET total facture)
- L'application les filtrera automatiquement à l'import

Cas particulier des ÉQUIPEMENTS :
Règle de détection — un article est un ÉQUIPEMENT si :
✓ Il est durable (utilisé plusieurs fois, ne se consomme pas)
✓ Il appartient à une de ces catégories :
  · Outillage / bricolage : perceuses, batteries, visseuses, outils manuels
  · Électroménager / cuisine pro : four, frigo, congélateur, mixeur, trancheuse, plonge
  · Mobilier / aménagement : tables, chaises, étagères, armoires, présentoirs
  · Vaisselle / art de la table : assiettes, verres, couverts, plats de service
  · Matériel de bar / café : machine espresso, percolateur, distributeur
  · Informatique / caisse : terminal CB, écran, imprimante, TPE
  · Climatisation / ventilation : clim, ventilateur, extracteur
  · Entretien bâtiment : robinet, joint, pièce plomberie, ampoule, serrure
NON équipement (consommables) : bobines essuyage, papier toilette, détergent, capsules café,
emballages, sacs, sachets, gants, produits d'entretien, ingrédients alimentaires.
Si équipement détecté → ajoute "kind": "equipment". L'utilisateur choisira petit/gros à l'import.
- Exemple :
{
  "kind": "equipment",
  "date": "2026-05-12",
  "supplier": "FIX-OUTI",
  "invoiceNumber": "FA22604918",
  "items": [
    { "label": "20V+2 BATS 4,0AH", "rawQty": 1, "rawUnit": "U", "total": 236.00 }
  ],
  "total": 236.00
}

Cas particulier des FACTURES D'ÉNERGIE (EDF, Engie, eau, gaz...) :
- Format différent, AVEC un champ "kind": "energy" et SANS "items"
- Exemple :
{
  "kind": "energy",
  "date": "2026-04-15",
  "supplier": "EDF",
  "invoiceNumber": "FA12345678",
  "energyType": "electricity",
  "periodStart": "2026-03-15",
  "periodEnd": "2026-04-14",
  "consumption": 1850,
  "totalHT": 245.30,
  "totalTTC": 268.45
}
- Valeurs possibles pour "energyType" : "electricity" (EDF, Albioma, Engie élec…), "gas" (Antilles Gaz, Primagaz, Engie gaz…), "water" (SME, Odyssi, Veolia, Suez…)
- "consumption" est en kWh pour l'électricité, en kg pour le gaz butane/propane, en m³ pour l'eau
- Les factures classiques fournisseurs gardent leur format actuel (avec "items"), avec ou sans "kind": "supply"
- Tu peux mélanger des factures fournisseurs et énergie dans le même tableau "invoices"

Réponds UNIQUEMENT avec le JSON, sans aucun texte avant ou après, sans backticks.`;

function ImportClaudeModal({ articles, setArticles, existingPurchases, setPurchases, existingEnergy, setEnergy, existingEquipmentPurchases, setEquipmentPurchases, existingEquipment, setEquipment, existingAssets, setAssets, onClose }) {
  // Workflow steps: 'input' | 'review'
  const [step, setStep] = useState('input');
  const [jsonText, setJsonText] = useState('');
  const [parseError, setParseError] = useState(null);
  const [showPromptHelp, setShowPromptHelp] = useState(false);
  const [copySuccess, setCopySuccess] = useState(false);

  // Editable prompt: loaded from storage on mount, falls back to default.
  // Persisted on "Save", reset to default on "Restore".
  const [currentPrompt, setCurrentPrompt] = useState(DEFAULT_IMPORT_CLAUDE_PROMPT);
  const [editingPrompt, setEditingPrompt] = useState(false);
  const [promptDraft, setPromptDraft] = useState(DEFAULT_IMPORT_CLAUDE_PROMPT);
  const [promptLoaded, setPromptLoaded] = useState(false);

  useEffect(() => {
    storageGet(STORAGE_KEYS.importClaudePrompt, DEFAULT_IMPORT_CLAUDE_PROMPT).then((p) => {
      setCurrentPrompt(p);
      setPromptDraft(p);
      setPromptLoaded(true);
    });
  }, []);

  // Dry-run result: populated after the user clicks "Analyser"
  // {
  //   invoices: [{ original, candidatePurchase, isDuplicate, newArticles[] }],
  //   summary: { total, duplicates, newArticlesTotal, unmatched }
  // }
  const [dryRun, setDryRun] = useState(null);

  // Per-invoice user toggles (review screen):
  //   includeMap[idx] = boolean — should this invoice be imported?
  const [includeMap, setIncludeMap] = useState({});
  const [equipmentTypeMap, setEquipmentTypeMap] = useState({}); // idx -> 'small' | 'large'
  const [equipmentLinks, setEquipmentLinks] = useState({}); // label -> equipmentId | '__new__'

  // User edits on the proposed new articles (review screen).
  //   editedProposals[originalName] = { name, unit, category, packagings, ... }
  // Falls back to the raw proposal from analyzeOneInvoice when not edited.
  const [editedProposals, setEditedProposals] = useState({});

  // ─── Helpers ────────────────────────────────────────────────────────────

  const copyPromptToClipboard = async () => {
    try {
      await navigator.clipboard.writeText(currentPrompt);
      setCopySuccess(true);
      setTimeout(() => setCopySuccess(false), 2000);
    } catch (err) {
      // Fallback: select the textarea content for manual copy
      console.warn('Clipboard API unavailable', err);
    }
  };

  const savePromptEdits = async () => {
    if (promptDraft === DEFAULT_IMPORT_CLAUDE_PROMPT) {
      // No need to clutter storage with a copy of the default
      await storageSet(STORAGE_KEYS.importClaudePrompt, null);
    } else {
      await storageSet(STORAGE_KEYS.importClaudePrompt, promptDraft);
    }
    setCurrentPrompt(promptDraft);
    setEditingPrompt(false);
    mcToast.success('Prompt enregistré');
  };

  const resetPromptToDefault = async () => {
    await storageSet(STORAGE_KEYS.importClaudePrompt, null);
    setCurrentPrompt(DEFAULT_IMPORT_CLAUDE_PROMPT);
    setPromptDraft(DEFAULT_IMPORT_CLAUDE_PROMPT);
    mcToast.success('Prompt restauré à sa valeur par défaut');
  };

  const cancelPromptEdits = () => {
    setPromptDraft(currentPrompt);
    setEditingPrompt(false);
  };

  /**
   * Parses the user-supplied JSON and runs a dry-run analysis.
   *
   * The parser is tolerant:
   *   - Accepts a top-level array OR an { invoices: [...] } wrapper
   *   - Accepts a single invoice object (auto-wraps to array)
   *   - Strips common Markdown backtick fences if present
   */
  const handleAnalyze = () => {
    setParseError(null);

    let raw = jsonText.trim();
    if (!raw) {
      setParseError('Le champ est vide. Collez le JSON généré par Claude.');
      return;
    }

    // Strip Markdown fences if user pasted them anyway
    raw = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '');

    let parsed;
    try {
      parsed = JSON.parse(raw);
    } catch (e) {
      setParseError(`JSON invalide : ${e.message}. Vérifiez les virgules, les guillemets et les accolades.`);
      return;
    }

    // Normalize to an array of invoices
    let invoices;
    if (Array.isArray(parsed)) {
      invoices = parsed;
    } else if (parsed && Array.isArray(parsed.invoices)) {
      invoices = parsed.invoices;
    } else if (parsed && parsed.date && parsed.supplier) {
      // Single invoice object
      invoices = [parsed];
    } else {
      setParseError('Le JSON ne contient pas de factures reconnues. Attendu : un objet avec un champ "invoices" qui est un tableau.');
      return;
    }

    if (invoices.length === 0) {
      setParseError('Le JSON ne contient aucune facture.');
      return;
    }

    // Run dry-run on each invoice
    const analyzed = invoices.map((inv, idx) => analyzeOneInvoice(inv, idx, articles, existingPurchases, existingEnergy, existingEquipmentPurchases, existingEquipment));

    // Compute summary
    const summary = {
      total: analyzed.length,
      valid: analyzed.filter((a) => !a.parseError && !a.isCredit).length,
      duplicates: analyzed.filter((a) => a.isDuplicate).length,
      credits: analyzed.filter((a) => a.isCredit).length,
      energyCount: analyzed.filter((a) => a.kind === 'energy' && !a.parseError).length,
      equipmentCount: analyzed.filter((a) => a.kind === 'equipment' && !a.parseError).length,
      newArticlesTotal: analyzed.reduce((s, a) => s + (a.newArticles?.length || 0), 0),
      unmatched: analyzed.reduce((s, a) => s + (a.unmatchedItems?.length || 0), 0),
      errors: analyzed.filter((a) => a.parseError).length,
    };

    setDryRun({ invoices: analyzed, summary });

    // Default include map: import all valid invoices, EXCLUDE credits.
    // (User can manually re-check a credit if they really want to import it.)
    const defaultMap = {};
    analyzed.forEach((a, i) => {
      defaultMap[i] = !a.parseError && !a.isCredit;
    });
    setIncludeMap(defaultMap);

    // Build the deduplicated map of new-article proposals, keyed by the
    // original label (= the unique key used in analyzeOneInvoice). The user
    // can then edit each one once even if it appears in multiple invoices.
    const proposalsByLabel = {};
    for (const inv of analyzed) {
      if (inv.parseError) continue;
      for (const proposal of inv.newArticles || []) {
        if (!proposalsByLabel[proposal.name]) {
          proposalsByLabel[proposal.name] = { ...proposal };
        }
      }
    }
    setEditedProposals(proposalsByLabel);

    setStep('review');
  };

  /**
   * Commits the import: applies all checked invoices in one go.
   * - New articles are created
   * - Duplicates are overwritten (= old purchase removed, new one added)
   * - Other invoices are appended
   */
  const handleImport = (equipmentTypeMap = {}, equipmentLinks = {}) => {
    if (!dryRun) return;

    // First pass: separate supply invoices (need article creation) from
    // energy invoices (go straight to the energy store) and equipment purchases
    // (go to the equipment store).
    const supplyInvoices = [];
    const energyInvoices = [];
    const equipmentInvoices = [];
    for (let i = 0; i < dryRun.invoices.length; i++) {
      if (!includeMap[i]) continue;
      const inv = dryRun.invoices[i];
      if (inv.parseError) continue;
      if (inv.kind === 'energy') {
        energyInvoices.push(inv);
      } else if (inv.kind === 'equipment') {
        equipmentInvoices.push(inv);
      } else {
        supplyInvoices.push(inv);
      }
    }

    // Collect all new articles to create (merged across supply invoices, deduplicated by name)
    const newIngsByName = {};
    for (const inv of supplyInvoices) {
      for (const ni of (inv.newArticles || [])) {
        // The original analyzer label is the dedup key. Prefer the user's
        // edited version if any.
        const original = ni.name;
        const edited = editedProposals[original];
        if (!newIngsByName[original]) newIngsByName[original] = edited || ni;
      }
    }

    // Build the new articles list (existing + newly created)
    let updatedArticles = [...articles];
    const createdIdMap = {}; // map: original-label → new article id
    for (const name of Object.keys(newIngsByName)) {
      const proposal = newIngsByName[name];
      const newId = generateId('i');
      const newVariantId = generateId('v');
      updatedArticles.push({
        id: newId,
        name: proposal.name,
        unit: proposal.unit,
        category: proposal.category || 'Sans catégorie',
        // Honor the (possibly auto-detected, possibly user-edited) type from
        // the review screen. Falls back to food if missing.
        type: proposal.suggestedType || 'food',
        // If the user marked it as consumable, also flip the stock-type to
        // consumable (consumption-based outflows). Otherwise keep the recipe
        // default. The user can still adjust this later in the product form.
        stockType: (proposal.suggestedType === 'consumable')
          ? STOCK_TYPES.CONSUMABLE
          : DEFAULT_STOCK_TYPE,
        trackStock: DEFAULT_TRACK_STOCK,
        variants: [{
          id: newVariantId,
          name: proposal.name,
          aliases: proposal.aliases.map((label) => ({ label, supplier: proposal.supplier || '' })),
          packagings: proposal.packagings || [],
        }],
      });
      // All labels of this proposal map to the new id
      for (const label of proposal.aliases) {
        createdIdMap[label] = { articleId: newId, variantId: newVariantId };
      }
    }

    // Rebuild purchases: remove duplicates that we're overwriting, then add new ones
    let updatedPurchases = [...existingPurchases];
    const purchasesToRemove = new Set();
    const purchasesToAdd = [];

    for (const inv of supplyInvoices) {

      // If duplicate, remove existing purchase first
      if (inv.isDuplicate && inv.duplicateOfId) {
        purchasesToRemove.add(inv.duplicateOfId);
      }

      // Resolve any newly-created article IDs in the items.
      // For items that were "pending" (no matched article yet), we also
      // recompute convertedQty and pricePerMasterUnit using the user's
      // EDITED packaging factor — the value in analyzeOneInvoice was based
      // on the initial auto-detection, which the user may have corrected
      // in the review step.
      const resolvedItems = inv.candidatePurchase.items.map((item) => {
        if (item.articleId && item.variantId) return item; // already resolved
        const created = createdIdMap[item.label];
        if (!created) return item; // truly unmatched, keep as-is

        // Look up the edited proposal to get the user-corrected factor
        const proposal = newIngsByName[item.label];
        let convertedQty = item.convertedQty;
        let pricePerMasterUnit = item.pricePerMasterUnit;
        if (proposal) {
          const pkg = (proposal.packagings || [])[0];
          const factor = pkg ? pkg.factor : (proposal.detectedFactor || 1);
          convertedQty = (item.rawQty || 0) * factor;
          pricePerMasterUnit = convertedQty > 0 ? (item.total || 0) / convertedQty : 0;
        }
        return {
          ...item,
          articleId: created.articleId,
          variantId: created.variantId,
          convertedQty,
          pricePerMasterUnit,
        };
      });

      purchasesToAdd.push({
        ...inv.candidatePurchase,
        id: generateId('p'),
        items: resolvedItems,
        source: 'invoice',
      });
    }

    // Apply: filter out removed, append new
    updatedPurchases = updatedPurchases.filter((p) => !purchasesToRemove.has(p.id));
    updatedPurchases = [...updatedPurchases, ...purchasesToAdd];

    // Energy: same logic but with the existing energy store.
    // Duplicates are matched on supplier + invoiceNumber + totalTTC (see
    // analyzeEnergyInvoice). When a duplicate is detected we overwrite the
    // existing entry rather than appending a second one.
    let updatedEnergy = [...(existingEnergy || [])];
    for (const inv of energyInvoices) {
      const candidate = inv.candidateEnergy;
      if (inv.isDuplicate) {
        // Find and replace the existing invoice that matched
        const idx = updatedEnergy.findIndex((e) =>
          normalizeText(e.supplier) === normalizeText(candidate.supplier) &&
          normalizeText(e.invoiceNumber) === normalizeText(candidate.invoiceNumber) &&
          Math.abs((e.totalTTC || 0) - (candidate.totalTTC || 0)) < 0.01
        );
        if (idx >= 0) {
          updatedEnergy[idx] = { ...candidate, id: updatedEnergy[idx].id };
          continue;
        }
      }
      updatedEnergy.push({ ...candidate, id: generateId('e') });
    }

    setArticles(updatedArticles);
    setPurchases(updatedPurchases);
    setEnergy(updatedEnergy);

    // Equipment: each equipment invoice → 'small' goes to equipment, 'large' goes to assets.
    let updatedEquipmentPurchases = [...(existingEquipmentPurchases || [])];
    let updatedEquipment = [...(existingEquipment || [])];
    let updatedAssets = [...(existingAssets || [])];
    for (let eqIdx = 0; eqIdx < equipmentInvoices.length; eqIdx++) {
      const inv = equipmentInvoices[eqIdx];
      const origIdx = dryRun.invoices.indexOf(inv);
      const eqType = (equipmentTypeMap && equipmentTypeMap[origIdx]) || 'small';
      const cp = inv.candidatePurchase || {};

      // Map items: use pre-analyzed equipmentId, or user-chosen link, or create
      const mappedItems = (cp.items || []).map((it) => {
        const label = it.label || '';
        let equipmentId = it.equipmentId || null;

        // Check if user chose to link to an existing article
        const userLink = equipmentLinks && equipmentLinks[label];
        if (userLink && userLink !== '__new__') {
          equipmentId = userLink;
        }

        if (equipmentId) {
          // Matched or linked — add alias if not present
          const existing = updatedEquipment.find((e) => e.id === equipmentId);
          if (existing) {
            const aliases = existing.aliases || [];
            if (!aliases.some((a) => normalizeText(a) === normalizeText(label))) {
              const eIdx = updatedEquipment.indexOf(existing);
              updatedEquipment[eIdx] = { ...existing, aliases: [...aliases, label] };
            }
          }
        } else {
          // Create new article
          let article = updatedEquipment.find(
            (e) => normalizeText(e.name) === normalizeText(it.suggestedName || label)
          );
          if (!article) {
            // Check if user provided a custom name
            const customName = equipmentLinks && equipmentLinks[label + '__name'];
            article = {
              id: generateId('eq'),
              name: customName || it.suggestedName || label,
              categoryId: 'autre',
              threshold: 0,
              estimatedUnitPrice: it.total && (it.rawQty || it.qty) ? it.total / (it.rawQty || it.qty) : null,
              aliases: [label],
            };
            updatedEquipment.push(article);
          } else {
            const aliases = article.aliases || [];
            if (!aliases.some((a) => normalizeText(a) === normalizeText(label))) {
              const eIdx = updatedEquipment.indexOf(article);
              updatedEquipment[eIdx] = { ...article, aliases: [...aliases, label] };
            }
          }
          equipmentId = article.id;
        }
        return {
          equipmentId,
          label,
          qty: it.rawQty || it.qty || 1,
          total: it.total || 0,
        };
      });

      const candidate = {
        date: cp.date || '',
        supplier: cp.supplier || '',
        invoiceNumber: cp.invoiceNumber || null,
        total: cp.total || 0,
        equipmentType: eqType,
        items: mappedItems,
      };
      if (eqType === 'large') {
        // Gros équipement → assets (un asset par item)
        for (const it of mappedItems) {
          const isDupAsset = updatedAssets.some(
            (a) => normalizeText(a.name) === normalizeText(it.label) &&
              a.purchaseDate === candidate.date &&
              Math.abs((a.purchasePrice || 0) - (it.total || 0)) < 0.01
          );
          if (!isDupAsset) {
            updatedAssets.push({
              id: generateId('ast'),
              name: it.label,
              categoryId: 'autre',
              status: 'in_service',
              purchaseDate: candidate.date,
              purchasePrice: it.total || null,
              supplier: candidate.supplier,
              warrantyEnd: '',
              notes: `Import facture ${candidate.invoiceNumber || ''}`.trim(),
            });
          }
        }
      } else {
        // Petit équipement → equipmentPurchases
        const isDup = updatedEquipmentPurchases.some(
          (ep) =>
            normalizeText(ep.supplier) === normalizeText(candidate.supplier) &&
            normalizeText(ep.invoiceNumber || '') === normalizeText(candidate.invoiceNumber || '') &&
            Math.abs((ep.total || 0) - (candidate.total || 0)) < 0.01
        );
        if (!isDup) {
          updatedEquipmentPurchases.push({ ...candidate, id: generateId('eqp') });
        }
      }
    }
    if (equipmentInvoices.length > 0) {
      setEquipment(updatedEquipment);
      setEquipmentPurchases(updatedEquipmentPurchases);
      setAssets(updatedAssets);
    }

    onClose();
  };

  const handleBack = () => {
    setStep('input');
    setDryRun(null);
    setIncludeMap({});
  };

  // ─── Render ─────────────────────────────────────────────────────────────

  return (
    <div className="mc-overlay" onClick={onClose} style={{ alignItems: 'flex-start', overflowY: 'auto', padding: '40px 20px' }}>
      <div
        className="mc-modal"
        style={{ maxWidth: 900, padding: 0, maxHeight: 'none' }}
        onClick={(e) => e.stopPropagation()}
      >
        {/* Header */}
        <div style={{ padding: '20px 28px', borderBottom: '1px solid ' + palette.rule, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div>
            <h3 className="mc-display" style={{ fontSize: 22, fontWeight: 600, margin: 0 }}>
              Import depuis Claude.ai
            </h3>
            <p style={{ margin: '4px 0 0', fontSize: 13, color: palette.inkSoft }}>
              {step === 'input'
                ? 'Étape 1 : Coller le JSON généré par Claude.ai depuis vos factures PDF'
                : 'Étape 2 : Vérifier ce qui va être importé'}
            </p>
          </div>
          <button className="mc-btn mc-btn-ghost" onClick={onClose}><X size={14} /></button>
        </div>

        {/* Body */}
        {step === 'input' ? (
          <ImportClaudeInputStep
            jsonText={jsonText}
            setJsonText={setJsonText}
            parseError={parseError}
            showPromptHelp={showPromptHelp}
            setShowPromptHelp={setShowPromptHelp}
            copySuccess={copySuccess}
            copyPromptToClipboard={copyPromptToClipboard}
            currentPrompt={currentPrompt}
            editingPrompt={editingPrompt}
            setEditingPrompt={setEditingPrompt}
            promptDraft={promptDraft}
            setPromptDraft={setPromptDraft}
            savePromptEdits={savePromptEdits}
            resetPromptToDefault={resetPromptToDefault}
            cancelPromptEdits={cancelPromptEdits}
            onAnalyze={handleAnalyze}
          />
        ) : (
          <ImportClaudeReviewStep
            dryRun={dryRun}
            includeMap={includeMap}
            equipmentTypeMap={equipmentTypeMap}
            setEquipmentTypeMap={setEquipmentTypeMap}
            equipmentLinks={equipmentLinks}
            setEquipmentLinks={setEquipmentLinks}
            existingEquipmentArticles={existingEquipment || []}
            setIncludeMap={setIncludeMap}
            editedProposals={editedProposals}
            setEditedProposals={setEditedProposals}
            existingArticles={articles}
            onBack={handleBack}
            onImport={handleImport}
          />
        )}
      </div>
    </div>
  );
}

// ─── ImportClaudeModal: step 1 (paste JSON) ───────────────────────────────

function ImportClaudeInputStep({
  jsonText,
  setJsonText,
  parseError,
  showPromptHelp,
  setShowPromptHelp,
  copySuccess,
  copyPromptToClipboard,
  currentPrompt,
  editingPrompt,
  setEditingPrompt,
  promptDraft,
  setPromptDraft,
  savePromptEdits,
  resetPromptToDefault,
  cancelPromptEdits,
  onAnalyze,
}) {
  const isCustomized = currentPrompt !== DEFAULT_IMPORT_CLAUDE_PROMPT;
  const draftDiffersFromCurrent = promptDraft !== currentPrompt;

  return (
    <div style={{ padding: '20px 28px' }}>
      {/* How-to box */}
      <div style={{
        padding: 14,
        background: palette.paper,
        border: '1px solid ' + palette.rule,
        borderRadius: 8,
        marginBottom: 16,
        fontSize: 13,
        lineHeight: 1.6,
      }}>
        <strong>Comment ça marche :</strong>
        <ol style={{ margin: '6px 0 0 20px', padding: 0 }}>
          <li>Ouvrez <a href="https://claude.ai" target="_blank" rel="noopener noreferrer" style={{ color: palette.wine }}>claude.ai</a> dans un autre onglet</li>
          <li>Glissez vos factures PDF (jusqu'à 20 par message) et collez le prompt ci-dessous</li>
          <li>Claude renvoie un JSON — copiez-le et collez-le dans le grand champ plus bas</li>
          <li>Cliquez "Analyser" pour voir ce qui sera importé avant validation finale</li>
        </ol>
      </div>

      {/* Prompt toggle + copy / edit */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8, flexWrap: 'wrap', gap: 6 }}>
          <button
            className="mc-btn mc-btn-ghost"
            onClick={() => setShowPromptHelp(!showPromptHelp)}
            style={{ padding: '6px 10px', fontSize: 12 }}
          >
            {showPromptHelp ? '▾' : '▸'} Prompt à utiliser dans Claude.ai
            {isCustomized && (
              <span
                style={{
                  marginLeft: 8,
                  fontSize: 9,
                  fontWeight: 700,
                  color: palette.amber,
                  background: palette.amber + '20',
                  padding: '2px 6px',
                  borderRadius: 999,
                  textTransform: 'uppercase',
                  letterSpacing: 0.5,
                }}
              >
                Personnalisé
              </span>
            )}
          </button>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            {showPromptHelp && !editingPrompt && (
              <button
                className="mc-btn mc-btn-ghost"
                onClick={() => setEditingPrompt(true)}
                style={{ padding: '6px 12px', fontSize: 12 }}
                title="Modifier le prompt pour ajouter vos propres règles"
              >
                ✏️ Modifier
              </button>
            )}
            <button
              className="mc-btn mc-btn-primary"
              onClick={copyPromptToClipboard}
              style={{ padding: '6px 12px', fontSize: 12 }}
              disabled={editingPrompt}
              title={editingPrompt ? 'Enregistrez d\'abord vos modifications' : ''}
            >
              {copySuccess ? '✓ Copié' : 'Copier le prompt'}
            </button>
          </div>
        </div>

        {showPromptHelp && !editingPrompt && (
          <pre style={{
            background: palette.ink,
            color: palette.cream,
            padding: 14,
            borderRadius: 6,
            fontSize: 11,
            lineHeight: 1.5,
            overflowX: 'auto',
            maxHeight: 240,
            whiteSpace: 'pre-wrap',
            margin: 0,
          }}>{currentPrompt}</pre>
        )}

        {showPromptHelp && editingPrompt && (
          <div>
            <textarea
              value={promptDraft}
              onChange={(e) => setPromptDraft(e.target.value)}
              spellCheck={false}
              style={{
                width: '100%',
                minHeight: 280,
                maxHeight: 500,
                fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Consolas, monospace',
                fontSize: 11,
                lineHeight: 1.5,
                padding: 12,
                borderRadius: 6,
                border: `1px solid ${palette.rule}`,
                background: palette.cream,
                color: palette.ink,
                resize: 'vertical',
                whiteSpace: 'pre',
                overflowX: 'auto',
                boxSizing: 'border-box',
              }}
            />
            <div
              style={{
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                gap: 10,
                marginTop: 8,
                flexWrap: 'wrap',
              }}
            >
              <span style={{ fontSize: 11, color: palette.inkSoft }}>
                {promptDraft.length.toLocaleString('fr-FR')} caractères
              </span>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                <button
                  className="mc-btn mc-btn-ghost"
                  onClick={resetPromptToDefault}
                  disabled={promptDraft === DEFAULT_IMPORT_CLAUDE_PROMPT && !isCustomized}
                  style={{ padding: '6px 12px', fontSize: 12 }}
                  title="Recharger la version livrée avec l'application"
                >
                  Restaurer le défaut
                </button>
                <button
                  className="mc-btn mc-btn-ghost"
                  onClick={cancelPromptEdits}
                  style={{ padding: '6px 12px', fontSize: 12 }}
                >
                  Annuler
                </button>
                <button
                  className="mc-btn mc-btn-primary"
                  onClick={savePromptEdits}
                  disabled={!draftDiffersFromCurrent}
                  style={{ padding: '6px 12px', fontSize: 12 }}
                >
                  Enregistrer
                </button>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* JSON input */}
      <label className="mc-label">JSON généré par Claude</label>
      <textarea
        className="mc-input"
        value={jsonText}
        onChange={(e) => setJsonText(e.target.value)}
        placeholder='{"invoices": [{"date": "2025-11-12", "supplier": "SOFRIMA", ...}]}'
        style={{
          width: '100%',
          minHeight: 200,
          maxHeight: 400,
          fontFamily: 'Menlo, Monaco, "Courier New", monospace',
          fontSize: 12,
          lineHeight: 1.5,
          resize: 'vertical',
        }}
      />

      {parseError && (
        <div style={{
          marginTop: 12,
          padding: 12,
          background: palette.wine + '10',
          border: '1px solid ' + palette.wine + '40',
          borderRadius: 6,
          color: palette.wine,
          fontSize: 13,
          display: 'flex',
          gap: 8,
          alignItems: 'flex-start',
        }}>
          <AlertCircle size={14} style={{ flexShrink: 0, marginTop: 2 }} />
          <div>{parseError}</div>
        </div>
      )}

      {/* Footer actions */}
      <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 20 }}>
        <button
          className="mc-btn mc-btn-primary"
          onClick={onAnalyze}
          disabled={!jsonText.trim()}
        >
          Analyser →
        </button>
      </div>
    </div>
  );
}

// ─── ImportClaudeModal: step 2 (review before commit) ─────────────────────

function ImportClaudeReviewStep({
  dryRun,
  includeMap,
  setIncludeMap,
  equipmentTypeMap,
  setEquipmentTypeMap,
  equipmentLinks,
  setEquipmentLinks,
  existingEquipmentArticles,
  editedProposals,
  setEditedProposals,
  existingArticles,
  onBack,
  onImport,
}) {
  const { invoices, summary } = dryRun;

  const includedCount = Object.values(includeMap).filter(Boolean).length;
  const toggleInvoice = (idx) => {
    setIncludeMap({ ...includeMap, [idx]: !includeMap[idx] });
  };

  // Build the dedup'd list of new-article proposals to show in the editor
  // section. We rebuild from editedProposals so the order matches creation.
  const proposalsToShow = useMemo(() => {
    return Object.entries(editedProposals).map(([originalLabel, proposal]) => ({
      originalLabel,
      proposal,
    }));
  }, [editedProposals]);

  // Existing categories (deduped) — proposed as quick suggestions
  const existingCategories = useMemo(() => {
    const set = new Set();
    for (const ing of existingArticles) {
      if (ing.category) set.add(ing.category);
    }
    // Always offer "À trier" as a fallback
    set.add('À trier');
    return Array.from(set).sort();
  }, [existingArticles]);

  const updateProposal = (originalLabel, patch) => {
    setEditedProposals((prev) => ({
      ...prev,
      [originalLabel]: { ...prev[originalLabel], ...patch },
    }));
  };

  return (
    <div style={{ padding: '20px 28px' }}>
      {/* Summary card */}
      <div style={{
        display: 'grid',
        gridTemplateColumns: 'repeat(5, 1fr)',
        gap: 12,
        marginBottom: 20,
      }}>
        <SummaryBox label="Factures détectées" value={summary.total} color={palette.ink} />
        <SummaryBox
          label="Doublons (seront écrasés)"
          value={summary.duplicates}
          color={summary.duplicates > 0 ? palette.amber : palette.inkSoft}
        />
        <SummaryBox
          label="Nouveaux articles"
          value={summary.newArticlesTotal}
          color={summary.newArticlesTotal > 0 ? palette.sage : palette.inkSoft}
        />
        <SummaryBox
          label="Factures équipement"
          value={summary.equipmentCount || 0}
          color={summary.equipmentCount > 0 ? palette.statusOk : palette.inkSoft}
        />
        <SummaryBox
          label="Avoirs ignorés"
          value={summary.credits || 0}
          color={summary.credits > 0 ? palette.wine : palette.inkSoft}
        />
      </div>

      {/* Duplicate warning banner (Q4 = A: warn clearly) */}
      {summary.duplicates > 0 && (
        <div style={{
          padding: 12,
          background: palette.amber + '15',
          border: '1px solid ' + palette.amber + '40',
          borderRadius: 6,
          marginBottom: 16,
          fontSize: 13,
          display: 'flex',
          gap: 10,
          alignItems: 'flex-start',
        }}>
          <AlertCircle size={16} style={{ color: palette.amber, flexShrink: 0, marginTop: 2 }} />
          <div style={{ color: palette.ink, lineHeight: 1.5 }}>
            <strong>Attention : {summary.duplicates} doublon{summary.duplicates > 1 ? 's' : ''} détecté{summary.duplicates > 1 ? 's' : ''}.</strong>
            {' '}Les factures déjà présentes dans la base seront <strong>remplacées</strong> par leur version importée.
            Décochez ci-dessous les doublons que vous souhaitez exclure.
          </div>
        </div>
      )}

      {/* New-articles editor (Q2 = D: tweak before import).
          Shown only when at least one new article is going to be created.
          The list is deduplicated across invoices: each unique label appears
          once even if used in several factures. */}
      {proposalsToShow.length > 0 && (
        <section style={{ marginBottom: 20 }}>
          <h4 className="mc-display" style={{ fontSize: 14, fontWeight: 600, margin: '0 0 8px', color: palette.sage }}>
            Nouveaux articles à créer ({proposalsToShow.length})
          </h4>
          <p style={{ fontSize: 12, color: palette.inkSoft, margin: '0 0 12px', lineHeight: 1.5 }}>
            Ajustez le nom, l'unité et la catégorie avant l'import. Le packaging
            détecté automatiquement convertira les futures factures.
          </p>
          <div style={{
            border: '1px solid ' + palette.sage + '40',
            borderRadius: 8,
            background: palette.sage + '06',
            maxHeight: 320,
            overflowY: 'auto',
          }}>
            {proposalsToShow.map(({ originalLabel, proposal }) => (
              <ProposalEditorRow
                key={originalLabel}
                originalLabel={originalLabel}
                proposal={proposal}
                existingCategories={existingCategories}
                onChange={(patch) => updateProposal(originalLabel, patch)}
              />
            ))}
          </div>
        </section>
      )}

      {/* ─── Nouveaux articles ÉQUIPEMENT à créer/lier ──────────────────── */}
      {(() => {
        const allNewEquip = [];
        const seen = new Set();
        for (const inv of invoices) {
          if (inv.kind !== 'equipment' || !inv.newEquipArticles) continue;
          for (const ni of inv.newEquipArticles) {
            if (!seen.has(ni.label)) {
              seen.add(ni.label);
              allNewEquip.push(ni);
            }
          }
        }
        if (allNewEquip.length === 0) return null;
        return (
          <section style={{ marginBottom: 20 }}>
            <h4 className="mc-display" style={{ fontSize: 14, fontWeight: 600, margin: '0 0 8px', color: palette.statusOk }}>
              🔧 Nouveaux articles équipement ({allNewEquip.length})
            </h4>
            <p style={{ fontSize: 12, color: palette.inkSoft, margin: '0 0 12px', lineHeight: 1.5 }}>
              Ajustez le nom et la catégorie, ou liez à un article existant.
            </p>
            <div style={{ border: `1px solid ${palette.statusOk}40`, borderRadius: 8, background: `${palette.statusOk}06`, maxHeight: 320, overflowY: 'auto' }}>
              {allNewEquip.map((ni) => {
                const linked = equipmentLinks[ni.label];
                return (
                  <EquipmentProposalRow
                    key={ni.label}
                    originalLabel={ni.label}
                    suggestedName={ni.suggestedName}
                    linkedId={linked || '__new__'}
                    existingEquipmentArticles={existingEquipmentArticles || []}
                    onChangeLink={(val) => setEquipmentLinks({ ...equipmentLinks, [ni.label]: val })}
                    onChangeName={(name) => setEquipmentLinks({ ...equipmentLinks, [ni.label]: '__new__', [ni.label + '__name']: name })}
                    equipmentLinks={equipmentLinks}
                  />
                );
              })}
            </div>
          </section>
        );
      })()}

      {/* Per-invoice list */}
      <div style={{
        border: '1px solid ' + palette.rule,
        borderRadius: 8,
        maxHeight: 400,
        overflowY: 'auto',
      }}>
        {invoices.map((inv, idx) => (
          <ImportClaudeInvoiceRow
            key={idx}
            invoice={inv}
            index={idx}
            included={includeMap[idx]}
            onToggle={() => toggleInvoice(idx)}
            equipmentTypeMap={equipmentTypeMap}
            setEquipmentTypeMap={setEquipmentTypeMap}
            equipmentLinks={equipmentLinks}
            setEquipmentLinks={setEquipmentLinks}
            existingEquipmentArticles={existingEquipmentArticles}
          />
        ))}
      </div>

      {/* Footer actions */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 20 }}>
        <button className="mc-btn mc-btn-ghost" onClick={onBack}>
          ← Modifier le JSON
        </button>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{ fontSize: 12, color: palette.inkSoft }}>
            {includedCount} sur {summary.total} sélectionnée{includedCount > 1 ? 's' : ''}
          </span>
          <button
            className="mc-btn mc-btn-primary"
            onClick={() => onImport(equipmentTypeMap, equipmentLinks)}
            disabled={includedCount === 0}
          >
            <Save size={14} /> Importer {includedCount} facture{includedCount > 1 ? 's' : ''}
          </button>
        </div>
      </div>
    </div>
  );
}

/**
 * One row in the new-article editor (review screen).
 *
 * The user can adjust:
 *   - name (defaults to the raw label)
 *   - unit (kg / L / pièce)
 *   - category (suggested from existing categories or free text)
 *
 * The detected packaging (if any) is shown read-only — the user can see
 * what was auto-detected from the label so they understand what'll happen.
 */
/**
 * Row in the equipment new-article editor.
 * Allows renaming, choosing category, or linking to an existing equipment article.
 */
function EquipmentProposalRow({ originalLabel, suggestedName, linkedId, existingEquipmentArticles, onChangeLink, onChangeName, equipmentLinks }) {
  const customName = equipmentLinks[originalLabel + '__name'] || suggestedName;
  const isLinking = linkedId && linkedId !== '__new__';

  return (
    <div style={{
      padding: '12px 16px',
      borderBottom: '1px solid ' + palette.rule,
      display: 'grid',
      gridTemplateColumns: 'minmax(140px, 1.5fr) minmax(140px, 1.2fr) minmax(200px, 1.5fr)',
      gap: 10,
      alignItems: 'flex-start',
    }}>
      {/* Label facture */}
      <div>
        <label style={{ fontSize: 10, color: palette.inkSoft, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.3 }}>Libellé facture</label>
        <div style={{ fontSize: 12, color: palette.ink, marginTop: 4, fontStyle: 'italic' }}>{originalLabel}</div>
      </div>

      {/* Nom de l'article (si création) */}
      <div>
        <label style={{ fontSize: 10, color: palette.inkSoft, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.3 }}>Nom de l'article</label>
        <input
          className="mc-input"
          value={isLinking ? (existingEquipmentArticles.find(e => e.id === linkedId)?.name || '') : customName}
          onChange={(e) => onChangeName(e.target.value)}
          disabled={isLinking}
          style={{ width: '100%', fontSize: 12, opacity: isLinking ? 0.5 : 1 }}
        />
      </div>

      {/* Lier ou créer */}
      <div>
        <label style={{ fontSize: 10, color: palette.inkSoft, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.3 }}>Action</label>
        <select
          value={linkedId}
          onChange={(e) => onChangeLink(e.target.value)}
          className="mc-input"
          style={{ width: '100%', fontSize: 12 }}
        >
          <option value="__new__">➕ Créer un nouvel article</option>
          <optgroup label="── Lier à un article existant ──">
            {(existingEquipmentArticles || []).sort((a,b) => a.name.localeCompare(b.name)).map((eq) => (
              <option key={eq.id} value={eq.id}>{eq.name}</option>
            ))}
          </optgroup>
        </select>
        {isLinking && (
          <div style={{ fontSize: 10, color: palette.sage, marginTop: 2 }}>
            ↳ "{originalLabel}" sera ajouté comme alias
          </div>
        )}
      </div>
    </div>
  );
}

function ProposalEditorRow({ originalLabel, proposal, existingCategories, onChange }) {
  const [useCustomCategory, setUseCustomCategory] = useState(
    !existingCategories.includes(proposal.category)
  );

  const pkg = (proposal.packagings || [])[0];
  const currentType = proposal.suggestedType || 'food';

  return (
    <div style={{
      padding: '12px 16px',
      borderBottom: '1px solid ' + palette.rule,
      display: 'grid',
      // Each column has a minimum width so that even on narrow viewports the
      // dropdown values ("Consommable", "Alimentaire") remain visible. When
      // the total minimum exceeds the available width, the grid will overflow
      // horizontally — preferable to truncated labels.
      gridTemplateColumns:
        'minmax(140px, 1.5fr) minmax(70px, 80px) minmax(140px, 1.2fr) minmax(120px, 1fr) minmax(180px, 1.4fr)',
      gap: 10,
      alignItems: 'flex-start',
    }}>
      {/* Name */}
      <div>
        <label style={{ fontSize: 10, color: palette.inkSoft, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.3 }}>
          Nom
        </label>
        <input
          className="mc-input"
          value={proposal.name}
          onChange={(e) => onChange({ name: e.target.value })}
          style={{ width: '100%', fontSize: 12 }}
        />
        <div style={{ fontSize: 10, color: palette.inkSoft, marginTop: 2 }}>
          Alias : <em>{originalLabel}</em>
        </div>
      </div>

      {/* Master unit */}
      <div>
        <label style={{ fontSize: 10, color: palette.inkSoft, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.3 }}>
          Unité
        </label>
        <select
          className="mc-input"
          value={proposal.unit}
          onChange={(e) => onChange({ unit: e.target.value })}
          style={{ width: '100%', fontSize: 12 }}
        >
          <option value="kg">kg</option>
          <option value="L">L</option>
          <option value="pièce">pièce</option>
        </select>
      </div>

      {/* Product type (food / consumable) */}
      <div>
        <label style={{ fontSize: 10, color: palette.inkSoft, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.3 }}>
          Type
        </label>
        <select
          className="mc-input"
          value={currentType}
          onChange={(e) => onChange({ suggestedType: e.target.value })}
          style={{
            width: '100%',
            fontSize: 12,
            // Highlight the field when the heuristic flagged it as consumable,
            // so the user notices it deserves a glance.
            background: currentType === 'consumable' ? palette.amber + '15' : undefined,
            borderColor: currentType === 'consumable' ? palette.amber : undefined,
          }}
        >
          <option value="food">Alimentaire</option>
          <option value="consumable">Consommable</option>
        </select>
        {proposal.detectedConsumableKeyword && (
          <div style={{
            fontSize: 10,
            color: palette.amber,
            marginTop: 2,
            fontStyle: 'italic',
          }}>
            ↳ Détecté : « {proposal.detectedConsumableKeyword.toLowerCase()} »
          </div>
        )}
      </div>

      {/* Category */}
      <div>
        <label style={{ fontSize: 10, color: palette.inkSoft, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.3 }}>
          Catégorie
        </label>
        {useCustomCategory ? (
          <div style={{ display: 'flex', gap: 4 }}>
            <input
              className="mc-input"
              value={proposal.category || ''}
              onChange={(e) => onChange({ category: e.target.value })}
              placeholder="Nouvelle catégorie"
              style={{ flex: 1, fontSize: 12 }}
            />
            <button
              type="button"
              onClick={() => setUseCustomCategory(false)}
              title="Choisir dans la liste"
              style={{
                padding: '4px 8px', fontSize: 10, cursor: 'pointer',
                background: 'transparent', border: '1px solid ' + palette.rule,
                borderRadius: 4, color: palette.inkSoft,
              }}
            >
              ▾
            </button>
          </div>
        ) : (
          <select
            className="mc-input"
            value={proposal.category || ''}
            onChange={(e) => {
              if (e.target.value === '__custom__') {
                setUseCustomCategory(true);
                onChange({ category: '' });
              } else {
                onChange({ category: e.target.value });
              }
            }}
            style={{ width: '100%', fontSize: 12 }}
          >
            {existingCategories.map((c) => <option key={c} value={c}>{c}</option>)}
            <option value="__custom__">+ Nouvelle catégorie…</option>
          </select>
        )}
      </div>

      {/* Conversion (editable). The detected packaging is just a starting
          point — the user can adjust the source unit, factor, or remove the
          conversion entirely if the auto-detection got it wrong. */}
      <div>
        <label style={{ fontSize: 10, color: palette.inkSoft, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.3 }}>
          Conversion {pkg && '(auto-détectée)'}
        </label>
        {pkg ? (
          <div style={{
            padding: '6px 8px',
            background: palette.sage + '08',
            border: '1px solid ' + palette.sage + '30',
            borderRadius: 4,
          }}>
            <div style={{
              display: 'flex',
              gap: 4,
              alignItems: 'center',
              fontSize: 11,
              fontFamily: 'Fraunces, serif',
            }}>
              <span>1</span>
              <input
                type="text"
                value={pkg.unit}
                onChange={(e) => {
                  const newPkg = { ...pkg, unit: e.target.value };
                  onChange({ packagings: [newPkg] });
                }}
                placeholder="unité"
                style={{
                  width: 50,
                  padding: '2px 4px',
                  fontSize: 11,
                  border: '1px solid ' + palette.rule,
                  borderRadius: 3,
                  fontFamily: 'inherit',
                }}
              />
              <span>=</span>
              <input
                type="number"
                step="0.001"
                min="0"
                value={pkg.factor}
                onChange={(e) => {
                  const val = parseFloat(e.target.value);
                  const newPkg = { ...pkg, factor: isFinite(val) ? val : 0 };
                  onChange({ packagings: [newPkg], detectedFactor: isFinite(val) ? val : 0 });
                }}
                style={{
                  width: 55,
                  padding: '2px 4px',
                  fontSize: 11,
                  border: '1px solid ' + palette.rule,
                  borderRadius: 3,
                  fontFamily: 'inherit',
                  textAlign: 'right',
                }}
              />
              <span style={{ color: palette.inkSoft }}>{proposal.unit}</span>
            </div>
            <button
              type="button"
              onClick={() => onChange({ packagings: [], detectedFactor: undefined })}
              style={{
                fontSize: 10,
                color: palette.inkSoft,
                background: 'transparent',
                border: 'none',
                padding: '2px 0 0',
                marginTop: 2,
                cursor: 'pointer',
                textDecoration: 'underline',
              }}
            >
              Retirer la conversion
            </button>
          </div>
        ) : (
          <button
            type="button"
            onClick={() => {
              const newPkg = { label: '', factor: 1, unit: 'U', supplier: proposal.supplier || '' };
              onChange({ packagings: [newPkg], detectedFactor: 1 });
            }}
            style={{
              fontSize: 11,
              color: palette.inkSoft,
              background: 'transparent',
              border: '1px dashed ' + palette.rule,
              padding: '6px 8px',
              borderRadius: 4,
              cursor: 'pointer',
              width: '100%',
              textAlign: 'center',
            }}
          >
            + Ajouter une conversion
          </button>
        )}
      </div>
    </div>
  );
}

function SummaryBox({ label, value, color }) {
  return (
    <div style={{
      padding: 12,
      background: palette.paper,
      borderRadius: 6,
      border: '1px solid ' + palette.rule,
    }}>
      <div style={{ fontSize: 11, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: 0.3 }}>
        {label}
      </div>
      <div className="mc-display" style={{ fontSize: 22, fontWeight: 700, color, marginTop: 4 }}>
        {value}
      </div>
    </div>
  );
}

function ImportClaudeInvoiceRow({ invoice, index, included, onToggle, equipmentTypeMap, setEquipmentTypeMap, equipmentLinks, setEquipmentLinks, existingEquipmentArticles }) {
  if (invoice.parseError) {
    // Error invoices can't be imported
    return (
      <div style={{
        padding: '12px 16px',
        borderBottom: '1px solid ' + palette.rule,
        background: palette.wine + '08',
        display: 'flex',
        gap: 12,
        alignItems: 'flex-start',
      }}>
        <AlertCircle size={14} style={{ color: palette.wine, flexShrink: 0, marginTop: 4 }} />
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: palette.wine }}>
            Facture #{index + 1} : erreur
          </div>
          <div style={{ fontSize: 12, color: palette.inkSoft, marginTop: 2 }}>
            {invoice.parseError}
          </div>
        </div>
      </div>
    );
  }

  // Energy invoices have a different shape: candidateEnergy instead of
  // candidatePurchase, no items array. We compute a small "header object"
  // that works for both cases so the rendering code stays simple.
  const isEnergy = invoice.kind === 'energy';
  const isEquipment = invoice.kind === 'equipment';
  const inv = isEnergy ? invoice.candidateEnergy : invoice.candidatePurchase;
  const energyTypeInfo = isEnergy ? (ENERGY_TYPES[inv.energyType] || ENERGY_TYPES.electricity) : null;
  return (
    <div style={{
      padding: '12px 16px',
      borderBottom: '1px solid ' + palette.rule,
      display: 'flex',
      gap: 12,
      alignItems: 'flex-start',
      background: included ? 'transparent' : palette.paper + '88',
      opacity: included ? 1 : 0.5,
    }}>
      <input
        type="checkbox"
        checked={included}
        onChange={onToggle}
        style={{ marginTop: 4, flexShrink: 0 }}
      />
      <div style={{ flex: 1 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 600 }}>
              {inv.supplier || 'Fournisseur inconnu'}
              {inv.invoiceNumber && <span style={{ color: palette.inkSoft, fontWeight: 400 }}> · n°{inv.invoiceNumber}</span>}
            </div>
            <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 2 }}>
              {inv.date ? formatShortDate(inv.date, { withYear: true }) : 'Date inconnue'}
              {isEnergy ? (
                <>
                  {' · '}{inv.consumption ? inv.consumption + ' ' + energyTypeInfo.unit : 'conso ?'}
                  {(inv.totalTTC || inv.totalHT) ? ` · ${formatEuro(inv.totalTTC || inv.totalHT)} TTC` : ''}
                </>
              ) : (
                <>
                  {' · '}{inv.items.length} ligne{inv.items.length > 1 ? 's' : ''}
                  {inv.total ? ` · ${formatEuro(inv.total)}` : ''}
                </>
              )}
            </div>
            {/* Always-visible duplicate reason (no tooltip dependency — those
                are unreliable in this context). Only shown when this invoice
                is a duplicate of an existing one. */}
            {invoice.isDuplicate && (
              <div style={{
                fontSize: 11,
                color: palette.amber,
                marginTop: 4,
                fontStyle: 'italic',
                display: 'flex',
                alignItems: 'center',
                gap: 4,
              }}>
                ↳ Doublon&nbsp;: {invoice.duplicateReason || 'détecté'}
              </div>
            )}
          </div>
          <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
            {isEnergy && (
              <span
                className="mc-pill"
                style={{ background: energyTypeInfo.color + '20', color: energyTypeInfo.color, fontWeight: 600 }}
              >
                {energyTypeInfo.label}
              </span>
            )}
            {isEquipment && (
              <span
                className="mc-pill"
                style={{ background: `${palette.statusOk}20`, color: palette.statusOk, fontWeight: 600 }}
              >
                🔧 Équipement
              </span>
            )}
            {isEquipment && included && (
              <select
                value={equipmentTypeMap[index] || 'small'}
                onChange={(e) => setEquipmentTypeMap({ ...equipmentTypeMap, [index]: e.target.value })}
                style={{
                  fontSize: 11,
                  padding: '2px 6px',
                  borderRadius: 4,
                  border: `1px solid ${palette.statusOk}80`,
                  color: palette.statusOk,
                  background: `${palette.statusOk}10`,
                  cursor: 'pointer',
                }}
              >
                <option value="small">Petit équipement</option>
                <option value="large">Gros équipement</option>
              </select>
            )}
            {invoice.isCredit && (
              <span
                className="mc-pill"
                style={{ background: palette.wine + '20', color: palette.wine, fontWeight: 600 }}
              >
                AVOIR — ignoré
              </span>
            )}
            {invoice.isDuplicate && (
              <span
                className="mc-pill"
                style={{ background: palette.amber + '20', color: palette.amber, fontWeight: 600 }}
              >
                Doublon (sera écrasé)
              </span>
            )}
            {invoice.newArticles?.length > 0 && (
              <span className="mc-pill" style={{ background: palette.sage + '20', color: palette.sage, fontWeight: 600 }}>
                +{invoice.newArticles.length} ingr. créé{invoice.newArticles.length > 1 ? 's' : ''}
              </span>
            )}
          </div>
        </div>

        {/* Detail of new articles */}
        {invoice.newArticles?.length > 0 && (
          <div style={{ marginTop: 8, fontSize: 11, color: palette.inkSoft, paddingLeft: 12, borderLeft: '2px solid ' + palette.sage }}>
            <div style={{ fontWeight: 600, marginBottom: 2, color: palette.sage }}>
              Articles qui seront créés :
            </div>
            {invoice.newArticles.map((ni, i) => (
              <div key={i} style={{ marginTop: 2 }}>
                · <strong>{ni.name}</strong> ({ni.unit}) — alias "{ni.aliases[0]}"
              </div>
            ))}
          </div>
        )}

        {/* Nouveaux articles équipement : créer ou lier */}
        {isEquipment && invoice.newEquipArticles?.length > 0 && (
          <div style={{ marginTop: 8, fontSize: 11, paddingLeft: 12, borderLeft: `2px solid ${palette.attention}` }}>
            <div style={{ fontWeight: 600, marginBottom: 6, color: palette.attention }}>
              {invoice.newEquipArticles.length} article{invoice.newEquipArticles.length > 1 ? 's' : ''} non reconnu{invoice.newEquipArticles.length > 1 ? 's' : ''} :
            </div>
            {invoice.newEquipArticles.map((ni, i) => {
              const linked = equipmentLinks[ni.label];
              return (
                <div key={i} style={{ marginBottom: 8, padding: '6px 8px', background: palette.paper, borderRadius: 4, border: `1px solid ${palette.attention}30` }}>
                  <div style={{ color: palette.inkSoft, marginBottom: 4, fontSize: 10 }}>Libellé facture : <strong style={{ color: palette.ink }}>{ni.label}</strong></div>
                  <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                    <select
                      value={linked || '__new__'}
                      onChange={(e) => setEquipmentLinks({ ...equipmentLinks, [ni.label]: e.target.value })}
                      style={{ fontSize: 11, padding: '3px 6px', borderRadius: 4, border: '1px solid ' + palette.rule, flex: 1 }}
                    >
                      <option value="__new__">➕ Créer "{ni.suggestedName}"</option>
                      <optgroup label="── Lier à un article existant ──">
                        {(existingEquipmentArticles || []).sort((a,b) => a.name.localeCompare(b.name)).map((eq) => (
                          <option key={eq.id} value={eq.id}>{eq.name}</option>
                        ))}
                      </optgroup>
                    </select>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Articles équipement reconnus */}
        {isEquipment && invoice.matchedItems?.length > 0 && (
          <div style={{ marginTop: 8, fontSize: 11, color: palette.inkSoft, paddingLeft: 12, borderLeft: '2px solid ' + palette.sage }}>
            <div style={{ fontWeight: 600, marginBottom: 2, color: palette.sage }}>
              Articles reconnus :
            </div>
            {invoice.matchedItems.map((it, i) => (
              <div key={i} style={{ marginTop: 2 }}>
                · <strong>{it.equipmentName}</strong> — {it.rawQty} {it.rawUnit}
              </div>
            ))}
          </div>
        )}

        {/* Alertes de prix aberrant (écart ≥ 30% par rapport à l'historique) */}
        {(() => {
          const items = inv?.items || [];
          const alertItems = items.filter((it) => it.priceAlert);
          if (!alertItems.length) return null;
          return (
            <div style={{
              marginTop: 8,
              padding: '8px 12px',
              background: `${palette.statusBroken}12`,
              border: `1px solid ${palette.statusBroken}40`,
              borderRadius: 6,
              fontSize: 11,
            }}>
              <div style={{ fontWeight: 600, color: palette.statusBroken, marginBottom: 4, display: 'flex', alignItems: 'center', gap: 4 }}>
                <AlertCircle size={12} /> {alertItems.length} alerte{alertItems.length > 1 ? 's' : ''} de prix — écart ≥ 30% vs historique
              </div>
              {alertItems.map((it, i) => {
                const a = it.priceAlert;
                const isUp = a.deltaPct > 0;
                return (
                  <div key={i} style={{ marginTop: 3, color: palette.statusBroken, display: 'flex', gap: 6, alignItems: 'baseline' }}>
                    <span style={{ fontWeight: 600 }}>{isUp ? '↑' : '↓'} {Math.abs(a.deltaPct)}%</span>
                    <span style={{ color: '#666' }}>{it.label}</span>
                    <span>—</span>
                    <span>{a.currentPrice.toFixed(2)} €/{a.unit} importé vs {a.historicalAvg.toFixed(2)} €/{a.unit} habituel</span>
                  </div>
                );
              })}
              <div style={{ marginTop: 6, color: '#888', fontStyle: 'italic' }}>
                Vérifiez la conversion d'unités si l'écart semble anormal.
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

/**
 * Analyzes one invoice from the parsed JSON.
 *
 * Output shape:
 *   {
 *     parseError: string | null,
 *     candidatePurchase: { date, supplier, invoiceNumber, items, total },
 *     isDuplicate: boolean,
 *     duplicateOfId: string | null,
 *     newArticles: [{ name, unit, category, aliases[], supplier, packagings[] }],
 *     unmatchedItems: [...],
 *   }
 */
/**
 * Dry-run analysis for a single ENERGY invoice (EDF, Engie, water utility...).
 *
 * Energy invoices don't have item lines — they have a single consumption
 * figure (kWh or m³) and a total. So no article matching, no packaging
 * detection, no proposal of new products. We just validate the structure,
 * check for duplicates, and surface it in the review screen as-is.
 *
 * Duplicate detection rule: same supplier + invoiceNumber + totalTTC.
 * (Date is intentionally NOT part of the key because the same invoice
 * may appear on different scan dates.)
 */
function analyzeEnergyInvoice(rawInvoice, idx, existingEnergy) {
  // Build the candidate energy invoice
  const candidate = {
    kind: 'energy',
    date: rawInvoice.date,
    supplier: rawInvoice.supplier,
    invoiceNumber: rawInvoice.invoiceNumber || '',
    energyType: rawInvoice.energyType || 'electricity',
    periodStart: rawInvoice.periodStart || '',
    periodEnd: rawInvoice.periodEnd || '',
    consumption: rawInvoice.consumption || 0,
    totalHT: rawInvoice.totalHT || 0,
    totalTTC: rawInvoice.totalTTC || rawInvoice.totalHT || 0,
  };

  // Validate energy-specific minimum
  if (!['electricity', 'gas', 'water'].includes(candidate.energyType)) {
    return {
      parseError: `Type d'énergie invalide : "${rawInvoice.energyType}". Attendu : electricity, gas ou water.`,
    };
  }

  // Duplicate detection (against existing energy invoices)
  let isDuplicate = false;
  if (Array.isArray(existingEnergy) && candidate.invoiceNumber) {
    const normSupplier = normalizeText(candidate.supplier);
    const normInvoice = normalizeText(candidate.invoiceNumber);
    for (const existing of existingEnergy) {
      if (normalizeText(existing.supplier) === normSupplier &&
          normalizeText(existing.invoiceNumber) === normInvoice &&
          Math.abs((existing.totalTTC || 0) - candidate.totalTTC) < 0.01) {
        isDuplicate = true;
        break;
      }
    }
  }

  return {
    kind: 'energy',
    parseError: null,
    isCredit: false,
    candidateEnergy: candidate,
    isDuplicate,
    // For UI symmetry with supply invoices; energy has no items.
    newArticles: [],
    unmatchedItems: [],
  };
}

function analyzeOneInvoice(rawInvoice, idx, articles, existingPurchases, existingEnergy, existingEquipmentPurchases, existingEquipment) {
  // Validate minimum required fields
  if (!rawInvoice || typeof rawInvoice !== 'object') {
    return { parseError: 'Facture invalide (pas un objet).' };
  }
  if (!rawInvoice.date) {
    return { parseError: 'Date manquante.' };
  }
  if (!rawInvoice.supplier) {
    return { parseError: 'Fournisseur manquant.' };
  }

  // Route by kind. If kind='energy' or supplier matches ENERGY_SUPPLIERS, treat
  // as an energy invoice (no items, no article matching, goes to the energy
  // store on commit). Otherwise fall through to the classic supply path.
  const kind = inferInvoiceKind(rawInvoice);
  if (kind === 'energy') {
    return analyzeEnergyInvoice(rawInvoice, idx, existingEnergy);
  }

  // Equipment invoices: match by alias, propose creation for unknown items
  if (kind === 'equipment') {
    if (!Array.isArray(rawInvoice.items) || rawInvoice.items.length === 0) {
      return { parseError: 'Aucune ligne dans cette facture équipement.' };
    }
    const isDup = (existingEquipmentPurchases || []).some(
      (ep) =>
        normalizeText(ep.supplier) === normalizeText(rawInvoice.supplier) &&
        normalizeText(ep.invoiceNumber || '') === normalizeText(rawInvoice.invoiceNumber || '') &&
        Math.abs((ep.total || 0) - (rawInvoice.total || 0)) < 0.01
    );

    // Helper: find equipment article by alias or name
    const findEquipmentByLabel = (label) => {
      const norm = normalizeText(label);
      return (existingEquipment || []).find((eq) => {
        // Match by name
        if (normalizeText(eq.name) === norm) return true;
        // Match by aliases array
        if (Array.isArray(eq.aliases)) {
          return eq.aliases.some((a) => normalizeText(a) === norm);
        }
        return false;
      });
    };

    const matchedItems = [];
    const newEquipArticles = [];

    for (const it of rawInvoice.items) {
      const label = it.label || '';
      const existing = findEquipmentByLabel(label);
      if (existing) {
        matchedItems.push({
          label,
          rawQty: it.rawQty || 1,
          rawUnit: it.rawUnit || 'pièce',
          total: it.total || 0,
          equipmentId: existing.id,
          equipmentName: existing.name,
          isNew: false,
        });
      } else {
        // Propose new article
        const suggestedName = label
          .replace(/\[.*?\]/g, '')
          .replace(/\d{3,}/g, '')
          .replace(/\s+/g, ' ')
          .trim()
          .split(' ').slice(0, 4).join(' ');
        matchedItems.push({
          label,
          rawQty: it.rawQty || 1,
          rawUnit: it.rawUnit || 'pièce',
          total: it.total || 0,
          equipmentId: null,
          suggestedName,
          isNew: true,
        });
        if (!newEquipArticles.find((n) => n.label === label)) {
          newEquipArticles.push({
            label,
            suggestedName,
            categoryId: 'autre',
          });
        }
      }
    }

    return {
      kind: 'equipment',
      parseError: null,
      isDuplicate: isDup,
      duplicateOfId: null,
      duplicateReason: isDup ? 'Facture équipement déjà importée' : null,
      candidatePurchase: {
        date: rawInvoice.date,
        supplier: rawInvoice.supplier,
        invoiceNumber: rawInvoice.invoiceNumber || '',
        items: matchedItems,
        total: rawInvoice.total || 0,
      },
      newEquipArticles,
      newArticles: [],
      unmatchedItems: matchedItems.filter((i) => i.isNew),
      matchedItems: matchedItems.filter((i) => !i.isNew),
    };
  }

  if (!Array.isArray(rawInvoice.items) || rawInvoice.items.length === 0) {
    return { parseError: "Aucune ligne d'achat dans cette facture." };
  }

  // Detect credit notes (AVOIRS): SOFRIMA-style avoirs have negative line totals
  // and/or a negative invoice total. We surface them in the review so the user
  // sees them, but mark them as excluded from the actual import (per Q5 = ignore).
  // A line is treated as part of a credit note if its total is < 0.
  const invoiceTotal = rawInvoice.total || 0;
  const allLinesNegative = rawInvoice.items.every((it) => (it.total || 0) < 0);
  const isCredit = invoiceTotal < 0 || allLinesNegative;
  if (isCredit) {
    return {
      isCredit: true,
      parseError: null,
      candidatePurchase: {
        date: rawInvoice.date,
        supplier: rawInvoice.supplier,
        invoiceNumber: rawInvoice.invoiceNumber || '',
        items: rawInvoice.items.map((it) => ({
          label: it.label,
          rawQty: it.rawQty,
          rawUnit: it.rawUnit,
          total: it.total || 0,
        })),
        total: invoiceTotal,
      },
      isDuplicate: false,
      duplicateOfId: null,
      duplicateReason: null,
      newArticles: [],
      unmatchedItems: [],
    };
  }

  // Match each item against existing articles
  const matchedItems = [];
  const newArticlesByLabel = {}; // dedup by label within this invoice

  for (const item of rawInvoice.items) {
    if (!item.label) continue;

    const matched = findArticleByLabel(item.label, articles);

    if (matched) {
      // Existing article + variant found — findArticleByLabel returns
      // { article, variant } objects directly, not just IDs.
      const article = matched.article;
      const variant = matched.variant;

      // Try to find a packaging matching the rawUnit; if found, use its factor
      let convertedQty = item.rawQty || 0;
      if (variant && item.rawUnit) {
        const pkg = (variant.packagings || []).find((p) =>
          p.unit && normalizeText(p.unit) === normalizeText(item.rawUnit)
        );
        if (pkg) convertedQty = (item.rawQty || 0) * pkg.factor;
      }

      const pricePerMasterUnit = convertedQty > 0 ? (item.total || 0) / convertedQty : 0;

      // Détection d'écart de prix par rapport à l'historique (90 derniers jours)
      let priceAlert = null;
      if (pricePerMasterUnit > 0 && Array.isArray(existingPurchases)) {
        const ninetyDaysAgo = new Date();
        ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);
        const dateFrom = ninetyDaysAgo.toISOString().slice(0, 10);
        const historicalAvg = getAveragePrice(article.id, existingPurchases, dateFrom, null);
        if (historicalAvg && historicalAvg > 0) {
          const deltaPct = ((pricePerMasterUnit - historicalAvg) / historicalAvg) * 100;
          if (Math.abs(deltaPct) >= 30) {
            priceAlert = {
              historicalAvg,
              currentPrice: pricePerMasterUnit,
              deltaPct: Math.round(deltaPct),
              unit: article.unit || 'kg',
            };
          }
        }
      }

      matchedItems.push({
        articleId: article.id,
        variantId: variant.id,
        label: item.label,
        rawQty: item.rawQty,
        rawUnit: item.rawUnit,
        convertedQty,
        pricePerMasterUnit,
        total: item.total || 0,
        priceAlert,
      });
    } else {
      // New article needed — record a creation proposal.
      // We use the label as the default name (user can rename it in the review).
      // We also try to auto-detect a packaging factor + master unit from the
      // label itself (SOFRIMA-style "800G", "5KG", "2K5"…), so common cases
      // import with no manual adjustment needed.
      const proposedName = item.label;
      if (!newArticlesByLabel[proposedName]) {
        // If the rawUnit is already a master unit (K/KG/L/ML/G) OR explicitly
        // declared as "pièce", the rawUnit is the source of truth — skip
        // label-based packaging detection.
        //
        // Why only "pièce" (not "U", "UN", "PCE", "UNITE") triggers the skip:
        //   Supplier "U" / "UN" often means "1 carton" or "1 sachet", and the
        //   carton's contents are described inside the label (e.g. SOFRIMA
        //   "PAVE DORADE 800G" sold with rawUnit=U means 1 sachet of 800g, not
        //   1 fish). Skipping detectedPkg for those would lose the packaging.
        //
        //   In contrast, "pièce" is a deliberate, post-review user declaration
        //   ("this is sold per individual item"), as we use for pre-converted
        //   FLOUP tubes or laitues sold per head. There, the label may still
        //   contain a misleading volume ("20X125ML") that must NOT override
        //   the user's explicit per-piece intent.
        const rawUnitNormalized = (item.rawUnit || '').toUpperCase().trim();
        const isMasterWeightVolume = ['K', 'KG', 'L', 'ML', 'G'].includes(rawUnitNormalized);
        const isExplicitPieceUnit = ['PIECE', 'PIÈCE'].includes(rawUnitNormalized);
        const isAlreadyMasterUnit = isMasterWeightVolume || isExplicitPieceUnit;

        // Two independent signals for "this product is non-food":
        //   1. The label contains a known consumable keyword (per-line signal)
