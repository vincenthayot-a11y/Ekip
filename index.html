function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function exportFullBackup(context) {
  const { articles, recipes, menus, purchases, sales, inventories, energy,
          equipment, equipmentPurchases, equipmentInventories,
          assets, assetMaintenance, assetInterventions, alertSettings } = context;
  const today = new Date().toISOString().slice(0, 10);
  const backup = {
    exportDate: today,
    appVersion: '5',
    articles, recipes, menus, purchases, sales, inventories, energy,
    equipment, equipmentPurchases, equipmentInventories,
    assets, assetMaintenance, assetInterventions, alertSettings,
  };
  downloadJSON(backup, `latambouille-backup-${today}.json`);
  mcToast.success('Sauvegarde téléchargée');
}

function ReportView({ context }) {
  const { purchases, energy, equipment, equipmentPurchases, assetMaintenance,
          assetInterventions, alertsIndex, articles } = context;
  const isMobile = useIsMobile(720);

  const now = new Date();
  const currentMonthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  const firstOfMonth = currentMonthKey + '-01';
  const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
  const [reportFrom, setReportFrom] = useState(firstOfMonth);
  const [reportTo, setReportTo] = useState(today);
  const [articleSearch, setArticleSearch] = useState('');
  const [showVariantSim, setShowVariantSim] = useState(false);
  const [showSuggestions, setShowSuggestions] = useState(false);

  // Previous period (same duration, just before)
  const prevPeriod = useMemo(() => {
    if (!reportFrom || !reportTo) return { from: '', to: '' };
    const from = new Date(reportFrom);
    const to = new Date(reportTo);
    const durationMs = to - from;
    const prevTo = new Date(from - 1);
    const prevFrom = new Date(prevTo - durationMs);
    return {
      from: prevFrom.toISOString().slice(0, 10),
      to: prevTo.toISOString().slice(0, 10),
    };
  }, [reportFrom, reportTo]);

  const monthPurchases = useMemo(() =>
    purchases.filter((p) => {
      const d = p.date || '';
      return (!reportFrom || d >= reportFrom) && (!reportTo || d <= reportTo);
    }),
  [purchases, reportFrom, reportTo]);

  const prevMonthPurchases = useMemo(() =>
    purchases.filter((p) => {
      const d = p.date || '';
      return d >= prevPeriod.from && d <= prevPeriod.to;
    }),
  [purchases, prevPeriod]);

  // Top 5 most purchased articles (by total €)
  const top5Purchased = useMemo(() => {
    const byArticle = {};
    for (const p of monthPurchases) {
      for (const item of (p.items || [])) {
        if (!item.articleId || !item.total) continue;
        byArticle[item.articleId] = (byArticle[item.articleId] || 0) + item.total;
      }
    }
    return Object.entries(byArticle)
      .map(([id, total]) => ({ article: articles.find((a) => a.id === id), total }))
      .filter((e) => e.article)
      .sort((a, b) => b.total - a.total)
      .slice(0, 5);
  }, [monthPurchases, articles]);

  // Top 5 price increases vs previous month
  const top5PriceIncreases = useMemo(() => {
    const avgFor = (ps) => {
      const map = {};
      for (const p of ps) {
        for (const item of (p.items || [])) {
          if (!item.articleId || !(item.pricePerMasterUnit > 0) || !(item.convertedQty > 0)) continue;
          if (!map[item.articleId]) map[item.articleId] = { totalValue: 0, totalQty: 0 };
          map[item.articleId].totalValue += item.pricePerMasterUnit * item.convertedQty;
          map[item.articleId].totalQty += item.convertedQty;
        }
      }
      return Object.fromEntries(
        Object.entries(map).map(([id, v]) => [id, v.totalQty > 0 ? v.totalValue / v.totalQty : 0])
      );
    };
    const curr = avgFor(monthPurchases);
    const prev = avgFor(prevMonthPurchases);
    const increases = [];
    for (const [id, currAvg] of Object.entries(curr)) {
      if (!prev[id] || !(prev[id] > 0)) continue;
      const pct = ((currAvg - prev[id]) / prev[id]) * 100;
      if (pct > 0) {
        const article = articles.find((a) => a.id === id);
        if (article) increases.push({ article, pct, currAvg, prevAvg: prev[id] });
      }
    }
    return increases.sort((a, b) => b.pct - a.pct).slice(0, 5);
  }, [monthPurchases, prevMonthPurchases, articles]);

  // Active alerts
  const activeAlerts = alertsIndex.slice(0, 8);

  // Month label
  const monthLabel = (key) => {
    const [y, m] = key.split('-');
    const months = ['Janvier','Février','Mars','Avril','Mai','Juin',
                    'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    return `${months[parseInt(m, 10) - 1]} ${y}`;
  };

  // All articles stats for the period
  const articleStats = useMemo(() => {
    const map = {};
    for (const p of monthPurchases) {
      for (const item of (p.items || [])) {
        if (!item.articleId || !(item.convertedQty > 0)) continue;
        if (!map[item.articleId]) map[item.articleId] = { totalQty: 0, totalAmount: 0, orderCount: 0 };
        map[item.articleId].totalQty += item.convertedQty;
        map[item.articleId].totalAmount += item.total || 0;
        map[item.articleId].orderCount += 1;
      }
    }
    return Object.entries(map)
      .map(([id, stats]) => ({ article: articles.find((a) => a.id === id), ...stats }))
      .filter((e) => e.article)
      .sort((a, b) => b.totalAmount - a.totalAmount);
  }, [monthPurchases, articles]);

  const filteredArticleStats = useMemo(() => {
    if (!articleSearch.trim()) return articleStats;
    const q = articleSearch.toLowerCase();
    return articleStats.filter((e) => e.article.name.toLowerCase().includes(q));
  }, [articleStats, articleSearch]);

  // Variant simulation: what if everything bought at cheapest variant price?
  const variantSimulation = useMemo(() => {
    const byArticle = {};
    for (const p of monthPurchases) {
      for (const item of (p.items || [])) {
        if (!item.articleId || !(item.convertedQty > 0) || !(item.total > 0)) continue;
        if (!byArticle[item.articleId]) byArticle[item.articleId] = {};
        const varId = item.variantId || '__unknown__';
        if (!byArticle[item.articleId][varId]) byArticle[item.articleId][varId] = { totalQty: 0, totalAmount: 0 };
        byArticle[item.articleId][varId].totalQty += item.convertedQty;
        byArticle[item.articleId][varId].totalAmount += item.total;
      }
    }
    const results = [];
    for (const [artId, varMap] of Object.entries(byArticle)) {
      const art = articles.find((a) => a.id === artId);
      if (!art || (art.variants || []).length < 2) continue;
      const variantEntries = Object.entries(varMap).map(([varId, d]) => {
        const variant = (art.variants || []).find((v) => v.id === varId);
        const avgPrice = d.totalQty > 0 ? d.totalAmount / d.totalQty : 0;
        return { variantId: varId, variantName: variant?.name || 'Variante inconnue', totalQty: d.totalQty, totalAmount: d.totalAmount, avgPrice };
      }).filter((v) => v.avgPrice > 0).sort((a, b) => a.avgPrice - b.avgPrice);
      if (variantEntries.length < 2) continue;
      const totalQtyBought = variantEntries.reduce((s, v) => s + v.totalQty, 0);
      const totalActualSpend = variantEntries.reduce((s, v) => s + v.totalAmount, 0);
      const cheapest = variantEntries[0];
      const hypotheticalSpend = totalQtyBought * cheapest.avgPrice;
      const potentialSavings = totalActualSpend - hypotheticalSpend;
      if (potentialSavings < 0.5) continue;
      results.push({ article: art, variantEntries, totalQtyBought, totalActualSpend, cheapest, hypotheticalSpend, potentialSavings });
    }
    return results.sort((a, b) => b.potentialSavings - a.potentialSavings);
  }, [monthPurchases, articles]);

  // Savings suggestions (rule-based, on-demand)
  const savingsSuggestions = useMemo(() => {
    const suggestions = [];
    const artSupplierMap = {};
    for (const p of monthPurchases) {
      const sup = (p.supplier || '').trim();
      if (!sup) continue;
      for (const item of (p.items || [])) {
        if (!item.articleId || !(item.pricePerMasterUnit > 0) || !(item.convertedQty > 0)) continue;
        if (!artSupplierMap[item.articleId]) artSupplierMap[item.articleId] = {};
        if (!artSupplierMap[item.articleId][sup]) artSupplierMap[item.articleId][sup] = { tv: 0, tq: 0 };
        artSupplierMap[item.articleId][sup].tv += item.pricePerMasterUnit * item.convertedQty;
        artSupplierMap[item.articleId][sup].tq += item.convertedQty;
      }
    }
    for (const [artId, supMap] of Object.entries(artSupplierMap)) {
      const art = articles.find((a) => a.id === artId);
      if (!art) continue;
      const sups = Object.entries(supMap)
        .map(([name, d]) => ({ name, avg: d.tq > 0 ? d.tv / d.tq : 0, qty: d.tq }))
        .filter((s) => s.avg > 0).sort((a, b) => a.avg - b.avg);
      if (sups.length < 2) continue;
      const cheapest = sups[0];
      const dearest = sups[sups.length - 1];
      const gapPct = ((dearest.avg - cheapest.avg) / cheapest.avg) * 100;
      if (gapPct < 15) continue;
      const saving = dearest.qty * (dearest.avg - cheapest.avg);
      if (saving < 1) continue;
      suggestions.push({ type: 'supplier_gap', priority: saving, article: art, cheapest, dearest, gapPct, saving,
        label: 'Écart fournisseur',
        detail: `${art.name} : ${dearest.name} à ${formatEuro(dearest.avg)}/${art.unit} vs ${cheapest.name} à ${formatEuro(cheapest.avg)}/${art.unit} (+${gapPct.toFixed(0)}%)`,
        action: `Privilégier ${cheapest.name} → économie estimée ${formatEuro(saving)} sur la période`,
      });
    }
    const avgFor = (ps) => {
      const map = {};
      for (const p of ps) for (const item of (p.items || [])) {
        if (!item.articleId || !(item.pricePerMasterUnit > 0) || !(item.convertedQty > 0)) continue;
        if (!map[item.articleId]) map[item.articleId] = { tv: 0, tq: 0 };
        map[item.articleId].tv += item.pricePerMasterUnit * item.convertedQty;
        map[item.articleId].tq += item.convertedQty;
      }
      return Object.fromEntries(Object.entries(map).map(([id, v]) => [id, v.tq > 0 ? v.tv / v.tq : 0]));
    };
    const currAvgs = avgFor(monthPurchases);
    const prevAvgs = avgFor(prevMonthPurchases);
    for (const [artId, currAvg] of Object.entries(currAvgs)) {
      const prevAvg = prevAvgs[artId];
      if (!prevAvg || prevAvg <= 0) continue;
      const pct = ((currAvg - prevAvg) / prevAvg) * 100;
      if (pct < 10) continue;
      const art = articles.find((a) => a.id === artId);
      if (!art) continue;
      const artStat = articleStats.find((s) => s.article.id === artId);
      const extraCost = artStat ? artStat.totalQty * (currAvg - prevAvg) : 0;
      if (extraCost < 1) continue;
      suggestions.push({ type: 'price_increase', priority: extraCost, article: art, currAvg, prevAvg, pct, extraCost,
        label: 'Hausse de prix',
        detail: `${art.name} : +${pct.toFixed(0)}% vs période précédente (${formatEuro(prevAvg)} → ${formatEuro(currAvg)}/${art.unit})`,
        action: `Surcoût estimé ${formatEuro(extraCost)} — négocier ou comparer les fournisseurs`,
      });
    }
    return suggestions.sort((a, b) => b.priority - a.priority);
  }, [monthPurchases, prevMonthPurchases, articles, articleStats]);

  const totalMonth = monthPurchases.reduce((s, p) => s + (p.total || 0), 0);
  const totalPrev = prevMonthPurchases.reduce((s, p) => s + (p.total || 0), 0);
  const totalEvol = totalPrev > 0 ? ((totalMonth - totalPrev) / totalPrev) * 100 : null;

  // ─── Coûts d'exploitation complets : énergie + équipement sur la période ──
  const operatingCosts = useMemo(() => {
    const inPeriod = (d) => d && (!reportFrom || d >= reportFrom) && (!reportTo || d <= reportTo);
    const inPrev = (d) => d && d >= prevPeriod.from && d <= prevPeriod.to;

    const sum = (list, dateField, totalFn) => {
      let curr = 0, prev = 0;
      for (const item of (list || [])) {
        const d = item[dateField] || '';
        const v = totalFn(item);
        if (inPeriod(d)) curr += v;
        else if (inPrev(d)) prev += v;
      }
      return { curr, prev };
    };

    const energyCosts = sum(energy, 'date', (e) => e.totalTTC || e.totalHT || 0);
    const equipPurch = sum(equipmentPurchases, 'date', (e) => e.total || 0);
    const interventions = sum(assetInterventions, 'date', (e) => e.cost || 0);

    // Contrats d'entretien : coût annualisé prorata de la durée de la période
    const periodDays = Math.max(1, daysBetween(reportFrom, reportTo) + 1);
    let maintenanceCurr = 0;
    for (const m of (assetMaintenance || [])) {
      const perYear = (CONTRACT_FREQUENCIES.find((f) => f.id === m.frequency)?.perYear || 0);
      const annualCost = (m.cost || 0) * perYear;
      maintenanceCurr += (annualCost / 365) * periodDays;
    }

    const equipmentTotal = equipPurch.curr + interventions.curr + maintenanceCurr;
    const grandTotal = totalMonth + energyCosts.curr + equipmentTotal;

    return {
      energy: energyCosts,
      equipPurchases: equipPurch,
      interventions,
      maintenanceProrata: maintenanceCurr,
      equipmentTotal,
      grandTotal,
    };
  }, [energy, equipmentPurchases, assetInterventions, assetMaintenance, reportFrom, reportTo, prevPeriod, totalMonth]);

  // ─── Répartition par fournisseur (achats de la période) ──────────────────
  const supplierBreakdown = useMemo(() => {
    const map = {};
    for (const p of monthPurchases) {
      const sup = (p.supplier || 'Inconnu').trim() || 'Inconnu';
      map[sup] = (map[sup] || 0) + (p.total || 0);
    }
    return Object.entries(map)
      .map(([name, total]) => ({ name, total }))
      .sort((a, b) => b.total - a.total);
  }, [monthPurchases]);

  // ─── Répartition par catégorie d'article ────────────────────────────────
  const categoryBreakdown = useMemo(() => {
    const map = {};
    for (const p of monthPurchases) {
      for (const item of (p.items || [])) {
        if (!item.articleId || !(item.total > 0)) continue;
        const art = articles.find((a) => a.id === item.articleId);
        const cat = art?.category || 'À trier';
        map[cat] = (map[cat] || 0) + item.total;
      }
    }
    return Object.entries(map)
      .map(([name, total]) => ({ name, total }))
      .sort((a, b) => b.total - a.total);
  }, [monthPurchases, articles]);

  return (
    <div className="mc-print-zone" style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>

      {/* En-tête visible uniquement à l'impression */}
      <div className="mc-print-header" style={{ marginBottom: 8 }}>
        <div style={{ fontFamily: 'Fraunces, serif', fontSize: 26, fontWeight: 700, color: palette.wine }}>
          Le Point de Vue
        </div>
        <div style={{ fontSize: 14, color: palette.inkSoft, marginTop: 2 }}>
          Rapport d'exploitation · du {formatShortDate(reportFrom, { withYear: true })} au {formatShortDate(reportTo, { withYear: true })}
        </div>
        <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 2 }}>
          Édité le {formatShortDate(today, { withYear: true })} · La Tambouille
        </div>
      </div>

      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 12 }}>
        <div>
          <h2 className="mc-display" style={{ fontSize: isMobile ? 20 : 24, fontWeight: 600, margin: 0 }}>Rapport</h2>
          <div style={{ fontSize: 13, color: palette.inkSoft, marginTop: 4 }}>
            Le Point de Vue · du {formatShortDate(reportFrom, { withYear: true })} au {formatShortDate(reportTo, { withYear: true })}
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, flexWrap: 'wrap' }}>
            <span style={{ color: palette.inkSoft }}>Du</span>
            <input
              type="date"
              value={reportFrom}
              onChange={(e) => setReportFrom(e.target.value)}
              style={{ padding: '7px 10px', border: `1px solid ${palette.rule}`, borderRadius: 6, background: palette.cream, fontFamily: 'inherit', fontSize: 13 }}
            />
            <span style={{ color: palette.inkSoft }}>au</span>
            <input
              type="date"
              value={reportTo}
              onChange={(e) => setReportTo(e.target.value)}
              style={{ padding: '7px 10px', border: `1px solid ${palette.rule}`, borderRadius: 6, background: palette.cream, fontFamily: 'inherit', fontSize: 13 }}
            />
            <div style={{ display: 'flex', gap: 4 }}>
              <button className="mc-btn mc-btn-ghost" style={{ fontSize: 11, padding: '4px 8px' }}
                onClick={() => { setReportFrom(currentMonthKey + '-01'); setReportTo(today); }}>
                Ce mois
              </button>
              <button className="mc-btn mc-btn-ghost" style={{ fontSize: 11, padding: '4px 8px' }}
                onClick={() => {
                  const d = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                  setReportFrom(d.toISOString().slice(0, 10));
                  setReportTo(new Date(now.getFullYear(), now.getMonth(), 0).toISOString().slice(0, 10));
                }}>
                Mois préc.
              </button>
              <button className="mc-btn mc-btn-ghost" style={{ fontSize: 11, padding: '4px 8px' }}
                onClick={() => { setReportFrom(now.getFullYear() + '-01-01'); setReportTo(today); }}>

            </div>

            <Download size={14} /> Exporter PDF
          </button>
          <button
            className="mc-btn mc-btn-ghost"

            style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '8px 14px', fontSize: 13, color: palette.sage }}

            <Download size={14} /> Sauvegarde JSON
          </button>
        </div>
      </div>

      {/* Coûts d'exploitation : total + détail par poste */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        <KpiCard
          variant="hero"
          label="Coût d'exploitation total"
          value={formatEuro(operatingCosts.grandTotal)}
          accentColor={palette.wine}
          sub={`Achats ${formatEuro(totalMonth)} · Énergie ${formatEuro(operatingCosts.energy.curr)} · Équipement ${formatEuro(operatingCosts.equipmentTotal)}`}
        />
        <div style={{
          display: 'grid',
          gridTemplateColumns: isMobile ? 'repeat(2, 1fr)' : 'repeat(auto-fit, minmax(170px, 1fr))',
          gap: isMobile ? 10 : 12,

          <div className="mc-card" style={{ padding: isMobile ? 14 : 20 }}>
            <div style={{ fontSize: 11, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Achats</div>
            <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 700, fontSize: isMobile ? 20 : 26, color: palette.ink }}>{formatEuro(totalMonth)}</div>

              <div style={{ fontSize: 12, marginTop: 6, color: totalEvol > 10 ? palette.wine : totalEvol > 0 ? palette.amber : palette.sage, display: 'flex', alignItems: 'center', gap: 4 }}>

              </div>

          <div className="mc-card" style={{ padding: isMobile ? 14 : 20 }}>
            <div style={{ fontSize: 11, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Énergie</div>
            <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 700, fontSize: isMobile ? 20 : 26, color: palette.ink }}>{formatEuro(operatingCosts.energy.curr)}</div>
            {operatingCosts.energy.prev > 0 && (
              <div style={{ fontSize: 12, marginTop: 6, color: palette.inkSoft }}>
                vs {formatEuro(operatingCosts.energy.prev)} préc.
              </div>
            )}
          </div>
          <div className="mc-card" style={{ padding: isMobile ? 14 : 20 }}>
            <div style={{ fontSize: 11, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Équipement</div>
            <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 700, fontSize: isMobile ? 20 : 26, color: palette.ink }}>{formatEuro(operatingCosts.equipmentTotal)}</div>
            <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 6 }}>

            <div style={{ fontSize: 11, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Factures · Alertes</div>
            <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 700, fontSize: isMobile ? 20 : 26, color: palette.ink }}>

            </div>
          </div>
        </div>

      {/* Répartition par fournisseur et par catégorie */}
      {(supplierBreakdown.length > 0 || categoryBreakdown.length > 0) && (
        <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: 16 }}>

                  <div key={name}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 4 }}>

                    <div style={{ height: 6, background: palette.paper, borderRadius: 3, overflow: 'hidden' }}>
                      <div style={{ height: '100%', width: `${pct}%`, background: palette.wine, borderRadius: 3 }} />

          <div className="mc-card" style={{ padding: 20 }}>
            <h3 className="mc-display" style={{ fontSize: 16, fontWeight: 600, margin: '0 0 16px' }}>Répartition par catégorie</h3>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {categoryBreakdown.slice(0, 8).map(({ name, total }) => {
                const pct = totalMonth > 0 ? (total / totalMonth) * 100 : 0;
                return (
                  <div key={name}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 4 }}>
                      <span style={{ color: palette.ink }}>{name}</span>
                      <span style={{ fontFamily: 'Fraunces, serif', fontWeight: 600 }}>
                        {formatEuro(total)} <span style={{ fontWeight: 400, color: palette.inkSoft, fontSize: 11 }}>({pct.toFixed(0)}%)</span>
                      </span>
                    </div>
                    <div style={{ height: 6, background: palette.paper, borderRadius: 3, overflow: 'hidden' }}>
                      <div style={{ height: '100%', width: `${pct}%`, background: palette.sage, borderRadius: 3 }} />
                    </div>
                  </div>
                );
              })}
              {categoryBreakdown.length > 8 && (
                <div style={{ fontSize: 11, color: palette.inkSoft, fontStyle: 'italic' }}>
                  + {categoryBreakdown.length - 8} autres catégories
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* 2 columns */}
      <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: 16 }}>

        {/* Top 5 most purchased */}
        <div className="mc-card" style={{ padding: 20 }}>
          <h3 className="mc-display" style={{ fontSize: 16, fontWeight: 600, margin: '0 0 16px' }}>Top 5 articles achetés</h3>
          {top5Purchased.length === 0 ? (
            <div style={{ fontSize: 13, color: palette.inkSoft, fontStyle: 'italic' }}>Aucun achat ce mois-ci.</div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {top5Purchased.map(({ article, total }, i) => {
                const maxTotal = top5Purchased[0].total;
                return (
                  <div key={article.id}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 4 }}>
                      <span style={{ color: palette.ink, fontWeight: i === 0 ? 600 : 400 }}>{article.name}</span>
                      <span style={{ fontFamily: 'Fraunces, serif', fontWeight: 600 }}>{formatEuro(total)}</span>
                    </div>
                    <div style={{ height: 4, background: palette.rule, borderRadius: 2 }}>
                      <div style={{ height: 4, width: `${(total / maxTotal) * 100}%`, background: palette.wine, borderRadius: 2, transition: 'width 400ms ease' }} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Top 5 price increases */}
        <div className="mc-card" style={{ padding: 20 }}>
          <h3 className="mc-display" style={{ fontSize: 16, fontWeight: 600, margin: '0 0 16px' }}>Top 5 hausses de prix</h3>
          {top5PriceIncreases.length === 0 ? (
            <div style={{ fontSize: 13, color: palette.inkSoft, fontStyle: 'italic' }}>
              Pas de données comparatives{prevMonthPurchases.length === 0 ? ' (aucun achat sur la période précédente)' : ' sur cette période.'}.
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {top5PriceIncreases.map(({ article, pct, currAvg, prevAvg }) => (
                <div key={article.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 13 }}>
                  <div>
                    <div style={{ color: palette.ink }}>{article.name}</div>
                    <div style={{ fontSize: 11, color: palette.inkSoft }}>
                      {formatEuro(prevAvg)}/{article.unit} → {formatEuro(currAvg)}/{article.unit}
                    </div>
                  </div>
                  <span style={{
                    background: pct > 15 ? palette.wine + '20' : palette.amber + '20',
                    color: pct > 15 ? palette.wine : palette.amber,
                    fontWeight: 600, fontSize: 12,
                    padding: '3px 8px', borderRadius: 4,
                  }}>
                    +{pct.toFixed(1)}%
                  </span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Active alerts */}
      {activeAlerts.length > 0 && (
        <div className="mc-card" style={{ padding: 20 }}>
          <h3 className="mc-display" style={{ fontSize: 16, fontWeight: 600, margin: '0 0 16px' }}>Alertes actives</h3>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {activeAlerts.map((alert, i) => {
              const isStock = alert.type === ALERT_TYPES.STOCK_LOW || alert.type === ALERT_TYPES.STOCK_EMPTY;
              const isPrice = alert.type === ALERT_TYPES.PRICE_TREND;
              const isGap = alert.type === ALERT_TYPES.SUPPLIER_PRICE_GAP;
              const color = alert.type === ALERT_TYPES.STOCK_EMPTY ? palette.wine : palette.amber;
              const typeLabel = isStock ? 'Stock' : isPrice ? 'Prix' : isGap ? 'Écart fournisseur' : 'Alerte';
              return (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0', borderBottom: i < activeAlerts.length - 1 ? `1px solid ${palette.rule}` : 'none' }}>
                  <span style={{ background: color + '20', color, fontSize: 11, fontWeight: 600, padding: '2px 8px', borderRadius: 4, minWidth: 80, textAlign: 'center' }}>
                    {typeLabel}
                  </span>
                  <span style={{ fontSize: 13, color: palette.ink, flex: 1 }}>{alert.article?.name || '—'}</span>
                  <span style={{ fontSize: 12, color: palette.inkSoft }}>{alert.article?.category || ''}</span>
                </div>
              );
            })}
            {alertsIndex.length > 8 && (
              <div style={{ fontSize: 12, color: palette.inkSoft, fontStyle: 'italic', paddingTop: 8 }}>
                + {alertsIndex.length - 8} autre(s) alerte(s) dans l'onglet Alertes
              </div>
            )}
          </div>
        </div>
      )}

      {/* Suggestions d'économies — on demand */}
      <div style={{ borderRadius: 8, border: `1px solid ${palette.rule}`, overflow: 'hidden', marginBottom: 16 }}>
        <button
          className="mc-btn mc-btn-ghost"
          onClick={() => setShowSuggestions((s) => !s)}
          style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 18px', fontSize: 13, width: '100%', justifyContent: 'space-between', borderRadius: 0, border: 'none' }}
        >
          <span style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <AlertCircle size={16} style={{ color: palette.amber }} />
            <strong>Suggestions d'économies</strong>
            {(savingsSuggestions.length > 0 || variantSimulation.length > 0) && (
              <span className="mc-pill" style={{ background: palette.amber + '20', color: palette.amber, fontWeight: 600 }}>
                {savingsSuggestions.length + (variantSimulation.length > 0 ? 1 : 0)} suggestion{savingsSuggestions.length + (variantSimulation.length > 0 ? 1 : 0) > 1 ? 's' : ''}
              </span>
            )}
          </span>
          <span style={{ color: palette.inkSoft, fontSize: 12 }}>{showSuggestions ? '▲ Masquer' : '▼ Voir les suggestions'}</span>
        </button>
        {showSuggestions && (
          <div style={{ padding: '0 16px 16px', display: 'flex', flexDirection: 'column', gap: 8 }}>
            {savingsSuggestions.length === 0 && variantSimulation.length === 0 ? (
              <div style={{ padding: '12px 0', fontSize: 13, color: palette.inkSoft, fontStyle: 'italic' }}>
                Aucune suggestion détectée sur cette période.
              </div>
            ) : (
              <>
                {variantSimulation.length > 0 && (
                  <div style={{ padding: '14px 16px', borderRadius: 8, background: palette.sage + '10', border: `1px solid ${palette.sage}30` }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, flexWrap: 'wrap' }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                          <span style={{ fontSize: 13 }}>💰</span>
                          <span style={{ fontSize: 11, fontWeight: 700, color: palette.sage, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Variantes moins chères disponibles</span>
                        </div>
                        <div style={{ fontSize: 13, color: palette.ink, marginBottom: 4 }}>
                          {variantSimulation.length} article{variantSimulation.length > 1 ? 's' : ''} acheté{variantSimulation.length > 1 ? 's' : ''} en plusieurs variantes à des prix différents.
                        </div>
                        <div style={{ fontSize: 12, color: palette.inkSoft, fontStyle: 'italic' }}>→ Voir la simulation par variante ci-dessous pour le détail</div>
                      </div>
                      <div style={{ textAlign: 'right', flexShrink: 0 }}>
                        <div style={{ fontSize: 10, color: palette.inkSoft }}>Impact estimé</div>
                        <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 700, fontSize: 18, color: palette.sage }}>
                          {formatEuro(variantSimulation.reduce((s, r) => s + r.potentialSavings, 0))}
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {savingsSuggestions.map((s, i) => {
                  const cfg = s.type === 'supplier_gap'
                    ? { color: palette.wine, icon: '🔁', bg: palette.wine + '10' }
                    : { color: palette.amber, icon: '📈', bg: palette.amber + '10' };
                  return (
                    <div key={i} style={{ padding: '14px 16px', borderRadius: 8, background: cfg.bg, border: `1px solid ${cfg.color}30` }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, flexWrap: 'wrap' }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                            <span style={{ fontSize: 13 }}>{cfg.icon}</span>
                            <span style={{ fontSize: 11, fontWeight: 700, color: cfg.color, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{s.label}</span>
                          </div>
                          <div style={{ fontSize: 13, color: palette.ink, marginBottom: 4 }}>{s.detail}</div>
                          <div style={{ fontSize: 12, color: palette.inkSoft, fontStyle: 'italic' }}>→ {s.action}</div>
                        </div>
                        <div style={{ textAlign: 'right', flexShrink: 0 }}>
                          <div style={{ fontSize: 10, color: palette.inkSoft }}>Impact estimé</div>
                          <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 700, fontSize: 18, color: cfg.color }}>{formatEuro(s.priority)}</div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </>
            )}
          </div>
        )}
      </div>

      {/* Simulation par variante — on demand */}
      <div style={{ borderRadius: 8, border: `1px solid ${palette.rule}`, overflow: 'hidden', marginBottom: 16 }}>
        <button
          className="mc-btn mc-btn-ghost"
          onClick={() => setShowVariantSim((s) => !s)}
          style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 18px', fontSize: 13, width: '100%', justifyContent: 'space-between', borderRadius: 0, border: 'none' }}
        >
          <span style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <TrendingUp size={16} style={{ color: palette.wine }} />
            <strong>Simulation par variante</strong>
            {variantSimulation.length > 0 && (
              <span className="mc-pill" style={{ background: palette.sage + '20', color: palette.sage, fontWeight: 600 }}>
                {variantSimulation.length} article{variantSimulation.length > 1 ? 's' : ''} · {formatEuro(variantSimulation.reduce((s, r) => s + r.potentialSavings, 0))} d'économie potentielle
              </span>
            )}
          </span>
          <span style={{ color: palette.inkSoft, fontSize: 12 }}>{showVariantSim ? '▲ Masquer' : '▼ Analyser mes variantes'}</span>
        </button>
        {showVariantSim && (
          <div style={{ padding: '0 16px 16px' }}>
            {variantSimulation.length === 0 ? (
              <div style={{ padding: '12px 0', fontSize: 13, color: palette.inkSoft, fontStyle: 'italic' }}>
                Aucun article acheté en plusieurs variantes sur cette période.
              </div>
            ) : (
              <>
                <div style={{ padding: '12px 0 8px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span style={{ fontSize: 12, color: palette.inkSoft }}>Économie totale potentielle sur la période</span>
                  <span style={{ fontFamily: 'Fraunces, serif', fontWeight: 700, fontSize: 20, color: palette.sage }}>
                    {formatEuro(variantSimulation.reduce((s, r) => s + r.potentialSavings, 0))}
                  </span>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {variantSimulation.map(({ article, variantEntries, totalQtyBought, totalActualSpend, cheapest, hypotheticalSpend, potentialSavings }) => (
                    <div key={article.id} style={{ border: `1px solid ${palette.rule}`, borderRadius: 8, overflow: 'hidden' }}>
                      <div style={{ padding: '12px 16px', background: palette.paper, display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 8 }}>
                        <div>
                          <div style={{ fontWeight: 600, fontSize: 14 }}>{article.name}</div>
                          <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 2 }}>
                            {totalQtyBought % 1 === 0 ? totalQtyBought : totalQtyBought.toFixed(2)} {article.unit} achetés · Dépensé réel : <strong>{formatEuro(totalActualSpend)}</strong>
                          </div>
                        </div>
                        <div style={{ textAlign: 'right' }}>
                          <div style={{ fontSize: 11, color: palette.inkSoft }}>Économie potentielle</div>
                          <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 700, fontSize: 20, color: palette.sage }}>{formatEuro(potentialSavings)}</div>
                          <div style={{ fontSize: 11, color: palette.inkSoft }}>Si tout acheté chez <em>{cheapest.variantName}</em></div>
                        </div>
                      </div>
                      <div style={{ padding: '8px 0' }}>
                        {variantEntries.map((v, idx) => {
                          const isCheapest = idx === 0;
                          const pctAbove = cheapest.avgPrice > 0 ? ((v.avgPrice - cheapest.avgPrice) / cheapest.avgPrice) * 100 : 0;
                          const overspend = v.totalAmount - (v.totalQty * cheapest.avgPrice);
                          return (
                            <div key={v.variantId} style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr 1fr', gap: 8, padding: '8px 16px', borderBottom: idx < variantEntries.length - 1 ? `1px solid ${palette.rule}` : 'none', alignItems: 'center', fontSize: 13 }}>
                              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                <span style={{ color: isCheapest ? palette.sage : palette.wine, fontSize: 14 }}>{isCheapest ? '↓' : '↑'}</span>
                                <div>
                                  <div style={{ fontWeight: isCheapest ? 600 : 400 }}>{v.variantName}</div>
                                  {isCheapest && <div style={{ fontSize: 10, color: palette.sage, fontWeight: 600 }}>Moins chère</div>}
                                </div>
                              </div>
                              <div style={{ textAlign: 'right', color: palette.inkSoft, fontSize: 12 }}>{v.totalQty % 1 === 0 ? v.totalQty : v.totalQty.toFixed(2)} {article.unit}</div>
                              <div style={{ textAlign: 'right', fontFamily: 'Fraunces, serif', fontWeight: 600, color: isCheapest ? palette.sage : palette.ink }}>{formatEuro(v.avgPrice)}/{article.unit}</div>
                              <div style={{ textAlign: 'right', fontFamily: 'Fraunces, serif' }}>{formatEuro(v.totalAmount)}</div>
                              <div style={{ textAlign: 'right' }}>
                                {!isCheapest
                                  ? <span style={{ background: palette.wine + '15', color: palette.wine, fontSize: 11, fontWeight: 600, padding: '2px 8px', borderRadius: 4 }}>+{formatEuro(overspend)} (+{pctAbove.toFixed(0)}%)</span>
                                  : <span style={{ fontSize: 11, color: palette.sage }}>référence</span>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      <div style={{ padding: '10px 16px', background: palette.sage + '08', borderTop: `1px solid ${palette.sage}30`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 12 }}>
                        <span style={{ color: palette.inkSoft }}>Si tout acheté à <strong>{formatEuro(cheapest.avgPrice)}/{article.unit}</strong> ({cheapest.variantName}) :</span>
                        <span style={{ fontFamily: 'Fraunces, serif', fontWeight: 600 }}>
                          {formatEuro(hypotheticalSpend)} <span style={{ color: palette.sage, marginLeft: 8 }}>(−{formatEuro(potentialSavings)})</span>
                        </span>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        )}
      </div>

      {/* Articles detail table */}
      <div className="mc-card" style={{ padding: 20 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, flexWrap: 'wrap', gap: 12 }}>
          <h3 className="mc-display" style={{ fontSize: 16, fontWeight: 600, margin: 0 }}>
            Achats par article — {reportFrom} → {reportTo}
          </h3>
          <div style={{ position: 'relative', minWidth: 240 }}>
            <Search size={14} style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: palette.inkSoft }} />
            <input
              type="text"
              value={articleSearch}
              onChange={(e) => setArticleSearch(e.target.value)}
              placeholder="Rechercher un article…"
              style={{
                paddingLeft: 32, paddingRight: 12, paddingTop: 8, paddingBottom: 8,
                border: `1px solid ${palette.rule}`, borderRadius: 6,
                background: palette.cream, fontFamily: 'inherit', fontSize: 13,
                width: '100%',
              }}
            />
          </div>
        </div>

        {filteredArticleStats.length === 0 ? (
          <div style={{ fontSize: 13, color: palette.inkSoft, fontStyle: 'italic', padding: '12px 0' }}>
            {articleSearch ? 'Aucun article ne correspond à cette recherche.' : 'Aucun achat sur cette période.'}
          </div>
        ) : (
          <>
            <div style={{
              display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr',
              padding: '8px 0', fontSize: 11, fontWeight: 600, color: palette.inkSoft,
              textTransform: 'uppercase', letterSpacing: '0.05em',
              borderBottom: `1px solid ${palette.rule}`, marginBottom: 4,
            }}>
              <div>Article</div>
              <div style={{ textAlign: 'right' }}>Qté achetée</div>
              <div style={{ textAlign: 'right' }}>Montant HT</div>
              <div style={{ textAlign: 'right' }}>Commandes</div>
            </div>
            <div style={{ maxHeight: 400, overflowY: 'auto' }}>
              {filteredArticleStats.map(({ article, totalQty, totalAmount, orderCount }) => (
                <div key={article.id} style={{
                  display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr',
                  padding: '10px 0', borderBottom: `1px solid ${palette.rule}`,
                  fontSize: 13, alignItems: 'center',
                }}>
                  <div>
                    <div style={{ fontWeight: 500, color: palette.ink }}>{article.name}</div>
                    <div style={{ fontSize: 11, color: palette.inkSoft }}>{article.category}</div>
                  </div>
                  <div style={{ textAlign: 'right', fontFamily: 'Fraunces, serif', fontWeight: 600 }}>
                    {totalQty % 1 === 0 ? totalQty : totalQty.toFixed(2)} {article.unit}
                  </div>
                  <div style={{ textAlign: 'right', fontFamily: 'Fraunces, serif', fontWeight: 600 }}>
                    {formatEuro(totalAmount)}
                  </div>
                  <div style={{ textAlign: 'right', color: palette.inkSoft }}>
                    {orderCount} facture{orderCount > 1 ? 's' : ''}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ fontSize: 12, color: palette.inkSoft, marginTop: 10, textAlign: 'right' }}>
              {filteredArticleStats.length} article{filteredArticleStats.length > 1 ? 's' : ''} ·
              Total : {formatEuro(filteredArticleStats.reduce((s, e) => s + e.totalAmount, 0))}
            </div>
          </>
        )}
      </div>


    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   ENERGY VIEW — factures électricité / gaz / eau avec KPIs et historique
// ═══════════════════════════════════════════════════════════════════════════
//
// Constantes associées (GAS_KG_TO_KWH, ENERGY_TYPES) déclarées plus haut
// dans la section « ENERGY — constantes & data model », car elles sont
// aussi consommées par DashboardView et ImportClaudeInvoiceRow.

function EnergyView({ context }) {
  const { energy, setEnergy } = context;
  const isMobile = useIsMobile(720);

  const [editingInvoice, setEditingInvoice] = useState(null);
  const [typeFilter, setTypeFilter] = useState('all');
  // Fenêtre temporelle DU GRAPHIQUE uniquement. Les KPIs restent à 12 mois
  // roulants pour rester comparables d'une visite à l'autre.
  //   '12' / '24' / '36' = nombre de mois ; 'all' = depuis la 1ère facture
  const [chartPeriod, setChartPeriod] = useState('12');

  // ─── Filtering ──────────────────────────────────────────────────────────
  const filteredInvoices = useMemo(() => {
    const list = (energy || []).filter((inv) => {
      if (typeFilter === 'all') return true;
      return inv.energyType === typeFilter;
    });
    return list.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  }, [energy, typeFilter]);

  // ─── Compteur de factures par type (pour les badges du filtre) ─────────
  const countByType = useMemo(() => {
    const c = { all: (energy || []).length, electricity: 0, gas: 0, water: 0 };
    for (const inv of (energy || [])) {
      if (c[inv.energyType] !== undefined) c[inv.energyType]++;
    }
    return c;
  }, [energy]);

  // ─── KPIs avec comparaison N vs N-1 ─────────────────────────────────────
  // On calcule en plus du mois en cours + 12 derniers mois :
  //   • le même mois N-1 (pour comparer "mai 2026 vs mai 2025")
  //   • les 12 mois précédents (24m→12m ago, pour comparer 12m vs 12m)
  const stats = useMemo(() => {
    const now = new Date();
    const currentMonthKey = now.toISOString().slice(0, 7); // 'YYYY-MM'
    const lastYearSameMonthKey = `${now.getFullYear() - 1}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    const twelveMonthsAgo = new Date(now.getFullYear() - 1, now.getMonth(), 1);
    const twelveMonthsAgoStr = twelveMonthsAgo.toISOString().slice(0, 10);
    const twentyFourMonthsAgo = new Date(now.getFullYear() - 2, now.getMonth(), 1);
    const twentyFourMonthsAgoStr = twentyFourMonthsAgo.toISOString().slice(0, 10);

    const acc = {
      monthCostTotal: 0,
      lastYearSameMonthCost: 0,
      yearCostTotal: 0,
      prevYearCostTotal: 0, // période 24m→12m
      monthConsumption: { electricity: 0, gas: 0, water: 0 },
      yearConsumption: { electricity: 0, gas: 0, water: 0 },
      yearCostByType: { electricity: 0, gas: 0, water: 0 },
    };

    for (const inv of (energy || [])) {
      const monthKey = (inv.date || '').slice(0, 7);
      const total = inv.totalTTC || inv.totalHT || 0;
      const cons = inv.consumption || 0;
      const type = inv.energyType || 'electricity';
      // Convert gas consumption from kg to kWh using PCI butane (12.78 kWh/kg).
      // Electricity is already in kWh; water stays in m³ (tracked separately).
      const consKwh = type === 'gas' ? cons * GAS_KG_TO_KWH : cons;

      if (monthKey === currentMonthKey) {
        acc.monthCostTotal += total;
        if (acc.monthConsumption[type] !== undefined) acc.monthConsumption[type] += consKwh;
      }
      if (monthKey === lastYearSameMonthKey) {
        acc.lastYearSameMonthCost += total;
      }
      const date = inv.date || '';
      if (date >= twelveMonthsAgoStr) {
        acc.yearCostTotal += total;
        if (acc.yearConsumption[type] !== undefined) acc.yearConsumption[type] += consKwh;
        if (acc.yearCostByType[type] !== undefined) acc.yearCostByType[type] += total;
      } else if (date >= twentyFourMonthsAgoStr) {
        acc.prevYearCostTotal += total;
      }
    }

    // Prix moyen €/kWh (électricité + gaz combinés, gaz déjà converti en kWh)
    const totalKwh12m = acc.yearConsumption.electricity + acc.yearConsumption.gas;
    const totalEnergyCost12m = acc.yearCostByType.electricity + acc.yearCostByType.gas;
    acc.avgUnitPriceKwh = totalKwh12m > 0 ? totalEnergyCost12m / totalKwh12m : 0;

    // Deltas N vs N-1
    acc.monthDeltaPct = acc.lastYearSameMonthCost > 0
      ? ((acc.monthCostTotal - acc.lastYearSameMonthCost) / acc.lastYearSameMonthCost) * 100
      : null;
    acc.yearDeltaPct = acc.prevYearCostTotal > 0
      ? ((acc.yearCostTotal - acc.prevYearCostTotal) / acc.prevYearCostTotal) * 100
      : null;

    return acc;
  }, [energy]);

  // ─── Répartition par type pour le donut (12 derniers mois) ──────────────
  const typeBreakdown = useMemo(() => {
    const data = [
      { name: 'Électricité', value: stats.yearCostByType.electricity, color: ENERGY_TYPES.electricity.color },
      { name: 'Gaz',         value: stats.yearCostByType.gas,         color: ENERGY_TYPES.gas.color },
      { name: 'Eau',         value: stats.yearCostByType.water,       color: ENERGY_TYPES.water.color },
    ].filter((d) => d.value > 0);
    const total = data.reduce((s, d) => s + d.value, 0);
    return { data, total };
  }, [stats]);

  // ─── Détection d'anomalie sur les factures ─────────────────────────────
  // Pour chaque type d'énergie sur les 12 derniers mois, on calcule le coût
  // moyen par jour. Une facture dont le coût/jour dépasse de +30% la moyenne
  // de son type est flaggée comme anomalie (badge visible dans la table).
  // Si pas de période sur la facture, on suppose 30 jours par défaut.
  const anomalies = useMemo(() => {
    const now = new Date();
    const twelveMonthsAgoStr = new Date(now.getFullYear() - 1, now.getMonth(), 1).toISOString().slice(0, 10);

    // Build the avg cost/day per type from the last 12 months
    const cpdByType = { electricity: [], gas: [], water: [] };
    for (const inv of (energy || [])) {
      if ((inv.date || '') < twelveMonthsAgoStr) continue;
      const type = inv.energyType || 'electricity';
      const total = inv.totalTTC || inv.totalHT || 0;
      if (total <= 0 || !cpdByType[type]) continue;
      let days = 30;
      if (inv.periodStart && inv.periodEnd) {
        const d = daysBetween(inv.periodStart, inv.periodEnd);
        if (d > 0) days = d;
      }
      cpdByType[type].push(total / days);
    }

    const avgByType = {};
    for (const [type, items] of Object.entries(cpdByType)) {
      if (items.length < 3) continue; // avoid noise on small samples
      avgByType[type] = items.reduce((s, x) => s + x, 0) / items.length;
    }

    // For each invoice, check if it's anomalously expensive vs its type avg
    const flagged = {};
    for (const inv of (energy || [])) {
      const type = inv.energyType || 'electricity';
      const total = inv.totalTTC || inv.totalHT || 0;
      if (total <= 0 || !avgByType[type]) continue;
      let days = 30;
      if (inv.periodStart && inv.periodEnd) {
        const d = daysBetween(inv.periodStart, inv.periodEnd);
        if (d > 0) days = d;
      }
      const cpd = total / days;
      const pct = ((cpd - avgByType[type]) / avgByType[type]) * 100;
      if (pct > 30) {
        flagged[inv.id] = { pct: Math.round(pct), cpd, avg: avgByType[type] };
      }
    }
    return flagged;
  }, [energy]);

  // ─── Monthly evolution chart data ───────────────────────────────────────
  // La fenêtre dépend de `chartPeriod` choisi par l'utilisateur :
  //   '12' / '24' / '36' = N derniers mois
  //   'all' = depuis le 1er mois ayant une facture (capé à 60 mois pour éviter
  //           un axe X illisible si l'historique est très long)
  const monthlyData = useMemo(() => {
    const now = new Date();
    const currentKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

    // Détermine le nombre de mois à afficher
    let numMonths;
    if (chartPeriod === 'all') {
      // Trouve le mois le plus ancien dans (energy), en respectant le filtre type
      const earliest = (energy || [])
        .filter((inv) => typeFilter === 'all' || inv.energyType === typeFilter)
        .map((inv) => (inv.date || '').slice(0, 7))
        .filter(Boolean)
        .sort()[0];
      if (!earliest) {
        numMonths = 12; // fallback : pas de facture, on garde 12 mois vides
      } else {
        const [y, m] = earliest.split('-').map(Number);
        const diff = (now.getFullYear() - y) * 12 + (now.getMonth() + 1 - m) + 1;
        numMonths = Math.min(Math.max(diff, 1), 60); // cap dur à 60
      }
    } else {
      numMonths = parseInt(chartPeriod, 10) || 12;
    }

    // Construit la liste des mois (du plus ancien au plus récent)
    const months = [];
    for (let i = numMonths - 1; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      // Sur une longue fenêtre, l'année est utile pour distinguer les mois
      const showYear = numMonths > 12;
      const label = d.toLocaleDateString('fr-FR', {
        month: 'short',
        ...(showYear ? { year: '2-digit' } : {}),
      });
      months.push({ key, label, cost: 0, consumption: 0 });
    }
    const byKey = Object.fromEntries(months.map((m) => [m.key, m]));

    for (const inv of (energy || [])) {
      if (typeFilter !== 'all' && inv.energyType !== typeFilter) continue;
      const cons = inv.consumption || 0;
      const consKwh = inv.energyType === 'gas' ? cons * GAS_KG_TO_KWH : cons;
      const cost = inv.totalTTC || inv.totalHT || 0;

      if (inv.periodStart && inv.periodEnd) {
        // Distribute cost and consumption pro-rata across all months covered by the period
        const pStart = parseLocalDate(inv.periodStart);
        const pEnd = parseLocalDate(inv.periodEnd);
        const totalDays = Math.max((pEnd - pStart) / 86400000, 1);
        let cur = new Date(pStart.getFullYear(), pStart.getMonth(), 1);
        while (cur <= pEnd) {
          const key = `${cur.getFullYear()}-${String(cur.getMonth() + 1).padStart(2, '0')}`;
          if (byKey[key]) {
            const mStart = new Date(Math.max(cur.getTime(), pStart.getTime()));
            const nextM = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
            const mEnd = new Date(Math.min(nextM.getTime() - 86400000, pEnd.getTime()));
            const ratio = ((mEnd - mStart) / 86400000 + 1) / totalDays;
            byKey[key].cost += cost * ratio;
            byKey[key].consumption += consKwh * ratio;
          }
          cur = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
        }
      } else {
        // Fallback: assign to invoice date month
        const key = (inv.date || '').slice(0, 7);
        if (byKey[key]) {
          byKey[key].cost += cost;
          byKey[key].consumption += consKwh;
        }
      }
    }
    return months;
  }, [energy, typeFilter, chartPeriod]);

  // ─── Handlers ───────────────────────────────────────────────────────────
  const handleSave = (data) => {
    if (data.id) {
      setEnergy(energy.map((e) => (e.id === data.id ? data : e)));
    } else {
      setEnergy([...energy, { ...data, id: generateId('e') }]);
    }
    setEditingInvoice(null);
    mcToast.success(data.id ? 'Facture énergie modifiée' : `Facture énergie enregistrée : ${data.supplier || ''}`);
  };

  const handleDelete = (id) => {
    const _enInv = energy.find((e) => e.id === id); if (!_enInv) return;
    const _snapEn = energy; setEnergy(energy.filter((e) => e.id !== id));
    mcToast.undo(`Facture énergie supprimée : ${_enInv.supplier || ''}`, () => { setEnergy(_snapEn); mcToast.success('Restaurée'); });
  };

  return (
    <div>
      {/* Header */}
      <div style={{
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: isMobile ? 'flex-start' : 'center',
        gap: 12,
        marginBottom: 24,
        flexDirection: isMobile ? 'column' : 'row',
      }}>
        <div>
          <h2 className="mc-display" style={{ fontSize: isMobile ? 20 : 24, fontWeight: 600, margin: 0 }}>
            Énergie
          </h2>
          <p style={{ margin: '4px 0 0', fontSize: 13, color: palette.inkSoft }}>
            Suivi des factures électricité, gaz et eau · coût + consommation
          </p>
        </div>
        <button
          className="mc-btn mc-btn-primary"
          onClick={() => setEditingInvoice({})}
        >
          <Plus size={16} /> Nouvelle facture
        </button>
      </div>

      {/* KPIs hiérarchisés : 1 hero (coût annuel + delta vs N-1) + 3 secondaires */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: isMobile ? 12 : 16, marginBottom: 24 }}>
        <KpiCard
          variant="hero"
          label="Coût énergie · 12 derniers mois"
          value={formatEuro(stats.yearCostTotal)}
          accentColor={palette.amber}
          sub={
            stats.yearDeltaPct !== null
              ? `${stats.yearDeltaPct > 0 ? '↑ +' : stats.yearDeltaPct < 0 ? '↓ ' : '→ '}${stats.yearDeltaPct.toFixed(0)}% vs 12 mois précédents (${formatEuro(stats.prevYearCostTotal)})`
              : "Pas encore 24 mois d'historique pour comparer"
          }
        />

        <div style={{
          display: 'grid',
          gridTemplateColumns: isMobile ? 'repeat(2, 1fr)' : 'repeat(auto-fit, minmax(180px, 1fr))',
          gap: isMobile ? 10 : 16,
        }}>
          <KpiCard
            label="Coût mois en cours"
            value={formatEuro(stats.monthCostTotal)}
            sub={
              stats.monthDeltaPct !== null
                ? `${stats.monthDeltaPct > 0 ? '↑ +' : stats.monthDeltaPct < 0 ? '↓ ' : '→ '}${stats.monthDeltaPct.toFixed(0)}% vs même mois N-1`
                : "Pas de comparable l'an dernier"
            }
          />
          <KpiCard
            label="Conso. 12 mois"
            value={(stats.yearConsumption.electricity + stats.yearConsumption.gas).toFixed(0) + ' kWh'}
            sub={`${stats.yearConsumption.water.toFixed(0)} m³ d'eau · gaz converti PCI`}
          />
          <KpiCard
            label="Prix moyen kWh"
            value={stats.avgUnitPriceKwh > 0 ? stats.avgUnitPriceKwh.toFixed(4) + ' €' : '—'}
            sub="Élec + gaz (PCI 12.78 kWh/kg)"
          />
        </div>
      </div>

      {/* Filtre par type — SegmentedToggle avec compteurs */}
      <div style={{ marginBottom: 16 }}>
        <SegmentedToggle
          value={typeFilter}
          onChange={setTypeFilter}
          options={[
            { id: 'all',         label: `Toutes (${countByType.all})` },
            { id: 'electricity', label: `Élec.${countByType.electricity ? ' (' + countByType.electricity + ')' : ''}` },
            { id: 'gas',         label: `Gaz${countByType.gas ? ' (' + countByType.gas + ')' : ''}` },
            { id: 'water',       label: `Eau${countByType.water ? ' (' + countByType.water + ')' : ''}` },
          ]}
        />
      </div>

      {/* Ligne de graphiques : évolution mensuelle + donut de répartition */}
      {(energy || []).length > 0 && (
        <div style={{
          display: 'grid',
          gridTemplateColumns: isMobile ? '1fr' : '2fr 1fr',
          gap: 16,
          marginBottom: 24,
        }}>
          {/* Évolution mensuelle */}
          <div className="mc-card" style={{ padding: isMobile ? 14 : 20 }}>
            <div style={{
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: isMobile ? 'flex-start' : 'center',
              gap: 12,
              marginBottom: 16,
              flexDirection: isMobile ? 'column' : 'row',
            }}>
              <h3 className="mc-display" style={{ fontSize: 14, fontWeight: 600, margin: 0 }}>
                Évolution — {typeFilter === 'all' ? 'toutes énergies' : ENERGY_TYPES[typeFilter]?.label}
              </h3>
              <SegmentedToggle
                size="sm"
                value={chartPeriod}
                onChange={setChartPeriod}
                options={[
                  { id: '12',  label: '12 m' },
                  { id: '24',  label: '24 m' },
                  { id: '36',  label: '36 m' },
                  { id: 'all', label: 'Tout' },
                ]}
              />
            </div>
            <ResponsiveContainer width="100%" height={isMobile ? 220 : 280}>
              <ComposedChart data={monthlyData} margin={{ top: 10, right: 30, left: 10, bottom: 0 }}>
                <CartesianGrid strokeDasharray="3 3" stroke={palette.rule} />
                <XAxis dataKey="label" tick={{ fontSize: 11, fill: palette.inkSoft }} />
                <YAxis yAxisId="left" tick={{ fontSize: 11, fill: palette.inkSoft }} label={{ value: '€', angle: -90, position: 'insideLeft', fill: palette.inkSoft, fontSize: 11 }} />
                <YAxis yAxisId="right" orientation="right" tick={{ fontSize: 11, fill: palette.inkSoft }} label={{ value: typeFilter === 'water' ? 'm³' : typeFilter === 'gas' ? 'kg' : typeFilter === 'electricity' ? 'kWh' : 'kWh / m³', angle: 90, position: 'insideRight', fill: palette.inkSoft, fontSize: 11 }} />
                <Tooltip
                  formatter={(value, name) => {
                    if (name === 'Coût') return [formatEuro(value), name];
                    return [value.toFixed(0), name];
                  }}
                />
                <Legend />
                <Bar yAxisId="left" dataKey="cost" fill={palette.wine} name="Coût" />
                <Line yAxisId="right" type="monotone" dataKey="consumption" stroke={palette.sage} strokeWidth={2} name="Consommation" dot={{ r: 3 }} />
              </ComposedChart>
            </ResponsiveContainer>
          </div>

          {/* Donut de répartition par type */}
          <div className="mc-card" style={{ padding: isMobile ? 14 : 20 }}>
            <h3 className="mc-display" style={{ fontSize: 14, fontWeight: 600, margin: '0 0 16px' }}>
              Répartition 12 mois
            </h3>
            {typeBreakdown.data.length > 0 ? (
              <>
                <ResponsiveContainer width="100%" height={isMobile ? 200 : 220}>
                  <PieChart>
                    <Pie
                      data={typeBreakdown.data}
                      dataKey="value"
                      nameKey="name"
                      cx="50%"
                      cy="50%"
                      innerRadius={isMobile ? 40 : 50}
                      outerRadius={isMobile ? 70 : 85}
                      paddingAngle={2}
                      stroke="none"
                    >
                      {typeBreakdown.data.map((d) => (
                        <Cell key={d.name} fill={d.color} />
                      ))}
                    </Pie>
                    <Tooltip formatter={(value) => formatEuro(value)} />
                  </PieChart>
                </ResponsiveContainer>
                <div style={{ marginTop: 8, display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {typeBreakdown.data.map((d) => {
                    const pct = typeBreakdown.total > 0 ? (d.value / typeBreakdown.total) * 100 : 0;
                    return (
                      <div key={d.name} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 12 }}>
                        <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                          <span style={{ width: 10, height: 10, background: d.color, borderRadius: 2 }} />
                          {d.name}
                        </span>
                        <span style={{ color: palette.inkSoft, fontFamily: 'Fraunces, serif' }}>
                          {pct.toFixed(0)}% · {formatEuro(d.value)}
                        </span>
                      </div>

                  })}
                </div>
              </>
            ) : (
              <div style={{ padding: 24, textAlign: 'center', color: palette.inkSoft, fontSize: 13 }}>
                Aucune dépense énergie cette année.
              </div>

          </div>
        </div>

      <div className="mc-card" style={{ overflow: 'hidden' }}>

          (energy || []).length === 0 ? (

            />
          ) : (
            <EmptyState
              title="Aucune facture ne correspond au filtre"
              description="Essayez un autre type d'énergie."
            />

        ) : (
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: 720 }}>
              <thead>
                <tr>
                  <th className="mc-th">Date</th>
                  <th className="mc-th">Fournisseur</th>
                  <th className="mc-th">Type</th>
                  <th className="mc-th">N° facture</th>
                  <th className="mc-th">Période</th>
                  <th className="mc-th" style={{ textAlign: 'right' }}>Consommation</th>
                  <th className="mc-th" style={{ textAlign: 'right' }}>Total HT</th>
                  <th className="mc-th" style={{ textAlign: 'right' }}>Total TTC</th>
                  <th className="mc-th"></th>
                </tr>
              </thead>
              <tbody>
                {filteredInvoices.map((inv) => {
                  const typeInfo = ENERGY_TYPES[inv.energyType] || ENERGY_TYPES.electricity;
                  const anomaly = anomalies[inv.id];
                  return (
                    <tr key={inv.id} className="mc-row">
                      <td className="mc-td" style={{ fontFamily: 'Fraunces, serif' }}>
                        {formatShortDate(inv.date, { withYear: true })}
                      </td>
                      <td className="mc-td" style={{ fontWeight: 500 }}>{inv.supplier}</td>
                      <td className="mc-td">
                        <span className="mc-pill" style={{ background: typeInfo.color + '20', color: typeInfo.color }}>
                          {typeInfo.label}
                        </span>
                      </td>
                      <td className="mc-td" style={{ fontSize: 12, color: palette.inkSoft }}>{inv.invoiceNumber || '—'}</td>
                      <td className="mc-td" style={{ fontSize: 12, color: palette.inkSoft }}>
                        {inv.periodStart && inv.periodEnd
                          ? `${formatShortDate(inv.periodStart, { withYear: true })} → ${formatShortDate(inv.periodEnd, { withYear: true })}`
                          : '—'}
                      </td>
                      <td className="mc-td" style={{ textAlign: 'right', fontFamily: 'Fraunces, serif' }}>
                        {inv.consumption
                          ? inv.energyType === 'gas'
                            ? `${inv.consumption.toFixed(0)} kg (${(inv.consumption * GAS_KG_TO_KWH).toFixed(0)} kWh)`
                            : inv.consumption.toFixed(0) + ' ' + typeInfo.unit
                          : '—'}
                      </td>
                      <td className="mc-td" style={{ textAlign: 'right', fontFamily: 'Fraunces, serif' }}>
                        {inv.totalHT ? formatEuro(inv.totalHT) : '—'}
                      </td>
                      <td className="mc-td" style={{ textAlign: 'right', fontFamily: 'Fraunces, serif', fontWeight: 600 }}>
                        <div style={{ display: 'flex', justifyContent: 'flex-end', alignItems: 'center', gap: 8 }}>
                          {anomaly && (
                            <span
                              className="mc-pill"
                              title={`Coût/jour : ${anomaly.cpd.toFixed(2)}€ · moyenne du type : ${anomaly.avg.toFixed(2)}€/j`}
                              style={{
                                background: palette.attention + '20',
                                color: palette.attention,
                                fontWeight: 600,
                                fontSize: 10,
                                fontFamily: 'DM Sans, sans-serif',
                              }}
                            >
                              ⚠ +{anomaly.pct}%
                            </span>
                          )}
                          {inv.totalTTC ? formatEuro(inv.totalTTC) : '—'}
                        </div>
                      </td>
                      <td className="mc-td" style={{ textAlign: 'right' }}>
                        <button
                          onClick={() => setEditingInvoice(inv)}
                          style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: 4, marginRight: 4 }}
                          title="Modifier"
                          aria-label="Modifier"
                        >
                          <Edit3 size={14} color={palette.inkSoft} />
                        </button>
                        <button
                          onClick={() => handleDelete(inv.id)}
                          style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: 4 }}
                          title="Supprimer"
                          aria-label="Supprimer"
                        >
                          <Trash2 size={14} color={palette.wine} />
                        </button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {editingInvoice !== null && (
        <EnergyInvoiceModal
          initial={editingInvoice}
          onSave={handleSave}
          onClose={() => setEditingInvoice(null)}
        />
      )}
    </div>
  );
}

// ─── Modal: create or edit an energy invoice ─────────────────────────────
function EnergyInvoiceModal({ initial, onSave, onClose }) {
  const [form, setForm] = useState({
    id: initial.id,
    date: initial.date || new Date().toISOString().slice(0, 10),
    supplier: initial.supplier || '',
    invoiceNumber: initial.invoiceNumber || '',
    energyType: initial.energyType || 'electricity',
    periodStart: initial.periodStart || '',
    periodEnd: initial.periodEnd || '',
    consumption: initial.consumption || '',
    totalHT: initial.totalHT || '',
    totalTTC: initial.totalTTC || '',
    notes: initial.notes || '',
  });

  const typeInfo = ENERGY_TYPES[form.energyType];

  const handleSubmit = () => {
    if (!form.supplier.trim()) {
      mcToast.error('Le fournisseur est obligatoire.');
      return;
    }
    if (!form.date) {
      mcToast.error('La date est obligatoire.');
      return;

    const cleaned = {
      ...form,
      consumption: parseFloat(form.consumption) || 0,
      totalHT: parseFloat(form.totalHT) || 0,
      totalTTC: parseFloat(form.totalTTC) || 0,

    onSave(cleaned);

            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>

                <button

                  style={{

          <div>

            <input

          </div>
          <div>
            <label className="mc-label">Fournisseur *</label>
            <input

          <div style={{ gridColumn: '1 / -1' }}>

            <label className="mc-label">&nbsp;</label>

              {form.energyType === 'gas' && form.consumption

        {/* Footer */}

          marginTop: 24, paddingTop: 16, borderTop: `1px solid ${palette.rule}`,
        }}>
          <button className="mc-btn mc-btn-ghost" onClick={onClose}>Annuler</button>
          <button className="mc-btn mc-btn-primary" onClick={handleSubmit}>
            <Save size={16} /> Enregistrer

        </div>

  );
