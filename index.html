        //   2. The supplier is a known non-food supplier (whole-invoice signal)
        // EITHER triggers the consumable suggestion.
        const detectedConsumable = detectConsumableFromLabel(item.label);
        const supplierIsNonFood = isNonFoodSupplier(rawInvoice.supplier);
        const looksLikeConsumable = !!(detectedConsumable || supplierIsNonFood);

        // Detect packaging from the label (e.g. "5L", "800G") — FOR FOOD ONLY.
        // For consumables, we drop label-based detection entirely: numbers in
        // a consumable label are almost always technical specs (10G/M2 = paper
        // weight, 25MY = thickness, 130L = bin bag capacity, 250G = barquette
        // capacity), NOT a quantity being sold. We rely on the rawUnit pack
        // parser (Bte*100, PK*40, CT*250, etc.) instead.
        const detectedPkg = (isAlreadyMasterUnit || looksLikeConsumable)
          ? null
          : detectPackagingFromLabel(item.label);

        // Try to parse the MHE-style rawUnit (e.g. "Bte*100", "PK*40", "CT*250").
        // For consumables, this is the right packaging signal: 1 Bte*100 = 100 pieces.
        let packParsed = looksLikeConsumable ? parsePackUnit(item.rawUnit) : null;

        // Special case: count-based pack (e.g. "Carton x3") where the LABEL
        // also contains a per-unit volume in NxML format (e.g. "DIVERMITE 3X2L").
        // Combine them: total volume = pack_count × per-unit_volume.
        //
        // IMPORTANT: we require the explicit NxML format (N× before the volume)
        // to avoid false positives like "SACS POUB 130L" where 130L is the bag
        // capacity, not a volume sold — no Nx prefix → no enrichment.
        if (packParsed && packParsed.multiplier > 1 && packParsed.volumeL === null) {
          const nxVolHint = (item.label || '').toUpperCase()
            .match(/\d+\s*[xX]\s*(\d+(?:[.,]\d+)?)\s*(ML|L)\b(?!BS?|ITRE)/);
          if (nxVolHint) {
            const perUnit = parseFloat(nxVolHint[1].replace(',', '.'))
              * (nxVolHint[2] === 'ML' ? 0.001 : 1);
            if (perUnit > 0) {
              packParsed = { ...packParsed, volumeL: packParsed.multiplier * perUnit };
            }
          }
        }

        // Master unit selection, in priority order:
        //   1. If a packaging was detected in the label → use its unit.
        //   2. If pack parser found an explicit volume (Bidon 5L) → 'L'.
        //   3. If rawUnit is already a master unit (K, KG, L, ML, G) → use that.
        //   4. If rawUnit signals a unit-count (U, PIECE, PCE, UNITE) and no
        //      packaging was detected from the label → the item is sold by piece.
        //      This covers fresh produce like "Laitues ... U" (sold per head).
        //   5. If product looks like a consumable → default to 'pièce'.
        //   6. Else fall back to 'kg' (legacy default for food).
        let masterUnit = 'kg';
        if (detectedPkg) {
          masterUnit = detectedPkg.unit;
        } else if (packParsed && packParsed.volumeL) {
          masterUnit = 'L';
        } else if (rawUnitNormalized === 'L' || rawUnitNormalized === 'ML') {
          masterUnit = 'L';
        } else if (rawUnitNormalized === 'K' || rawUnitNormalized === 'KG' || rawUnitNormalized === 'G') {
          masterUnit = 'kg';
        } else if (['U', 'PCE', 'PIECE', 'PIÈCE', 'UNITE', 'UNITÉ'].includes(rawUnitNormalized)) {
          masterUnit = 'pièce';
        } else if (looksLikeConsumable) {
          masterUnit = 'pièce';
        }

        const proposal = {
          name: proposedName,
          unit: masterUnit,
          // Auto-detect category from the label. Falls back to 'À trier' so
          // the user can still classify manually from the Catalogue view.
          category: detectCategoryFromLabel(item.label) || 'À trier',
          aliases: [item.label],
          supplier: rawInvoice.supplier,
          packagings: [],
          // Default to food. Either label-level or supplier-level heuristic
          // can flip this to 'consumable'. The user sees the result in the
          // review screen and can override per-line.
          suggestedType: looksLikeConsumable ? 'consumable' : 'food',
          // Track WHY we flagged it, so the UI can explain. Label match wins
          // over supplier match when both fire (more specific signal).
          detectedConsumableKeyword: detectedConsumable
            ? detectedConsumable.keyword
            : (supplierIsNonFood ? '(fournisseur non-alimentaire)' : null),
        };

        // Build the auto-conversion (packaging). Three cases:
        //
        // CASE A — Food packaging detected in label (e.g. "5L" in "HUILE 5L"):
        //   1 <rawUnit> = factor <masterUnit>
        //
        // CASE B — Consumable with volume-bearing pack (e.g. "Bidon 5 Kg"):
        //   1 <rawUnit> = volume L
        //
        // CASE C — Consumable with count-based pack (e.g. "Bte*100"):
        //   1 <rawUnit> = multiplier pièce
        if (detectedPkg && item.rawUnit) {
          proposal.packagings = [{
            label: `${item.rawUnit} (${detectedPkg.factor}${detectedPkg.unit})`,
            factor: detectedPkg.factor,
            unit: item.rawUnit,
            supplier: rawInvoice.supplier,
          }];
          proposal.detectedFactor = detectedPkg.factor;
        } else if (packParsed && packParsed.volumeL && item.rawUnit) {
          proposal.packagings = [{
            label: `${item.rawUnit} (${packParsed.volumeL} L)`,
            factor: packParsed.volumeL,
            unit: item.rawUnit,
            supplier: rawInvoice.supplier,
          }];
          proposal.detectedFactor = packParsed.volumeL;
        } else if (packParsed && item.rawUnit) {
          proposal.packagings = [{
            label: `${item.rawUnit} (${packParsed.multiplier} ${masterUnit})`,
            factor: packParsed.multiplier,
            unit: item.rawUnit,
            supplier: rawInvoice.supplier,
          }];
          proposal.detectedFactor = packParsed.multiplier;
        }
        newArticlesByLabel[proposedName] = proposal;
      }
      // Compute convertedQty using the detected packaging if any.
      const proposal = newArticlesByLabel[proposedName];
      const factor = proposal.detectedFactor || 1;
      const convertedQty = (item.rawQty || 0) * factor;
      // The actual articleId/variantId will be filled in at commit time.
      matchedItems.push({
        articleId: null,
        variantId: null,
        label: item.label,
        rawQty: item.rawQty,
        rawUnit: item.rawUnit,
        convertedQty,
        pricePerMasterUnit: convertedQty > 0 ? (item.total || 0) / convertedQty : 0,
        total: item.total || 0,
      });
    }
  }

  const candidatePurchase = {
    date: rawInvoice.date,
    supplier: rawInvoice.supplier,
    invoiceNumber: rawInvoice.invoiceNumber || '',
    items: matchedItems,
    total: rawInvoice.total || matchedItems.reduce((s, i) => s + (i.total || 0), 0),
  };

  // Detect duplicate against existing purchases.
  // detectDuplicate returns { level, match, reason } where `match` is the
  // existing purchase, or null if no duplicate.
  const dup = detectDuplicate(candidatePurchase, existingPurchases);

  return {
    parseError: null,
    candidatePurchase,
    isDuplicate: !!dup,
    duplicateOfId: dup?.match?.id || null,
    duplicateReason: dup?.reason || null,
    newArticles: Object.values(newArticlesByLabel),
    unmatchedItems: matchedItems.filter((i) => !i.articleId),
  };
}

// ─── BATCH SCAN FLOW (scan IA direct des PDF/images, max 10) ──────────────

/**
 * The batch scan modal: drop-zone → list of N files being processed → bulk save.
 *
 * The modal stays open after "Tout enregistrer" so the user can deal with
 * problematic files (errors, duplicates) without leaving the screen.
 */
function BatchScanModal({ articles, existingPurchases, onSavePurchase, onClose }) {
  const [items, setItems] = useState([]); // array of file-state objects
  const [hasFiles, setHasFiles] = useState(false);

  // Refs for the worker loop (avoids stale closures when state changes mid-flight)
  const itemsRef = useRef(items);
  const articlesRef = useRef(articles);
  useEffect(() => { itemsRef.current = items; }, [items]);
  useEffect(() => { articlesRef.current = articles; }, [articles]);

  const fileInputRef = useRef(null);

  // ─── File selection (input or drag-drop) ──────────────────────────────
  const handleFiles = useCallback((fileList) => {
    const files = Array.from(fileList).filter((f) => {
      // Accept PDFs and common image types
      return f.type === 'application/pdf' || f.type.startsWith('image/');
    });

    if (files.length === 0) {
      mcToast.error("Aucun fichier valide. Acceptés : PDF et images.");
      return;
    }

    if (files.length > BATCH_MAX_FILES) {
      mcToast.error(
        `Maximum ${BATCH_MAX_FILES} fichiers par lot. Vous en avez sélectionné ${files.length}. Retirez-en ${files.length - BATCH_MAX_FILES} ou faites plusieurs lots.`,
        { duration: 7000 }
      );
      return;
    }

    const newItems = files.map((file) => ({
      id: generateId('b'),
      file,
      filename: file.name,
      status: 'pending',
      result: null,
      duplicate: null,
      error: null,
      retries: 0,
    }));

    setItems(newItems);
    setHasFiles(true);
  }, []);

  // ─── Drag and drop handlers ───────────────────────────────────────────
  const handleDrop = (e) => {
    e.preventDefault();
    handleFiles(e.dataTransfer.files);
  };

  const handleDragOver = (e) => e.preventDefault();

  // ─── Worker loop: keeps BATCH_PARALLELISM scans running concurrently ──
  // Triggered whenever items change. It picks up to N pending items and
  // launches them. Each scan resolves by updating that item's state.
  useEffect(() => {
    const inFlight = itemsRef.current.filter((i) => i.status === 'scanning').length;
    const slotsFree = BATCH_PARALLELISM - inFlight;
    if (slotsFree <= 0) return;

    const pendingItems = itemsRef.current.filter((i) => i.status === 'pending').slice(0, slotsFree);
    if (pendingItems.length === 0) return;

    pendingItems.forEach((item) => { runScan(item.id); });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [items]);

  // ─── runScan: scans one file, with auto-retry on first failure ────────
  const runScan = async (itemId) => {
    // Mark as scanning
    setItems((prev) => prev.map((i) => (i.id === itemId ? { ...i, status: 'scanning' } : i)));

    const item = itemsRef.current.find((i) => i.id === itemId);
    if (!item) return;

    let lastError = null;
    const maxAttempts = 2; // initial attempt + 1 auto-retry

    for (let attempt = 1; attempt <= maxAttempts; attempt++) {
      try {
        console.log('[BatchScan] Attempt', attempt, 'for', item.filename);
        // Use the LATEST articles snapshot — this is how progressive learning works:
        // if a previous file in the batch added a new alias, we benefit from it here.
        const result = await scanInvoiceFile(item.file, articlesRef.current);

        // Check for duplicate against existing purchases
        const dup = detectDuplicate(result, existingPurchases);

        setItems((prev) =>
          prev.map((i) =>
            i.id === itemId
              ? {
                  ...i,
                  status: dup ? 'duplicate' : 'success',
                  result,
                  duplicate: dup,
                  error: null,
                  retries: attempt - 1,
                }
              : i
          )
        );
        return;
      } catch (err) {
        lastError = err;
        console.error(`[BatchScan] Attempt ${attempt} failed for ${item.filename}:`, err);
        if (attempt < maxAttempts) {
          // Brief wait before retry (rate-limit friendliness)
          await new Promise((r) => setTimeout(r, 1000));
        }
      }
    }

    // All attempts failed
    setItems((prev) =>
      prev.map((i) =>
        i.id === itemId
          ? { ...i, status: 'error', error: lastError?.message || String(lastError), retries: maxAttempts - 1 }
          : i
      )
    );
  };

  // ─── Per-item actions ─────────────────────────────────────────────────

  const handleRetry = (itemId) => {
    setItems((prev) =>
      prev.map((i) =>
        i.id === itemId ? { ...i, status: 'pending', error: null, retries: 0 } : i
      )
    );
  };

  const handleIgnore = (itemId) => {
    setItems((prev) => prev.map((i) => (i.id === itemId ? { ...i, status: 'ignored' } : i)));
  };

  const handleManualEdit = (itemId) => {
    // Open the regular PurchaseModal pre-filled with whatever we have
    const item = itemsRef.current.find((i) => i.id === itemId);
    if (!item) return;
    // We hand off to the parent: it'll open the standard PurchaseModal
    // with this item's data pre-loaded; on save the parent calls back here
    // to mark this item as 'saved'.
    setEditingItemId(itemId);
  };

  const [editingItemId, setEditingItemId] = useState(null);
  const editingItem = items.find((i) => i.id === editingItemId);

  // Force-save a duplicate (user confirmed it's not actually a duplicate)
  const handleForceDuplicate = (itemId) => {
    setItems((prev) =>
      prev.map((i) =>
        i.id === itemId ? { ...i, status: 'success', duplicate: null } : i
      )
    );
  };

  // ─── Bulk save: commit all "success" items and remove them from the list ──
  const handleSaveAll = () => {
    const ready = itemsRef.current.filter((i) => i.status === 'success' && i.result);
    if (ready.length === 0) return;

    let saveCount = 0;
    ready.forEach((item) => {
      onSavePurchase(item.result);
      saveCount++;
    });

    // Mark them as saved so they're visible but no longer actionable
    setItems((prev) =>
      prev.map((i) => (i.status === 'success' ? { ...i, status: 'saved' } : i))
    );

    console.log('[BatchScan] Bulk-saved', saveCount, 'invoices');
  };

  // ─── Statistics for the summary bar ───────────────────────────────────
  const stats = {
    total: items.length,
    pending: items.filter((i) => i.status === 'pending').length,
    scanning: items.filter((i) => i.status === 'scanning').length,
    success: items.filter((i) => i.status === 'success').length,
    duplicate: items.filter((i) => i.status === 'duplicate').length,
    error: items.filter((i) => i.status === 'error').length,
    saved: items.filter((i) => i.status === 'saved').length,
    ignored: items.filter((i) => i.status === 'ignored').length,
  };

  const processedCount = stats.success + stats.duplicate + stats.error + stats.saved + stats.ignored;
  const isDone = stats.pending === 0 && stats.scanning === 0;
  const progressPercent = stats.total > 0 ? Math.round((processedCount / stats.total) * 100) : 0;

  return (
    <div className="mc-overlay" onClick={onClose}>
      <div className="mc-modal" style={{ maxWidth: 880, padding: 32 }} onClick={(e) => e.stopPropagation()}>
        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
          <div>
            <h3 className="mc-display" style={{ fontSize: 22, fontWeight: 600, margin: 0 }}>
              Scanner un lot de factures
            </h3>
            <p style={{ margin: '4px 0 0', fontSize: 13, color: palette.inkSoft }}>
              {!hasFiles
                ? `Glissez jusqu'à ${BATCH_MAX_FILES} fichiers PDF ou images d'un coup`
                : `${stats.total} facture${stats.total > 1 ? 's' : ''} dans le lot`}
            </p>
          </div>
          <button className="mc-btn mc-btn-ghost" onClick={onClose}><X size={14} /></button>
        </div>

        {/* Drop zone (shown when no files yet) */}
        {!hasFiles && (
          <div
            onDrop={handleDrop}
            onDragOver={handleDragOver}
            onClick={() => fileInputRef.current?.click()}
            style={{
              padding: 60,
              border: `2px dashed ${palette.rule}`,
              borderRadius: 12,
              background: palette.paper,
              textAlign: 'center',
              cursor: 'pointer',
              transition: 'all 0.2s',
            }}
            onMouseEnter={(e) => { e.currentTarget.style.borderColor = palette.wine; }}
            onMouseLeave={(e) => { e.currentTarget.style.borderColor = palette.rule; }}
          >
            <Upload size={40} style={{ color: palette.wine, marginBottom: 12 }} />
            <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 6 }}>
              Glissez vos fichiers ici
            </div>
            <div style={{ fontSize: 13, color: palette.inkSoft }}>
              ou cliquez pour parcourir · PDF et images · {BATCH_MAX_FILES} fichiers max
            </div>
            <input
              ref={fileInputRef}
              type="file"
              multiple
              accept="application/pdf,image/*"
              style={{ display: 'none' }}
              onChange={(e) => handleFiles(e.target.files)}
            />
          </div>
        )}

        {/* Progress bar + stats */}
        {hasFiles && (
          <>
            <div style={{ marginBottom: 16 }}>
              <div
                style={{
                  display: 'flex',
                  justifyContent: 'space-between',
                  fontSize: 12,
                  color: palette.inkSoft,
                  marginBottom: 6,
                }}
              >
                <span>
                  {isDone
                    ? `Traitement terminé · ${processedCount} / ${stats.total}`
                    : `${processedCount} / ${stats.total} traitées · ${stats.scanning} en cours`}
                </span>
                <span style={{ fontWeight: 600 }}>{progressPercent} %</span>
              </div>
              <div style={{ height: 6, background: palette.rule, borderRadius: 3, overflow: 'hidden' }}>
                <div
                  style={{
                    height: '100%',
                    width: progressPercent + '%',
                    background: isDone ? palette.sage : palette.wine,
                    transition: 'width 0.3s',
                  }}
                />
              </div>
            </div>

            {/* Per-status counters */}
            {isDone && (
              <div
                style={{
                  display: 'flex',
                  gap: 12,
                  flexWrap: 'wrap',
                  marginBottom: 16,
                  padding: 12,
                  background: palette.paper,
                  borderRadius: 8,
                  fontSize: 12,
                }}
              >
                {stats.success > 0 && (
                  <span style={{ color: palette.sage, fontWeight: 600 }}>
                    ✓ {stats.success} prête{stats.success > 1 ? 's' : ''}
                  </span>
                )}
                {stats.duplicate > 0 && (
                  <span style={{ color: palette.amber, fontWeight: 600 }}>
                    ⚠ {stats.duplicate} doublon{stats.duplicate > 1 ? 's' : ''}
                  </span>
                )}
                {stats.error > 0 && (
                  <span style={{ color: palette.wine, fontWeight: 600 }}>
                    ✗ {stats.error} erreur{stats.error > 1 ? 's' : ''}
                  </span>
                )}
                {stats.saved > 0 && (
                  <span style={{ color: palette.inkSoft }}>
                    💾 {stats.saved} enregistrée{stats.saved > 1 ? 's' : ''}
                  </span>
                )}
                {stats.ignored > 0 && (
                  <span style={{ color: palette.inkSoft }}>
                    {stats.ignored} ignorée{stats.ignored > 1 ? 's' : ''}
                  </span>
                )}
              </div>
            )}

            {/* List of files */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 20, maxHeight: '50vh', overflowY: 'auto' }}>
              {items.map((item) => (
                <BatchScanItem
                  key={item.id}
                  item={item}
                  articles={articles}
                  onRetry={() => handleRetry(item.id)}
                  onIgnore={() => handleIgnore(item.id)}
                  onManualEdit={() => handleManualEdit(item.id)}
                  onForceDuplicate={() => handleForceDuplicate(item.id)}
                />
              ))}
            </div>

            {/* Footer actions */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8, paddingTop: 16, borderTop: `1px solid ${palette.rule}` }}>
              <button className="mc-btn mc-btn-ghost" onClick={onClose}>
                {isDone && stats.error === 0 && stats.duplicate === 0 ? 'Fermer' : 'Annuler le lot'}
              </button>

              <button
                className="mc-btn mc-btn-primary"
                onClick={handleSaveAll}
                disabled={stats.success === 0}
                style={
                  stats.success === 0
                    ? { opacity: 0.5, cursor: 'not-allowed' }
                    : undefined
                }
              >
                <Save size={14} /> Tout enregistrer ({stats.success})
              </button>
            </div>
          </>
        )}

        {/* Embedded PurchaseModal for individual editing */}
        {editingItem && (
          <PurchaseModal
            initial={editingItem.result || { items: [], date: new Date().toISOString().slice(0, 10) }}
            articles={articles}
            existingPurchases={existingPurchases}
            fromScan={!!editingItem.result}
            onSave={(data) => {
              onSavePurchase(data);
              // Mark this batch item as saved
              setItems((prev) =>
                prev.map((i) => (i.id === editingItemId ? { ...i, status: 'saved', result: data } : i))
              );
              setEditingItemId(null);
            }}
            onClose={() => setEditingItemId(null)}
          />
        )}
      </div>
    </div>
  );
}

/**
 * One row in the batch scan list. Shows the file's status and offers
 * context-sensitive actions (Modifier, Réessayer, Ignorer, etc.)
 */
function BatchScanItem({ item, articles, onRetry, onIgnore, onManualEdit, onForceDuplicate }) {
  const { status, filename, result, duplicate, error } = item;

  // Visual config per status
  const config = (() => {
    switch (status) {
      case 'pending':
        return { icon: '○', color: palette.inkSoft, bg: palette.paper, label: 'En attente' };
      case 'scanning':
        return { icon: '⏳', color: palette.amber, bg: palette.amber + '08', label: 'Analyse...' };
      case 'success':
        return { icon: '✓', color: palette.sage, bg: palette.sage + '08', label: 'Prête' };
      case 'duplicate':
        return { icon: '⚠', color: palette.amber, bg: palette.amber + '15', label: 'Doublon' };
      case 'error':
        return { icon: '✗', color: palette.wine, bg: palette.wine + '08', label: 'Erreur' };
      case 'saved':
        return { icon: '💾', color: palette.inkSoft, bg: palette.paper, label: 'Enregistrée' };
      case 'ignored':
        return { icon: '⊘', color: palette.inkSoft, bg: palette.paper, label: 'Ignorée' };
      default:
        return { icon: '?', color: palette.inkSoft, bg: palette.paper, label: status };
    }
  })();

  return (
    <div
      style={{
        padding: 12,
        background: config.bg,
        borderRadius: 8,
        border: `1px solid ${palette.rule}`,
        display: 'flex',
        alignItems: 'center',
        gap: 12,
      }}
    >
      {/* Status icon */}
      <span style={{ fontSize: 18, color: config.color, width: 24, textAlign: 'center', flexShrink: 0 }}>
        {status === 'scanning' ? (
          <Loader2 size={16} style={{ animation: 'spin 1s linear infinite' }} />
        ) : (
          config.icon
        )}
      </span>

      {/* Main info */}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: config.color }}>{config.label}</span>
          {status === 'success' && result && (
            <span style={{ fontSize: 12, color: palette.inkSoft }}>
              {result.supplier || '?'} · {formatShortDate(result.date, { withYear: true })} ·{' '}
              <strong>{formatEuro(result.total)}</strong> · {result.items.length} ligne{result.items.length > 1 ? 's' : ''}
            </span>
          )}
          {status === 'duplicate' && result && duplicate && (
            <span style={{ fontSize: 12, color: palette.inkSoft }}>
              {result.supplier} · {formatShortDate(result.date, { withYear: true })} · {formatEuro(result.total)}
              {' — '}
              <em>{duplicate.reason}</em>
            </span>
          )}
        </div>
        <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 2, textOverflow: 'ellipsis', overflow: 'hidden', whiteSpace: 'nowrap' }}>
          {filename}
        </div>
        {status === 'error' && error && (
          <div style={{ fontSize: 11, color: palette.wine, marginTop: 4 }}>
            {error.length > 120 ? error.slice(0, 120) + '...' : error}
          </div>
        )}
      </div>

      {/* Actions */}
      <div style={{ display: 'flex', gap: 4, flexShrink: 0 }}>
        {status === 'success' && (
          <button
            className="mc-btn mc-btn-ghost"
            style={{ padding: '4px 10px', fontSize: 12 }}
            onClick={onManualEdit}
          >
            <Edit3 size={12} /> Modifier
          </button>
        )}
        {status === 'duplicate' && (
          <>
            <button
              className="mc-btn mc-btn-ghost"
              style={{ padding: '4px 10px', fontSize: 12 }}
              onClick={onManualEdit}
            >
              <Edit3 size={12} /> Voir
            </button>
            <button
              className="mc-btn mc-btn-amber"
              style={{ padding: '4px 10px', fontSize: 12 }}
              onClick={onForceDuplicate}
              title="Marquer comme non-doublon — la facture passera à 'Prête'"
            >
              Pas un doublon
            </button>
            <button
              className="mc-btn mc-btn-danger"
              style={{ padding: '4px 10px', fontSize: 12 }}
              onClick={onIgnore}
            >
              Ignorer
            </button>
          </>
        )}
        {status === 'error' && (
          <>
            <button
              className="mc-btn mc-btn-ghost"
              style={{ padding: '4px 10px', fontSize: 12 }}
              onClick={onRetry}
              title="Relancer le scan IA"
            >
              <RefreshCw size={12} /> Réessayer
            </button>
            <button
              className="mc-btn mc-btn-ghost"
              style={{ padding: '4px 10px', fontSize: 12 }}
              onClick={onManualEdit}
              title="Saisir la facture manuellement"
            >
              <Edit3 size={12} /> Saisie manuelle
            </button>
            <button
              className="mc-btn mc-btn-danger"
              style={{ padding: '4px 10px', fontSize: 12 }}
              onClick={onIgnore}
              title="Ignorer cette facture"
            >
              Ignorer
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   STOCKS VIEW
// ═══════════════════════════════════════════════════════════════════════════
//
// Lists every tracked article with:
//   - "Acheté sur la période"  : Σ purchases.qty during the active period
//   - "Stock"                  : current theoretical stock if ≥ 1 inventory
//                                 has been done; otherwise "—"
//   - Visual state: OK / "Inventaire requis" / soon: low/empty
//
// This view is read-only — inventory creation comes in step 3.

function StocksView({ context }) {
  const {
    articles, purchases, sales, inventories, setInventories,
    outflowIndex, allTimePriceIndex, dateFrom, dateTo,
  } = context;

  // ─── Inventory editor state ───────────────────────────────────────────
  const [editingInventoryId, setEditingInventoryId] = useState(null);
  const draftInventory = useMemo(() => findDraftInventory(inventories), [inventories]);

  // ─── Filters and sorting state ────────────────────────────────────────
  const [searchQuery, setSearchQuery] = useState('');
  const [typeFilter, setTypeFilter] = useState('all');         // 'all' | 'recipe' | 'consumable'
  const [trackedOnly, setTrackedOnly] = useState(true);
  const [sortBy, setSortBy] = useState('name');                 // 'name' | 'purchases' | 'stock' | 'value'
  const [sortDir, setSortDir] = useState('asc');                // 'asc' | 'desc'

  // Today's date as YYYY-MM-DD, computed once per render. Used for projecting
  // consumable consumption from "last inventory" to "now".
  const today = useMemo(() => new Date().toISOString().slice(0, 10), []);

  // ─── Inventory creation: open a fresh draft ─────────────────────────────
  // Only one draft can exist at a time. If the user clicks "Nouvel inventaire"
  // while a draft exists, we reuse it (resume) rather than creating a new one.
  const handleNewInventory = () => {
    if (draftInventory) {
      setEditingInventoryId(draftInventory.id);
      return;
    }
    const isFirstEver = inventories.filter((i) => i.status !== 'draft').length === 0;
    const newInv = {
      id: generateId('inv'),
      date: new Date().toISOString().slice(0, 10),
      type: isFirstEver ? 'opening' : 'monthly',
      status: 'draft',
      entries: [],
      createdAt: new Date().toISOString(),
    };
    setInventories([...inventories, newInv]);
    setEditingInventoryId(newInv.id);
  };

  const handleResumeDraft = () => {
    if (draftInventory) setEditingInventoryId(draftInventory.id);
  };

  // ─── Compute the summary table for all articles ────────────────────
  const stockRows = useMemo(() => {
    return articles.map((article) => {
      const purchasesData = calculatePurchasesForArticle(
        article.id, purchases, dateFrom, dateTo
      );

      // Use the richer summary helper for stock info (includes outflow data)
      const summary = computeStockSummary(
        article, outflowIndex, purchases, inventories, sales, today
      );
      const currentStock = summary?.value ?? null;
      const latestInv = findLatestInventoryEntry(article.id, inventories);

      // Stock value = current stock × all-time avg price.
      // Negative stocks have no meaningful value; we surface them as null.
      const avgPrice = allTimePriceIndex.master[article.id]?.avg ?? null;
      const stockValue =
        currentStock != null && currentStock > 0 && avgPrice != null
          ? currentStock * avgPrice
          : null;

      return {
        id: article.id,
        name: article.name,
        unit: article.unit,
        category: article.category,
        stockType: article.stockType || DEFAULT_STOCK_TYPE,
        trackStock: article.trackStock !== false,
        purchasesQty: purchasesData.qty,
        purchasesValue: purchasesData.value,
        currentStock,
        stockValue,
        avgPrice,
        latestInventoryDate: latestInv?.date ?? null,
        variantCount: (article.variants || []).length,
        // Step 4 metadata
        isEstimate: summary?.isEstimate ?? false,
        isNegative: summary?.isNegative ?? false,
        hasNoOutflows: summary?.hasNoOutflows ?? false,
        outflowsSince: summary?.outflowsSince ?? 0,
      };
    });
  }, [articles, purchases, sales, inventories, outflowIndex, allTimePriceIndex, dateFrom, dateTo, today]);

  // ─── Apply filters and sort ────────────────────────────────────────────
  const filteredRows = useMemo(() => {
    const q = normalizeText(searchQuery);
    let rows = stockRows.filter((r) => {
      if (trackedOnly && !r.trackStock) return false;
      if (typeFilter !== 'all' && r.stockType !== typeFilter) return false;
      if (q && !normalizeText(r.name).includes(q) && !normalizeText(r.category).includes(q)) return false;
      return true;
    });

    rows.sort((a, b) => {
      let cmp = 0;
      if (sortBy === 'name') cmp = a.name.localeCompare(b.name);
      else if (sortBy === 'purchases') cmp = (a.purchasesQty || 0) - (b.purchasesQty || 0);
      else if (sortBy === 'stock') {
        // Treat null stock as "very low" so it sorts to the top in asc mode
        const aS = a.currentStock ?? -Infinity;
        const bS = b.currentStock ?? -Infinity;
        cmp = aS - bS;
      } else if (sortBy === 'value') {
        cmp = (a.stockValue ?? 0) - (b.stockValue ?? 0);
      }
      return sortDir === 'asc' ? cmp : -cmp;
    });

    return rows;
  }, [stockRows, searchQuery, typeFilter, trackedOnly, sortBy, sortDir]);

  // ─── Summary statistics for the header banner ──────────────────────────
  const summary = useMemo(() => {
    const tracked = stockRows.filter((r) => r.trackStock);
    const withInventory = tracked.filter((r) => r.currentStock != null);
    const totalStockValue = withInventory.reduce((s, r) => s + (r.stockValue || 0), 0);
    const totalPurchasesValue = stockRows.reduce((s, r) => s + (r.purchasesValue || 0), 0);
    return {
      totalArticles: articles.length,
      trackedCount: tracked.length,
      withInventoryCount: withInventory.length,
      totalStockValue,
      totalPurchasesValue,
    };
  }, [stockRows, articles.length]);

  // ─── Pagination (same pattern as Sales/Purchases) ─────────────────────
  const PAGE_SIZE = 100;
  const [visibleCount, setVisibleCount] = useState(PAGE_SIZE);
  useEffect(() => {
    if (visibleCount > filteredRows.length && filteredRows.length > PAGE_SIZE) {
      setVisibleCount(PAGE_SIZE);
    }
  }, [filteredRows.length, visibleCount]);
  const visibleRows = filteredRows.slice(0, visibleCount);
  const hasMore = filteredRows.length > visibleCount;

  // Helper for the sortable column headers
  const SortableTh = ({ field, children, align = 'left' }) => {
    const active = sortBy === field;
    return (
      <th
        className="mc-th"
        style={{ textAlign: align, cursor: 'pointer', userSelect: 'none' }}
        onClick={() => {
          if (active) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
          else { setSortBy(field); setSortDir('asc'); }
        }}
      >
        {children}
        {active && (sortDir === 'asc' ? ' ↑' : ' ↓')}
      </th>
    );
  };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
        <h2 className="mc-display" style={{ fontSize: 24, fontWeight: 600, margin: 0 }}>
          Stocks
        </h2>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <span style={{ fontSize: 12, color: palette.inkSoft, marginRight: 8 }}>
            {summary.trackedCount} suivi{summary.trackedCount > 1 ? 's' : ''} · {summary.withInventoryCount} avec inventaire
          </span>
          {draftInventory ? (
            <button className="mc-btn mc-btn-amber" onClick={handleResumeDraft}>
              <Edit3 size={14} /> Reprendre l'inventaire en cours
            </button>
          ) : (
            <button className="mc-btn mc-btn-primary" onClick={handleNewInventory}>
              <Plus size={14} /> Nouvel inventaire
            </button>
          )}
        </div>
      </div>

      {/* Calibration banner — shown until at least one inventory exists */}
      {summary.withInventoryCount === 0 && (
        <div style={{ marginBottom: 20 }}>
          <InfoBanner icon={AlertCircle} color={palette.amber}>
            <strong>Calibration requise.</strong> Le stock courant ne peut pas
            être calculé sans inventaire de référence. Saisissez une fois vos
            quantités physiques (à venir étape suivante), et les chiffres seront
            tenus à jour automatiquement à partir de ce point. En attendant,
            seul le volume <em>acheté sur la période</em> est affiché ci-dessous.
          </InfoBanner>
        </div>
      )}

      {/* KPI cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16, marginBottom: 24 }}>
        <KpiCard
          label="Articles suivis"
          value={`${summary.trackedCount} / ${summary.totalArticles}`}
          accentColor={palette.wine}
          icon={Box}
        />
        <KpiCard
          label="Acheté sur la période"
          value={formatEuro(summary.totalPurchasesValue)}
          accentColor={palette.sage}
          icon={ShoppingCart}
        />
        <KpiCard
          label="Valeur stock"
          value={
            summary.withInventoryCount > 0
              ? formatEuro(summary.totalStockValue)
              : '—'
          }
          sub={
            summary.withInventoryCount === 0
              ? 'Inventaire requis'
              : `${summary.withInventoryCount} article${summary.withInventoryCount > 1 ? 's' : ''} comptabilisé${summary.withInventoryCount > 1 ? 's' : ''}`
          }
          accentColor={palette.amber}
          icon={Package}
        />
      </div>

      {/* Filters bar */}
      <div className="mc-card" style={{ padding: 16, marginBottom: 16, display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
        <div style={{ position: 'relative', flex: 1, minWidth: 200 }}>
          <Search size={14} style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: palette.inkSoft }} />
          <input
            className="mc-input"
            placeholder="Rechercher par nom ou catégorie..."
            value={searchQuery}
            onChange={(e) => setSearchQuery(e.target.value)}
            style={{ paddingLeft: 32, width: '100%' }}
          />
        </div>

        <div style={{ display: 'flex', gap: 4 }}>
          {[
            ['all', 'Tous'],
            ['recipe', 'Recettes'],
            ['consumable', 'Consommables'],
          ].map(([key, label]) => (
            <button
              key={key}
              onClick={() => setTypeFilter(key)}
              style={{
                padding: '6px 12px',
                borderRadius: 6,
                fontSize: 12,
                fontWeight: 600,
                cursor: 'pointer',
                fontFamily: 'DM Sans, sans-serif',
                background: typeFilter === key ? palette.ink : 'transparent',
                color: typeFilter === key ? palette.cream : palette.inkSoft,
                border: '1px solid ' + (typeFilter === key ? palette.ink : palette.rule),
              }}
            >
              {label}
            </button>
          ))}
        </div>

        <label style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: palette.inkSoft, cursor: 'pointer' }}>
          <input
            type="checkbox"
            checked={trackedOnly}
            onChange={(e) => setTrackedOnly(e.target.checked)}
          />
          Suivis uniquement
        </label>
      </div>

      {/* Stocks table */}
      <div className="mc-card" style={{ overflow: 'hidden' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr>
              <SortableTh field="name">Article</SortableTh>
              <th className="mc-th">Type</th>
              <SortableTh field="purchases" align="right">Acheté</SortableTh>
              <SortableTh field="stock" align="right">Stock</SortableTh>
              <SortableTh field="value" align="right">Valeur stock</SortableTh>
              <th className="mc-th">Dernier inventaire</th>
            </tr>
          </thead>
          <tbody>
            {visibleRows.map((row) => (
              <StockRow key={row.id} row={row} />
            ))}
          </tbody>
        </table>

        {filteredRows.length === 0 && (
          <div style={{ textAlign: 'center', padding: 32, fontSize: 14, color: palette.inkSoft }}>
            {searchQuery || typeFilter !== 'all' || trackedOnly
              ? 'Aucun article ne correspond aux filtres.'
              : 'Aucun article.'}
          </div>
        )}

        {/* Pagination */}
        {filteredRows.length > 0 && (
          <div
            style={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              padding: '14px 20px', borderTop: `1px solid ${palette.rule}`,
              fontSize: 12, color: palette.inkSoft,
            }}
          >
            <span>{visibleRows.length} sur {filteredRows.length} articles affichés</span>
            {hasMore && (
              <button
                className="mc-btn mc-btn-ghost"
                onClick={() => setVisibleCount((c) => c + PAGE_SIZE)}
                style={{ padding: '6px 14px' }}
              >
                Charger {Math.min(PAGE_SIZE, filteredRows.length - visibleCount)} de plus
              </button>
            )}
          </div>
        )}
      </div>

      {/* Inventory history (3B) — visible only when there's at least one inventory */}
      <InventoryHistorySection
        inventories={inventories}
        articles={articles}
        purchases={purchases}
        allTimePriceIndex={allTimePriceIndex}
        onResumeDraft={handleResumeDraft}
        onSetInventories={setInventories}
      />

      {/* Inventory editor modal — when user is creating or resuming an inventory */}
      {editingInventoryId && (
        <InventoryEditor
          inventoryId={editingInventoryId}
          inventories={inventories}
          setInventories={setInventories}
          articles={articles}
          purchases={purchases}
          onClose={() => setEditingInventoryId(null)}
        />
      )}
    </div>
  );
}

/**
 * One row in the stocks table. Extracted to keep StocksView readable and to
 * allow per-row state in the future (expand for detail, edit, etc.).
 */
function StockRow({ row }) {
  const formatQty = (qty) => {
    if (qty == null) return '—';
    return qty.toFixed(2) + ' ' + row.unit;
  };

  // Visual indicator for stock state
  let stockColor = palette.ink;
  let stockPrefix = '';
  let stockTitle = ''; // hover tooltip
  if (row.currentStock != null) {
    if (row.isNegative) {
      stockColor = palette.wine;
      stockTitle = "Stock épuisé selon le modèle théorique. Refaites un inventaire pour recalibrer.";
    } else if (row.isEstimate) {
      stockPrefix = '≈ ';
      stockColor = palette.inkSoft;
      stockTitle = "Estimation : conso moyenne projetée depuis le dernier inventaire.";
    } else if (row.hasNoOutflows && row.purchasesQty > 0) {
      stockTitle = "Aucune sortie comptabilisée (pas de ventes ou article non utilisé en recette).";
    }
  }

  return (
    <tr className="mc-row">
      <td className="mc-td">
        <div style={{ fontWeight: 500 }}>{row.name}</div>
        <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 2 }}>
          {row.category}
          {row.variantCount > 1 && ` · ${row.variantCount} variantes`}
        </div>
      </td>
      <td className="mc-td">
        <span
          className="mc-pill"
          style={{
            background: row.stockType === 'consumable' ? palette.amber + '20' : palette.sage + '20',
            color: row.stockType === 'consumable' ? palette.amber : palette.sage,
            fontWeight: 600,
          }}
        >
          {row.stockType === 'consumable' ? 'Consommable' : 'Recette'}
        </span>
      </td>
      <td className="mc-td" style={{ textAlign: 'right' }}>
        <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 600 }}>
          {formatQty(row.purchasesQty)}
        </div>
        {row.purchasesValue > 0 && (
          <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 2 }}>
            {formatEuro(row.purchasesValue)}
          </div>
        )}
      </td>
      <td className="mc-td" style={{ textAlign: 'right' }} title={stockTitle}>
        {row.currentStock != null ? (
          <>
            <div style={{
              fontFamily: 'Fraunces, serif',
              fontWeight: 600,
              color: stockColor,
            }}>
              {row.isNegative
                ? <span style={{ fontSize: 12, fontStyle: 'italic' }}>Épuisé</span>
                : <>{stockPrefix}{formatQty(row.currentStock)}</>}
            </div>
            {row.outflowsSince > 0 && !row.isNegative && (
              <div style={{ fontSize: 10, color: palette.inkSoft, marginTop: 2 }}>
                −{row.outflowsSince.toFixed(1)} {row.unit} sortis
              </div>
            )}
            {row.hasNoOutflows && row.purchasesQty > 0 && !row.isNegative && (
              <div style={{ fontSize: 10, color: palette.amber, marginTop: 2, fontStyle: 'italic' }}>
                sorties non calculées
              </div>
            )}
          </>
        ) : (
          <span style={{ color: palette.inkSoft, fontSize: 12 }}>—</span>
        )}
      </td>
      <td className="mc-td" style={{ textAlign: 'right' }}>
        {row.stockValue != null ? (
          <div style={{ fontFamily: 'Fraunces, serif' }}>
            {formatEuro(row.stockValue)}
          </div>
        ) : (
          <span style={{ color: palette.inkSoft, fontSize: 12 }}>—</span>
        )}
      </td>
      <td className="mc-td" style={{ fontSize: 12, color: palette.inkSoft }}>
        {row.latestInventoryDate
          ? formatShortDate(row.latestInventoryDate, { withYear: true })
          : 'Jamais'}
      </td>
    </tr>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   INVENTORY EDITOR (full-screen modal)
// ═══════════════════════════════════════════════════════════════════════════
//
// Presents all tracked articles grouped by category. The user types each
// physical quantity and the value is auto-saved into the draft inventory
// after a short debounce (no need to click "Save" between fields).
//
// The "Terminer l'inventaire" button at the bottom flips status from 'draft'
// to 'completed', which is what makes the inventory take effect on stock
// calculations across the rest of the app.
//
// Per Q3 = C, articles with no entered value are NOT added to the
// inventory. "Non saisi = inchangé": stock for those articles stays at
// whatever the previous calculation said.

function InventoryEditor({
  inventoryId,
  inventories,
  setInventories,
  articles,
  purchases,
  onClose,
}) {
  const inventory = inventories.find((i) => i.id === inventoryId);
  const isMobile = useIsMobile();

  // ─── Local UI state ─────────────────────────────────────────────────────
  const [searchQuery, setSearchQuery] = useState('');
  const [showTheoretical, setShowTheoretical] = useState(false);
  // On mobile, categories start collapsed (less overwhelming, faster scroll).
  // On desktop, all expanded by default (closer to the spreadsheet UX users expect).
  // We initialize this lazily — the actual set is filled once `grouped` is computed,
  // see the useEffect below.
  const [collapsedCategories, setCollapsedCategories] = useState(new Set());
  const [hasInitializedCollapse, setHasInitializedCollapse] = useState(false);
  // Local map for fast typing: { articleId: stringValue }
  // We mirror inventory.entries here for snappy UI, then debounce-write back.
  const [localValues, setLocalValues] = useState(() => {
    const map = {};
    if (inventory) {
      inventory.entries.forEach((e) => { map[e.articleId] = String(e.quantity); });
    }
    return map;
  });

  // Refs for the debounced auto-save
  const saveTimerRef = useRef(null);
  const localValuesRef = useRef(localValues);
  useEffect(() => { localValuesRef.current = localValues; }, [localValues]);

  // ─── Auto-save: every 600ms after the last edit, persist to inventory ───
  // We rebuild the inventory.entries array from localValues, keeping only
  // entries that have a valid number > 0 (or 0, if the user explicitly typed it).
  // Empty strings = "non saisi" → not added to entries (per Q3 = C).
  const persistEntries = useCallback(() => {
    const values = localValuesRef.current;
    const newEntries = [];
    for (const [ingId, str] of Object.entries(values)) {
      const trimmed = str.trim();
      if (trimmed === '') continue; // not entered → skip per Q3=C
      const num = parseFloat(trimmed.replace(',', '.'));
      if (!isFinite(num) || num < 0) continue; // invalid → skip
      // Preserve existing note if any
      const existing = (inventory?.entries || []).find((e) => e.articleId === ingId);
      newEntries.push({
        articleId: ingId,
        quantity: num,
        note: existing?.note || '',
      });
    }
    setInventories((prev) =>
      prev.map((inv) =>
        inv.id === inventoryId
          ? { ...inv, entries: newEntries, updatedAt: new Date().toISOString() }
          : inv
      )
    );
  }, [inventoryId, setInventories, inventory]);

  const scheduleSave = useCallback(() => {
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(persistEntries, 600);
  }, [persistEntries]);

  // Final save on close (in case user closes within debounce window)
  useEffect(() => {
    return () => {
      if (saveTimerRef.current) {
        clearTimeout(saveTimerRef.current);
        persistEntries();
      }
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // ─── Compute grouped article list (Q2 = A: by category) ─────────────
  const grouped = useMemo(() => {
    const tracked = articles.filter((i) => i.trackStock !== false);
    const q = normalizeText(searchQuery);
    const filtered = q
      ? tracked.filter((i) =>
          normalizeText(i.name).includes(q) || normalizeText(i.category).includes(q))
      : tracked;

    const map = {};
    for (const ing of filtered) {
      const cat = ing.category || 'Sans catégorie';
      if (!map[cat]) map[cat] = [];
      map[cat].push(ing);
    }
    // Sort categories alphabetically + articles within each
    const sorted = Object.keys(map).sort().map((cat) => ({
      category: cat,
      articles: map[cat].sort((a, b) => a.name.localeCompare(b.name)),
    }));
    return sorted;
  }, [articles, searchQuery]);

  // ─── Initial collapse state ────────────────────────────────────────────
  // On mobile, collapse all categories by default so the screen is clean.
  // On desktop, leave them all expanded. We do this once after the first
  // render of `grouped` and don't re-touch it (the user controls toggles
  // after that).
  useEffect(() => {
    if (hasInitializedCollapse) return;
    if (grouped.length === 0) return;
    if (isMobile) {
      const all = new Set(grouped.map((g) => g.category));
      setCollapsedCategories(all);
    }
    setHasInitializedCollapse(true);
  }, [grouped, isMobile, hasInitializedCollapse]);

  // ─── Theoretical stock for showTheoretical toggle ──────────────────────
  // Computed lazily — only matters when toggle is on.
  const theoreticalStocks = useMemo(() => {
    if (!showTheoretical) return {};
    const map = {};
    // We use inventories EXCLUDING the current draft so that the user's
    // own current-session entries don't loop back into "theoretical".
    const finalized = inventories.filter((inv) => inv.id !== inventoryId && inv.status !== 'draft');
    for (const ing of articles) {
      map[ing.id] = calculateCurrentStock(ing.id, purchases, finalized);
    }
    return map;
  }, [showTheoretical, articles, purchases, inventories, inventoryId]);

  // ─── Stats for footer ───────────────────────────────────────────────────
  const filledCount = Object.values(localValues).filter((v) => v.trim() !== '').length;
  const trackedTotal = articles.filter((i) => i.trackStock !== false).length;

  // ─── Field handlers ─────────────────────────────────────────────────────
  const handleChange = (articleId, value) => {
    setLocalValues((prev) => ({ ...prev, [articleId]: value }));
    scheduleSave();
  };

  const toggleCategory = (cat) => {
    setCollapsedCategories((prev) => {
      const next = new Set(prev);
      if (next.has(cat)) next.delete(cat);
      else next.add(cat);
      return next;
    });
  };

  // ─── Finalize the inventory ─────────────────────────────────────────────
  const handleFinalize = () => {
    persistEntries(); // ensure latest state is saved
    if (filledCount === 0) {
      mcToast.info("Inventaire finalisé sans articles (sans effet sur les stocks).");
    }
    setInventories((prev) =>
      prev.map((inv) =>
        inv.id === inventoryId
          ? { ...inv, status: 'completed', completedAt: new Date().toISOString() }
          : inv
      )
    );
    onClose();
  };

  // ─── Cancel the draft (delete it entirely) ──────────────────────────────
  const handleDeleteDraft = () => {
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    const _snapDraft = inventory;
    setInventories((prev) => prev.filter((inv) => inv.id !== inventoryId));
    onClose();
    mcToast.undo("Brouillon d'inventaire supprimé", () => { setInventories((prev) => [...prev, _snapDraft]); mcToast.success('Brouillon restauré'); }, { duration: 8000 });
  };

  if (!inventory) {
    // Edge case: user closed and the inventory was deleted in another tab
    return null;
  }

  return (
    <div
      className="mc-overlay"
      onClick={onClose}
      style={{
        alignItems: 'flex-start',
        overflowY: 'auto',
        padding: isMobile ? 0 : '40px 20px',
      }}
    >
      <div
        className="mc-modal"
        style={{
          maxWidth: isMobile ? '100%' : 900,
          width: isMobile ? '100%' : undefined,
          padding: 0,
          maxHeight: 'none',
          minHeight: isMobile ? '100vh' : undefined,
          borderRadius: isMobile ? 0 : undefined,
        }}
        onClick={(e) => e.stopPropagation()}
      >
        {/* ─── Header (sticky) ───────────────────────────────────────────── */}
        <div
          style={{
            position: 'sticky', top: 0, zIndex: 5,
            background: palette.cream,
            borderBottom: '1px solid ' + palette.rule,
            padding: isMobile ? '14px 16px' : '20px 28px',
          }}
        >
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: isMobile ? 8 : 12 }}>
            <div>
              <h3 className="mc-display" style={{ fontSize: isMobile ? 17 : 22, fontWeight: 600, margin: 0 }}>
                {isMobile
                  ? `Inventaire — ${filledCount}/${trackedTotal}`
                  : (inventory.type === 'opening' ? "Inventaire d'ouverture" : 'Inventaire mensuel')}
              </h3>
              {!isMobile && (
                <p style={{ margin: '4px 0 0', fontSize: 13, color: palette.inkSoft }}>
                  Saisie progressive — sauvegardée automatiquement
                </p>
              )}
            </div>
            <button className="mc-btn mc-btn-ghost" onClick={onClose} style={{ padding: isMobile ? '8px 10px' : undefined }}>
              <X size={14} />
            </button>
          </div>

          {/* Search bar (always) + theoretical toggle (desktop only) */}
          <div style={{ display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
            <div style={{ position: 'relative', flex: 1, minWidth: isMobile ? 'auto' : 200 }}>
              <Search size={14} style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: palette.inkSoft }} />
              <input
                className="mc-input"
                placeholder={isMobile ? "Rechercher..." : "Rechercher un article ou une catégorie..."}
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                style={{ paddingLeft: 32, width: '100%', fontSize: isMobile ? 16 : undefined }}
              />
            </div>
            {!isMobile && (
              <label
                style={{
                  display: 'flex', alignItems: 'center', gap: 6,
                  fontSize: 12, color: palette.inkSoft, cursor: 'pointer',
                  whiteSpace: 'nowrap',
                }}
              >
                <input
                  type="checkbox"
                  checked={showTheoretical}
                  onChange={(e) => setShowTheoretical(e.target.checked)}
                />
                Afficher les valeurs théoriques
              </label>
            )}
          </div>
        </div>

        {/* ─── Body: grouped list ────────────────────────────────────────── */}
        <div style={{ padding: isMobile ? '12px 8px' : '20px 28px' }}>
          {grouped.length === 0 && (
            <div style={{ textAlign: 'center', padding: 40, color: palette.inkSoft, fontSize: 14 }}>
              Aucun article ne correspond à la recherche.
            </div>
          )}

          {grouped.map(({ category, articles: ings }) => {
            const isCollapsed = collapsedCategories.has(category);
            const filledInCat = ings.filter((i) => (localValues[i.id] || '').trim() !== '').length;

            return (
              <section key={category} style={{ marginBottom: 20 }}>
                <button
                  type="button"
                  onClick={() => toggleCategory(category)}
                  style={{
                    width: '100%',
                    background: palette.paper,
                    border: '1px solid ' + palette.rule,
                    borderRadius: 8,
                    padding: '10px 14px',
                    display: 'flex',
                    justifyContent: 'space-between',
                    alignItems: 'center',
                    cursor: 'pointer',
                    fontFamily: 'DM Sans, sans-serif',
                    fontSize: 14,
                    fontWeight: 600,
                    color: palette.ink,
                    marginBottom: isCollapsed ? 0 : 8,
                  }}
                >
                  <span>
                    {isCollapsed ? '▸' : '▾'} {category}
                  </span>
                  <span style={{ fontSize: 12, color: palette.inkSoft, fontWeight: 400 }}>
                    {filledInCat} / {ings.length} saisis
                  </span>
                </button>

                {!isCollapsed && ings.map((ing) => (
                  <InventoryEditorRow
                    key={ing.id}
                    article={ing}
                    value={localValues[ing.id] || ''}
                    onChange={(v) => handleChange(ing.id, v)}
                    showTheoretical={showTheoretical && !isMobile}
                    theoreticalStock={theoreticalStocks[ing.id]}
                    isMobile={isMobile}
                  />
                ))}
              </section>
            );
          })}
        </div>

        {/* ─── Footer (sticky) ────────────────────────────────────────────── */}
        <div
          style={{
            position: 'sticky', bottom: 0, zIndex: 5,
            background: palette.cream,
            borderTop: '1px solid ' + palette.rule,
            padding: isMobile ? '10px 12px' : '14px 28px',
            display: 'flex',
            flexDirection: isMobile ? 'column' : 'row',
            justifyContent: 'space-between',
            alignItems: isMobile ? 'stretch' : 'center',
            gap: isMobile ? 8 : 12,
          }}
        >
          {!isMobile && (
            <div style={{ fontSize: 12, color: palette.inkSoft }}>
              <strong>{filledCount}</strong> sur {trackedTotal} articles saisis
              {filledCount > 0 && (
                <span style={{ color: palette.sage, marginLeft: 8 }}>
                  ✓ Sauvegardé automatiquement
                </span>
              )}
            </div>
          )}
          {isMobile && filledCount > 0 && (
            <div style={{ fontSize: 11, color: palette.sage, textAlign: 'center' }}>
              ✓ Sauvegardé
            </div>
          )}
          <div style={{
            display: 'flex',
            gap: 8,
            flexDirection: isMobile ? 'row' : 'row',
            width: isMobile ? '100%' : 'auto',
          }}>
            {/* On mobile, hide the "Delete draft" button (too easy to misstap). */}
            {!isMobile && (
              <button className="mc-btn mc-btn-danger" onClick={handleDeleteDraft}>
                <Trash2 size={14} /> Supprimer le brouillon
              </button>
            )}
            <button
              className="mc-btn mc-btn-ghost"
              onClick={onClose}
              style={isMobile ? { flex: 1, padding: '12px', fontSize: 14 } : undefined}
            >
              {isMobile ? 'Fermer' : 'Fermer (reprendre plus tard)'}
            </button>
            <button
              className="mc-btn mc-btn-primary"
              onClick={handleFinalize}
              style={isMobile ? { flex: 1.5, padding: '12px', fontSize: 14 } : undefined}
            >
              <Save size={14} /> {isMobile ? 'Terminer' : "Terminer l'inventaire"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/**
 * One row in the inventory editor.
 *
 * Desktop layout: compact horizontal row (name on left, qty input on right).
 * Mobile layout : card with the article name on top, then a row with
 *   [−] [qty input] [+] for touch-friendly entry, then the unit + ✓ status.
 */
function InventoryEditorRow({ article, value, onChange, showTheoretical, theoreticalStock, isMobile }) {
  const numValue = value.trim() !== '' ? parseFloat(value.replace(',', '.')) : null;
  const validNum = numValue != null && isFinite(numValue) && numValue >= 0;

  // Compute theoretical-vs-actual diff for visual hint (desktop only)
  let diff = null;
  let diffPct = null;
  if (showTheoretical && validNum && theoreticalStock != null && theoreticalStock > 0) {
    diff = numValue - theoreticalStock;
    diffPct = (diff / theoreticalStock) * 100;
  }

  // Increment helpers for the mobile +/- buttons. Default step is 1 (more
  // useful for typical inventory counts); user can still type decimals
  // directly into the input for fractional quantities like 0.8 kg.
  const adjustValue = (delta) => {
    const current = validNum ? numValue : 0;
    const next = Math.max(0, current + delta);
    onChange(String(next));
  };

  // ─── Mobile layout: card with big touch targets ───────────────────────
  if (isMobile) {
    return (
      <div style={{
        background: palette.cream,
        border: '1px solid ' + (validNum ? palette.sage + '40' : palette.rule),
        borderRadius: 8,
        padding: 12,
        marginBottom: 8,
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: palette.ink, lineHeight: 1.3 }}>
              {article.name}
            </div>
            {article.category && (
              <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 2 }}>
                {article.category}
              </div>
            )}
          </div>
          {validNum && (
            <span style={{
              color: palette.sage,
              fontSize: 16,
              fontWeight: 700,
              flexShrink: 0,
              marginLeft: 8,
            }}>✓</span>
          )}
        </div>

        <div style={{ display: 'flex', gap: 6, alignItems: 'stretch' }}>
          <button
            type="button"
            onClick={() => adjustValue(-1)}
            disabled={!validNum || numValue <= 0}
            style={{
              minWidth: 48,
              padding: '12px 0',
              border: '1px solid ' + palette.rule,
              borderRadius: 6,
              background: palette.paper,
              fontSize: 20,
              fontWeight: 600,
              color: validNum && numValue > 0 ? palette.ink : palette.inkSoft,
              cursor: validNum && numValue > 0 ? 'pointer' : 'not-allowed',
              opacity: validNum && numValue > 0 ? 1 : 0.5,
            }}
          >
            −
          </button>
          <input
            className="mc-input"
            type="number"
            inputMode="decimal"
            step="0.01"
            min="0"
            placeholder="0"
            value={value}
            onChange={(e) => onChange(e.target.value)}
            onFocus={(e) => {
              // Scroll the input into view above the mobile keyboard
              setTimeout(() => {
                e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
              }, 200);
            }}
            style={{
              flex: 1,
              textAlign: 'center',
              fontFamily: 'Fraunces, serif',
              fontSize: 22,
              fontWeight: 600,
              padding: '8px 4px',
            }}
          />
          <button
            type="button"
            onClick={() => adjustValue(1)}
            style={{
              minWidth: 48,
              padding: '12px 0',
              border: '1px solid ' + palette.rule,
              borderRadius: 6,
              background: palette.paper,
              fontSize: 20,
              fontWeight: 600,
              color: palette.ink,
              cursor: 'pointer',
            }}
          >
            +
          </button>
        </div>

        <div style={{ textAlign: 'right', marginTop: 4, fontSize: 11, color: palette.inkSoft }}>
          {article.unit}
        </div>
      </div>
    );
  }

  // ─── Desktop layout (unchanged) ────────────────────────────────────────
  return (
    <div
      style={{
        display: 'grid',
        gridTemplateColumns: '1fr auto auto',
        gap: 12,
        alignItems: 'center',
        padding: '8px 12px',
        borderBottom: '1px solid ' + palette.rule,
      }}
    >
      <div>
        <div style={{ fontSize: 13, fontWeight: 500, color: palette.ink }}>
          {article.name}
        </div>
        {showTheoretical && (
          <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 2 }}>
            Théorique : {theoreticalStock != null ? theoreticalStock.toFixed(2) + ' ' + article.unit : '— (pas d\'inventaire précédent)'}
            {diff != null && (
              <span
                style={{
                  marginLeft: 8,
                  color: Math.abs(diffPct) < 5 ? palette.sage : Math.abs(diffPct) < 15 ? palette.amber : palette.wine,
                  fontWeight: 600,
                }}
              >
                ({diff > 0 ? '+' : ''}{diff.toFixed(2)} {article.unit}, {diffPct > 0 ? '+' : ''}{diffPct.toFixed(0)}%)
              </span>
            )}
          </div>
        )}
      </div>

      <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
        <input
          className="mc-input"
          type="number"
          step="0.01"
          min="0"
          placeholder="—"
          value={value}
          onChange={(e) => onChange(e.target.value)}
          style={{
            width: 100,
            textAlign: 'right',
            fontFamily: 'Fraunces, serif',
            fontWeight: 600,
          }}
        />
        <span style={{ fontSize: 12, color: palette.inkSoft, minWidth: 30 }}>
          {article.unit}
        </span>
      </div>

      <div style={{ width: 16 }}>
        {validNum && <span style={{ color: palette.sage, fontSize: 14 }}>✓</span>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   INVENTORY HISTORY SECTION (3B)
// ═══════════════════════════════════════════════════════════════════════════
//
// Lists all past inventories with summary stats. Each row can be expanded
// to show the entries and the "écarts" (differences between theoretical and
// actual stock at that point in time). This is the cornerstone of loss
// tracking.
//
// For each completed inventory at date D, the écart per article is:
//   diff = inventory_qty − theoretical_qty_at_D
// where theoretical_qty_at_D = (previous_inv_qty or 0) + Σ purchases between
// the previous inventory and D.

function InventoryHistorySection({
  inventories,
  articles,
  purchases,
  allTimePriceIndex,
  onResumeDraft,
  onSetInventories,
}) {
  const [expandedInvId, setExpandedInvId] = useState(null);

  // Sort: completed inventories newest first, draft (if any) at the very top
  const sorted = useMemo(() => {
    const drafts = inventories.filter((i) => i.status === 'draft');
    const completed = [...inventories.filter((i) => i.status !== 'draft')]
      .sort((a, b) => b.date.localeCompare(a.date));
    return [...drafts, ...completed];
  }, [inventories]);

  // Quick lookup article by id
  const ingMap = useMemo(() => {
    const m = {};
    for (const ing of articles) m[ing.id] = ing;
    return m;
  }, [articles]);

  /**
   * Computes the theoretical quantity for one article AS OF a given date,
   * based on the inventory immediately before D and purchases between them.
   */
  const computeTheoreticalAt = (articleId, asOfDate, currentInvId) => {
    // Find the most recent completed inventory for this article strictly BEFORE asOfDate
    const prior = inventories
      .filter((inv) =>
        inv.id !== currentInvId
        && inv.status !== 'draft'
        && inv.date < asOfDate
      )
      .sort((a, b) => b.date.localeCompare(a.date));

    let baseQty = 0;
    let baseDate = '0000-01-01'; // very old default
    for (const inv of prior) {
      const e = (inv.entries || []).find((x) => x.articleId === articleId);
      if (e) { baseQty = e.quantity; baseDate = inv.date; break; }
    }

    let cumulative = baseQty;
    for (const p of purchases) {
      if (p.date < baseDate || p.date >= asOfDate) continue;
      for (const item of p.items) {
        if (item.articleId === articleId && item.convertedQty > 0) {
          cumulative += item.convertedQty;
        }
      }
    }
    return cumulative;
  };

  const handleDelete = (invId) => {
    let _snapInv = null;
    onSetInventories((prev) => { _snapInv = prev.find((inv) => inv.id === invId); return prev.filter((inv) => inv.id !== invId); });
    setExpandedInvId(null);
    mcToast.undo(`Inventaire du ${_snapInv?.date || '?'} supprimé`, () => { if (_snapInv) { onSetInventories((prev) => [...prev, _snapInv]); mcToast.success('Inventaire restauré'); } }, { duration: 10000 });
  };

  if (sorted.length === 0) return null;

  return (
    <div style={{ marginTop: 32 }}>
      <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 16px' }}>
        Historique des inventaires
      </h3>

      <div className="mc-card" style={{ overflow: 'hidden' }}>
        {sorted.map((inv) => {
          const isExpanded = expandedInvId === inv.id;
          const isDraft = inv.status === 'draft';
          const entryCount = (inv.entries || []).length;

          // Compute écarts for completed inventories
          let totalDiffValue = 0;
          let entriesWithDiff = [];
          if (!isDraft) {
            for (const entry of inv.entries || []) {
              const ing = ingMap[entry.articleId];
              if (!ing) continue;
              const theoretical = computeTheoreticalAt(entry.articleId, inv.date, inv.id);
              const diff = entry.quantity - theoretical;
              const avgPrice = allTimePriceIndex.master[entry.articleId]?.avg ?? 0;
              const diffValue = diff * avgPrice;
              totalDiffValue += diffValue;
              entriesWithDiff.push({ entry, ing, theoretical, diff, diffValue });
            }
          }

          return (
            <div key={inv.id} style={{ borderBottom: '1px solid ' + palette.rule }}>
              <div
                onClick={() => !isDraft && setExpandedInvId(isExpanded ? null : inv.id)}
                style={{
                  padding: '14px 20px',
                  display: 'flex',
                  justifyContent: 'space-between',
                  alignItems: 'center',
                  cursor: isDraft ? 'default' : 'pointer',
                  background: isDraft ? palette.amber + '10' : 'transparent',
                }}
              >
                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                  <span style={{ fontSize: 14, fontWeight: 600 }}>
                    {!isDraft && (isExpanded ? '▾' : '▸')}{' '}
                    {formatShortDate(inv.date, { withYear: true })}
                  </span>
                  <span
                    className="mc-pill"
                    style={{
                      background: isDraft ? palette.amber + '20' : inv.type === 'opening' ? palette.wine + '20' : palette.sage + '20',
                      color: isDraft ? palette.amber : inv.type === 'opening' ? palette.wine : palette.sage,
                      fontWeight: 600,
                    }}
                  >
                    {isDraft ? 'Brouillon' : inv.type === 'opening' ? 'Ouverture' : 'Mensuel'}
                  </span>
                  <span style={{ fontSize: 12, color: palette.inkSoft }}>
                    {entryCount} article{entryCount > 1 ? 's' : ''} saisi{entryCount > 1 ? 's' : ''}
                  </span>
                </div>

                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  {!isDraft && entryCount > 0 && (
                    <span
                      style={{
                        fontSize: 13,
                        fontFamily: 'Fraunces, serif',
                        fontWeight: 600,
                        color: Math.abs(totalDiffValue) < 5 ? palette.sage : totalDiffValue < 0 ? palette.wine : palette.amber,
                      }}
                    >
                      Écart : {totalDiffValue > 0 ? '+' : ''}{formatEuro(totalDiffValue)}
                    </span>
                  )}
                  {isDraft && (
                    <button
                      className="mc-btn mc-btn-amber"
                      onClick={(e) => { e.stopPropagation(); onResumeDraft(); }}
                      style={{ padding: '4px 12px', fontSize: 12 }}
                    >
                      Reprendre
                    </button>
                  )}
                  <button
                    className="mc-btn mc-btn-danger"
                    onClick={(e) => { e.stopPropagation(); handleDelete(inv.id); }}
                    style={{ padding: '4px 10px' }}
                    title="Supprimer cet inventaire"
                  >
                    <Trash2 size={12} />
                  </button>
                </div>
              </div>

              {/* Expanded detail with écarts */}
              {isExpanded && !isDraft && entriesWithDiff.length > 0 && (
                <div style={{ padding: '0 20px 14px', background: palette.paper }}>
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                    <thead>
                      <tr>
                        <th style={{ textAlign: 'left', padding: '8px 0', color: palette.inkSoft, fontWeight: 500 }}>Article</th>
                        <th style={{ textAlign: 'right', padding: '8px 8px', color: palette.inkSoft, fontWeight: 500 }}>Théorique</th>
                        <th style={{ textAlign: 'right', padding: '8px 8px', color: palette.inkSoft, fontWeight: 500 }}>Compté</th>
                        <th style={{ textAlign: 'right', padding: '8px 8px', color: palette.inkSoft, fontWeight: 500 }}>Écart</th>
                        <th style={{ textAlign: 'right', padding: '8px 0', color: palette.inkSoft, fontWeight: 500 }}>Valeur</th>
                      </tr>
                    </thead>
                    <tbody>
                      {entriesWithDiff
                        .sort((a, b) => Math.abs(b.diffValue) - Math.abs(a.diffValue))
                        .map(({ entry, ing, theoretical, diff, diffValue }) => (
                          <tr key={entry.articleId} style={{ borderTop: '1px solid ' + palette.rule }}>
                            <td style={{ padding: '6px 0' }}>{ing.name}</td>
                            <td style={{ textAlign: 'right', padding: '6px 8px', color: palette.inkSoft, fontFamily: 'Fraunces, serif' }}>
                              {theoretical.toFixed(2)} {ing.unit}
                            </td>
                            <td style={{ textAlign: 'right', padding: '6px 8px', fontFamily: 'Fraunces, serif', fontWeight: 600 }}>
                              {entry.quantity.toFixed(2)} {ing.unit}
                            </td>
                            <td
                              style={{
                                textAlign: 'right',
                                padding: '6px 8px',
                                fontFamily: 'Fraunces, serif',
                                color: Math.abs(diff) < 0.01 ? palette.inkSoft : diff < 0 ? palette.wine : palette.amber,
                                fontWeight: 600,
                              }}
                            >
                              {diff > 0 ? '+' : ''}{diff.toFixed(2)}
                            </td>
                            <td
                              style={{
                                textAlign: 'right',
                                padding: '6px 0',
                                fontFamily: 'Fraunces, serif',
                                color: Math.abs(diffValue) < 0.5 ? palette.inkSoft : diffValue < 0 ? palette.wine : palette.amber,
                                fontWeight: 600,
                              }}
                            >
                              {diffValue > 0 ? '+' : ''}{formatEuro(diffValue)}
                            </td>
                          </tr>
                        ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   ALERTS VIEW (step 5B)
// ═══════════════════════════════════════════════════════════════════════════
//
// Dedicated tab for stock-low + price-trend alerts. Per Q5 = A there's only
// one severity bucket — the list order reflects urgency (empty stocks first,
// then lowest coverage, then biggest price deltas).
//
// Q6 = A: there's no "mark as resolved" button. Saving a purchase that brings
// stock back up auto-resolves the alert because it disappears from the list
// on the next memo recalculation.

function AlertsView({ context }) {
  const { alertsIndex, articles, setArticles, sales, alertSettings, setAlertSettings, purchases } = context;
  const [editingThresholdId, setEditingThresholdId] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const phase1Mode = sales.length === 0;

  // ─── Filters ────────────────────────────────────────────────────────────
  const [filterType, setFilterType] = useState('all');
  const [filterCategory, setFilterCategory] = useState('all');
  const [filterSeverity, setFilterSeverity] = useState('all');
  const [filterSupplier, setFilterSupplier] = useState('all');

  const filterOptions = useMemo(() => {
    const categories = new Set();
    const suppliers = new Set();
    for (const a of alertsIndex) {
