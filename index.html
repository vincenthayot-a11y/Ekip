/* Lit le formulaire de saisie et enregistre dans S.daily + S.real. */
function saveSaisieForm(box, d) {
  const form = document.getElementById('saisie-form');
  if (!form) return;
  pushUndo();

  const dd = getDaily(S.y, S.m, d) || emptyDaily();
  const getNum = (id) => {
    const el = document.getElementById(id);
    if (!el || el.value === '') return null;
    const v = parseFloat(el.value);
    return isNaN(v) ? null : v;
  };

  dd.fdcVeille = getNum('fdcVeille');
  dd.fdcJour = getNum('fdcJour');

  // CA par serveur + calcul automatique du CA total et des couverts
  dd.serveurs = {};
  let totCa = 0, totCv = 0, hasCa = false, hasCv = false;
  S.emps.forEach(e => {
    const ca = getNum('sv_ca_' + e.id);
    const cv = getNum('sv_cv_' + e.id);
    if (ca != null || cv != null) {
      dd.serveurs[e.id] = { ca: ca, couv: cv };
      if (ca != null) { totCa += ca; hasCa = true; }
      if (cv != null) { totCv += cv; hasCv = true; }
    }
  });
  dd.ca = hasCa ? totCa : null;
  dd.couv = hasCv ? totCv : null;

  // Persiste la liste des présents (si modifiée)
  if (Array.isArray(saisieCtx()._presentIds)) {
    dd.presentIds = saisieCtx()._presentIds.slice();
  }

  dd.clyo = {
    esp: getNum('clyo_esp'), cb: getNum('clyo_cb'), amex: getNum('clyo_amex'),
    chq: getNum('clyo_chq'), ancv: getNum('clyo_ancv'), vrmnt: getNum('clyo_vrmnt'),
    vad: getNum('clyo_vad'), cbanque: getNum('clyo_cbanque'), cpt: getNum('clyo_cpt'),
    encaisser: getNum('clyo_encaisser'), bons: getNum('clyo_bons'),
    credit: getNum('clyo_credit'), acompte: getNum('clyo_acompte'),
    depenses: getNum('clyo_depenses')
  };
  dd.reel = {
    esp: getNum('reel_esp'), cb: getNum('reel_cb'), amex: getNum('reel_amex'),
    chq: getNum('reel_chq'), ancv: getNum('reel_ancv'), vrmnt: getNum('reel_vrmnt'),
    vad: getNum('reel_vad'), cbanque: getNum('reel_cbanque'), cpt: getNum('reel_cpt'),
    encaisser: getNum('reel_encaisser'), bons: getNum('reel_bons'),
    credit: getNum('reel_credit'), acompte: getNum('reel_acompte'),
    depenses: getNum('reel_depenses')
  };

  // Annotations + statut sur Crédit et Bons cadeaux
  const noteOf = (k) => {
    const ni = document.getElementById('encnote_' + k);
    const pi = document.getElementById('encpaid_' + k);
    if (!ni && !pi) return null;
    const note = ni ? ni.value.trim() : '';
    const paid = pi ? pi.checked : false;
    if (!note && !paid) return null;
    return { note: note, paid: paid };
  };
  const ne = {};
  ['credit', 'bons'].forEach(k => { const v = noteOf(k); if (v) ne[k] = v; });
  if (Object.keys(ne).length) dd.notesEnc = ne;
  else if (dd.notesEnc) delete dd.notesEnc;

  const obsEl = document.getElementById('saisie_obs');
  dd.obs = obsEl ? obsEl.value : '';

  setDaily(S.y, S.m, d, dd);

  // Heures réelles : lues depuis les champs texte libres (parsées en minutes).
  // Pas de service de nuit : un départ ≤ arrivée = pas de total (saisie à revoir).
  S.emps.forEach(e => {
    const arrEl = document.getElementById('hr_arr_' + e.id);
    const depEl = document.getElementById('hr_dep_' + e.id);
    if (!arrEl && !depEl) return;
    const arr = readTimeField(arrEl);
    const dep = readTimeField(depEl);
    if (arr != null || dep != null) {
      const total = (arr != null && dep != null && dep > arr) ? dep - arr : null;
      const prev = getReal(S.y, S.m, d, e.id) || {};
      setReal(S.y, S.m, d, e.id, {
        arr: arr, dep: dep, total: total, note: prev.note || '',
        sect: prev.sect || null
      });
    }
  });

  save();
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL — 📊 Synthèse mensuelle (CA, couverts, heures réelles, encaissements)
   ───────────────────────────────────────────────────────────────────────────
   Vue récapitulative pour la RH : totaux du mois + heures réelles cumulées
   par salarié (vs contrat) + écart caisse Clyo/Réel. Exportable en texte/CSV.
   ═══════════════════════════════════════════════════════════════════════════ */

function mSaisieSynth(box) {
  box.classList.add('mo--wide');
  mHdr(box, '📊 Synthèse — ' + MN[S.m] + ' ' + S.y);

  const D = dim(S.y, S.m);

  // ── Agrégats du mois ──────────────────────────────────────────────────────
  let totCA = 0, totCouv = 0, totClyo = 0, totReel = 0, nbJours = 0;
  let totDepenses = 0;
  for (let d = 1; d <= D; d++) {
    const dd = getDaily(S.y, S.m, d);
    if (!dd) continue;
    if (dayHasDaily(S.y, S.m, d)) nbJours++;
    if (dd.ca) totCA += dd.ca;
    if (dd.couv) totCouv += dd.couv;
    totClyo += totalClyo(dd);
    totReel += totalReel(dd);
    if (dd.reel && dd.reel.depenses) totDepenses += dd.reel.depenses;
  }
  const ecartGlobal = totReel - totClyo;
  const ticketMoyen = totCouv ? (totCA / totCouv) : 0;

  // ── Cartes KPI ────────────────────────────────────────────────────────────
  const kpis = document.createElement('div');
  kpis.className = 'recap-kpis synth-kpis';
  kpis.innerHTML =
    '<div class="kpi"><div class="kpi-val">' + fmtEur(totCA) +
      '</div><div class="kpi-lbl">CA du mois</div></div>' +
    '<div class="kpi"><div class="kpi-val">' + totCouv +
      '</div><div class="kpi-lbl">Couverts</div></div>' +
    '<div class="kpi"><div class="kpi-val">' + ticketMoyen.toFixed(1) +
      ' €</div><div class="kpi-lbl">Ticket moyen</div></div>' +
    '<div class="kpi"><div class="kpi-val">' + nbJours +
      '</div><div class="kpi-lbl">Jours saisis</div></div>' +
    '<div class="kpi"><div class="kpi-val" style="color:' +
      (Math.abs(ecartGlobal) < 1 ? 'var(--success)'
        : Math.abs(ecartGlobal) < 50 ? 'var(--warn)' : 'var(--danger)') +
      '">' + (ecartGlobal >= 0 ? '+' : '') + fmtEur(ecartGlobal) +
      '</div><div class="kpi-lbl">Écart caisse</div></div>';
  box.appendChild(kpis);

  // ── Tableau heures réelles par salarié ───────────────────────────────────
  const h1 = document.createElement('div');
  h1.className = 'synth-section-title';
  h1.textContent = '⏱ Heures réelles cumulées (pour la RH)';
  box.appendChild(h1);

  const scroll1 = document.createElement('div');
  scroll1.className = 'recap-scroll';
  let rows1 = '';
  const empHours = {};
  for (let d = 1; d <= D; d++) {
    S.emps.forEach(e => {
      const r = getReal(S.y, S.m, d, e.id);
      if (r && r.total) {
        empHours[e.id] = (empHours[e.id] || 0) + r.total;
      }
    });
  }
  const sortedEmps = S.emps.slice().filter(e => empHours[e.id])
    .sort((a, b) => (empHours[b.id] || 0) - (empHours[a.id] || 0));

  sortedEmps.forEach(e => {
    const mins = empHours[e.id] || 0;
    const hReal = mins / 60;
    const diff = hReal - e.h;
    const col = eColor(e.id);
    const diffColor = diff >= 0 ? 'var(--success)' : 'var(--danger)';
    rows1 +=
      '<tr>' +
        "<td class='synth-name'><span class='emp-dot' style='background:" +
          col.bg + ';border:2px solid ' + col.text + "'></span>" + e.n + '</td>' +
        '<td>' + (e.s === 'cuisine' ? '🍳' : '🍽') + '</td>' +
        '<td style="text-align:right">' + hReal.toFixed(1) + 'h</td>' +
        '<td style="text-align:right;color:var(--text-3)">' + e.h + 'h</td>' +
        '<td style="text-align:right;font-weight:700;color:' + diffColor + '">' +
          (diff >= 0 ? '+' : '') + diff.toFixed(1) + 'h</td>' +
      '</tr>';
  });

  if (!rows1) {
    rows1 = '<tr><td colspan="5" style="text-align:center;color:var(--text-3);' +
      'padding:1rem">Aucune heure réelle saisie ce mois.</td></tr>';
  }

  scroll1.innerHTML =
    '<table class="recap-table synth-table">' +
      '<thead><tr><th>Salarié</th><th>Sec.</th>' +
      '<th style="text-align:right">Réel</th>' +
      '<th style="text-align:right">Contrat</th>' +
      '<th style="text-align:right">Écart</th></tr></thead>' +
      '<tbody>' + rows1 + '</tbody>' +
    '</table>';
  box.appendChild(scroll1);

  // ── Tableau PAIE : heures sup + prime couvert (pour la fin de mois) ───────
  const hPaie = document.createElement('div');
  hPaie.className = 'synth-section-title';
  hPaie.textContent = '💰 Paie du mois — heures sup. & prime couvert';
  box.appendChild(hPaie);

  const scrollP = document.createElement('div');
  scrollP.className = 'recap-scroll';
  let rowsP = '';
  let totHS = 0, totPrime = 0;

  S.emps.slice()
    .filter(e => {
      const hs = empHeuresSup(S.y, S.m, e.id);
      const prime = empPrimeCouvert(S.y, S.m, e.id);
      return hs.montant > 0 || prime > 0 || hs.hs > 0;
    })
    .sort((a, b) => a.s === b.s ? 0 : (a.s === 'cuisine' ? -1 : 1))
    .forEach(e => {
      const hsObj = empHeuresSup(S.y, S.m, e.id);
      const prime = empPrimeCouvert(S.y, S.m, e.id);
      totHS += hsObj.montant;
      totPrime += prime;
      const col = eColor(e.id);
      const primeLabel = (e.primeCouv === 'juliette') ? ' ★' : '';
      rowsP +=

/* Formate un montant en euros sans décimales inutiles. */
function fmtEur(v) {
  if (!v) return '0 €';
  return Math.round(v).toLocaleString('fr-FR') + ' €';
}

/* Construit un résumé texte du mois (pour copier-coller vers la RH). */
function buildSynthText(y, m) {
  const D = dim(y, m);
  let totCA = 0, totCouv = 0;
  const empHours = {};
  for (let d = 1; d <= D; d++) {
    const dd = getDaily(y, m, d);
    if (dd) {
      if (dd.ca) totCA += dd.ca;
      if (dd.couv) totCouv += dd.couv;
    }
    S.emps.forEach(e => {
      const r = getReal(y, m, d, e.id);
      if (r && r.total) empHours[e.id] = (empHours[e.id] || 0) + r.total;
    });
  }

  let txt = 'SYNTHÈSE ' + MN[m].toUpperCase() + ' ' + y + '\n';
  txt += '═══════════════════════════════\n\n';
  txt += 'CA du mois     : ' + fmtEur(totCA) + '\n';
  txt += 'Couverts       : ' + totCouv + '\n';
  txt += 'Ticket moyen   : ' + (totCouv ? (totCA / totCouv).toFixed(2) : '0') + ' €\n\n';
  txt += 'HEURES RÉELLES PAR SALARIÉ\n';
  txt += '───────────────────────────────\n';

  S.emps.slice()
    .filter(e => empHours[e.id])
    .sort((a, b) => (empHours[b.id] || 0) - (empHours[a.id] || 0))
    .forEach(e => {
      const hReal = (empHours[e.id] || 0) / 60;
      const diff = hReal - e.h;
      txt += e.n.padEnd(16) + ' : ' + hReal.toFixed(1) + 'h ' +
        '(contrat ' + e.h + 'h, ' + (diff >= 0 ? '+' : '') +
        diff.toFixed(1) + 'h)\n';
    });

  // Heures sup + primes couvert
  txt += '\nHEURES SUP. & PRIME COUVERT\n';
  txt += '───────────────────────────────\n';
  let totHS = 0, totPrime = 0;
  S.emps.slice()
    .filter(e => {
      const hs = empHeuresSup(y, m, e.id);
      const pr = empPrimeCouvert(y, m, e.id);
      return hs.montant > 0 || pr > 0 || hs.hs > 0;
    })
    .forEach(e => {
      const hs = empHeuresSup(y, m, e.id);
      const pr = empPrimeCouvert(y, m, e.id);
      totHS += hs.montant; totPrime += pr;
      let line = e.n.padEnd(16) + ' : ';
      if (hs.hs > 0) line += hs.hs.toFixed(1) + 'h sup = ' + fmtEur(hs.montant);
      if (pr > 0) line += (hs.hs > 0 ? ' | ' : '') + 'prime ' + fmtEur(pr);
      txt += line + '\n';
    });
  txt += '\nTotal heures sup : ' + fmtEur(totHS) + '\n';
  txt += 'Total primes     : ' + fmtEur(totPrime) + '\n';

  return txt;
}

   MODAL — 📸 Pointage par photo + IA (étape 1 : choix jour + upload)

  box.appendChild(p);

  // ── Choix du jour ────────────────────────────────────────────────────────

    opt.value = d;
    opt.textContent = d + ' ' + MN[S.m] + ' ' + S.y + ' — ' +

    if (d === todayD) opt.selected = true;
    select.appendChild(opt);
  }
  box.appendChild(select);

  // ── Avertissement clé API manquante ─────────────────────────────────────
  if (!_aiKey) {
    const w = document.createElement('div');
    w.className = 'pointage-no-key';
    w.innerHTML =
      "⚠ Clé API Anthropic requise. Ouvre l'assistant IA (bouton violet " +
      'en bas) puis clique 🔑 API.';
    box.appendChild(w);
  }

  // ── Zone de drop / upload ────────────────────────────────────────────────
  const lbl2 = document.createElement('div');
  lbl2.className = 'lbl';
  lbl2.textContent = 'Photo ou PDF de la feuille';
  box.appendChild(lbl2);

  const drop = document.createElement('div');
  drop.className = 'pointage-drop';
  drop.innerHTML =
    "<div class='pointage-drop-icon'>📄</div>" +
    "<div class='pointage-drop-label'>" +
      'Cliquer pour choisir un fichier<br>' +
      "<span class='pointage-drop-hint'>" +
      'ou glisser-déposer ici · JPG / PNG / PDF / HEIC</span>' +
    '</div>';

  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/*,application/pdf';
  fileInput.style.display = 'none';

  drop.onclick = () => { fileInput.click(); };
  drop.ondragover = (e) => {
    e.preventDefault();
    drop.classList.add('pointage-drop--hover');
  };
  drop.ondragleave = () => {
    drop.classList.remove('pointage-drop--hover');
  };
  drop.ondrop = (e) => {
    e.preventDefault();
    drop.classList.remove('pointage-drop--hover');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  };
  fileInput.onchange = () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  };
  box.appendChild(drop);
  box.appendChild(fileInput);

  // Gère le fichier uploadé : conversion → appel IA
  function handleFile(file) {
    if (!_aiKey) {
      toast("Configure d'abord la clé API", 'err');
      return;
    }
    const day = parseInt(select.value, 10);
    drop.innerHTML =
      "<div class='pointage-drop-icon'>⏳</div>" +
      "<div class='pointage-drop-progress'>Préparation de l'image...<br>" +
      "<span class='pointage-drop-hint'>Conversion + envoi à l'IA</span></div>";

    const nm = (file.name || '').toLowerCase();
    const isPdf = file.type === 'application/pdf' || nm.endsWith('.pdf');
    if (isPdf) {
      toast('PDF non supporté pour l\'instant — convertis-le en image', 'err');
      drop.innerHTML =
        "<div class='pointage-drop-icon'>📄</div>" +
        "<div class='pointage-drop-label'>Cliquer pour choisir un fichier</div>";
      return;
    }

    convertImageToJpeg(file, (b64) => {
      if (!b64) {
        toast("Format d'image non supporté par le navigateur (HEIC?). " +
          'Essaye un JPG/PNG.', 'err');
        drop.innerHTML =
          "<div class='pointage-drop-icon'>📄</div>" +
          "<div class='pointage-drop-label'>Cliquer pour choisir un fichier</div>";
        return;
      }
      drop.innerHTML =
        "<div class='pointage-drop-icon'>🤖</div>" +
        "<div class='pointage-drop-progress'>Lecture par l'IA en cours...<br>" +
        "<span class='pointage-drop-hint'>5 à 10 secondes</span></div>";
      callPointageAI(b64, 'image/jpeg', day);
    });
  }

  // Convertit n'importe quelle image (HEIC, PNG, etc.) en JPEG base64
  function convertImageToJpeg(file, callback) {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      // Redimensionnement si trop grand (max 2000px côté long)
      const MAX = 2000;
      let w = img.naturalWidth;
      let h = img.naturalHeight;
      if (w > MAX || h > MAX) {
        if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
        else        { w = Math.round(w * MAX / h); h = MAX; }
      }
      const cv = document.createElement('canvas');
      cv.width = w;
      cv.height = h;
      const ctx = cv.getContext('2d');
      // Fond blanc sous l'image (utile si PNG transparent)
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      try {
        const dataUrl = cv.toDataURL('image/jpeg', 0.85);
        URL.revokeObjectURL(url);
        callback(dataUrl.split(',')[1]);
      } catch (e) {
        URL.revokeObjectURL(url);
        callback(null);
      }
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      callback(null);
    };
    img.src = url;
  }

  const foot = document.createElement('div');
  foot.className = 'modal-foot';
  foot.appendChild(mBtn('Annuler', false, closeModal));
  box.appendChild(foot);
}

/* Appel API Claude avec la photo en base64 pour extraire les horaires.
   Bascule vers mPointageReview avec les lignes extraites. */
function callPointageAI(b64, mediaType, day) {
  const systemPrompt =
    'Tu es un assistant qui lit des feuilles de présence manuscrites de ' +
    'restaurant. Extrais UNIQUEMENT les noms des salariés et leurs heures ' +
    "de travail (arrivée et départ). Ignore tout le reste : CA, couverts, " +
    'paiements, totaux, observations, dates. Si une heure est ambiguë ou ' +
    'illisible, mets null. Réponds UNIQUEMENT avec un JSON valide, sans ' +
    'texte avant ni après, sans backticks, au format :\n' +
    '{"entries":[{"name":"NOM LU","arr":"HH:MM","dep":"HH:MM",' +
    '"note":"texte si cas particulier ou null"}]}\n' +
    "Format des heures : 24h sur 'HH:MM' (ex: '08:00', '15:30'). " +
    "Si tu vois plusieurs créneaux pour une personne (ex: '11h30+15h45'), " +
    'mets le premier en arr/dep et explique dans note.';

  const userContent = [
    { type: 'image',
      source: { type: 'base64', media_type: mediaType, data: b64 } },
    { type: 'text',
      text: 'Lis cette feuille de présence et extrais les noms et ' +
            'horaires de chaque salarié. Réponds en JSON.' }
  ];

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': _aiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 2048,
      system: systemPrompt,
      messages: [{ role: 'user', content: userContent }]
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) {
      toast('Erreur IA: ' + data.error.message, 'err');
      S.modal = { type: 'pointage_pick' };
      render();
      return;
    }
    let txt = (data.content && data.content[0] && data.content[0].text) || '';
    txt = txt.replace(/```json|```/g, '').trim();

    let json = null;
    try { json = JSON.parse(txt); }
    catch (e) {
      // Tentative d'extraction d'un bloc JSON (parfois du texte autour)
      const m = txt.match(/\{[\s\S]*\}/);
      if (m) { try { json = JSON.parse(m[0]); } catch (e2) { /* silencieux */ } }
    }

    if (!json || !json.entries) {
      toast('Lecture impossible — réessaye', 'err');
      S.modal = { type: 'pointage_pick' };
      render();
      return;
    }

    // Préparer les lignes pour validation
    const rows = json.entries.map(e => {
      const emp = matchEmp(e.name);
      const arr = parseTime(e.arr);
      const dep = parseTime(e.dep);
      const total = (arr !== null && dep !== null) ? (dep - arr) : null;
      return {
        nameRead: e.name || '?',
        empId:    emp ? emp.id : null,
        arr, dep, total,
        note: e.note || '',
        keep: true
      };
    });

    S.modal = { type: 'pointage_review', day, rows };
    const plural = rows.length > 1;
    toast('Lecture terminée — ' + rows.length + ' entrée' +
      (plural ? 's' : '') + ' détectée' + (plural ? 's' : ''), 'ok');
    render();
  })
  .catch(() => {
    toast('Erreur réseau', 'err');
    S.modal = { type: 'pointage_pick' };
    render();
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL — 📋 Pointage (étape 2 : validation + comparaison au planning)
   ───────────────────────────────────────────────────────────────────────────
   Affiche un tableau éditable avec pour chaque ligne lue :
   - checkbox pour garder/ignorer
   - nom tel que lu par l'IA (info uniquement)
   - select employé associé (corrigeable)
   - champs arrivée/départ éditables
   - total calculé
   - statut vs planning : "prévu", "imprévu" ou "non reconnu"

   Bas du modal :
   - liste des prévus absents de la feuille (seront retirés du planning)
   - rappel des imprévus (à assigner manuellement ensuite)
   ═══════════════════════════════════════════════════════════════════════════ */

function mPointageReview(box) {
  const day = S.modal.day;
  const rows = S.modal.rows;
  mHdr(box, '📋 Validation du pointage — ' + day + ' ' + MN[S.m] + ' ' + S.y);

  // Calcul initial des écarts vs planning prévu
  function getPlanned() {
    const planned = {};
    for (let i = 0; i < AP.length; i++) {
      const eid = getSlot(day, AP[i].c);
      if (eid !== null) {
        if (!planned[eid]) planned[eid] = [];
        planned[eid].push(AP[i].c);
      }
    }
    return planned;
  }
  const planned = getPlanned();
  const presentIds = {};
  rows.forEach(r => { if (r.empId && r.keep) presentIds[r.empId] = 1; });
  // Salariés prévus mais absents de la feuille
  const noShows = [];
  Object.keys(planned).forEach(eid => {
    if (!presentIds[eid]) noShows.push(parseInt(eid, 10));
  });

  box.classList.add('pointage-review-box');

  const info = document.createElement('div');
  info.className = 'pointage-info';
  info.innerHTML =
    '✏️ Tu peux modifier les heures et le salarié associé. Décoche pour ' +
    'ignorer une ligne. Les changements seront appliqués au planning et ' +
    'stockés en heures réelles.';
  box.appendChild(info);

  // ── Tableau des lignes lues ──────────────────────────────────────────────
  const lblP = document.createElement('div');
  lblP.className = 'lbl pointage-table-label';
  lblP.textContent = 'Heures lues sur la feuille';
  box.appendChild(lblP);

  const tbl = document.createElement('table');
  tbl.className = 'pointage-table';
  const th = document.createElement('thead');
  th.innerHTML =
    "<tr class='pointage-thead-row'>" +
      "<th class='pointage-th'>✓</th>" +
      "<th class='pointage-th'>Lu</th>" +
      "<th class='pointage-th'>Salarié</th>" +
      "<th class='pointage-th'>Arrivée</th>" +
      "<th class='pointage-th'>Départ</th>" +
      "<th class='pointage-th'>Total</th>" +
      "<th class='pointage-th'>Statut</th>" +
    '</tr>';
  tbl.appendChild(th);
  const tbody = document.createElement('tbody');
  tbl.appendChild(tbody);

  // Re-rendu du tableau (tous les champs éditables provoquent un refresh
  // pour mettre à jour total et statut)
  function refresh() {
    tbody.innerHTML = '';
    rows.forEach((r) => {
      const tr = document.createElement('tr');
      tr.className = 'pointage-row' + (!r.keep ? ' pointage-row--off' : '');

      // Checkbox "keep"
      const tdK = document.createElement('td');
      tdK.className = 'pointage-td';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = r.keep;
      cb.onchange = () => { r.keep = cb.checked; refresh(); };
      tdK.appendChild(cb);
      tr.appendChild(tdK);

      // Nom lu par l'IA (info)
      const tdN = document.createElement('td');
      tdN.className = 'pointage-td pointage-td--read';
      tdN.textContent = r.nameRead;
      tr.appendChild(tdN);

      // Sélecteur employé
      const tdE = document.createElement('td');
      tdE.className = 'pointage-td';
      const selE = document.createElement('select');
      selE.className = 'pointage-emp-select';
      const optNone = document.createElement('option');
      optNone.value = '';
      optNone.textContent = '— Aucun —';
      selE.appendChild(optNone);
      S.emps.slice().sort((a, b) => a.n.localeCompare(b.n)).forEach(e => {
        const o = document.createElement('option');
        o.value = e.id;
        o.textContent = e.n;
        if (r.empId === e.id) o.selected = true;
        selE.appendChild(o);
      });
      selE.onchange = () => {
        r.empId = selE.value ? parseInt(selE.value, 10) : null;
        refresh();
      };
      tdE.appendChild(selE);
      tr.appendChild(tdE);

      // Arrivée éditable
      const tdA = document.createElement('td');
      tdA.className = 'pointage-td pointage-td--time';
      const iA = document.createElement('input');
      iA.type = 'text';
      iA.value = r.arr !== null ? fmtMin(r.arr) : '';
      iA.placeholder = '8h00';
      iA.className = 'pointage-time-input';
      iA.onchange = () => {
        r.arr = parseTime(iA.value);
        r.total = (r.arr !== null && r.dep !== null) ? (r.dep - r.arr) : null;
        refresh();
      };
      tdA.appendChild(iA);
      tr.appendChild(tdA);

      // Départ éditable
      const tdD = document.createElement('td');
      tdD.className = 'pointage-td pointage-td--time';
      const iD = document.createElement('input');
      iD.type = 'text';
      iD.value = r.dep !== null ? fmtMin(r.dep) : '';
      iD.placeholder = '15h30';
      iD.className = 'pointage-time-input';
      iD.onchange = () => {
        r.dep = parseTime(iD.value);
        r.total = (r.arr !== null && r.dep !== null) ? (r.dep - r.arr) : null;
        refresh();
      };
      tdD.appendChild(iD);
      tr.appendChild(tdD);

      // Total calculé (en rouge si <= 0 = erreur)
      const tdT = document.createElement('td');
      tdT.className = 'pointage-td pointage-td--total';
      tdT.textContent = fmtDur(r.total);
      if (r.total !== null && r.total <= 0) {
        tdT.style.color = '#dc2626';
      }
      tr.appendChild(tdT);

      // Statut vs planning (prévu / imprévu / non reconnu)
      const tdS = document.createElement('td');
      tdS.className = 'pointage-td pointage-td--status';
      if (!r.empId) {
        tdS.innerHTML =
          "<span class='pointage-status pointage-status--unknown'>" +
          '? non reconnu</span>';
      } else if (planned[r.empId]) {
        tdS.innerHTML =
          "<span class='pointage-status pointage-status--ok'>" +
          '✓ prévu ' + planned[r.empId].join(',') + '</span>';
      } else {
        tdS.innerHTML =
          "<span class='pointage-status pointage-status--unplanned'>" +
          '+ imprévu</span>';
      }
      tr.appendChild(tdS);
      tbody.appendChild(tr);
    });
  }
  refresh();
  box.appendChild(tbl);

  // ── Section : prévus mais absents de la feuille ─────────────────────────
  if (noShows.length) {
    const lblA = document.createElement('div');
    lblA.className = 'lbl pointage-noshow-label';
    lblA.textContent =
      '⚠ Prévus mais absents de la feuille — seront retirés du planning';
    box.appendChild(lblA);

    const noBox = document.createElement('div');
    noBox.className = 'pointage-noshow-box';
    noShows.forEach(eid => {
      const e = findEmp(eid);
      if (!e) return;
      const posts = planned[eid].join(',');
      noBox.innerHTML +=
        "<span class='pointage-noshow-tag'>" + e.n +
        " <span class='pointage-noshow-posts'>(" + posts + ')</span></span>';
    });
    box.appendChild(noBox);
  }

  // ── Section : rappel des imprévus ───────────────────────────────────────
  const imprevus = rows.filter(r =>
    r.keep && r.empId && !planned[r.empId]);
  if (imprevus.length) {
    const lblI = document.createElement('div');
    lblI.className = 'lbl pointage-unplanned-label';
    lblI.textContent =
      "ℹ Présents imprévus — heures enregistrées, à toi d'assigner un poste ensuite";
    box.appendChild(lblI);
  }

  // ── Boutons ──────────────────────────────────────────────────────────────
  const foot = document.createElement('div');
  foot.className = 'modal-foot pointage-foot';
  const backBtn = mBtn('← Refaire la lecture', false, () => {
    S.modal = { type: 'pointage_pick' };
    render();
  });
  const rgrp = document.createElement('div');
  rgrp.className = 'pointage-foot-right';
  rgrp.appendChild(mBtn('Annuler', false, closeModal));
  rgrp.appendChild(mBtn('✓ Valider et appliquer', true, () => {
    applyPointage(day, rows, noShows);
  }));
  foot.appendChild(backBtn);
  foot.appendChild(rgrp);
  box.appendChild(foot);
}

/* Application des changements après validation :
   1. Retirer les "no-shows" du planning + marquer indisposition
   2. Enregistrer les heures réelles (S.real) pour les présents
   3. Détecter les imprévus (présents non prévus) pour toast de rappel */
function applyPointage(day, rows, noShows) {
  pushUndo();
  const changes = { real: 0, removed: 0, unprev: [] };

  // 1. Retirer les no-shows du planning + marquer comme indispo
  noShows.forEach(eid => {
    for (let i = 0; i < AP.length; i++) {
      const pc = AP[i].c;
      if (getSlot(day, pc) === eid) {
        // Retrait direct (pushUndo déjà fait)
        const k = mk();
        if (S.pl[k] && S.pl[k][String(day)]) S.pl[k][String(day)][pc] = null;
        changes.removed++;
      }
    }
    // Marquer comme indisponibilité non prévue pour traçabilité
    const ki = mk();
    if (!S.ind[ki]) S.ind[ki] = {};
    if (!S.ind[ki][eid]) S.ind[ki][eid] = [];
    if (S.ind[ki][eid].indexOf(day) < 0) S.ind[ki][eid].push(day);
  });

  // 2. Enregistrer les heures réelles + détecter imprévus
  rows.forEach(r => {
    if (!r.keep || !r.empId || r.total === null || r.total <= 0) return;
    setReal(S.y, S.m, day, r.empId, {
      arr: r.arr, dep: r.dep, total: r.total, note: r.note || ''
    });
    changes.real++;
    // Présent imprévu = pas dans le planning prévu
    let isPlanned = false;
    for (let i = 0; i < AP.length; i++) {
      if (getSlot(day, AP[i].c) === r.empId) { isPlanned = true; break; }
    }
    if (!isPlanned) changes.unprev.push(r.empId);
  });

  save();
  closeModal();
  render();

  // Résumé utilisateur
  let msg = '✓ ' + changes.real + ' pointage' +
    (changes.real > 1 ? 's' : '') +
    ' enregistré' + (changes.real > 1 ? 's' : '');
  if (changes.removed) {
    msg += ' · ' + changes.removed + ' retiré' +
      (changes.removed > 1 ? 's' : '') + ' du planning';
  }
  if (changes.unprev.length) {
    msg += ' · ' + changes.unprev.length + ' imprévu' +
      (changes.unprev.length > 1 ? 's' : '');
  }
  toast(msg, 'ok', 5000);
  if (changes.unprev.length) {
    const names = changes.unprev.map(id => eName(id)).join(', ');
    setTimeout(() => {
      toast('À assigner manuellement : ' + names, 'warn2', 6000);
    }, 700);
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL — 💰 Récap paie mensuel
   ───────────────────────────────────────────────────────────────────────────
   Affiche pour chaque salarié :
   - contrat mensuel (heures)
   - jours pointés (S.real)
   - total d'heures réelles pointées
   - écart vs contrat (+/- en heures)
   - heures supplémentaires (max(0, écart))
   Bandeau en haut : nb de jours pointés / nb de jours du mois
   Section repliable : liste des jours non pointés (cliquable → ouvre pointage)
   ═══════════════════════════════════════════════════════════════════════════ */

function mPaie(box) {
  mHdr(box, '💰 Récap paie — ' + MN[S.m] + ' ' + S.y);
  box.classList.add('paie-box');

  const D = dim(S.y, S.m);
  let pointedDays = 0;
  for (let d = 1; d <= D; d++) {
    if (dayHasReal(S.y, S.m, d)) pointedDays++;
  }
  const unpointedDays = D - pointedDays;

  // ── Bandeau état global ──────────────────────────────────────────────────
  const head = document.createElement('div');
  head.className = 'paie-head';
  const statusBadge = unpointedDays
    ? "<div class='paie-head-warn'>⚠ " + unpointedDays + ' jour' +
      (unpointedDays > 1 ? 's' : '') + ' non pointé' +
      (unpointedDays > 1 ? 's' : '') + '</div>'
    : "<div class='paie-head-ok'>✓ Mois complet</div>";
  head.innerHTML =
    '<div>' +
      "<div class='paie-head-title'>Pointages enregistrés</div>" +
      "<div class='paie-head-count'>" +
        pointedDays + ' / ' + D + ' jours</div>' +
    '</div>' + statusBadge;
  box.appendChild(head);

  // ── Tableau récap par salarié ────────────────────────────────────────────
  const tbl = document.createElement('table');
  tbl.className = 'paie-table';
  const th = document.createElement('thead');
  th.innerHTML =
    "<tr class='paie-thead-row'>" +
      "<th class='paie-th paie-th--name'>Salarié</th>" +
      "<th class='paie-th'>Contrat</th>" +
      "<th class='paie-th'>Heures réelles</th>" +
      "<th class='paie-th'>Écart</th>" +
      "<th class='paie-th'>HS / Extra</th>" +
      "<th class='paie-th'>Prime couvert</th>" +
      "<th class='paie-th paie-th--total'>À payer</th>" +
    '</tr>';
  tbl.appendChild(th);

  const tb = document.createElement('tbody');
  const monthKey = S.y + '-' + String(S.m + 1).padStart(2, '0');
  const rk = S.real[monthKey] || {};
  let totExtra = 0, totPrime = 0, totDu = 0;

  S.emps.slice().sort((a, b) => a.n.localeCompare(b.n)).forEach((e, idx) => {
    let totalMin = 0, joursCount = 0;
    // Parcourir tous les jours pointés du mois pour cet employé
    Object.keys(rk).forEach(dd => {
      const rec = rk[dd][e.id];
      if (rec && rec.total) {
        totalMin += rec.total;
        joursCount++;
      }
    });
    const totalH = totalMin / 60;
    const contrat = e.h || 0;
    const ecart = totalH - contrat;
    const sup = Math.max(0, ecart);
    const col = eColor(e.id);

    // Montants en € :
    //  - extra  : salaire = heures réelles × taux horaire
    //  - contrat ≤ 100h : heures sup payées mensuellement (incluses au total)
    //  - contrat > 100h : heures sup reportées fin d'année (non payées ici)
    const isExtra = (e.t || 'contrat') === 'extra';
    const hsInfo = empHeuresSup(S.y, S.m, e.id);   // montant=0 si contrat>100h
    const extraInfo = empSalaireExtra(S.y, S.m, e.id);
    const primeMontant = empPrimeCouvert(S.y, S.m, e.id);
    // Colonne "Salaire extra" : montant pour les extras uniquement
    const salaireExtra = isExtra ? extraInfo.montant : 0;
    // HS mensuelle payable (petits contrats) ajoutée au total sans colonne
    const hsPayable = (!isExtra && hsInfo.payableMensuel) ? hsInfo.montant : 0;
    const aPayer = salaireExtra + hsPayable + primeMontant;
    totExtra += salaireExtra + hsPayable;
    totPrime += primeMontant;
    totDu += aPayer;

    const tr = document.createElement('tr');
    tr.className = 'paie-row' + (idx % 2 ? ' paie-row--alt' : '');

    const dotStyle =
      'background:' + col.bg + ';border:1.5px solid ' + col.text + ';';
    const ecartColor = ecart > 0 ? '#15803d'
                     : ecart < 0 ? '#dc2626'
                     : '#9ca3af';

    // Colonne variable : extra → salaire extra ; petit contrat → heures sup
    // payées ce mois. Les gros contrats (HS reportée) affichent —.
    let extraTxt = '—';
    if (isExtra && extraInfo.heures > 0) {
      extraTxt = extraInfo.heures.toFixed(1) + 'h'
        + (extraInfo.montant > 0 ? ' · ' + fmtEur(extraInfo.montant) : '');
    } else if (!isExtra && hsInfo.payableMensuel && hsInfo.hs > 0) {
      extraTxt = '+' + hsInfo.hs.toFixed(1) + 'h'
        + (hsInfo.montant > 0 ? ' · ' + fmtEur(hsInfo.montant) : '');
    }
    const extraColor = (salaireExtra > 0 || hsPayable > 0)
      ? '#7c3aed' : '#d1d5db';
    const primeTxt = primeMontant > 0
      ? fmtEur(primeMontant) + " <span style='font-size:10px;opacity:.5'>(détail)</span>"
      : '—';
    const duTxt = aPayer > 0 ? "<b>" + fmtEur(aPayer) + '</b>' : '—';
    const typeBadge = isExtra
      ? " <span style='font-size:9px;color:#92400e;background:#fef3c7;" +
        "padding:1px 5px;border-radius:8px;font-weight:700'>EXTRA</span>"
      : '';

    tr.innerHTML =
      "<td class='paie-td paie-td--name'>" +
        "<span class='emp-dot emp-dot--sm' style='" + dotStyle + "'></span>" +
        e.n + typeBadge +
      '</td>' +
      "<td class='paie-td paie-td--contrat'>" + contrat + 'h</td>' +
      "<td class='paie-td paie-td--hours'>" +
        (totalMin ? fmtDur(totalMin) : '—') + '</td>' +
      "<td class='paie-td paie-td--ecart' style='color:" + ecartColor + "'>" +
        (totalMin ? (ecart > 0 ? '+' : '') + ecart.toFixed(1) + 'h' : '—') +
      '</td>' +
      "<td class='paie-td paie-td--sup' style='color:" + extraColor + "'>" +
        extraTxt + '</td>' +
      "<td class='paie-td paie-cell-prime' style='color:#0369a1" +
        (primeMontant > 0 ? ';cursor:pointer' : '') + "'>" + primeTxt + '</td>' +
      "<td class='paie-td paie-td--total'>" + duTxt + '</td>';
    if (primeMontant > 0) {
      const primeCell = tr.querySelector('.paie-cell-prime');
      primeCell.title = 'Voir le détail du calcul';
      primeCell.onclick = ((eid, nom) => () => {
        showPrimeDetail(eid, nom);
      })(e.id, e.n);
    }
    tb.appendChild(tr);
  });
  tbl.appendChild(tb);

  // Ligne de total général (heures sup + prime + à payer)
  const tf = document.createElement('tfoot');
  tf.innerHTML =
    "<tr class='paie-foot-row'>" +
      "<td class='paie-td paie-td--name'><b>Total</b></td>" +
      "<td class='paie-td'></td>" +
      "<td class='paie-td'></td>" +
      "<td class='paie-td'></td>" +
      "<td class='paie-td paie-td--sup'><b>" +
        (totExtra > 0 ? fmtEur(totExtra) : '—') + '</b></td>' +
      "<td class='paie-td' style='color:#0369a1'><b>" +
        (totPrime > 0 ? fmtEur(totPrime) : '—') + '</b></td>' +
      "<td class='paie-td paie-td--total'><b>" +
        (totDu > 0 ? fmtEur(totDu) : '—') + '</b></td>' +
    '</tr>';
  tbl.appendChild(tf);
  box.appendChild(tbl);

  // Note explicative sur le calcul des montants
  const noteP = document.createElement('p');
  noteP.style.cssText = 'font-size:12px;color:#6b7280;margin:10px 2px 0';
  noteP.innerHTML =
    '« À payer » mensuel = pour un <b>extra</b> : heures réelles × taux ' +
    'horaire + prime couvert ; pour un <b>contrat ≤ 100h</b> : heures ' +
    'supplémentaires (× taux HS) + prime couvert. ' +
    'Pour les <b>contrats > 100h</b>, les heures supplémentaires ne sont ' +
    '<b>pas payées mensuellement</b> : elles sont régularisées en fin ' +
    'd\u2019année. Le salaire de base des contrats n\u2019est pas inclus. ' +
    'Renseigne le <b>taux horaire</b> (extra), le <b>taux HS</b> et la ' +
    '<b>prime couvert</b> dans 👥 Équipe pour des montants exacts.';
  box.appendChild(noteP);

  // ── Détail des jours non pointés (repliable, cliquable) ─────────────────
  if (unpointedDays) {
    const det = document.createElement('details');
    det.className = 'paie-details';
    const sm = document.createElement('summary');
    sm.className = 'paie-details-summary';
    sm.textContent = 'Voir les ' + unpointedDays + ' jour' +
      (unpointedDays > 1 ? 's' : '') + ' non pointé' +
      (unpointedDays > 1 ? 's' : '');
    det.appendChild(sm);

    const lst = document.createElement('div');
    lst.className = 'paie-unpointed-list';
    for (let d = 1; d <= D; d++) {
      if (!dayHasReal(S.y, S.m, d)) {
        const sp = document.createElement('span');
        sp.className = 'paie-unpointed-tag';
        sp.textContent = d + ' ' + DN[dow(S.y, S.m, d)];
        sp.onclick = ((dd) => () => {
          closeModal();
          S.modal = { type: 'pointage_pick' };
          setTimeout(() => {
            const sel = document.querySelector('.mo select');
            if (sel) sel.value = dd;
          }, 100);
          render();
        })(d);
        lst.appendChild(sp);
      }
    }
    det.appendChild(lst);
    box.appendChild(det);
  }

  const foot = document.createElement('div');
  foot.className = 'modal-foot--end-only';
  foot.appendChild(mBtn('Fermer', false, closeModal));
  box.appendChild(foot);
}

/* ═══════════════════════════════════════════════════════════════════════════
   ASSISTANT IA — conversation en langage naturel pour modifier le planning
   ───────────────────────────────────────────────────────────────────────────
   L'utilisateur parle en français ("Mets Julie sur Chaud mardi"), l'IA répond
   en texte ET peut inclure un bloc JSON d'actions structurées qui sont ensuite
   exécutées sur le state. Fallback gracieux si la clé API n'est pas configurée.

   Actions supportées :
     • assign        : affecter un salarié à un poste
     • remove        : libérer un poste
     • autogen       : générer (replace|fill)
     • absent/cp/maladie/pm : marquer des jours d'absence (pm = après-midi seulement)
     • remove_absent : lever une absence
   ═══════════════════════════════════════════════════════════════════════════ */

let _aiOpen = false;
let _aiHistory = [];
let _aiKey = localStorage.getItem('ai_key') || '';

/* Construit un contexte minimal (économie de tokens). On n'envoie que la
   semaine à venir pour garder un prompt compact. */
function buildContext() {
  const D = dim(S.y, S.m);
  let ctx = 'Assistant planning restaurant. ' +
    MN[S.m] + ' ' + S.y + ' (' + D + 'j).\n';
  ctx += 'Postes cuisine: ' +
    PC.map(p => p.c + '=' + p.l).join(',') + '\n';
  ctx += 'Postes salle: ' +
    PS.map(p => p.c + '=' + p.l).join(',') + '\n';
  ctx += 'Salariés: ' +
    S.emps.map(e => e.n + '(' + e.s[0] + ',' + e.h + 'h)').join(', ') +
    '\n';

  // Fenêtre de 7 jours à partir d'aujourd'hui (si le mois courant est affiché)
  const today = new Date();
  const todayD = today.getDate();
  const from = (today.getMonth() === S.m && today.getFullYear() === S.y)
    ? todayD : 1;
  const to = Math.min(from + 6, D);
  ctx += 'Planning j' + from + '-' + to + ': ';

  const rows = [];
  for (let d = from; d <= to; d++) {
    const slots = [];
    AP.forEach(p => {
      const eid = getSlot(d, p.c);
      if (eid !== null) slots.push(p.c + ':' + eName(eid));
    });
    if (slots.length) {
      rows.push(d + '(' + DN[dow(S.y, S.m, d)] + '):' + slots.join(','));
    }
  }
  ctx += rows.join(' | ') || 'vide';
  ctx +=
    '\nActions: assign{day,post,employee}, remove{day,post}, ' +
    'autogen{mode:replace|fill}, absent/cp/maladie/pm{employee,days:[]}, ' +
    'remove_absent{employee,days:[]}. ' +
    'IMPORTANT - distinction critique : ' +
    '"X est indisponible/absent/en CP/malade le J" → action absent/cp/maladie. ' +
    '"X est disponible/dispo/peut travailler/n\'est plus absent le J" → action remove_absent (supprimer toute absence). ' +
    'pm = "dispo après-midi seulement" : utilise quand l\'employé est disponible UNIQUEMENT l\'après-midi (matin = indispo). ' +
    'Les types absent/cp/maladie/pm sont exclusifs : marquer un jour dans un type retire les autres pour ce jour. ' +
    'Réponds en français, JSON dans ```json```.';
  return ctx;
}

/* Extrait un bloc JSON d'une réponse IA. Essaie d'abord le fenced ```json```,
   puis un fallback sur le premier tableau JSON trouvé. */
function parseAiActions(text) {
  let match = text.match(/```json([\s\S]*?)```/);
  if (!match) match = text.match(/\[[\s\S]*\]/);
  if (!match) return null;
  try {
    return JSON.parse(match[1] || match[0]);
  } catch (e) {
    return null;
  }
}

/* Exécute un tableau d'actions IA et retourne la liste des messages de
   confirmation. Chaque action modifie le state puis save()+render() à la fin. */
function executeActions(actions) {
  if (!Array.isArray(actions)) actions = [actions];
  const done = [];

  // Helper : trouve un employé par nom (case-insensitive) OU par id
  function findEmpByNameOrId(name, id) {
    return S.emps.filter(x =>
      (name && x.n.toLowerCase() === String(name).toLowerCase()) ||
      (x.id === id)
    )[0];
  }

  actions.forEach(a => {
    if (a.action === 'assign') {
      const e = findEmpByNameOrId(a.employee, a.employee_id);
      if (e && a.day && a.post) {
        setSlot(a.day, a.post, e.id);
        done.push('✓ ' + e.n + ' → ' + a.post + ' j.' + a.day);
      }
    } else if (a.action === 'remove') {
      if (a.day && a.post) {
        setSlot(a.day, a.post, null);
        done.push('✓ Retiré ' + a.post + ' j.' + a.day);
      }
    } else if (a.action === 'autogen') {
      autoGen(a.mode || 'fill');
      done.push('✓ Planning généré (' + (a.mode || 'fill') + ')');
    } else if (
      a.action === 'absent' || a.action === 'cp' || a.action === 'maladie' || a.action === 'pm'
    ) {
      const ae = findEmpByNameOrId(a.employee, a.employee_id);
      if (ae) {
        const k = mk();
        let days = [];
        if (a.days && Array.isArray(a.days)) days = a.days;
        else if (a.day) days = [a.day];

        if (days.length) {
          // Mutuelle exclusivité : retirer ces jours des autres types
          if (!S.ind[k]) S.ind[k] = {};
          if (!S.cp[k])  S.cp[k]  = {};
          if (!S.mal[k]) S.mal[k] = {};
          if (!S.pm[k])  S.pm[k]  = {};
          const otherTypes = ['ind','cp','mal','pm'].filter(t => {
            if (a.action === 'absent') return t !== 'ind';
            return t !== a.action;
          });
          otherTypes.forEach(t => {
            const tgt = (t === 'ind' ? S.ind : t === 'cp' ? S.cp : t === 'mal' ? S.mal : S.pm);
            if (tgt[k][ae.id]) {
              tgt[k][ae.id] = tgt[k][ae.id].filter(d => days.indexOf(d) < 0);
            }
          });

          // Dispatch vers la bonne collection selon le type
          if (a.action === 'cp') {
            if (!S.cp[k]) S.cp[k] = {};
            if (!S.cp[k][ae.id]) S.cp[k][ae.id] = [];
            days.forEach(d => {
              if (S.cp[k][ae.id].indexOf(d) < 0) S.cp[k][ae.id].push(d);
            });
          } else if (a.action === 'maladie') {
            if (!S.mal[k]) S.mal[k] = {};
            if (!S.mal[k][ae.id]) S.mal[k][ae.id] = [];
            days.forEach(d => {
              if (S.mal[k][ae.id].indexOf(d) < 0) S.mal[k][ae.id].push(d);
            });
          } else if (a.action === 'pm') {
            if (!S.pm[k]) S.pm[k] = {};
            if (!S.pm[k][ae.id]) S.pm[k][ae.id] = [];
            days.forEach(d => {
              if (S.pm[k][ae.id].indexOf(d) < 0) S.pm[k][ae.id].push(d);
            });
          } else {
            if (!S.ind[k]) S.ind[k] = {};
            if (!S.ind[k][ae.id]) S.ind[k][ae.id] = [];
            days.forEach(d => {
              if (S.ind[k][ae.id].indexOf(d) < 0) S.ind[k][ae.id].push(d);
            });
          }
          done.push('✓ Absence (' + a.action + ') enregistrée pour ' +
            ae.n + ' : j.' + days.join(', '));
        }
      }
    } else if (a.action === 'remove_absent') {
      const re = findEmpByNameOrId(a.employee, a.employee_id);
      if (re) {
        const k = mk();
        const days = a.days && Array.isArray(a.days)
          ? a.days
          : (a.day ? [a.day] : []);
        if (!S.ind[k]) S.ind[k] = {};
        if (!S.cp[k])  S.cp[k]  = {};
        if (!S.mal[k]) S.mal[k] = {};
        if (!S.pm[k])  S.pm[k]  = {};
        if (S.ind[k][re.id]) {
          S.ind[k][re.id] = S.ind[k][re.id].filter(d => days.indexOf(d) < 0);
        }
        if (S.cp[k][re.id]) {
          S.cp[k][re.id]  = S.cp[k][re.id].filter(d => days.indexOf(d) < 0);
        }
        if (S.mal[k][re.id]) {
          S.mal[k][re.id] = S.mal[k][re.id].filter(d => days.indexOf(d) < 0);
        }
        if (S.pm[k][re.id]) {
          S.pm[k][re.id]  = S.pm[k][re.id].filter(d => days.indexOf(d) < 0);
        }
        done.push('✓ Absence supprimée pour ' + re.n +
          ' : j.' + days.join(', '));
      }
    }
  });

  if (done.length) { save(); render(); }
  return done;
}

/* Envoie le message utilisateur à l'API Anthropic et traite la réponse.
   L'historique est tronqué à 12 messages pour contenir les coûts. */
function sendAiMessage() {
  const inp = document.getElementById('ai-inp');
  if (!inp) return;
  const msg = inp.value.trim();
  if (!msg) return;

  if (!_aiKey) {
    addAiMsg('sys',
      '⚠ Clé API manquante — clique sur 🔑 API pour la configurer');
    return;
  }

  inp.value = '';
  inp.style.height = '36px';
  addAiMsg('user', msg);
  _aiHistory.push({ role: 'user', content: msg });

  const btn = document.getElementById('ai-send-btn');
  if (btn) btn.disabled = true;
  addAiMsg('ai', '⏳ Réflexion...', 'ai-thinking');

  /* Date du jour pour résoudre "demain", "lundi", etc. */
  const _today = new Date();
  const _DN_FULL = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const todayStr = _DN_FULL[_today.getDay()] + ' ' + _today.getDate() +
    ' ' + ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'][_today.getMonth()] +
    ' ' + _today.getFullYear();

  const systemPrompt =
    buildContext() +
    '\n\nDATE D\'AUJOURD\'HUI : ' + todayStr + '. ' +
    'Utilise cette date pour résoudre "aujourd\'hui", "demain", "après-demain", "lundi prochain", etc.\n\n' +
    'Tu peux répondre en langage naturel ET effectuer des actions sur le planning.\n' +
    'Pour effectuer des actions, inclus un bloc JSON dans ta réponse :\n' +
    '```json\n' +
    '[{"action":"assign","day":5,"post":"CH","employee":"JULIE"},' +
    '{"action":"remove","day":3,"post":"S1"}]\n' +
    '```\n' +
    'Actions disponibles :\n' +
    '- assign : {action,day,post,employee} → affecter un salarié\n' +
    '- remove : {action,day,post} → retirer une affectation\n' +
    '- autogen : {action,mode:replace|fill} → générer le planning\n' +
    '- absent : {action,employee,days:[]} → indisponibilité souhaitée\n' +
    '- cp : {action,employee,days:[]} → congé payé\n' +
    '- maladie : {action,employee,days:[]} → arrêt maladie\n' +
    '- pm : {action,employee,days:[]} → dispo après-midi seulement (matin = indispo)\n' +
    '- remove_absent : {action,employee,days:[]} → RENDRE DISPONIBLE (supprime toute absence sur ces jours)\n' +
    '\n' +
    'RÈGLES IMPORTANTES :\n' +
    '1. EXCLUSIVITÉ : absent/cp/maladie/pm sont exclusifs. Marquer un jour dans un type retire les autres.\n' +
    '2. PLAGES : "du 10 au 15" → développe en days:[10,11,12,13,14,15]. "le 4,7,11" → days:[4,7,11].\n' +
    '3. PLUSIEURS EMPLOYÉS : "Marie ET Jean en CP demain" → DEUX actions séparées dans le JSON.\n' +
    '4. DATES RELATIVES : utilise la date du jour ci-dessus pour résoudre "demain", "lundi", etc.\n' +
    '5. SI AMBIGU : demande une clarification au lieu de deviner.\n' +
    '\n' +
    'DISTINCTION CRITIQUE absent vs remove_absent (ne pas confondre !) :\n' +
    'AJOUTER une absence (employé NE peut PAS travailler) :\n' +
    '- "Marie est indisponible le 5" → absent\n' +
    '- "Marie est en CP le 5" → cp\n' +
    '- "Marie est malade le 5" → maladie\n' +
    '- "Marie ne peut pas le 5" → absent\n' +
    'RETIRER une absence (employé PEUT travailler à nouveau) :\n' +
    '- "Marie est disponible le 5" → remove_absent\n' +
    '- "Marie est dispo le 5" → remove_absent\n' +
    '- "Marie peut travailler le 5" → remove_absent\n' +
    '- "Marie sera là le 5" / "Marie revient le 5" → remove_absent\n' +
    '- "annule l\'indispo/absence de Marie le 5" → remove_absent\n' +
    '- "retire l\'absence de Marie le 5" → remove_absent\n' +
    'CAS SPÉCIAL pm — l\'employé est INDISPO le matin mais dispo l\'après-midi :\n' +
    '- "Marie ne peut venir que l\'après-midi le 5" → pm\n' +
    '- "Marie est dispo l\'après-midi seulement le 5" → pm (NE PAS confondre avec remove_absent)\n' +
    '- "Marie n\'arrive qu\'à midi le 5" → pm\n' +
    'Pas d\'équivalent "matin seulement" : si l\'utilisateur le demande, utilise absent ou demande clarification.\n' +
    '\n' +
    'Réponds toujours en français. Explique brièvement ce que tu as fait.';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': _aiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1024,
      system: systemPrompt,
      messages: _aiHistory
    })
  })
  .then(r => r.json())
  .then(data => {
    // Retire le message "⏳ Réflexion..." et réactive le bouton envoyer
    const thinking = document.getElementById('ai-thinking');
    if (thinking) thinking.remove();
    if (btn) btn.disabled = false;

    if (data.error) {
      addAiMsg('sys', '❌ ' + data.error.message);
      return;
    }

    const reply = data.content && data.content[0]
      ? data.content[0].text : 'Pas de réponse.';
    _aiHistory.push({ role: 'assistant', content: reply });

    // Tronque l'historique à 6 échanges (12 messages) pour contrôler le coût
    if (_aiHistory.length > 12) {
      _aiHistory = _aiHistory.slice(_aiHistory.length - 12);
    }

    // Extrait et exécute les actions éventuelles
    const actions = parseAiActions(reply);
    let cleanReply = reply.replace(/```json[\s\S]*?```/g, '').trim();
    if (actions) {
      const doneMsgs = executeActions(actions);
      if (doneMsgs.length) {
        cleanReply += (cleanReply ? '\n\n' : '') + doneMsgs.join('\n');
      }
    }
    addAiMsg('ai', cleanReply);
  })
  .catch(err => {
    const thinking = document.getElementById('ai-thinking');
    if (thinking) thinking.remove();
    if (btn) btn.disabled = false;
    addAiMsg('sys', '❌ Erreur réseau : ' + err.message);
  });
}

/* Ajoute un message dans le panneau de chat.
   type ∈ {user, ai, sys} → styles différents définis dans le CSS. */
function addAiMsg(type, text, id) {
  const msgs = document.getElementById('ai-msgs');
  if (!msgs) return;
  const d = document.createElement('div');
  d.className = 'ai-msg ' + type;
  if (id) d.id = id;
  d.style.whiteSpace = 'pre-wrap';
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

/* Toggle du panneau IA. Le premier ouverture affiche un message d'accueil. */
function toggleAiPanel() {
  _aiOpen = !_aiOpen;
  const panel = document.getElementById('ai-panel');
  const fab = document.getElementById('ai-fab');
  if (panel) panel.style.display = _aiOpen ? 'flex' : 'none';
  if (fab) fab.textContent = _aiOpen ? '✕' : '✨';
  if (_aiOpen && !_aiHistory.length) {
    addAiMsg('sys',
      'Bonjour ! Je peux modifier le planning ou répondre à vos ' +
      'questions.\nEx: Mets Julie sur Chaud le 5, ' +
      'Génère le planning de la semaine');
    setTimeout(() => {
      const i = document.getElementById('ai-inp');
      if (i) i.focus();
    }, 100);
  }
}

/* Construit le FAB (bouton flottant) + panneau IA attachés au body. */
function renderAiWidget() {
  // Bouton flottant (FAB) en bas à droite
  const fab = document.createElement('button');
  fab.id = 'ai-fab';
  fab.className = 'ai-fab';
  fab.textContent = '✨';
  fab.title = 'Assistant IA';
  fab.onclick = toggleAiPanel;
  document.body.appendChild(fab);

  // Bouton flottant (FAB) Saisie du jour — en bas à gauche
  const sFab = document.createElement('button');
  sFab.id = 'saisie-fab';
  sFab.className = 'saisie-fab';
  sFab.textContent = '📋';
  sFab.title = 'Saisie du jour';
  sFab.onclick = () => {
    const now = new Date();
    const dd = (now.getFullYear() === S.y && now.getMonth() === S.m)
      ? now.getDate() : 1;
    openSaisie(dd);
  };
  document.body.appendChild(sFab);

  // Panneau IA (caché par défaut)
  const panel = document.createElement('div');
  panel.id = 'ai-panel';
  panel.className = 'ai-panel';
  panel.style.display = 'none';

  // Header panneau : titre + boutons (clé API, vider, fermer)
  const hdr = document.createElement('div');
  hdr.className = 'ai-panel-hdr';

  const title = document.createElement('span');
  title.className = 'ai-panel-title';
  title.textContent = '✨ Assistant Planning';

  const hdrBtns = document.createElement('div');
  hdrBtns.className = 'ai-panel-hdr-btns';

  const keyBtn = document.createElement('button');
  keyBtn.className = 'ai-key-btn';
  keyBtn.textContent = '🔑 API';
  keyBtn.onclick = showAiKeyModal;

  const clearBtn = document.createElement('button');
  clearBtn.className = 'ai-clear-btn';
  clearBtn.textContent = '🗑';
  clearBtn.title = 'Effacer';
  clearBtn.onclick = () => {
    _aiHistory = [];
    const m = document.getElementById('ai-msgs');
    if (m) m.innerHTML = '';
    addAiMsg('sys', 'Conversation réinitialisée');
  };

  const closeBtn = document.createElement('button');
  closeBtn.className = 'ai-close-btn';
  closeBtn.textContent = '✕';
  closeBtn.onclick = toggleAiPanel;

  hdrBtns.appendChild(keyBtn);
  hdrBtns.appendChild(clearBtn);
  hdrBtns.appendChild(closeBtn);
  hdr.appendChild(title);
  hdr.appendChild(hdrBtns);

  // Zone des messages
  const msgs = document.createElement('div');
  msgs.id = 'ai-msgs';
  msgs.className = 'ai-msgs';

  // Ligne input : textarea + bouton envoyer
  const inputRow = document.createElement('div');
  inputRow.className = 'ai-input-row';

  const textarea = document.createElement('textarea');
  textarea.id = 'ai-inp';
  textarea.className = 'ai-input';
  textarea.placeholder = 'Ex: Mets Julie sur Chaud le lundi 7...';
  // Enter (sans Shift) envoie, Shift+Enter insère un retour à la ligne
  textarea.onkeydown = (ev) => {
    if (ev.key === 'Enter' && !ev.shiftKey) {
      ev.preventDefault();
      sendAiMessage();
    }
  };
  // Auto-resize de la textarea (max 100px)
  textarea.oninput = function () {
    this.style.height = '36px';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  };

  const sendBtn = document.createElement('button');
  sendBtn.id = 'ai-send-btn';
  sendBtn.className = 'ai-send';
  sendBtn.textContent = 'Envoyer';
  sendBtn.onclick = sendAiMessage;

  inputRow.appendChild(textarea);
  inputRow.appendChild(sendBtn);

  panel.appendChild(hdr);
  panel.appendChild(msgs);
  panel.appendChild(inputRow);
  document.body.appendChild(panel);
}

const TOUR_STEPS = [
