      if (a.article?.category) categories.add(a.article.category);
      if (a.type === ALERT_TYPES.SUPPLIER_PRICE_GAP) {
        (a.suppliers || []).forEach((s) => suppliers.add(s.supplier));
      }
      if ((a.type === ALERT_TYPES.STOCK_LOW || a.type === ALERT_TYPES.STOCK_EMPTY) && a.article) {
        for (const p of (purchases || [])) {
          if (p.items?.some((it) => it.articleId === a.article.id) && p.supplier) suppliers.add(p.supplier);
        }
      }
    }
    return { categories: [...categories].sort(), suppliers: [...suppliers].sort() };
  }, [alertsIndex, purchases]);

  const getSeverity = (alert) => {
    if (alert.type === ALERT_TYPES.STOCK_EMPTY) return 'critical';
    if (alert.type === ALERT_TYPES.STOCK_LOW) {
      if (alert.currentStock < 0 || (alert.daysOfCover != null && alert.daysOfCover < 3)) return 'critical';
      return 'warning';
    }
    if (alert.type === ALERT_TYPES.SUPPLIER_PRICE_GAP) return alert.gapPct > 30 ? 'critical' : 'warning';
    return 'warning';
  };

  const filteredAlerts = useMemo(() => {
    return alertsIndex.filter((a) => {
      if (filterType !== 'all') {
        if (filterType === 'estimated' && !a.estimatedFromPurchases) return false;
        if (filterType === 'stock' && ![ALERT_TYPES.STOCK_LOW, ALERT_TYPES.STOCK_EMPTY].includes(a.type)) return false;
        if (filterType === 'price' && a.type !== ALERT_TYPES.PRICE_TREND) return false;
        if (filterType === 'supplier' && a.type !== ALERT_TYPES.SUPPLIER_PRICE_GAP) return false;
      }
      if (filterCategory !== 'all' && a.article?.category !== filterCategory) return false;
      if (filterSeverity !== 'all' && getSeverity(a) !== filterSeverity) return false;
      if (filterSupplier !== 'all') {
        if (a.type === ALERT_TYPES.SUPPLIER_PRICE_GAP) {
          if (!(a.suppliers || []).some((s) => s.supplier === filterSupplier)) return false;
        } else {
          const has = (purchases || []).some((p) => p.supplier === filterSupplier && p.items?.some((it) => it.articleId === a.article?.id));
          if (!has) return false;
        }
      }
      return true;
    });
  }, [alertsIndex, filterType, filterCategory, filterSeverity, filterSupplier, purchases]);

  const activeFilters = [filterType, filterCategory, filterSeverity, filterSupplier].filter((f) => f !== 'all').length;
  const stockAlerts = filteredAlerts.filter((a) => a.type === ALERT_TYPES.STOCK_LOW || a.type === ALERT_TYPES.STOCK_EMPTY);
  const priceAlerts = filteredAlerts.filter((a) => a.type === ALERT_TYPES.PRICE_TREND);
  const supplierGapAlerts = filteredAlerts.filter((a) => a.type === ALERT_TYPES.SUPPLIER_PRICE_GAP);

  const handleThresholdSave = (articleId, newThreshold) => {
    setArticles(articles.map((i) =>
      i.id === articleId
        ? (newThreshold === null
            ? (() => { const { manualThreshold, ...rest } = i; return rest; })()
            : { ...i, manualThreshold: newThreshold })
        : i
    ));
    setEditingThresholdId(null);
  };

  // Désactive une alerte (stock ou prix) pour un article donné, avec undo.
  // kind = 'stock' → alertStock:false ; kind = 'price' → alertPrice:false
  const handleDisableAlert = (articleId, kind) => {
    const article = articles.find((a) => a.id === articleId);
    if (!article) return;
    const field = kind === 'price' ? 'alertPrice' : 'alertStock';
    const _snap = articles;
    setArticles(articles.map((a) => a.id === articleId ? { ...a, [field]: false } : a));
    const label = kind === 'price' ? 'Alerte prix' : 'Alerte stock';
    mcToast.undo(
      `${label} désactivée : ${article.name}`,

// ─── BulkDisableButton ─────────────────────────────────────────────────────
// Bouton "tout désactiver" avec confirmation au 2e clic (évite un confirm()
// bloquant). 1er clic : passe en mode "armé" (texte rouge "Confirmer ?") ;
// 2e clic dans les 4s : exécute. Sinon revient à l'état normal.
function BulkDisableButton({ count, label, onConfirm }) {
  const [armed, setArmed] = useState(false);
  useEffect(() => {
    if (!armed) return;
    const t = setTimeout(() => setArmed(false), 4000);
    return () => clearTimeout(t);
  }, [armed]);
  return (
    <button
      className="mc-btn mc-btn-ghost"
      style={{
        padding: '6px 12px', fontSize: 12, flexShrink: 0,
        color: armed ? palette.wine : palette.inkSoft,
        borderColor: armed ? palette.wine : palette.rule,
        fontWeight: armed ? 600 : 400,
      }}
      onClick={() => {
        if (armed) { onConfirm(); setArmed(false); }
        else setArmed(true);
      }}
      title={`Désactiver les ${count} ${label} affichées`}
    >
      {armed ? `Confirmer la désactivation des ${count} ?` : `🔕 Tout désactiver`}
    </button>
  );
}

/**
 * Small modal to manually override the auto-computed threshold for a single
 * article. Setting it to empty / null falls back to the auto value.
 */
function ThresholdEditor({ article, onSave, onClose }) {
  const [value, setValue] = useState(
    article.manualThreshold != null ? String(article.manualThreshold) : ''
  );

  const handleSave = () => {
    const trimmed = value.trim();
    if (trimmed === '') {
      onSave(article.id, null); // remove override
      return;
    }
    const num = parseFloat(trimmed.replace(',', '.'));
    if (!isFinite(num) || num < 0) return;
    onSave(article.id, num);
  };

  return (
    <div className="mc-overlay" onClick={onClose}>
      <div className="mc-modal" style={{ maxWidth: 480, padding: 28 }} onClick={(e) => e.stopPropagation()}>
        <h3 className="mc-display" style={{ fontSize: 20, fontWeight: 600, margin: '0 0 8px' }}>
          Ajuster le seuil d'alerte
        </h3>
        <p style={{ fontSize: 13, color: palette.inkSoft, margin: '0 0 20px' }}>
          {article.name}
        </p>

        <label className="mc-label">Seuil d'alerte ({article.unit})</label>
        <input
          className="mc-input"
          type="number"
          step="0.01"
          min="0"
          value={value}
          onChange={(e) => setValue(e.target.value)}
          placeholder="Laisser vide pour utiliser le seuil auto"
          autoFocus
        />
        <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 6, lineHeight: 1.5 }}>
          Une valeur fixe ici remplace le calcul automatique
          (consommation × délai de réappro). Laissez vide pour revenir à l'auto.
        </div>

        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 24 }}>
          <button className="mc-btn mc-btn-ghost" onClick={onClose}>Annuler</button>
          <button className="mc-btn mc-btn-primary" onClick={handleSave}>
            <Save size={14} /> Enregistrer
          </button>
        </div>
      </div>
    </div>
  );
}

function SalesView({ context }) {
  const { sales, setSales, recipes } = context;
  const csvInputRef = useRef(null);

  const handleImport = (file) => {
    const reader = new FileReader();
    reader.onload = (event) => {
      const lines = event.target.result.split('\n').filter((l) => l.trim());
      const newSales = [];
      let imported = 0;
      let unmatched = 0;

      lines.slice(1).forEach((line) => {
        const cols = line.split(/[;,\t]/).map((c) => c.trim().replace(/^"|"$/g, ''));
        if (cols.length < 3) return;

        const dateCol = cols.find((c) => /^\d{2,4}[\/\-]/.test(c)) || new Date().toISOString().slice(0, 10);
        const normalizedDate = dateCol.includes('/') ? dateCol.split('/').reverse().join('-') : dateCol;
        const productName = cols.find((c) => /[a-zA-ZÀ-ú]{3,}/.test(c) && !/^\d/.test(c)) || '';
        const numbers = cols
          .filter((c) => /^\d+[.,]?\d*$/.test(c.replace(',', '.')))
          .map((c) => parseFloat(c.replace(',', '.')));

        const matchedRecipe = recipes.find((r) =>
          r.name.toLowerCase().includes(productName.toLowerCase().slice(0, 5))
        );

        if (matchedRecipe) {
          newSales.push({
            id: generateId('s'),
            date: normalizedDate,
            recipeId: matchedRecipe.id,
            qty: numbers[0] || 1,
            revenue: numbers[numbers.length - 1] || 0,
          });
          imported++;
        } else {
          unmatched++;
        }
      });

      setSales([...sales, ...newSales]);
      if (unmatched > 0) {
        mcToast.info(`${imported} ventes importées, ${unmatched} non associées (recettes manquantes)`, { duration: 5000 });
      } else if (imported > 0) {
        mcToast.success(`${imported} ventes importées`);
      } else {
        mcToast.error('Aucune vente importée — vérifiez le format du fichier CLYO');
      }
    };
    reader.readAsText(file);
  };

  const aggregatedSales = useMemo(() => {
    const map = {};
    sales.forEach((sale) => {
      const recipe = recipes.find((r) => r.id === sale.recipeId);
      const key = sale.date + '|' + sale.recipeId;
      if (!map[key]) map[key] = { ...sale, recipeName: recipe ? recipe.name : '?' };
      else { map[key].qty += sale.qty; map[key].revenue += sale.revenue; }
    });
    return Object.values(map).sort((a, b) => b.date.localeCompare(a.date));
  }, [sales, recipes]);

  // ─── Pagination: show 100 rows at a time, with a "Charger plus" button ───
  // Avoids rendering thousands of <tr> at once (which the browser handles slowly,
  // independently of how fast our data calculations are).
  const PAGE_SIZE = 100;
  const [visibleCount, setVisibleCount] = useState(PAGE_SIZE);

  // Reset pagination if the underlying data shrinks (e.g. user filters or clears)
  useEffect(() => {
    if (visibleCount > aggregatedSales.length && aggregatedSales.length > PAGE_SIZE) {
      setVisibleCount(PAGE_SIZE);
    }
  }, [aggregatedSales.length, visibleCount]);

  const visibleSales = aggregatedSales.slice(0, visibleCount);
  const hasMore = aggregatedSales.length > visibleCount;

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
        <h2 className="mc-display" style={{ fontSize: 24, fontWeight: 600, margin: 0 }}>
          Ventes — Import CLYO
        </h2>
        <div style={{ display: 'flex', gap: 8 }}>
          <input
            type="file"
            accept=".csv,text/csv"
            style={{ display: 'none' }}
            ref={csvInputRef}
            onChange={(e) => e.target.files[0] && handleImport(e.target.files[0])}
          />
          <button
            className="mc-btn mc-btn-ghost"
            onClick={() => { const _snapS = sales; setSales([]); mcToast.undo(`Ventes vidées (${_snapS.length})`, () => { setSales(_snapS); mcToast.success('Ventes restaurées'); }, { duration: 10000 }); }}
          >
            <Trash2 size={14} /> Vider
          </button>
          <button
            className="mc-btn mc-btn-primary"
            onClick={() => csvInputRef.current && csvInputRef.current.click()}
          >
            <Upload size={14} /> Import CLYO
          </button>
        </div>
      </div>

      <div className="mc-card" style={{ overflow: 'hidden' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr>
              <th className="mc-th">Date</th>
              <th className="mc-th">Recette</th>
              <th className="mc-th">Qté</th>
              <th className="mc-th">CA</th>
              <th className="mc-th"></th>
            </tr>
          </thead>
          <tbody>
            {visibleSales.map((sale) => (
              <tr key={sale.id} className="mc-row">
                <td className="mc-td">{formatShortDate(sale.date, { withYear: true })}</td>
                <td className="mc-td" style={{ fontWeight: 500 }}>{sale.recipeName}</td>
                <td className="mc-td">{sale.qty}</td>
                <td className="mc-td" style={{ fontFamily: 'Fraunces, serif' }}>{formatEuro(sale.revenue)}</td>
                <td className="mc-td" style={{ textAlign: 'right' }}>
                  <button className="mc-btn mc-btn-danger" style={{ padding: '4px 10px' }} onClick={() => setSales(sales.filter((s) => s.id !== sale.id))}>
                    <Trash2 size={14} />
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {sales.length === 0 && (
          <div style={{ textAlign: 'center', padding: 32, fontSize: 14, color: palette.inkSoft }}>
            Aucune vente. Importez un export CLYO.
          </div>
        )}

        {/* Pagination controls — shown only when there's more data to load */}
        {aggregatedSales.length > 0 && (
          <div
            style={{
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
              padding: '14px 20px',
              borderTop: `1px solid ${palette.rule}`,
              fontSize: 12,
              color: palette.inkSoft,
            }}
          >
            <span>
              {visibleSales.length} sur {aggregatedSales.length} ventes affichées
            </span>
            {hasMore && (
              <button
                className="mc-btn mc-btn-ghost"
                onClick={() => setVisibleCount((c) => c + PAGE_SIZE)}
                style={{ padding: '6px 14px' }}
              >
                Charger {Math.min(PAGE_SIZE, aggregatedSales.length - visibleCount)} de plus
              </button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// Sélecteur d'article avec recherche (remplace un <select> de 178 articles).
// `options` = articles enrichis { id, name, _purchaseCount }, déjà triés.
function ArticleSearchSelect({ options, value, onChange }) {
  const [search, setSearch] = useState('');
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  const selected = options.find((o) => o.id === value);

  // Ferme le menu au clic extérieur
  useEffect(() => {
    const onClick = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onClick);
    return () => document.removeEventListener('mousedown', onClick);
  }, []);

  const filtered = useMemo(() => {
    const q = normalizeText(search);
    if (!q) return options;
    return options.filter((o) => normalizeText(o.name).includes(q));
  }, [options, search]);

  return (
    <div ref={ref} style={{ position: 'relative', minWidth: 260, maxWidth: '100%' }}>
      <div
        onClick={() => { setOpen((v) => !v); setSearch(''); }}
        style={{
          display: 'flex', alignItems: 'center', gap: 8,
          padding: '8px 12px', border: `1px solid ${palette.rule}`,
          borderRadius: 6, background: palette.cream, cursor: 'pointer', fontSize: 13,
        }}
      >
        <Search size={14} style={{ color: palette.inkSoft, flexShrink: 0 }} />
        <span style={{ flex: 1, color: selected ? palette.ink : palette.inkSoft, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
          {selected ? selected.name : 'Choisir un article…'}
        </span>
        <ChevronDown size={14} style={{ color: palette.inkSoft, flexShrink: 0 }} />
      </div>

      {open && (
        <div style={{
          position: 'absolute', top: 'calc(100% + 4px)', left: 0, right: 0, zIndex: 20,
          background: 'white', border: `1px solid ${palette.rule}`, borderRadius: 8,
          boxShadow: '0 8px 24px rgba(0,0,0,0.12)', maxHeight: 320, overflow: 'hidden',
          display: 'flex', flexDirection: 'column',
        }}>
          <div style={{ padding: 8, borderBottom: `1px solid ${palette.rule}` }}>
            <input
              autoFocus
              className="mc-input"
              placeholder="Rechercher un article…"
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              style={{ fontSize: 13 }}
            />
          </div>
          <div style={{ overflowY: 'auto' }}>
            {filtered.length === 0 ? (
              <div style={{ padding: 16, textAlign: 'center', fontSize: 13, color: palette.inkSoft }}>
                Aucun article trouvé
              </div>
            ) : filtered.map((o) => (
              <div
                key={o.id}
                onClick={() => { onChange(o.id); setOpen(false); }}
                style={{
                  padding: '8px 12px', cursor: 'pointer', fontSize: 13,
                  display: 'flex', justifyContent: 'space-between', gap: 8,
                  background: o.id === value ? palette.paper : 'transparent',
                }}
                onMouseEnter={(e) => { if (o.id !== value) e.currentTarget.style.background = palette.cream; }}
                onMouseLeave={(e) => { if (o.id !== value) e.currentTarget.style.background = 'transparent'; }}
              >
                <span style={{ color: palette.ink }}>{o.name}</span>
                <span style={{ color: palette.inkSoft, fontSize: 11, flexShrink: 0 }}>{o._purchaseCount} achats</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function AnalyticsView({ context }) {
  const { articles, recipes, sales, purchases, priceIndex, dateFrom, dateTo } = context;
  const isMobile = useIsMobile(720);

  // ─── Article selector for price evolution chart ─────────────────────
  // Default to the article with the most purchases — most likely to be
  // interesting to the user. Falls back to first article if empty.
  const articlesByPurchaseCount = useMemo(() => {
    const counts = {};
    for (const p of purchases) {
      for (const it of (p.items || [])) {
        if (it.articleId) counts[it.articleId] = (counts[it.articleId] || 0) + 1;
      }
    }
    return articles
      .map((i) => ({ ...i, _purchaseCount: counts[i.id] || 0 }))
      .filter((i) => i._purchaseCount > 0)
      .sort((a, b) => b._purchaseCount - a._purchaseCount);
  }, [articles, purchases]);

  const [selectedArticleId, setSelectedArticleId] = useState(null);
  useEffect(() => {
    if (!selectedArticleId && articlesByPurchaseCount.length > 0) {
      setSelectedArticleId(articlesByPurchaseCount[0].id);
    }
  }, [articlesByPurchaseCount, selectedArticleId]);

  // ─── Compute monthly weighted-average price for the selected article ─
  // For each month, aggregate all purchases of this article (across all
  // variants and suppliers) and compute the weighted-average price per master
  // unit using qty-weighted aggregation:
  //   avg = sum(price_i × qty_i) / sum(qty_i)
  // This matches the catalog-level price logic and is more honest than a
  // simple mean across different pack sizes.
  const priceEvolution = useMemo(() => {
    if (!selectedArticleId) return [];
    const byMonth = {};
    for (const p of purchases) {
      const month = (p.date || '').slice(0, 7); // "YYYY-MM"
      if (!month) continue;
      for (const it of (p.items || [])) {
        if (it.articleId !== selectedArticleId) continue;
        if (!(it.pricePerMasterUnit > 0) || !(it.convertedQty > 0)) continue;
        const entry = byMonth[month] || { totalValue: 0, totalQty: 0, count: 0 };
        entry.totalValue += it.pricePerMasterUnit * it.convertedQty;
        entry.totalQty += it.convertedQty;
        entry.count += 1;
        byMonth[month] = entry;
      }
    }
    return Object.entries(byMonth)
      .map(([month, agg]) => ({
        month,
        avg: agg.totalQty > 0 ? agg.totalValue / agg.totalQty : 0,
        qty: agg.totalQty,
        count: agg.count,
      }))
      .sort((a, b) => a.month.localeCompare(b.month));
  }, [purchases, selectedArticleId]);

  // Compute % change between first and last data points for the summary line
  const priceEvolutionSummary = useMemo(() => {
    if (priceEvolution.length < 2) return null;
    const first = priceEvolution[0].avg;
    const last = priceEvolution[priceEvolution.length - 1].avg;
    if (!(first > 0)) return null;
    const pct = ((last - first) / first) * 100;
    return { first, last, pct, monthsCount: priceEvolution.length };
  }, [priceEvolution]);

  const selectedArticle = articles.find((i) => i.id === selectedArticleId);

  const spendByCategory = useMemo(() => {
    const map = {};
    purchases
      .filter((p) => (!dateFrom || p.date >= dateFrom) && (!dateTo || p.date <= dateTo))
      .forEach((purchase) => {
        purchase.items.forEach((item) => {
          const article = articles.find((i) => i.id === item.articleId);
          const category = article ? article.category || 'Autre' : 'Autre';
          map[category] = (map[category] || 0) + item.total;
        });
      });
    return Object.entries(map).map(([name, value]) => ({ name, value }));
  }, [purchases, articles, dateFrom, dateTo]);

  const profitabilityMatrix = useMemo(() => {
    const assortmentBase = findAssortmentBase(recipes);
    return recipes
      .filter((r) => !r.isAssortmentBase) // base doesn't sell, exclude from matrix
      .map((recipe) => {
        const cost = indexedPlateCost(recipe, priceIndex, assortmentBase).plateCost;
        const recipeSales = sales.filter(
          (s) => s.recipeId === recipe.id && (!dateFrom || s.date >= dateFrom) && (!dateTo || s.date <= dateTo)
        );
        const totalQty = recipeSales.reduce((sum, s) => sum + s.qty, 0);
        const totalRevenue = recipeSales.reduce((sum, s) => sum + s.revenue, 0);
        return {
          ...recipe,
          cost,
          totalQty,
          totalRevenue,
          totalCost: cost * totalQty,
          totalMargin: totalRevenue - cost * totalQty,
          ratio: recipe.salePrice > 0 ? cost / recipe.salePrice : 0,
        };
      });
  }, [recipes, sales, priceIndex, dateFrom, dateTo]);

  // ─── Optimiseur fournisseur ───────────────────────────────────────────
  // Pour chaque article acheté chez ≥ 2 fournisseurs sur la période choisie,
  // compare le prix moyen pondéré par fournisseur. Calcule l'écart entre ce
  // qui a été réellement dépensé et le "tout au moins cher" théorique.
  // Période INDÉPENDANTE du filtre global (sélecteur dédié ci-dessous).
  const [optimizerPeriod, setOptimizerPeriod] = useState('12'); // '3' | '6' | '12' | 'all'
  const optimizerData = useMemo(() => {
    const now = new Date();
    let since = null;
    if (optimizerPeriod !== 'all') {
      const months = parseInt(optimizerPeriod, 10);
      const d = new Date(now.getFullYear(), now.getMonth() - months, now.getDate());
      since = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    // article -> supplier -> { value, qty }
    const byArticle = {};
    for (const p of purchases) {
      if (since && (p.date || '') < since) continue;
      const sup = (p.supplier || 'Inconnu').trim() || 'Inconnu';
      for (const it of (p.items || [])) {
        const aid = it.articleId;
        if (!aid || !(it.pricePerMasterUnit > 0) || !(it.convertedQty > 0)) continue;
        const a = (byArticle[aid] = byArticle[aid] || {});
        const s = (a[sup] = a[sup] || { value: 0, qty: 0 });
        s.value += it.pricePerMasterUnit * it.convertedQty;
        s.qty += it.convertedQty;
      }
    }

    const rows = [];
    let totalSaving = 0;
    let totalActual = 0;
    for (const [aid, sups] of Object.entries(byArticle)) {
      const supNames = Object.keys(sups);
      if (supNames.length < 2) continue; // besoin d'au moins 2 fournisseurs
      const article = articles.find((x) => x.id === aid);
      if (!article) continue;

      const prices = supNames.map((s) => ({
        supplier: s,
        price: sups[s].value / sups[s].qty,
        qty: sups[s].qty,
        spent: sups[s].value,
      })).sort((a, b) => a.price - b.price);

      const cheapest = prices[0];
      const totalQty = prices.reduce((sum, p) => sum + p.qty, 0);
      const actualSpend = prices.reduce((sum, p) => sum + p.spent, 0);
      const idealSpend = cheapest.price * totalQty;
      const saving = actualSpend - idealSpend;

      totalActual += actualSpend;
      if (saving > 1) {
        totalSaving += saving;
        rows.push({
          id: aid,
          name: article.name,
          unit: article.unit,
          totalQty,
          actualSpend,
          idealSpend,
          saving,
          cheapest,
          prices,
        });
      }
    }
    rows.sort((a, b) => b.saving - a.saving);
    return { rows, totalSaving, totalActual };
  }, [purchases, articles, optimizerPeriod]);

  const OPTIMIZER_PERIOD_LABELS = { '3': '3 mois', '6': '6 mois', '12': '12 mois', 'all': 'Tout' };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
      <div>
        <h2 className="mc-display" style={{ fontSize: 24, fontWeight: 600, margin: 0 }}>Analyses</h2>
        <div style={{ fontSize: 13, color: palette.inkSoft, marginTop: 4 }}>
          Optimisation des achats, évolution des prix et rentabilité des recettes
        </div>
      </div>

      {/* ── Optimiseur fournisseur ──────────────────────────────────── */}
      <div className="mc-card" style={{ padding: 20 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16, flexWrap: 'wrap', marginBottom: 16 }}>
          <div>
            <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 4px' }}>
              Optimiseur fournisseur
            </h3>
            <div style={{ fontSize: 12, color: palette.inkSoft, maxWidth: 560 }}>
              Pour chaque article acheté chez plusieurs fournisseurs, économie potentielle si tout avait été acheté au prix le plus bas. Un repère de négociation, pas une cible absolue — un fournisseur ne suit pas toujours sur les gros volumes.
            </div>
          </div>
          <SegmentedToggle
            size="sm"
            value={optimizerPeriod}
            onChange={setOptimizerPeriod}
            options={[
              { id: '3',   label: '3 m' },
              { id: '6',   label: '6 m' },
              { id: '12',  label: '12 m' },
              { id: 'all', label: 'Tout' },
            ]}
          />
        </div>

        {optimizerData.rows.length === 0 ? (
          <EmptyState
            icon={TrendingUp}
            title="Pas d'écart détecté"
            description={`Sur ${OPTIMIZER_PERIOD_LABELS[optimizerPeriod]}, aucun article n'a été acheté chez plusieurs fournisseurs à des prix différents. L'optimiseur a besoin d'achats comparables pour fonctionner.`}
          />
        ) : (
          <>
            {/* Bandeau récapitulatif */}
            <div style={{
              display: 'flex', gap: 24, flexWrap: 'wrap', alignItems: 'baseline',
              padding: '14px 18px', marginBottom: 16,
              background: palette.sage + '12', border: `1px solid ${palette.sage}30`, borderRadius: 8,
            }}>
              <div>
                <div style={{ fontSize: 11, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: 0.5 }}>Économie potentielle</div>
                <div className="mc-display" style={{ fontSize: 30, fontWeight: 700, color: palette.sage }}>
                  {formatEuro(optimizerData.totalSaving)}
                </div>
              </div>
              <div style={{ fontSize: 13, color: palette.inkSoft }}>
                sur <strong>{optimizerData.rows.length}</strong> article{optimizerData.rows.length > 1 ? 's' : ''} multi-fournisseurs ·
                {' '}soit <strong>{optimizerData.totalActual > 0 ? ((optimizerData.totalSaving / optimizerData.totalActual) * 100).toFixed(1) : '0'} %</strong> de ces achats
              </div>
            </div>

            {/* Liste des opportunités */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {optimizerData.rows.slice(0, 15).map((row) => (
                <div key={row.id} style={{ border: `1px solid ${palette.rule}`, borderRadius: 8, padding: 14 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 12, flexWrap: 'wrap', marginBottom: 8 }}>
                    <div style={{ fontWeight: 600, fontSize: 15 }}>{row.name}</div>
                    <div style={{ display: 'flex', gap: 16, alignItems: 'baseline' }}>
                      <span style={{ fontSize: 12, color: palette.inkSoft }}>
                        {row.totalQty.toFixed(0)} {row.unit} · dépensé {formatEuro(row.actualSpend)}
                      </span>
                      <span className="mc-display" style={{ fontSize: 18, fontWeight: 700, color: palette.sage }}>
                        −{formatEuro(row.saving)}
                      </span>
                    </div>
                  </div>
                  {/* Prix par fournisseur */}
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                    {row.prices.map((p, i) => (
                      <span key={p.supplier} style={{
                        fontSize: 12, padding: '3px 10px', borderRadius: 12,
                        background: i === 0 ? palette.sage + '20' : palette.paper,
                        color: i === 0 ? palette.sage : palette.inkSoft,
                        fontWeight: i === 0 ? 600 : 400,
                        border: i === 0 ? `1px solid ${palette.sage}40` : `1px solid ${palette.rule}`,
                      }}>
                        {i === 0 ? '✓ ' : ''}{p.supplier} · {formatEuro(p.price)}/{row.unit}
                        {p.qty > 0 && <span style={{ opacity: 0.7 }}> ({p.qty.toFixed(0)})</span>}
                      </span>
                    ))}
                  </div>
                </div>
              ))}
              {optimizerData.rows.length > 15 && (
                <div style={{ fontSize: 12, color: palette.inkSoft, fontStyle: 'italic', textAlign: 'center' }}>
                  + {optimizerData.rows.length - 15} autres articles avec un écart plus faible
                </div>
              )}
            </div>
          </>
        )}
      </div>

      {/* ── Évolution du prix moyen par article ─────────────────────── */}
      <div className="mc-card" style={{ padding: 20 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16, flexWrap: 'wrap', marginBottom: 16 }}>
          <div>
            <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 4px' }}>
              Évolution du prix moyen
            </h3>
            <div style={{ fontSize: 12, color: palette.inkSoft }}>
              Prix moyen pondéré par mois, toutes variantes et fournisseurs confondus
            </div>
          </div>
          {articlesByPurchaseCount.length > 0 && (
            <ArticleSearchSelect
              options={articlesByPurchaseCount}
              value={selectedArticleId}
              onChange={setSelectedArticleId}
            />
          )}
        </div>

        {articlesByPurchaseCount.length === 0 ? (
          <div style={{ textAlign: 'center', padding: 48, color: palette.inkSoft }}>
            Aucun achat enregistré. Importez des factures pour voir l'évolution des prix.
          </div>
        ) : priceEvolution.length === 0 ? (
          <div style={{ textAlign: 'center', padding: 48, color: palette.inkSoft }}>
            Pas encore de données pour cet article.
          </div>
        ) : priceEvolution.length === 1 ? (
          <div style={{ textAlign: 'center', padding: 32 }}>
            <div style={{ fontSize: 28, fontWeight: 600, fontFamily: 'Fraunces, serif', color: palette.ink }}>
              {formatEuro(priceEvolution[0].avg)}<span style={{ fontSize: 14, color: palette.inkSoft }}>/{selectedArticle?.unit}</span>
            </div>
            <div style={{ fontSize: 12, color: palette.inkSoft, marginTop: 4 }}>
              Un seul mois d'achats ({priceEvolution[0].month}, {priceEvolution[0].count} facture{priceEvolution[0].count > 1 ? 's' : ''}) — pas encore d'évolution à tracer.
            </div>
          </div>
        ) : (
          <>
            {priceEvolutionSummary && (
              <div style={{ display: 'flex', gap: 24, marginBottom: 16, flexWrap: 'wrap', fontSize: 13 }}>
                <div>
                  <span style={{ color: palette.inkSoft }}>Premier mois : </span>
                  <strong>{formatEuro(priceEvolutionSummary.first)}/{selectedArticle?.unit}</strong>
                </div>
                <div>
                  <span style={{ color: palette.inkSoft }}>Dernier mois : </span>
                  <strong>{formatEuro(priceEvolutionSummary.last)}/{selectedArticle?.unit}</strong>
                </div>
                <div>
                  <span style={{ color: palette.inkSoft }}>Évolution : </span>
                  <strong style={{ color: priceEvolutionSummary.pct > 5 ? palette.wine : priceEvolutionSummary.pct < -5 ? palette.sage : palette.ink, display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                    {priceEvolutionSummary.pct > 0 ? '+' : ''}{priceEvolutionSummary.pct.toFixed(1)} %
                    {priceEvolutionSummary.pct > 5 && <ArrowUpRight size={14} />}
                    {priceEvolutionSummary.pct < -5 && <ArrowDownRight size={14} />}
                  </strong>
                </div>
              </div>
            )}
            <ResponsiveContainer width="100%" height={280}>
              <ComposedChart data={priceEvolution} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
                <CartesianGrid stroke={palette.rule} strokeDasharray="3 3" vertical={false} />
                <XAxis
                  dataKey="month"
                  stroke={palette.inkSoft}
                  tick={{ fontSize: 11 }}
                  tickFormatter={(m) => {
                    // "2026-01" → "janv. 26"
                    const [y, mo] = m.split('-');
                    const months = ['janv.', 'févr.', 'mars', 'avr.', 'mai', 'juin', 'juil.', 'août', 'sept.', 'oct.', 'nov.', 'déc.'];
                    return `${months[parseInt(mo, 10) - 1] || mo} ${y.slice(2)}`;
                  }}
                />
                <YAxis
                  stroke={palette.inkSoft}
                  tick={{ fontSize: 11 }}
                  tickFormatter={(v) => `${v.toFixed(v < 10 ? 2 : 0)} €`}
                  domain={['auto', 'auto']}
                />
                <Tooltip
                  contentStyle={{ background: palette.cream, border: `1px solid ${palette.rule}`, borderRadius: 6, fontSize: 12 }}
                  formatter={(value, name) => {
                    if (name === 'Prix moyen') return [`${formatEuro(value)}/${selectedArticle?.unit}`, name];
                    if (name === 'Quantité') return [`${value.toFixed(2)} ${selectedArticle?.unit}`, name];
                    return [value, name];
                  }}
                  labelFormatter={(m) => {
                    const [y, mo] = m.split('-');
                    const months = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
                    return `${months[parseInt(mo, 10) - 1] || mo} ${y}`;
                  }}
                />
                <Line
                  type="monotone"
                  dataKey="avg"
                  name="Prix moyen"
                  stroke={palette.wine}
                  strokeWidth={2.5}
                  dot={{ fill: palette.wine, r: 4 }}
                  activeDot={{ r: 6 }}
                />
              </ComposedChart>
            </ResponsiveContainer>
          </>
        )}
      </div>

      <div className="mc-card" style={{ padding: 20 }}>
        <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 4px' }}>
          Achats par catégorie
        </h3>
        <div style={{ fontSize: 12, color: palette.inkSoft, marginBottom: 16 }}>
          Répartition des dépenses sur la période sélectionnée
        </div>
        {spendByCategory.length > 0 ? (() => {
          const sorted = [...spendByCategory].sort((a, b) => b.value - a.value);
          const total = sorted.reduce((s, c) => s + c.value, 0);
          const withColor = sorted.map((c, i) => ({ ...c, color: chartColors[i % chartColors.length] }));
          return (
            <div style={{
              display: 'grid',
              gridTemplateColumns: isMobile ? '1fr' : 'minmax(220px, 280px) 1fr',
              gap: 24,
              alignItems: 'center',
            }}>
              {/* Donut avec total au centre */}
              <div style={{ position: 'relative', width: '100%', minHeight: 240 }}>
                <ResponsiveContainer width="100%" height={240}>
                  <PieChart>
                    <Pie
                      data={withColor}
                      dataKey="value"
                      nameKey="name"
                      cx="50%"
                      cy="50%"
                      innerRadius={70}
                      outerRadius={105}
                      paddingAngle={2}
                      stroke="none"
                    >
                      {withColor.map((c) => <Cell key={c.name} fill={c.color} />)}
                    </Pie>
                    <Tooltip
                      formatter={(v) => formatEuro(v)}
                      contentStyle={{ background: palette.cream, border: `1px solid ${palette.rule}`, borderRadius: 6, fontSize: 12 }}
                    />
                  </PieChart>
                </ResponsiveContainer>
                {/* Total au centre */}
                <div style={{
                  position: 'absolute', top: '50%', left: '50%',
                  transform: 'translate(-50%, -50%)', textAlign: 'center', pointerEvents: 'none',
                }}>
                  <div style={{ fontSize: 10, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: 0.5 }}>Total</div>
                  <div className="mc-display" style={{ fontSize: 22, fontWeight: 700, color: palette.ink, lineHeight: 1.1 }}>
                    {formatEuro(total)}
                  </div>
                  <div style={{ fontSize: 10, color: palette.inkSoft }}>{sorted.length} catégories</div>
                </div>
              </div>

              {/* Légende riche : pastille + nom + montant + % + mini-barre */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                {withColor.map((cat) => {
                  const pct = total > 0 ? (cat.value / total) * 100 : 0;
                  return (
                    <div key={cat.name}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', fontSize: 13, marginBottom: 4, gap: 8 }}>
                        <span style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 0 }}>
                          <span style={{ width: 11, height: 11, borderRadius: 3, background: cat.color, flexShrink: 0 }} />
                          <span style={{ color: palette.ink, fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{cat.name}</span>
                        </span>
                        <span style={{ fontFamily: 'Fraunces, serif', fontWeight: 600, flexShrink: 0 }}>
                          {formatEuro(cat.value)}
                          <span style={{ fontWeight: 400, color: palette.inkSoft, fontSize: 11, marginLeft: 6 }}>{pct.toFixed(1)} %</span>
                        </span>
                      </div>
                      <div style={{ height: 5, background: palette.paper, borderRadius: 3, overflow: 'hidden' }}>
                        <div style={{ height: '100%', width: `${pct}%`, background: cat.color, borderRadius: 3, transition: 'width 0.3s ease' }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })() : (
          <div style={{ textAlign: 'center', padding: 48, color: palette.inkSoft }}>
            Aucun achat sur la période sélectionnée.
          </div>
        )}
      </div>

      <div className="mc-card" style={{ overflow: 'hidden' }}>
        <div style={{ padding: '16px 20px', borderBottom: `1px solid ${palette.rule}` }}>
          <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: 0 }}>
            Matrice de rentabilité
          </h3>
        </div>
        {sales.length === 0 ? (
          <div style={{
            display: 'flex', alignItems: 'flex-start', gap: 12,
            padding: '14px 16px', background: palette.amber + '10',
            border: `1px solid ${palette.amber}30`, borderRadius: 8,
            fontSize: 13, color: palette.inkSoft, lineHeight: 1.5,
          }}>
            <Lock size={16} style={{ color: palette.amber, flexShrink: 0, marginTop: 2 }} />
            <span>
              <strong>En attente des ventes.</strong> La rentabilité par recette (ventes, CA, marge totale)
              s'activera une fois vos ventes CLYO importées. L'optimiseur fournisseur et l'évolution des prix
              ci-dessus fonctionnent dès maintenant — ils ne dépendent que de vos achats.
            </span>
          </div>
        ) : (
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr>
              <th className="mc-th">Recette</th>
              <th className="mc-th">Ventes</th>
              <th className="mc-th">CA</th>
              <th className="mc-th">Coût total</th>
              <th className="mc-th">Marge totale</th>
              <th className="mc-th">FC</th>
            </tr>
          </thead>
          <tbody>
            {profitabilityMatrix
              .slice()
              .sort((a, b) => b.totalMargin - a.totalMargin)
              .map((recipe) => (
                <tr key={recipe.id} className="mc-row">
                  <td className="mc-td" style={{ fontWeight: 500 }}>{recipe.name}</td>
                  <td className="mc-td">{recipe.totalQty}</td>
                  <td className="mc-td" style={{ fontFamily: 'Fraunces, serif' }}>{formatEuro(recipe.totalRevenue)}</td>
                  <td className="mc-td" style={{ fontFamily: 'Fraunces, serif', color: palette.wine }}>{formatEuro(recipe.totalCost)}</td>
                  <td className="mc-td" style={{ fontFamily: 'Fraunces, serif', fontWeight: 600, color: palette.sage }}>{formatEuro(recipe.totalMargin)}</td>
                  <td className="mc-td"><StatusPill ratio={recipe.ratio} /></td>
                </tr>
              ))}
          </tbody>
        </table>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   ENERGY — constantes & data model (la vue EnergyView est définie plus bas)
// ═══════════════════════════════════════════════════════════════════════════
//
// Ces constantes sont déclarées ici car elles sont aussi consommées par
// DashboardView (KpiCard énergie) et ImportClaudeInvoiceRow (mapping
// energyType → couleur/label), définis avant EnergyView. La vue elle-même
// se trouve plus bas dans le fichier : chercher `function EnergyView`.

/**
 * Data model for an energy invoice:
 * {
 *   id: string,
 *   date: 'YYYY-MM-DD',                       // invoice date
 *   supplier: string,                          // 'EDF', 'Engie', etc.
 *   invoiceNumber: string,
 *   energyType: 'electricity' | 'gas' | 'water',
 *   periodStart?: 'YYYY-MM-DD',               // billing period start
 *   periodEnd?: 'YYYY-MM-DD',                 // billing period end
 *   consumption: number,                       // kWh for elec/gas, m³ for water
 *   totalHT: number,
 *   totalTTC: number,
 *   notes?: string,
 * }
 */

// PCI (Pouvoir Calorifique Inférieur) du butane : 12.78 kWh par kg.
// Utilisé pour convertir les factures TotalEnergies (en kg) en kWh pour les KPIs énergie.
const GAS_KG_TO_KWH = 12.78;

const ENERGY_TYPES = {
  electricity: { label: 'Électricité', unit: 'kWh', color: '#F59E0B' },
  gas:         { label: 'Gaz',         unit: 'kg',  color: '#3B82F6' },
  water:       { label: 'Eau',         unit: 'm³',  color: '#06B6D4' },
};

// ═══════════════════════════════════════════════════════════════════════════
//   EQUIPMENT — router  [Petit équipement | Gros équipement]
// ═══════════════════════════════════════════════════════════════════════════
//
// Top-level router for the Équipement tab. Deux logiques distinctes derrière
// la même entrée de navigation :
//   • SmallEquipmentView  → consommables (assiettes, verres, couverts…)
//                            suivis par inventaire physique.
//   • AssetsView          → biens durables (cuisinière, four, frigo…)
//                            suivis par contrats d'entretien + interventions.
//
// Note : SmallEquipmentView se trouve plus bas (chercher `function
// SmallEquipmentView`), regroupée historiquement avec AssetsView.

function EquipmentView({ context }) {
  const [mode, setMode] = useState('small'); // 'small' | 'assets'

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
      <SegmentedToggle
        value={mode}
        onChange={setMode}
        options={[
          { id: 'small',  label: 'Petit équipement' },
          { id: 'assets', label: 'Gros équipement' },
        ]}
      />

      {mode === 'small' && <SmallEquipmentView context={context} />}
      {mode === 'assets' && <AssetsView context={context} />}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   ASSETS VIEW — gros équipement (cuisinière, four, frigo, brumisation...)
// ═══════════════════════════════════════════════════════════════════════════
//
// Three sub-sections:
//   • Inventaire    → liste des équipements (achat, garantie, état)
//   • Entretien     → contrats récurrents (revisions périodiques)
//   • Pannes        → interventions ponctuelles (panne, dépannage)
//
// Coût annualisé = somme des coûts entretien × fréquence/an + interventions
// sur les 12 derniers mois.

function AssetsView({ context }) {
  const { assets, setAssets, assetMaintenance, setAssetMaintenance, assetInterventions, setAssetInterventions, assetCategories } = context;

  const [activeSection, setActiveSection] = useState('inventory');
  const [editingAsset, setEditingAsset] = useState(null);
  const [editingMaintenance, setEditingMaintenance] = useState(null);
  const [editingIntervention, setEditingIntervention] = useState(null);

  // ─── Computed: annual cost per asset (maintenance + 12-month interventions) ─
  const today = new Date().toISOString().slice(0, 10);
  const oneYearAgo = (() => {
    const d = parseLocalDate(today);
    d.setFullYear(d.getFullYear() - 1);
    return d.toISOString().slice(0, 10);
  })();

  const assetsWithCosts = useMemo(() => {
    return assets.map((asset) => {
      // Recurring maintenance (annualized)
      let annualMaintenance = 0;
      const contracts = assetMaintenance.filter((m) => m.assetId === asset.id && m.active !== false);
      for (const m of contracts) {
        const freq = CONTRACT_FREQUENCIES.find((f) => f.id === m.frequency);
        const perYear = freq ? freq.perYear : 0;
        annualMaintenance += (m.amount || 0) * perYear;
      }
      // Ponctual interventions in the last 12 months
      const interventions = assetInterventions.filter(
        (i) => i.assetId === asset.id && (i.date || '') >= oneYearAgo
      );
      const interventionsCost = interventions.reduce((sum, i) => sum + (i.cost || 0), 0);

      return {
        ...asset,
        annualMaintenance,
        contractsCount: contracts.length,
        interventions12mCost: interventionsCost,
        interventions12mCount: interventions.length,
        totalAnnualCost: annualMaintenance + interventionsCost,
      };
    });
  }, [assets, assetMaintenance, assetInterventions, oneYearAgo]);

  // Aggregate KPIs
  const totals = useMemo(() => {
    return {
      assetsCount: assets.length,
      assetsBroken: assets.filter((a) => a.status === 'broken').length,
      annualMaintenance: assetsWithCosts.reduce((s, a) => s + a.annualMaintenance, 0),
      interventions12m: assetsWithCosts.reduce((s, a) => s + a.interventions12mCost, 0),
    };
  }, [assets, assetsWithCosts]);

  // ─── CRUD ───────────────────────────────────────────────────────────────
  const saveAsset = (asset) => {
    if (asset.id && assets.find((a) => a.id === asset.id)) {
      setAssets(assets.map((a) => (a.id === asset.id ? asset : a)));
    } else {
      setAssets([...assets, { ...asset, id: asset.id || generateId('ast') }]);
    }
    setEditingAsset(null);
  };
  const deleteAsset = (id) => {
    const _ast = assets.find((a) => a.id === id); if (!_ast) return;
    const _snapAst = assets; setAssets(assets.filter((a) => a.id !== id));
    mcToast.undo(`Équipement supprimé : ${_ast.name}`, () => { setAssets(_snapAst); mcToast.success('Restauré'); });
  };

  const saveMaintenance = (m) => {
    if (m.id && assetMaintenance.find((x) => x.id === m.id)) {
      setAssetMaintenance(assetMaintenance.map((x) => (x.id === m.id ? m : x)));
    } else {
      setAssetMaintenance([...assetMaintenance, { ...m, id: m.id || generateId('mnt') }]);
    }
    setEditingMaintenance(null);
  };
  const deleteMaintenance = (id) => {
    const _snapMnt = assetMaintenance; setAssetMaintenance(assetMaintenance.filter((m) => m.id !== id));
    mcToast.undo("Contrat d'entretien supprimé", () => { setAssetMaintenance(_snapMnt); mcToast.success('Restauré'); });
  };

  const saveIntervention = (intv) => {
    if (intv.id && assetInterventions.find((x) => x.id === intv.id)) {
      setAssetInterventions(assetInterventions.map((x) => (x.id === intv.id ? intv : x)));
    } else {
      setAssetInterventions([...assetInterventions, { ...intv, id: intv.id || generateId('int') }]);
    }
    setEditingIntervention(null);
  };
  const deleteIntervention = (id) => {
    const _snapInt = assetInterventions; setAssetInterventions(assetInterventions.filter((i) => i.id !== id));
    mcToast.undo("Intervention supprimée", () => { setAssetInterventions(_snapInt); mcToast.success('Restaurée'); });
  };

  const sections = [
    { id: 'inventory', label: 'Inventaire', count: assets.length },
    { id: 'maintenance', label: 'Entretien', count: assetMaintenance.length },
    { id: 'interventions', label: 'Pannes & réparations', count: assetInterventions.length },
  ];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      {/* ─── KPI cards ────────────────────────────────────────────────────── */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
        <KpiCard label="Équipements" value={String(totals.assetsCount)} sub={totals.assetsBroken > 0 ? `⚠ ${totals.assetsBroken} en panne` : 'Tous en service'} />
        <KpiCard label="Entretien annuel" value={formatEuro(totals.annualMaintenance)} sub="Contrats récurrents" />
        <KpiCard label="Pannes 12 mois" value={formatEuro(totals.interventions12m)} sub="Réparations ponctuelles" accentColor={palette.wine} />
        <KpiCard label="Coût total annuel" value={formatEuro(totals.annualMaintenance + totals.interventions12m)} sub="Entretien + pannes" accentColor={palette.ink} />
      </div>

      {/* Sub-tabs */}
      <div style={{ display: 'flex', gap: 4, borderBottom: `1px solid ${palette.rule}` }}>
        {sections.map((s) => {
          const isActive = activeSection === s.id;
          return (
            <button
              key={s.id}
              onClick={() => setActiveSection(s.id)}
              style={{
                padding: '8px 16px',
                background: 'none',
                border: 'none',
                borderBottom: isActive ? `2px solid ${palette.wine}` : '2px solid transparent',
                color: isActive ? palette.wine : palette.inkSoft,
                fontWeight: isActive ? 600 : 400,
                cursor: 'pointer',
                fontSize: 13,
              }}
            >
              {s.label} <span style={{ fontSize: 11, opacity: 0.7 }}>({s.count})</span>
            </button>
          );
        })}
      </div>

      {/* ─── INVENTORY SECTION ──────────────────────────────────────────── */}
      {activeSection === 'inventory' && (
        <>
          <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
            <button
              className="mc-btn mc-btn-primary"
              onClick={() => setEditingAsset({
                id: null, name: '', categoryId: 'cuisson', status: 'in_service',
                purchaseDate: '', purchasePrice: null, supplier: '', warrantyEnd: '', notes: '',
              })}
              style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}
            >
              <Plus size={14} /> Ajouter un équipement
            </button>
          </div>

          {assets.length === 0 ? (
            <div className="mc-card" style={{ padding: 32, textAlign: 'center', color: palette.inkSoft }}>
              Aucun équipement enregistré. Commencez par ajouter votre cuisinière, four, frigo…
            </div>
          ) : (
            <div className="mc-card" style={{ overflow: 'hidden' }}>
              <div style={{
                display: 'grid',
                gridTemplateColumns: '2fr 1fr 1fr 1fr 1fr auto',
                gap: 12,
                padding: '12px 20px',
                background: palette.paper,
                fontSize: 11,
                fontWeight: 600,
                color: palette.inkSoft,
                textTransform: 'uppercase',
                letterSpacing: '0.05em',
              }}>
                <div>Équipement</div>
                <div>Catégorie</div>
                <div>Statut</div>
                <div>Entretien/an</div>
                <div>Pannes 12m</div>
                <div></div>
              </div>
              {assetsWithCosts.map((a) => {
                const status = ASSET_STATUSES.find((s) => s.id === a.status);
                const category = assetCategories.find((c) => c.id === a.categoryId);
                return (
                  <div key={a.id} style={{
                    display: 'grid',
                    gridTemplateColumns: '2fr 1fr 1fr 1fr 1fr auto',
                    gap: 12,
                    padding: '14px 20px',
                    borderBottom: `1px solid ${palette.rule}`,
                    alignItems: 'center',
                    fontSize: 13,
                  }}>
                    <div>
                      <div style={{ fontWeight: 600 }}>{a.name}</div>
                      {a.purchaseDate && (
                        <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 2 }}>
                          Acheté le {a.purchaseDate}
                          {a.purchasePrice ? ` · ${formatEuro(a.purchasePrice)}` : ''}
                        </div>
                      )}
                    </div>
                    <div style={{ fontSize: 12, color: palette.inkSoft }}>{category?.label || a.categoryId}</div>
                    <div>
                      <span className="mc-pill" style={{
                        background: (status?.color || palette.inkSoft) + '20',
                        color: status?.color || palette.inkSoft,
                        fontWeight: 600,
                        fontSize: 11,
                      }}>
                        {status?.label || a.status}
                      </span>
                    </div>
                    <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 600 }}>
                      {a.annualMaintenance > 0 ? formatEuro(a.annualMaintenance) : <span style={{ color: palette.inkSoft, fontSize: 12, fontWeight: 400 }}>—</span>}
                      {a.contractsCount > 0 && (
                        <div style={{ fontSize: 10, color: palette.inkSoft, fontWeight: 400 }}>
                          {a.contractsCount} contrat{a.contractsCount > 1 ? 's' : ''}
                        </div>
                      )}
                    </div>
                    <div style={{ fontFamily: 'Fraunces, serif', color: a.interventions12mCost > 0 ? palette.wine : palette.inkSoft }}>
                      {a.interventions12mCost > 0 ? formatEuro(a.interventions12mCost) : <span style={{ fontSize: 12 }}>—</span>}
                      {a.interventions12mCount > 0 && (
                        <div style={{ fontSize: 10, color: palette.inkSoft, fontWeight: 400 }}>
                          {a.interventions12mCount} intervention{a.interventions12mCount > 1 ? 's' : ''}
                        </div>
                      )}
                    </div>
                    <div style={{ display: 'flex', gap: 4 }}>
                      <button className="mc-btn mc-btn-ghost" onClick={() => setEditingAsset(a)} style={{ padding: '4px 8px' }} title="Modifier">
                        <Edit3 size={14} />
                      </button>
                      <button className="mc-btn mc-btn-ghost" onClick={() => deleteAsset(a.id)} style={{ padding: '4px 8px', color: palette.wine }} title="Supprimer">
                        <Trash2 size={14} />
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </>
      )}

      {/* ─── MAINTENANCE SECTION ────────────────────────────────────────── */}
      {activeSection === 'maintenance' && (
        <>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
            <div style={{ fontSize: 12, color: palette.inkSoft, maxWidth: 600 }}>
              Contrats d'entretien récurrents (révisions périodiques, maintenance préventive).
              Le coût annuel se calcule automatiquement selon la fréquence.
            </div>
            <button
              className="mc-btn mc-btn-primary"
              onClick={() => setEditingMaintenance({
                id: null, assetId: assets[0]?.id || '', supplier: '', frequency: 'annual',
                amount: 0, lastDate: '', nextDate: '', notes: '', active: true,
              })}
              disabled={assets.length === 0}
              style={{ display: 'inline-flex', alignItems: 'center', gap: 6, opacity: assets.length === 0 ? 0.5 : 1 }}
              title={assets.length === 0 ? "Ajoutez d'abord un équipement" : "Nouveau contrat"}
            >
              <Plus size={14} /> Nouveau contrat
            </button>
          </div>

          {assetMaintenance.length === 0 ? (
            <div className="mc-card" style={{ padding: 32, textAlign: 'center', color: palette.inkSoft }}>
              Aucun contrat d'entretien enregistré.
            </div>
          ) : (
            <div className="mc-card" style={{ overflow: 'hidden' }}>
              {assetMaintenance.map((m) => {
                const asset = assets.find((a) => a.id === m.assetId);
                const freq = CONTRACT_FREQUENCIES.find((f) => f.id === m.frequency);
                const annual = (m.amount || 0) * (freq?.perYear || 0);
                return (

// ═══════════════════════════════════════════════════════════════════════════
//   SMALL EQUIPMENT VIEW — petit équipement (vaisselle, verres, couverts…)
// ═══════════════════════════════════════════════════════════════════════════
//
// Volontairement minimaliste : 3 sections (articles, achats, inventaires).
// Pas de notion de "casse" ponctuelle — la perte se déduit de l'écart entre
// deux inventaires physiques.

function SmallEquipmentView({ context }) {
  const {
    equipment, setEquipment,
    equipmentPurchases, setEquipmentPurchases,
    equipmentInventories, setEquipmentInventories,
    equipmentCategories,
  } = context;

  const [editingArticle, setEditingArticle] = useState(null)
  const [mergingEquipment, setMergingEquipment] = useState(null);;
  const [addingPurchase, setAddingPurchase] = useState(false);
  const [addingInventory, setAddingInventory] = useState(false);
  const [activeSection, setActiveSection] = useState('articles');
  // Recherche et filtre catégorie pour la section articles
  const [searchQuery, setSearchQuery] = useState('');
  const [categoryFilter, setCategoryFilter] = useState('all');
  const [supplierFilter, setSupplierFilter] = useState('all');

  // ─── Computed views ────────────────────────────────────────────────────
  // Build a per-article snapshot of its last inventoried qty + cumulative
  // purchases since that inventory, so the user can roughly see "where I am
  // now". The "estimated current" is informative only — the real number comes
  // from the next physical count.
  const articlesWithStock = useMemo(() => {
    return equipment.map((eq) => {
      // Find most recent inventory entry for this article
      let lastInv = null;
      for (const inv of equipmentInventories) {
        for (const entry of (inv.entries || [])) {
          if (entry.equipmentId !== eq.id) continue;
          if (!lastInv || inv.date > lastInv.date) {
            lastInv = { date: inv.date, qty: entry.qty };
          }
        }
      }
      // Purchases since last inventory (or all if no inventory yet)
      const cutoff = lastInv?.date || '0000-00-00';
      let boughtSince = 0;
      let totalSpent = 0;
      let totalUnits = 0;
      let totalValue = 0;
      // Fournisseur(s) — on garde le plus récent + le nombre de fournisseurs
      // distincts pour signaler si l'article tourne entre plusieurs sources.
      let lastSupplier = null;
      let lastSupplierDate = '';
      const supplierSet = new Set();
      for (const p of equipmentPurchases) {
        for (const it of (p.items || [])) {
          if (it.equipmentId !== eq.id) continue;
          totalUnits += (it.qty || 0);
          totalValue += (it.total || 0);
          if ((p.date || '') > cutoff) {
            boughtSince += (it.qty || 0);
            totalSpent += (it.total || 0);
          }
          const sup = (p.supplier || '').trim();
          if (sup) {
            supplierSet.add(sup);
            if ((p.date || '') >= lastSupplierDate) {
              lastSupplier = sup;
              lastSupplierDate = p.date || '';
            }
          }
        }
      }
      const supplierCount = supplierSet.size;
      const avgUnitPrice = totalUnits > 0 ? totalValue / totalUnits : (eq.estimatedUnitPrice || null);
      // Le prix est purement estimé seulement si on n'a aucun achat enregistré.
      // (Subtilité : à l'import d'une facture, estimatedUnitPrice est auto-rempli
      //  à partir du prix d'achat, donc on ne peut pas se fier à `avgUnitPrice ===
      //  estimatedUnitPrice` pour détecter une « estimation pure ».)
      const priceIsEstimated = totalUnits === 0 && eq.estimatedUnitPrice != null;
      const estimatedCurrent = lastInv ? lastInv.qty + boughtSince : null;
      return { ...eq, lastInv, boughtSince, estimatedCurrent, totalSpent, avgUnitPrice, priceIsEstimated, lastSupplier, supplierCount, suppliers: supplierSet };
    });
  }, [equipment, equipmentPurchases, equipmentInventories]);

  // Liste plate des fournisseurs d'équipement présents dans les achats (triée).
  const availableSuppliers = useMemo(() => {
    const set = new Set();
    for (const p of equipmentPurchases) {
      const sup = (p.supplier || '').trim();
      if (sup) set.add(sup);
    }
    return Array.from(set).sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }));
  }, [equipmentPurchases]);

  // Articles filtrés par recherche (nom + alias), catégorie et fournisseur.
  // Calcul mémoïsé pour éviter un re-filter à chaque render. Aligné sur le
  // pattern utilisé dans ArticlesView pour rester cohérent côté UX.
  const filteredArticles = useMemo(() => {
    const q = normalizeText(searchQuery);
    return articlesWithStock.filter((a) => {
      // Catégorie
      if (categoryFilter !== 'all' && a.categoryId !== categoryFilter) return false;
      // Fournisseur : vérifie que l'article a été acheté chez ce fournisseur
      if (supplierFilter !== 'all') {
        if (!a.suppliers || !a.suppliers.has(supplierFilter)) return false;
      }
      // Recherche : nom + alias
      if (!q) return true;
      if (normalizeText(a.name || '').includes(q)) return true;
      if ((a.aliases || []).some((al) => normalizeText(al).includes(q))) return true;
      return false;
    });
  }, [articlesWithStock, searchQuery, categoryFilter, supplierFilter]);

  // ─── Article CRUD ──────────────────────────────────────────────────────
  const saveArticle = (article) => {
    if (article.id && equipment.find((e) => e.id === article.id)) {
      setEquipment(equipment.map((e) => (e.id === article.id ? article : e)));
    } else {
      setEquipment([...equipment, { ...article, id: article.id || generateId('eq') }]);
    }
    setEditingArticle(null);
  };
  const deleteArticle = (id) => {
    const _eqArt = equipment.find((e) => e.id === id); if (!_eqArt) return;
    const _snapEq = equipment; setEquipment(equipment.filter((e) => e.id !== id));
    mcToast.undo(`Article supprimé : ${_eqArt.name}`, () => { setEquipment(_snapEq); mcToast.success('Restauré'); });
  };

  // ─── Purchase CRUD ─────────────────────────────────────────────────────
  const savePurchase = (purchase) => {
    setEquipmentPurchases([
      ...equipmentPurchases,
      { ...purchase, id: purchase.id || generateId('eqp') },
    ]);
    setAddingPurchase(false);
  };
  const deletePurchase = (id) => {
    const _snapEqP = equipmentPurchases; setEquipmentPurchases(equipmentPurchases.filter((p) => p.id !== id));
    mcToast.undo("Achat supprimé", () => { setEquipmentPurchases(_snapEqP); mcToast.success('Restauré'); });
  };

  // ─── Inventory CRUD ────────────────────────────────────────────────────
  const saveInventory = (inv) => {
    setEquipmentInventories([
      ...equipmentInventories,
      { ...inv, id: inv.id || generateId('eqi') },
    ]);
    setAddingInventory(false);
  };
  const deleteInventory = (id) => {

            <button
              className="mc-btn mc-btn-primary"

              title={equipment.length === 0 ? "Ajoutez d'abord des articles" : "Faire un inventaire"}

              <Plus size={14} /> Faire un inventaire
            </button>
          </div>

          {equipmentInventories.length === 0 ? (
            <div className="mc-card" style={{ padding: 32, textAlign: 'center', color: palette.inkSoft }}>
              Aucun inventaire enregistré.
            </div>
          ) : (
            <div className="mc-card" style={{ overflow: 'hidden' }}>
              {[...equipmentInventories].sort((a, b) => (b.date || '').localeCompare(a.date || '')).map((inv) => (
                <div key={inv.id} style={{ padding: '14px 20px', borderBottom: `1px solid ${palette.rule}` }}>

                    <button className="mc-btn mc-btn-ghost" onClick={() => deleteInventory(inv.id)} style={{ padding: '2px 6px', color: palette.wine }}>
                      <Trash2 size={12} />

                  {(inv.entries || []).map((e, idx) => {
                    const article = equipment.find((a) => a.id === e.equipmentId);
                    return (
                      <div key={idx} style={{ fontSize: 12, color: palette.inkSoft, marginLeft: 12 }}>

                    );
                  })}

          )}
        </>
      )}

      {/* ─── MODALES ────────────────────────────────────────────────────── */}
      {editingArticle && (
        <EquipmentArticleEditor
          article={editingArticle}
          onSave={saveArticle}
          onCancel={() => setEditingArticle(null)}
          categories={equipmentCategories}
        />
      )}

      {mergingEquipment && (
        <EquipmentMergeModal
          source={mergingEquipment}
          equipment={equipment}
          setEquipment={setEquipment}
          equipmentPurchases={equipmentPurchases}
          setEquipmentPurchases={setEquipmentPurchases}
          onClose={() => setMergingEquipment(null)}
        />
      )}
      {addingPurchase && (
        <EquipmentPurchaseEditor
          equipment={equipment}
          onSave={savePurchase}
          onCancel={() => setAddingPurchase(false)}
        />
      )}
      {addingInventory && (
        <EquipmentInventoryEditor
          equipment={equipment}
          onSave={saveInventory}
          onCancel={() => setAddingInventory(false)}
        />
      )}
    </div>
  );
}

/**
 * Modal de fusion/liaison d'articles équipement.
 * Permet de fusionner deux articles en un seul (les alias du source
 * sont transférés vers la cible, et les achats sont redirigés).
 */
function EquipmentMergeModal({ source, equipment, setEquipment, equipmentPurchases, setEquipmentPurchases, onClose }) {
  const [targetId, setTargetId] = useState('');
  const [search, setSearch] = useState('');

  const availableTargets = useMemo(() => {
    const q = search.toLowerCase();
    return equipment
      .filter((e) => e.id !== source.id)
      .filter((e) => !q || e.name.toLowerCase().includes(q))
      .sort((a, b) => a.name.localeCompare(b.name));
  }, [equipment, source.id, search]);

  const target = equipment.find((e) => e.id === targetId) || null;

  const affectedPurchases = useMemo(() => {
    return equipmentPurchases.filter((p) =>
      (p.items || []).some((it) => it.equipmentId === source.id)
    ).length;
  }, [equipmentPurchases, source.id]);

  const handleMerge = () => {
    if (!target) return;
    if (!window.confirm(`Fusionner "${source.name}" dans "${target.name}" ? Cette action est irréversible.`)) return;

    // Merge aliases from source into target
    const sourceAliases = source.aliases || [source.name];
    const targetAliases = target.aliases || [];
    const mergedAliases = [...targetAliases];
    for (const a of sourceAliases) {
      if (!mergedAliases.some((x) => normalizeText(x) === normalizeText(a))) {
        mergedAliases.push(a);
      }
    }
    // Also add source name as alias if not already there
    if (!mergedAliases.some((x) => normalizeText(x) === normalizeText(source.name))) {
      mergedAliases.push(source.name);
    }

    // Update target with merged aliases
    const updatedTarget = { ...target, aliases: mergedAliases };

    // Redirect all purchases from source to target
    const updatedPurchases = equipmentPurchases.map((p) => ({
      ...p,
      items: (p.items || []).map((it) =>
        it.equipmentId === source.id ? { ...it, equipmentId: target.id } : it
      ),
    }));

    // Remove source, update target
    setEquipment(equipment.filter((e) => e.id !== source.id).map((e) => e.id === target.id ? updatedTarget : e));
    setEquipmentPurchases(updatedPurchases);
    onClose();
  };

  return (
    <div className="mc-overlay" onClick={onClose}>
      <div className="mc-modal" style={{ maxWidth: 520 }} onClick={(e) => e.stopPropagation()}>
        <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 4px' }}>
          Fusionner un article équipement
        </h3>
        <p style={{ fontSize: 12, color: palette.inkSoft, margin: '0 0 16px', lineHeight: 1.5 }}>
          <strong style={{ color: palette.ink }}>{source.name}</strong> sera fusionné dans l'article cible.
          Ses alias et achats seront transférés.
        </p>

        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 12, color: palette.inkSoft, marginBottom: 4 }}>Rechercher un article cible</div>
          <input
            className="mc-input"
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder="Nom de l'article..."
            autoFocus
          />
        </div>

        <div style={{ border: '1px solid ' + palette.rule, borderRadius: 6, maxHeight: 220, overflowY: 'auto', marginBottom: 16 }}>
          {availableTargets.length === 0 ? (
            <div style={{ padding: 16, color: palette.inkSoft, fontSize: 13, textAlign: 'center' }}>Aucun article trouvé</div>
          ) : availableTargets.map((eq) => (
            <div
              key={eq.id}
              onClick={() => setTargetId(eq.id)}
              style={{
                padding: '10px 14px',
                borderBottom: '1px solid ' + palette.rule,
                cursor: 'pointer',
                background: targetId === eq.id ? palette.sage + '15' : 'transparent',
                display: 'flex',
                justifyContent: 'space-between',
                alignItems: 'center',
              }}
            >
              <div>
                <div style={{ fontSize: 13, fontWeight: targetId === eq.id ? 600 : 400 }}>{eq.name}</div>
                {eq.aliases?.length > 0 && (
                  <div style={{ fontSize: 10, color: palette.inkSoft, marginTop: 2 }}>{eq.aliases.length} alias</div>
                )}
              </div>
              {targetId === eq.id && <span style={{ color: palette.sage, fontSize: 16 }}>✓</span>}
            </div>
          ))}
        </div>

        {target && (
          <div style={{ padding: '8px 12px', background: palette.amber + '15', borderRadius: 6, fontSize: 12, marginBottom: 16, color: palette.ink }}>
            <strong>{affectedPurchases} achat{affectedPurchases > 1 ? 's' : ''}</strong> seront redirigés vers <strong>{target.name}</strong>.
            Les alias de <em>{source.name}</em> seront ajoutés à <em>{target.name}</em>.
          </div>
        )}

        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <button className="mc-btn mc-btn-ghost" onClick={onClose}>Annuler</button>
          <button
            className="mc-btn mc-btn-primary"
            disabled={!target}
            onClick={handleMerge}
            style={{ opacity: target ? 1 : 0.5 }}
          >
            <Link2 size={14} style={{ marginRight: 4 }} /> Fusionner
          </button>
        </div>
      </div>
    </div>
  );
}

function EquipmentArticleEditor({ article, onSave, onCancel, categories }) {
  const equipmentCategories = categories || EQUIPMENT_CATEGORIES;
  const [draft, setDraft] = useState({
    id: article.id,
    name: article.name || '',
    categoryId: article.categoryId || 'vaisselle',
    threshold: article.threshold || 0,
    estimatedUnitPrice: article.estimatedUnitPrice || null,
    aliases: article.aliases || [],
  });
  const [newAlias, setNewAlias] = useState('');
  const canSave = draft.name.trim().length > 0;
  const addAlias = () => {
    const a = newAlias.trim();
    if (!a || draft.aliases.includes(a)) return;
    setDraft({ ...draft, aliases: [...draft.aliases, a] });
    setNewAlias('');
  };
  const removeAlias = (i) => setDraft({ ...draft, aliases: draft.aliases.filter((_, idx) => idx !== i) });

  return (
    <div className="mc-overlay" onClick={onCancel}>
      <div className="mc-modal" style={{ maxWidth: 520, padding: 32 }} onClick={(e) => e.stopPropagation()}>
        <h3 className="mc-display" style={{ fontSize: 20, fontWeight: 600, margin: '0 0 24px' }}>
          {article.id ? "Modifier l'article" : 'Nouvel article'}
        </h3>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>

          <div>
            <label className="mc-label">Nom</label>
            <input
              type="text"
              value={draft.name}
              onChange={(e) => setDraft({ ...draft, name: e.target.value })}
              className="mc-input"
              placeholder="Assiette plate, Verre à vin, …"
              autoFocus
            />
          </div>

          <div>
            <label className="mc-label">Catégorie</label>
            <select
              value={draft.categoryId}
              onChange={(e) => setDraft({ ...draft, categoryId: e.target.value })}
              className="mc-input"
            >
              {equipmentCategories.map((c) => (
                <option key={c.id} value={c.id}>{c.label}</option>
              ))}
            </select>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <div>
              <label className="mc-label">Seuil d'alerte</label>
              <input
                type="number"
                min="0"
                value={draft.threshold}
                onChange={(e) => setDraft({ ...draft, threshold: parseInt(e.target.value, 10) || 0 })}
                className="mc-input"
              />
              <div style={{ fontSize: 10, color: palette.inkSoft, marginTop: 2 }}>0 = pas d'alerte</div>
            </div>
            <div>
              <label className="mc-label">Prix unitaire estimé (€)</label>
              <input
                type="number"
                step="0.01"
                min="0"
                value={draft.estimatedUnitPrice || ''}
                onChange={(e) => setDraft({ ...draft, estimatedUnitPrice: e.target.value === '' ? null : parseFloat(e.target.value) })}
                className="mc-input"
                placeholder="Optionnel"
              />
            </div>
          </div>

          <div>
            <label className="mc-label">Labels fournisseurs (alias)</label>
            <div style={{ display: 'flex', gap: 6, marginBottom: 8 }}>
              <input
                type="text"
                value={newAlias}
