    if (getSlot(x, 'CH') === empId) return day - x - 1;
  }
  return 99;
}

function postInWeek(empId, postCode, day) {
  const w = dow(S.y, S.m, day);
  const monday = day - (w === 0 ? 6 : w - 1);
  let count = 0;
  for (let x = Math.max(1, monday); x < day; x++) {
    if (getSlot(x, postCode) === empId) count++;
  }
  return count;
}

function daysInWeek(empId, day) {
  const w = dow(S.y, S.m, day);
  const monday = day - (w === 0 ? 6 : w - 1);
  let count = 0;
  for (let x = Math.max(1, monday); x < day; x++) {
    for (let i = 0; i < AP.length; i++) {
      if (getSlot(x, AP[i].c) === empId) { count++; break; }
    }
  }
  return count;
}

function uncovered() {
  const D = dim(S.y, S.m);
  const result = [];
  for (let d = 1; d <= D; d++) {
    if (isClosed(d)) continue;  // ignorer les jours fermés
    const activePosts = getActivePosts(d);
    for (let i = 0; i < activePosts.length; i++) {
      if (getSlot(d, activePosts[i]) === null) {
        result.push('J' + d + ':' + activePosts[i]);
      }
    }
  }
  return result;
}

function closeModal() {
  if (S.view === 'rapport') { S.view = 'rapports'; S.rapType = null; }
  S.modal = null;
  render();
}

/* ───────────────────────────────────────────────────────────────────────────
   HELPERS VUE SEMAINE — découpage du mois en semaines (lu→di)
   ─────────────────────────────────────────────────────────────────────────── */
function getWeekDays() {
  const D = dim(S.y, S.m);
  const weeks = [];
  let week = [];
  for (let d = 1; d <= D; d++) {
    week.push(d);
    if (dow(S.y, S.m, d) === 0 || d === D) {
      weeks.push(week);
      week = [];
    }
  }
  if (week.length) weeks.push(week);

  const idx = Math.max(0, Math.min(S.weekOf, weeks.length - 1));
  return { days: weeks[idx] || [], total: weeks.length, idx: idx };
}

function getGridDays() {
  if (S.view === 'week') return getWeekDays().days;
  const result = [];
  for (let d = 1; d <= dim(S.y, S.m); d++) result.push(d);
  return result;
}

/* ───────────────────────────────────────────────────────────────────────────
   ALERTES LÉGALES (Code du travail)
   - Plus de 6 jours consécutifs = violation du repos hebdo
   - Plus de 48h dans la semaine (lun→dim) = dépassement durée max
   ─────────────────────────────────────────────────────────────────────────── */
function legalAlerts(empId) {
  const alerts = [];
  const D = dim(S.y, S.m);

  // Jours consécutifs dans le mois
  let consec = 0;
  let maxConsec = 0;
  for (let d = 1; d <= D; d++) {
    let worked = false;
    for (let i = 0; i < AP.length; i++) {
      if (getSlot(d, AP[i].c) === empId) { worked = true; break; }
    }
    if (worked) consec++;
    else consec = 0;
    if (consec > maxConsec) maxConsec = consec;
  }
  if (maxConsec > 6) alerts.push('Max ' + maxConsec + ' j consecutifs');

  // Cumul hebdomadaire (mesuré à chaque lundi sur les 7 jours suivants)
  for (let d = 1; d <= D; d++) {
    if (dow(S.y, S.m, d) === 1) {
      let weekHours = 0;
      for (let x = d; x < d + 7 && x <= D; x++) {
        for (let i = 0; i < AP.length; i++) {
          if (getSlot(x, AP[i].c) === empId) {
            weekHours += postH(AP[i].c);
            break;
          }
        }
      }
      if (weekHours > 48) {
        alerts.push('Sem.' + Math.ceil(d / 7) + ': ' + weekHours + 'h');
      }
    }
  }
  return alerts;
}

/* ═══════════════════════════════════════════════════════════════════════════
   DIAGNOSTICS — "Pourquoi ce poste n'est-il pas couvert ?"
   ───────────────────────────────────────────────────────────────────────────
   diagnoseSlot(d, pc)    retourne pour CHAQUE employé la liste des raisons
                          qui l'empêchent d'occuper ce poste ce jour-là
   mainBlockReason(d, pc) raison majoritaire (pour le bandeau en haut)
   suggestSolutions(d, pc) propose des actions pour débloquer (move/override/swap)
   ═══════════════════════════════════════════════════════════════════════════ */

function diagnoseSlot(d, pc) {
  const results = [];
  const todaySet = assignedOnDay(d);
  const D = dim(S.y, S.m);
  const maxDays = D >= 31 ? RL.mj31 : RL.mj30;
  const isCuisinePost = POSTES_CUISINE.some(p => p.c === pc);

  S.emps.forEach(e => {
    const reasons = [];

    // 1. Section/rôle incompatible — incompatibilité structurelle (sortie tôt)
    if (isCuisinePost) {
      const hasRole = (e.r || []).indexOf(pc) >= 0;
      if (e.s !== 'cuisine' && !e.ec) {
        reasons.push({ icon: '🚫',
          txt: 'Section salle (pas cuisine)', fixable: false });
        return results.push({ emp: e, reasons });
      }
      if (e.s !== 'cuisine' && e.ec && !hasRole) {
        reasons.push({ icon: '🚫',
          txt: 'Polyvalent mais pas habilité ' + pc, fixable: false });
        return results.push({ emp: e, reasons });
      }
      if (!hasRole) {
        reasons.push({ icon: '🚫',
          txt: 'Rôle ' + pc + ' non autorisé', fixable: false });
        return results.push({ emp: e, reasons });
      }
    } else {
      if (e.s !== 'salle') {
        reasons.push({ icon: '🚫',
          txt: 'Section cuisine (pas salle)', fixable: false });
        return results.push({ emp: e, reasons });
      }
      const rs = e.rs || [];
      if (rs.length > 0 && rs.indexOf(pc) < 0) {
        reasons.push({ icon: '🚫',
          txt: 'Poste ' + pc + ' non autorisé', fixable: false });
        return results.push({ emp: e, reasons });
      }
    }

    // 2. Placement manuel (noAutoGen)
    if (e.noAutoGen) {
      reasons.push({ icon: '✋',
        txt: 'Placement manuel uniquement', fixable: false });
    }
    // 3. Pattern de jours (ne travaille pas ce jour)
    if (!canWork(e, S.y, S.m, d)) {
      reasons.push({ icon: '📅',
        txt: 'Ne travaille pas ce jour (' + e.jt + ')', fixable: false });
    }
    // 4. Absences (CP / maladie / indispo souhaitée)
    if (getCp(e.id).indexOf(d) >= 0) {
      reasons.push({ icon: '🌴', txt: 'Congé payé', fixable: false });
    } else if (getMal(e.id).indexOf(d) >= 0) {
      reasons.push({ icon: '🤒', txt: 'Arrêt maladie', fixable: false });
    } else if (getInd(e.id).indexOf(d) >= 0) {
      reasons.push({ icon: '⚠', txt: 'Indisponibilité souhaitée',
        fixable: true, fix: "Retirer l'indisponibilité" });
    }
    // 5. Déjà occupé ailleurs ce jour
    if (todaySet[e.id]) {
      let onPost = '';
      for (let j = 0; j < AP.length; j++) {
        if (getSlot(d, AP[j].c) === e.id) {
          onPost = AP[j].l || AP[j].c;
          break;
        }
      }
      reasons.push({ icon: '📌', txt: 'Déjà assigné à ' + onPost,
        fixable: true, fix: 'Déplacer de ' + onPost + ' vers ' + pc });
    }
    // 6. Limite mensuelle de jours
    if (workedDays(e.id) >= maxDays) {
      reasons.push({ icon: '🔢',
        txt: 'Limite ' + maxDays + 'j/mois atteinte', fixable: false });
    }
    // 7. Repos obligatoire (5j consécutifs + 2j de repos)
    const maxC = e.maxConsec || RL.mjc;
    if (consecBefore(e.id, d) >= maxC) {
      reasons.push({ icon: '💤',
        txt: 'Repos obligatoire (' + maxC + 'j consécutifs)', fixable: false });
    }
    if (needsRest2(e.id, d)) {
      reasons.push({ icon: '💤',
        txt: '2e jour de repos après ' + maxC + 'j consécutifs',
        fixable: false });
    }
    // 8. Max jours/semaine custom
    if (e.maxDPW && daysInWeek(e.id, d) >= e.maxDPW) {
      reasons.push({ icon: '📅',
        txt: 'Max ' + e.maxDPW + 'j/semaine atteint', fixable: false });
    }
    // 9. Contraintes spécifiques au poste Chaud
    if (pc === 'CH') {
      const isFerieDay = !!isFerie(S.y, S.m, d);
      if ((e.chNoDow || []).indexOf(dow(S.y, S.m, d)) >= 0) {
        reasons.push({ icon: '🔥',
          txt: 'Chaud interdit ce jour', fixable: false });
      }
      if (isFerieDay && (e.chNoDow || []).indexOf(0) >= 0) {
        reasons.push({ icon: '🔥',
          txt: 'Chaud interdit les fériés (=dimanche)', fixable: false });
      }
      if (e.chMaxPW && postInWeek(e.id, 'CH', d) >= e.chMaxPW) {
        reasons.push({ icon: '🔥',
          txt: 'Chaud max ' + e.chMaxPW + 'x/semaine atteint',
          fixable: false });
      }
      if (consecChaudBefore(e.id, d) >= 2) {
        reasons.push({ icon: '🔥',
          txt: 'Déjà 2j consécutifs au Chaud', fixable: false });
      }
    }

    // Aucune raison de blocage → employé disponible
    if (!reasons.length) {
      reasons.push({ icon: '✅', txt: 'Disponible',
        fixable: false, available: true });
    }
    results.push({ emp: e, reasons });
  });
  return results;
}

/* Raison majoritaire parmi les employés compatibles (ignore les blocs "section").
   Retourne null si au moins un employé est disponible. */
function mainBlockReason(d, pc) {
  const diag = diagnoseSlot(d, pc);
  const avail = diag.filter(r => r.reasons[0].available);
  if (avail.length) return null;

  const counts = {};
  diag.forEach(r => {
    // 1ère raison non-"🚫" (ignore les incompatibilités de section)
    let main = null;
    for (let i = 0; i < r.reasons.length; i++) {
      if (r.reasons[i].icon !== '🚫') { main = r.reasons[i]; break; }
    }
    if (!main) return;
    counts[main.txt] = (counts[main.txt] || 0) + 1;
  });

  let best = '', bv = 0;
  for (const k in counts) if (counts[k] > bv) { bv = counts[k]; best = k; }
  if (!best) return 'aucun salarié habilité';
  return best;
}

/* Propositions concrètes pour débloquer un poste non couvert.
   3 types de solutions : déplacement, levée d'indispo, échange Chaud hier. */
function suggestSolutions(d, pc) {
  const diag = diagnoseSlot(d, pc);
  const solutions = [];

  // 1. Déplacements possibles (employé déjà affecté à un autre poste)
  diag.forEach(r => {
    r.reasons.forEach(reason => {
      if (reason.fix && reason.icon === '📌') {
        let srcPost = '';
        for (let j = 0; j < AP.length; j++) {
          if (getSlot(d, AP[j].c) === r.emp.id) { srcPost = AP[j].c; break; }
        }
        if (srcPost) {
          solutions.push({
            type: 'move', icon: '↔',
            txt: 'Déplacer <b>' + r.emp.n + '</b> de ' +
                 PM[srcPost].l + ' vers ' + PM[pc].l,
            emp: r.emp, srcPost, tgtPost: pc, day: d
          });
        }
      }
    });
  });

  // 2. Levée d'indisponibilité souhaitée (pas CP/maladie officielle)
  diag.forEach(r => {
    r.reasons.forEach(reason => {
      if (reason.fix && reason.icon === '⚠') {
        solutions.push({
          type: 'override', icon: '⚠',
          txt: "Lever l'indisponibilité de <b>" + r.emp.n +
               '</b> (souhaitée, pas officielle)',
          emp: r.emp, day: d, post: pc
        });
      }
    });
  });

  // 3. Chaud bloqué par 2j consécutifs → échanger avec un remplaçant hier
  if (pc === 'CH') {
    diag.forEach(r => {
      r.reasons.forEach(reason => {
        if (reason.icon === '🔥' &&
            reason.txt.indexOf('2j consécutifs') >= 0 && d >= 2) {
          const prevChaud = getSlot(d - 1, 'CH');
          if (prevChaud && prevChaud === r.emp.id) {
            const altYesterday = S.emps.filter(e2 =>
              e2.id !== r.emp.id &&
              canAssign(e2, d - 1, 'CH') &&
              !assignedOnDay(d - 1)[e2.id]
            );
            if (altYesterday.length) {
              solutions.push({
                type: 'swap', icon: '🔄',
                txt: 'Échanger <b>' + r.emp.n + '</b> avec <b>' +
                     altYesterday[0].n + '</b> au Chaud hier (j.' +
                     String(d - 1) + ') pour débloquer aujourd\'hui',
                emp: r.emp, day: d
              });
            }
          }
        }
      });
    });
  }
  return solutions;
}

/* ═══════════════════════════════════════════════════════════════════════════
   HEURES RÉELLES POINTÉES (S.real) + HELPERS TEMPORELS
   ───────────────────────────────────────────────────────────────────────────
   S.real[moisKey][jour][empId] = { arr, dep, total, note }
     arr/dep/total sont en minutes depuis minuit (number) ou null
   ═══════════════════════════════════════════════════════════════════════════ */

function getReal(year, month, day, empId) {
  const k = year + '-' + String(month + 1).padStart(2, '0');
  return ((S.real[k] || {})[String(day)] || {})[String(empId)] || null;
}

function setReal(year, month, day, empId, obj) {
  const k = year + '-' + String(month + 1).padStart(2, '0');
  if (!S.real[k]) S.real[k] = {};
  if (!S.real[k][String(day)]) S.real[k][String(day)] = {};
  if (obj === null) delete S.real[k][String(day)][String(empId)];
  else S.real[k][String(day)][String(empId)] = obj;
}

/* Un jour a-t-il au moins un pointage enregistré ? */
function dayHasReal(year, month, day) {
  const k = year + '-' + String(month + 1).padStart(2, '0');
  return !!(S.real[k] &&
            S.real[k][String(day)] &&
            Object.keys(S.real[k][String(day)]).length);
}

/* ═══════════════════════════════════════════════════════════════════════════
   DONNÉES QUOTIDIENNES DE CAISSE (S.daily)
   ───────────────────────────────────────────────────────────────────────────
   S.daily[moisKey][jour] = {
     ca, couv,                  CA total + couverts du jour
     fdcVeille, fdcJour,        fonds de caisse veille / jour
     clyo: { esp, chq, cb, ancv, vrmnt, cpt },   encaissements théoriques Clyo
     reel: { cb, vad, amex, ancv, cbanque, esp,  encaissements réels caisse
             encaisser, bons, credit, acompte, depenses },
     serveurs: { empId: { ca, couv } },          CA + couverts par serveur
     obs                        observations libres
   }
   Les heures réelles par salarié restent dans S.real (déjà géré).
   ═══════════════════════════════════════════════════════════════════════════ */

function getDaily(year, month, day) {
  const k = year + '-' + String(month + 1).padStart(2, '0');
  return ((S.daily[k] || {})[String(day)]) || null;
}

function setDaily(year, month, day, obj) {
  const k = year + '-' + String(month + 1).padStart(2, '0');
  if (!S.daily[k]) S.daily[k] = {};
  if (obj === null) delete S.daily[k][String(day)];
  else S.daily[k][String(day)] = obj;
}

/* Crée un objet daily vide avec la structure complète. */
function emptyDaily() {
  return {
    ca: null, couv: null, fdcVeille: null, fdcJour: null,
    clyo: { esp: null, chq: null, cb: null, ancv: null, vrmnt: null, cpt: null },
    reel: { cb: null, vad: null, amex: null, ancv: null, cbanque: null,
            esp: null, encaisser: null, bons: null, credit: null,
            acompte: null, depenses: null },
    serveurs: {},
    obs: ''
  };
}

/* Total des encaissements Clyo (théorique). */
/* Écart de caisse d'un jour : (CA réel − CA déclaré serveurs)
   + (fond jour − fond veille). « À encaisser » exclu du CA réel.
   Retourne null si aucune donnée exploitable. */
function ecartCaisseJour(year, month, day) {
  const dd = getDaily(year, month, day);
  if (!dd) return null;
  const reel = dd.reel || {};
  let caReel = 0, hasReel = false;
  Object.keys(reel).forEach(k => {
    if (k === 'encaisser') return;
    if (reel[k]) { caReel += reel[k]; hasReel = true; }
  });
  let caDecl = 0, hasDecl = false;
  const sv = dd.serveurs || {};
  Object.keys(sv).forEach(eid => {
    if (sv[eid] && sv[eid].ca) { caDecl += sv[eid].ca; hasDecl = true; }
  });
  const fv = dd.fdcVeille || 0;
  const fj = dd.fdcJour || 0;
  if (!hasReel && !hasDecl) return null;
  return (caReel - caDecl) + (fj - fv);
}

function totalClyo(dd) {
  if (!dd || !dd.clyo) return 0;
  return Object.keys(dd.clyo).reduce((s, k) => s + (dd.clyo[k] || 0), 0);
}

/* Total recette réel (caisse). Les dépenses s'ajoutent (sorties documentées). */
function totalReel(dd) {
  if (!dd || !dd.reel) return 0;
  return Object.keys(dd.reel).reduce((s, k) => s + (dd.reel[k] || 0), 0);
}

/* Un jour a-t-il des données de caisse saisies ? */
function dayHasDaily(year, month, day) {
  const dd = getDaily(year, month, day);
  if (!dd) return false;
  return dd.ca !== null || dd.couv !== null
    || totalClyo(dd) > 0 || totalReel(dd) > 0
    || Object.keys(dd.serveurs || {}).length > 0;
}

/* ═══════════════════════════════════════════════════════════════════════════
   COÛT DE MAIN-D'ŒUVRE D'UNE JOURNÉE
   ───────────────────────────────────────────────────────────────────────────
   Pour chaque salarié présent ce jour :
   - CONTRAT  : quote-part du salaire mensuel = salaire ÷ jours travaillés du mois
   - EXTRA    : heures réelles (ou estimées) × taux horaire
   Le coefficient de charges s'applique au total. Retourne { cout, complet }.
   "complet" = true si tous les présents ont une rémunération définie.
   ═══════════════════════════════════════════════════════════════════════════ */
function dayLaborCost(year, month, day) {
  const k = year + '-' + String(month + 1).padStart(2, '0');
  const dayPl = (S.pl[k] || {})[String(day)] || {};
  const ids = [];
  // 1) Présents au planning (postes affectés)
  Object.values(dayPl).forEach(eid => {
    if (eid != null && ids.indexOf(eid) < 0) ids.push(eid);
  });
  // 2) Présents par heures réelles pointées (pointage / import) — un jour peut
  //    avoir des heures sans planning poste par poste (mois importés).
  const rk = (S.real[k] || {})[String(day)] || {};
  Object.keys(rk).forEach(eidStr => {
    const r = rk[eidStr];
    if (r && r.total != null && r.total > 0) {
      const eid = parseInt(eidStr, 10);
      if (ids.indexOf(eid) < 0) ids.push(eid);
    }
  });

  let cout = 0, heures = 0, complet = true;
  ids.forEach(eid => {
    const e = findEmp(eid);
    if (!e) return;
    const r = getReal(year, month, day, eid);
    let h;
    if (r && r.total != null) h = r.total / 60;
    else h = RL.hpj;
    heures += h;

    if (e.t === 'extra') {
      // Extra : payé à l'heure
      const taux = (e.taux != null && e.taux !== '') ? e.taux : null;
      if (taux == null) complet = false;
      else cout += h * taux;
    } else {
      // Contrat : si des heures réelles sont saisies ce jour, on facture
      // au taux horaire effectif (salaire mensuel ÷ heures contrat). Sinon,
      // quote-part du salaire mensuel répartie sur les jours travaillés.
      const sal = (e.salaire != null && e.salaire !== '') ? e.salaire : null;
      if (sal == null) {
        complet = false;
      } else if (r && r.total != null && e.h) {
        const tauxEff = sal / e.h;          // €/heure déduit du contrat
        cout += h * tauxEff;
      } else {
        const nbJours = empWorkDaysInMonth(year, month, eid);
        if (nbJours > 0) cout += sal / nbJours;
      }
    }

    // Prime couvert : quote-part répartie sur les jours travaillés du mois
    if ((e.primeCouv || 'aucune') !== 'aucune') {
      const nbJours = empWorkDaysInMonth(year, month, eid);
      if (nbJours > 0) {
        const primeMois = empPrimeCouvert(year, month, eid);
        cout += primeMois / nbJours;
      }
    }
  });

  const coef = (typeof _chargesCoef === 'number' && _chargesCoef > 0)
    ? _chargesCoef : 1.0;
  cout = cout * coef;

  return { cout: cout, heures: heures, complet: complet, nbPresents: ids.length };
}

/* Nombre de jours où un salarié est planifié dans le mois (pour répartir
   le salaire mensuel fixe sur le coût journalier). */
function empWorkDaysInMonth(year, month, empId) {
  const k = year + '-' + String(month + 1).padStart(2, '0');
  const monthPl = S.pl[k] || {};
  let n = 0;
  Object.keys(monthPl).forEach(dayStr => {
    const dayPl = monthPl[dayStr] || {};
    const present = Object.values(dayPl).some(eid => eid === empId);
    if (present) n++;
  });
  return n;
}

/* ═══════════════════════════════════════════════════════════════════════════
   PAIE MENSUELLE — heures supplémentaires + prime couvert
   ═══════════════════════════════════════════════════════════════════════════ */

/* Total des heures réelles d'un salarié sur le mois (en heures décimales). */
function empRealHoursMonth(year, month, empId) {
  const k = year + '-' + String(month + 1).padStart(2, '0');
  const monthReal = S.real[k] || {};
  let totalMin = 0;
  Object.keys(monthReal).forEach(dayStr => {
    const r = (monthReal[dayStr] || {})[String(empId)];
    if (r && r.total != null) totalMin += r.total;
  });
  return totalMin / 60;
}

/* Seuil de contrat (heures/mois) au-delà duquel les heures supplémentaires
   ne sont PAS payées mensuellement (régularisation en fin d'année).
   Modifiable dans Paramètres, stocké dans localStorage. */
let HS_SEUIL_CONTRAT = parseInt(localStorage.getItem('hs_seuil'), 10) || 100;

/* Heures supplémentaires du mois (contrats) = heures réelles − heures contrat.
   Retourne { hs, montant, payableMensuel }.
   - hs : heures sup réelles (toujours calculées, pour info)
   - montant : 0 si type extra OU contrat > seuil (report fin d'année)
   - payableMensuel : true seulement si contrat ≤ seuil */
function empHeuresSup(year, month, empId) {
  const e = findEmp(empId);
  if (!e || e.t === 'extra') {
    return { hs: 0, montant: 0, payableMensuel: false };
  }
  const real = empRealHoursMonth(year, month, empId);
  const contrat = e.h || 0;
  const hs = Math.max(0, real - contrat);
  const taux = (e.tauxHS != null && e.tauxHS !== '') ? e.tauxHS : 0;
  // Au-delà du seuil : HS reportées en fin d'année → non payées mensuellement
  const payableMensuel = contrat <= HS_SEUIL_CONTRAT;
  return {
    hs: hs,
    montant: payableMensuel ? hs * taux : 0,
    payableMensuel: payableMensuel
  };
}

/* Rémunération d'un EXTRA sur le mois = heures réelles × taux horaire.
   Retourne { heures, taux, montant }. 0 pour un contrat ou sans taux. */
function empSalaireExtra(year, month, empId) {
  const e = findEmp(empId);
  if (!e || e.t !== 'extra') return { heures: 0, taux: 0, montant: 0 };
  const heures = empRealHoursMonth(year, month, empId);
  const taux = (e.taux != null && e.taux !== '') ? e.taux : 0;
  return { heures: heures, taux: taux, montant: heures * taux };
}

/* Identifiants exclus du décompte des personnes en salle pour la prime
   couvert du dimanche : Doro (18) et Vincent (25). La plonge (salarié dont
   les postes autorisés se limitent à la Plonge, ex. Albertine) et la cuisine
   sont exclues par la logique ci-dessous. */
const PRIME_EXCLUS_IDS = [18, 25];

/* Vrai si le salarié est cantonné à la plonge (postes autorisés = ['PL']). */
function estPlongeur(e) {
  return !!(e && e.rs && e.rs.length === 1 && e.rs[0] === 'PL');
}

/* Nombre de personnes en salle présentes un jour donné, pour répartir la
   prime couvert du dimanche.
   Règle : toutes les personnes qui ont travaillé EN SALLE ce jour (heures
   réelles + section réelle = salle), SAUF la plonge, Doro et Vincent.
   La section réelle tient compte des polyvalents basculés cuisine/salle. */
function nbServeursEligibles(year, month, day) {
  let n = 0;
  S.emps.forEach(e => {
    if (PRIME_EXCLUS_IDS.indexOf(e.id) >= 0) return; // Doro, Vincent exclus
    if (estPlongeur(e)) return;                      // plonge exclue
    const r = getReal(year, month, day, e.id);
    if (!r || r.total == null || r.total <= 0) return; // présence = heures
    if (realSect(year, month, day, e.id) !== 'salle') return; // section réelle
    n++;
  });
  return n;
}

/* Couverts attribués à un serveur un jour donné, pour le calcul de prime :
   - dimanche : sa part = couverts du jour ÷ nb personnes en salle présentes,
     à condition que le serveur soit lui-même présent (heures réelles) ce jour
   - autres jours : ses couverts réels saisis
   Doro et Vincent ne touchent jamais de prime couvert.
   Retourne un nombre (0 si rien). */
function couvertsPrimeJour(year, month, day, empId) {
  const e = findEmp(empId);
  if (!e || (e.primeCouv || 'aucune') === 'aucune') return 0;
  if (PRIME_EXCLUS_IDS.indexOf(empId) >= 0) return 0;   // Doro, Vincent exclus
  const dd = getDaily(year, month, day);
  if (!dd) return 0;
  const isDimanche = dow(year, month, day) === 0;
  if (isDimanche) {
    // Le serveur doit être présent ce dimanche (heures réelles saisies)
    const r = getReal(year, month, day, empId);
    if (!r || r.total == null || r.total <= 0) return 0;
    const totCouv = dd.couv || 0;
    const nbElig = nbServeursEligibles(year, month, day);
    return nbElig > 0 ? totCouv / nbElig : 0;
  }
  // Jour normal : couverts réels du serveur
  const sv = (dd.serveurs || {})[empId];
  return (sv && sv.couv) ? sv.couv : 0;
}

/* Prime couvert mensuelle d'un salarié.
   - standard : (somme des couverts attribués du mois) ÷ 3
   - juliette : (couverts totaux du resto du mois ÷ 2) ÷ 6,55957
   - aucune   : 0 */
function empPrimeCouvert(year, month, empId) {
  const e = findEmp(empId);
  if (!e) return 0;
  const mode = e.primeCouv || 'aucune';
  if (mode === 'aucune') return 0;

  const D = dim(year, month);

  if (mode === 'juliette') {
    let totCouvResto = 0;
    for (let d = 1; d <= D; d++) {
      const dd = getDaily(year, month, d);
      if (dd && dd.couv) totCouvResto += dd.couv;
    }
    return (totCouvResto / 2) / 6.55957;
  }

  // Standard
  let somme = 0;
  for (let d = 1; d <= D; d++) {
    somme += couvertsPrimeJour(year, month, d, empId);
  }
  return somme / 3;
}

/* Détail jour par jour de la prime couvert d'un salarié, pour vérification.
   Retourne un tableau de lignes { jour, dim, couv, nb, part }. */
function primeCouvertDetail(year, month, empId) {
  const e = findEmp(empId);
  const rows = [];
  if (!e || (e.primeCouv || 'aucune') === 'aucune') return rows;
  const D = dim(year, month);
  for (let d = 1; d <= D; d++) {
    const part = couvertsPrimeJour(year, month, d, empId);
    if (part <= 0) continue;
    const isDim = dow(year, month, d) === 0;
    const dd = getDaily(year, month, d);
    rows.push({
      jour: d,
      dim: isDim,
      couv: isDim ? (dd && dd.couv ? dd.couv : 0) : part,
      nb: isDim ? nbServeursEligibles(year, month, d) : null,
      part: part
    });
  }
  return rows;
}


/* Parse une heure "8h00", "8:00", "08:30", "8" → minutes depuis minuit.
   Retourne null si invalide. */
function parseTime(t) {
  if (!t) return null;
  t = String(t).trim().toLowerCase().replace(/\s/g, '').replace(/h/g, ':');
  if (t.indexOf(':') < 0) t = t + ':00';
  const parts = t.split(':');
  const hh = parseInt(parts[0], 10);
  const mm = parseInt(parts[1], 10) || 0;
  if (isNaN(hh) || hh < 0 || hh > 23 || mm < 0 || mm > 59) return null;
  return hh * 60 + mm;
}

/* Formate un nombre de minutes → "8h00" / "15h30" */
function fmtMin(m) {
  if (m === null || m === undefined || isNaN(m)) return '';
  const h = Math.floor(m / 60);
  const mn = m % 60;
  return h + 'h' + (mn < 10 ? '0' : '') + mn;
}

/* Formate une durée en minutes → "8h" si rond, "8h30" sinon. */
function fmtDur(m) {
  if (m === null || m === undefined || isNaN(m)) return '—';
  const h = Math.floor(m / 60);
  const mn = m % 60;
  return mn === 0 ? h + 'h' : h + 'h' + (mn < 10 ? '0' : '') + mn;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MATCHING NOM → EMPLOYÉ (pour le pointage par IA)
   ───────────────────────────────────────────────────────────────────────────
   L'IA lit des noms manuscrits parfois bruités ("Marie-Ange" ↔ "M. ANGE",
   "THALIA" ↔ "Thaily", etc.). On applique une stratégie en 4 étapes.
   ═══════════════════════════════════════════════════════════════════════════ */

/* Normalise un nom : lowercase, sans accents, sans caractères spéciaux. */
function normName(s) {
  return String(s || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')   // retire les diacritiques
    .replace(/[^a-z]/g, '');
}

/* Distance de Levenshtein simple (nombre min de modifications char par char). */
function levDist(a, b) {
  const m = a.length, n = b.length;
  if (!m) return n;
  if (!n) return m;
  const dp = [];
  for (let i = 0; i <= m; i++) {
    dp.push([i]);
    for (let j = 1; j <= n; j++) dp[i].push(i === 0 ? j : 0);
  }
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i - 1] === b[j - 1]
        ? dp[i - 1][j - 1]
        : 1 + Math.min(dp[i - 1][j - 1], dp[i - 1][j], dp[i][j - 1]);
    }
  }
  return dp[m][n];
}

/* Trouve l'employé qui correspond le mieux à `name`.
   Stratégie : exact → dernier mot → substring → Levenshtein ≤ 2. */
function matchEmp(name) {
  if (!name) return null;
  const n = normName(name);
  if (!n) return null;

  // 1. Match exact normalisé
  for (let i = 0; i < S.emps.length; i++) {
    if (normName(S.emps[i].n) === n) return S.emps[i];
  }

  // 2. Match sur le dernier mot de chaque côté (utile pour "Marie-Ange" ↔ "M. ANGE")
  const lastSrc = normName(name.split(/[\s\-]+/).pop());
  for (let i = 0; i < S.emps.length; i++) {
    const lastEmp = normName(S.emps[i].n.split(/[\s.\-]+/).pop());
    if (lastSrc && lastEmp &&
        (lastSrc === lastEmp ||
         lastSrc.indexOf(lastEmp) >= 0 ||
         lastEmp.indexOf(lastSrc) >= 0)) {
      return S.emps[i];
    }
  }

  // 3. Substring : un nom contient l'autre
  for (let i = 0; i < S.emps.length; i++) {
    const en = normName(S.emps[i].n);
    if (en && n && (en.indexOf(n) >= 0 || n.indexOf(en) >= 0)) {
      return S.emps[i];
    }
  }

  // 4. Distance Levenshtein ≤ 2 sur longueur similaire (±2 char)
  let best = null, bestDist = 99;
  for (let i = 0; i < S.emps.length; i++) {
    const en = normName(S.emps[i].n);
    if (Math.abs(en.length - n.length) > 2) continue;
    const d = levDist(en, n);
    if (d < bestDist && d <= 2) { bestDist = d; best = S.emps[i]; }
  }
  return best;
}

/* ═══════════════════════════════════════════════════════════════════════════
   GÉNÉRATION AUTOMATIQUE DU PLANNING
   ═══════════════════════════════════════════════════════════════════════════

   Mode :
     "replace" → efface tout le mois et régénère
     "fill"    → complète uniquement les postes vides (conserve l'existant)

   L'algorithme procède en 5 passes :

     1. Attribution d'un week-end de repos aléatoire à chaque employé
        travaillant les week-ends (1 samedi+dimanche off par mois garanti).

     2. Application des affectations fixes (`fixed` sur l'employé),
        ex. Albertine S7 le dimanche.

     3. Règle spéciale renforcée : Natacha (id=11) sur S1 tous les dimanches
        ET tous les jours fériés (qui sont traités comme des dimanches).

     3bis. RÉSERVATION DU CHAUD — critique : le Chaud structure la cuisine.
           Avant d'affecter les autres postes (qui risqueraient de
           "consommer" nos cuisiniers titulaires ailleurs), on place le
           Chaud pour chaque jour ouvert par ROTATION ÉQUILIBRÉE sur les
           4 titulaires (option A) : Julie (id=1), Patricia (id=2),
           Monique (id=5) et Agnès (id=9). Parmi ceux éligibles, celui
           qui a fait le moins d'heures ce mois prend le Chaud suivant.
           Adaptation automatique aux absences et jours bloqués
           (Monique dimanche, Agnès weekend+férié, etc.).
           Si aucun titulaire dispo, le Chaud reste vide ici et la boucle
           principale tentera avec les autres cuisiniers.

     4. Boucle principale : pour chaque jour NON FERMÉ, pour chaque poste
        actif non encore affecté, construire la liste des candidats éligibles
        puis en sélectionner le meilleur via `sortCandidates`.

   Règles appliquées à la sélection des candidats :
     - Jour fermé (isClosed) → aucune affectation
     - Pas disponible (absent, ne travaille pas ce jour, section incompatible)
     - Déjà affecté à un autre poste ce jour-là
     - Exclu de l'auto-gen (noAutoGen)
     - Dépassement du nb max de jours dans le mois (RL.mj30 ou RL.mj31)
     - Dépassement de ses jours consécutifs (maxConsec || RL.mjc)
     - En repos forcé 2 jours après une série de maxConsec (needsRest2)
     - Tombe sur son week-end de repos attribué en phase 1
     - Dépassement du nb max de jours/semaine (maxDPW) — cas Clarisse
     - Si poste = CH :
         • chNoDow applique aussi aux fériés (traités comme dimanche=0)
         • garde-fou Agnès (id=9) : jamais Chaud weekend NI férié
         • chMaxPW (limite hebdo)
         • jamais 3 jours consécutifs au Chaud (consecChaudBefore ≥ 2 exclu)

   Filtres préférentiels (non bloquants — annulés si liste vide) :
     - ÉVITER 5 JOURS CONSÉCUTIFS : si un candidat serait à son 5e jour
       consécutif (consecBefore ≥ 4), on préfère quelqu'un d'autre, sauf
       si c'est la seule option. Limite dure maxConsec=5 reste active.

   Règles appliquées à l'ordre de préférence (sortCandidates) :
     0. EXTRAS-PRIORITAIRES : sur S3–S7, PL, EX, CR, DS, AI → extras avant
        contrats. Sur S1, S2, CH, DC → contrats avant extras (inchangé).
     1. Si poste cuisine : "vrais" cuisiniers avant polyvalents
     2. Tri par priorité (`prio`, défaut 50 — 1 servi en premier)
     3. Si poste = S1 : déprioriser lowPrioPost (Jessica dernière)
     4. Si jour = lundi (CH) : éviter celui qui était sur CH dimanche
     5. Si poste = CH : rotation — préférer celui qui a le gap le plus long
        depuis son dernier Chaud (lastChaudGap)
     6. Équilibrer la charge : préférer l'employé ayant le plus d'écart
        restant entre sa cible mensuelle et ses jours travaillés

   Filtres préférentiels (non bloquants) dans la boucle principale :
     - Éviter le 5e jour consécutif si possible
     - Espacer Clarisse (id=4) : éviter de la placer si elle a travaillé hier
     - Lundi CH : éviter l'employé qui était sur CH dimanche
     - Pour CH : rotation (gap ≥ 2 jours)
     - S1 : éviter 3 jours d'affilée même personne

   ═══════════════════════════════════════════════════════════════════════════ */
function autoGen(mode) {
  mode = mode || 'replace';
  pushUndo();

  const D = dim(S.y, S.m);
  const maxDaysInMonth = D >= 31 ? RL.mj31 : RL.mj30;
  const monthKey = mk();

  // --- Initialisation du tableau mensuel ---
  if (mode === 'replace') {
    S.pl[monthKey] = {};
    for (let d = 1; d <= D; d++) S.pl[monthKey][String(d)] = {};
  } else {
    if (!S.pl[monthKey]) S.pl[monthKey] = {};
    for (let d = 1; d <= D; d++) {
      if (!S.pl[monthKey][String(d)]) S.pl[monthKey][String(d)] = {};
    }
  }

  // --- Compteurs cumulés : jours & heures par employé ---
  const daysCount = {};
  const hoursCount = {};
  for (let i = 0; i < S.emps.length; i++) {
    const empId = S.emps[i].id;
    daysCount[empId]  = mode === 'fill' ? workedDays(empId)  : 0;
    hoursCount[empId] = mode === 'fill' ? workedHours(empId) : 0;
  }

  // --- Phase 1 : attribution coordonnée d'un week-end de repos ---
  // Julie (1) et Patricia (2) doivent chacune avoir un weekend Sa+Di OFF,
  // mais sur des SEMAINES DIFFÉRENTES (sinon le dimanche personne ne peut
  // tenir le Chaud puisque Monique et Agnès sont bloquées le dimanche).
  // Algorithme :
  //   1. Lister les paires Sa-Di "valides" (pas adjacentes à un férié)
  //   2. Tirer une paire pour Julie au hasard
  //   3. Tirer une paire DIFFÉRENTE pour Patricia
  const WEEKEND_OFF_ELIGIBLE = [1, 2]; // Julie, Patricia
  const weekendOff = {};

  function buildPairs(empId) {
    // Toutes les paires Sa-Di où l'employé n'est pas indispo les DEUX jours
    // (sinon weekendOff inutile : il est déjà OFF naturellement).
    // Les jours d'indispo comptent comme repos : Patricia indispo le dim → la
    // paire Sa-Di est valide, on lui demande juste d'être OFF le samedi.
    const pairs = [];
    for (let d = 1; d < D; d++) {
      if (dow(S.y, S.m, d) === 6 && d + 1 <= D) {
        // Skip si absent les deux jours (déjà OFF, pas besoin de réserver)
        if (isAbsent(empId, d) && isAbsent(empId, d + 1)) continue;
        // Skip si paire adjacente à un férié (ponts trop tendus)
        const ferieBefore = isFerie(S.y, S.m, d - 1);
        const ferieAfter = (d + 2 <= D) ? isFerie(S.y, S.m, d + 2) : false;
        if (ferieBefore || ferieAfter) continue;
        pairs.push([d, d + 1]);
      }
    }
    return pairs;
  }

  // Étape 1 : paires possibles pour chaque
  const pairsJulie = buildPairs(1);
  const pairsPatricia = buildPairs(2);

  function eligible(empId) {
    const e = findEmp(empId);
    if (!e) return false;
    if (e.noAutoGen || e.bouchTrou) return false;
    return e.jt === 'all'
      || (e.jt === 'custom' && (e.jours||[]).indexOf(6) >= 0
          && (e.jours||[]).indexOf(0) >= 0);
  }

  // Étape 2 : recherche systématique de la meilleure combinaison
  // (Julie WE off, Patricia WE off) telle que :
  //   - Pas le même weekend (sinon le dim aucune ne couvre le CH)
  //   - Si Julie OFF un dim, Patricia doit être DISPONIBLE ce dim (pas indispo)
  //   - Réciproquement pour Patricia
  // Si aucune combinaison "double" n'est trouvée, on essaye de donner WE off
  // à la plus contrainte des deux (priorité au mieux possible).
  const julieOk = pairsJulie.length > 0 && eligible(1);
  const patriciaOk = pairsPatricia.length > 0 && eligible(2);

  const validCombos = [];
  if (julieOk && patriciaOk) {
    for (const pJ of pairsJulie) {
      for (const pP of pairsPatricia) {
        if (pJ[0] === pP[0]) continue; // même WE → CH dimanche vide
        // Le dim de pJ : Julie OFF, Patricia doit pouvoir CH → pas indispo
        if (isAbsent(2, pJ[1])) continue;
        // Le dim de pP : Patricia OFF, Julie doit pouvoir CH → pas indispo
        if (isAbsent(1, pP[1])) continue;
        validCombos.push([pJ, pP]);
      }
    }
  }

  if (validCombos.length) {
    // Combinaison double trouvée → les deux ont leur WE off
    const choice = validCombos[Math.floor(Math.random() * validCombos.length)];
    weekendOff[1] = choice[0];
    weekendOff[2] = choice[1];
  } else {
    // Pas de combinaison double : on donne WE off à la plus contrainte
    // (celle qui a le moins de paires), l'autre n'a pas de WE off ce mois.
    const julieFirst = pairsJulie.length <= pairsPatricia.length;
    const firstId = julieFirst ? 1 : 2;
    const secondId = julieFirst ? 2 : 1;
    const firstPairs = julieFirst ? pairsJulie : pairsPatricia;
    const secondPairs = julieFirst ? pairsPatricia : pairsJulie;

    if (firstPairs.length && eligible(firstId)) {
      weekendOff[firstId] = firstPairs[Math.floor(Math.random() * firstPairs.length)];
    }
    if (secondPairs.length && eligible(secondId)) {
      const otherPairs = secondPairs.filter(p => {
        if (weekendOff[firstId] && p[0] === weekendOff[firstId][0]) return false;
        if (isAbsent(firstId, p[1])) return false;
        return true;
      });
      if (otherPairs.length) {
        weekendOff[secondId] = otherPairs[Math.floor(Math.random() * otherPairs.length)];
      }
    }
  }

  // --- Phase 2 : affectations fixes (propriété `fixed` sur l'employé) ---
  // Les jours fermés (isClosed) sont ignorés.
  for (let i = 0; i < S.emps.length; i++) {
    const e = S.emps[i];
    if (e.noAutoGen || e.bouchTrou || !e.fixed || !e.fixed.length) continue;

    for (let d = 1; d <= D; d++) {
      if (isClosed(d)) continue;
      for (let j = 0; j < e.fixed.length; j++) {
        const fix = e.fixed[j];
        if (dow(S.y, S.m, d) === fix.dow
            && !isAbsent(e.id, d)
            && canWork(e, S.y, S.m, d)) {
          setSlot(d, fix.pc, e.id);
          daysCount[e.id]++;
          hoursCount[e.id] = (hoursCount[e.id] || 0) + postH(fix.pc);
        }
      }
    }
  }

  // --- Phase 3 : Natacha (id=11) sur S1 tous les dimanches ET les fériés ---
  for (let d = 1; d <= D; d++) {
    if (isClosed(d)) continue;
    if (dow(S.y, S.m, d) !== 0 && !isFerie(S.y, S.m, d)) continue;

    const natacha = findEmp(11);
    if (!natacha) continue;
    if (isAbsent(11, d) || !canWork(natacha, S.y, S.m, d)) continue;

    const activePosts = getActivePosts(d);
    if (activePosts.indexOf('S1') >= 0) {
      setSlot(d, 'S1', 11);
      daysCount[11] = (daysCount[11] || 0) + 1;
      hoursCount[11] = (hoursCount[11] || 0) + postH('S1');
    }
  }

  /* ═══════════════════════════════════════════════════════════════════════
     Phase 3bis : RÉSERVATION DU POSTE CHAUD (CH)
     ─────────────────────────────────────────────────────────────────────
     Le Chaud est le poste le plus structurant de la cuisine : s'il n'est
     pas couvert, tout le service est impacté. On le réserve donc en
     priorité, AVANT la boucle principale qui risquerait d'affecter nos
     titulaires ailleurs (Découpage, Crudités, etc.).

     Rotation équilibrée PONDÉRÉE PAR CONTRAT (v2) sur les 4 titulaires :
     Julie (id=1), Patricia (id=2), Monique (id=5) et Agnès (id=9).

     Parmi les éligibles (toutes contraintes validées), on choisit celui
     qui a le TAUX DE REMPLISSAGE le plus bas (hoursCount/contrat). On
     applique un biais de 0.9 sur Julie et Patricia pour qu'elles restent
     titulaires principales à taux égal.

     Pourquoi pondérer par contrat : comparer les heures brutes serait
     injuste — Monique (70h) aurait toujours moins d'heures que Julie
     (151h) et serait servie trop souvent. Le taux rééquilibre
     proportionnellement.

     Répartition cible sur un mois type (~26 Chaud) :
       Julie ~ 38%, Patricia ~ 38%, Monique ~ 12%, Agnès ~ 12%

     Toutes les contraintes classiques restent :
       - Monique : chMaxPW=1 (1 Chaud/semaine max), chNoDow=[0] (pas dim)
       - Agnès   : chNoDow=[0,6] (pas weekend) + garde-fou férié
       - Jamais 3 jours consécutifs au Chaud (consecChaudBefore ≥ 2)
       - Limites classiques : maxDaysInMonth, maxConsec, needsRest2,
         weekendOff, maxDPW, chMaxPW
     ═══════════════════════════════════════════════════════════════════════ */
  const CHAUD_TITULAIRES = [1, 2, 5, 9];  // Julie, Patricia, Monique, Agnès

  /* Vérifie si `empId` peut prendre le Chaud à `day` compte tenu de toutes
     les contraintes (mêmes que dans la boucle principale pour CH). */
  function canTakeChaud(empId, day) {
    const e = findEmp(empId);
    if (!e) return false;
    if (e.noAutoGen) return false;
    if (e.bouchTrou) return false;
    if (!canAssign(e, day, 'CH')) return false;
    if (daysCount[empId] >= maxDaysInMonth) return false;

    const empMaxConsec = e.maxConsec || RL.mjc;
    if (consecBefore(empId, day) >= empMaxConsec) return false;
    if (needsRest2(empId, day)) return false;

    if (e.maxDPW && daysInWeek(empId, day) >= e.maxDPW) return false;

    // Weekend off : on respecte le weekend de repos prévu pour le Chaud aussi
    if (weekendOff[empId]
        && (weekendOff[empId][0] === day || weekendOff[empId][1] === day)) {
      return false;
    }

    // chNoDow (férié = dimanche)
    const isFerieDay = !!isFerie(S.y, S.m, day);
    if ((e.chNoDow || []).indexOf(dow(S.y, S.m, day)) >= 0) return false;
    if (isFerieDay && (e.chNoDow || []).indexOf(0) >= 0) return false;

    // Garde-fou Agnès : jamais Chaud le dimanche ni férié.
    // Le samedi reste autorisé (renfort pour soulager Julie/Patricia).
    if (empId === 9 && (dow(S.y, S.m, day) === 0 || isFerieDay)) {
      return false;
    }

    // chMaxPW
    if (e.chMaxPW && postInWeek(empId, 'CH', day) >= e.chMaxPW) return false;

    // Jamais 3 jours consécutifs au Chaud
    if (consecChaudBefore(empId, day) >= 2) return false;

    return true;
  }

  for (let d = 1; d <= D; d++) {
    if (isClosed(d)) continue;
    const activePosts = getActivePosts(d);
    if (activePosts.indexOf('CH') < 0) continue;
    if (getSlot(d, 'CH') !== null) continue; // déjà affecté (fix/fill)

    // Sélection du Chaud :
    //   • Niveau principal : Julie (1), Patricia (2), Monique (5) — en rotation
    //     équilibrée mais avec un biais fort en faveur de Julie/Patricia.
    //     Monique ne prend le Chaud que quand Julie/Patricia "saturent"
    //     leur rotation, pour préserver son rythme.
    //   • Dernier recours : Agnès (9) — si AUCUN des 3 ci-dessus n'est
    //     éligible. Garde Agnès en salle où elle est plus utile.
    const PRIMARY_TIER = [1, 2, 5];    // Julie, Patricia, Monique
    const FALLBACK_TIER = [9];          // Agnès

    let eligibles = PRIMARY_TIER.filter(id => canTakeChaud(id, d));
    if (!eligibles.length) eligibles = FALLBACK_TIER.filter(id => canTakeChaud(id, d));
    if (!eligibles.length) continue;

    /* Rotation équilibrée pondérée par contrat :
       On compare le TAUX DE REMPLISSAGE (hoursCount / contrat) plutôt que
       les heures brutes. Raison : Monique (70h) et Julie/Patricia (151h)
       n'ont pas le même contrat — comparer les heures brutes donnerait
       systématiquement l'avantage à Monique alors qu'elle est déjà bien
       servie proportionnellement.

       De plus, on applique un facteur 0.9 sur le taux de Julie (id=1) et
       Patricia (id=2) : à taux égal, elles sont préférées. Ça maintient
       leur rôle de titulaires principales tout en laissant Monique et
       Agnès dans la rotation.

       Répartition cible sur un mois type (~26 Chaud) :
         Julie ~ 38%, Patricia ~ 38%, Monique ~ 12%, Agnès ~ 12%

       Tie-breakers : plus ancien gap Chaud gagne, puis ordre d'id. */
    const PRIMARY_BIAS = 0.7;   // Julie/Patricia : préférées (taux ×0.7)
    const MONIQUE_BIAS = 2.5;   // Monique : limitée (taux ×2.5, choisie en
                                //   dernier dans le tier principal)

    function fillRate(empId) {
      const e = findEmp(empId);
      const contract = (e && e.h) ? e.h : 151.67;
      const hours = hoursCount[empId] || 0;
      let rate = hours / contract;
      if (empId === 1 || empId === 2) rate *= PRIMARY_BIAS;
      if (empId === 5) rate *= MONIQUE_BIAS;
      return rate;
    }

    eligibles.sort((a, b) => {
      const ra = fillRate(a);
      const rb = fillRate(b);
      if (ra !== rb) return ra - rb;  // plus bas taux gagne
      const gapA = lastChaudGap(a, d);
      const gapB = lastChaudGap(b, d);
      if (gapA !== gapB) return gapB - gapA;  // plus ancien Chaud gagne
      return a - b;  // déterministe
    });

    const chosen = eligibles[0];
    setSlot(d, 'CH', chosen);
    daysCount[chosen]  = (daysCount[chosen]  || 0) + 1;
    hoursCount[chosen] = (hoursCount[chosen] || 0) + postH('CH');
    // Si aucun titulaire dispo, on laisse vide — la boucle principale
    // tentera avec les autres cuisiniers (Naely, Clarisse, Florita, Thalia,
    // Manuel, Myrlande, ou un polyvalent si autorisé).
  }

  // --- Fonction de tri des candidats pour un poste/jour donné ---
  function sortCandidates(candidates, day, postCode) {
    const isCuisinePost = POSTES_CUISINE.some(p => p.c === postCode);
    const isMonday = dow(S.y, S.m, day) === 1;

    candidates.sort((a, b) => {
      const ta = a.t || 'contrat';
      const tb = b.t || 'contrat';

      /* RÈGLE EXTRAS-PRIORITAIRES : sur les postes "secondaires" (service
         partiel midi + Crudités, Dessert, Aide), les extras passent avant
         les contrats. L'idée : les extras couvrent ces postes, ce qui
         libère les salariés sous contrat pour être placés sur des postes
         complets (S1, S2, CH, DC) d'autres jours, optimisant leur volume
         horaire mensuel.
         Postes où extras prioritaires : S3, S4, S5, S6, S7, PL, EX, CR, DS, AI
         Postes où contrats prioritaires (inchangé) : S1, S2, CH, DC */
      // 0. Priorité explicite d'abord (1=premier, 99=dernier, défaut 30 contrat / 60 extra)
      const pa0 = a.prio !== undefined ? a.prio : (a.t === 'extra' ? 60 : 30);
      const pb0 = b.prio !== undefined ? b.prio : (b.t === 'extra' ? 60 : 30);
      if (pa0 !== pb0) return pa0 - pb0;
      // À prio égale : contrats avant extras
      if (ta === 'contrat' && tb === 'extra') return -1;
      if (ta === 'extra'   && tb === 'contrat') return 1;

      // 2. Pour un poste cuisine : "vrais cuisiniers" légèrement avant
      //    les polyvalents, MAIS uniquement pour le CH (poste central qui
      //    nécessite la maîtrise des cuissons). Pour DC, CR, DS, AI, on
      //    laisse l'équilibrage proportionnel (étape 7) décider, ce qui
      //    permet aux polyvalents (Agnès, Carine, HELANA) d'être utilisés
      //    quand ils sont sous leur contrat.
      if (isCuisinePost && postCode === 'CH') {
        const aPureCuisine = a.s === 'cuisine' && !a.ec;
        const bPureCuisine = b.s === 'cuisine' && !b.ec;
        if (aPureCuisine && !bPureCuisine) return -1;
        if (!aPureCuisine && bPureCuisine) return 1;
        if (a.ec && !b.ec) return -1;
        if (!a.ec && b.ec) return 1;
      }

      // 3. (prio déjà appliquée en step 0)

      // 4. Sur S1 : Jessica (lowPrioPost contient "S1") en dernier
      if (postCode === 'S1') {
        const aLow = (a.lowPrioPost || []).indexOf('S1') >= 0;
        const bLow = (b.lowPrioPost || []).indexOf('S1') >= 0;
        if (aLow && !bLow) return 1;
        if (!aLow && bLow) return -1;
      }

      // 5. Lundi + CH : éviter celui qui était sur CH dimanche
      if (isMonday) {
        const aChaudSun = wasChaudSun(a.id, day);
        const bChaudSun = wasChaudSun(b.id, day);
        if (aChaudSun && !bChaudSun) return 1;
        if (!aChaudSun && bChaudSun) return -1;
      }

      // 6. Pour CH : rotation — plus le gap depuis le dernier Chaud est grand,
      //    plus on préfère cet employé (équité sur le poste le plus pénible)
      if (postCode === 'CH') {
        const aGap = lastChaudGap(a.id, day);
        const bGap = lastChaudGap(b.id, day);
        if (aGap !== bGap) return bGap - aGap;
      }

      // 7. Équilibrage proportionnel au contrat :
      //    On compare le ratio "jours faits / jours cible" plutôt que les
      //    jours absolus. Ainsi un contrat 50h (7j cible) atteint son ratio
      //    plus vite qu'un contrat 152h (22j cible), ce qui empêche les
      //    petits contrats d'exploser leurs heures pendant que les gros
      //    sont sous-utilisés.
      //    hpj (heures/jour) ≈ 7 → target_days = h / 7
      const hpj = (typeof RL !== 'undefined' && RL.hpj) ? RL.hpj : 7;
      const aTarget = Math.max(1, (a.h || 151.67) / hpj);
      const bTarget = Math.max(1, (b.h || 151.67) / hpj);
      const aRatio = (daysCount[a.id] || 0) / aTarget;
      const bRatio = (daysCount[b.id] || 0) / bTarget;
      return aRatio - bRatio;
    });
    return candidates;
  }

  // --- Phase 4 : boucle principale jour × poste ---
  for (let d = 1; d <= D; d++) {
    // Jour fermé → on saute entièrement
    if (isClosed(d)) continue;

    // Empêcher qu'un même employé reçoive 2 postes le même jour
    const assignedToday = {};
    for (let i = 0; i < AP.length; i++) {
      const assigned = getSlot(d, AP[i].c);
      if (assigned !== null) assignedToday[assigned] = 1;
    }

    const activePosts = getActivePosts(d);
    for (let pi = 0; pi < activePosts.length; pi++) {
      const postCode = activePosts[pi];
      if (getSlot(d, postCode) !== null) continue; // déjà affecté

      // Construction de la liste brute des candidats éligibles
      const eligible = [];
      for (let i = 0; i < S.emps.length; i++) {
        const e = S.emps[i];
        if (e.noAutoGen) continue;
        if (e.bouchTrou) continue;  // Réservé à la phase 5 (bouchage)
        if (!canAssign(e, d, postCode)) continue;
        if (assignedToday[e.id]) continue;
        if (daysCount[e.id] >= maxDaysInMonth) continue;
        // Weekend off : on respecte strictement le weekend de repos prévu.
        // La phase 5 pourra utiliser cet employé si un poste reste vide.
        if (weekendOff[e.id]
            && (weekendOff[e.id][0] === d || weekendOff[e.id][1] === d)) {
          continue;
        }

        const empMaxConsec = e.maxConsec || RL.mjc;
        if (consecBefore(e.id, d) >= empMaxConsec) continue;
        if (needsRest2(e.id, d)) continue;

        if (e.maxDPW && daysInWeek(e.id, d) >= e.maxDPW) continue;

        // Règles spécifiques au poste Chaud
        if (postCode === 'CH') {
          const isFerieDay = !!isFerie(S.y, S.m, d);

          // chNoDow : jours interdits au Chaud pour cet employé
          if ((e.chNoDow || []).indexOf(dow(S.y, S.m, d)) >= 0) continue;
          // Férié = dimanche pour l'interdiction Chaud
          if (isFerieDay && (e.chNoDow || []).indexOf(0) >= 0) continue;

          // Garde-fou Agnès (id=9) : jamais Chaud dimanche ni férié.
          // Samedi autorisé pour soulager Julie/Patricia.
          if (e.id === 9 && (dow(S.y, S.m, d) === 0 || isFerieDay)) continue;

          // chMaxPW : limite hebdomadaire de Chaud
          if (e.chMaxPW && postInWeek(e.id, 'CH', d) >= e.chMaxPW) continue;

          // Jamais 3 jours consécutifs au Chaud
          if (consecChaudBefore(e.id, d) >= 2) continue;
        }

        eligible.push(e);
      }

      // Filtres préférentiels (non bloquants — on les annule si liste vide)
      let candidates = eligible;

      /* FILTRE PRÉFÉRENTIEL : éviter le Nème jour consécutif si possible.
         Utilise empMaxConsec-1 pour respecter la limite personnalisée de chaque
         employé (ex: Patricia maxConsec=4 → éviter dès le 4e jour consécutif). */
      const notAtMaxConsec = candidates.filter(e => {
        const empMax = e.maxConsec || RL.mjc;
        return consecBefore(e.id, d) < (empMax - 1);
      });
      if (notAtMaxConsec.length) candidates = notAtMaxConsec;

      /* Filtre préférentiel : espacer les jours de Clarisse (id=4).
         Si Clarisse a travaillé hier, on lui préfère quelqu'un d'autre
         pour ce jour — afin qu'elle ne travaille pas trop de jours
         consécutifs. Ses contraintes dures (maxDPW=4, maxConsec=5) restent
         actives ; ce filtre est simplement un "préférer". */
      if (d >= 2) {
        const workedYesterday = AP.some(p => getSlot(d - 1, p.c) === 4);
        if (workedYesterday) {
          const notClarisse = candidates.filter(e => e.id !== 4);
          if (notClarisse.length) candidates = notClarisse;
        }
      }

      // 1. Lundi CH : éviter celui qui était sur CH dimanche (si possible)
      if (postCode === 'CH' && dow(S.y, S.m, d) === 1) {
        const filtered = candidates.filter(e => !wasChaudSun(e.id, d));
        if (filtered.length) candidates = filtered;
      }

      // 2. Pour CH : rotation — préférer ceux qui n'ont pas fait Chaud récemment
      if (postCode === 'CH') {
        const rotated = candidates.filter(e => lastChaudGap(e.id, d) >= 2);
        if (rotated.length) candidates = rotated;
      }

      // 3. S1 : éviter "3 jours d'affilée" sur l'Ouverture (si possible)
      if (postCode === 'S1') {
        const filtered = candidates.filter(e => !wasS1x2(e.id, d));
        if (filtered.length) candidates = filtered;
      }

      if (!candidates.length) continue;

      // 4. Préférer les salariés restreints à ce poste (ils ne peuvent
      //    aller nulle part ailleurs — cas Albertine rs=["S7"])
      const restricted = candidates.filter(e => {
        const rs = e.rs || [];
        return rs.length > 0 && rs.indexOf(postCode) >= 0;
      });
      if (restricted.length) candidates = restricted;

      // 5. Heures contractuelles : plus de filtre dur ni soft.
      //    Les heures peuvent être dépassées sans limite si nécessaire pour
      //    remplir le planning. Le tri final (sortCandidates) préfère ceux
      //    qui ont le moins dépassé leur contrat à ce stade.

      // Sélection finale
      sortCandidates(candidates, d, postCode);
      const chosen = candidates[0];
      setSlot(d, postCode, chosen.id);
      daysCount[chosen.id]++;
      assignedToday[chosen.id] = 1;
    }
  }

  /* ═══════════════════════════════════════════════════════════════════════
     Phase 5 : BOUCHAGE DE TOUS LES POSTES NON COUVERTS
     ──────────────────────────────────────────────────────────────────────
     Après la génération principale, on parcourt TOUS les postes actifs et
     pour chacun resté vide on cherche un candidat compatible :
       1. D'abord parmi les bouche-trous (VINCENT) — placement prioritaire
          sur les postes restants
       2. Sinon parmi les autres employés (heures sup tolérées)
     On garde STRICTES :
       • toutes les contraintes d'absence
       • max consec personnalisé
       • max jours/mois
       • règles spécifiques Chaud (chNoDow, Agnès weekend, Monique, etc.)
     Si malgré tout aucun candidat n'existe, on signale par un toast.
     ─────────────────────────────────────────────────────────────────────── */
  function canFillEssential(e, d, postCode, allowBouchTrou) {
    if (e.noAutoGen) return false;
    if (e.bouchTrou && !allowBouchTrou) return false;

    /* Pour un bouche-trou, on ignore les indispos (sa raison d'être :
       venir quand personne d'autre ne peut). On vérifie quand même qu'il
       peut travailler ce jour (jt) et n'a pas une absence "dure" type CP/maladie. */
    if (e.bouchTrou) {
      if (!canWork(e, S.y, S.m, d)) return false;
      // Bloquer uniquement CP et maladie (pas indisponible souhaité ni pm)
      if ((S.cp[mk()] || {})[e.id] && (S.cp[mk()][e.id] || []).indexOf(d) >= 0) return false;
      if ((S.mal[mk()] || {})[e.id] && (S.mal[mk()][e.id] || []).indexOf(d) >= 0) return false;
      // Vérifier section/postes autorisés
      const isCuisinePost = POSTES_CUISINE.some(p => p.c === postCode);
      if (isCuisinePost) {
        const hasRole = (e.r || []).indexOf(postCode) >= 0;
        if (!((e.s === 'cuisine' || (e.ec && hasRole)) && hasRole)) return false;
      } else {
        if (e.s !== 'salle') return false;
        const rsList = e.rs || [];
        if (rsList.length > 0 && rsList.indexOf(postCode) < 0) return false;
      }
    } else {
      if (!canAssign(e, d, postCode)) return false;
      // Phase 5 : weekendOff respecté STRICTEMENT pour Julie/Patricia,
      // y compris pour le Chaud. Avec le tirage coordonné en phase 1,
      // l'autre titulaire couvre toujours le dimanche/samedi.
      if (weekendOff[e.id]
          && (weekendOff[e.id][0] === d || weekendOff[e.id][1] === d)) {
        return false;
      }
    }

    // Pas déjà placé ce jour
    let already = false;
    AP.forEach(p => { if (getSlot(d, p.c) === e.id) already = true; });
    if (already) return false;

    // Limites dures conservées
    if (daysCount[e.id] >= maxDaysInMonth) return false;
    const empMaxConsec = e.maxConsec || RL.mjc;
    if (consecBefore(e.id, d) >= empMaxConsec) return false;
    if (needsRest2(e.id, d)) return false;
    if (e.maxDPW && daysInWeek(e.id, d) >= e.maxDPW) return false;
    if (postCode === 'CH' && e.chMaxPW
        && postInWeek(e.id, 'CH', d) >= e.chMaxPW) return false;

    // Contraintes spécifiques au Chaud — strictes même en bouchage
    if (postCode === 'CH') {
      const w = dow(S.y, S.m, d);
      const isFerieDay = !!isFerie(S.y, S.m, d);

      if ((e.chNoDow || []).indexOf(w) >= 0) return false;
      if (isFerieDay && (e.chNoDow || []).indexOf(0) >= 0) return false;
      if (e.id === 9 && (w === 0 || isFerieDay)) return false;
      const TITULAIRES_CH = [1, 2, 5, 9];
      if (TITULAIRES_CH.indexOf(e.id) < 0) return false;
      if (e.chMaxPW && postInWeek(e.id, 'CH', d) >= e.chMaxPW) return false;
      if (consecChaudBefore(e.id, d) >= 2) return false;
    }

    return true;
  }

  const stillUncovered = [];
  for (let d = 1; d <= D; d++) {
    if (isClosed(d)) continue;
    const activePostsD = getActivePosts(d);
    activePostsD.forEach(postCode => {
      if (getSlot(d, postCode) !== null) return;

      // 1. Tentative avec bouche-trous d'abord (VINCENT etc.)
      let fillable = [];
      for (let i = 0; i < S.emps.length; i++) {
        const e = S.emps[i];
        if (!e.bouchTrou) continue;
        if (canFillEssential(e, d, postCode, true)) fillable.push(e);
      }

      // 2. Si aucun bouche-trou ne convient, élargir aux autres employés
      if (!fillable.length) {
        for (let i = 0; i < S.emps.length; i++) {
          const e = S.emps[i];
          if (e.bouchTrou) continue;
          if (canFillEssential(e, d, postCode, false)) fillable.push(e);
        }
      }

      if (fillable.length) {
        sortCandidates(fillable, d, postCode);
        const chosen = fillable[0];
        setSlot(d, postCode, chosen.id);
        daysCount[chosen.id] = (daysCount[chosen.id] || 0) + 1;
      } else {
        stillUncovered.push(postCode + ' j.' + d);
      }
    });
  }

  /* PASSE DE SECOURS POUR LE CHAUD : si malgré la phase 5 un CH reste vide
     (cas typique : titulaire bloqué par maxConsec ou consecChaudBefore juste
     avant un dimanche où l'autre titulaire est en weekendOff), on relâche
     ces deux contraintes UNIQUEMENT pour le CH des titulaires (Julie/Patricia).
     Le weekendOff reste strictement respecté.
     Garde-fous gardés : absence (cp/mal/ind), max 21 jours, chNoDow, chMaxPW. */
  for (let d = 1; d <= D; d++) {
    if (isClosed(d)) continue;
    if (getSlot(d, 'CH') !== null) continue;
    const w = dow(S.y, S.m, d);
    const isFerieDay = !!isFerie(S.y, S.m, d);

    const candidates = [];
    const swapCandidates = [];  // déjà placés sur autre poste cuisine, swap possible
    [1, 2].forEach(eid => {  // Julie, Patricia
      const e = findEmp(eid);
      if (!e) return;
      if (e.noAutoGen) return;
      // weekendOff strictement respecté
      if (weekendOff[eid]
          && (weekendOff[eid][0] === d || weekendOff[eid][1] === d)) return;
      // Absences strictes
      if (isAbsent(eid, d)) return;
      if (!canWork(e, S.y, S.m, d)) return;
      // chNoDow
      if ((e.chNoDow || []).indexOf(w) >= 0) return;
      if (isFerieDay && (e.chNoDow || []).indexOf(0) >= 0) return;
      // chMaxPW
      if (e.chMaxPW && postInWeek(eid, 'CH', d) >= e.chMaxPW) return;
      // Pas déjà placée ce jour ?
      let placedPost = null;
      for (let p = 0; p < AP.length; p++) {
        if (getSlot(d, AP[p].c) === eid) { placedPost = AP[p].c; break; }
      }
      if (placedPost) {
        // Déjà placée ailleurs → swap possible si pas déjà CH (impossible) et
        // si le poste actuel n'est pas critique (CH > tout autre)
        swapCandidates.push({ emp: e, currentPost: placedPost });
      } else {
        // Max 21 jours respecté
        if (daysCount[eid] >= maxDaysInMonth) return;
        candidates.push(e);
      }
    });

    if (candidates.length) {
      candidates.sort((a, b) => (daysCount[a.id]||0) - (daysCount[b.id]||0));
      const chosen = candidates[0];
      setSlot(d, 'CH', chosen.id);
      daysCount[chosen.id] = (daysCount[chosen.id] || 0) + 1;
      const idx = stillUncovered.indexOf('CH j.' + d);
      if (idx >= 0) stillUncovered.splice(idx, 1);
    } else if (swapCandidates.length) {
      // Aucun titulaire libre : swap depuis un autre poste cuisine.
      // Le poste libéré redevient vide (probablement comblable par un autre).
      swapCandidates.sort((a, b) => (daysCount[a.emp.id]||0) - (daysCount[b.emp.id]||0));
      const swap = swapCandidates[0];
      setSlot(d, swap.currentPost, null);  // libère l'ancien poste
      setSlot(d, 'CH', swap.emp.id);        // place sur CH
      // daysCount inchangé (un poste contre un autre)
      const idx = stillUncovered.indexOf('CH j.' + d);
      if (idx >= 0) stillUncovered.splice(idx, 1);
      // Tenter de re-combler le poste libéré
      const freed = swap.currentPost;
      let fillable = [];
      for (let i = 0; i < S.emps.length; i++) {
        const e = S.emps[i];
        if (e.bouchTrou) continue;
        if (canFillEssential(e, d, freed, false)) fillable.push(e);
      }
      if (!fillable.length) {
        for (let i = 0; i < S.emps.length; i++) {
          const e = S.emps[i];
          if (!e.bouchTrou) continue;
          if (canFillEssential(e, d, freed, true)) fillable.push(e);
        }
      }
      if (fillable.length) {
        sortCandidates(fillable, d, freed);
        const chosen2 = fillable[0];
        setSlot(d, freed, chosen2.id);
        daysCount[chosen2.id] = (daysCount[chosen2.id] || 0) + 1;
      } else {
        stillUncovered.push(freed + ' j.' + d);
      }
    }
  }

  /* ═══════════════════════════════════════════════════════════════════════
     Phase 6 : NETTOYAGE DES VIOLATIONS DE MAX CONSEC
     ──────────────────────────────────────────────────────────────────────
     Les phases précédentes peuvent créer des chaînes consécutives au-delà
     du maxConsec (ex: Patricia avec maxConsec=4 placée 5 jours d'affilée
     car Phase 3bis Chaud + Phase 4 Salle se complètent sans se voir).
     Ici on scanne tout le planning et on retire l'affectation centrale
     d'une chaîne trop longue, en réessayant ensuite de la réassigner à
     un autre employé compatible.
     ─────────────────────────────────────────────────────────────────────── */
  for (let pass = 0; pass < 2; pass++) {
    let foundViolation = false;
    for (let i = 0; i < S.emps.length; i++) {
      const e = S.emps[i];
      const empMaxConsec = e.maxConsec || RL.mjc;
      // Trouver les jours travaillés
      const workedDays = [];
      for (let d = 1; d <= D; d++) {
        for (let j = 0; j < AP.length; j++) {
          if (getSlot(d, AP[j].c) === e.id) { workedDays.push(d); break; }
        }
      }
      // Détecter chaînes >maxConsec
      let cur = 0, prev = -99;
      const chains = [];
      let chainStart = -1;
      for (const d of workedDays) {
        if (d === prev + 1) cur++;
        else { if (cur > empMaxConsec) chains.push({ start: chainStart, end: prev, len: cur }); cur = 1; chainStart = d; }
        prev = d;
      }
      if (cur > empMaxConsec) chains.push({ start: chainStart, end: prev, len: cur });

      // Retirer le jour central de chaque chaîne trop longue
      for (const ch of chains) {
        foundViolation = true;
        const dayToRemove = ch.start + Math.floor((ch.len - 1) / 2);
        // Trouver le poste de cet employé ce jour-là
        let removedPost = null;
        for (let j = 0; j < AP.length; j++) {
          if (getSlot(dayToRemove, AP[j].c) === e.id) {
            removedPost = AP[j].c;
            setSlot(dayToRemove, AP[j].c, null);
            daysCount[e.id]--;
            break;
          }
        }
        // Tenter de réassigner ce poste à un autre employé compatible
        if (removedPost && getActivePosts(dayToRemove).indexOf(removedPost) >= 0) {
          const replacements = [];
          for (let j = 0; j < S.emps.length; j++) {
            const e2 = S.emps[j];
            if (e2.id === e.id) continue;
            if (e2.noAutoGen) continue;
            if (!canAssign(e2, dayToRemove, removedPost)) continue;
            // Pas déjà placé ce jour
            let placed = false;
            for (let p = 0; p < AP.length; p++) {
              if (getSlot(dayToRemove, AP[p].c) === e2.id) { placed = true; break; }
            }
            if (placed) continue;
            if (daysCount[e2.id] >= maxDaysInMonth) continue;
            if (e2.maxDPW && daysInWeek(e2.id, dayToRemove) >= e2.maxDPW) continue;
            if (removedPost === 'CH' && e2.chMaxPW
                && postInWeek(e2.id, 'CH', dayToRemove) >= e2.chMaxPW) continue;
            // Phase 6 : weekendOff strictement respecté
            if (weekendOff[e2.id]
                && (weekendOff[e2.id][0] === dayToRemove
                    || weekendOff[e2.id][1] === dayToRemove)) continue;
            const e2MaxConsec = e2.maxConsec || RL.mjc;
            if (consecBefore(e2.id, dayToRemove) >= e2MaxConsec) continue;
            if (needsRest2(e2.id, dayToRemove)) continue;
            // Vérifier que l'ajout ne créera pas une nouvelle chaîne >maxConsec
            // (en regardant aussi le futur)
            let futureConsec = 0;
            for (let x = dayToRemove + 1; x <= D; x++) {
              let f = false;
              for (let p = 0; p < AP.length; p++) if (getSlot(x, AP[p].c) === e2.id) { f = true; break; }
              if (f) futureConsec++; else break;
            }
            if (consecBefore(e2.id, dayToRemove) + 1 + futureConsec > e2MaxConsec) continue;

            replacements.push(e2);
          }
          if (replacements.length) {
            sortCandidates(replacements, dayToRemove, removedPost);
            const repl = replacements[0];
            setSlot(dayToRemove, removedPost, repl.id);
            daysCount[repl.id] = (daysCount[repl.id] || 0) + 1;
          }
        }
      }
    }
    if (!foundViolation) break;
  }

  /* ═══════════════════════════════════════════════════════════════════════
     Phase 7 : GARDE-FOU FINAL — maxDPW
     ──────────────────────────────────────────────────────────────────────
     Vérifie que personne ne dépasse son nombre maximum de jours par semaine
     (typiquement Clarisse maxDPW=4). Si une semaine ISO contient plus de
     jours que le max autorisé, on retire les jours en excès en partant de
     la fin (préserve l'ordre chronologique de placement).
     ─────────────────────────────────────────────────────────────────────── */
  for (let i = 0; i < S.emps.length; i++) {
    const e = S.emps[i];
    if (!e.maxDPW) continue;

    // Trouver tous les jours travaillés
    const wd = [];
    for (let d = 1; d <= D; d++) {
      for (let j = 0; j < AP.length; j++) {
        if (getSlot(d, AP[j].c) === e.id) { wd.push(d); break; }
      }
    }

    // Grouper par semaine ISO (Lu→Di)
    const byWeek = {};
    wd.forEach(d => {
      const w = dow(S.y, S.m, d);
      const monday = d - (w === 0 ? 6 : w - 1);
      const key = monday <= 0 ? 'pre' : 'm' + monday;
      (byWeek[key] = byWeek[key] || []).push(d);
    });

    // Pour chaque semaine en dépassement, retirer les jours en trop
    Object.keys(byWeek).forEach(wk => {
      const days = byWeek[wk];
      if (days.length <= e.maxDPW) return;
      // Trier décroissant pour retirer les derniers en priorité
      days.sort((a, b) => b - a);
      const toRemove = days.length - e.maxDPW;
      for (let r = 0; r < toRemove; r++) {
        const d = days[r];
        for (let j = 0; j < AP.length; j++) {
          if (getSlot(d, AP[j].c) === e.id) {
            setSlot(d, AP[j].c, null);
            daysCount[e.id]--;
            break;
          }
        }
      }
    });
  }

  save();
  render();
  if (stillUncovered.length) {
    toast('⚠ Postes essentiels non couverts: ' +
      stillUncovered.join(', '), 'warn2', 8000);
  } else {
    toast('Planning généré ✓', 'ok');
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   IMPRESSION ET EXPORTS CSV/HTML
   ═══════════════════════════════════════════════════════════════════════════ */

/* Génère une nouvelle fenêtre imprimable A4 paysage de la grille mensuelle. */
function printPlanning() {
  const D = dim(S.y, S.m);
  const activePosts = getActivePosts(1);
  const cols = AP.filter(p => activePosts.indexOf(p.c) >= 0);

  // Taille de police auto : A4 paysage = ~277mm utiles
  const nCols = cols.length + 1;
  const fontSize = Math.max(4, Math.min(7, Math.floor(120 / nCols)));
  const rowHeight = Math.max(4, Math.min(7, Math.floor(180 / D))) * 0.8;

  const h = [
    '<!DOCTYPE html><html><head><meta charset=\'utf-8\'>',
    '<title>Planning ' + MN[S.m] + ' ' + S.y + '</title><style>',
    '@page{size:A4 landscape;margin:10mm}',
    'body{font-family:Arial,sans-serif;margin:0;font-size:' + fontSize + 'pt}',
    'h1{font-size:' + (fontSize + 4) + 'pt;margin:0 0 4mm 0}',
    'table{border-collapse:collapse;width:100%;table-layout:fixed}',
    'th,td{border:0.3mm solid #000;padding:0.5mm;text-align:center;',
    'height:' + rowHeight + 'mm;vertical-align:middle;overflow:hidden;',
    'text-overflow:ellipsis;white-space:nowrap}',
    'th{background:#f0f0f0;font-weight:bold}',
    '.dc{width:8mm;font-weight:bold}',

/* Échappement CSV : guillemets et virgules dans la valeur. */
function csvEsc(value) {
  let s = String(value || '');
  if (s.indexOf(',') >= 0 || s.indexOf('"') >= 0) {
    s = '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}
