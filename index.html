        </div>
      </div>
    </div>
  );
}

// ─── Single variant editor (collapsible) ──────────────────────────────────

function VariantEditor({ variant, masterUnit, isExpanded, onToggle, onUpdate, onRemove }) {
  const addAlias = () => onUpdate({ aliases: [...(variant.aliases || []), { label: '', supplier: '' }] });
  const updateAlias = (idx, field, val) => {
    const newAliases = [...(variant.aliases || [])];
    newAliases[idx] = { ...newAliases[idx], [field]: val };
    onUpdate({ aliases: newAliases });
  };
  const removeAlias = (idx) => onUpdate({ aliases: (variant.aliases || []).filter((_, i) => i !== idx) });

  const addPackaging = () =>
    onUpdate({
      packagings: [...(variant.packagings || []), { label: '', factor: 1, unit: 'carton', supplier: '' }],
    });
  const updatePackaging = (idx, field, val) => {
    const newPkgs = [...(variant.packagings || [])];
    newPkgs[idx] = { ...newPkgs[idx], [field]: field === 'factor' ? parseFloat(val) || 0 : val };
    onUpdate({ packagings: newPkgs });
  };
  const removePackaging = (idx) =>
    onUpdate({ packagings: (variant.packagings || []).filter((_, i) => i !== idx) });

  return (
    <div className="mc-card" style={{ borderColor: palette.sage + '40', overflow: 'hidden' }}>
      {/* Header (always visible, clickable to toggle) */}
      <div
        style={{
          padding: 12,
          background: isExpanded ? palette.sage + '10' : palette.sage + '05',
          cursor: 'pointer',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'space-between',
        }}
        onClick={onToggle}
      >
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, flex: 1 }}>
          <Layers size={14} style={{ color: palette.sage }} />
          <input
            className="mc-input"
            style={{ flex: 1, maxWidth: 360 }}
            placeholder="Nom de la variante (ex: Chaiko 1L)"
            value={variant.name}
            onClick={(e) => e.stopPropagation()}
            onChange={(e) => onUpdate({ name: e.target.value })}
          />
          <span style={{ fontSize: 11, color: palette.inkSoft }}>
            {(variant.aliases || []).length} alias · {(variant.packagings || []).length} cond.
          </span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <button
            className="mc-btn mc-btn-danger"
            style={{ padding: '4px 8px' }}
            onClick={(e) => {
              e.stopPropagation();
              onRemove();
            }}
          >
            <Trash2 size={13} />
          </button>
          <span style={{ fontSize: 11, color: palette.inkSoft, padding: '0 6px' }}>
            {isExpanded ? '▲' : '▼'}
          </span>
        </div>
      </div>

      {/* Expanded content */}
      {isExpanded && (
        <div style={{ padding: 14 }}>
          {/* Aliases */}
          <div style={{ marginBottom: 14 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
              <span className="mc-label" style={{ margin: 0 }}>
                Alias fournisseurs
              </span>
              <button className="mc-btn mc-btn-sage" style={{ padding: '4px 10px', fontSize: 12 }} onClick={addAlias}>
                <Plus size={11} /> Alias
              </button>
            </div>
            {(variant.aliases || []).map((alias, idx) => (
              <div
                key={idx}
                style={{
                  display: 'flex',
                  gap: 6,
                  alignItems: 'center',
                  padding: 8,
                  background: palette.sage + '05',
                  borderRadius: 6,
                  marginBottom: 4,
                }}
              >
                <Tag size={11} style={{ color: palette.sage }} />
                <input
                  className="mc-input"
                  style={{ flex: 1 }}
                  placeholder="Libellé fournisseur"
                  value={alias.label}
                  onChange={(e) => updateAlias(idx, 'label', e.target.value)}
                />
                <input
                  className="mc-input"
                  style={{ width: 140 }}
                  placeholder="Fournisseur"
                  value={alias.supplier}
                  onChange={(e) => updateAlias(idx, 'supplier', e.target.value)}
                />
                <button className="mc-btn mc-btn-danger" style={{ padding: '4px 6px' }} onClick={() => removeAlias(idx)}>
                  <X size={12} />
                </button>
              </div>
            ))}
            {(variant.aliases || []).length === 0 && (
              <EmptyState compact icon={Tag} title="Aucun alias" />
            )}
          </div>

          {/* Packagings */}
          <div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
              <span className="mc-label" style={{ margin: 0 }}>
                Conditionnements
              </span>
              <button className="mc-btn mc-btn-amber" style={{ padding: '4px 10px', fontSize: 12 }} onClick={addPackaging}>
                <Plus size={11} /> Cond.
              </button>
            </div>
            {(variant.packagings || []).map((pkg, idx) => (
              <div
                key={idx}
                style={{
                  display: 'flex',
                  gap: 6,
                  alignItems: 'center',
                  padding: 8,
                  background: palette.amber + '05',
                  borderRadius: 6,
                  marginBottom: 4,
                  flexWrap: 'wrap',
                }}
              >
                <Box size={11} style={{ color: palette.amber }} />
                <input
                  className="mc-input"
                  style={{ flex: 1, minWidth: 140 }}
                  placeholder="Description"
                  value={pkg.label}
                  onChange={(e) => updatePackaging(idx, 'label', e.target.value)}
                />
                <span style={{ fontSize: 11, color: palette.inkSoft }}>1</span>
                <input
                  className="mc-input"
                  style={{ width: 80 }}
                  placeholder="unité"
                  value={pkg.unit}
                  onChange={(e) => updatePackaging(idx, 'unit', e.target.value)}
                />
                <span style={{ fontSize: 11, color: palette.inkSoft }}>=</span>
                <input
                  type="number"
                  step="0.001"
                  className="mc-input"
                  style={{ width: 70 }}
                  value={pkg.factor}
                  onChange={(e) => updatePackaging(idx, 'factor', e.target.value)}
                />
                <span style={{ fontSize: 11, fontWeight: 600, color: palette.amber }}>{masterUnit}</span>
                <button className="mc-btn mc-btn-danger" style={{ padding: '4px 6px' }} onClick={() => removePackaging(idx)}>
                  <X size={12} />
                </button>
              </div>
            ))}
            {(variant.packagings || []).length === 0 && (
              <EmptyState compact icon={Box} title="Aucun conditionnement" />
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Article detail modal (read-only price view) ───────────────────────

function ArticleDetailModal({ article, purchases, onClose, dateFrom, dateTo }) {
  const periodHistory = useMemo(
    () => getPriceHistory(article.id, purchases, dateFrom, dateTo),
    [article, purchases, dateFrom, dateTo]
  );

  const fullHistory = useMemo(
    () => getPriceHistory(article.id, purchases, null, null),
    [article, purchases]
  );

  const globalAverage = useMemo(() => calculateWeightedAverage(periodHistory), [periodHistory]);

  // Group by variant
  const variantStats = useMemo(() => {
    return (article.variants || []).map((variant) => {
      const variantHistory = periodHistory.filter((e) => e.variantId === variant.id);
      const avg = calculateWeightedAverage(variantHistory);
      const totalQty = variantHistory.reduce((s, e) => s + e.qty, 0);
      const suppliers = [...new Set(variantHistory.map((e) => e.supplier))];
      return {
        ...variant,
        avg,
        count: variantHistory.length,
        totalQty,
        suppliers,
      };
    });
  }, [article, periodHistory]);

  const compareToAverage = (avg) => {
    if (!globalAverage || !avg) return 'eq';
    if (avg > globalAverage * 1.05) return 'up';
    if (avg < globalAverage * 0.95) return 'down';
    return 'eq';
  };

  const minPrice = periodHistory.length > 0 ? Math.min(...periodHistory.map((e) => e.unitPrice)) : null;
  const maxPrice = periodHistory.length > 0 ? Math.max(...periodHistory.map((e) => e.unitPrice)) : null;

  return (
    <div className="mc-overlay" onClick={onClose}>
      <div className="mc-modal" style={{ maxWidth: 900, padding: 32 }} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
          <div>
            <h3 className="mc-display" style={{ fontSize: 22, fontWeight: 600, margin: 0 }}>
              {article.name}
            </h3>
            <p style={{ margin: '4px 0 0', fontSize: 13, color: palette.inkSoft }}>
              {(article.variants || []).length} variantes · {periodHistory.length} achats sur la période
            </p>
          </div>
          <button className="mc-btn mc-btn-ghost" onClick={onClose}>
            <X size={14} />
          </button>
        </div>

        {/* Summary stats */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, marginBottom: 20 }}>
          <div style={{ padding: 16, background: palette.ink, borderRadius: 8, color: palette.cream }}>
            <div style={{ fontSize: 11, opacity: 0.6, textTransform: 'uppercase', letterSpacing: 0.5 }}>
              Prix moyen pondéré (toutes variantes)
            </div>
            <div className="mc-display" style={{ fontSize: 22, fontWeight: 700, marginTop: 4 }}>
              {globalAverage != null ? formatEuro(globalAverage) + '/' + article.unit : '—'}
            </div>
          </div>
          <div style={{ padding: 16, background: palette.paper, borderRadius: 8 }}>
            <div style={{ fontSize: 11, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: 0.5 }}>
              Min
            </div>
            <div className="mc-display" style={{ fontSize: 20, fontWeight: 600, marginTop: 4 }}>
              {minPrice != null ? formatEuro(minPrice) : '—'}
            </div>
          </div>
          <div style={{ padding: 16, background: palette.paper, borderRadius: 8 }}>
            <div style={{ fontSize: 11, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: 0.5 }}>
              Max
            </div>
            <div className="mc-display" style={{ fontSize: 20, fontWeight: 600, marginTop: 4 }}>
              {maxPrice != null ? formatEuro(maxPrice) : '—'}
            </div>
          </div>
        </div>

        {/* Price evolution chart */}
        {fullHistory.length > 1 && (
          <div style={{ marginBottom: 20 }}>
            <ResponsiveContainer width="100%" height={150}>
              <AreaChart data={fullHistory.map((h) => ({ ...h, label: formatShortDate(h.date) }))}>
                <CartesianGrid strokeDasharray="3 3" stroke={palette.rule} />
                <XAxis dataKey="label" stroke={palette.inkSoft} fontSize={10} />
                <YAxis stroke={palette.inkSoft} fontSize={10} />
                <Tooltip contentStyle={{ background: palette.cream, border: `1px solid ${palette.rule}`, borderRadius: 6, fontSize: 12 }} formatter={(v) => formatEuro(v)} />
                <Area type="monotone" dataKey="unitPrice" stroke={palette.wine} fill={palette.wine + '15'} name="Prix" />
              </AreaChart>
            </ResponsiveContainer>
          </div>
        )}

        {/* Variants comparison table */}
        <div style={{ marginBottom: 16 }}>
          <h4 className="mc-display" style={{ fontSize: 16, fontWeight: 600, margin: '0 0 12px' }}>
            Comparatif par variante
          </h4>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {variantStats.map((variant) => {
              const trend = compareToAverage(variant.avg);
              return (
                <div
                  key={variant.id}
                  style={{
                    display: 'flex',
                    justifyContent: 'space-between',
                    alignItems: 'center',
                    padding: 14,
                    background: palette.paper,
                    borderRadius: 8,
                  }}
                >
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 6 }}>
                      <Layers size={13} style={{ color: palette.sage }} />
                      {variant.name}
                    </div>
                    <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 4 }}>
                      {variant.count > 0
                        ? `${variant.count} achats · ${variant.totalQty.toFixed(1)} ${article.unit} · ${variant.suppliers.join(', ')}`
                        : 'Aucun achat sur la période'}
                    </div>
                    {variant.aliases && variant.aliases.length > 0 && (
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginTop: 6 }}>
                        {variant.aliases.map((a, j) => (
                          <span key={j} className="mc-pill" style={{ background: palette.sage + '15', color: palette.sage }}>
                            <Tag size={9} />
                            {a.label}
                          </span>
                        ))}
                      </div>
                    )}
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    {variant.avg != null ? (
                      <>
                        <div className="mc-display" style={{ fontSize: 18, fontWeight: 600 }}>
                          {formatEuro(variant.avg)}
                          <span style={{ fontSize: 11, fontWeight: 400, color: palette.inkSoft }}>
                            /{article.unit}
                          </span>
                        </div>
                        <div
                          style={{
                            fontSize: 11,
                            color: trend === 'up' ? palette.wine : trend === 'down' ? palette.sage : palette.inkSoft,
                          }}
                        >
                          {trend === 'up' ? '↑ plus cher' : trend === 'down' ? '↓ moins cher' : '≈ moyenne'}
                        </div>
                      </>
                    ) : (
                      <span style={{ fontSize: 12, color: palette.inkSoft }}>—</span>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* All purchases */}
        <div>
          <h4 className="mc-display" style={{ fontSize: 16, fontWeight: 600, margin: '0 0 12px' }}>
            Tous les achats
          </h4>
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead>
              <tr>
                <th className="mc-th">Date</th>
                <th className="mc-th">Variante</th>
                <th className="mc-th">Fournisseur</th>
                <th className="mc-th">Brut</th>
                <th className="mc-th">Converti</th>
                <th className="mc-th">Prix/{article.unit}</th>
              </tr>
            </thead>
            <tbody>
              {periodHistory.map((entry, i) => {
                const variant = (article.variants || []).find((v) => v.id === entry.variantId);
                return (
                  <tr key={i} className="mc-row">
                    <td className="mc-td">{formatShortDate(entry.date, { withYear: true })}</td>
                    <td className="mc-td" style={{ fontSize: 12 }}>
                      {variant ? variant.name : '—'}
                    </td>
                    <td className="mc-td" style={{ color: palette.inkSoft }}>{entry.supplier}</td>
                    <td className="mc-td" style={{ fontSize: 12, color: palette.inkSoft }}>
                      {entry.rawQty} {entry.rawUnit}
                    </td>
                    <td className="mc-td" style={{ fontWeight: 500 }}>
                      {entry.qty.toFixed(2)} {article.unit}
                    </td>
                    <td className="mc-td" style={{ fontFamily: 'Fraunces, serif', fontWeight: 600 }}>
                      {formatEuro(entry.unitPrice)}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   ARTICLE MERGE MODAL
// ═══════════════════════════════════════════════════════════════════════════
//
// Lets the user transform an article into either:
//   (mode A) a new variant of another article, OR
//   (mode B) a new alias on an existing variant of another article.
//
// All purchases and recipes that pointed to the source article are
// rewritten transactionally so the historical data stays consistent.
//
// Blocking conditions:
//   - Cannot merge an article into itself
//   - Cannot merge if the master units differ (kg vs L vs pièce)

function ArticleMergeModal({
  sourceArticle,
  articles,
  setArticles,
  purchases,
  setPurchases,
  recipes,
  setRecipes,
  onClose,
}) {
  // Target article selected by the user (id), and merge mode.
  const [targetId, setTargetId] = useState('');
  const [mergeMode, setMergeMode] = useState('new-variant'); // 'new-variant' | 'as-alias'
  const [targetVariantId, setTargetVariantId] = useState('');
  const [newVariantName, setNewVariantName] = useState(sourceArticle.name);
  const [search, setSearch] = useState('');

  // Available targets = everyone except the source itself
  const availableTargets = useMemo(() => {
    const q = search.toLowerCase();
    return articles
      .filter((i) => i.id !== sourceArticle.id)
      .filter((i) => !q || i.name.toLowerCase().includes(q) || (i.category || '').toLowerCase().includes(q))
      .sort((a, b) => a.name.localeCompare(b.name));
  }, [articles, sourceArticle.id, search]);

  const target = useMemo(
    () => articles.find((i) => i.id === targetId) || null,
    [articles, targetId]
  );

  // Reset variant selection when target changes
  useEffect(() => {
    setTargetVariantId(target?.variants?.[0]?.id || '');
  }, [target]);

  // Block condition: master units must match
  const unitsMatch = target ? target.unit === sourceArticle.unit : true;

  // Count what will be rewritten — purely for the confirmation text.
  const { affectedPurchases, affectedRecipes } = useMemo(() => {
    let pCount = 0;
    for (const p of purchases) {
      if ((p.items || []).some((it) => it.articleId === sourceArticle.id)) pCount++;
    }
    let rCount = 0;
    for (const r of recipes) {
      if ((r.articles || []).some((line) => line.id === sourceArticle.id)) rCount++;
    }
    return { affectedPurchases: pCount, affectedRecipes: rCount };
  }, [purchases, recipes, sourceArticle.id]);

  // ─── Merge action ─────────────────────────────────────────────────────
  const handleMerge = () => {
    if (!target) return;
    if (!unitsMatch) return;

    // Step 1: build the updated target article (with the new variant or alias)
    const sourceVariants = sourceArticle.variants || [];

    let updatedTarget;

    if (mergeMode === 'new-variant') {
      // Take ALL variants of the source and append them under the target.
      // (If the source has multiple variants, they all come along as new variants.)
      // The first variant gets the user-specified name; the rest keep theirs.
      const newVariants = sourceVariants.map((v, i) => ({
        ...v,
        id: generateId('v'),
        name: i === 0 ? (newVariantName.trim() || v.name) : v.name,
      }));
      // Map old variantId → new variantId for purchase rewriting
      const variantIdMap = {};
      sourceVariants.forEach((old, i) => {
        variantIdMap[old.id] = newVariants[i].id;
      });
      updatedTarget = {
        ...target,
        variants: [...(target.variants || []), ...newVariants],
      };
      applyMerge(updatedTarget, variantIdMap, null);
    } else {
      // 'as-alias': merge all source variants' aliases + packagings into the
      // selected target variant. All purchases will point to that one variant.
      const targetVariant = (target.variants || []).find((v) => v.id === targetVariantId);
      if (!targetVariant) return;

      // Collect all aliases (deduped by label) and all packagings (deduped by unit+factor)
      const mergedAliases = [...(targetVariant.aliases || [])];
      const seenAliasLabels = new Set(mergedAliases.map((a) => normalizeText(a.label)));
      for (const v of sourceVariants) {
        for (const a of (v.aliases || [])) {
          const key = normalizeText(a.label);
          if (!seenAliasLabels.has(key)) {
            mergedAliases.push(a);
            seenAliasLabels.add(key);
          }
        }
      }
      const mergedPackagings = [...(targetVariant.packagings || [])];
      const seenPkgKeys = new Set(
        mergedPackagings.map((p) => `${normalizeText(p.unit)}|${p.factor}`)
      );
      for (const v of sourceVariants) {
        for (const p of (v.packagings || [])) {
          const key = `${normalizeText(p.unit)}|${p.factor}`;
          if (!seenPkgKeys.has(key)) {
            mergedPackagings.push(p);
            seenPkgKeys.add(key);
          }
        }
      }
      const updatedVariant = {
        ...targetVariant,
        aliases: mergedAliases,
        packagings: mergedPackagings,
      };
      // ALL source variants get mapped to this single target variant
      const variantIdMap = {};
      for (const v of sourceVariants) {
        variantIdMap[v.id] = targetVariant.id;
      }
      updatedTarget = {
        ...target,
        variants: (target.variants || []).map((v) =>
          v.id === targetVariant.id ? updatedVariant : v
        ),
      };
      applyMerge(updatedTarget, variantIdMap, null);
    }
  };

  /** Commits the merge: update articles, purchases, recipes in one go. */
  const applyMerge = (updatedTarget, variantIdMap) => {
    // 1. Articles: replace target, remove source
    const nextArticles = articles
      .map((i) => (i.id === target.id ? updatedTarget : i))
      .filter((i) => i.id !== sourceArticle.id);

    // 2. Purchases: rewrite any item that pointed to source
    const nextPurchases = purchases.map((p) => {
      if (!(p.items || []).some((it) => it.articleId === sourceArticle.id)) {
        return p;
      }
      const newItems = p.items.map((it) => {
        if (it.articleId !== sourceArticle.id) return it;
        return {
          ...it,
          articleId: updatedTarget.id,
          variantId: variantIdMap[it.variantId] || it.variantId,
        };
      });
      return { ...p, items: newItems };
    });

    // 3. Recipes: rewrite any line that pointed to source
    const nextRecipes = recipes.map((r) => {
      if (!(r.articles || []).some((line) => line.id === sourceArticle.id)) {
        return r;
      }
      const newLines = r.articles.map((line) => {
        if (line.id !== sourceArticle.id) return line;
        return { ...line, id: updatedTarget.id };
      });
      return { ...r, articles: newLines };
    });

    setArticles(nextArticles);
    setPurchases(nextPurchases);
    setRecipes(nextRecipes);
    onClose();
  };

  const canConfirm = !!target && unitsMatch &&
    (mergeMode === 'new-variant' || (mergeMode === 'as-alias' && targetVariantId));

  return (
    <div className="mc-overlay" onClick={onClose}>
      <div className="mc-modal" style={{ maxWidth: 640, padding: 0 }} onClick={(e) => e.stopPropagation()}>
        {/* Header */}
        <div style={{ padding: '20px 28px', borderBottom: '1px solid ' + palette.rule }}>
          <h3 className="mc-display" style={{ fontSize: 20, fontWeight: 600, margin: 0 }}>
            Fusionner « {sourceArticle.name} »
          </h3>
          <p style={{ margin: '4px 0 0', fontSize: 13, color: palette.inkSoft }}>
            Cet article va devenir une variante (ou un alias) d'un autre article.
            Tous ses achats et recettes seront automatiquement réécrits.
          </p>
        </div>

        {/* Body */}
        <div style={{ padding: '20px 28px' }}>
          {/* Target article picker */}
          <label className="mc-label">Article de destination</label>
          <input
            className="mc-input"
            placeholder="Rechercher un article..."
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            style={{ marginBottom: 8 }}
          />
          <select
            className="mc-input"
            value={targetId}
            onChange={(e) => setTargetId(e.target.value)}
            style={{ width: '100%' }}
          >
            <option value="">— Choisir un article —</option>
            {availableTargets.map((i) => (
              <option key={i.id} value={i.id}>
                {i.name} ({i.unit}) {i.category ? `· ${i.category}` : ''}
              </option>
            ))}
          </select>

          {/* Unit mismatch warning */}
          {target && !unitsMatch && (
            <div style={{
              marginTop: 12, padding: 10,
              background: palette.wine + '10',
              border: '1px solid ' + palette.wine + '40',
              borderRadius: 6, fontSize: 12, color: palette.wine,
            }}>
              <AlertCircle size={14} style={{ verticalAlign: 'middle', marginRight: 6 }} />
              Impossible de fusionner : « {sourceArticle.name} » est en <strong>{sourceArticle.unit}</strong>,
              « {target.name} » est en <strong>{target.unit}</strong>. Corrigez d'abord l'unité d'un des deux.
            </div>
          )}

          {/* Merge mode selector — only shown when target is valid */}
          {target && unitsMatch && (
            <>
              <div style={{ marginTop: 16 }}>
                <label className="mc-label">Comment rattacher ?</label>
                <label style={{ display: 'flex', alignItems: 'flex-start', gap: 8, padding: 10, border: '1px solid ' + (mergeMode === 'new-variant' ? palette.wine : palette.rule), borderRadius: 6, marginBottom: 8, cursor: 'pointer', background: mergeMode === 'new-variant' ? palette.wine + '06' : 'transparent' }}>
                  <input
                    type="radio"
                    name="merge-mode"
                    checked={mergeMode === 'new-variant'}
                    onChange={() => setMergeMode('new-variant')}
                    style={{ marginTop: 3 }}
                  />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>Créer une nouvelle variante</div>
                    <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 2 }}>
                      Ex : ajouter "Bidon 5L Maurel" comme nouvelle variante de "Huile de tournesol".
                    </div>
                    {mergeMode === 'new-variant' && (
                      <input
                        className="mc-input"
                        value={newVariantName}
                        onChange={(e) => setNewVariantName(e.target.value)}
                        placeholder="Nom de la variante"
                        style={{ marginTop: 8, width: '100%', fontSize: 12 }}
                      />
                    )}
                  </div>
                </label>
                <label style={{ display: 'flex', alignItems: 'flex-start', gap: 8, padding: 10, border: '1px solid ' + (mergeMode === 'as-alias' ? palette.wine : palette.rule), borderRadius: 6, cursor: 'pointer', background: mergeMode === 'as-alias' ? palette.wine + '06' : 'transparent' }}>
                  <input
                    type="radio"
                    name="merge-mode"
                    checked={mergeMode === 'as-alias'}
                    onChange={() => setMergeMode('as-alias')}
                    style={{ marginTop: 3 }}
                  />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>Rattacher comme alias d'une variante existante</div>
                    <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 2 }}>
                      Ex : ajouter le libellé "Huile 5L Maurel" comme alias de la variante "Bidon 5L" déjà créée.
                    </div>
                    {mergeMode === 'as-alias' && (
                      <select
                        className="mc-input"
                        value={targetVariantId}
                        onChange={(e) => setTargetVariantId(e.target.value)}
                        style={{ marginTop: 8, width: '100%', fontSize: 12 }}
                      >
                        {(target.variants || []).map((v) => (
                          <option key={v.id} value={v.id}>{v.name}</option>
                        ))}
                      </select>
                    )}
                  </div>
                </label>
              </div>

              {/* Consequences box */}
              <div style={{
                marginTop: 16, padding: 12,
                background: palette.paper, borderRadius: 6,
                fontSize: 12, color: palette.inkSoft, lineHeight: 1.7,
              }}>
                <strong style={{ color: palette.ink }}>Conséquences :</strong>
                <ul style={{ margin: '6px 0 0 18px', padding: 0 }}>
                  <li>{affectedPurchases} achat{affectedPurchases > 1 ? 's' : ''} ser{affectedPurchases > 1 ? 'ont' : 'a'} réécrit{affectedPurchases > 1 ? 's' : ''}</li>
                  <li>{affectedRecipes} recette{affectedRecipes > 1 ? 's' : ''} ser{affectedRecipes > 1 ? 'ont' : 'a'} réécrite{affectedRecipes > 1 ? 's' : ''}</li>
                  <li>L'article « {sourceArticle.name} » sera <strong>supprimé</strong></li>
                </ul>
              </div>
            </>
          )}
        </div>

        {/* Footer */}
        <div style={{
          padding: '14px 28px',
          borderTop: '1px solid ' + palette.rule,
          display: 'flex', justifyContent: 'flex-end', gap: 8,
        }}>
          <button className="mc-btn mc-btn-ghost" onClick={onClose}>Annuler</button>
          <button
            className="mc-btn mc-btn-primary"
            onClick={handleMerge}
            disabled={!canConfirm}
          >
            <Link2 size={14} /> Confirmer la fusion
          </button>
        </div>
      </div>
    </div>
  );
}

const PDJ_JOURS = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
const PDJ_MOIS = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];

// Clé date locale 'YYYY-MM-DD' (pas d'UTC : Martinique UTC-4)
function pdjDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

// Modale de sélection de recette (recherche). En modale plutôt qu'en dropdown
// absolu car les cartes-jour ont overflow:hidden qui tronquait le menu.
function RecipePicker({ recipes, onPick, onClose }) {
  const [search, setSearch] = useState('');
  const filtered = useMemo(() => {
    const q = normalizeText(search);
    const sellable = recipes.filter((r) => !r.isAssortmentBase);
    if (!q) return sellable;
    return sellable.filter((r) => normalizeText(r.name).includes(q));
  }, [recipes, search]);
  return (
    <div className="mc-overlay" onClick={onClose}>
      <div className="mc-modal" style={{ maxWidth: 460, maxHeight: '80vh', display: 'flex', flexDirection: 'column', padding: 0 }} onClick={(e) => e.stopPropagation()}>
        <div style={{ padding: 16, borderBottom: `1px solid ${palette.rule}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <h3 className="mc-display" style={{ fontSize: 16, fontWeight: 600, margin: 0 }}>Choisir une recette</h3>
            <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: palette.inkSoft, fontSize: 18 }}>✕</button>
          </div>
          <input autoFocus className="mc-input" placeholder="Rechercher une recette…" value={search}
            onChange={(e) => setSearch(e.target.value)} style={{ fontSize: 13 }} />
        </div>
        <div style={{ overflowY: 'auto', padding: 8 }}>
          {filtered.length === 0 ? (
            <div style={{ padding: 20, textAlign: 'center', fontSize: 13, color: palette.inkSoft }}>Aucune recette trouvée</div>
          ) : filtered.map((r) => (
            <div key={r.id} onClick={() => onPick(r)}
              style={{ padding: '10px 12px', cursor: 'pointer', fontSize: 13, display: 'flex', justifyContent: 'space-between', gap: 8, borderRadius: 6 }}
              onMouseEnter={(e) => e.currentTarget.style.background = palette.cream}
              onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
              <span style={{ color: palette.ink, fontWeight: 500 }}>{r.name}</span>
              <span style={{ color: palette.inkSoft, fontSize: 11 }}>{r.category}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// Éditeur d'ingrédients dosés pour un plat libre — comme l'éditeur de recette :
// chaque ligne = un article du catalogue + une quantité. Sert à transformer le
// plat libre en vraie recette.
function FreePlatIngredientEditor({ articles, priceIndex, current, onSave, onClose }) {
  const [lines, setLines] = useState(current && current.length ? current.map((l) => ({ ...l })) : []);
  const [search, setSearch] = useState('');
  const [adding, setAdding] = useState(false);

  const articleById = useMemo(() => {
    const m = {}; for (const a of articles) m[a.id] = a; return m;
  }, [articles]);

  const filtered = useMemo(() => {
    const q = normalizeText(search);
    const chosen = new Set(lines.map((l) => l.id));
    const pool = articles.filter((a) => !chosen.has(a.id));
    if (!q) return pool.slice(0, 50);
    return pool.filter((a) => normalizeText(a.name).includes(q)).slice(0, 50);
  }, [articles, search, lines]);

  const addLine = (articleId) => {
    setLines((prev) => [...prev, { id: articleId, qty: 0 }]);
    setSearch(''); setAdding(false);
  };
  const setQty = (id, qty) => setLines((prev) => prev.map((l) => l.id === id ? { ...l, qty } : l));
  const removeLine = (id) => setLines((prev) => prev.filter((l) => l.id !== id));

  // Coût total estimé sur les prix connus
  const totalCost = useMemo(() => {
    let c = 0;
    for (const l of lines) {
      const pr = priceIndex && priceIndex[l.id];
      const unit = typeof pr === 'number' ? pr : (pr && pr.price);
      if (unit > 0 && l.qty > 0) c += unit * l.qty;
    }
    return c;
  }, [lines, priceIndex]);

  return (
    <div className="mc-overlay" onClick={onClose}>
      <div className="mc-modal" style={{ maxWidth: 520, maxHeight: '85vh', display: 'flex', flexDirection: 'column', padding: 0 }} onClick={(e) => e.stopPropagation()}>
        <div style={{ padding: 16, borderBottom: `1px solid ${palette.rule}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <h3 className="mc-display" style={{ fontSize: 16, fontWeight: 600, margin: 0 }}>Composition du plat</h3>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: palette.inkSoft, fontSize: 18 }}>✕</button>
        </div>

        <div style={{ overflowY: 'auto', padding: 16, flex: 1 }}>
          {/* Lignes d'ingrédients dosés */}
          {lines.length === 0 ? (
            <div style={{ fontSize: 13, color: palette.inkSoft, fontStyle: 'italic', marginBottom: 12 }}>
              Aucun ingrédient. Ajoutez-en pour composer la recette.
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 12 }}>
              {lines.map((l) => {
                const a = articleById[l.id];
                return (
                  <div key={l.id} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={{ flex: 1, fontSize: 13, color: palette.ink }}>{a ? a.name : 'Article inconnu'}</span>
                    <input type="number" className="mc-input" value={l.qty || ''} min="0" step="0.01"
                      onChange={(e) => setQty(l.id, parseFloat(e.target.value) || 0)}
                      style={{ width: 90, fontSize: 13, textAlign: 'right' }} />
                    <span style={{ fontSize: 12, color: palette.inkSoft, width: 36 }}>{a ? a.unit : ''}</span>
                    <button onClick={() => removeLine(l.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: palette.wine, fontSize: 13 }}>✕</button>
                  </div>
                );
              })}
            </div>
          )}

          {/* Ajout d'un ingrédient */}
          {adding ? (
            <div style={{ border: `1px solid ${palette.rule}`, borderRadius: 8, overflow: 'hidden' }}>
              <input autoFocus className="mc-input" placeholder="Rechercher un article du catalogue…" value={search}
                onChange={(e) => setSearch(e.target.value)} style={{ fontSize: 13, border: 'none', borderBottom: `1px solid ${palette.rule}`, borderRadius: 0 }} />
              <div style={{ maxHeight: 200, overflowY: 'auto' }}>
                {filtered.length === 0 ? (
                  <div style={{ padding: 14, textAlign: 'center', fontSize: 12, color: palette.inkSoft }}>Aucun article</div>
                ) : filtered.map((a) => (
                  <div key={a.id} onClick={() => addLine(a.id)}
                    style={{ padding: '8px 12px', cursor: 'pointer', fontSize: 13, display: 'flex', justifyContent: 'space-between', gap: 8 }}
                    onMouseEnter={(e) => e.currentTarget.style.background = palette.cream}
                    onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
                    <span style={{ color: palette.ink }}>{a.name}</span>
                    <span style={{ color: palette.inkSoft, fontSize: 11 }}>{a.category}</span>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <button className="mc-btn mc-btn-ghost" style={{ fontSize: 13, width: '100%' }} onClick={() => setAdding(true)}>
              <Plus size={13} /> Ajouter un ingrédient
            </button>
          )}
        </div>

        <div style={{ padding: 12, borderTop: `1px solid ${palette.rule}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 13, color: palette.inkSoft }}>
            Coût estimé : <strong style={{ fontFamily: 'Fraunces, serif', color: palette.ink }}>{formatEuro(totalCost)}</strong>
          </span>
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="mc-btn mc-btn-ghost" onClick={onClose}>Annuler</button>
            <button className="mc-btn mc-btn-primary" onClick={() => { onSave(lines.filter((l) => l.qty > 0)); onClose(); }}>
              Valider
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function PlatsDuJourView({ context }) {
  const { platsDuJour, setPlatsDuJour, recipes, setRecipes, articles, priceIndex } = context;
  const isMobile = useIsMobile(720);

  const now = new Date();
  const [curYear, setCurYear] = useState(now.getFullYear());
  const [curMonth, setCurMonth] = useState(now.getMonth());
  // Jours actifs (0=dim … 6=sam). Défaut : tous les jours.
  const [activeDays, setActiveDays] = useState([0, 1, 2, 3, 4, 5, 6]);
  const [pickerFor, setPickerFor] = useState(null); // clé "dateKey:platId" pour lequel le picker est ouvert
  const [ingredientPickerFor, setIngredientPickerFor] = useState(null); // { key, platId } pour l'éditeur d'ingrédients
  const [showPrint, setShowPrint] = useState(false);

  const assortmentBase = useMemo(() => findAssortmentBase(recipes), [recipes]);

  // Jours du mois filtrés sur les jours actifs
  const monthDays = useMemo(() => {
    const days = [];
    const d = new Date(curYear, curMonth, 1);
    while (d.getMonth() === curMonth) {
      if (activeDays.includes(d.getDay())) days.push(new Date(d));
      d.setDate(d.getDate() + 1);
    }
    return days;
  }, [curYear, curMonth, activeDays]);

  const todayKey = pdjDateKey(new Date());

  // ─── Mutations ────────────────────────────────────────────────────────
  const updateDay = (key, platsArr) => {
    setPlatsDuJour((prev) => {
      const next = { ...prev };
      if (platsArr.length === 0) delete next[key];
      else next[key] = platsArr;
      return next;
    });
  };
  const addPlatFromRecipe = (key, recipe) => {
    const ingredients = (recipe.articles || []).map((line) => {
      const a = articles.find((x) => x.id === line.id);
      return a ? a.name : null;
    }).filter(Boolean);
    const plat = { id: generateId('pdj'), recipeId: recipe.id, name: recipe.name, ingredients };
    updateDay(key, [...(platsDuJour[key] || []), plat]);
    setPickerFor(null);
  };
  const addFreePlat = (key) => {
    const plat = { id: generateId('pdj'), recipeId: null, name: '', articles: [] };
    updateDay(key, [...(platsDuJour[key] || []), plat]);
  };
  const updatePlat = (key, platId, patch) => {
    updateDay(key, (platsDuJour[key] || []).map((p) => p.id === platId ? { ...p, ...patch } : p));
  };
  const removePlat = (key, platId) => {
    updateDay(key, (platsDuJour[key] || []).filter((p) => p.id !== platId));
  };

  // Promotion d'un plat libre en recette du catalogue
  const promoteToRecipe = (key, plat) => {
    const lines = plat.articles || [];
    if (!plat.name || !plat.name.trim()) {
      mcToast.error('Donnez un nom au plat avant de créer la recette.');
      return;
    }
    if (lines.length === 0) {
      mcToast.error('Ajoutez au moins un ingrédient dosé avant de créer la recette.');
      return;
    }
    const newRecipe = {
      id: generateId('r'),
      name: plat.name.trim(),
      category: 'Plat',
      salePrice: 0,
      yieldPortions: 1,
      includesAssortment: false,
      articles: lines.map((l) => ({ id: l.id, qty: l.qty })),
    };
    setRecipes([...recipes, newRecipe]);
    // Transforme le plat libre en plat lié à la nouvelle recette
    const ingredientNames = lines.map((l) => {
      const a = articles.find((x) => x.id === l.id);
      return a ? a.name : null;
    }).filter(Boolean);
    updatePlat(key, plat.id, { recipeId: newRecipe.id, articles: undefined, ingredients: ingredientNames });
    mcToast.success(`Recette créée : ${newRecipe.name}. Définissez son prix de vente dans l'onglet Recettes.`);
  };

  const monthHasContent = monthDays.some((d) => (platsDuJour[pdjDateKey(d)] || []).length > 0);

  return (
    <div>
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: isMobile ? 'flex-start' : 'center', gap: 12, marginBottom: 20, flexDirection: isMobile ? 'column' : 'row' }}>
        <div>
          <h2 className="mc-display" style={{ fontSize: isMobile ? 20 : 24, fontWeight: 600, margin: 0 }}>Plats du jour</h2>
          <div style={{ fontSize: 13, color: palette.inkSoft, marginTop: 4 }}>
            Planning mensuel · liez vos recettes ou créez des plats innovants
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <button className="mc-btn mc-btn-ghost" onClick={() => { let m = curMonth - 1, y = curYear; if (m < 0) { m = 11; y--; } setCurMonth(m); setCurYear(y); }} aria-label="Mois précédent">‹</button>
          <span className="mc-display" style={{ fontSize: 15, fontWeight: 600, minWidth: 140, textAlign: 'center' }}>{PDJ_MOIS[curMonth]} {curYear}</span>
          <button className="mc-btn mc-btn-ghost" onClick={() => { let m = curMonth + 1, y = curYear; if (m > 11) { m = 0; y++; } setCurMonth(m); setCurYear(y); }} aria-label="Mois suivant">›</button>
          <button
            className="mc-btn mc-btn-ghost"
            onClick={() => setShowPrint(true)}
            disabled={!monthHasContent}
            title={monthHasContent ? 'Imprimer le planning du mois' : 'Ajoutez au moins un plat pour imprimer'}
            style={{ opacity: monthHasContent ? 1 : 0.5, cursor: monthHasContent ? 'pointer' : 'not-allowed' }}
          >
            <FileText size={14} /> Imprimer
          </button>
        </div>
      </div>

      {/* Sélecteur de jours actifs */}
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 20, alignItems: 'center' }}>
        <span style={{ fontSize: 12, color: palette.inkSoft, marginRight: 4 }}>Jours affichés :</span>
        {PDJ_JOURS.map((label, dayIdx) => {
          const on = activeDays.includes(dayIdx);
          return (
            <button key={dayIdx} onClick={() => setActiveDays((prev) => on ? prev.filter((x) => x !== dayIdx) : [...prev, dayIdx].sort())}
              style={{
                padding: '5px 11px', fontSize: 12, borderRadius: 6, cursor: 'pointer', fontFamily: 'DM Sans, sans-serif',
                background: on ? palette.wine : 'transparent', color: on ? '#fff' : palette.inkSoft,
                border: `1px solid ${on ? palette.wine : palette.rule}`,
              }}>
              {label.slice(0, 3)}
            </button>
          );
        })}
      </div>

      {/* Grille des jours */}
      {monthDays.length === 0 ? (
        <EmptyState title="Aucun jour affiché" description="Activez au moins un jour de la semaine ci-dessus." />
      ) : (
        <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(auto-fill, minmax(300px, 1fr))', gap: 16 }}>
          {monthDays.map((d) => {
            const key = pdjDateKey(d);
            const plats = platsDuJour[key] || [];
            const isToday = key === todayKey;
            return (
              <div key={key} className="mc-card" style={{ padding: 0, overflow: 'hidden', borderColor: isToday ? palette.wine : palette.rule, borderWidth: isToday ? 1.5 : 1 }}>
                {/* En-tête du jour */}
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px', borderBottom: `1px solid ${palette.rule}`, background: palette.paper + '60' }}>
                  <span className="mc-display" style={{ fontSize: 24, fontWeight: 700, lineHeight: 1, color: isToday ? palette.wine : palette.ink }}>{d.getDate()}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 12, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: 0.5 }}>{PDJ_JOURS[d.getDay()]}</div>
                    {isToday && <div style={{ fontSize: 10, color: palette.wine, fontWeight: 600 }}>Aujourd'hui</div>}
                  </div>
                </div>

                {/* Plats du jour */}
                <div style={{ padding: 14 }}>
                  {plats.map((plat) => {
                    const linkedRecipe = plat.recipeId ? recipes.find((r) => r.id === plat.recipeId) : null;
                    let fcLabel = null;
                    if (linkedRecipe) {
                      const bd = indexedPlateCost(linkedRecipe, priceIndex, assortmentBase);
                      if (linkedRecipe.salePrice > 0 && bd.plateCost > 0) {
                        fcLabel = formatPercent(bd.plateCost / linkedRecipe.salePrice);
                      }
                    }
                    return (
                      <div key={plat.id} style={{ paddingBottom: 12, marginBottom: 12, borderBottom: `1px solid ${palette.rule}` }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8, marginBottom: 6 }}>
                          <span style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: 0.5, color: linkedRecipe ? palette.sage : palette.amber }}>
                            {linkedRecipe ? '● Recette liée' : '○ Plat libre'}
                            {fcLabel && <span style={{ color: palette.inkSoft }}> · FC {fcLabel}</span>}
                          </span>
                          <button onClick={() => removePlat(key, plat.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: palette.wine, fontSize: 11, padding: 0 }}>✕</button>
                        </div>

                        {linkedRecipe ? (
                          <div style={{ fontSize: 14, fontWeight: 600, color: palette.ink }}>{linkedRecipe.name}</div>
                        ) : (
                          <input className="mc-input" placeholder="Nom du plat innovant…" value={plat.name}
                            onChange={(e) => updatePlat(key, plat.id, { name: e.target.value })}
                            style={{ fontSize: 14, marginBottom: 6 }} />
                        )}

                        {/* Composition (recette liée : pour info ; plat libre : éditable et dosée) */}
                        {linkedRecipe ? (
                          plat.ingredients && plat.ingredients.length > 0 && (
                            <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 4 }}>
                              {plat.ingredients.join(', ')}
                            </div>
                          )
                        ) : (() => {
                          const freeLines = plat.articles || [];
                          let freeCost = 0;
                          for (const l of freeLines) {
                            const pr = priceIndex && priceIndex[l.id];
                            const unit = typeof pr === 'number' ? pr : (pr && pr.price);
                            if (unit > 0 && l.qty > 0) freeCost += unit * l.qty;
                          }
                          return (
                            <>
                              {freeLines.length > 0 ? (
                                <div style={{ marginTop: 6, marginBottom: 6 }}>
                                  {freeLines.map((l) => {
                                    const a = articles.find((x) => x.id === l.id);
                                    return (
                                      <div key={l.id} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: palette.inkSoft, padding: '1px 0' }}>
                                        <span>{a ? a.name : 'Article inconnu'}</span>
                                        <span>{l.qty} {a ? a.unit : ''}</span>
                                      </div>
                                    );
                                  })}
                                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: palette.inkSoft, marginTop: 4, paddingTop: 4, borderTop: `1px solid ${palette.rule}` }}>
                                    <span>Coût estimé</span>
                                    <span style={{ fontFamily: 'Fraunces, serif', fontWeight: 600 }}>{formatEuro(freeCost)}</span>
                                  </div>
                                </div>
                              ) : (
                                <div style={{ fontSize: 11, color: palette.inkSoft, fontStyle: 'italic', marginTop: 4, marginBottom: 6 }}>
                                  Aucun ingrédient
                                </div>
                              )}
                              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                                <button className="mc-btn mc-btn-ghost" style={{ fontSize: 11, padding: '4px 10px' }}
                                  onClick={() => setIngredientPickerFor({ key, platId: plat.id })}>
                                  <Plus size={12} /> Composition
                                </button>
                                {plat.name && freeLines.length > 0 && (
                                  <button className="mc-btn mc-btn-ghost" style={{ fontSize: 11, padding: '4px 10px' }}
                                    onClick={() => promoteToRecipe(key, plat)} title="Transformer ce plat en recette du catalogue">
                                    <Plus size={12} /> Créer la recette
                                  </button>
                                )}
                              </div>
                            </>
                          );
                        })()}
                      </div>
                    );
                  })}

                  {/* Boutons d'ajout */}
                  <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                    <button className="mc-btn mc-btn-ghost" style={{ fontSize: 12, flex: 1 }}
                      onClick={() => setPickerFor(key)}>
                      + Recette
                    </button>
                    <button className="mc-btn mc-btn-ghost" style={{ fontSize: 12, flex: 1 }} onClick={() => addFreePlat(key)}>
                      + Plat libre
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {pickerFor && (
        <RecipePicker
          recipes={recipes}
          onPick={(r) => addPlatFromRecipe(pickerFor, r)}
          onClose={() => setPickerFor(null)}
        />
      )}

      {ingredientPickerFor && (() => {
        const plat = (platsDuJour[ingredientPickerFor.key] || []).find((p) => p.id === ingredientPickerFor.platId);
        return (
          <FreePlatIngredientEditor
            articles={articles}
            priceIndex={priceIndex}
            current={plat ? plat.articles : []}
            onSave={(lines) => updatePlat(ingredientPickerFor.key, ingredientPickerFor.platId, { articles: lines })}
            onClose={() => setIngredientPickerFor(null)}
          />
        );
      })()}

      {showPrint && (
        <PlatsDuJourPrint
          monthDays={monthDays}
          platsDuJour={platsDuJour}
          recipes={recipes}
          articles={articles}
          monthLabel={`${PDJ_MOIS[curMonth]} ${curYear}`}
          onClose={() => setShowPrint(false)}
        />
      )}
    </div>
  );
}

  return (
    <div className="mc-overlay" onClick={onClose}>
      <div className="mc-modal" style={{ maxWidth: 900, maxHeight: '90vh', overflow: 'auto', padding: 0 }} onClick={(e) => e.stopPropagation()}>
        <div className="mc-no-print" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '16px 20px', borderBottom: `1px solid ${palette.rule}`, position: 'sticky', top: 0, background: 'white', zIndex: 2 }}>
          <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: 0 }}>Aperçu impression</h3>
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="mc-btn mc-btn-ghost" onClick={onClose}>Fermer</button>
            <button className="mc-btn mc-btn-primary" onClick={() => window.print()}>Imprimer</button>
          </div>
        </div>
        <div className="mc-print-zone" style={{ padding: 24 }}>
          <div className="mc-print-header" style={{ marginBottom: 16 }}>
            <div style={{ fontFamily: 'Fraunces, serif', fontSize: 22, fontWeight: 700, color: palette.wine }}>Le Point de Vue</div>
            <div style={{ fontSize: 14, color: palette.inkSoft }}>Plats du jour — {monthLabel}</div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 14 }}>
            {monthDays.map((d) => {
              const key = pdjDateKey(d);
              const plats = platsDuJour[key] || [];
              if (plats.length === 0) return null;
              return (
                <div key={key} className="mc-card" style={{ padding: 14, breakInside: 'avoid' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10, paddingBottom: 8, borderBottom: `1px solid ${palette.rule}` }}>
                    <span className="mc-display" style={{ fontSize: 20, fontWeight: 700 }}>{d.getDate()}</span>
                    <span style={{ fontSize: 12, textTransform: 'uppercase', letterSpacing: 0.5, color: palette.inkSoft }}>{PDJ_JOURS[d.getDay()]}</span>
                  </div>
                  {plats.map((plat) => {
                    const r = plat.recipeId ? recipes.find((x) => x.id === plat.recipeId) : null;
                    const name = r ? r.name : plat.name;
                    // Liste d'ingrédients à afficher : recette liée → noms ; plat libre → articles dosés
                    let ings = [];
                    if (r) {
                      ings = (r.articles || []).map((l) => {
                        const a = articles.find((x) => x.id === l.id);
                        return a ? a.name : null;
                      }).filter(Boolean);
                    } else if (plat.articles && plat.articles.length) {
                      ings = plat.articles.map((l) => {
                        const a = articles.find((x) => x.id === l.id);
                        return a ? `${a.name} — ${l.qty} ${a.unit}` : null;
                      }).filter(Boolean);
                    } else if (plat.ingredients) {
                      ings = plat.ingredients;
                    }
                    return (
                      <div key={plat.id} style={{ marginBottom: 10 }}>
                        <div style={{ fontFamily: 'Fraunces, serif', fontSize: 15, fontWeight: 600, marginBottom: 4 }}>{name}</div>
                        {ings.length > 0 && (
                          <ul style={{ listStyle: 'none', padding: 0, margin: 0 }}>
                            {ings.map((ing, i) => (
                              <li key={i} style={{ fontSize: 12, color: palette.inkSoft, padding: '2px 0', display: 'flex', alignItems: 'center', gap: 6 }}>
                                <span style={{ width: 4, height: 4, borderRadius: '50%', background: palette.amber, flexShrink: 0 }} />
                                {ing}
                              </li>
                            ))}
                          </ul>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   RECIPES VIEW
// ═══════════════════════════════════════════════════════════════════════════

function RecipesOnlyView({ context }) {
  const { recipes, setRecipes, articles, purchases, priceIndex, dateFrom, dateTo } = context;
  const [editingRecipe, setEditingRecipe] = useState(null);
  const isMobile = useIsMobile(720);

  // ─── Recherche + tri ──────────────────────────────────────────────────
  const [searchQuery, setSearchQuery] = useState('');
  const [sortBy, setSortBy] = useState('category'); // category | name | margin | foodcost | cost
  const [catFilter, setCatFilter] = useState('all');

  const handleSave = (data) => {
    // Enforce single-base invariant: if user marks this as base, unmark any others
    let updated;
    if (data.isAssortmentBase) {
      updated = recipes.map((r) => (r.id !== data.id ? { ...r, isAssortmentBase: false } : r));
    } else {
      updated = recipes;
    }
    if (data.id) setRecipes(updated.map((r) => (r.id === data.id ? data : r)));
    else setRecipes([...updated, { ...data, id: generateId('r') }]);
    setEditingRecipe(null);
    mcToast.success(data.id ? `Recette modifiée : ${data.name}` : `Recette créée : ${data.name}`);
  };

  const handleDelete = (id) => {
    const _recipe = recipes.find((r) => r.id === id);
    if (!_recipe) return;
    const _snapR = recipes;
    setRecipes(recipes.filter((r) => r.id !== id));
    mcToast.undo(`Recette supprimée : ${_recipe.name}`, () => { setRecipes(_snapR); mcToast.success('Annulé'); });
  };

  // Duplique une recette (nouveau nom suffixé, nouvel id, jamais base d'assortiment)
  const handleDuplicate = (recipe) => {
    const copy = {
      ...recipe,
      id: generateId('r'),
      name: `${recipe.name} (copie)`,
      isAssortmentBase: false,
      articles: (recipe.articles || []).map((a) => ({ ...a })),
    };
    setRecipes([...recipes, copy]);
    mcToast.success(`Recette dupliquée : ${copy.name}`);
    setEditingRecipe(copy);
  };

  // Split recipes into the assortment base and the rest
  const assortmentBase = useMemo(() => findAssortmentBase(recipes), [recipes]);
  const sellableRecipes = useMemo(
    () => recipes.filter((r) => !r.isAssortmentBase),
    [recipes]
  );

  // ─── Catégories présentes (pour le filtre), dans l'ordre des Réglages ──
  // Les catégories inconnues (recettes dont la catégorie a été supprimée des
  // Réglages) sont ajoutées en fin de liste pour rester visibles.
  const CATEGORY_ORDER = useMemo(() => {
    const configured = context.recipeCategories || ['Entrée', 'Plat', 'Dessert', 'Accompagnement', 'Boisson', 'Autre'];
    const present = new Set(sellableRecipes.map((r) => r.category || 'Autre'));
    const unknown = [...present].filter((c) => !configured.includes(c)).sort();
    return [...configured, ...unknown];
  }, [context.recipeCategories, sellableRecipes]);
  const presentCategories = useMemo(() => {
    const set = new Set(sellableRecipes.map((r) => r.category || 'Autre'));
    return CATEGORY_ORDER.filter((c) => set.has(c));
  }, [sellableRecipes, CATEGORY_ORDER]);

  // ─── Enrichit chaque recette avec coût/marge/ratio (pour tri + KPIs) ───
  const enriched = useMemo(() => {
    return sellableRecipes.map((recipe) => {
      const breakdown = indexedPlateCost(recipe, priceIndex, assortmentBase);
      const cost = breakdown.plateCost;
      const margin = (recipe.salePrice || 0) - cost;
      const ratio = recipe.salePrice > 0 ? cost / recipe.salePrice : 0;
      return { recipe, breakdown, cost, margin, ratio };
    });
  }, [sellableRecipes, priceIndex, assortmentBase]);

  // ─── KPIs de synthèse ───────────────────────────────────────────────────
  const kpis = useMemo(() => {
    const withPrice = enriched.filter((e) => e.recipe.salePrice > 0);
    const avgRatio = withPrice.length > 0
      ? withPrice.reduce((s, e) => s + e.ratio, 0) / withPrice.length
      : 0;
    const avgMargin = withPrice.length > 0
      ? withPrice.reduce((s, e) => s + e.margin, 0) / withPrice.length
      : 0;
    const overThreshold = withPrice.filter((e) => e.ratio >= 0.35).length;
    return { count: sellableRecipes.length, avgRatio, avgMargin, overThreshold };
  }, [enriched, sellableRecipes]);

  // ─── Filtre + tri appliqués ────────────────────────────────────────────
  const visible = useMemo(() => {
    const q = normalizeText(searchQuery);
    let list = enriched.filter((e) => {
      if (catFilter !== 'all' && (e.recipe.category || 'Autre') !== catFilter) return false;
      if (q && !normalizeText(e.recipe.name).includes(q) && !normalizeText(e.recipe.category || '').includes(q)) return false;
      return true;
    });
    list = [...list].sort((a, b) => {
      switch (sortBy) {
        case 'name':     return a.recipe.name.localeCompare(b.recipe.name);
        case 'margin':   return b.margin - a.margin;   // marge décroissante
        case 'foodcost': return b.ratio - a.ratio;     // food cost décroissant (pires en haut)
        case 'cost':     return b.cost - a.cost;        // coût décroissant
        case 'category':
        default: {
          const ca = CATEGORY_ORDER.indexOf(a.recipe.category || 'Autre');
          const cb = CATEGORY_ORDER.indexOf(b.recipe.category || 'Autre');
          if (ca !== cb) return ca - cb;
          return a.recipe.name.localeCompare(b.recipe.name);
        }
      }
    });
    return list;
  }, [enriched, searchQuery, catFilter, sortBy]);

  // Regroupe par catégorie quand le tri est 'category' (sinon liste à plat)
  const grouped = useMemo(() => {
    if (sortBy !== 'category') return null;
    const groups = {};
    for (const e of visible) {
      const cat = e.recipe.category || 'Autre';
      (groups[cat] = groups[cat] || []).push(e);
    }
    return CATEGORY_ORDER.filter((c) => groups[c]).map((c) => ({ category: c, items: groups[c] }));
  }, [visible, sortBy]);

  return (
    <div>
      <div style={{
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: isMobile ? 'flex-start' : 'center',
        gap: 12,
        marginBottom: 24,
        flexDirection: isMobile ? 'column' : 'row',
      }}>
        <h2 className="mc-display" style={{ fontSize: isMobile ? 20 : 24, fontWeight: 600, margin: 0 }}>
          Recettes & fiches techniques
        </h2>
        <button className="mc-btn mc-btn-primary" onClick={() => setEditingRecipe({ articles: [] })}>
          <Plus size={16} /> Nouvelle recette
        </button>
      </div>

      {/* Assortment base card (single, always shown if it exists) */}
      {assortmentBase && (
        <div style={{ marginBottom: 28 }}>
          <h3 className="mc-display" style={{ fontSize: 16, fontWeight: 600, margin: '0 0 12px', color: palette.wine }}>
            Assortiment d'assiette
          </h3>
          <AssortmentBaseCard
            base={assortmentBase}
            priceIndex={priceIndex}
            onEdit={() => setEditingRecipe(assortmentBase)}
            onDelete={() => handleDelete(assortmentBase.id)}
          />
        </div>
      )}

      {!assortmentBase && (
        <div className="mc-card" style={{ padding: 16, marginBottom: 24, borderColor: palette.amber + '40', background: palette.amber + '08' }}>
          <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
            <AlertCircle size={16} style={{ color: palette.amber, flexShrink: 0, marginTop: 2 }} />
            <div style={{ fontSize: 13, color: palette.inkSoft, lineHeight: 1.5 }}>
              <strong>Aucun assortiment d'assiette défini.</strong> Pour calculer un vrai coût « à l'assiette »
              (recette + à-côtés comme riz, salade, sauce…), créez une recette et cochez « Base d'assortiment »
              dans son éditeur. Cette base sera ajoutée automatiquement aux plats qui l'incluent.
            </div>
          </div>
        </div>
      )}

      {/* KPIs de synthèse */}
      {sellableRecipes.length > 0 && (
        <div style={{
          display: 'grid',
          gridTemplateColumns: isMobile ? 'repeat(2, 1fr)' : 'repeat(auto-fit, minmax(160px, 1fr))',
          gap: isMobile ? 10 : 16,
          marginBottom: 24,
        }}>
          <KpiCard label="Recettes" value={String(kpis.count)} />
          <KpiCard
            label="Food cost moyen"
            value={kpis.avgRatio > 0 ? formatPercent(kpis.avgRatio) : '—'}
            accentColor={kpis.avgRatio < 0.30 ? palette.sage : kpis.avgRatio < 0.35 ? palette.amber : palette.statusBroken}
            sub="Sur recettes avec prix"
          />
          <KpiCard label="Marge moyenne" value={formatEuro(kpis.avgMargin)} accentColor={palette.sage} />
          <KpiCard
            label="À surveiller"
            value={String(kpis.overThreshold)}
            accentColor={kpis.overThreshold > 0 ? palette.statusBroken : palette.inkSoft}
            sub="Food cost ≥ 35 %"
          />
        </div>
      )}

      {/* Sellable recipes */}
      <h3 className="mc-display" style={{ fontSize: 16, fontWeight: 600, margin: '0 0 12px' }}>
        Recettes
      </h3>

      {/* Toolbar recherche + tri + filtre catégorie */}
      {sellableRecipes.length > 0 && (
        <div style={{
          display: 'flex',
          gap: 10,
          marginBottom: 20,
          flexWrap: 'wrap',
          alignItems: 'center',
        }}>
          <div style={{ position: 'relative', flex: isMobile ? '1 1 100%' : '1 1 240px', minWidth: 0 }}>
            <Search size={15} style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: palette.inkSoft }} />
            <input
              className="mc-input"
              style={{ paddingLeft: 34 }}
              placeholder="Rechercher une recette…"
              value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
            />
          </div>

          <SegmentedToggle
            size="sm"
            value={catFilter}
            onChange={setCatFilter}
            options={[
              { id: 'all', label: 'Toutes' },
              ...presentCategories.map((c) => ({ id: c, label: c })),
            ]}
          />

          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <ArrowUpDown size={14} style={{ color: palette.inkSoft }} />
            <select
              className="mc-input"
              style={{ width: 'auto', paddingTop: 6, paddingBottom: 6 }}
              value={sortBy}
              onChange={(e) => setSortBy(e.target.value)}
            >
              <option value="category">Par catégorie</option>
              <option value="name">Nom (A→Z)</option>
              <option value="margin">Marge (↓)</option>
              <option value="foodcost">Food cost (↓)</option>
              <option value="cost">Coût (↓)</option>
            </select>
          </div>
        </div>
      )}

      {/* Liste : groupée par catégorie OU à plat selon le tri */}
      {sellableRecipes.length === 0 ? (
        <EmptyState
          icon={FileText}
          title="Aucune recette"
          description="Créez votre première fiche technique pour suivre vos coûts et marges."
          action={{ label: 'Nouvelle recette', onClick: () => setEditingRecipe({ articles: [] }) }}
        />
      ) : visible.length === 0 ? (
        <EmptyState
          title="Aucune recette ne correspond"
          description="Essayez un autre terme ou changez le filtre de catégorie."
        />
      ) : grouped ? (
        // Vue groupée par catégorie
        grouped.map((group) => {
          // Food cost moyen de la catégorie (recettes avec prix uniquement)
          const withPrice = group.items.filter((e) => e.recipe.salePrice > 0);
          const avgRatio = withPrice.length > 0
            ? withPrice.reduce((s, e) => s + e.ratio, 0) / withPrice.length
            : null;
          const avgColor = avgRatio === null ? palette.inkSoft
            : avgRatio < 0.30 ? palette.sage
            : avgRatio < 0.35 ? palette.amber
            : palette.statusBroken;
          return (
          <div key={group.category} style={{ marginBottom: 28 }}>
            <div style={{
              display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12,
            }}>
              <h4 className="mc-display" style={{ fontSize: 14, fontWeight: 600, margin: 0, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: 0.5 }}>
                {group.category}
              </h4>
              <span style={{ fontSize: 12, color: palette.inkSoft }}>· {group.items.length}</span>
              {avgRatio !== null && (
                <span
                  style={{ fontSize: 12, color: avgColor, fontWeight: 600 }}
                  title={`Food cost moyen des ${withPrice.length} ${group.category.toLowerCase()}s avec prix de vente`}
                >
                  · FC moyen {formatPercent(avgRatio)}
                </span>
              )}
            </div>
            <div style={{
              display: 'grid',
              gridTemplateColumns: isMobile ? '1fr' : 'repeat(auto-fill, minmax(280px, 1fr))',
              gap: 16,
            }}>
              {group.items.map((entry) => (
                <RecipeCard
                  key={entry.recipe.id}
                  entry={entry}
                  onEdit={() => setEditingRecipe(entry.recipe)}
                  onDelete={() => handleDelete(entry.recipe.id)}
                  onDuplicate={() => handleDuplicate(entry.recipe)}
                />
              ))}
            </div>
          </div>
          );
        })
      ) : (
        // Vue à plat (triée par marge/coût/nom/food cost)
        <div style={{
          display: 'grid',
          gridTemplateColumns: isMobile ? '1fr' : 'repeat(auto-fill, minmax(280px, 1fr))',
          gap: 16,
        }}>
          {visible.map((entry) => (
            <RecipeCard
              key={entry.recipe.id}
              entry={entry}
              onEdit={() => setEditingRecipe(entry.recipe)}
              onDelete={() => handleDelete(entry.recipe.id)}
              onDuplicate={() => handleDuplicate(entry.recipe)}
            />
          ))}
        </div>
      )}

      {editingRecipe && (
        <RecipeModal
          initial={editingRecipe}
          onSave={handleSave}
          onClose={() => setEditingRecipe(null)}
          articles={articles}
          recipes={recipes}
          priceIndex={priceIndex}
          foodCostTargets={context.userSettings?.foodCostTargets}
          recipeCategories={context.recipeCategories}
        />
      )}
    </div>
  );
}
