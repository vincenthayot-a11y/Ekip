/**
 * Lets the user view and edit the prompt sent to Claude during invoice scanning.
 * The custom prompt is persisted in localStorage; a "Restore default" button
 * brings back the built-in DEFAULT_SCAN_PROMPT. This means new scanning rules
 * (e.g. supplier-specific quirks) can be added without rebuilding the HTML.
 */
function ScanPromptEditor() {
  const [draft, setDraft] = useState('');
  const [loaded, setLoaded] = useState(false);
  const [savedAt, setSavedAt] = useState(null);
  const [showHelp, setShowHelp] = useState(false);

  // Load whatever is in storage (or the default) on mount
  useEffect(() => {
    storageGet(STORAGE_KEYS.scanPrompt, DEFAULT_SCAN_PROMPT).then((p) => {
      setDraft(p);
      setLoaded(true);
    });
  }, []);

  const isCustomized = loaded && draft !== DEFAULT_SCAN_PROMPT;
  const charCount = draft.length;

  const handleSave = async () => {
    if (draft === DEFAULT_SCAN_PROMPT) {
      // No need to clutter storage with a copy of the default
      await storageSet(STORAGE_KEYS.scanPrompt, null);
    } else {
      await storageSet(STORAGE_KEYS.scanPrompt, draft);
    }
    setSavedAt(new Date());
    mcToast.success('Prompt de scan enregistré');
    setTimeout(() => setSavedAt(null), 2000);
  };

  const handleReset = () => {
    mcToast.undo(
      'Prompt restauré à sa valeur par défaut',
      () => setDraft(draft), // no-op (we haven't actually wiped yet on undo)
      async () => {
        setDraft(DEFAULT_SCAN_PROMPT);
        await storageSet(STORAGE_KEYS.scanPrompt, null);
      },
    );
    // Actually apply the reset now (undo will revert via the toast's undo callback)
    setDraft(DEFAULT_SCAN_PROMPT);
    storageSet(STORAGE_KEYS.scanPrompt, null);
  };

  if (!loaded) {
    return (
      <div>
        <h4 className="mc-display" style={{ fontSize: 16, fontWeight: 600, margin: 0 }}>
          Prompt de scan
        </h4>
        <p style={{ fontSize: 12, color: palette.inkSoft, margin: '8px 0 0' }}>Chargement…</p>
      </div>
    );
  }

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8, flexWrap: 'wrap', gap: 8 }}>
        <h4 className="mc-display" style={{ fontSize: 16, fontWeight: 600, margin: 0 }}>
          Prompt envoyé à l'IA lors du scan
          {isCustomized && (
            <span
              style={{
                marginLeft: 8,
                fontSize: 10,
                fontWeight: 700,
                color: palette.amber,
                background: palette.amber + '20',
                padding: '2px 8px',
                borderRadius: 999,
                textTransform: 'uppercase',
                letterSpacing: 0.5,
              }}
            >
              Personnalisé
            </span>
          )}
        </h4>
        {savedAt && (
          <span style={{ fontSize: 11, color: palette.sage, fontWeight: 600 }}>
            ✓ Enregistré
          </span>
        )}
      </div>

      <p style={{ fontSize: 12, color: palette.inkSoft, margin: '0 0 8px' }}>
        Ce texte est envoyé à Claude avec chaque facture scannée. Vous pouvez l'éditer
        pour ajouter de nouvelles règles (produits spécifiques, fournisseurs, conversions…)
        sans avoir à reconstruire l'application.{' '}
        <button
          type="button"
          onClick={() => setShowHelp((s) => !s)}
          style={{
            background: 'none',
            border: 'none',
            padding: 0,
            color: palette.wine,
            cursor: 'pointer',
            textDecoration: 'underline',
            fontSize: 12,
          }}
        >
          {showHelp ? 'Masquer l\'aide' : 'Aide'}
        </button>
      </p>

      {showHelp && (
        <div
          style={{
            fontSize: 11,
            color: palette.inkSoft,
            background: palette.paper,
            border: `1px solid ${palette.rule}`,
            borderRadius: 6,
            padding: 10,
            margin: '0 0 10px',
            lineHeight: 1.6,
          }}
        >
          <strong style={{ color: palette.ink }}>Conseils :</strong>
          <ul style={{ margin: '6px 0 0 16px', padding: 0 }}>
            <li>Le prompt doit demander une réponse en JSON strict (le schéma JSON à la fin est obligatoire).</li>
            <li>Pour ajouter une règle, copiez la structure existante d'un fournisseur (ex. SOFRIMA) et adaptez-la.</li>
            <li>Sauvegardez avant de scanner une nouvelle facture pour que la règle soit prise en compte.</li>
            <li>« Restaurer le défaut » remet le prompt fourni avec l'application (utile en cas d'erreur).</li>
          </ul>
        </div>
      )}

      <textarea
        value={draft}
        onChange={(e) => setDraft(e.target.value)}
        className="mc-input"
        rows={20}
        spellCheck={false}
        style={{
          width: '100%',
          fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Consolas, monospace',
          fontSize: 11,
          lineHeight: 1.5,
          resize: 'vertical',
          minHeight: 200,
          whiteSpace: 'pre',
          overflowX: 'auto',
        }}
      />

      <div
        style={{
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'space-between',
          gap: 10,
          marginTop: 8,
          flexWrap: 'wrap',
        }}
      >
        <span style={{ fontSize: 11, color: palette.inkSoft }}>
          {charCount.toLocaleString('fr-FR')} caractères
        </span>
        <div style={{ display: 'flex', gap: 8 }}>
          <button
            type="button"
            className="mc-btn mc-btn-ghost"
            onClick={handleReset}
            disabled={!isCustomized}
            style={{ padding: '8px 14px' }}
          >
            Restaurer le défaut
          </button>
          <button
            type="button"
            className="mc-btn mc-btn-primary"
            onClick={handleSave}
            style={{ padding: '8px 14px' }}
          >
            Enregistrer le prompt
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   COMMAND PALETTE (Cmd/Ctrl + K)
// ═══════════════════════════════════════════════════════════════════════════
//
// Lanceur de recherche/navigation rapide. Ouvre une modale centrée avec un
// champ de recherche unique qui combine :
//   · Navigation entre les onglets (toujours présent au sommet, même vide)
//   · Articles du catalogue (filtrés par requête)
//   · Recettes (filtrées par requête)
//
// Navigation clavier complète : flèches pour parcourir, Entrée pour valider,
// Esc pour fermer. Cliquer en dehors ferme aussi.

function CommandPalette({ isOpen, onClose, articles, recipes, setActiveTab }) {
  const [query, setQuery] = useState('');
  const [selectedIdx, setSelectedIdx] = useState(0);
  const inputRef = useRef(null);

  // Reset state & focus input on open
  useEffect(() => {
    if (isOpen) {
      setQuery('');
      setSelectedIdx(0);
      // RAF + timeout : laisse React peindre la modale avant de focus
      setTimeout(() => { try { inputRef.current?.focus(); } catch (_) {} }, 50);
    }
  }, [isOpen]);

  const items = useMemo(() => {
    const navActions = [
      { type: 'action', id: 'nav-dashboard', label: 'Tableau de bord',     hint: 'KPIs & food cost',         target: 'dashboard'  },
      { type: 'action', id: 'nav-articles',  label: 'Catalogue',           hint: 'Articles & variantes',     target: 'articles'   },
      { type: 'action', id: 'nav-recipes',   label: 'Recettes',            hint: 'Plats & coûts',             target: 'recipes'    },
      { type: 'action', id: 'nav-purchases', label: 'Achats & Factures',   hint: 'Saisir / scanner',          target: 'purchases'  },
      { type: 'action', id: 'nav-stocks',    label: 'Stocks',              hint: 'Inventaire & rotations',    target: 'stocks'     },
      { type: 'action', id: 'nav-alerts',    label: 'Alertes',             hint: 'Stocks bas, hausses',       target: 'alerts'     },
      { type: 'action', id: 'nav-equipment', label: 'Équipement',          hint: 'Vaisselle & matériel',      target: 'equipment'  },
      { type: 'action', id: 'nav-energy',    label: 'Énergie',             hint: 'Factures EDF, gaz, eau',    target: 'energy'     },
      { type: 'action', id: 'nav-report',    label: 'Rapport',             hint: 'Vue synthétique',           target: 'report'     },
      { type: 'action', id: 'nav-sales',     label: 'Ventes CLYO',         hint: 'Import des ventes',         target: 'sales'      },
      { type: 'action', id: 'nav-analytics', label: 'Analyses',            hint: 'Tendances temporelles',     target: 'analytics'  },
      { type: 'action', id: 'nav-simulator', label: 'Simulateur',          hint: 'Comparer des variantes',    target: 'simulator'  },
    ];

    const q = stripAccents((query || '').trim().toLowerCase());

    // Query vide : on montre uniquement les actions de navigation principales.
    if (!q) return navActions.slice(0, 8);

    const matches = (text) => stripAccents(String(text || '').toLowerCase()).includes(q);

    const matchingActions = navActions.filter((a) => matches(a.label) || matches(a.hint));
    const matchingArticles = (articles || [])
      .filter((a) => matches(a.name))
      .slice(0, 6)
      .map((a) => ({
        type: 'article',
        id: 'art-' + a.id,
        label: a.name,
        hint: a.category || 'Article',
        target: 'articles',
      }));
    const matchingRecipes = (recipes || [])
      .filter((r) => matches(r.name))
      .slice(0, 6)
      .map((r) => ({
        type: 'recipe',
        id: 'rec-' + r.id,
        label: r.name,
        hint: 'Recette',
        target: 'recipes',
      }));

    return [...matchingActions, ...matchingArticles, ...matchingRecipes];
  }, [query, articles, recipes]);

  // Keep selectedIdx in bounds when items shrink
  useEffect(() => {
    if (selectedIdx >= items.length) setSelectedIdx(Math.max(0, items.length - 1));
  }, [items.length, selectedIdx]);

  const selectItem = useCallback((item) => {
    if (!item) return;
    if (item.target) setActiveTab(item.target);
    onClose();
  }, [setActiveTab, onClose]);

  // Keyboard navigation (only while palette is open)
  useEffect(() => {
    if (!isOpen) return;
    const onKey = (e) => {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setSelectedIdx((i) => Math.min(i + 1, Math.max(0, items.length - 1)));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setSelectedIdx((i) => Math.max(0, i - 1));
      } else if (e.key === 'Enter') {
        e.preventDefault();
        selectItem(items[selectedIdx]);
      } else if (e.key === 'Escape') {
        e.preventDefault();
        onClose();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [isOpen, items, selectedIdx, selectItem, onClose]);

  if (!isOpen) return null;

  const typeLabel = (type) => type === 'action' ? 'Aller à' : type === 'article' ? 'Article' : 'Recette';

  return (
    <div
      onClick={onClose}
      role="dialog"
      aria-modal="true"
      aria-label="Recherche rapide"
      style={{
        position: 'fixed',
        inset: 0,
        background: 'rgba(15, 12, 9, 0.45)',
        zIndex: 10000,
        display: 'flex',
        alignItems: 'flex-start',
        justifyContent: 'center',
        paddingTop: 'max(72px, 10vh)',
        paddingLeft: 16,
        paddingRight: 16,
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          background: palette.cream,
          borderRadius: 12,
          width: 'min(640px, 100%)',
          boxShadow: '0 24px 64px rgba(0,0,0,0.28)',
          overflow: 'hidden',
          fontFamily: 'DM Sans, sans-serif',
          border: `1px solid ${palette.rule}`,
        }}
      >
        {/* Search input */}
        <div style={{
          display: 'flex',
          alignItems: 'center',
          gap: 10,
          padding: '14px 18px',
          borderBottom: `1px solid ${palette.rule}`,
        }}>
          <Search size={16} style={{ color: palette.inkSoft, flexShrink: 0 }} />
          <input
            ref={inputRef}
            type="text"
            placeholder="Rechercher un article, une recette, un onglet…"
            value={query}
            onChange={(e) => { setQuery(e.target.value); setSelectedIdx(0); }}
            style={{
              flex: 1,
              border: 'none',
              outline: 'none',
              background: 'transparent',
              fontSize: 16,
              fontFamily: 'DM Sans, sans-serif',
              color: palette.ink,
            }}
          />
        </div>

        {/* Results list */}
        <div style={{ maxHeight: 380, overflowY: 'auto', padding: 6 }}>
          {items.length === 0 ? (
            <div style={{ padding: 28, textAlign: 'center', color: palette.inkSoft, fontSize: 13 }}>
              Aucun résultat pour « {query} »
            </div>
          ) : (
            items.map((item, idx) => {
              const isSelected = selectedIdx === idx;
              return (
                <button
                  key={item.id}
                  onClick={() => selectItem(item)}
                  onMouseEnter={() => setSelectedIdx(idx)}
                  style={{
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'space-between',
                    width: '100%',
                    padding: '10px 12px',
                    borderRadius: 6,
                    border: 'none',
                    cursor: 'pointer',
                    textAlign: 'left',
                    background: isSelected ? palette.paper : 'transparent',
                    color: palette.ink,
                    fontFamily: 'inherit',
                    fontSize: 14,
                    marginBottom: 2,
                  }}
                >
                  <span style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 0, flex: 1 }}>
                    <span style={{
                      fontSize: 9,
                      fontWeight: 600,
                      textTransform: 'uppercase',
                      letterSpacing: 0.6,
                      color: palette.inkSoft,
                      background: palette.rule,
                      padding: '2px 6px',
                      borderRadius: 3,
                      minWidth: 56,
                      textAlign: 'center',
                      flexShrink: 0,
                    }}>
                      {typeLabel(item.type)}
                    </span>
                    <span style={{
                      fontWeight: isSelected ? 600 : 500,
                      whiteSpace: 'nowrap',
                      overflow: 'hidden',
                      textOverflow: 'ellipsis',
                    }}>
                      {item.label}
                    </span>
                  </span>
                  {item.hint && (
                    <span style={{
                      fontSize: 11,
                      color: palette.inkSoft,
                      marginLeft: 12,
                      flexShrink: 0,
                    }}>
                      {item.hint}
                    </span>
                  )}
                </button>
              );
            })
          )}
        </div>

        {/* Footer keyboard hints */}
        <div style={{
          padding: '8px 18px',
          borderTop: `1px solid ${palette.rule}`,
          fontSize: 11,
          color: palette.inkSoft,
          display: 'flex',
          gap: 16,
          background: palette.paper + '60',
        }}>
          <span>↑↓ naviguer</span>
          <span>⏎ valider</span>
          <span>Esc fermer</span>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   SIDEBAR (navigation principale)
// ═══════════════════════════════════════════════════════════════════════════
//
// Sidebar gauche structurée en sections, rétractable sur desktop et drawer
// overlay sur mobile. Trois zones :
//   · Brand (titre)
//   · Sections : home (Tableau de bord seul), Quotidien, Pilotage
//   · Footer : bouton replier/déplier (desktop), version (info)
//
// Sur mobile (`isMobile`), la sidebar devient un drawer en position fixed,
// caché par défaut et révélé par le bouton hamburger du TopBar. Un backdrop
// semi-transparent permet de fermer en cliquant en dehors.

const SIDEBAR_SECTIONS = [
  { id: 'home',      label: null,         items: ['dashboard'] },
  { id: 'quotidien', label: 'Quotidien',  items: ['articles', 'recipes', 'platsdujour', 'purchases', 'stocks', 'alerts', 'sales', 'energy', 'equipment'] },
  { id: 'pilotage',  label: 'Pilotage',   items: ['report', 'analytics', 'simulator'] },
];

// 'settings' est volontairement absent des sections : c'est un onglet rare
// (configuré ~1× par mois), on l'affiche dans un footer dédié pour ne pas
// occuper un slot de la nav principale. Voir le rendu plus bas dans Sidebar.
const SIDEBAR_FOOTER_TABS = ['settings'];

function Sidebar({
  tabs,
  activeTab,
  setActiveTab,
  alertsIndex,
  collapsed,
  onToggleCollapsed,
  isMobile,
  mobileOpen,
  onMobileClose,
}) {
  // Width when expanded vs collapsed (icon-only) on desktop.
  // On mobile we use full expanded width regardless of `collapsed`.
  const expandedW = 232;
  const collapsedW = 64;
  const effectiveCollapsed = isMobile ? false : collapsed;
  const width = effectiveCollapsed ? collapsedW : expandedW;

  // Lookup map for tab metadata by id
  const tabById = useMemo(() => {
    const map = {};
    for (const t of tabs) map[t.id] = t;
    return map;
  }, [tabs]);

  // ─── Tooltip au survol ───────────────────────────────────────────────────
  // Affiché uniquement quand la sidebar est repliée (icônes seules), pour
  // indiquer le libellé de l'onglet survolé. Inutile quand la sidebar est
  // dépliée puisque les libellés sont déjà visibles. Inutile sur mobile aussi
  // (pas de hover sur écran tactile).
  // Rendu avec `position: fixed` pour ne pas être clippé par overflowX de l'aside.
  const [tooltip, setTooltip] = useState(null);
  const tooltipTimerRef = useRef(null);

  const showTooltipFor = useCallback((label, rect) => {
    if (isMobile || !effectiveCollapsed) return;
    if (tooltipTimerRef.current) clearTimeout(tooltipTimerRef.current);
    // Petit délai pour ne pas spammer au passage rapide du curseur
    tooltipTimerRef.current = setTimeout(() => {
      setTooltip({
        x: rect.right + 12,
        y: rect.top + rect.height / 2,
        label,
      });
    }, 300);
  }, [isMobile, effectiveCollapsed]);

  const hideTooltip = useCallback(() => {
    if (tooltipTimerRef.current) {
      clearTimeout(tooltipTimerRef.current);
      tooltipTimerRef.current = null;
    }
    setTooltip(null);
  }, []);

  // Nettoyage du timer au démontage
  useEffect(() => {
    return () => { if (tooltipTimerRef.current) clearTimeout(tooltipTimerRef.current); };
  }, []);

  // Si on déplie pendant qu'un tooltip est affiché, le cacher immédiatement
  useEffect(() => {
    if (!effectiveCollapsed) hideTooltip();
  }, [effectiveCollapsed, hideTooltip]);

  // ─── Item de menu ─────────────────────────────────────────────────────────
  const SidebarItem = ({ id, label, icon: Icon, locked }) => {
    const isActive = activeTab === id;
    const showAlertBadge = id === 'alerts' && alertsIndex.length > 0;
    return (
      <button
        onClick={() => {
          setActiveTab(id);
          hideTooltip();
          if (isMobile) onMobileClose();
        }}
        aria-label={label}
        aria-current={isActive ? 'page' : undefined}
        style={{
          position: 'relative',
          display: 'flex',
          alignItems: 'center',
          gap: 12,
          width: '100%',
          padding: effectiveCollapsed ? '10px 0' : '9px 12px',
          justifyContent: effectiveCollapsed ? 'center' : 'flex-start',
          borderRadius: 6,
          border: 'none',
          fontSize: 13.5,
          fontWeight: isActive ? 600 : 500,
          cursor: 'pointer',
          fontFamily: 'DM Sans, sans-serif',
          background: isActive ? palette.wine + '12' : 'transparent',
          color: isActive ? palette.wine : palette.inkSoft,
          opacity: locked && !isActive ? 0.55 : 1,
          textAlign: 'left',
          transition: 'background 120ms ease, color 120ms ease',
        }}
        onMouseEnter={(e) => {
          if (!isActive) e.currentTarget.style.background = palette.paper;
          const rect = e.currentTarget.getBoundingClientRect();
          showTooltipFor(label, rect);
        }}
        onMouseLeave={(e) => {
          if (!isActive) e.currentTarget.style.background = 'transparent';
          hideTooltip();
        }}
      >
        {/* Barre wine à gauche quand actif (l'équivalent vertical du soulignement) */}
        {isActive && (
          <span
            aria-hidden="true"
            style={{
              position: 'absolute',
              left: 0,
              top: 6,
              bottom: 6,
              width: 3,
              background: palette.wine,
              borderRadius: 2,
            }}
          />
        )}

        <Icon size={17} style={{ flexShrink: 0 }} />

        {!effectiveCollapsed && (
          <span style={{
            flex: 1,
            whiteSpace: 'nowrap',
            overflow: 'hidden',
            textOverflow: 'ellipsis',
          }}>
            {label}
          </span>
        )}

        {/* Badge alertes : pleine version quand déplié, point quand replié */}
        {showAlertBadge && !effectiveCollapsed && (
          <span style={{
            background: palette.wine,
            color: palette.cream,
            fontSize: 11,
            fontWeight: 700,
            padding: '1px 7px',
            borderRadius: 10,
            minWidth: 18,
            textAlign: 'center',
            fontFamily: 'DM Sans, sans-serif',
            flexShrink: 0,
          }}>
            {alertsIndex.length}
          </span>
        )}
        {showAlertBadge && effectiveCollapsed && (
          <span aria-hidden="true" style={{
            position: 'absolute',
            top: 4,
            right: 8,
            width: 7,
            height: 7,
            borderRadius: '50%',
            background: palette.wine,
          }} />
        )}

        {/* Lock pour les onglets phase-1 */}
        {locked && !effectiveCollapsed && (
          <Lock size={11} style={{ color: palette.inkSoft, opacity: 0.7, flexShrink: 0 }} />
        )}
      </button>
    );
  };

  // ─── Conteneur principal ──────────────────────────────────────────────────
  const aside = (
    <aside
      style={{
        width,
        // Sur mobile en drawer : fixed + overlay. Sur desktop : sticky.
        position: isMobile ? 'fixed' : 'sticky',
        top: 0,
        left: 0,
        height: '100vh',
        background: palette.cream,
        borderRight: `1px solid ${palette.rule}`,
        display: 'flex',
        flexDirection: 'column',
        flexShrink: 0,
        transition: 'width 180ms ease, transform 220ms ease',
        zIndex: isMobile ? 1001 : 5,
        transform: isMobile && !mobileOpen ? 'translateX(-100%)' : 'translateX(0)',
        boxShadow: isMobile && mobileOpen ? '0 8px 32px rgba(0,0,0,0.15)' : 'none',
        overflowY: 'auto',
        overflowX: 'hidden',
      }}
    >
      {/* Brand zone */}
      <div style={{
        padding: effectiveCollapsed ? '16px 8px' : '20px 16px 16px',
        borderBottom: `1px solid ${palette.rule}`,
        display: 'flex',
        alignItems: 'center',
        justifyContent: effectiveCollapsed ? 'center' : 'space-between',
        gap: 8,
        minHeight: 64,
        flexShrink: 0,
      }}>
        {effectiveCollapsed ? (
          // Logo compact : T dans un carré wine
          <div style={{
            width: 36, height: 36,
            background: palette.wine,
            borderRadius: 6,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            color: palette.cream,
            fontFamily: 'Fraunces, serif',
            fontWeight: 700,
            fontSize: 22,
          }}>
            T
          </div>
        ) : (
          <>
            <h1
              className="mc-display"
              style={{
                fontSize: 22,
                fontWeight: 700,
                color: palette.wine,
                margin: 0,
                lineHeight: 1.1,
                whiteSpace: 'nowrap',
                overflow: 'hidden',
                textOverflow: 'ellipsis',
              }}
            >
              La Tambouille
            </h1>
            {isMobile && (
              <button
                onClick={onMobileClose}
                aria-label="Fermer le menu"
                style={{
                  background: 'transparent',
                  border: 'none',
                  cursor: 'pointer',
                  color: palette.inkSoft,
                  padding: 4,
                  borderRadius: 4,
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                }}
              >
                <X size={18} />
              </button>
            )}
          </>
        )}
      </div>

      {/* Sections */}
      <nav style={{
        flex: 1,
        padding: effectiveCollapsed ? '12px 6px' : '16px 10px',
        display: 'flex',
        flexDirection: 'column',
        gap: effectiveCollapsed ? 4 : 6,
      }}>
        {SIDEBAR_SECTIONS.map((section, sectionIdx) => (
          <div key={section.id} style={{
            display: 'flex',
            flexDirection: 'column',
            gap: 2,
            marginTop: sectionIdx > 0 ? 12 : 0,
          }}>
            {/* Section label (caché quand replié) */}
            {section.label && !effectiveCollapsed && (
              <div style={{
                padding: '6px 12px 4px',
                fontSize: 10,
                fontWeight: 600,
                textTransform: 'uppercase',
                letterSpacing: 0.8,
                color: palette.inkSoft,
                opacity: 0.7,
              }}>
                {section.label}
              </div>
            )}
            {/* Separator quand replié (sauf première section) */}
            {section.label && effectiveCollapsed && sectionIdx > 0 && (
              <div style={{
                height: 1,
                background: palette.rule,
                margin: '6px 12px 6px',
              }} />
            )}
            {section.items
              .map((id) => tabById[id])
              .filter(Boolean)
              .map((tab) => (
                <SidebarItem
                  key={tab.id}
                  id={tab.id}
                  label={tab.label}
                  icon={tab.icon}
                  locked={tab.locked}
                />
              ))}
          </div>
        ))}
      </nav>

      {/* Footer "réglages" : onglets rares qu'on sort de la nav principale */}
      <div style={{
        padding: effectiveCollapsed ? '6px 6px 0' : '6px 10px 0',
        borderTop: `1px solid ${palette.rule}`,
        display: 'flex',
        flexDirection: 'column',
        gap: 2,
        flexShrink: 0,
      }}>
        {SIDEBAR_FOOTER_TABS
          .map((id) => tabById[id])
          .filter(Boolean)
          .map((tab) => (
            <SidebarItem
              key={tab.id}
              id={tab.id}
              label={tab.label}
              icon={tab.icon}
              locked={tab.locked}
            />
          ))}
      </div>

      {/* Footer : bouton replier/déplier (desktop uniquement) */}
      {!isMobile && (
        <div style={{
          padding: effectiveCollapsed ? '8px 6px' : '8px 10px',
          borderTop: `1px solid ${palette.rule}`,
          display: 'flex',
          justifyContent: effectiveCollapsed ? 'center' : 'flex-end',
          flexShrink: 0,
        }}>
          <button
            onClick={onToggleCollapsed}
            title={effectiveCollapsed ? 'Déplier la barre' : 'Replier la barre'}
            aria-label={effectiveCollapsed ? 'Déplier la barre' : 'Replier la barre'}
            style={{
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              padding: 8,
              borderRadius: 6,
              border: 'none',
              background: 'transparent',
              cursor: 'pointer',
              color: palette.inkSoft,
            }}
            onMouseEnter={(e) => { e.currentTarget.style.background = palette.paper; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; }}
          >
            {effectiveCollapsed ? <PanelLeftOpen size={16} /> : <PanelLeftClose size={16} />}
          </button>
        </div>
      )}
    </aside>
  );

  // ─── Élément tooltip (label uniquement, quand sidebar repliée) ───────────
  // `position: fixed` pour ne pas être clippé par overflowX de l'aside,
  // `pointerEvents: none` pour ne pas interférer avec le hover du bouton.
  const tooltipNode = tooltip && !isMobile && effectiveCollapsed ? (
    <div
      role="tooltip"
      style={{
        position: 'fixed',
        left: tooltip.x,
        top: tooltip.y,
        transform: 'translateY(-50%)',
        background: palette.ink,
        color: palette.cream,
        padding: '6px 10px',
        borderRadius: 5,
        fontSize: 12.5,
        fontWeight: 500,
        whiteSpace: 'nowrap',
        zIndex: 9998,
        pointerEvents: 'none',
        boxShadow: '0 4px 16px rgba(0,0,0,0.22)',
        fontFamily: 'DM Sans, sans-serif',
        lineHeight: 1.3,
        animation: 'mc-tooltip-fade-in 140ms ease-out',
      }}
    >
      {/* Petite flèche orientée vers la gauche, vers l'item de la sidebar */}
      <span
        aria-hidden="true"
        style={{
          position: 'absolute',
          left: -4,
          top: '50%',
          transform: 'translateY(-50%) rotate(45deg)',
          width: 8,
          height: 8,
          background: palette.ink,
        }}
      />
      {tooltip.label}
    </div>
  ) : null;

  // En mobile, on enveloppe avec un backdrop (overlay sombre cliquable)
  if (isMobile) {
    return (
      <>
        {mobileOpen && (
          <div
            onClick={onMobileClose}
            aria-hidden="true"
            style={{
              position: 'fixed',
              inset: 0,
              background: 'rgba(15, 12, 9, 0.45)',
              zIndex: 1000,
            }}
          />
        )}
        {aside}
        {tooltipNode}
      </>
    );
  }
  return (
    <>
      {aside}
      {tooltipNode}
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   MAIN APP
// ═══════════════════════════════════════════════════════════════════════════

export default function LaTambouille() {
  const [activeTab, setActiveTab] = useState('dashboard');
  const [articles, setArticles] = useState(DEMO_ARTICLES);
  const [recipes, setRecipes] = useState(DEMO_RECIPES);
  const [menus, setMenus] = useState([]);
  const [purchases, setPurchases] = useState(DEMO_PURCHASES);
  const [sales, setSales] = useState(DEMO_SALES);
  const [inventories, setInventories] = useState([]);
  const [energy, setEnergy] = useState([]);
  const [equipment, setEquipment] = useState([]);
  const [equipmentPurchases, setEquipmentPurchases] = useState([]);
  const [equipmentInventories, setEquipmentInventories] = useState([]);
  const [assets, setAssets] = useState([]);
  const [assetMaintenance, setAssetMaintenance] = useState([]);
  const [assetInterventions, setAssetInterventions] = useState([]);
  const [platsDuJour, setPlatsDuJour] = useState({});  // { 'YYYY-MM-DD': [{ id, recipeId, name, ingredients:[] }] }
  const [alertSettings, setAlertSettings] = useState(() => mergeAlertSettings(null));
  // Réglages utilisateur : catégories personnalisées + seuils paramétrables.
  // Initialisés aux défauts ; remplacés au boot s'il existe une version
  // sauvegardée dans le storage.
  const [userSettings, setUserSettings] = useState(() => mergeUserSettings(null));
  const [isReady, setIsReady] = useState(false);
  const [showSyncModal, setShowSyncModal] = useState(false);
  // Cmd/Ctrl + K command palette
  const [cmdKOpen, setCmdKOpen] = useState(false);
  // Sidebar state
  //  · `sidebarCollapsed` : replie la sidebar desktop en mode icônes seulement.
  //    Persisté en localStorage pour rester d'une session à l'autre.
  //  · `sidebarMobileOpen` : ouverture du drawer mobile (overlay). Éphémère.
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [sidebarMobileOpen, setSidebarMobileOpen] = useState(false);
  // Responsive layout : on bascule en mode mobile sous 720 px de large
  const isMobile = useIsMobile(720);

  const periodFilter = usePeriodFilter();

  // Drive sync: replaces all five collections atomically when remote data is loaded
  const applyRemoteData = useCallback((envelope) => {
    if (!envelope) return;
    if (Array.isArray(envelope.articles))             setArticles(migrateArticlesForStock(envelope.articles));
    if (Array.isArray(envelope.recipes))              setRecipes(migrateRecipesForPlateCost(envelope.recipes));
    if (Array.isArray(envelope.menus))                setMenus(envelope.menus);
    if (Array.isArray(envelope.purchases))            setPurchases(migratePurchasesForStock(envelope.purchases));
    if (Array.isArray(envelope.sales))                setSales(envelope.sales);
    if (Array.isArray(envelope.inventories))          setInventories(envelope.inventories);
    if (Array.isArray(envelope.energy))               setEnergy(envelope.energy);
    if (Array.isArray(envelope.equipment))            setEquipment(envelope.equipment);
    if (Array.isArray(envelope.equipmentPurchases))   setEquipmentPurchases(envelope.equipmentPurchases);
    if (Array.isArray(envelope.equipmentInventories)) setEquipmentInventories(envelope.equipmentInventories);
    if (Array.isArray(envelope.assets))               setAssets(envelope.assets);
    if (Array.isArray(envelope.assetMaintenance))     setAssetMaintenance(envelope.assetMaintenance);
    if (Array.isArray(envelope.assetInterventions))   setAssetInterventions(envelope.assetInterventions);
    if (envelope.alertSettings && typeof envelope.alertSettings === 'object') setAlertSettings(mergeAlertSettings(envelope.alertSettings));
  }, []);

  const driveSync = useDriveSync({
    data: { articles, recipes, menus, purchases, sales, inventories, energy, equipment, equipmentPurchases, equipmentInventories, assets, assetMaintenance, assetInterventions, alertSettings },
    applyRemoteData,
  });

  useEffect(() => {
    (async () => {
      console.log('[BOOT] start, storage =', storageAdapter.name);
      try {
        const wasInitialized = await storageGet(STORAGE_KEYS.initialized, false);
        console.log('[BOOT] wasInitialized =', wasInitialized);

        if (wasInitialized) {
          console.log('[BOOT] loading existing data');
          const loadedArticles = await storageGet(STORAGE_KEYS.articles, DEMO_ARTICLES);
          const loadedRecipes = await storageGet(STORAGE_KEYS.recipes, DEMO_RECIPES);
          const loadedMenus = await storageGet(STORAGE_KEYS.menus, []);
          const loadedPurchases = await storageGet(STORAGE_KEYS.purchases, DEMO_PURCHASES);
          const loadedInventories = await storageGet(STORAGE_KEYS.inventories, []);
          const loadedEnergy = await storageGet(STORAGE_KEYS.energy, []);
          const loadedEquipment = await storageGet(STORAGE_KEYS.equipment, []);
          const loadedEquipmentPurchases = await storageGet(STORAGE_KEYS.equipmentPurchases, []);
          const loadedEquipmentInventories = await storageGet(STORAGE_KEYS.equipmentInventories, []);
          const loadedAssets = await storageGet(STORAGE_KEYS.assets, []);
          const loadedAssetMaintenance = await storageGet(STORAGE_KEYS.assetMaintenance, []);
          const loadedAssetInterventions = await storageGet(STORAGE_KEYS.assetInterventions, []);
          const loadedPlatsDuJour = await storageGet(STORAGE_KEYS.platsDuJour, {});
          const loadedAlertSettings = await storageGet(STORAGE_KEYS.alertSettings, null);
          console.log('[BOOT] data loaded, migrating');

          setArticles(migrateArticlesForStock(loadedArticles));
          setRecipes(migrateRecipesForPlateCost(loadedRecipes));
          setMenus(loadedMenus);
          setPurchases(migratePurchasesForStock(loadedPurchases));
          setSales(await storageGet(STORAGE_KEYS.sales, DEMO_SALES));
          setInventories(loadedInventories);
          setEnergy(loadedEnergy);
          setEquipment(loadedEquipment);
          setEquipmentPurchases(loadedEquipmentPurchases);
          setEquipmentInventories(loadedEquipmentInventories);
          setAssets(loadedAssets);
          setAssetMaintenance(loadedAssetMaintenance);
          setAssetInterventions(loadedAssetInterventions);
          setPlatsDuJour(loadedPlatsDuJour && typeof loadedPlatsDuJour === 'object' ? loadedPlatsDuJour : {});
          if (loadedAlertSettings) setAlertSettings(mergeAlertSettings(loadedAlertSettings));
          // Chargement des réglages utilisateur (avec fallback sur défauts)
          const loadedUserSettings = await storageGet(STORAGE_KEYS.userSettings, null);
          setUserSettings(mergeUserSettings(loadedUserSettings));
        } else {
          console.log('[BOOT] first launch, seeding demo data');
          const seedArticles = migrateArticlesForStock(DEMO_ARTICLES);
          const seedRecipes = migrateRecipesForPlateCost(DEMO_RECIPES);
          const seedPurchases = migratePurchasesForStock(DEMO_PURCHASES);
          await storageSet(STORAGE_KEYS.articles, seedArticles);
          await storageSet(STORAGE_KEYS.recipes, seedRecipes);
          await storageSet(STORAGE_KEYS.purchases, seedPurchases);
          await storageSet(STORAGE_KEYS.sales, DEMO_SALES);
          await storageSet(STORAGE_KEYS.inventories, []);
          await storageSet(STORAGE_KEYS.energy, []);
          await storageSet(STORAGE_KEYS.initialized, true);
          setArticles(seedArticles);
          setRecipes(seedRecipes);
          setPurchases(seedPurchases);
        }

        console.log('[BOOT] setIsReady(true)');
        setIsReady(true);
      } catch (err) {
        console.error('[BOOT] CRASH:', err);
        // Even on crash, unblock UI so user sees something
        setIsReady(true);
      }
    })();
  }, []);

  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.articles, articles); }, [articles, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.recipes, recipes); }, [recipes, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.menus, menus); }, [menus, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.purchases, purchases); }, [purchases, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.sales, sales); }, [sales, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.inventories, inventories); }, [inventories, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.energy, energy); }, [energy, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.equipment, equipment); }, [equipment, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.equipmentPurchases, equipmentPurchases); }, [equipmentPurchases, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.equipmentInventories, equipmentInventories); }, [equipmentInventories, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.assets, assets); }, [assets, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.assetMaintenance, assetMaintenance); }, [assetMaintenance, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.assetInterventions, assetInterventions); }, [assetInterventions, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.platsDuJour, platsDuJour); }, [platsDuJour, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.alertSettings, alertSettings); }, [alertSettings, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.sidebarCollapsed, sidebarCollapsed); }, [sidebarCollapsed, isReady]);
  useEffect(() => { if (isReady) storageSet(STORAGE_KEYS.userSettings, userSettings); }, [userSettings, isReady]);

  // Charger la préférence sidebarCollapsed une fois prêt (silencieux si jamais
  // sauvegardée — la valeur initiale `false` reste). Désactivé sur mobile car
  // l'état effectif y est toujours « pas replié, juste caché ».
  useEffect(() => {
    if (!isReady) return;
    (async () => {
      const stored = await storageGet(STORAGE_KEYS.sidebarCollapsed, null);
      if (typeof stored === 'boolean') setSidebarCollapsed(stored);
    })();
  }, [isReady]);

  // Fermer le drawer mobile dès qu'on passe en desktop (résize), pour ne pas
  // laisser un état orphelin si l'utilisateur tourne sa tablette ou redimensionne.
  useEffect(() => {
    if (!isMobile && sidebarMobileOpen) setSidebarMobileOpen(false);
  }, [isMobile, sidebarMobileOpen]);

  // Trigger debounced Drive sync whenever data changes.
  // IMPORTANT: isReady is NOT in the dependency array — we don't want to push
  // on initial load (dataRef.current isn't populated yet at that moment and
  // we'd overwrite Drive with empty arrays). Data changes after the initial
  // render are safe to push.
  const isReadyRef = useRef(false);
  useEffect(() => { isReadyRef.current = isReady; }, [isReady]);

  useEffect(() => {
    // Skip the very first render and skip until isReady is true
    if (!isReadyRef.current) return;
    if (driveSync.enabled) {
      driveSync.scheduleSync();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [articles, recipes, menus, purchases, sales, inventories, energy,
      equipment, equipmentPurchases, equipmentInventories,
      assets, assetMaintenance, assetInterventions, alertSettings]);

  // ─── Memoized price indexes (rebuilt only when purchases or period change) ─
  // These are the core perf optimization: instead of every view recalculating
  // weighted averages on the fly, we build the index once and look up in O(1).
  //
  // IMPORTANT: these useMemo calls MUST come before any early return, otherwise
  // the hooks order changes between renders (when isReady flips false→true)
  // and React throws Minified error #310 ("Rendered more hooks than previous
  // render"). Rules of Hooks: hooks always run in the same order.
  const priceIndex = useMemo(
    () => buildPriceIndex(purchases, periodFilter.dateFrom, periodFilter.dateTo),
    [purchases, periodFilter.dateFrom, periodFilter.dateTo]
  );

  // All-time price index (period-independent), used for historical comparisons
  // and for views that need to know "what's the global picture".
  const allTimePriceIndex = useMemo(
    () => buildPriceIndex(purchases, null, null),
    [purchases]
  );

  // Effective price index used for recipe cost calculations :
  // - Period entries take priority (reflect current cost reality)
  // - Articles absent from the period fall back to their all-time average
  //   (isFallback:true) so recipes never show 0,00€ just because an ingredient
  //   wasn't purchased in the selected window (e.g. 30J for seasonal items).
  const effectivePriceIndex = useMemo(
    () => mergePriceIndexWithFallback(priceIndex, allTimePriceIndex),
    [priceIndex, allTimePriceIndex]
  );

  // Outflow index: precomputed theoretical outflows (sales × recipe lines)
  // per article, with cumulative-by-date support for fast "since D" queries.
  // Rebuilt only when sales or recipes change.
  const outflowIndex = useMemo(
    () => buildOutflowIndex(sales, recipes),
    [sales, recipes]
  );

  // Alerts index: per-article alert list (stock + price).
  // Memoized at app level so the nav badge and the Alerts view see the same
  // list without recomputing. `today` is captured at memo time — that's fine
  // because date-based alerts don't need millisecond precision; recomputes
  // happen whenever data changes anyway.
  const alertsIndex = useMemo(() => {
    const today = new Date().toISOString().slice(0, 10);
    return buildAlertsIndex({
      articles, outflowIndex, purchases, sales, recipes, inventories, today,
      supplierGapThresholdPct: alertSettings.supplierGapThresholdPct,
      equipment, equipmentInventories,
    });
  }, [articles, outflowIndex, purchases, sales, recipes, inventories, alertSettings, equipment, equipmentInventories]);

  // Phase-1 mode: when the user hasn't imported any sales yet, several views
  // (dashboard, analytics, sales, stock-low alerts) can't produce meaningful
  // numbers. Rather than hide them entirely, we keep them visible but locked
  // with an explanatory screen — so the user knows the features exist and
  // will activate once CLYO sales are imported.
  const phase1Mode = sales.length === 0;

  // ─── Food cost global (visible dans le header sur toutes les vues) ────────
  // Calcule le ratio coût matière / chiffre d'affaires sur la période active.
  // Renvoie null tant qu'il n'y a pas de ventes ou pas de revenu sur la période.
  // C'est une légère duplication avec DashboardView (qui recalcule en interne),
  // acceptable pour éviter un refactor plus large du context.
  const globalFC = useMemo(() => {
    if (sales.length === 0) return null;
    const assortmentBase = findAssortmentBase(recipes);
    const recipeCostMap = {};
    for (const recipe of recipes) {
      recipeCostMap[recipe.id] = indexedPlateCost(recipe, priceIndex, assortmentBase).plateCost;
    }
    const dateFrom = periodFilter.dateFrom;
    const dateTo = periodFilter.dateTo;
    let totalRevenue = 0;
    let totalCost = 0;
    for (const s of sales) {
      if (dateFrom && s.date < dateFrom) continue;
      if (dateTo && s.date > dateTo) continue;
      totalRevenue += (s.revenue || 0);
      totalCost += (recipeCostMap[s.recipeId] || 0) * (s.qty || 0);
    }
    return totalRevenue > 0 ? totalCost / totalRevenue : null;
  }, [sales, recipes, priceIndex, periodFilter.dateFrom, periodFilter.dateTo]);

  // ─── Cmd/Ctrl + K : ouverture du command palette ─────────────────────────
  // Listener global, mais on ne déclenche pas quand l'utilisateur est déjà en
  // train de taper dans un champ (sauf si c'est un input du palette lui-même,
  // mais celui-ci est démontable donc pas un souci).
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        setCmdKOpen((open) => !open);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // Liste des onglets. Les sections de la sidebar (cf. SIDEBAR_SECTIONS plus
  // haut) organisent visuellement la nav en groupes Quotidien / Pilotage.
  const tabs = [
    { id: 'dashboard',  label: 'Tableau de bord',   icon: LayoutDashboard, locked: phase1Mode },
    { id: 'articles',   label: 'Catalogue',         icon: Package           },
    { id: 'recipes',    label: 'Recettes',          icon: FileText          },
    { id: 'platsdujour', label: 'Plats du jour',    icon: CalendarDays      },
    { id: 'purchases',  label: 'Achats & Factures', icon: ShoppingCart      },
    { id: 'stocks',     label: 'Stocks',            icon: Box               },
    { id: 'alerts',     label: 'Alertes',           icon: AlertCircle       },
    { id: 'equipment',  label: 'Équipement',        icon: Wrench            },
    { id: 'energy',     label: 'Énergie',           icon: Zap               },
    { id: 'report',     label: 'Rapport',           icon: ClipboardList     },
    { id: 'sales',      label: 'Ventes CLYO',       icon: Upload,           locked: phase1Mode },
    { id: 'analytics',  label: 'Analyses',          icon: TrendingUp        },
    { id: 'simulator',  label: 'Simulateur',        icon: Star              },
    { id: 'settings',   label: 'Réglages',          icon: Settings          },
  ];

  // Onglets où le PeriodSelector et le FoodCostChip sont sans objet
  // (vues d'état présent ou d'import, pas de notion de période).
  const PERIODLESS_TABS = new Set(['stocks', 'alerts', 'sales', 'settings']);
  const showPeriodControls = !PERIODLESS_TABS.has(activeTab);

  if (!isReady) {
    return (
      <div className="mc-app" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh' }}>
        <Loader2 size={32} style={{ color: palette.wine, animation: 'spin 1s linear infinite' }} />
        <style>{globalStyles}</style>
      </div>
    );
  }

  const context = {
    articles, setArticles,
    recipes, setRecipes,
    menus, setMenus,
    purchases, setPurchases,
    sales, setSales,
    inventories, setInventories,
    energy, setEnergy,
    equipment, setEquipment,
    equipmentPurchases, setEquipmentPurchases,
    equipmentInventories, setEquipmentInventories,
    assets, setAssets,
    assetMaintenance, setAssetMaintenance,
    assetInterventions, setAssetInterventions,
    platsDuJour, setPlatsDuJour,
    alertSettings, setAlertSettings,
    // Réglages utilisateur : exposés comme objets, et raccourcis dérivés vers
    // les listes pour éviter les usages `context.userSettings.xxx` verbeux
    // dans les vues qui n'ont besoin que des catégories.
    userSettings, setUserSettings,
    articleCategories: userSettings.articleCategories,
    equipmentCategories: userSettings.equipmentCategories,
    assetCategories: userSettings.assetCategories,
    recipeCategories: userSettings.recipeCategories,
    thresholds: userSettings.thresholds,
    priceIndex: effectivePriceIndex,
    allTimePriceIndex,
    outflowIndex,
    alertsIndex,
    ...periodFilter,
  };

  return (
    <div className="mc-app">
      <style>{globalStyles}</style>
      <ToastContainer />
      {/* Layout principal : sidebar gauche + main droite.
