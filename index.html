/* ═══════════════════════════════════════════════════════════════════════════
   STORAGE : LOCAL + GOOGLE DRIVE (Apps Script) AVEC RETRY
   ───────────────────────────────────────────────────────────────────────────
   Architecture :
   - Toujours sauvegarder en local d'abord (instantané, jamais d'échec)
   - Si Drive configuré (GAS_URL) : tentative de synchro avec debounce 800ms
   - En cas d'échec : retry automatique toutes les 15s tant que _syncPending
   - Au retour en ligne (event "online") : push immédiat du cache local
   - Au chargement : comparaison des timestamps local vs Drive, on garde le
     plus récent (et on pousse le local vers Drive s'il était plus à jour)
   ═══════════════════════════════════════════════════════════════════════════ */

let GAS_URL = localStorage.getItem('gas_url') || '';
let _saveTimer = null;
let _empsFromStorage = false;
let _syncPending = false;
let _syncRetryTimer = null;
let _lastSyncOk = false;

/* Coefficient de charges patronales (coût employeur = brut × coef).
   1.0 = coût brut seul. À régler avec la valeur réelle donnée par le
   comptable (régime LODEOM en Martinique → souvent < métropole). */
let _chargesCoef = parseFloat(localStorage.getItem('charges_coef')) || 1.0;

function isDriveConnected() { return !!GAS_URL; }

/* Met à jour l'indicateur de statut de sauvegarde dans le header. */
function setSaveStatus(status) {
  const el = document.getElementById('save-status');
  if (!el) return;
  if (status === 'saving') {
    el.innerHTML =
      "<span class='save-status--saving'>⏳ Sauvegarde...</span>";
  } else if (status === 'ok') {
    el.innerHTML =
      "<span class='save-status--ok'>☁ ✓ Synchronisé</span>";
  } else if (status === 'local') {
    el.innerHTML =
      "<span class='save-status--local'>💾 Local</span>";
  } else if (status === 'pending') {
    el.innerHTML =
      "<span class='save-status--saving'>⏳ Hors ligne</span>";
  } else if (status === 'error') {
    el.innerHTML =
      "<span class='save-status--error'>⚠ Erreur Drive</span>";
  }
}

/* Appel HTTP vers l'Apps Script (contourne le redirect 302 de Google). */
function gasRequest(url, method, body, callback) {
  const opts = { method: method, redirect: 'follow' };
  if (body) opts.body = body;
  fetch(url, opts)
    .then(r => r.text())
    .then(t => {
      try {
        callback(JSON.parse(t));
      } catch (e) {
        // Parfois Google enveloppe dans du HTML — on cherche le JSON dedans
        const m = t.match(/\{[\s\S]*\}/);
        if (m) {
          try { callback(JSON.parse(m[0])); } catch (e2) { callback(null); }
        } else {
          callback(null);
        }
      }
    })
    .catch(() => callback(null));
}

/* Sauvegarde : local systématique + Drive si configuré. */
function save() {
  try {
    const data = {
      pl: S.pl, ind: S.ind, cp: S.cp, mal: S.mal, pm: S.pm,
      notes: S.notes, dc: S.dc, real: S.real, daily: S.daily, closed: S.closed,
      emps: S.emps, _ts: Date.now()
    };
    // 1. Local toujours sauvegardé (instantané)
    try { localStorage.setItem('plan_v9', JSON.stringify(data)); } catch (e) { /* quota? */ }

    // 2. Drive si configuré
    if (!GAS_URL) { setSaveStatus('local'); return; }
    _trySyncToDrive(data);
  } catch (e) { /* silencieux */ }
}

/* Tentative de synchro vers Drive avec debounce 800ms (évite de spammer). */
function _trySyncToDrive(data) {
  if (_saveTimer) clearTimeout(_saveTimer);
  setSaveStatus('saving');
  _saveTimer = setTimeout(() => {
    gasRequest(GAS_URL + '?action=save', 'POST', JSON.stringify(data), r => {
      if (r && r.ok) {
        setSaveStatus('ok');
        _syncPending = false;
        _lastSyncOk = true;
        if (_syncRetryTimer) {
          clearInterval(_syncRetryTimer);
          _syncRetryTimer = null;
        }
      } else {
        _syncPending = true;
        _lastSyncOk = false;
        setSaveStatus('pending');
        _startSyncRetry();
      }
    });
  }, 800);
}

/* Démarre le retry toutes les 15s tant que la synchro reste en attente. */
function _startSyncRetry() {
  if (_syncRetryTimer) return;
  _syncRetryTimer = setInterval(() => {
    if (!_syncPending || !GAS_URL) return;
    try {
      const raw = localStorage.getItem('plan_v9');
      if (!raw) return;
      const data = JSON.parse(raw);
      gasRequest(GAS_URL + '?action=save', 'POST', JSON.stringify(data), r => {
        if (r && r.ok) {
          _syncPending = false;
          _lastSyncOk = true;
          setSaveStatus('ok');
          toast('✓ Synchronisé avec Drive', 'ok');
          if (_syncRetryTimer) {
            clearInterval(_syncRetryTimer);
            _syncRetryTimer = null;
          }
        }
      });
    } catch (e) { /* silencieux */ }
  }, 15000);
}

/* Chargement initial : local d'abord, puis Drive si configuré.
   Compare les timestamps pour décider quelle source est la plus récente. */
function load() {
  try {
    // 1. Local d'abord (rapide, disponible hors ligne)
    _loadFromLocal();

    // 2. Drive si configuré
    if (GAS_URL) {
      setSaveStatus('saving');
      gasRequest(GAS_URL + '?action=load', 'GET', null, d2 => {
        if (!d2 || !d2.emps) {
          // Drive inaccessible → on reste sur les données locales
          setSaveStatus('pending');
          _syncPending = true;
          _lastSyncOk = false;
          _startSyncRetry();
          toast('Drive inaccessible — données locales utilisées',
            'warn2', 4000);
          return;
        }
        // Comparer les timestamps
        const driveTs = d2._ts || 0;
        let localTs = 0;
        try {
          const loc = JSON.parse(localStorage.getItem('plan_v9') || '{}');
          localTs = loc._ts || 0;
        } catch (e) { /* silencieux */ }

        if (localTs > driveTs && _syncPending) {
          // Le local est plus récent (modifs hors ligne) → pousser vers Drive
          _trySyncToDrive(JSON.parse(localStorage.getItem('plan_v9')));
          toast('Données locales plus récentes → ' +
            'synchronisation vers Drive...', 'inf', 3000);
        } else {
          // Drive est plus récent (ou égal) → appliquer
          if (d2.pl)     S.pl     = d2.pl;
          if (d2.ind)    S.ind    = d2.ind;
          if (d2.cp)     S.cp     = d2.cp;
          if (d2.mal)    S.mal    = d2.mal;
          if (d2.pm)     S.pm     = d2.pm;
          if (d2.notes)  S.notes  = d2.notes;
          if (d2.dc)     S.dc     = d2.dc;
          if (d2.real)   S.real   = d2.real;
          if (d2.daily)  S.daily  = d2.daily;
          if (d2.closed) S.closed = d2.closed;
          if (d2.emps && d2.emps[0] && d2.emps[0].col) {
            S.emps = d2.emps;
            _empsFromStorage = true;
          }
          // Appliquer CONTRAT_H si première installation
          S.emps.forEach(e => {
            if (!_empsFromStorage && CONTRAT_H[e.id] !== undefined) {
              e.h = CONTRAT_H[e.id];
            }
          });
          // Mise à jour du cache local avec le TS Drive
          try {
            localStorage.setItem('plan_v9', JSON.stringify({
              pl: S.pl, ind: S.ind, cp: S.cp, mal: S.mal,
              notes: S.notes, dc: S.dc, real: S.real, daily: S.daily, closed: S.closed,
              emps: S.emps, _ts: driveTs
            }));
          } catch (e) { /* silencieux */ }
        }
        _syncPending = false;
        _lastSyncOk = true;
        render();
        setSaveStatus('ok');
      });
    } else {
      setSaveStatus('local');
    }
  } catch (e) { /* silencieux */ }
}

/* Restauration depuis localStorage uniquement. */
function _loadFromLocal() {
  try {
    let data = null;
    try { data = localStorage.getItem('plan_v9'); } catch (e) { /* silencieux */ }
    if (data) {
      const d = JSON.parse(data);
      if (d.pl)     S.pl     = d.pl;
      if (d.ind)    S.ind    = d.ind;
      if (d.cp)     S.cp     = d.cp;
      if (d.mal)    S.mal    = d.mal;
      if (d.pm)     S.pm     = d.pm;
      if (d.notes)  S.notes  = d.notes;
      if (d.dc)     S.dc     = d.dc;
      if (d.real)   S.real   = d.real;
      if (d.daily)  S.daily  = d.daily;
      if (d.closed) S.closed = d.closed;
      if (d.emps && d.emps[0] && d.emps[0].col) {
        S.emps = d.emps;
        _empsFromStorage = true;
      }
    }
  } catch (e) { /* silencieux */ }
}

/* Détection en ligne/hors ligne pour relancer la synchro automatiquement. */
window.addEventListener('online', () => {
  if (GAS_URL && _syncPending) {
    toast('Connexion rétablie — synchronisation...', 'inf');
    try {
      const raw = localStorage.getItem('plan_v9');
      if (raw) _trySyncToDrive(JSON.parse(raw));
    } catch (e) { /* silencieux */ }
  }
});

window.addEventListener('offline', () => {
  if (GAS_URL) {
    setSaveStatus('pending');
    toast('Connexion perdue — mode hors ligne', 'warn2', 3000);
  }
});

/* ═══════════════════════════════════════════════════════════════════════════
   RENDU PRINCIPAL
   ───────────────────────────────────────────────────────────────────────────
   render() est le point d'entrée unique : il reconstruit intégralement le
   DOM de l'application à chaque changement d'état. Les sous-fonctions
   (rHdr, rGrid, rRecap, rModal) retournent un nœud DOM qui sera attaché.

   Bandeaux d'info affichés sous le header (si applicable) :
   - Mode hors ligne : "Hors ligne" (jaune) si Drive configuré + sync pending
   - Mode local    : "Mode local" (bleu) + CTA "Connecter Drive" si pas de Drive
   - Postes non couverts : "⚠ X postes non couverts" avec badges cliquables
     qui ouvrent directement le modal d'affectation et affichent la raison
     principale de blocage (via mainBlockReason)
   ═══════════════════════════════════════════════════════════════════════════ */

function render() {
  const app = document.getElementById('app');
  if (!app) return;
  if (document.title !== 'Ekip') document.title = 'Ekip';
  app.innerHTML = '';

  // Layout général : sidebar latérale + zone de contenu
  const shell = document.createElement('div');
  shell.className = 'app-shell';

  // Sidebar de navigation (gauche)
  shell.appendChild(rSidebar());

  // Zone de contenu (droite)
  const main = document.createElement('div');
  main.className = 'app-main';

  // 1. Header (navigation mois + actions)
  main.appendChild(rHdr());

  // 2. Bandeau statut de synchronisation Drive
  //    (le mode local n'affiche pas de bandeau : la connexion Drive se fait
  //     uniquement via le bouton « ☁ Google Drive » de la sidebar, en bas
  //     à gauche, et le statut « 💾 Local » reste visible dans le header)
  if (GAS_URL && _syncPending) {
    const dw = document.createElement('div');
    dw.className = 'sync-banner sync-banner--offline';
    dw.innerHTML =
      "<span class='sync-banner-icon'>⏳</span>" +
      '<b>Hors ligne</b> — Tes modifications sont sauvegardées en local et ' +
      'seront synchronisées au retour de la connexion.';
    main.appendChild(dw);
  }

  // 3. Bandeau d'avertissement si postes non couverts (avec diagnostic)
  const uncoveredPosts = uncovered();
  if (uncoveredPosts.length && (S.view === 'month' || S.view === 'week')) {
    const warn = document.createElement('div');
    warn.className = 'warn warn--column';

    const plural = uncoveredPosts.length > 1 ? 's' : '';
    const hd = document.createElement('div');
    hd.innerHTML =
      '⚠ <b>' + uncoveredPosts.length + ' poste' + plural +
      ' non couvert' + plural + '</b>';
    warn.appendChild(hd);

    const det = document.createElement('div');
    det.className = 'warn-details';

    uncoveredPosts.slice(0, 8).forEach(x => {
      const parts = x.split(':');
      const dd = parseInt(parts[0].replace('J', ''), 10);
      const ppc = parts[1];
      const reason = mainBlockReason(dd, ppc);

      const tag = document.createElement('span');
      tag.className = 'warn-detail-tag';
      const reasonTxt = reason
        ? " <span class='warn-detail-reason'>· " + reason + '</span>'
        : '';
      tag.innerHTML = '<b>' + x + '</b>' + reasonTxt;
      tag.title = 'Cliquer pour diagnostiquer';
      tag.onclick = ((day, post) => () => {
        S.modal = { type: 'assign', d: day, pc: post };
        render();
      })(dd, ppc);
      det.appendChild(tag);
    });
    if (uncoveredPosts.length > 8) {
      const more = document.createElement('span');
      more.className = 'warn-detail-more';
      more.textContent = '+' + (uncoveredPosts.length - 8) + ' autres';
      det.appendChild(more);
    }
    warn.appendChild(det);
    main.appendChild(warn);
  }

  // 4. Grille + récapitulatif (ou vue Caisse / Équipe dédiée)
  if (S.view === 'caisse') {
    main.appendChild(rCaisse());
  } else if (S.view === 'emps') {
    main.appendChild(rEmps());
  } else if (S.view === 'rapports') {
    main.appendChild(rRapports());
  } else if (S.view === 'rapport') {
    main.appendChild(rRapportDetail());
  } else if (S.view === 'heures') {
    main.appendChild(rHeures());
  } else if (S.view === 'saisie') {
    main.appendChild(rSaisie());
  } else if (S.view === 'params') {
    main.appendChild(rParametres());
  } else {
    if (S.showPostsConfig) {
      const panel = document.createElement('div');
      panel.className = 'posts-config-panel';
      const head = document.createElement('div');
      head.className = 'posts-config-head';
      head.innerHTML = '<h3 class="params-h" style="margin:0;border:none">' +
        'Postes actifs par jour — ' + MN[S.m] + ' ' + S.y + '</h3>';
      const closeP = document.createElement('button');
      closeP.className = 'btn bg header-btn-small';
      closeP.textContent = '✕ Fermer';
      closeP.onclick = () => { S.showPostsConfig = false; render(); };
      head.appendChild(closeP);
      panel.appendChild(head);
      const cfgBox = document.createElement('div');
      if (S.cfgDay === undefined) S.cfgDay = 1;
      mConfig(cfgBox, true);
      panel.appendChild(cfgBox);
      main.appendChild(panel);
    }
    main.appendChild(rGrid());
    main.appendChild(rRecap());
  }

  shell.appendChild(main);
  app.appendChild(shell);

  // 5. Modal en overlay si besoin
  if (S.modal) {
    const overlay = document.createElement('div');
    overlay.className = 'ov';
    overlay.id = 'ov';
    overlay.onclick = (ev) => {
      if (ev.target === overlay) closeModal();
    };
    overlay.appendChild(rModal());
    app.appendChild(overlay);
  }

  // Cale les en-têtes de poste sticky juste sous le header de l'app.
  // Le header a une hauteur variable (boutons sur plusieurs lignes selon la
  // largeur), donc on la mesure après rendu.
  measureHeaderHeight();
}

/* Mesure la hauteur du header app et la stocke dans --header-h. */
function measureHeaderHeight() {
  requestAnimationFrame(() => {
    const hdr = document.querySelector('.app-header');
    if (!hdr) return;
    const h = Math.round(hdr.getBoundingClientRect().height);
    if (h > 0) {
      document.documentElement.style.setProperty('--header-h', h + 'px');
    }
  });
}

/* ───────────────────────────────────────────────────────────────────────────
   rSidebar() — Navigation latérale gauche (identité Le Point de Vue)
   ─────────────────────────────────────────────────────────────────────────── */
function rSidebar() {
  const aside = document.createElement('aside');
  aside.className = 'app-sidebar' + (S.sidebarCollapsed ? ' collapsed' : '');

  // ── Logo / marque ─────────────────────────────────────────────────────────
  const brand = document.createElement('div');
  brand.className = 'sidebar-brand';
  brand.innerHTML =
    "<span class='sidebar-brand-mark'>E</span>" +
    "<span class='sidebar-brand-text'>" +
      "<span class='sidebar-brand-name'>Ekip</span>" +
      "<span class='sidebar-brand-sub'>Le Point de Vue</span>" +
    '</span>';
  brand.onclick = () => { S.sidebarCollapsed = !S.sidebarCollapsed; render(); };
  aside.appendChild(brand);

  // ── Items de navigation ─────────────────────────────────────────────────
  const navItems = [
    { id: 'planning', icon: '📅', label: 'Planning',
      active: S.view === 'month' || S.view === 'week',
      fn: () => { S.view = 'month'; S.modal = null; render(); } },
    { id: 'caisse', icon: '💶', label: 'Caisse & CA',
      active: S.view === 'caisse',
      fn: () => { S.view = 'caisse'; S.modal = null; render(); } },
    { id: 'emps', icon: '👥', label: 'Équipe',
      active: S.view === 'emps',
      fn: () => { S.view = 'emps'; S.modal = null; render(); } },
    { id: 'heures', icon: '⏱', label: 'Heures',
      active: S.view === 'heures',
      fn: () => { S.view = 'heures'; S.modal = null; render(); } },
    { id: 'rapports', icon: '📊', label: 'Rapports',
      active: S.view === 'rapports',
      fn: () => { S.view = 'rapports'; S.modal = null; render(); } }
  ];

  const navWrap = document.createElement('nav');
  navWrap.className = 'sidebar-nav';
  navItems.forEach(it => {
    const btn = document.createElement('button');
    btn.className = 'sidebar-item' + (it.active ? ' active' : '');
    btn.title = it.label;
    btn.innerHTML =
      "<span class='sidebar-item-icon'>" + it.icon + '</span>' +
      "<span class='sidebar-item-label'>" + it.label + '</span>';
    btn.onclick = it.fn;
    navWrap.appendChild(btn);
  });
  aside.appendChild(navWrap);

  // ── Pied : outils secondaires ─────────────────────────────────────────────
  const footer = document.createElement('div');
  footer.className = 'sidebar-footer';

  const footItems = [
    { icon: '⚙', label: 'Paramètres', active: S.view === 'params', fn: () => { S.view = 'params'; S.modal = null; render(); } },
    { icon: '⌨', label: 'Raccourcis', fn: () => { S.modal = { type: 'shortcuts' }; render(); } }
  ];
  footItems.forEach(it => {
    const btn = document.createElement('button');
    btn.className = 'sidebar-item sidebar-item--sm' + (it.active ? ' active' : '');
    btn.title = it.label;
    btn.innerHTML =
      "<span class='sidebar-item-icon'>" + it.icon + '</span>' +
      "<span class='sidebar-item-label'>" + it.label + '</span>';
    btn.onclick = it.fn;
    footer.appendChild(btn);
  });
  aside.appendChild(footer);

  return aside;
}


/* ───────────────────────────────────────────────────────────────────────────
   rHdr() — Header : navigation de mois + 14 boutons d'action
   Boutons nouveaux v8 : 📸 Pointage et 💰 Paie
   ─────────────────────────────────────────────────────────────────────────── */
function rHdr() {
  const header = document.createElement('div');
  header.className = 'app-header';

  // ── Ligne 1 : navigation mois (‹ / titre / ›) ────────────────────────────
  const nav = document.createElement('div');
  nav.className = 'header-nav';

  const prevMonth = document.createElement('button');
  prevMonth.className = 'btn bg header-month-btn';
  prevMonth.textContent = '‹';
  prevMonth.onclick = () => {
    S.m--;
    if (S.m < 0) { S.m = 11; S.y--; }
    S.weekOf = 0;
    render();
  };

  const nextMonth = document.createElement('button');
  nextMonth.className = 'btn bg header-month-btn';
  nextMonth.textContent = '›';
  nextMonth.onclick = () => {
    S.m++;
    if (S.m > 11) { S.m = 0; S.y++; }
    S.weekOf = 0;
    render();
  };

  const title = document.createElement('span');
  title.className = 'header-title';
  title.textContent = MN[S.m] + ' ' + S.y;

  if (S.view === 'emps') {
    // Vue Équipe : pas de navigation par mois, juste un titre
    title.textContent = '👥 Équipe — ' + S.emps.length + ' employés';
    nav.appendChild(title);
  } else {
    nav.appendChild(prevMonth);
    nav.appendChild(title);
    nav.appendChild(nextMonth);
  }

  // ── Toggle Mois / Semaine (caché en vue Caisse) ──────────────────────────
  const viewToggle = document.createElement('div');
  viewToggle.className = 'header-view-toggle';

  const viewMonthBtn = document.createElement('button');
  viewMonthBtn.className = 'vtab' + (S.view === 'month' ? ' on' : '');
  viewMonthBtn.textContent = 'Mois';
  viewMonthBtn.onclick = () => { S.view = 'month'; render(); };

  const viewWeekBtn = document.createElement('button');
  viewWeekBtn.className = 'vtab' + (S.view === 'week' ? ' on' : '');
  viewWeekBtn.textContent = 'Semaine';
  viewWeekBtn.onclick = () => { S.view = 'week'; render(); };

  viewToggle.appendChild(viewMonthBtn);
  viewToggle.appendChild(viewWeekBtn);
  if (S.view === 'month' || S.view === 'week') nav.appendChild(viewToggle);

  // ── Si vue "semaine" : navigation entre semaines ─────────────────────────
  if (S.view === 'week') {
    const weekInfo = getWeekDays();

    const weekPrev = document.createElement('button');
    weekPrev.className = 'btn bg header-week-btn';
    weekPrev.textContent = '‹';
    weekPrev.onclick = () => {
      if (S.weekOf > 0) { S.weekOf--; render(); }
    };

    const weekNext = document.createElement('button');
    weekNext.className = 'btn bg header-week-btn';
    weekNext.textContent = '›';
    weekNext.onclick = () => {
      if (S.weekOf < weekInfo.total - 1) { S.weekOf++; render(); }
    };

    const weekLabel = document.createElement('span');
    weekLabel.className = 'header-week-label';
    const wd = weekInfo.days;
    weekLabel.textContent =
      'Sem.' + (weekInfo.idx + 1) +
      ' (' + wd[0] + ' - ' + wd[wd.length - 1] + ' ' + MN[S.m] + ')';

    nav.appendChild(weekPrev);
    nav.appendChild(weekLabel);
    nav.appendChild(weekNext);
  }

  header.appendChild(nav);

  // ── Ligne 2 : boutons d'action regroupés ─────────────────────────────────
  const actions = document.createElement('div');
  actions.className = 'header-actions';

  // Les actions planning ne s'affichent que dans les vues planning
  // (Mois / Semaine). En vue Caisse ou Équipe, le header reste épuré :
  // seuls le titre et l'indicateur de sauvegarde restent visibles.
  if (S.view === 'month' || S.view === 'week') {

  // Actions principales (toujours visibles)
  const primaryDefs = [
    {
      id: 'btod', cls: 'btn bg header-btn-small', label: "📅 Aujourd'hui",
      fn: () => {
        const now = new Date();
        S.y = now.getFullYear();
        S.m = now.getMonth();
        S.weekOf = 0;
        render();
      }
    },
    {
      id: 'bag', cls: 'btn bgen', label: '⚡ Auto-générer',
      fn: () => { S.modal = { type: 'autogen', mode: 'replace' }; render(); }
    },
    {
      id: 'babs', cls: 'btn bg header-btn-small', label: '🌴 Absences',
      fn: () => {
        S.modal = { type: 'indispos', flt: 'tous', absType: 'ind' };
        render();
      }
    },
    {
      id: 'bposts',
      cls: 'btn bg header-btn-small' + (S.showPostsConfig ? ' on' : ''),
      label: '⚙ Postes',
      fn: () => { S.showPostsConfig = !S.showPostsConfig; render(); }
    }
  ];

  // Menu unique "⋯ Plus" : actions planning + données (sans doublon avec la
  // sidebar et la vue Caisse). Imprimer reste accessible ici.
  const moreMenu = [
    { label: 'Planning', items: [
      { icon: '🗑️', txt: 'Effacer le mois', danger: true, fn: () => { S.modal = { type: 'clearMonth' }; render(); } },
      { icon: '🖨', txt: 'Imprimer', fn: () => { printPlanning(); } }
    ]}
  ];

  // Champ de recherche d'un salarié (planning uniquement) : surligne ses
  // affectations du mois et estompe le reste.
  if (S.view === 'month' || S.view === 'week') {
    const searchWrap = document.createElement('div');
    searchWrap.className = 'emp-search';
    const sInput = document.createElement('input');
    sInput.type = 'text';
    sInput.className = 'form-input--sm emp-search-input';
    sInput.placeholder = '🔍 Voir un salarié…';
    if (S.searchEmp) {
      const e = findEmp(S.searchEmp);
      if (e) sInput.value = e.n;
    }
    const sList = document.createElement('div');
    sList.className = 'emp-search-list';
    sList.style.display = 'none';
    const refreshList = () => {
      const q = sInput.value.trim().toLowerCase();
      sList.innerHTML = '';
      if (!q) {
        if (S.searchEmp) { S.searchEmp = null; render(); }
        sList.style.display = 'none';
        return;
      }
      const matches = S.emps.filter(e => e.n.toLowerCase().indexOf(q) >= 0);
      matches.slice(0, 8).forEach(e => {
        const col = eColor(e.id);
        const row = document.createElement('div');
        row.className = 'emp-search-opt';
        row.innerHTML = "<span class='emp-dot' style='background:" + col.bg +
          ';border:2px solid ' + col.text + "'></span>" + e.n;
        row.onclick = () => { S.searchEmp = e.id; render(); };
        sList.appendChild(row);
      });
      sList.style.display = matches.length ? 'block' : 'none';
    };
    sInput.oninput = refreshList;
    sInput.onfocus = refreshList;
    sInput.onblur = () => setTimeout(() => { sList.style.display = 'none'; }, 150);
    if (S.searchEmp) {
      const clr = document.createElement('button');
      clr.className = 'emp-search-clear';
      clr.textContent = '✕';
      clr.title = 'Effacer la recherche';
      clr.onclick = () => { S.searchEmp = null; render(); };
      searchWrap.appendChild(sInput);
      searchWrap.appendChild(clr);
      // Total d'heures du salarié recherché ce mois
      const e = findEmp(S.searchEmp);
      if (e) {
        const h = empRealHoursMonth(S.y, S.m, S.searchEmp);
        const badge = document.createElement('span');
        badge.className = 'emp-search-hours';
        const contrat = e.h || 0;
        const over = contrat && h > contrat;
        badge.innerHTML = '<b>' + (Math.round(h * 10) / 10) + 'h</b>' +
          (contrat ? ' / ' + contrat + 'h' : '');
        if (over) badge.classList.add('emp-search-hours--over');
        badge.title = 'Heures réelles ce mois' +
          (contrat ? ' vs contrat' : '');
        searchWrap.appendChild(badge);
      }
    } else {
      searchWrap.appendChild(sInput);
    }
    searchWrap.appendChild(sList);
    actions.appendChild(searchWrap);
  }

  // Rendu des boutons principaux
  primaryDefs.forEach(def => {
    const btn = document.createElement('button');
    btn.id = def.id;
    btn.className = def.cls;
    btn.innerHTML = def.label;
    btn.onclick = def.fn;
    actions.appendChild(btn);
  });

  // Helper : construit un menu déroulant
  function buildMenu(triggerLabel, groups) {
    const wrap = document.createElement('div');
    wrap.className = 'hdr-menu';

    const trigger = document.createElement('button');
    trigger.className = 'btn bg';
    trigger.innerHTML = triggerLabel;
    wrap.appendChild(trigger);

    const pop = document.createElement('div');
    pop.className = 'hdr-menu-pop';
    pop.style.display = 'none';

    groups.forEach((grp, gi) => {
      if (grp.label) {
        const lbl = document.createElement('div');
        lbl.className = 'hdr-menu-label';
        lbl.textContent = grp.label;
        pop.appendChild(lbl);
      }
      grp.items.forEach(it => {
        const item = document.createElement('button');
        item.className = 'hdr-menu-item';
        if (it.danger) item.style.color = 'var(--danger)';
        item.innerHTML = '<span class="hmi-icon">' + it.icon + '</span>' +
          '<span>' + it.txt + '</span>';
        item.onclick = (ev) => {
          ev.stopPropagation();
          pop.style.display = 'none';
          it.fn();
        };
        pop.appendChild(item);
      });
      if (gi < groups.length - 1) {
        const sep = document.createElement('div');
        sep.className = 'hdr-menu-sep';
        pop.appendChild(sep);
      }
    });

    trigger.onclick = (ev) => {
      ev.stopPropagation();
      // Fermer les autres menus ouverts
      document.querySelectorAll('.hdr-menu-pop').forEach(p => {
        if (p !== pop) p.style.display = 'none';
      });
      pop.style.display = pop.style.display === 'none' ? 'flex' : 'none';
    };

    wrap.appendChild(pop);
    return wrap;
  }

  actions.appendChild(buildMenu('⋯ Plus ▾', moreMenu));

  // Fermer les menus en cliquant ailleurs (une seule fois)
  if (!window._hdrMenuCloserAttached) {
    window._hdrMenuCloserAttached = true;
    document.addEventListener('click', () => {
      document.querySelectorAll('.hdr-menu-pop').forEach(p => {
        p.style.display = 'none';
      });
    });
  }
  } // fin du bloc actions planning (caché en vue Caisse)

  // Indicateur d'état de sauvegarde (mis à jour par setSaveStatus)
  const saveStatusEl = document.createElement('div');
  saveStatusEl.id = 'save-status';
  saveStatusEl.className = 'save-status';
  saveStatusEl.innerHTML =
    '<span class="save-status--local">💾 Local</span>';
  actions.appendChild(saveStatusEl);

  header.appendChild(actions);
  return header;
}

/* ═══════════════════════════════════════════════════════════════════════════
   VUE CAISSE — rCaisse()
   ───────────────────────────────────────────────────────────────────────────
   Tableau de bord mensuel des données de caisse, façon feuille Excel :
   une ligne par jour avec CA, CA N-1, écart %, couverts, couv N-1,
   ticket moyen, total encaissé (réel), écart caisse. Ligne de total en bas.
   Comparaison N-1 = même mois l'année précédente (S.daily[y-1]).
   Clic sur une ligne → ouvre la saisie détaillée du jour.
   ═══════════════════════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════════════════
   VUE HEURES — matrice employés × jours (heures réelles travaillées)
   ───────────────────────────────────────────────────────────────────────────
   Reproduit le bloc RH des onglets « mois 2026 » du fichier Excel :
   une ligne par employé, une colonne par jour, chaque cellule = heures
   réellement travaillées ce jour (ou badge CP/MAL si absence).

   Stockage : S.real[mk][jour][empId].total en MINUTES (compatible paie + coût
   main-d'œuvre, qui lisent déjà r.total). La saisie se fait en heures
   décimales (ex. 7.5) converties en minutes. Seules les vraies heures
   saisies sont affichées ; aucune cellule n'est pré-remplie.
   ═══════════════════════════════════════════════════════════════════════════ */

/* Heures réelles saisies pour un employé/jour, en heures décimales, ou null. */
function realHours(day, empId) {
  const r = getReal(S.y, S.m, day, empId);
  if (r && r.total != null) return Math.round(r.total / 60 * 100) / 100;
  return null;
}

/* Enregistre des heures décimales pour un employé/jour (null = efface). */
function setRealHours(day, empId, hours) {
  pushUndo();
  if (hours == null || isNaN(hours) || hours <= 0) {
    // On efface les heures mais on garde un éventuel marqueur de section ?
    // Non : sans heures, pas de présence → on supprime tout l'enregistrement.
    setReal(S.y, S.m, day, empId, null);
  } else {
    const prev = getReal(S.y, S.m, day, empId) || {};
    setReal(S.y, S.m, day, empId, {
      arr: prev.arr != null ? prev.arr : null,
      dep: prev.dep != null ? prev.dep : null,
      total: Math.round(hours * 60),
      note: prev.note || '',
      sect: prev.sect || null   // section travaillée ce jour (polyvalents)
    });
  }
  save();
}

/* Section réellement travaillée par un salarié un jour donné :
   - si un marqueur 'sect' a été saisi ce jour → cette section
   - sinon → sa section habituelle (e.s) */
function realSect(year, month, day, empId) {
  const r = getReal(year, month, day, empId);
  if (r && r.sect) return r.sect;
  const e = findEmp(empId);
  return e ? e.s : null;
}

/* Bascule la section travaillée d'un jour (polyvalents). Ne fait rien si
   aucune heure n'est saisie ce jour. */
function setRealSect(day, empId, sect) {
  const prev = getReal(S.y, S.m, day, empId);
  if (!prev || prev.total == null) return;   // pas de présence → rien à marquer
  pushUndo();
  const e = findEmp(empId);
  // Si la section choisie == section habituelle, on retire le marqueur
  const sectMarker = (e && sect === e.s) ? null : sect;
  setReal(S.y, S.m, day, empId, Object.assign({}, prev, { sect: sectMarker }));
  save();
}

function rHeures() {
  const D = dim(S.y, S.m);
  const outer = document.createElement('div');
  outer.className = 'caisse-wrap';

  // ── Barre d'en-tête ───────────────────────────────────────────────────
  const bar = document.createElement('div');
  bar.className = 'caisse-bar';
  bar.innerHTML = '<div class="caisse-bar-title">⏱ Heures travaillées — ' +
    MN[S.m] + ' ' + S.y + '</div>';
  const barActions = document.createElement('div');
  barActions.className = 'caisse-bar-actions';
  bar.appendChild(barActions);
  outer.appendChild(bar);

  // ── Sous-onglets Tout / Cuisine / Salle ───────────────────────────────
  const subTabs = document.createElement('div');
  subTabs.style.cssText = 'display:flex;gap:8px;margin:0 4px 12px';
  const tabDefs = [
    { id: 'tous', label: 'Tout', color: '#374151' },
    { id: 'cuisine', label: '🍳 Cuisine', color: '#c2410c' },
    { id: 'salle', label: '🍽 Salle', color: '#1d4ed8' }
  ];
  tabDefs.forEach(t => {
    const b = document.createElement('button');
    const on = S.heuresFilter === t.id;
    b.className = 'vtab' + (on ? ' on' : '');
    b.textContent = t.label;
    if (on) {
      b.style.background = t.color;
      b.style.borderColor = t.color;
      b.style.color = '#fff';
    }
    b.onclick = () => { S.heuresFilter = t.id; render(); };
    subTabs.appendChild(b);
  });
  outer.appendChild(subTabs);

  // ── Légende ───────────────────────────────────────────────────────────
  const legend = document.createElement('div');
  legend.style.cssText =
    'display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:#6b7280;' +
    'margin:2px 4px 10px';
  legend.innerHTML =
    "<span><b style='color:#16a34a'>7.5</b> = heures saisies " +
    "(clic pour modifier)</span>" +
    "<span><b style='color:#16a34a'>CP</b> congé · " +
    "<b style='color:#e11d48'>M</b> maladie · " +
    "<b style='color:#f59e0b'>I</b> indispo</span>" +
    "<span><b style='color:#1d4ed8'>S</b>/<b style='color:#c2410c'>C</b> " +
    "= section travaillée (polyvalents, clic pour basculer)</span>";
  outer.appendChild(legend);

  // Employés filtrés selon le sous-onglet
  const emps = S.emps.filter(e =>
    S.heuresFilter === 'tous' ? true : e.s === S.heuresFilter);

  const days = [];
  for (let i = 1; i <= D; i++) days.push(i);
  const DL = ['D', 'L', 'M', 'M', 'J', 'V', 'S'];
  // Teinte des colonnes week-end / férié
  const weBg = '#f8fafc';
  const dayWE = {};
  days.forEach(d => {
    const w = dow(S.y, S.m, d);
    dayWE[d] = (w === 0 || w === 6 || isFerie(S.y, S.m, d));
  });

  // ── Tableau ───────────────────────────────────────────────────────────
  const wrap = document.createElement('div');
  wrap.id = 'heures-wrap';
  wrap.className = 'abs-wrap';

  const table = document.createElement('table');
  table.className = 'abs-table';

  // En-tête
  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  headRow.className = 'abs-thead-row';
  const th0 = document.createElement('th');
  th0.className = 'abs-th-emp';
  th0.textContent = 'Employé';
  headRow.appendChild(th0);

  days.forEach(d => {
    const w = dow(S.y, S.m, d);
    const we = dayWE[d];
    const tod = isTod(S.y, S.m, d);
    const th = document.createElement('th');
    th.className = 'abs-th-day' + (tod ? ' abs-th-day--today' : '');
    if (we && !tod) th.style.background = '#eef2f7';
    const dayColor  = tod ? '#1d4ed8' : (we ? '#9ca3af' : '#374151');
    const nameColor = we ? '#94a3b8' : '#6b7280';
    th.innerHTML =
      "<div class='abs-th-day-name' style='color:" + nameColor + "'>" +
        DL[w] + '</div>' +
      "<div class='abs-th-day-num' style='color:" + dayColor + "'>" +
        d + '</div>';
    headRow.appendChild(th);
  });

  const thTot = document.createElement('th');
  thTot.className = 'abs-th-total';
  thTot.innerHTML = "Réel<br>/ contrat";
  headRow.appendChild(thTot);
  thead.appendChild(headRow);
  table.appendChild(thead);

  // Corps
  const tbody = document.createElement('tbody');

  function preserveScroll(fn) {
    const w2 = document.getElementById('heures-wrap');
    const sl = w2 ? w2.scrollLeft : 0;
    const st = w2 ? w2.scrollTop : 0;
    fn();
    render();
    const w3 = document.getElementById('heures-wrap');
    if (w3) { w3.scrollLeft = sl; w3.scrollTop = st; }
  }

  // Liste des cellules éditables pour navigation clavier (Entrée = suivante)
  const inputRefs = [];

  emps.forEach((e, i) => {
    const tr = document.createElement('tr');
    tr.className = 'abs-row';
    const col = eColor(e.id);
    const rowBg = i % 2 === 0 ? '#fff' : '#fafafa';

    // Nom (sticky)
    const tdName = document.createElement('td');
    tdName.className = 'abs-td-emp';
    tdName.style.background = rowBg;
    tdName.innerHTML =
      "<span class='emp-dot' style='background:" + col.bg + "'></span>" +
      "<span style='font-size:12px'>" + e.n + '</span>';
    tr.appendChild(tdName);

    let totReel = 0;

    days.forEach(d => {
      const td = document.createElement('td');
      td.className = 'abs-cell';
      td.style.textAlign = 'center';
      td.style.fontSize = '11px';
      const baseBg = dayWE[d] ? weBg : rowBg;
      td.style.background = baseBg;

      const closed = isClosed(d);
      const cp  = getCp(e.id).indexOf(d) >= 0;
      const mal = getMal(e.id).indexOf(d) >= 0;
      const ind = getInd(e.id).indexOf(d) >= 0;
      const rh  = realHours(d, e.id);

      if (closed) {
        td.style.background = '#f1f5f9';
        td.innerHTML = '';
      } else if (cp) {
        td.innerHTML = "<b style='color:#16a34a'>CP</b>";
      } else if (mal) {
        td.innerHTML = "<b style='color:#e11d48'>M</b>";
      } else if (ind && rh == null) {
        td.style.cursor = 'pointer';
        td.innerHTML = "<span style='color:#f59e0b'>I</span>";
      }

      if (rh != null) totReel += rh;

      // Saisie inline : un champ éditable dans la cellule (sauf jours
      // fermés / congé / maladie)
      if (!closed && !cp && !mal) {
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.inputMode = 'decimal';
        inp.value = rh != null ? String(rh) : '';
        inp.style.cssText =
          'width:30px;border:none;background:transparent;text-align:center;' +
          'font-size:11px;font-weight:700;color:#16a34a;padding:2px 0;' +
          'outline:none';
        if (rh == null && !ind) inp.placeholder = '·';
        if (ind && rh == null) { inp.placeholder = ''; }
        inp.dataset.day = d;
        inp.dataset.eid = e.id;
        inputRefs.push(inp);

        inp.onfocus = () => { td.style.background = '#eff6ff'; inp.select(); };
        inp.onblur = () => {
          td.style.background = baseBg;
          const t = inp.value.trim().replace(',', '.');
          const cur = realHours(d, e.id);
          if (t === '') {
            if (cur != null) preserveScroll(() => setRealHours(d, e.id, null));
          } else {
            const n = parseFloat(t);
            if (!isNaN(n) && n !== cur) {
              preserveScroll(() => setRealHours(d, e.id, n));
            }
          }
        };
        inp.onkeydown = (ev) => {
          if (ev.key === 'Enter' || ev.key === 'Tab') {
            ev.preventDefault();
            const idx = inputRefs.indexOf(inp);
            inp.blur();
            const next = inputRefs[idx + 1];
            if (next) setTimeout(() => next.focus(), 0);
          } else if (ev.key === 'Escape') {
            inp.value = realHours(d, e.id) != null
              ? String(realHours(d, e.id)) : '';
            inp.blur();
          }
        };

        if (ind && rh == null) {
          // Indispo sans heures : garde le badge I visible, champ par-dessus
          td.innerHTML = '';
        }
        td.appendChild(inp);

        // Polyvalent avec heures ce jour : badge C/S pour basculer la
        // section réellement travaillée (impacte la prime couvert).
        if (e.ec && rh != null) {
          const sect = realSect(S.y, S.m, d, e.id);
          const badge = document.createElement('div');
          badge.textContent = sect === 'cuisine' ? 'C' : 'S';
          badge.title = 'Travaillé en ' +
            (sect === 'cuisine' ? 'cuisine' : 'salle') +
            ' ce jour — cliquer pour basculer';
          badge.style.cssText =
            'font-size:8px;font-weight:800;line-height:1;margin-top:1px;' +
            'cursor:pointer;border-radius:6px;padding:1px 0;' +
            (sect === 'cuisine'
              ? 'color:#c2410c;background:#fff7ed'
              : 'color:#1d4ed8;background:#eff6ff');
          badge.onclick = ((day, eid) => (ev) => {
            ev.stopPropagation();
            const cur = realSect(S.y, S.m, day, eid);
            const next = cur === 'salle' ? 'cuisine' : 'salle';
            preserveScroll(() => setRealSect(day, eid, next));
          })(d, e.id);
          td.appendChild(badge);
        }
      }
      tr.appendChild(td);
    });

    // Total réel / contrat
    const tdTot = document.createElement('td');
    tdTot.className = 'abs-td-total';
    const target = e.h || 0;
    const diff = Math.round((totReel - target) * 10) / 10;
    const diffColor = diff > 0 ? '#e11d48' : (diff < 0 ? '#f59e0b' : '#16a34a');
    const reelR = Math.round(totReel * 10) / 10;
    tdTot.innerHTML =
      "<div style='font-weight:700'>" + reelR + 'h</div>' +
      "<div style='font-size:10px;color:#9ca3af'>/ " + target + 'h</div>' +
      (target ? "<div style='font-size:10px;color:" + diffColor + "'>" +
        (diff > 0 ? '+' : '') + diff + 'h</div>' : '');
    tr.appendChild(tdTot);

    tbody.appendChild(tr);
  });

  // Pied : total par jour (sur la section affichée)
  const tfoot = document.createElement('tfoot');
  const footRow = document.createElement('tr');
  footRow.style.borderTop = '2px solid #e5e7eb';
  const tf0 = document.createElement('td');
  tf0.className = 'abs-td-emp';
  tf0.style.background = '#f8fafc';
  tf0.style.fontWeight = '700';
  tf0.innerHTML = "<span style='font-size:12px'>Total / jour</span>";
  footRow.appendChild(tf0);

  let grandTot = 0;
  days.forEach(d => {
    let dt = 0;
    emps.forEach(e => {
      const rh = realHours(d, e.id);
      if (rh != null) dt += rh;
    });
    grandTot += dt;
    const td = document.createElement('td');
    td.style.cssText =
      'text-align:center;font-size:10px;font-weight:700;' +
      'color:' + (dt > 0 ? '#374151' : '#e5e7eb') + ';background:#f8fafc';
    td.textContent = dt > 0 ? Math.round(dt * 10) / 10 : '·';
    footRow.appendChild(td);
  });
  const tfTot = document.createElement('td');
  tfTot.style.cssText =
    'text-align:center;font-weight:700;font-size:12px;background:#f8fafc';
  tfTot.textContent = Math.round(grandTot * 10) / 10 + 'h';
  footRow.appendChild(tfTot);
  tfoot.appendChild(footRow);

  table.appendChild(tbody);
  table.appendChild(tfoot);
  wrap.appendChild(table);
  outer.appendChild(wrap);

  return outer;
}

/* Vue pleine page d'un rapport : barre (retour + titre + période) puis contenu.
   Réutilise les fonctions mXxx existantes en mode page (S._rapView). */
function rRapportDetail() {
  const outer = document.createElement('div');
  outer.className = 'caisse-wrap';

  const titles = {
    dashboard: '🎯 Tableau de bord',
    rapLabor: '💰 Coût main-d\u2019œuvre vs CA',
    rapCA: '📈 Synthèse CA mensuelle',
    annuel: '📅 Vue annuelle',
    stats: '📊 Statistiques postes',
    suiviCredits: '🧾 Suivi crédits & notes',
    ficheSalarie: '👤 Fiche par salarié'
  };
  const rap = S.rapType || 'dashboard';

  // Barre supérieure : retour + titre
  const bar = document.createElement('div');
  bar.className = 'caisse-bar';
  const back = document.createElement('button');
  back.className = 'btn bg caisse-back-btn';
  back.innerHTML = '← Rapports';
  back.onclick = () => { S.view = 'rapports'; S.rapType = null; S.ficheEmp = null; render(); };
  bar.appendChild(back);
  const t = document.createElement('div');
  t.className = 'caisse-bar-title';
  t.textContent = titles[rap] || 'Rapport';
  bar.appendChild(t);
  outer.appendChild(bar);

  // Sélecteur de période (sauf suiviCredits qui a sa propre portée + recherche)
  if (rap !== 'suiviCredits' && rap !== 'annuel') {
    outer.appendChild(buildPeriodSelector());
  } else if (rap === 'annuel') {
    outer.appendChild(buildYearSelector());
  }

  // Conteneur du rapport
  const content = document.createElement('div');
  content.className = 'rapport-content';
  S._rapView = true;
  try {
    if (rap === 'dashboard')         mDashboard(content);
    else if (rap === 'rapLabor')     mRapLabor(content);
    else if (rap === 'rapCA')        mRapCA(content);
    else if (rap === 'annuel')       mAnnuel(content);
    else if (rap === 'stats')        mStats(content);
    else if (rap === 'suiviCredits') mSuiviCredits(content);
    else if (rap === 'ficheSalarie') mFicheSalarie(content);
  } finally {
    S._rapView = false;
  }
  outer.appendChild(content);
  return outer;
}

/* Sélecteur de période mensuelle : ‹ mois année › + raccourcis. */
function buildPeriodSelector() {
  const wrap = document.createElement('div');
  wrap.className = 'rap-period';
  const prev = document.createElement('button');
  prev.className = 'btn bg btn-sm';
  prev.innerHTML = '‹';
  prev.onclick = () => {
    S.m--; if (S.m < 0) { S.m = 11; S.y--; }
    render();
  };
  const next = document.createElement('button');
  next.className = 'btn bg btn-sm';
  next.innerHTML = '›';
  next.onclick = () => {
    S.m++; if (S.m > 11) { S.m = 0; S.y++; }
    render();
  };
  const sel = document.createElement('select');
  sel.className = 'form-input--sm rap-period-sel';
  MN.forEach((mn, i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = mn;
    if (i === S.m) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = () => { S.m = parseInt(sel.value, 10); render(); };
  const yearSel = document.createElement('select');
  yearSel.className = 'form-input--sm rap-period-sel';
  const yNow = new Date().getFullYear();
  for (let y = yNow - 5; y <= yNow + 1; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    if (y === S.y) o.selected = true;
    yearSel.appendChild(o);
  }
  yearSel.onchange = () => { S.y = parseInt(yearSel.value, 10); render(); };
  wrap.appendChild(prev);
  wrap.appendChild(sel);
  wrap.appendChild(yearSel);
  wrap.appendChild(next);
  return wrap;
}

/* Sélecteur d'année seule (vue annuelle). */
function buildYearSelector() {
  const wrap = document.createElement('div');
  wrap.className = 'rap-period';
  const prev = document.createElement('button');
  prev.className = 'btn bg btn-sm'; prev.innerHTML = '‹ ' + (S.y - 1);
  prev.onclick = () => { S.y--; render(); };
  const lbl = document.createElement('span');
  lbl.className = 'rap-period-year'; lbl.textContent = S.y;
  const next = document.createElement('button');
  next.className = 'btn bg btn-sm'; next.innerHTML = (S.y + 1) + ' ›';
  next.onclick = () => { S.y++; render(); };
  wrap.appendChild(prev); wrap.appendChild(lbl); wrap.appendChild(next);
  return wrap;
}

function rCaisse() {
  const D = dim(S.y, S.m);
  const outer = document.createElement('div');
  outer.className = 'caisse-wrap';

  // ── Barre d'en-tête : titre + bouton synthèse + bouton nouvelle saisie ────
  const bar = document.createElement('div');
  bar.className = 'caisse-bar';
  bar.innerHTML = '<div class="caisse-bar-title">💶 Suivi de caisse — ' +
    MN[S.m] + ' ' + S.y + '</div>';
  const barActions = document.createElement('div');
  barActions.className = 'caisse-bar-actions';

  const synthBtn = document.createElement('button');
  synthBtn.className = 'btn bg';
  synthBtn.innerHTML = '📊 Synthèse RH';
  synthBtn.onclick = () => { S.modal = { type: 'saisie_synth' }; render(); };
  barActions.appendChild(synthBtn);

  const pointBtn = document.createElement('button');
  pointBtn.className = 'btn bg';
  pointBtn.innerHTML = '📸 Pointage photo';
  pointBtn.onclick = () => { S.modal = { type: 'pointage_pick' }; render(); };
  barActions.appendChild(pointBtn);

  const paieBtn = document.createElement('button');
  paieBtn.className = 'btn bg';
  paieBtn.innerHTML = '💰 Récap paie';
  paieBtn.onclick = () => { S.modal = { type: 'paie' }; render(); };
  barActions.appendChild(paieBtn);

  // Saisie du jour déplacée vers l'onglet dédié « 📋 Saisie du jour » du menu
  // gauche (la saisie reste accessible en cliquant un jour du tableau ci-dessous).
  bar.appendChild(barActions);
  outer.appendChild(bar);

  // ── Bandeau de complétude du coût main-d'œuvre ────────────────────────────
  // Repère les salariés présents ce mois (heures réelles) dont la rémunération
  // n'est pas renseignée : sans elle, leur coût n'entre pas dans la masse
  // salariale (cellules « — »).
  (function () {
    const mk2 = S.y + '-' + String(S.m + 1).padStart(2, '0');
    const rk = S.real[mk2] || {};
    const presentIds = {};
    Object.keys(rk).forEach(day => {
      Object.keys(rk[day]).forEach(eid => {
        const r = rk[day][eid];
        if (r && r.total != null && r.total > 0) presentIds[eid] = true;
      });
    });
    const manquants = [];
    Object.keys(presentIds).forEach(eid => {
      const e = findEmp(parseInt(eid, 10));
      if (!e) return;
      const aRemu = (e.t === 'extra')
        ? (e.taux != null && e.taux !== '')
        : (e.salaire != null && e.salaire !== '');
      if (!aRemu) manquants.push(e);
    });
    if (!manquants.length) return;
    const banner = document.createElement('div');
    banner.className = 'cost-banner';
    const noms = manquants.map(e => e.n).join(', ');
    banner.innerHTML =
      "<span class='cost-banner-ico'>⚠️</span>" +
      "<span class='cost-banner-txt'><b>" + manquants.length +
      ' salarié' + (manquants.length > 1 ? 's' : '') +
      "</b> sans rémunération renseignée : leur coût n'est pas compté dans " +
      'la masse salariale. <span class="cost-banner-names">' + noms +
      '</span></span>';
    const fix = document.createElement('button');
    fix.className = 'btn bg cost-banner-btn';
    fix.textContent = 'Compléter dans Équipe →';
    fix.onclick = () => { S.view = 'emps'; S.modal = null; render(); };
    banner.appendChild(fix);
    outer.appendChild(banner);
  })();

  // ── État de saisie du mois (mini-grille de pastilles) ─────────────────────
  (function () {
    const strip = document.createElement('div');
    strip.className = 'saisie-status';
    const head = document.createElement('div');
    head.className = 'saisie-status-head';
    head.innerHTML =
      "<span class='saisie-status-title'>État de saisie</span>" +
      "<span class='saisie-status-legend'>" +
      "<span><i class='ssq ssq--full'></i>complet</span>" +
      "<span><i class='ssq ssq--ca'></i>CA seul</span>" +
      "<span><i class='ssq ssq--hr'></i>heures seules</span>" +
      "<span><i class='ssq ssq--empty'></i>vide</span>" +
      '</span>';
    strip.appendChild(head);
    const grid = document.createElement('div');
    grid.className = 'saisie-status-grid';
    for (let d = 1; d <= D; d++) {
      const hasCa = dayHasDaily(S.y, S.m, d);
      const hasHr = dayHasReal(S.y, S.m, d);
      let cls = 'ssq--empty';
      if (hasCa && hasHr) cls = 'ssq--full';
      else if (hasCa) cls = 'ssq--ca';
      else if (hasHr) cls = 'ssq--hr';
      const cell = document.createElement('button');
      cell.className = 'ssq ssq--cell ' + cls;
      cell.textContent = d;
      const dn = DN[dow(S.y, S.m, d)];
      cell.title = dn + ' ' + d + ' — ' +
        (hasCa && hasHr ? 'complet' : hasCa ? 'CA seul' :
         hasHr ? 'heures seules' : 'vide');
      cell.onclick = ((day) => () => openSaisie(day))(d);
      grid.appendChild(cell);
    }
    strip.appendChild(grid);
    outer.appendChild(strip);
  })();

  // ── Agrégats du mois courant et N-1 ───────────────────────────────────────
  let totCA = 0, totCAN1 = 0, totCouv = 0, totCouvN1 = 0, totReel = 0;
  let nbSaisis = 0;
  const rows = [];

  for (let d = 1; d <= D; d++) {
    const dd = getDaily(S.y, S.m, d);
    const ddN1 = getDailyN1(S.y, S.m, d);
    const ca = dd && dd.ca ? dd.ca : null;
    const caN1 = ddN1 && ddN1.ca ? ddN1.ca : null;
    const couv = dd && dd.couv ? dd.couv : null;
    const couvN1 = ddN1 && ddN1.couv ? ddN1.couv : null;
    const reel = dd ? totalReel(dd) : 0;
    const clyo = dd ? totalClyo(dd) : 0;

    if (ca) totCA += ca;
    if (caN1) totCAN1 += caN1;
    if (couv) totCouv += couv;
    if (couvN1) totCouvN1 += couvN1;
    if (reel) totReel += reel;
    if (dd && dayHasDaily(S.y, S.m, d)) nbSaisis++;

    rows.push({ d, dd, ca, caN1, couv, couvN1, reel, clyo });
  }

  // ── KPIs en haut ──────────────────────────────────────────────────────────
  const evolCA = totCAN1 ? ((totCA - totCAN1) / totCAN1 * 100) : null;
  const evolCouv = totCouvN1 ? ((totCouv - totCouvN1) / totCouvN1 * 100) : null;
  const tm = totCouv ? (totCA / totCouv) : 0;

  // Masse salariale du mois (somme des coûts journaliers)
  let masseMois = 0, masseComplete = true;
  for (let d = 1; d <= D; d++) {
    const lc = dayLaborCost(S.y, S.m, d);
    if (lc.cout > 0) { masseMois += lc.cout; if (!lc.complet) masseComplete = false; }
  }
  const ratioMasse = (masseMois > 0 && totCA) ? (masseMois / totCA * 100) : null;

  const kpis = document.createElement('div');
  kpis.className = 'recap-kpis caisse-kpis';
  kpis.innerHTML =
    '<div class="kpi"><div class="kpi-val">' + fmtEur(totCA) + '</div>' +
      '<div class="kpi-lbl">CA du mois</div>' +
      (evolCA !== null ? '<div class="kpi-evol ' +
        (evolCA >= 0 ? 'up' : 'down') + '">' + (evolCA >= 0 ? '▲ +' : '▼ ') +
        evolCA.toFixed(1) + '% vs N-1</div>' : '') +
    '</div>' +
    '<div class="kpi"><div class="kpi-val">' + totCouv + '</div>' +
      '<div class="kpi-lbl">Couverts</div>' +
      (evolCouv !== null ? '<div class="kpi-evol ' +
        (evolCouv >= 0 ? 'up' : 'down') + '">' + (evolCouv >= 0 ? '▲ +' : '▼ ') +
        evolCouv.toFixed(1) + '% vs N-1</div>' : '') +
    '</div>' +
    '<div class="kpi"><div class="kpi-val">' + tm.toFixed(1) + ' €</div>' +
      '<div class="kpi-lbl">Ticket moyen</div></div>' +
    '<div class="kpi"><div class="kpi-val">' +
      (masseMois > 0 ? fmtEur(masseMois) : '—') + '</div>' +
      '<div class="kpi-lbl">Masse salariale</div>' +
      (ratioMasse !== null ? '<div class="kpi-evol ' +
        (ratioMasse < 40 ? 'up' : 'down') + '">' + ratioMasse.toFixed(0) +
        '% du CA</div>' : '') +
    '</div>' +
    '<div class="kpi"><div class="kpi-val">' + nbSaisis + ' / ' + D + '</div>' +
      '<div class="kpi-lbl">Jours saisis</div></div>';
  outer.appendChild(kpis);

  // ── Tableau jour par jour ─────────────────────────────────────────────────
  const scroll = document.createElement('div');
  scroll.className = 'caisse-scroll';

  let body = '';
  let totCout = 0, totCoutComplet = true;
  let totEcart = 0, hasEcart = false;
  rows.forEach(r => {
    const w = dow(S.y, S.m, r.d);
    const isWE = (w === 0 || w === 6);
    const ferie = isFerie(S.y, S.m, r.d);
    const closed = isClosed(r.d);
    const evol = (r.ca && r.caN1) ? ((r.ca - r.caN1) / r.caN1 * 100) : null;
    const tmJour = (r.ca && r.couv) ? (r.ca / r.couv) : null;
    const hasData = r.dd && dayHasDaily(S.y, S.m, r.d);

    // Coût de main-d'œuvre du jour
    const lc = dayLaborCost(S.y, S.m, r.d);
    if (lc.cout > 0) { totCout += lc.cout; if (!lc.complet) totCoutComplet = false; }
    // Ratio masse salariale / CA
    const ratio = (lc.cout > 0 && r.ca) ? (lc.cout / r.ca * 100) : null;

    let rowClass = 'caisse-row';
    if (isWE) rowClass += ' caisse-row--we';
    if (ferie) rowClass += ' caisse-row--ferie';
    if (closed) rowClass += ' caisse-row--closed';
    if (!hasData && !closed) rowClass += ' caisse-row--empty';

    const evolHtml = evol !== null
      ? '<span class="caisse-evol ' + (evol >= 0 ? 'up' : 'down') + '">' +
        (evol >= 0 ? '+' : '') + evol.toFixed(0) + '%</span>'
      : '<span class="caisse-na">—</span>';

    const coutHtml = lc.cout > 0
      ? '<span class="caisse-cout">' + fmtEur(lc.cout) +
        (lc.complet ? '' : '<span class="caisse-cout-partial" title="Certains salariés sans taux horaire défini">*</span>') +
        '</span>'
      : '<span class="caisse-na">—</span>';

    // Ratio coloré : vert si < 35%, ambre 35-45%, rouge > 45%
    const ratioHtml = ratio !== null
      ? '<span class="' + (ratio < 35 ? 'saisie-ec-ok'
          : ratio < 45 ? 'saisie-ec-warn' : 'saisie-ec-bad') +
          '">' + ratio.toFixed(0) + '%</span>'
      : '<span class="caisse-na">—</span>';

    // Écart de caisse du jour
    const ec = ecartCaisseJour(S.y, S.m, r.d);
    let ecHtml;
    if (ec === null) {
      ecHtml = '<span class="caisse-na">—</span>';
    } else {
      const a = Math.abs(ec);
      const cls = a < 0.01 ? 'saisie-ec-ok' : a < 5 ? 'saisie-ec-warn' : 'saisie-ec-bad';
      ecHtml = '<span class="' + cls + '">' + (ec > 0 ? '+' : '') +
        ec.toFixed(2) + ' €</span>';
      totEcart += ec; hasEcart = true;
    }

    body +=
      '<tr class="' + rowClass + '" data-day="' + r.d + '">' +
        '<td class="caisse-day">' +
          '<span class="caisse-daynum">' + r.d + '</span>' +
          '<span class="caisse-dow">' + DN[w].slice(0, 3) + '</span>' +
          (ferie ? '<span class="caisse-ferie-dot" title="Férié">★</span>' : '') +
          (closed ? '<span class="caisse-closed-tag">Fermé</span>' : '') +
        '</td>' +
        '<td class="caisse-ca">' + (r.ca ? fmtEur(r.ca) : '<span class="caisse-na">—</span>') + '</td>' +
        '<td class="caisse-can1">' + (r.caN1 ? fmtEur(r.caN1) : '<span class="caisse-na">—</span>') + '</td>' +
        '<td>' + evolHtml + '</td>' +
        '<td class="caisse-couv">' + (r.couv || '<span class="caisse-na">—</span>') + '</td>' +
        '<td>' + (tmJour ? tmJour.toFixed(1) + ' €' : '<span class="caisse-na">—</span>') + '</td>' +
        '<td class="caisse-cout-cell">' + coutHtml + '</td>' +
        '<td>' + ratioHtml + '</td>' +
        '<td>' + ecHtml + '</td>' +
      '</tr>';
  });

  // Ligne de total
  const evolTot = totCAN1 ? ((totCA - totCAN1) / totCAN1 * 100) : null;
  const ratioTot = (totCout > 0 && totCA) ? (totCout / totCA * 100) : null;
  body +=
    '<tr class="caisse-row caisse-total">' +
      '<td class="caisse-day">TOTAL</td>' +
      '<td class="caisse-ca">' + fmtEur(totCA) + '</td>' +
      '<td class="caisse-can1">' + fmtEur(totCAN1) + '</td>' +
      '<td>' + (evolTot !== null ? '<span class="caisse-evol ' +
        (evolTot >= 0 ? 'up' : 'down') + '">' + (evolTot >= 0 ? '+' : '') +
        evolTot.toFixed(0) + '%</span>' : '—') + '</td>' +
      '<td class="caisse-couv">' + totCouv + '</td>' +
      '<td>' + (tm ? tm.toFixed(1) + ' €' : '—') + '</td>' +
      '<td class="caisse-cout-cell">' + (totCout > 0 ? fmtEur(totCout) +
        (totCoutComplet ? '' : '*') : '—') + '</td>' +
      '<td>' + (ratioTot !== null ? '<span class="' +
        (ratioTot < 35 ? 'saisie-ec-ok' : ratioTot < 45 ? 'saisie-ec-warn' : 'saisie-ec-bad') +
        '">' + ratioTot.toFixed(0) + '%</span>' : '—') + '</td>' +
      '<td>' + (hasEcart ? '<span class="' +
        (Math.abs(totEcart) < 0.01 ? 'saisie-ec-ok' :
         Math.abs(totEcart) < 5 ? 'saisie-ec-warn' : 'saisie-ec-bad') +
        '">' + (totEcart > 0 ? '+' : '') + totEcart.toFixed(2) + ' €</span>' : '—') + '</td>' +
    '</tr>';

  scroll.innerHTML =
    '<table class="caisse-table">' +
      '<thead><tr>' +
        '<th>Jour</th><th>CA</th><th>CA N-1</th><th>Évol.</th>' +
        '<th>Couv.</th><th>Ticket</th>' +
        '<th>Coût perso</th><th>Masse %</th><th>Écart caisse</th>' +
      '</tr></thead>' +
      '<tbody>' + body + '</tbody>' +
    '</table>';

  outer.appendChild(scroll);

  // Clic sur une ligne → ouvrir la saisie de ce jour
  setTimeout(() => {
    scroll.querySelectorAll('.caisse-row[data-day]').forEach(tr => {
      tr.onclick = () => {
        const d = parseInt(tr.getAttribute('data-day'), 10);
        openSaisie(d);
      };
    });
  }, 20);

  return outer;
}

/* Données de caisse du même jour l'année précédente (comparaison N-1). */
function getDailyN1(year, month, day) {
  return getDaily(year - 1, month, day);
}

/* ═══════════════════════════════════════════════════════════════════════════
   GRILLE DE PLANNING — rGrid()
   ───────────────────────────────────────────────────────────────────────────
   Tableau principal : lignes = jours, colonnes = postes (5 cuisine + 8 salle).

   Affichage spécifique par type de jour :
   - Aujourd'hui         : fond bleu clair, bordure gauche épaisse bleue
   - Jour férié (non-WE) : fond jaune + tag nom du férié
   - Jour fermé          : fond gris + tag rouge "FERMÉ", cases désactivées
   - Weekend             : fond légèrement assombri
   - Avec pointage       : pastille verte en haut à droite

   Interaction cellule :
   - Colonne jour (gauche) → ouvre le modal de note (et fermeture via toggle)
   - Cellule vide + jour actif → modal d'affectation
   - Cellule vide + jour fermé → toast "Restaurant fermé ce jour"
   - Cellule affectée + jour actif → draggable (drag & drop 4 cas)
   ═══════════════════════════════════════════════════════════════════════════ */

function rGrid() {
  const days = getGridDays();

  const outer = document.createElement('div');
  outer.className = 'grid-outer';

  const table = document.createElement('table');
  table.className = 'grid';

  // ── En-tête : "Jour" + libellés des postes colorés ───────────────────────
  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  const cornerTh = document.createElement('th');
  cornerTh.className = 'dcol hd corner';
  headRow.appendChild(cornerTh);

  AP.forEach((post, index) => {
    const th = document.createElement('th');
    th.className = 'phd';
    th.style.background = post.hbg;
    th.style.borderTop = '3px solid ' + post.acc;
    if (index === PC.length) {
      th.style.borderLeft = '2px solid rgba(0,0,0,.1)';
    }
    th.textContent = post.l;
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  // ── Corps : une ligne par jour ───────────────────────────────────────────
  const tbody = document.createElement('tbody');
  days.forEach(d => {
    const tr = document.createElement('tr');
    const isWeekend = isWE(S.y, S.m, d);
    const isToday   = isTod(S.y, S.m, d);
    const ferie     = isFerie(S.y, S.m, d);
    const closed    = isClosed(d);

    // Classes de ligne
    if (isWeekend || ferie) tr.classList.add('row-weekend');
    if (closed)              tr.classList.add('row-closed');
    else if (isToday)        tr.classList.add('row-today');
    else if (ferie && !isWeekend) tr.classList.add('row-ferie');

    // Cellule "Jour" (numéro + abréviation + tag férié/fermé)
    const dayCell = document.createElement('td');
    dayCell.className = 'dcol';
    if (isToday) dayCell.classList.add('dcol--today');
    else if (ferie && !isWeekend) dayCell.classList.add('dcol--ferie');

    const note = getNote(d);
    const hasRealDay = dayHasReal(S.y, S.m, d);

    // Tag férié (nom abrégé à 6 caractères) ou fermé
    let dayTag = '';
    if (closed) {
      dayTag = "<span class='day-tag day-tag--closed'>FERMÉ</span>";
    } else if (ferie) {
      dayTag = "<span class='day-tag day-tag--ferie' title='" +
        ferie.n + "'>" + ferie.n.substring(0, 6) + '</span>';
    }

    // Icône haute-droite : pastille pointage + 📌 note OU +
    let topRightIcon = '';
    if (hasRealDay) {
      topRightIcon = "<span class='real-dot' " +
        "title='Pointage enregistré'></span>";
    }
    if (note) {
      topRightIcon += "<span title=\"" + note +
        "\" class='dcol-note-icon'>📌</span>";
    } else if (!hasRealDay) {
      topRightIcon += "<span class='dcol-plus-icon'>+</span>";
    }

    // Classe couleur du numéro
    let numCls = 'dcol-number';
    if (closed)             numCls += ' dcol-number--closed';
    else if (isToday)       numCls += ' dcol-number--today';
    else if (ferie)         numCls += ' dcol-number--ferie';

    dayCell.innerHTML =
      "<div class='dcol-inner'>" +
        '<div>' +
          "<b class='" + numCls + "'>" + d + '</b> ' +
          "<span class='dcol-weekday'>" + DN[dow(S.y, S.m, d)] + '</span>' +
          dayTag +
        '</div>' +
        "<div class='dcol-icons'>" + topRightIcon + '</div>' +
      '</div>';

    // Click sur la cellule jour → ouvre modal note (qui gère aussi fermeture)
    dayCell.onclick = ((day) => () => {
      S.modal = { type: 'note', d: day };
      render();
    })(d);
    tr.appendChild(dayCell);

    // Cellules postes
    AP.forEach((post, index) => {
      const empId = getSlot(d, post.c);
      const td = document.createElement('td');
      td.className = 'cell';
      td.style.background = post.bg;
      if (index === PC.length) {
        td.style.borderLeft = '2px solid rgba(0,0,0,.1)';
      }
      td.dataset.day = d;
      td.dataset.post = post.c;

      if (empId !== null && !closed) {
        // Cellule affectée (jour actif)
        const col = eColor(empId);
        const employee = findEmp(empId);
        const isOverContract = employee && workedHours(empId) > employee.h;
        const overDot = isOverContract
          ? "<span class='over-contract-dot'></span>" : '';
        td.innerHTML =
          "<span class='etag' style='background:" + col.bg +
          ';color:' + col.text + "'>" +
          eName(empId) + overDot + '</span>';
        td.dataset.eid = empId;
        td.draggable = true;
        // Surlignage recherche : met en avant le salarié cherché, estompe le reste
        if (S.searchEmp) {
          if (empId === S.searchEmp) td.classList.add('cell--search-hit');
          else td.classList.add('cell--search-dim');
        }
      } else if (closed) {
        // Jour fermé : cellule désactivée
        td.innerHTML = '';
        td.classList.add('cell--closed');
      } else {
        // Cellule vide (jour actif)
        td.innerHTML = "<span class='plus'>+</span>";
      }

      td.onclick = ((day, postCode) => () => {
        if (isClosed(day)) {
          toast('Restaurant fermé ce jour', 'warn2');
          return;
        }
        S.modal = { type: 'assign', d: day, pc: postCode };
        render();
      })(d, post.c);

      // ── Drag & drop (désactivé si jour fermé) ────────────────────────────
      td.ondragstart = (ev) => {
        if (isClosed(parseInt(td.dataset.day, 10))) {
          ev.preventDefault();
          return;
        }
        if (!td.dataset.eid) { ev.preventDefault(); return; }
        ev.dataTransfer.effectAllowed = 'move';
        ev.dataTransfer.setData(
          'text/plain',
          td.dataset.day + '|' + td.dataset.post + '|' + td.dataset.eid
        );
        setTimeout(() => { td.classList.add('dragging'); }, 0);
      };

      td.ondragend = () => {
        td.classList.remove('dragging');
        document.querySelectorAll('.drop-target,.drop-invalid').forEach(c => {
          c.classList.remove('drop-target', 'drop-invalid');
        });
      };

      td.ondragover = (ev) => {
        if (td.classList.contains('dragging')) return;
        ev.preventDefault();
        ev.dataTransfer.dropEffect = 'move';
        if (!td.classList.contains('drop-target')) {
          td.classList.add('drop-target');
        }
      };

      td.ondragleave = () => {
        td.classList.remove('drop-target', 'drop-invalid');
      };

      td.ondrop = (ev) => {
        ev.preventDefault();
        td.classList.remove('drop-target', 'drop-invalid');

        if (isClosed(parseInt(td.dataset.day, 10))) {
          toast('Restaurant fermé ce jour', 'warn2');
          return;
        }

        const raw = ev.dataTransfer.getData('text/plain');
        if (!raw) return;
        const parts = raw.split('|');
        const srcDay  = parseInt(parts[0], 10);
        const srcPost = parts[1];
        const srcEid  = parseInt(parts[2], 10);
        const tgtDay  = parseInt(td.dataset.day, 10);
        const tgtPost = td.dataset.post;

        if (srcDay === tgtDay && srcPost === tgtPost) return;

        const srcEmp = findEmp(srcEid);
        if (!srcEmp) { toast('Erreur', 'err'); return; }

        if (!canAssignPost(srcEmp, tgtDay, tgtPost)) {
          toast(srcEmp.n + ' ne peut pas être affecté à ' + tgtPost, 'err');
          return;
        }

        const tgtEid = getSlot(tgtDay, tgtPost);
        if (tgtEid === null) {
          // Cible vide → déplacement
          setSlot(tgtDay, tgtPost, srcEid);
          setSlot(srcDay, srcPost, null);
          toast('Déplacé : ' + srcEmp.n + ' → ' + tgtPost, 'ok');
        } else {
          const tgtEmp = findEmp(tgtEid);
          if (tgtEmp && canAssignPost(tgtEmp, srcDay, srcPost)) {
            // Échange bilatéral
            setSlot(tgtDay, tgtPost, srcEid);
            setSlot(srcDay, srcPost, tgtEid);
            toast('Échangé : ' + srcEmp.n + ' ↔ ' + tgtEmp.n, 'ok');
          } else {
            // Remplacement (l'ancien perd son créneau)
            setSlot(tgtDay, tgtPost, srcEid);
            setSlot(srcDay, srcPost, null);
            toast(eName(tgtEid) + ' remplacé par ' + srcEmp.n, 'warn2');
          }
        }

        S._pulseCell = tgtDay + '|' + tgtPost;
        render();
      };

      // Pulse visuel si cette cellule vient d'être modifiée par drag & drop
      if (S._pulseCell === d + '|' + post.c) {
        td.classList.add('cell-just-set');
        setTimeout(() => { td.classList.remove('cell-just-set'); }, 500);
        S._pulseCell = null;
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  outer.appendChild(table);

  // ── Légende et rappel des raccourcis clavier ─────────────────────────────
  const legend = document.createElement('div');
  legend.className = 'grid-legend';
  legend.innerHTML =
    "<span class='grid-legend-item'>" +
      "<span class='grid-legend-dot'></span>Dépassement contrat" +
    '</span>' +
    '<span>📌 Note sur le jour</span>' +
    '<span>🟢 Pointage enregistré</span>' +
    "<span class='grid-legend-shortcut'>← → · Échap · Ctrl+Z</span>";
  outer.appendChild(legend);
  return outer;
}

/* ═══════════════════════════════════════════════════════════════════════════
   RÉCAPITULATIF — rRecap()
   ───────────────────────────────────────────────────────────────────────────
   Panneau replié/déployé affichant pour chaque employé :
     • Section (Cuisine/Salle, indicateur "polyvalent")
     • Type (Contrat/Extra)
     • Jours travaillés / Max (Max = 20 ou 21 selon nb jours du mois)
     • Barre de progression heures / contrat
     • Heures travaillées, heures contractuelles, écart signé
     • CP pris, maladie prise
     • Icône ⚠ si alertes légales détectées (legalAlerts)
   ═══════════════════════════════════════════════════════════════════════════ */

function rRecap() {
  const wrap = document.createElement('div');
  wrap.className = 'recap-wrap';

  // Barre cliquable pour replier/déplier
  const header = document.createElement('div');
  header.className = 'recap-hdr';
  header.innerHTML =
    '<span class="recap-hdr-title">📊 Récapitulatif des heures</span>' +
    '<span class="recap-hdr-arrow">' + (S.recap ? '▲ Réduire' : '▼ Afficher') + '</span>';
  header.onclick = () => { S.recap = !S.recap; render(); };
  wrap.appendChild(header);

  if (!S.recap) return wrap;

  const D = dim(S.y, S.m);
  const maxDays = D >= 31 ? RL.mj31 : RL.mj30;

  // ── Barre de synthèse (KPIs) ──────────────────────────────────────────
  let totalSlots = 0, filledSlots = 0;
  for (let d = 1; d <= D; d++) {
    if (isClosed(d)) continue;
    const posts = getActivePosts(d);
    posts.forEach(p => {
      totalSlots++;
      if (getSlot(d, p) !== null) filledSlots++;
    });
  }
  const fillRate = totalSlots ? Math.round(filledSlots / totalSlots * 100) : 0;
  const emptyCount = totalSlots - filledSlots;

  // Employés en dépassement / sous leur contrat
  let overContract = 0, underContract = 0, withAlerts = 0;
  S.emps.forEach(e => {
    const h = workedHours(e.id);
    if (h > e.h * 1.05) overContract++;
    else if (h < e.h * 0.7 && workedDays(e.id) > 0) underContract++;
    if (legalAlerts(e.id).length) withAlerts++;
  });

  const activeEmps = S.emps.filter(e => workedDays(e.id) > 0).length;

  const kpiBar = document.createElement('div');
  kpiBar.className = 'recap-kpis';
  kpiBar.innerHTML =
    '<div class="kpi">' +
      '<div class="kpi-val" style="color:' +
        (fillRate >= 99 ? 'var(--success)' : fillRate >= 95 ? 'var(--accent)' : 'var(--warn)') +
        '">' + fillRate + '%</div>' +
      '<div class="kpi-lbl">Taux de couverture</div>' +
    '</div>' +
    '<div class="kpi">' +
      '<div class="kpi-val" style="color:' +
        (emptyCount === 0 ? 'var(--success)' : 'var(--danger)') + '">' +
        emptyCount + '</div>' +
      '<div class="kpi-lbl">Poste' + (emptyCount > 1 ? 's' : '') + ' vide' +
        (emptyCount > 1 ? 's' : '') + '</div>' +
    '</div>' +
    '<div class="kpi">' +
      '<div class="kpi-val">' + activeEmps + '</div>' +
      '<div class="kpi-lbl">Salariés planifiés</div>' +
    '</div>' +
    '<div class="kpi">' +
      '<div class="kpi-val" style="color:' +
        (overContract ? 'var(--warn)' : 'var(--text-3)') + '">' +
        overContract + '</div>' +
      '<div class="kpi-lbl">En dépassement h.</div>' +
    '</div>' +
    '<div class="kpi">' +
      '<div class="kpi-val" style="color:' +
        (withAlerts ? 'var(--danger)' : 'var(--text-3)') + '">' +
        withAlerts + '</div>' +
      '<div class="kpi-lbl">Alertes légales</div>' +
    '</div>';
  wrap.appendChild(kpiBar);

  // Construction des lignes employé (HTML concaténé pour vitesse)
  let rowsHtml = '';
  S.emps.forEach((e, i) => {
    const daysWorked = workedDays(e.id);
    const hoursWorked = workedHours(e.id);
    const pct = Math.min(100, Math.round(hoursWorked / e.h * 100));
    const diff = Math.round((hoursWorked - e.h) * 10) / 10;
    const cpDays  = getCp (e.id).filter(d => d >= 1 && d <= D).length;
    const malDays = getMal(e.id).filter(d => d >= 1 && d <= D).length;
    const alerts = legalAlerts(e.id);
    const isExtra = (e.t || 'contrat') === 'extra';
    const col = eColor(e.id);

    // Couleur dynamique barre de progression
    const progressColor = pct >= 100 ? '#16a34a'
                        : pct >=  70 ? '#3b82f6'
                        : '#f59e0b';
    // Couleur dynamique écart (positif = vert, négatif = rouge)
    const diffColor = diff >= 0 ? '#16a34a' : '#dc2626';
    const diffSign  = diff >= 0 ? '+' : '';

    const alertIcon = alerts.length
      ? '<span title="' + alerts.join(', ') + '" class="recap-alert-icon">⚠</span>'
      : '';

    const polyTag = e.ec
      ? '<span class="ctag tp ctag-sm" style="margin-left:3px">P.</span>'
      : '';

    const typeTag = isExtra
      ? '<span class="ctag tex">Extra</span>'
      : '<span class="ctag ctag-contrat">Contrat</span>';

    const rowClass = 'recap-row' + (i % 2 ? ' recap-row--alt' : '');
    const dotStyle =
      'background:' + col.bg + ';border:2px solid ' + col.text + ';';

    rowsHtml +=
      '<tr class="' + rowClass + '">' +
        '<td class="recap-td--name">' +
          '<div class="recap-emp-row">' +
            '<span class="emp-dot" style="' + dotStyle + '"></span>' +
            e.n + alertIcon +
          '</div>' +
        '</td>' +
        '<td class="recap-td">' +
          '<span class="ctag ' + (e.s === 'cuisine' ? 'tc' : 'ts') + '">' +
            (e.s === 'cuisine' ? 'Cuisine' : 'Salle') +
          '</span>' + polyTag +
        '</td>' +
        '<td class="recap-td">' + typeTag + '</td>' +
        '<td class="recap-td--days">' + daysWorked + '</td>' +
        '<td class="recap-td--max">' + maxDays + '</td>' +
        '<td class="recap-td--progress">' +
          '<div class="recap-progress-row">' +
            '<div class="pb recap-progress-bar">' +
              '<div class="f" style="width:' + pct +
                '%;background:' + progressColor + '"></div>' +
            '</div>' +
            '<span class="recap-progress-label">' + pct + '%</span>' +
          '</div>' +
        '</td>' +
        '<td class="recap-td">' + hoursWorked + 'h</td>' +
        '<td class="recap-td recap-td--contract">' + e.h + 'h</td>' +
        '<td class="recap-td" style="font-weight:600;color:' +
          diffColor + '">' + diffSign + diff + 'h</td>' +
        '<td class="recap-td" style="color:#16a34a">' +
          (cpDays  || '—') + '</td>' +
        '<td class="recap-td" style="color:#f59e0b">' +
          (malDays || '—') + '</td>' +
      '</tr>';
  });

  const headerTitles = [
    'Employé', 'Section', 'Type', 'Jours', 'Max',
    'Progression', 'Heures', 'Contrat', 'Écart', 'CP', 'Mal.'
  ];
  const headerHtml = headerTitles.map((t, i) =>
    '<th class="recap-th' + (i === 0 ? ' recap-th--first' : '') +
    '">' + t + '</th>'
  ).join('');

  const scrollDiv = document.createElement('div');
  scrollDiv.className = 'recap-scroll';
  scrollDiv.innerHTML =
    '<table class="recap recap-table">' +
      '<thead><tr class="recap-thead-row">' + headerHtml + '</tr></thead>' +
      '<tbody>' + rowsHtml + '</tbody>' +
    '</table>';
  wrap.appendChild(scrollDiv);
  return wrap;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODALS — aiguillage + helpers communs
   ───────────────────────────────────────────────────────────────────────────
   rModal()  : aiguille selon S.modal.type vers la bonne fonction mXxx
   mBtn()    : construit un bouton (primaire = vert, sinon neutre)
   mHdr()    : construit le header commun (titre + bouton ✕ de fermeture)
   ═══════════════════════════════════════════════════════════════════════════ */

function rModal() {
  const box = document.createElement('div');
  box.className = 'mo';
  const type = S.modal.type;
  if      (type === 'autogen')          mAutoGen(box);
  else if (type === 'clearMonth')       mClearMonth(box);
  else if (type === 'assign')           mAssign(box);
  else if (type === 'confirm')          mConfirm(box);
  else if (type === 'editEmp')          mEditEmp(box);
  else if (type === 'indispos')         mIndispos(box);
  else if (type === 'config')           mConfig(box);
  else if (type === 'export')           mExport(box);
  else if (type === 'importCA')         mImportCA(box);
  else if (type === 'annuel')           mAnnuel(box);
  else if (type === 'stats')            mStats(box);
  else if (type === 'rapLabor')         mRapLabor(box);
  else if (type === 'rapCA')            mRapCA(box);
  else if (type === 'dashboard')        mDashboard(box);
  else if (type === 'note')             mNote(box);
  else if (type === 'copier')           mCopier(box);
  else if (type === 'drive')            mDrive(box);
  else if (type === 'pointage_pick')    mPointagePick(box);
  else if (type === 'pointage_review')  mPointageReview(box);
  else if (type === 'paie')             mPaie(box);
  else if (type === 'saisie')           mSaisie(box);
  else if (type === 'saisie_synth')     mSaisieSynth(box);
  else if (type === 'shortcuts')        mShortcuts(box);
  else if (type === 'suiviCredits')     mSuiviCredits(box);
  return box;
}

function mBtn(label, primary, onClick) {
  const btn = document.createElement('button');
  btn.className = 'btn ' + (primary ? 'bgen' : 'bg');
  btn.innerHTML = label;
  btn.onclick = onClick;
  return btn;
}
