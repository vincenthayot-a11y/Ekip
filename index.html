// ═══════════════════════════════════════════════════════════════════════════
//   SIMULATOR VIEW — "What if I only used this variant?"
// ═══════════════════════════════════════════════════════════════════════════

function SimulatorView({ context }) {
  const { articles, recipes, purchases, sales, priceIndex, dateFrom, dateTo } = context;

  // Only multi-variant articles are interesting to simulate
  const multiVariantArticles = useMemo(
    () => articles.filter((i) => (i.variants || []).length > 1),
    [articles]
  );

  const [selectedArticleId, setSelectedArticleId] = useState(
    multiVariantArticles[0]?.id || null
  );

  const selectedArticle = articles.find((i) => i.id === selectedArticleId);

  // Compute per-variant prices for the selected article
  const variantPrices = useMemo(() => {
    if (!selectedArticle) return [];
    return selectedArticle.variants.map((variant) => ({
      ...variant,
      avg: indexedVariantAveragePrice(priceIndex, selectedArticle.id, variant.id),
    }));
  }, [selectedArticle, priceIndex]);

  // Reference: weighted average across all variants (current real-world cost)
  const blendedAverage = useMemo(
    () => (selectedArticle ? indexedAveragePrice(priceIndex, selectedArticle.id) : null),
    [selectedArticle, priceIndex]
  );

  // Find the assortment base once for the simulator
  const assortmentBase = useMemo(() => findAssortmentBase(recipes), [recipes]);

  // A recipe is "affected" if:
  //   - it directly uses the selected article, OR
  //   - it includes the assortment AND the assortment uses the article
  // The assortment base itself is excluded from the affected list — we don't
  // simulate the base in isolation, since it isn't sold directly. Its impact
  // is reflected in every plate that includes it.
  const affectedRecipes = useMemo(() => {
    if (!selectedArticle) return [];
    const baseUsesArticle =
      assortmentBase &&
      (assortmentBase.articles || []).some((line) => line.id === selectedArticle.id);

    return recipes.filter((r) => {
      if (r.isAssortmentBase) return false;
      const direct = (r.articles || []).some((line) => line.id === selectedArticle.id);
      const viaAssortment = r.includesAssortment && baseUsesArticle;
      return direct || viaAssortment;
    });
  }, [recipes, selectedArticle, assortmentBase]);

  // For each affected recipe, simulate the plate cost using each variant.
  // We use indexedPlateCostWithOverrides which applies the override BOTH to
  // the recipe and to the assortment if relevant — this is what makes the
  // simulator correctly model "change rice variant → impacts all plates".
  const recipeSimulations = useMemo(() => {
    if (!selectedArticle) return [];

    return affectedRecipes.map((recipe) => {
      const baselineCost = indexedPlateCost(recipe, priceIndex, assortmentBase).plateCost;
      const baselineRatio = recipe.salePrice > 0 ? baselineCost / recipe.salePrice : 0;

      const scenarios = variantPrices.map((variant) => {
        const overrides = { [selectedArticle.id]: variant.avg };
        const simCost = indexedPlateCostWithOverrides(recipe, priceIndex, assortmentBase, overrides).plateCost;
        const simRatio = recipe.salePrice > 0 ? simCost / recipe.salePrice : 0;
        const delta = simCost - baselineCost;
        return { variant, simCost, simRatio, delta };
      });

      // Annual savings projection based on actual sales volume for this recipe
      const recipeSales = sales.filter(
        (s) => s.recipeId === recipe.id && (!dateFrom || s.date >= dateFrom) && (!dateTo || s.date <= dateTo)
      );
      const totalQtySold = recipeSales.reduce((sum, s) => sum + s.qty, 0);

      return { recipe, baselineCost, baselineRatio, scenarios, totalQtySold };
    });
  }, [selectedArticle, affectedRecipes, variantPrices, priceIndex, assortmentBase, sales, dateFrom, dateTo]);

  // Aggregate impact across all affected recipes (using actual sales volume)
  const aggregateImpact = useMemo(() => {
    return variantPrices.map((variant) => {
      const totalDelta = recipeSimulations.reduce((sum, sim) => {
        const scenario = sim.scenarios.find((s) => s.variant.id === variant.id);
        return sum + (scenario ? scenario.delta * sim.totalQtySold : 0);
      }, 0);
      return { variant, totalDelta };
    });
  }, [variantPrices, recipeSimulations]);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
      <div>
        <h2 className="mc-display" style={{ fontSize: 24, fontWeight: 600, margin: 0 }}>
          Simulateur
        </h2>
        <p style={{ margin: '4px 0 0', fontSize: 13, color: palette.inkSoft }}>
          Et si vous n'utilisiez qu'une seule variante ? Comparez l'impact sur le coût de revient et la marge.
        </p>
      </div>

      <div style={{ marginBottom: 4 }}>
        <InfoBanner icon={Zap} color={palette.amber}>
          Sélectionnez un article ayant plusieurs variantes pour voir comment le coût des
          recettes évolue selon la variante utilisée. Les économies projetées sont calculées
          sur les ventes effectives de la période.
        </InfoBanner>
      </div>

      {multiVariantArticles.length === 0 ? (
        <div className="mc-card" style={{ padding: 40, textAlign: 'center' }}>
          <Layers size={32} style={{ color: palette.inkSoft, opacity: 0.4, marginBottom: 12 }} />
          <div style={{ fontSize: 14, color: palette.inkSoft }}>
            Aucun article n'a plusieurs variantes.<br />
            Allez dans <strong>Articles</strong> pour ajouter des variantes (ex: Lait de coco
            La Créole + Chaiko).
          </div>
        </div>
      ) : (
        <>
          {/* Article picker */}
          <div className="mc-card" style={{ padding: 20 }}>
            <label className="mc-label">Article à simuler</label>
            <select
              className="mc-input"
              value={selectedArticleId || ''}
              onChange={(e) => setSelectedArticleId(e.target.value)}
              style={{ maxWidth: 480 }}
            >
              {multiVariantArticles.map((ing) => (
                <option key={ing.id} value={ing.id}>
                  {ing.name} ({ing.variants.length} variantes)
                </option>
              ))}
            </select>
          </div>

          {selectedArticle && (
            <>
              {/* Variant comparison */}
              <div className="mc-card" style={{ padding: 20 }}>
                <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 4px' }}>
                  Variantes de "{selectedArticle.name}"
                </h3>
                <p style={{ fontSize: 12, color: palette.inkSoft, margin: '0 0 16px' }}>
                  Prix moyen actuel (toutes variantes pondérées) :{' '}
                  <strong className="mc-display" style={{ color: palette.ink }}>
                    {blendedAverage != null ? formatEuro(blendedAverage) + '/' + selectedArticle.unit : '—'}
                  </strong>
                </p>

                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 12 }}>
                  {variantPrices.map((variant) => {
                    const cheapest = Math.min(
                      ...variantPrices.filter((v) => v.avg != null).map((v) => v.avg)
                    );
                    const isCheapest = variant.avg != null && variant.avg === cheapest;

                    return (
                      <div
                        key={variant.id}
                        style={{
                          padding: 14,
                          background: isCheapest ? palette.sage + '10' : palette.paper,
                          borderRadius: 8,
                          border: isCheapest ? `2px solid ${palette.sage}` : `1px solid ${palette.rule}`,
                        }}
                      >
                        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>
                          {variant.name}
                        </div>
                        <div className="mc-display" style={{ fontSize: 22, fontWeight: 700, color: isCheapest ? palette.sage : palette.ink }}>
                          {variant.avg != null ? formatEuro(variant.avg) : '—'}
                          <span style={{ fontSize: 12, fontWeight: 400, color: palette.inkSoft }}>
                            /{selectedArticle.unit}
                          </span>
                        </div>
                        {isCheapest && (
                          <div style={{ fontSize: 11, color: palette.sage, marginTop: 4, fontWeight: 600 }}>
                            ✓ Moins chère
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Aggregate impact */}
              {aggregateImpact.length > 0 && recipeSimulations.length > 0 && (
                <div className="mc-card" style={{ padding: 20 }}>
                  <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 4px' }}>
                    Impact global sur la période
                  </h3>
                  <p style={{ fontSize: 12, color: palette.inkSoft, margin: '0 0 16px' }}>
                    Si vous standardisez sur une seule variante, l'économie (ou surcoût) totale
                    par rapport à votre mix actuel d'achats, calculée sur vos ventes effectives.
                  </p>

                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {aggregateImpact
                      .slice()
                      .sort((a, b) => a.totalDelta - b.totalDelta)
                      .map(({ variant, totalDelta }) => {
                        const isSaving = totalDelta < -0.01;
                        const isCosting = totalDelta > 0.01;
                        const color = isSaving ? palette.sage : isCosting ? palette.wine : palette.inkSoft;

                        return (
                          <div
                            key={variant.id}
                            style={{
                              display: 'flex',
                              justifyContent: 'space-between',
                              alignItems: 'center',
                              padding: 12,
                              background: palette.paper,
                              borderRadius: 6,
                            }}
                          >
                            <div style={{ fontSize: 13, fontWeight: 500 }}>
                              Si tout en <strong>{variant.name}</strong>
                            </div>
                            <div className="mc-display" style={{ fontSize: 18, fontWeight: 700, color }}>
                              {isSaving ? '−' : isCosting ? '+' : ''}{formatEuro(Math.abs(totalDelta))}
                              <span style={{ fontSize: 11, fontWeight: 400, color: palette.inkSoft, marginLeft: 6 }}>
                                {isSaving ? 'économisé' : isCosting ? 'en plus' : ''}
                              </span>
                            </div>
                          </div>
                        );
                      })}
                  </div>
                </div>
              )}

              {/* Recipe-by-recipe simulation */}
              <div className="mc-card" style={{ padding: 20 }}>
                <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 4px' }}>
                  Détail par recette
                </h3>
                <p style={{ fontSize: 12, color: palette.inkSoft, margin: '0 0 16px' }}>
                  Coût de revient de chaque recette utilisant cet article, simulé pour chaque variante.
                </p>

                {recipeSimulations.length === 0 ? (
                  <div style={{ textAlign: 'center', padding: 32, fontSize: 13, color: palette.inkSoft }}>
                    Aucune recette n'utilise cet article.
                  </div>
                ) : (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                    {recipeSimulations.map((sim) => (
                      <div key={sim.recipe.id} style={{ padding: 14, background: palette.paper, borderRadius: 8 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                          <div>
                            <div style={{ fontSize: 14, fontWeight: 600 }}>{sim.recipe.name}</div>
                            <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 2 }}>
                              Vente {formatEuro(sim.recipe.salePrice)} · {sim.totalQtySold} ventes sur la période
                            </div>
                          </div>
                          <div style={{ textAlign: 'right' }}>
                            <div style={{ fontSize: 11, color: palette.inkSoft }}>Coût actuel (mix)</div>
                            <div className="mc-display" style={{ fontSize: 16, fontWeight: 700 }}>
                              {formatEuro(sim.baselineCost)}
                            </div>
                          </div>
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 8 }}>
                          {sim.scenarios.map((scenario) => {
                            const isSaving = scenario.delta < -0.001;
                            const isCosting = scenario.delta > 0.001;
                            const color = isSaving ? palette.sage : isCosting ? palette.wine : palette.inkSoft;

                            return (
                              <div
                                key={scenario.variant.id}
                                style={{
                                  padding: 10,
                                  background: 'white',
                                  borderRadius: 6,
                                  border: `1px solid ${palette.rule}`,
                                }}
                              >
                                <div style={{ fontSize: 11, color: palette.inkSoft, marginBottom: 4 }}>
                                  Si {scenario.variant.name}
                                </div>
                                <div className="mc-display" style={{ fontSize: 15, fontWeight: 600 }}>
                                  {formatEuro(scenario.simCost)}{' '}
                                  <span style={{ fontSize: 11, fontWeight: 500, color }}>
                                    ({isSaving ? '−' : isCosting ? '+' : ''}{formatEuro(Math.abs(scenario.delta))})
                                  </span>
                                </div>
                                <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 2 }}>
                                  FC <span style={{ color }}>{formatPercent(scenario.simRatio)}</span>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </>
          )}
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   SETTINGS VIEW — paramétrage utilisateur (catégories, seuils)
// ═══════════════════════════════════════════════════════════════════════════
//
// L'utilisateur peut :
//   · Ajouter / renommer / supprimer / fusionner les catégories d'articles,
//     d'équipement (petit) et de gros équipement.
//   · Régler les seuils colorés du food cost (sage/amber/wine) et les seuils
//     d'alerte (tendance de prix, écart entre fournisseurs).
//
// Toutes les modifications passent par `setUserSettings` (et `setArticles` /
// `setEquipment` / `setAssets` lors des renommages / suppressions / fusions,
// pour propager le changement aux items qui référencent la catégorie).

function SettingsView({ context }) {
  const {
    userSettings, setUserSettings,
    articles, setArticles,
    equipment, setEquipment,
    assets, setAssets,
    recipes, setRecipes,
    alertSettings, setAlertSettings,
  } = context;

  // Helper générique pour patcher une partie de userSettings
  const patchSettings = (patch) => setUserSettings((s) => ({ ...s, ...patch }));
  const patchThresholds = (patch) => setUserSettings((s) => ({
    ...s,
    thresholds: { ...s.thresholds, ...patch },
  }));

  // ─── Opérations sur les catégories d'articles (strings) ──────────────────
  // article.category contient la string brute, donc renommer / fusionner /
  // supprimer impose de mettre à jour le champ sur tous les articles concernés.
  const countArticlesIn = (cat) => articles.filter((a) => (a.category || 'À trier') === cat).length;

  const renameArticleCategory = (oldName, newName) => {
    const trimmed = newName.trim();
    if (!trimmed || trimmed === oldName) return;
    if (userSettings.articleCategories.includes(trimmed)) {
      mcToast.error(`« ${trimmed} » existe déjà — utilisez Fusionner.`);
      return;
    }
    const _snapList = userSettings.articleCategories;
    const _snapArticles = articles;
    patchSettings({
      articleCategories: userSettings.articleCategories.map((c) => c === oldName ? trimmed : c),
    });
    setArticles(articles.map((a) =>
      (a.category || 'À trier') === oldName ? { ...a, category: trimmed } : a
    ));
    mcToast.undo(`Renommé en « ${trimmed} »`, () => {
      patchSettings({ articleCategories: _snapList });
      setArticles(_snapArticles);
      mcToast.success('Renommage annulé');
    });
  };

  const addArticleCategory = (name) => {
    const trimmed = name.trim();
    if (!trimmed) return;
    if (userSettings.articleCategories.includes(trimmed)) {
      mcToast.error(`« ${trimmed} » existe déjà.`);
      return;
    }
    patchSettings({
      articleCategories: [...userSettings.articleCategories, trimmed],
    });
    mcToast.success(`Catégorie « ${trimmed} » ajoutée`);
  };

  const deleteArticleCategory = (name, reassignTo) => {
    const _snapList = userSettings.articleCategories;
    const _snapArticles = articles;
    patchSettings({
      articleCategories: userSettings.articleCategories.filter((c) => c !== name),
    });
    if (reassignTo) {
      setArticles(articles.map((a) =>
        (a.category || 'À trier') === name ? { ...a, category: reassignTo } : a
      ));
    }
    mcToast.undo(`Catégorie « ${name} » supprimée`, () => {
      patchSettings({ articleCategories: _snapList });
      setArticles(_snapArticles);
      mcToast.success('Restauré');
    });
  };

  const mergeArticleCategory = (source, target) => {
    if (source === target) return;
    const _snapList = userSettings.articleCategories;
    const _snapArticles = articles;
    setArticles(articles.map((a) =>
      (a.category || 'À trier') === source ? { ...a, category: target } : a
    ));
    patchSettings({
      articleCategories: userSettings.articleCategories.filter((c) => c !== source),
    });
    mcToast.undo(`« ${source} » fusionné dans « ${target} »`, () => {
      patchSettings({ articleCategories: _snapList });
      setArticles(_snapArticles);
      mcToast.success('Fusion annulée');
    });
  };

  // ─── Opérations sur les catégories de RECETTES (strings) ─────────────────
  // Même modèle que les articles : recipe.category contient la string brute.
  // Particularité : foodCostTargets est indexé par nom de catégorie, donc on
  // doit suivre les renommages/fusions pour ne pas perdre la cible associée.
  const countRecipesIn = (cat) => recipes.filter((r) => !r.isAssortmentBase && (r.category || 'Autre') === cat).length;

  const renameRecipeCategory = (oldName, newName) => {
    const trimmed = newName.trim();
    if (!trimmed || trimmed === oldName) return;
    if (userSettings.recipeCategories.includes(trimmed)) {
      mcToast.error(`« ${trimmed} » existe déjà — utilisez Fusionner.`);
      return;
    }
    const _snap = userSettings;
    const _snapRecipes = recipes;
    setUserSettings((s) => {
      const targets = { ...(s.foodCostTargets || {}) };
      if (targets[oldName] !== undefined) {
        targets[trimmed] = targets[oldName];
        delete targets[oldName];
      }
      return {
        ...s,
        recipeCategories: s.recipeCategories.map((c) => c === oldName ? trimmed : c),
        foodCostTargets: targets,
      };
    });
    setRecipes(recipes.map((r) =>
      (r.category || 'Autre') === oldName ? { ...r, category: trimmed } : r
    ));
    mcToast.undo(`Renommé en « ${trimmed} »`, () => {
      setUserSettings(_snap);
      setRecipes(_snapRecipes);
      mcToast.success('Renommage annulé');
    });
  };

  const addRecipeCategory = (name) => {
    const trimmed = name.trim();
    if (!trimmed) return;
    if (userSettings.recipeCategories.includes(trimmed)) {
      mcToast.error(`« ${trimmed} » existe déjà.`);
      return;
    }
    setUserSettings((s) => ({
      ...s,
      recipeCategories: [...s.recipeCategories, trimmed],
      // La nouvelle catégorie reçoit une cible food cost par défaut (30%)
      foodCostTargets: { ...(s.foodCostTargets || {}), [trimmed]: (s.foodCostTargets || {})[trimmed] ?? 30 },
    }));
    mcToast.success(`Catégorie « ${trimmed} » ajoutée`);
  };

  const deleteRecipeCategory = (name, reassignTo) => {
    const _snap = userSettings;
    const _snapRecipes = recipes;
    setUserSettings((s) => {
      const targets = { ...(s.foodCostTargets || {}) };
      delete targets[name];
      return {
        ...s,
        recipeCategories: s.recipeCategories.filter((c) => c !== name),
        foodCostTargets: targets,
      };
    });
    if (reassignTo) {
      setRecipes(recipes.map((r) =>
        (r.category || 'Autre') === name ? { ...r, category: reassignTo } : r
      ));
    }
    mcToast.undo(`Catégorie « ${name} » supprimée`, () => {
      setUserSettings(_snap);
      setRecipes(_snapRecipes);
      mcToast.success('Restauré');
    });
  };

  const mergeRecipeCategory = (source, target) => {
    if (source === target) return;
    const _snap = userSettings;
    const _snapRecipes = recipes;
    setRecipes(recipes.map((r) =>
      (r.category || 'Autre') === source ? { ...r, category: target } : r
    ));
    setUserSettings((s) => {
      const targets = { ...(s.foodCostTargets || {}) };
      delete targets[source];
      return {
        ...s,
        recipeCategories: s.recipeCategories.filter((c) => c !== source),
        foodCostTargets: targets,
      };
    });
    mcToast.undo(`« ${source} » fusionné dans « ${target} »`, () => {
      setUserSettings(_snap);
      setRecipes(_snapRecipes);
      mcToast.success('Fusion annulée');
    });
  };

  // ─── Opérations sur les catégories d'équipement / gros équipement ────────
  // Modèle { id, label } : on garde l'id stable, on renomme le label seulement.
  // Pour la suppression / fusion, on déplace les items via categoryId.

  function makeIdLabelOps({ list, setList, items, setItems, itemKey, listKey, label }) {
    const countIn = (catId) => items.filter((it) => it.categoryId === catId).length;
    return {
      countIn,
      rename: (id, newLabel) => {
        const trimmed = newLabel.trim();
        if (!trimmed) return;
        const _snap = list;
        setList(list.map((c) => c.id === id ? { ...c, label: trimmed } : c));
        mcToast.undo(`Renommé en « ${trimmed} »`, () => { setList(_snap); mcToast.success('Annulé'); });
      },
      add: (labelText) => {
        const trimmed = labelText.trim();
        if (!trimmed) return;
        // Génération d'un id depuis le label, en évitant les collisions
        const baseId = stripAccents(trimmed).toLowerCase()
          .replace(/[^a-z0-9]+/g, '_')
          .replace(/^_+|_+$/g, '')
          .slice(0, 40) || 'cat_' + Math.random().toString(36).slice(2, 7);
        let id = baseId, suffix = 1;
        while (list.find((c) => c.id === id)) { id = baseId + '_' + (++suffix); }
        setList([...list, { id, label: trimmed }]);
        mcToast.success(`Catégorie « ${trimmed} » ajoutée`);
      },
      remove: (id, reassignToId) => {
        const removed = list.find((c) => c.id === id);
        const _snapList = list;
        const _snapItems = items;
        setList(list.filter((c) => c.id !== id));
        if (reassignToId) {
          setItems(items.map((it) => it.categoryId === id ? { ...it, categoryId: reassignToId } : it));
        }
        mcToast.undo(`Catégorie « ${removed?.label || id} » supprimée`, () => {
          setList(_snapList); setItems(_snapItems); mcToast.success('Restauré');
        });
      },
      merge: (sourceId, targetId) => {
        if (sourceId === targetId) return;
        const source = list.find((c) => c.id === sourceId);
        const target = list.find((c) => c.id === targetId);
        const _snapList = list;
        const _snapItems = items;
        setItems(items.map((it) => it.categoryId === sourceId ? { ...it, categoryId: targetId } : it));
        setList(list.filter((c) => c.id !== sourceId));
        mcToast.undo(`« ${source?.label} » fusionné dans « ${target?.label} »`, () => {
          setList(_snapList); setItems(_snapItems); mcToast.success('Annulé');
        });
      },
    };
  }

  const equipOps = makeIdLabelOps({
    list: userSettings.equipmentCategories,
    setList: (next) => patchSettings({ equipmentCategories: typeof next === 'function' ? next(userSettings.equipmentCategories) : next }),
    items: equipment,
    setItems: setEquipment,
  });

  const assetOps = makeIdLabelOps({
    list: userSettings.assetCategories,
    setList: (next) => patchSettings({ assetCategories: typeof next === 'function' ? next(userSettings.assetCategories) : next }),
    items: assets,
    setItems: setAssets,
  });

  // ─── Reset complet aux défauts ───────────────────────────────────────────
  const resetAll = () => {
    if (!window.confirm('Restaurer tous les réglages aux valeurs par défaut ? Les catégories personnalisées seront perdues (les articles existants restent inchangés, mais leur catégorie pourra ne plus apparaître dans les listes).')) return;
    setUserSettings(mergeUserSettings(null));
    mcToast.success('Réglages restaurés');
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 28, maxWidth: 920 }}>
      <div>
        <p style={{ fontSize: 13, color: palette.inkSoft, margin: 0 }}>
          Personnalisez les catégories utilisées dans toute l'application et les seuils
          qui pilotent les alertes et le code couleur. Les modifications sont sauvegardées
          automatiquement et synchronisées via Drive si la synchro est active.
        </p>
      </div>

      {/* ─── Catégories de recettes ───────────────────────────────────────── */}
      <StringCategoriesSection
        title="Catégories de recettes"
        helper="Entrées, plats, desserts… Servent au regroupement dans l'onglet Recettes et aux cibles de food cost. L'ordre de la liste définit l'ordre d'affichage."
        list={userSettings.recipeCategories}
        countFor={countRecipesIn}
        onAdd={addRecipeCategory}
        onRename={renameRecipeCategory}
        onDelete={deleteRecipeCategory}
        onMerge={mergeRecipeCategory}
        itemLabel="recette"
      />

      {/* ─── Catégories d'articles ────────────────────────────────────────── */}
      <StringCategoriesSection
        title="Catégories d'articles"
        helper="Utilisées dans le Catalogue et lors de la classification automatique des factures."
        list={userSettings.articleCategories}
        countFor={countArticlesIn}
        onAdd={addArticleCategory}
        onRename={renameArticleCategory}
        onDelete={deleteArticleCategory}
        onMerge={mergeArticleCategory}
        itemLabel="article"
      />

      {/* ─── Catégories d'équipement (petit) ──────────────────────────────── */}
      <IdLabelCategoriesSection
        title="Catégories de petit équipement"
        helper="Vaisselle, couverts, verres, ustensiles… utilisées dans l'onglet Équipement."
        list={userSettings.equipmentCategories}
        countFor={equipOps.countIn}
        onAdd={equipOps.add}
        onRename={equipOps.rename}
        onDelete={equipOps.remove}
        onMerge={equipOps.merge}
        itemLabel="article"
      />

      {/* ─── Catégories de gros équipement ────────────────────────────────── */}
      <IdLabelCategoriesSection
        title="Catégories de gros équipement"
        helper="Cuisson, froid, préparation… pour les frigos, fours, machines."
        list={userSettings.assetCategories}
        countFor={assetOps.countIn}
        onAdd={assetOps.add}
        onRename={assetOps.rename}
        onDelete={assetOps.remove}
        onMerge={assetOps.merge}
        itemLabel="équipement"
      />

      {/* ─── Seuils et alertes ────────────────────────────────────────────── */}
      <div className="mc-card" style={{ padding: 20 }}>
        <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 4px' }}>
          Seuils et alertes
        </h3>
        <p style={{ fontSize: 12, color: palette.inkSoft, margin: '0 0 16px' }}>
          Calibrez les seuils utilisés par les codes couleur et les alertes.
        </p>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <ThresholdInput
            label="Food cost — seuil bas (vert)"
            help="Sous ce ratio, le food cost s'affiche en vert (sain)."
            value={Math.round(userSettings.thresholds.foodCostGreen * 1000) / 10}
            suffix="%"
            min={0} max={100} step={0.5}
            onChange={(v) => patchThresholds({ foodCostGreen: v / 100 })}
          />
          <ThresholdInput
            label="Food cost — seuil haut (orange / rouge)"
            help="Au-dessus, le food cost passe en rouge (à corriger)."
            value={Math.round(userSettings.thresholds.foodCostAmber * 1000) / 10}
            suffix="%"
            min={0} max={100} step={0.5}
            onChange={(v) => patchThresholds({ foodCostAmber: v / 100 })}
          />
          <ThresholdInput
            label="Tendance de prix — seuil d'alerte"
            help="Au-delà de cette hausse sur 30 jours, on émet une alerte « prix en hausse »."
            value={userSettings.thresholds.priceTrendPct}
            suffix="%"
            min={1} max={100} step={1}
            onChange={(v) => patchThresholds({ priceTrendPct: v })}
          />
          <ThresholdInput
            label="Écart entre fournisseurs"
            help="Au-delà de cet écart de prix entre deux fournisseurs pour un même article, on alerte."
            value={alertSettings.supplierGapThresholdPct ?? userSettings.thresholds.supplierGapPct}
            suffix="%"
            min={1} max={100} step={1}
            onChange={(v) => {
              // Synchro double : alertSettings (consommé par buildAlertsIndex)
              // et userSettings (pour l'affichage cohérent dans les Réglages).
              setAlertSettings((s) => ({ ...s, supplierGapThresholdPct: v }));
              patchThresholds({ supplierGapPct: v });
            }}
          />
        </div>
      </div>

      {/* ─── Cibles food cost par catégorie ────────────────────────────────── */}
      <div className="mc-card" style={{ padding: 20 }}>
        <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 4px' }}>
          Cibles food cost par catégorie
        </h3>
        <p style={{ fontSize: 12, color: palette.inkSoft, margin: '0 0 16px' }}>
          Dans l'éditeur de recette, le prix de vente minimum suggéré est calculé sur ces cibles.
          Une entrée et un dessert n'ont pas la même cible qu'un plat — ajustez selon votre positionnement.
        </p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          {(userSettings.recipeCategories || ['Entrée', 'Plat', 'Dessert', 'Accompagnement', 'Boisson', 'Autre']).map((cat) => (
            <ThresholdInput
              key={cat}
              label={cat}
              help={`Food cost cible pour vos ${cat.toLowerCase()}s — sert au prix suggéré.`}
              value={(userSettings.foodCostTargets || {})[cat] ?? 30}
              suffix="%"
              min={1} max={90} step={1}
              onChange={(v) => setUserSettings((s) => ({
                ...s,
                foodCostTargets: { ...(s.foodCostTargets || {}), [cat]: v },
              }))}
            />
          ))}
        </div>
      </div>

      {/* ─── Reset ─────────────────────────────────────────────────────────── */}
      <div style={{ display: 'flex', justifyContent: 'flex-end', borderTop: `1px solid ${palette.rule}`, paddingTop: 16 }}>
        <button
          onClick={resetAll}
          className="mc-btn mc-btn-ghost"
          style={{ color: palette.wine, fontSize: 12 }}
        >
          Restaurer les valeurs par défaut
        </button>
      </div>
    </div>
  );
}

// ─── Section catégories type "string" (articles alimentaires) ───────────────
function StringCategoriesSection({ title, helper, list, countFor, onAdd, onRename, onDelete, onMerge, itemLabel }) {
  const [newName, setNewName] = useState('');
  const [editingIdx, setEditingIdx] = useState(null);
  const [editValue, setEditValue] = useState('');
  const [deleteFor, setDeleteFor] = useState(null);   // catégorie en cours de suppression
  const [mergeFor, setMergeFor] = useState(null);     // catégorie en cours de fusion

  const commitEdit = (oldName) => {
    if (editValue.trim() && editValue !== oldName) onRename(oldName, editValue);
    setEditingIdx(null);
    setEditValue('');
  };

  const submitAdd = () => {
    if (newName.trim()) {
      onAdd(newName);
      setNewName('');
    }
  };

  return (
    <div className="mc-card" style={{ padding: 20 }}>
      <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 4px' }}>{title}</h3>
      <p style={{ fontSize: 12, color: palette.inkSoft, margin: '0 0 16px' }}>{helper}</p>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
        {list.map((cat, idx) => {
          const count = countFor(cat);
          const isEditing = editingIdx === idx;
          return (
            <div
              key={cat}
              style={{
                display: 'flex',
                alignItems: 'center',
                gap: 8,
                padding: '8px 10px',
                borderRadius: 6,
                background: idx % 2 === 0 ? 'transparent' : palette.paper + '60',
              }}
            >
              {isEditing ? (
                <input
                  className="mc-input"
                  value={editValue}
                  onChange={(e) => setEditValue(e.target.value)}
                  onBlur={() => commitEdit(cat)}
                  onKeyDown={(e) => {
                    if (e.key === 'Enter') commitEdit(cat);
                    if (e.key === 'Escape') { setEditingIdx(null); setEditValue(''); }
                  }}
                  autoFocus
                  style={{ flex: 1, fontSize: 13 }}
                />
              ) : (
                <>
                  <div style={{ flex: 1, fontSize: 13.5, fontWeight: 500 }}>{cat}</div>
                  <div style={{ fontSize: 11, color: palette.inkSoft, minWidth: 80, textAlign: 'right' }}>
                    {count} {itemLabel}{count !== 1 ? 's' : ''}
                  </div>
                  <button
                    onClick={() => { setEditingIdx(idx); setEditValue(cat); }}
                    className="mc-btn mc-btn-ghost"
                    style={{ padding: '4px 8px' }}
                    title="Renommer"
                  >
                    <Edit3 size={13} />
                  </button>
                  <button
                    onClick={() => setMergeFor(cat)}
                    className="mc-btn mc-btn-ghost"
                    style={{ padding: '4px 8px' }}
                    title="Fusionner dans une autre catégorie"
                    disabled={list.length < 2}
                  >
                    <Link2 size={13} />
                  </button>
                  <button
                    onClick={() => count > 0 ? setDeleteFor(cat) : onDelete(cat, null)}
                    className="mc-btn mc-btn-ghost"
                    style={{ padding: '4px 8px', color: palette.wine }}
                    title="Supprimer"
                  >
                    <Trash2 size={13} />
                  </button>
                </>
              )}
            </div>
          );
        })}
      </div>

      {/* Add row */}
      <div style={{ display: 'flex', gap: 8, marginTop: 14, paddingTop: 14, borderTop: `1px solid ${palette.rule}` }}>
        <input
          className="mc-input"
          value={newName}
          onChange={(e) => setNewName(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter') submitAdd(); }}
          placeholder="Nouvelle catégorie…"
          style={{ flex: 1 }}
        />
        <button
          onClick={submitAdd}
          className="mc-btn mc-btn-primary"
          style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}
          disabled={!newName.trim()}
        >
          <Plus size={14} /> Ajouter
        </button>
      </div>

      {/* Modale suppression avec réaffectation */}
      {deleteFor && (
        <DeleteCategoryModal
          name={deleteFor}
          count={countFor(deleteFor)}
          options={list.filter((c) => c !== deleteFor)}
          itemLabel={itemLabel}
          onCancel={() => setDeleteFor(null)}
          onConfirm={(reassignTo) => {
            onDelete(deleteFor, reassignTo);
            setDeleteFor(null);
          }}
        />
      )}

      {/* Modale fusion */}
      {mergeFor && (
        <MergeCategoryModal
          source={mergeFor}
          count={countFor(mergeFor)}
          options={list.filter((c) => c !== mergeFor)}
          itemLabel={itemLabel}
          onCancel={() => setMergeFor(null)}
          onConfirm={(target) => {
            onMerge(mergeFor, target);
            setMergeFor(null);
          }}
        />
      )}
    </div>
  );
}

// ─── Section catégories type "{id, label}" (équipement, gros équipement) ────
// Très proche de StringCategoriesSection mais on adresse les items par leur id
// stable plutôt que par leur label (qu'on peut renommer librement).
function IdLabelCategoriesSection({ title, helper, list, countFor, onAdd, onRename, onDelete, onMerge, itemLabel }) {
  const [newName, setNewName] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [editValue, setEditValue] = useState('');
  const [deleteFor, setDeleteFor] = useState(null);
  const [mergeFor, setMergeFor] = useState(null);

  const commitEdit = (cat) => {
    if (editValue.trim() && editValue !== cat.label) onRename(cat.id, editValue);
    setEditingId(null);
    setEditValue('');
  };

  const submitAdd = () => {
    if (newName.trim()) {
      onAdd(newName);
      setNewName('');
    }
  };

  return (
    <div className="mc-card" style={{ padding: 20 }}>
      <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 4px' }}>{title}</h3>
      <p style={{ fontSize: 12, color: palette.inkSoft, margin: '0 0 16px' }}>{helper}</p>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
        {list.map((cat, idx) => {
          const count = countFor(cat.id);
          const isEditing = editingId === cat.id;
          return (
            <div
              key={cat.id}
              style={{
                display: 'flex',
                alignItems: 'center',
                gap: 8,
                padding: '8px 10px',
                borderRadius: 6,
                background: idx % 2 === 0 ? 'transparent' : palette.paper + '60',
              }}
            >
              {isEditing ? (
                <input
                  className="mc-input"
                  value={editValue}
                  onChange={(e) => setEditValue(e.target.value)}
                  onBlur={() => commitEdit(cat)}
                  onKeyDown={(e) => {
                    if (e.key === 'Enter') commitEdit(cat);
                    if (e.key === 'Escape') { setEditingId(null); setEditValue(''); }
                  }}
                  autoFocus
                  style={{ flex: 1, fontSize: 13 }}
                />
              ) : (
                <>
                  <div style={{ flex: 1, fontSize: 13.5, fontWeight: 500 }}>{cat.label}</div>
                  <div style={{ fontSize: 11, color: palette.inkSoft, minWidth: 100, textAlign: 'right' }}>
                    {count} {itemLabel}{count !== 1 ? 's' : ''}
                  </div>
                  <button
                    onClick={() => { setEditingId(cat.id); setEditValue(cat.label); }}
                    className="mc-btn mc-btn-ghost"
                    style={{ padding: '4px 8px' }}
                    title="Renommer"
                  >
                    <Edit3 size={13} />
                  </button>
                  <button
                    onClick={() => setMergeFor(cat)}
                    className="mc-btn mc-btn-ghost"
                    style={{ padding: '4px 8px' }}
                    title="Fusionner dans une autre catégorie"
                    disabled={list.length < 2}
                  >
                    <Link2 size={13} />
                  </button>
                  <button
                    onClick={() => count > 0 ? setDeleteFor(cat) : onDelete(cat.id, null)}
                    className="mc-btn mc-btn-ghost"
                    style={{ padding: '4px 8px', color: palette.wine }}
                    title="Supprimer"
                  >
                    <Trash2 size={13} />
                  </button>
                </>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ display: 'flex', gap: 8, marginTop: 14, paddingTop: 14, borderTop: `1px solid ${palette.rule}` }}>
        <input
          className="mc-input"
          value={newName}
          onChange={(e) => setNewName(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter') submitAdd(); }}
          placeholder="Nouvelle catégorie…"
          style={{ flex: 1 }}
        />
        <button
          onClick={submitAdd}
          className="mc-btn mc-btn-primary"
          style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}
          disabled={!newName.trim()}
        >
          <Plus size={14} /> Ajouter
        </button>
      </div>

      {deleteFor && (
        <DeleteCategoryModal
          name={deleteFor.label}
          count={countFor(deleteFor.id)}
          options={list.filter((c) => c.id !== deleteFor.id).map((c) => c.label)}
          optionIds={list.filter((c) => c.id !== deleteFor.id).map((c) => c.id)}
          itemLabel={itemLabel}
          onCancel={() => setDeleteFor(null)}
          onConfirm={(reassignToId) => {
            onDelete(deleteFor.id, reassignToId);
            setDeleteFor(null);
          }}
        />
      )}

      {mergeFor && (
        <MergeCategoryModal
          source={mergeFor.label}
          count={countFor(mergeFor.id)}
          options={list.filter((c) => c.id !== mergeFor.id).map((c) => c.label)}
          optionIds={list.filter((c) => c.id !== mergeFor.id).map((c) => c.id)}
          itemLabel={itemLabel}
          onCancel={() => setMergeFor(null)}
          onConfirm={(targetId) => {
            onMerge(mergeFor.id, targetId);
            setMergeFor(null);
          }}
        />
      )}
    </div>
  );
}

// ─── Modale de suppression avec réaffectation des items ─────────────────────
// Si la catégorie contient encore des items, on force le choix d'une catégorie
// de destination ; sinon, on autorise « Aucune » (les items resteront avec
// leur catégorie actuelle, qui deviendra orpheline mais affichable).
function DeleteCategoryModal({ name, count, options, optionIds, itemLabel, onCancel, onConfirm }) {
  const [reassignTo, setReassignTo] = useState(options[0] || '');
  const ids = optionIds || options;
  const getId = () => optionIds ? ids[options.indexOf(reassignTo)] : reassignTo;

  return (
    <div className="mc-overlay" onClick={onCancel}>
      <div className="mc-modal" style={{ maxWidth: 480, padding: 32 }} onClick={(e) => e.stopPropagation()}>
        <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 12px' }}>
          Supprimer « {name} » ?
        </h3>
        {count > 0 ? (
          <>
            <p style={{ fontSize: 13, color: palette.inkSoft, margin: '0 0 12px' }}>
              <strong>{count}</strong> {itemLabel}{count > 1 ? 's' : ''} {count > 1 ? 'utilisent' : 'utilise'} cette catégorie.
              Choisissez où {count > 1 ? 'les' : 'l\''} déplacer :
            </p>
            <select
              className="mc-input"
              value={reassignTo}
              onChange={(e) => setReassignTo(e.target.value)}
              style={{ width: '100%', marginBottom: 16 }}
            >
              {options.map((opt) => (
                <option key={opt} value={opt}>{opt}</option>
              ))}
            </select>
          </>
        ) : (
          <p style={{ fontSize: 13, color: palette.inkSoft, margin: '0 0 16px' }}>
            Aucun {itemLabel} n'utilise cette catégorie, la suppression est sans impact.
          </p>
        )}
        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <button className="mc-btn mc-btn-ghost" onClick={onCancel}>Annuler</button>
          <button
            className="mc-btn mc-btn-primary"
            onClick={() => onConfirm(count > 0 ? getId() : null)}
            style={{ background: palette.wine }}
          >
            Supprimer
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Modale de fusion ───────────────────────────────────────────────────────
function MergeCategoryModal({ source, count, options, optionIds, itemLabel, onCancel, onConfirm }) {
  const [target, setTarget] = useState(options[0] || '');
  const ids = optionIds || options;
  const getId = () => optionIds ? ids[options.indexOf(target)] : target;

  if (options.length === 0) {
    return (
      <div className="mc-overlay" onClick={onCancel}>
        <div className="mc-modal" style={{ maxWidth: 420, padding: 32 }} onClick={(e) => e.stopPropagation()}>
          <p style={{ fontSize: 13, color: palette.inkSoft, margin: '0 0 16px' }}>
            Pas d'autre catégorie disponible pour la fusion.
          </p>
          <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
            <button className="mc-btn mc-btn-ghost" onClick={onCancel}>Fermer</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="mc-overlay" onClick={onCancel}>
      <div className="mc-modal" style={{ maxWidth: 480, padding: 32 }} onClick={(e) => e.stopPropagation()}>
        <h3 className="mc-display" style={{ fontSize: 18, fontWeight: 600, margin: '0 0 12px' }}>
          Fusionner « {source} »
        </h3>
        <p style={{ fontSize: 13, color: palette.inkSoft, margin: '0 0 12px' }}>
          {count > 0 ? (
            <>Les <strong>{count}</strong> {itemLabel}{count > 1 ? 's' : ''} de cette catégorie seront déplacé{count > 1 ? 's' : ''} vers la catégorie cible, puis « {source} » sera supprimée.</>
          ) : (
            <>« {source} » sera supprimée. Aucun {itemLabel} ne sera affecté.</>
          )}
        </p>
        <div style={{ fontSize: 12, color: palette.inkSoft, marginBottom: 4 }}>Fusionner dans :</div>
        <select
          className="mc-input"
          value={target}
          onChange={(e) => setTarget(e.target.value)}
          style={{ width: '100%', marginBottom: 16 }}
        >
          {options.map((opt) => (
            <option key={opt} value={opt}>{opt}</option>
          ))}
        </select>
        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <button className="mc-btn mc-btn-ghost" onClick={onCancel}>Annuler</button>
          <button
            className="mc-btn mc-btn-primary"
            onClick={() => onConfirm(getId())}
            disabled={!target}
          >
            Fusionner
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Champ de saisie pour un seuil numérique ────────────────────────────────
function ThresholdInput({ label, help, value, suffix, min, max, step, onChange }) {
  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: '1fr 160px',
      gap: 16,
      alignItems: 'center',
    }}>
      <div>
        <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 2 }}>{label}</div>
        <div style={{ fontSize: 11, color: palette.inkSoft }}>{help}</div>
      </div>
      <div style={{ position: 'relative' }}>
        <input
          type="number"
          className="mc-input"
          value={value}
          min={min}
          max={max}
          step={step}
          onChange={(e) => {
            const v = parseFloat(e.target.value);
            if (!Number.isNaN(v)) onChange(v);
          }}
          style={{ width: '100%', paddingRight: 28, textAlign: 'right', fontFamily: 'Fraunces, serif', fontWeight: 600 }}
        />
        {suffix && (
          <span style={{
            position: 'absolute',
            right: 10,
            top: '50%',
            transform: 'translateY(-50%)',
            fontSize: 12,
            color: palette.inkSoft,
            pointerEvents: 'none',
          }}>
            {suffix}
          </span>
        )}
      </div>
    </div>
  );
}
