// ─── Combobox cherchable pour la sélection d'ingrédients ──────────────────────
function IngredientCombobox({ value, onChange, articles, priceIndex }) {
  const [search, setSearch] = React.useState('');
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  const inputRef = React.useRef(null);

  const article = articles.find((a) => a.id === value);

  React.useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) {
        setOpen(false);
        setSearch('');
      }
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  React.useEffect(() => {
    if (open && inputRef.current) inputRef.current.focus();
  }, [open]);

  const filtered = React.useMemo(() => {
    const q = search.toLowerCase().trim();
    return articles
      .filter((a) => (a.type || 'food') === 'food')
      .filter((a) => !q || a.name.toLowerCase().includes(q))
      .slice(0, 50);
  }, [articles, search]);

  return (
    <div ref={ref} style={{ flex: 1, position: 'relative' }}>
      {/* Bouton d'affichage — clique pour ouvrir la recherche */}
      <button
        type="button"
        className="mc-input"
        style={{
          width: '100%', textAlign: 'left', cursor: 'pointer',
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 4,
        }}
        onClick={() => { setOpen((o) => !o); setSearch(''); }}
      >
        <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>
          {article ? article.name : <span style={{ color: palette.inkSoft }}>— choisir —</span>}
        </span>
        <span style={{ fontSize: 10, color: palette.inkSoft, flexShrink: 0 }}>▾</span>
      </button>

      {open && (
        <div style={{
          position: 'absolute', top: 'calc(100% + 2px)', left: 0, right: 0,
          background: '#fff', border: '1px solid ' + palette.rule,
          borderRadius: 6, boxShadow: '0 6px 20px rgba(0,0,0,0.14)',
          zIndex: 9999, display: 'flex', flexDirection: 'column',
        }}>
          {/* Champ de recherche */}
          <div style={{ padding: '8px 8px 6px', borderBottom: '1px solid ' + palette.rule }}>
            <input
              ref={inputRef}
              className="mc-input"
              style={{ width: '100%', boxSizing: 'border-box', fontSize: 12 }}
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              placeholder="Rechercher un ingrédient…"
            />
          </div>
          {/* Liste filtrée */}
          <div style={{ maxHeight: 220, overflowY: 'auto' }}>
            {filtered.length === 0 ? (
              <div style={{ padding: '10px 12px', fontSize: 12, color: palette.inkSoft }}>Aucun résultat</div>
            ) : filtered.map((ing) => {
              const p = indexedAveragePrice(priceIndex, ing.id);
              const selected = ing.id === value;
              return (
                <div
                  key={ing.id}
                  onMouseDown={() => { onChange(ing.id); setOpen(false); setSearch(''); }}
                  style={{
                    padding: '7px 12px', cursor: 'pointer', fontSize: 12,
                    background: selected ? palette.wine + '12' : 'transparent',
                    borderBottom: '1px solid ' + palette.rule + '33',
                    display: 'flex', justifyContent: 'space-between', gap: 8,
                  }}
                  onMouseEnter={(e) => { if (!selected) e.currentTarget.style.background = palette.paper; }}
                  onMouseLeave={(e) => { if (!selected) e.currentTarget.style.background = 'transparent'; }}
                >
                  <span style={{ fontWeight: selected ? 600 : 400, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>
                    {ing.name}
                    {(ing.variants?.length || 0) > 1 && (
                      <span style={{ marginLeft: 4, fontSize: 10, color: palette.sage }}>×{ing.variants.length}</span>
                    )}
                  </span>
                  <span style={{ color: palette.inkSoft, flexShrink: 0 }}>
                    {p != null ? formatEuro(p) : '?'}/{ing.unit}
                  </span>
                </div>
              );
            })}
            {filtered.length === 50 && (
              <div style={{ padding: '5px 12px', fontSize: 10, color: palette.inkSoft, borderTop: '1px solid ' + palette.rule, textAlign: 'center' }}>
                Affichage limité à 50 — tapez pour affiner
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function RecipeModal({ initial, onSave, onClose, articles, recipes, priceIndex, foodCostTargets, recipeCategories }) {
  const [form, setForm] = useState({
    name: initial.name || '',
    category: initial.category || 'Plat',
    salePrice: initial.salePrice || 0,
    articles: initial.articles || [],
    yieldPortions: initial.yieldPortions || 1,
    includesAssortment: initial.includesAssortment === true,
    isAssortmentBase: initial.isAssortmentBase === true,
    id: initial.id,
  });

  // The global assortment base (if it exists), excluding *this* recipe to
  // avoid self-reference if the user is currently editing the base itself.
  const assortmentBase = useMemo(() => {
    if (form.isAssortmentBase) return null;
    return findAssortmentBase(recipes || []);
  }, [recipes, form.isAssortmentBase]);

  // Full cost breakdown for the recipe being edited
  const breakdown = useMemo(
    () => indexedPlateCost(form, priceIndex, assortmentBase),
    [form, priceIndex, assortmentBase]
  );

  // Use plate cost for ratio/margin (not just recipe cost), because what gets
  // sold is the plate, not the recipe alone.
  const cost = breakdown.plateCost;
  const margin = form.salePrice - cost;
  const ratio = form.salePrice > 0 ? cost / form.salePrice : 0;

  const ratioColor = ratio < 0.30 ? palette.sage : ratio < 0.35 ? palette.amber : palette.statusBroken;

  // ─── Cible de food cost (configurable par catégorie dans Réglages) ──────
  // targetPct = norme stable ; prix minimum = coût ÷ cible.
  const targetPct = (foodCostTargets || {})[form.category] ?? 30;
  const targetPrice = breakdown.plateCost > 0 && targetPct > 0
    ? breakdown.plateCost / (targetPct / 100)
    : null;
  const targetMet = targetPrice !== null && form.salePrice >= targetPrice;

  // ─── Moyenne réelle de la catégorie (repère, pas norme) ─────────────────
  // Exclut la recette en cours d'édition (sinon elle se compare à elle-même)
  // et les recettes sans prix de vente. Null si moins de 2 autres recettes.
  const categoryAvgRatio = useMemo(() => {
    const others = (recipes || []).filter((r) =>
      r.id !== form.id &&
      !r.isAssortmentBase &&
      (r.category || 'Autre') === form.category &&
      r.salePrice > 0
    );
    if (others.length < 2) return null;
    const assortBase = findAssortmentBase(recipes);
    let sum = 0, n = 0;
    for (const r of others) {
      const b = indexedPlateCost(r, priceIndex, assortBase);
      if (r.salePrice > 0) { sum += b.plateCost / r.salePrice; n++; }
    }
    return n > 0 ? sum / n : null;
  }, [recipes, form.id, form.category, priceIndex]);

  const addLine = () =>
    setForm({ ...form, articles: [...form.articles, { id: articles[0]?.id || '', qty: 0 }] });

  const updateLine = (index, field, value) => {
    const updated = [...form.articles];
    updated[index] = { ...updated[index], [field]: field === 'qty' ? parseFloat(value) || 0 : value };
    setForm({ ...form, articles: updated });
  };

  const removeLine = (index) =>
    setForm({ ...form, articles: form.articles.filter((_, i) => i !== index) });

  return (
    <div className="mc-overlay" onClick={onClose}>
      <div className="mc-modal" style={{ maxWidth: 720, padding: 32 }} onClick={(e) => e.stopPropagation()}>
        <h3 className="mc-display" style={{ fontSize: 22, fontWeight: 600, margin: '0 0 24px' }}>
          {initial.id ? 'Modifier' : 'Nouvelle'} recette
        </h3>

        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr', gap: 12, marginBottom: 12 }}>
          <div>
            <label className="mc-label">Nom</label>
            <input className="mc-input" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} />
          </div>
          <div>
            <label className="mc-label">Catégorie</label>
            <select className="mc-input" value={form.category} onChange={(e) => setForm({ ...form, category: e.target.value })}>
              {(() => {
                const cats = recipeCategories || ['Entrée', 'Plat', 'Dessert', 'Accompagnement', 'Boisson', 'Autre'];
                // Si la catégorie actuelle de la recette n'est plus dans la liste
                // (supprimée des Réglages), on l'affiche quand même pour ne pas
                // la perdre silencieusement au prochain enregistrement.
                const all = form.category && !cats.includes(form.category) ? [...cats, form.category] : cats;
                return all.map((c) => <option key={c}>{c}</option>);
              })()}
            </select>
          </div>
          <div>
            <label className="mc-label">Prix vente TTC</label>
            <input
              type="number"
              step="0.10"
              className="mc-input"
              value={form.salePrice}
              onChange={(e) => setForm({ ...form, salePrice: parseFloat(e.target.value) || 0 })}
              disabled={form.isAssortmentBase}
            />
          </div>
        </div>

        {/* Rendement + assortiment (cohérent avec le nouveau modèle "production volumes bruts") */}
        {!form.isAssortmentBase && (
          <div style={{
            display: 'grid',
            gridTemplateColumns: '1fr 2fr',
            gap: 16,
            padding: 14,
            background: palette.paper,
            borderRadius: 8,
            marginBottom: 20,
          }}>
            <div>
              <label className="mc-label" style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                Rendement (portions)
                <InfoTooltip text={"Combien d'assiettes cette recette produit-elle, telle que saisie ci-dessous ?\n\n• Saisir 20 si la composition correspond à une préparation pour 20 couverts → le coût par portion est divisé par 20.\n• Laisser à 1 si vous saisissez directement les quantités pour une seule assiette."} />
              </label>
              <input
                type="number"
                step="1"
                min="1"
                className="mc-input"
                value={form.yieldPortions}
                onChange={(e) => setForm({ ...form, yieldPortions: Math.max(1, parseInt(e.target.value) || 1) })}
              />
              <div style={{ fontSize: 11, color: palette.inkSoft, marginTop: 4 }}>
                Coût par portion : <strong>{formatEuro(breakdown.portionCost)}</strong>
              </div>
            </div>

            <div>
              <label className="mc-label">Assortiment d'assiette</label>
              {assortmentBase ? (
                <label style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px', border: '1px solid ' + palette.rule, borderRadius: 6, cursor: 'pointer', background: form.includesAssortment ? palette.sage + '10' : 'transparent' }}>
                  <input
                    type="checkbox"
                    checked={form.includesAssortment}
                    onChange={(e) => setForm({ ...form, includesAssortment: e.target.checked })}
                  />
                  <span style={{ fontSize: 12 }}>
                    Inclure l'assortiment "<strong>{assortmentBase.name}</strong>" ({formatEuro(breakdown.assortmentCost || (indexedRecipeCost(assortmentBase, priceIndex) / (assortmentBase.yieldPortions || 1)))})
                  </span>
                </label>
              ) : (
                <div style={{ fontSize: 11, color: palette.inkSoft, padding: '8px 10px', border: '1px dashed ' + palette.rule, borderRadius: 6 }}>
                  Aucun assortiment défini. Créez une recette et cochez « Base d'assortiment » pour en créer un.
                </div>
              )}
            </div>
          </div>
        )}

        {/* Special toggle for declaring this recipe as the global assortment base */}
        <div style={{ marginBottom: 20, padding: 10, background: form.isAssortmentBase ? palette.wine + '10' : 'transparent', border: '1px solid ' + (form.isAssortmentBase ? palette.wine : 'transparent'), borderRadius: 6 }}>
          <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', fontSize: 12 }}>
            <input
              type="checkbox"
              checked={form.isAssortmentBase}
              onChange={(e) => setForm({
                ...form,
                isAssortmentBase: e.target.checked,
                includesAssortment: e.target.checked ? false : form.includesAssortment,
              })}
            />
            <span>
              <strong>Base d'assortiment d'assiette</strong>
              <span style={{ color: palette.inkSoft, marginLeft: 4 }}>
                — cochez si cette « recette » représente les à-côtés communs à tous vos plats (riz, salade, sauce…). Elle ne sera pas listée comme un plat vendable.
              </span>
            </span>
          </label>
        </div>

        <section style={{ marginBottom: 16 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <label className="mc-label" style={{ margin: 0 }}>Composition</label>
            <button className="mc-btn mc-btn-ghost" onClick={addLine}><Plus size={14} /> Ajouter</button>
          </div>

          {form.articles.map((line, index) => {
            const article = articles.find((i) => i.id === line.id);
            const price = indexedAveragePrice(priceIndex, line.id) || 0;
            const variantCount = article?.variants?.length || 0;

            return (
              <div
                key={index}
                style={{
                  display: 'flex',
                  gap: 8,
                  alignItems: 'center',
                  padding: 10,
                  background: palette.paper,
                  borderRadius: 6,
                  marginBottom: 6,
                }}
              >
                <IngredientCombobox
                  value={line.id}
                  onChange={(id) => updateLine(index, 'id', id)}
                  articles={articles}
                  priceIndex={priceIndex}
                />
                {variantCount > 1 && (
                  <span className="mc-pill" style={{ background: palette.sage + '15', color: palette.sage }}>
                    <Layers size={9} />{variantCount}
                  </span>
                )}
                <input
                  type="number"
                  step="0.001"
                  className="mc-input"
                  style={{ width: 100 }}
                  value={line.qty}
                  onChange={(e) => updateLine(index, 'qty', e.target.value)}
                />
                <span style={{ fontSize: 12, color: palette.inkSoft, width: 40 }}>
                  {article ? article.unit : ''}
                </span>
                <span style={{ width: 110, textAlign: 'right' }}>
                  <span className="mc-display" style={{ fontSize: 14, fontWeight: 600 }}>
                    {formatEuro(price * line.qty)}
                  </span>
                  {breakdown.recipeCost > 0 && price * line.qty > 0 && (
                    <span style={{ fontSize: 10, color: palette.inkSoft, marginLeft: 4 }}>
                      ({Math.round((price * line.qty / breakdown.recipeCost) * 100)}%)
                    </span>
                  )}
                </span>
                <button className="mc-btn mc-btn-danger" style={{ padding: '4px 8px' }} onClick={() => removeLine(index)}>
                  <X size={14} />
                </button>
              </div>
            );
          })}
        </section>

        {/* Summary: cost breakdown. For "base assortment" recipes, we show
            simpler info (no margin/FC because they don't sell directly). */}
        {form.isAssortmentBase ? (
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, padding: 16, background: palette.ink, borderRadius: 8, marginBottom: 24 }}>
            <SummaryStat label="Coût total articles" value={formatEuro(breakdown.recipeCost)} color={palette.cream} />
            <SummaryStat
              label="Coût par assiette"
              value={formatEuro(breakdown.recipeCost / (form.yieldPortions || 1))}
              color={palette.cream}
            />
          </div>
        ) : (
          <>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: 12, padding: 16, background: palette.ink, borderRadius: 8, marginBottom: 12 }}>
              <SummaryStat
                label={form.includesAssortment ? "Coût assiette" : "Coût portion"}
                value={formatEuro(breakdown.plateCost)}
                color={palette.cream}
              />
              <SummaryStat label="Vente" value={formatEuro(form.salePrice)} color={palette.cream} />
              <SummaryStat label="Marge" value={formatEuro(margin)} color={margin >= 0 ? palette.sage : palette.wineLight} />
              <SummaryStat label="Food cost" value={formatPercent(ratio)} color={ratioColor} />
            </div>

            {/* Cible de prix + repère catégorie */}
            {!form.isAssortmentBase && targetPrice !== null && (
              <div style={{
                display: 'flex', flexDirection: 'column', gap: 4,
                padding: '10px 14px', marginBottom: 12,
                background: targetMet ? palette.sage + '10' : palette.wine + '08',
                border: `1px solid ${targetMet ? palette.sage : palette.wine}30`,
                borderRadius: 6, fontSize: 12.5,
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, color: palette.ink }}>
                  <span style={{ color: targetMet ? palette.sage : palette.wine, fontWeight: 700 }}>
                    {targetMet ? '✓' : '✗'}
                  </span>
                  <span>
                    Cible {form.category || 'Autre'} ({targetPct}%) → vendre ≥ <strong>{formatEuro(targetPrice)}</strong>
                    {targetMet
                      ? ` — atteint (vous vendez ${formatEuro(form.salePrice)})`
                      : form.salePrice > 0
                        ? ` — il manque ${formatEuro(targetPrice - form.salePrice)}`
                        : ''}
                  </span>
                </div>
                {categoryAvgRatio !== null && (
                  <div style={{ color: palette.inkSoft, paddingLeft: 18 }}>
                    Repère : moyenne de vos {form.category ? form.category.toLowerCase() + 's' : 'recettes'} {formatPercent(categoryAvgRatio)} · ce plat {formatPercent(ratio)}
                  </div>
                )}
              </div>
            )}
            {/* Avertissement si un ou plusieurs ingrédients n'ont pas été achetés
                sur la période active — le prix vient de l'historique complet */}
            {breakdown.hasFallback && (
              <div style={{
                display: 'flex', alignItems: 'center', gap: 8,
                padding: '8px 12px', marginBottom: 16,
                background: palette.amber + '15',
                border: `1px solid ${palette.amber}40`,
                borderRadius: 6, fontSize: 12, color: palette.inkSoft,
              }}>
                <span style={{ color: palette.amber }}>⏱</span>
                Certains ingrédients n'ont pas été achetés sur la période sélectionnée.
                Leur prix vient de l'historique complet — le food cost est indicatif.
              </div>
            )}
            {/* Detailed breakdown when assortment is included — clarifies how the
                total cost is composed */}
            {form.includesAssortment && breakdown.assortmentCost > 0 && (
              <div style={{
                display: 'flex', justifyContent: 'space-around',
                padding: '8px 16px', background: palette.paper, borderRadius: 6,
                marginBottom: 24, fontSize: 11, color: palette.inkSoft,
              }}>
                <span>Recette (par portion) : <strong>{formatEuro(breakdown.portionCost)}</strong></span>
                <span>+ Assortiment : <strong>{formatEuro(breakdown.assortmentCost)}</strong></span>
                <span>= Coût assiette : <strong>{formatEuro(breakdown.plateCost)}</strong></span>
              </div>
            )}
            {!form.includesAssortment && (
              <div style={{ marginBottom: 24 }} />
            )}
          </>
        )}

        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <button className="mc-btn mc-btn-ghost" onClick={onClose}>Annuler</button>
          <button className="mc-btn mc-btn-primary" onClick={() => onSave(form)}>
            <Save size={14} /> Enregistrer
          </button>
        </div>
      </div>
    </div>
  );
}

function SummaryStat({ label, value, color }) {
  return (
    <div>
      <div style={{ fontSize: 11, color: palette.cream, opacity: 0.6, textTransform: 'uppercase' }}>{label}</div>
      <div className="mc-display" style={{ fontSize: 20, fontWeight: 700, color, marginTop: 4 }}>{value}</div>
    </div>
  );
}

  const { menus } = context;
  return (

        value={mode}

}

// ═══════════════════════════════════════════════════════════════════════════
//   MENUS VIEW
// ═══════════════════════════════════════════════════════════════════════════

function MenusView({ context }) {
  const { menus, setMenus, recipes, priceIndex } = context;
  const [editingMenu, setEditingMenu] = useState(null);

  // Coût d'une recette dans le contexte d'un menu.
  // On passe par indexedPlateCost (et NON indexedRecipeCost) pour que les plats
  // qui incluent l'assortiment d'assiette (riz, banane, igname, papaye) soient
  // chiffrés avec le même coût que dans la vue Recettes — sinon le plat est
  // sous-évalué dans le menu. indexedPlateCost gère déjà la division par portion
  // et l'ajout de l'assortiment quand recipe.includesAssortment est vrai.
  const assortmentBase = useMemo(() => findAssortmentBase(recipes), [recipes]);
  const recipeCost = useCallback((recipeId) => {
    if (!recipeId) return null;
    const recipe = recipes.find((r) => r.id === recipeId);
    if (!recipe) return null;
    const breakdown = indexedPlateCost(recipe, priceIndex, assortmentBase);
    if (!(breakdown.plateCost > 0)) return null;
    return breakdown.plateCost;
  }, [recipes, priceIndex, assortmentBase]);

  const menuCosts = useCallback((menu) => {
    const platCost = recipeCost(menu.platId);
    if (platCost === null) return null;
    const eCosts = (menu.entrees  || []).map(recipeCost).filter((c) => c !== null);
    const dCosts = (menu.desserts || []).map(recipeCost).filter((c) => c !== null);
    const eMin = eCosts.length > 0 ? Math.min(...eCosts) : 0;
    const eMax = eCosts.length > 0 ? Math.max(...eCosts) : 0;
    const eAvg = eCosts.length > 0 ? eCosts.reduce((a,b)=>a+b,0)/eCosts.length : 0;
    const dMin = dCosts.length > 0 ? Math.min(...dCosts) : 0;
    const dMax = dCosts.length > 0 ? Math.max(...dCosts) : 0;
    const dAvg = dCosts.length > 0 ? dCosts.reduce((a,b)=>a+b,0)/dCosts.length : 0;
    const min = platCost+eMin+dMin, max = platCost+eMax+dMax, avg = platCost+eAvg+dAvg;
    const price = menu.price || 0;
    return { platCost, min, max, avg,
      marginAvg: price > 0 ? price-avg : null,
      fcAvg: price > 0 ? avg/price : null,
      fcMin: price > 0 ? min/price : null,
      fcMax: price > 0 ? max/price : null,
    };
  }, [recipeCost]);

  const saveMenu = (menu) => {
    const isUpdate = menu.id && menus.find((m) => m.id === menu.id);
    if (isUpdate) setMenus(menus.map((m) => (m.id === menu.id ? menu : m)));
    else setMenus([...menus, { ...menu, id: generateId('mn') }]);
    setEditingMenu(null);
    mcToast.success(isUpdate ? `Menu modifié : ${menu.name}` : `Menu créé : ${menu.name}`);
  };

  const deleteMenu = (id) => {
    const menu = menus.find((m) => m.id === id);
    if (!menu) return;
    const _snap = menus;
    setMenus(menus.filter((m) => m.id !== id));
    mcToast.undo(`Menu supprimé : ${menu.name}`, () => { setMenus(_snap); mcToast.success('Menu restauré'); });
  };

  const fcColor = (fc) => fc === null ? palette.inkSoft : fc > 0.35 ? palette.wine : fc > 0.30 ? palette.amber : palette.sage;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16 }}>
        <div>
          <h2 className="mc-display" style={{ fontSize: 24, fontWeight: 600, margin: 0 }}>Menus</h2>
          <div style={{ fontSize: 12, color: palette.inkSoft, marginTop: 4 }}>Plat unique · entrées et desserts au choix · fourchette de coût min/max</div>
        </div>
        <button className="mc-btn mc-btn-primary" onClick={() => setEditingMenu({ id: null, name: '', price: 0, entrees: [], platId: '', desserts: '', notes: '' })} disabled={recipes.length === 0} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, opacity: recipes.length === 0 ? 0.5 : 1 }}>
          <Plus size={14} /> Nouveau menu
        </button>
      </div>

      {recipes.length === 0 && (
        <EmptyState
          icon={FileText}
          title="Aucune recette à composer"
          description="Créez d'abord des recettes pour pouvoir les regrouper en menus."
        />
      )}
      {recipes.length > 0 && menus.length === 0 && (
        <EmptyState
          icon={Layers}
          title="Aucun menu"
          description={'Cliquez sur "Nouveau menu" pour composer entrée + plat + dessert.'}
        />
      )}

      {menus.map((menu) => {
        const costs = menuCosts(menu);
        const plat = recipes.find((r) => r.id === menu.platId);
        const entreeNames = (menu.entrees || []).map((id) => recipes.find((r) => r.id === id)?.name).filter(Boolean);
        const dessertNames = (menu.desserts || []).map((id) => recipes.find((r) => r.id === id)?.name).filter(Boolean);
        return (
          <div key={menu.id} className="mc-card" style={{ padding: 0, overflow: 'hidden' }}>
            {/* Header */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '16px 20px', borderBottom: `1px solid ${palette.rule}`, flexWrap: 'wrap', gap: 12 }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 16, fontFamily: 'Fraunces, serif' }}>{menu.name}</div>
                {menu.price > 0 && <div style={{ fontSize: 13, color: palette.inkSoft, marginTop: 2 }}>Prix de vente : <strong>{formatEuro(menu.price)}</strong></div>}
              </div>
              {costs && (
                <div style={{ display: 'flex', gap: 20, alignItems: 'center', flexWrap: 'wrap' }}>
                  <div style={{ textAlign: 'center' }}>
                    <div style={{ fontSize: 10, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Coût moyen</div>
                    <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 700, fontSize: 20 }}>{formatEuro(costs.avg)}</div>
                    {costs.min !== costs.max && <div style={{ fontSize: 10, color: palette.inkSoft }}>{formatEuro(costs.min)} – {formatEuro(costs.max)}</div>}
                  </div>
                  {menu.price > 0 && costs.fcAvg !== null && (
                    <div style={{ textAlign: 'center' }}>
                      <div style={{ fontSize: 10, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Food cost</div>
                      <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 700, fontSize: 20, color: fcColor(costs.fcAvg) }}>{(costs.fcAvg*100).toFixed(1)} %</div>
                      {costs.fcMin !== costs.fcMax && <div style={{ fontSize: 10, color: palette.inkSoft }}>{(costs.fcMin*100).toFixed(0)}% – {(costs.fcMax*100).toFixed(0)}%</div>}
                    </div>
                  )}
                  {menu.price > 0 && costs.marginAvg !== null && (
                    <div style={{ textAlign: 'center' }}>
                      <div style={{ fontSize: 10, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Marge moy.</div>
                      <div style={{ fontFamily: 'Fraunces, serif', fontWeight: 700, fontSize: 20, color: palette.sage }}>{formatEuro(costs.marginAvg)}</div>
                    </div>
                  )}
                </div>
              )}
              {!costs && <div style={{ fontSize: 12, color: palette.amber }}>⚠ Prix d'achat manquant sur certains ingrédients</div>}
              <div style={{ display: 'flex', gap: 6 }}>
                <button className="mc-btn mc-btn-ghost" onClick={() => setEditingMenu(menu)} style={{ padding: '6px 10px' }}><Edit3 size={14} /></button>
                <button className="mc-btn mc-btn-ghost" onClick={() => deleteMenu(menu.id)} style={{ padding: '6px 10px', color: palette.wine }}><Trash2 size={14} /></button>
              </div>
            </div>
            {/* 3 services */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1px 1fr 1px 1fr' }}>
              <div style={{ padding: '14px 20px' }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Entrée{entreeNames.length > 1 ? 's au choix' : ''}</div>
                {entreeNames.length === 0 ? <div style={{ fontSize: 12, color: palette.inkSoft, fontStyle: 'italic' }}>Non incluse</div>
                  : entreeNames.map((name, i) => { const c = recipeCost((menu.entrees||[])[i]); return <div key={i} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 4 }}><span>· {name}</span><span style={{ color: palette.inkSoft, fontFamily: 'Fraunces, serif' }}>{c !== null ? formatEuro(c) : '—'}</span></div>; })}
              </div>
              <div style={{ background: palette.rule }} />
              <div style={{ padding: '14px 20px', background: palette.paper }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Plat (unique)</div>
                {!plat ? <div style={{ fontSize: 12, color: palette.wine }}>Non défini</div>
                  : <div>
                      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, fontWeight: 600 }}><span>{plat.name}</span><span style={{ fontFamily: 'Fraunces, serif' }}>{costs ? formatEuro(costs.platCost) : '—'}</span></div>
                      {plat.includesAssortment && <div style={{ fontSize: 10, color: palette.sage, marginTop: 2 }}>+ assortiment d'assiette inclus</div>}
                    </div>}
              </div>
              <div style={{ background: palette.rule }} />
              <div style={{ padding: '14px 20px' }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Dessert{dessertNames.length > 1 ? 's au choix' : ''}</div>
                {dessertNames.length === 0 ? <div style={{ fontSize: 12, color: palette.inkSoft, fontStyle: 'italic' }}>Non inclus</div>
                  : dessertNames.map((name, i) => { const c = recipeCost((menu.desserts||[])[i]); return <div key={i} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 4 }}><span>· {name}</span><span style={{ color: palette.inkSoft, fontFamily: 'Fraunces, serif' }}>{c !== null ? formatEuro(c) : '—'}</span></div>; })}
              </div>
            </div>
            {menu.notes && <div style={{ padding: '10px 20px', borderTop: `1px solid ${palette.rule}`, fontSize: 12, color: palette.inkSoft, fontStyle: 'italic' }}>{menu.notes}</div>}
          </div>
        );
      })}

      {editingMenu && <MenuEditorModal menu={editingMenu} recipes={recipes} onSave={saveMenu} onCancel={() => setEditingMenu(null)} />}
    </div>
  );
}

// ─── Menu editor modal (style recipe overlay) ──────────────────────────────

function MenuEditorModal({ menu, recipes, onSave, onCancel }) {
  const [draft, setDraft] = useState({
    ...menu,
    entrees:  Array.isArray(menu.entrees)  ? menu.entrees  : [],
    desserts: Array.isArray(menu.desserts) ? menu.desserts : [],
    platId:   menu.platId  || '',
    price:    menu.price   || 0,
    name:     menu.name    || '',
    notes:    menu.notes   || '',
  });
  const canSave = draft.name.trim().length > 0 && !!draft.platId;

  const toggle = (field, id) => {
    const cur = draft[field] || [];
    setDraft({ ...draft, [field]: cur.includes(id) ? cur.filter((x) => x !== id) : [...cur, id] });
  };

  const sortedRecipes = [...recipes].sort((a, b) => a.name.localeCompare(b.name, 'fr'));
  const recipesByCategory = useMemo(() => {
    const out = { 'Entrée': [], 'Plat': [], 'Dessert': [], 'Autre': [] };
    for (const r of sortedRecipes) {
      const cat = r.category || 'Autre';
      if (out[cat]) out[cat].push(r); else out['Autre'].push(r);
    }
    return out;
  }, [sortedRecipes]);

  const listFor = (cat) => {
    const catList = recipesByCategory[cat] || [];
    return catList.length > 0 ? catList : sortedRecipes; // fallback: show all
  };

  const RecipeBtn = ({ recipe, field, multi }) => {
    const sel = multi ? (draft[field]||[]).includes(recipe.id) : draft[field] === recipe.id;
    return (
      <button onClick={() => multi ? toggle(field, recipe.id) : setDraft({ ...draft, [field]: sel ? '' : recipe.id })}
        style={{ textAlign: 'left', padding: '8px 12px', border: `1px solid ${sel ? palette.wine : palette.rule}`, borderRadius: 6, background: sel ? palette.wine+'12' : palette.cream, color: sel ? palette.wine : palette.ink, fontWeight: sel ? 600 : 400, cursor: 'pointer', fontSize: 13, display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8, width: '100%', transition: 'all 120ms ease' }}>
        <span>{recipe.name}</span>
        {sel && <span style={{ color: palette.wine, fontSize: 15 }}>✓</span>}
      </button>
    );
  };

  const recap = (field, label) => {
    const ids = Array.isArray(draft[field]) ? draft[field] : (draft[field] ? [draft[field]] : []);
    const names = ids.map((id) => recipes.find((r) => r.id === id)?.name).filter(Boolean);
    return <span><strong style={{ color: palette.ink }}>{label} : </strong>{names.length > 0 ? names.join(', ') : <em style={{ color: names.length === 0 && label === 'Plat' ? palette.wine : palette.inkSoft }}>Non défini</em>}</span>;
  };

  return (
    <div className="mc-overlay" onClick={onCancel}>
      <div className="mc-modal" style={{ maxWidth: 840, padding: 32 }} onClick={(e) => e.stopPropagation()}>
        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 24 }}>
          <h3 className="mc-display" style={{ fontSize: 22, fontWeight: 600, margin: 0 }}>{menu.id ? 'Modifier le menu' : 'Nouveau menu'}</h3>
          <button className="mc-btn mc-btn-ghost" onClick={onCancel} style={{ padding: '4px 8px' }}><X size={16} /></button>
        </div>

        {/* Nom + Prix */}
        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 12, marginBottom: 24 }}>
          <div>
            <label className="mc-label">Nom du menu</label>
            <input type="text" value={draft.name} onChange={(e) => setDraft({ ...draft, name: e.target.value })} className="mc-input" placeholder="Menu Découverte, Menu du jour…" autoFocus />
          </div>
          <div>
            <label className="mc-label">Prix de vente (€)</label>
            <input type="number" step="0.50" min="0" value={draft.price || ''} onChange={(e) => setDraft({ ...draft, price: parseFloat(e.target.value) || 0 })} className="mc-input" placeholder="28.00" />
          </div>
        </div>

        {/* Sélecteurs 3 colonnes */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16, marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Entrées <span style={{ fontWeight: 400 }}>(au choix)</span></div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4, maxHeight: 260, overflowY: 'auto' }}>
              {listFor('Entrée').map((r) => <RecipeBtn key={r.id} recipe={r} field="entrees" multi={true} />)}
            </div>
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Plat <span style={{ fontWeight: 400 }}>(unique *)</span></div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4, maxHeight: 260, overflowY: 'auto' }}>
              {listFor('Plat').map((r) => <RecipeBtn key={r.id} recipe={r} field="platId" multi={false} />)}
            </div>
            {!draft.platId && <div style={{ fontSize: 11, color: palette.wine, marginTop: 6 }}>Obligatoire</div>}
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: palette.inkSoft, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Desserts <span style={{ fontWeight: 400 }}>(au choix)</span></div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4, maxHeight: 260, overflowY: 'auto' }}>
              {listFor('Dessert').map((r) => <RecipeBtn key={r.id} recipe={r} field="desserts" multi={true} />)}
            </div>
          </div>
        </div>

        {/* Récap */}
        <div style={{ padding: '10px 14px', background: palette.paper, borderRadius: 8, fontSize: 12, color: palette.inkSoft, marginBottom: 16, display: 'flex', gap: 20, flexWrap: 'wrap' }}>
          {recap('entrees', 'Entrées')}
          {recap('platId', 'Plat')}
          {recap('desserts', 'Desserts')}
        </div>

        {/* Notes */}
        <div style={{ marginBottom: 24 }}>
          <label className="mc-label">Notes (optionnel)</label>
          <textarea value={draft.notes} onChange={(e) => setDraft({ ...draft, notes: e.target.value })} className="mc-input" rows={2} placeholder="Allergènes, description, contraintes…" />
        </div>

        {/* Footer */}
        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, paddingTop: 16, borderTop: `1px solid ${palette.rule}` }}>
          <button className="mc-btn mc-btn-ghost" onClick={onCancel}>Annuler</button>
          <button className="mc-btn mc-btn-primary" disabled={!canSave} onClick={() => onSave(draft)} style={{ opacity: canSave ? 1 : 0.5 }}><Save size={14} style={{ marginRight: 4 }} /> Enregistrer</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   PURCHASES VIEW
// ═══════════════════════════════════════════════════════════════════════════

function PurchasesView({ context }) {
  const { purchases, setPurchases, articles, setArticles, energy, setEnergy, equipmentPurchases, setEquipmentPurchases, equipment, setEquipment, assets, setAssets } = context;

  const [editingPurchase, setEditingPurchase] = useState(null);
  const [scanResult, setScanResult] = useState(null);
  const [isScanning, setIsScanning] = useState(false);
  const [scanError, setScanError] = useState(null);
  const [showBatchModal, setShowBatchModal] = useState(false);
  const [showImportClaudeModal, setShowImportClaudeModal] = useState(false);
  const fileInputRef = useRef(null);

  // ─── Filter state (no persistence across visits, by design) ────────────
  const [searchQuery, setSearchQuery] = useState('');
  const [supplierFilter, setSupplierFilter] = useState('all');  // 'all' | supplier name
  const [sourceFilter, setSourceFilter] = useState('all');       // 'all' | 'invoice' | 'cash' | 'gift'

  // ─── Derived: distinct suppliers for the dropdown ──────────────────────
  // Recomputed only when purchases change (cheap: a Set + sort).
  const availableSuppliers = useMemo(() => {
    const set = new Set();
    for (const p of purchases) {
      if (p.supplier) set.add(p.supplier);
    }
    return Array.from(set).sort((a, b) => a.localeCompare(b));
  }, [purchases]);

  // Sort all purchases by date (most recent first) — done before filtering.
  const sortedPurchases = useMemo(
    () => [...purchases].sort((a, b) => b.date.localeCompare(a.date)),
    [purchases]
  );

  // ─── Apply filters ─────────────────────────────────────────────────────
  // Combined: supplier + source + free-text search across:
  //   - supplier name
  //   - invoice number
  //   - item labels (Option B from the design)
  // Empty searchQuery skips the text check.
  const filteredPurchases = useMemo(() => {
    const q = normalizeText(searchQuery);
    return sortedPurchases.filter((p) => {
      if (supplierFilter !== 'all' && p.supplier !== supplierFilter) return false;
      if (sourceFilter !== 'all' && (p.source || 'invoice') !== sourceFilter) return false;
      if (!q) return true;

      // Free text: supplier OR invoice number OR any item label
      if (p.supplier && normalizeText(p.supplier).includes(q)) return true;
      if (p.invoiceNumber && normalizeText(p.invoiceNumber).includes(q)) return true;
      if ((p.items || []).some((it) => it.label && normalizeText(it.label).includes(q))) return true;
      return false;
    });
  }, [sortedPurchases, supplierFilter, sourceFilter, searchQuery]);

  const hasActiveFilters = searchQuery.trim() !== '' || supplierFilter !== 'all' || sourceFilter !== 'all';
  const clearFilters = () => {
    setSearchQuery('');
    setSupplierFilter('all');
    setSourceFilter('all');
  };

  const PURCHASES_PAGE_SIZE = 100;
  const [purchasesVisibleCount, setPurchasesVisibleCount] = useState(PURCHASES_PAGE_SIZE);

  // Reset pagination when filters change (otherwise "Load more" can desync)
  useEffect(() => {
    setPurchasesVisibleCount(PURCHASES_PAGE_SIZE);
  }, [searchQuery, supplierFilter, sourceFilter]);

  useEffect(() => {
    if (purchasesVisibleCount > filteredPurchases.length && filteredPurchases.length > PURCHASES_PAGE_SIZE) {
      setPurchasesVisibleCount(PURCHASES_PAGE_SIZE);
    }
  }, [filteredPurchases.length, purchasesVisibleCount]);

  const visiblePurchases = filteredPurchases.slice(0, purchasesVisibleCount);
  const hasMorePurchases = filteredPurchases.length > purchasesVisibleCount;

  /**
   * Saves a purchase. For each line, if not yet linked to an article/variant,
   * either matches against existing aliases OR creates a new article + variant.
   * Also auto-registers new aliases and packagings on the matched variant.
   */
  const handleSave = useCallback(
    (data) => {
      let updatedArticles = [...articles];

      const finalItems = data.items.map((item) => {
        // Case 1: already linked to an article AND existing variant
        if (item.articleId && item.variantId && item.variantId !== '__NEW__') {
          const ingIdx = updatedArticles.findIndex((i) => i.id === item.articleId);
          if (ingIdx === -1) return item;

          const variantIdx = updatedArticles[ingIdx].variants.findIndex((v) => v.id === item.variantId);
          if (variantIdx === -1) return item;

          const variant = updatedArticles[ingIdx].variants[variantIdx];
          let updatedVariant = { ...variant };

          // Register alias if novel
          if (
            item.label &&
            item.label !== variant.name &&
            !(variant.aliases || []).some((a) => a.label === item.label)
          ) {
            updatedVariant = {
              ...updatedVariant,
              aliases: [
                ...(updatedVariant.aliases || []),
                { label: item.label, supplier: data.supplier || '' },
              ],
            };
          }

          // Register packaging if novel
          const isPackaged = item.rawUnit && item.rawUnit !== 'kg' && item.rawUnit !== 'L';
          if (isPackaged && item.convertedQty && item.rawQty) {
            const factor = item.convertedQty / item.rawQty;
            const known = (updatedVariant.packagings || []).some(
              (p) => Math.abs(p.factor - factor) < 0.01 && p.unit === item.rawUnit
            );
            if (factor > 0 && !known) {
              updatedVariant = {
                ...updatedVariant,
                packagings: [
                  ...(updatedVariant.packagings || []),
                  {
                    label: `${item.rawUnit} x${factor}${updatedArticles[ingIdx].unit}`,
                    factor,
                    unit: item.rawUnit,
                    supplier: data.supplier || '',
                  },
                ],
              };
            }
          }

          // Apply changes
          const newVariants = [...updatedArticles[ingIdx].variants];
          newVariants[variantIdx] = updatedVariant;
          updatedArticles[ingIdx] = { ...updatedArticles[ingIdx], variants: newVariants };

          return item;
        }

        // Case 1.5: existing article, but a NEW variant to create inline
        if (item.articleId && item.variantId === '__NEW__') {
          const ingIdx = updatedArticles.findIndex((i) => i.id === item.articleId);
          if (ingIdx === -1) return item;

          const article = updatedArticles[ingIdx];
          const variantName =
            (item.newVariantName && item.newVariantName.trim()) ||
            item.label ||
            item.productName ||
            'Nouvelle variante';

          // Pre-populate the new variant with the current alias and packaging from this line
          const newAliases = [];
          if (item.label && item.label !== variantName) {
            newAliases.push({ label: item.label, supplier: data.supplier || '' });
          }

          const newPackagings = [];
          const isPackaged = item.rawUnit && item.rawUnit !== 'kg' && item.rawUnit !== 'L';
          if (isPackaged && item.convertedQty && item.rawQty) {
            const factor = item.convertedQty / item.rawQty;
            if (factor > 0) {
              newPackagings.push({
                label: `${item.rawUnit} x${factor}${article.unit}`,
                factor,
                unit: item.rawUnit,
                supplier: data.supplier || '',
              });
            }
          }

          const newVariantId = generateId('v');
          const newVariant = {
            id: newVariantId,
            name: variantName,
            aliases: newAliases,
            packagings: newPackagings,
          };

          updatedArticles[ingIdx] = {
            ...article,
            variants: [...article.variants, newVariant],
          };

          return { ...item, variantId: newVariantId, newVariantName: '' };
        }

        // Case 2: not linked yet, with a product name → match or create
        if (item.productName) {
          const match = findArticleByLabel(item.productName, updatedArticles);

          if (match) {
            // Auto-register alias on the matched variant
            const ingIdx = updatedArticles.findIndex((i) => i.id === match.article.id);
            const variantIdx = updatedArticles[ingIdx].variants.findIndex((v) => v.id === match.variant.id);
            const variant = updatedArticles[ingIdx].variants[variantIdx];

            if (
              variant.name !== item.productName &&
              !(variant.aliases || []).some((a) => a.label === item.productName)
            ) {
              const updatedVariant = {
                ...variant,
                aliases: [
                  ...(variant.aliases || []),
                  { label: item.productName, supplier: data.supplier || '' },
                ],
              };
              const newVariants = [...updatedArticles[ingIdx].variants];
              newVariants[variantIdx] = updatedVariant;
              updatedArticles[ingIdx] = { ...updatedArticles[ingIdx], variants: newVariants };
            }

            return {
              ...item,
              articleId: match.article.id,
              variantId: match.variant.id,
              label: item.productName,
            };
          }

          // No match → create a brand new article with a single variant
          const newArticleId = generateId('i');
          const newVariantId = generateId('v');
          updatedArticles.push({
            id: newArticleId,
            name: item.productName,
            unit: item.masterUnit || 'kg',
            category: '',
            variants: [
              {
                id: newVariantId,
                name: item.productName,
                aliases: [],
                packagings: [],
              },
            ],
          });

          return {
            ...item,
            articleId: newArticleId,
            variantId: newVariantId,
            label: item.productName,
          };
        }

        return item;
      });

      setArticles(updatedArticles);

      const finalPurchase = { ...data, items: finalItems };
      if (data.id && purchases.find((p) => p.id === data.id)) {
        setPurchases(purchases.map((p) => (p.id === data.id ? finalPurchase : p)));
      } else {
        setPurchases([...purchases, { ...finalPurchase, id: finalPurchase.id || generateId('p') }]);
      }

      setEditingPurchase(null);
      setScanResult(null);
    },
    [articles, purchases, setArticles, setPurchases]
  );

  const handleDelete = (id) => {
    const _purch = purchases.find((p) => p.id === id);
    if (!_purch) return;
    const _snapP = purchases;
    setPurchases(purchases.filter((p) => p.id !== id));
    mcToast.undo(`Facture supprimée : ${_purch.supplier || '?'}`, () => { setPurchases(_snapP); mcToast.success('Annulé'); });
  };

  // ─── AI scan (single file) ─────────────────────────────────────────────

  const handleScan = async (file) => {
    console.log('[Scan] Starting analysis of', file.name, file.type, file.size, 'bytes');
    setIsScanning(true);
    setScanResult(null);
    setScanError(null);

    try {
      const result = await scanInvoiceFile(file, articles);
      setScanResult(result);
    } catch (error) {
      console.error('[Scan] FAILED:', error);
      setScanError(error.message || String(error));
    } finally {
      setIsScanning(false);
      if (fileInputRef.current) fileInputRef.current.value = '';
    }
  };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
        <h2 className="mc-display" style={{ fontSize: 24, fontWeight: 600, margin: 0 }}>
          Achats & Factures
        </h2>
        <div style={{ display: 'flex', gap: 8 }}>
          <input
            type="file"
            accept="image/*,application/pdf"
            style={{ display: 'none' }}
            ref={fileInputRef}
            onChange={(e) => e.target.files[0] && handleScan(e.target.files[0])}
          />
          <button
            className="mc-btn mc-btn-ghost"
            onClick={() => fileInputRef.current && fileInputRef.current.click()}
            disabled={isScanning}
          >
            {isScanning ? (
              <><Loader2 size={14} style={{ animation: 'spin 1s linear infinite' }} /> Analyse...</>
            ) : (
              <><Star size={14} /> Scanner 1 facture (IA)</>
            )}
          </button>
          <button
            className="mc-btn mc-btn-ghost"
            onClick={() => setShowBatchModal(true)}
          >
            <Layers size={14} /> Scanner plusieurs factures (IA)
          </button>
          <button
            className="mc-btn mc-btn-ghost"
            onClick={() => setShowImportClaudeModal(true)}
            title="Importer des factures depuis un JSON généré dans Claude.ai (gratuit, idéal pour les imports massifs)"
          >
            <Upload size={14} /> Import Claude (JSON)
          </button>
          <button
            className="mc-btn mc-btn-primary"
            onClick={() => setEditingPurchase({ items: [], date: new Date().toISOString().slice(0, 10), invoiceNumber: '' })}
          >
            <Plus size={14} /> Saisie manuelle
          </button>
        </div>
      </div>

      <div style={{ marginBottom: 20 }}>
        <InfoBanner icon={RefreshCw} color={palette.wine}>
          <strong style={{ color: palette.wine }}>Matching article + variante :</strong>{' '}
          chaque libellé est rattaché à une <strong>variante précise</strong> d'un article.
          Les conditionnements et alias sont mémorisés sur la variante.
        </InfoBanner>
      </div>

      {isScanning && (
        <div className="mc-card" style={{ padding: 16, marginBottom: 20, background: palette.wine + '08', borderColor: palette.wine + '40', display: 'flex', alignItems: 'center', gap: 12 }}>
          <Loader2 size={18} style={{ color: palette.wine, animation: 'spin 1s linear infinite', flexShrink: 0 }} />
          <div style={{ fontSize: 13, color: palette.inkSoft }}>
            <strong style={{ color: palette.wine }}>Analyse en cours...</strong> Console (F12) pour le détail.
          </div>
        </div>
      )}

      {scanError && !isScanning && (
        <div className="mc-card" style={{ padding: 16, marginBottom: 20, background: palette.wine + '10', borderColor: palette.wine, borderWidth: 2 }}>
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
            <AlertCircle size={20} style={{ color: palette.wine, flexShrink: 0, marginTop: 2 }} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: palette.wine, marginBottom: 4 }}>Échec du scan</div>
              <div style={{ fontSize: 13, color: palette.inkSoft }}>{scanError}</div>
            </div>
            <button className="mc-btn mc-btn-ghost" style={{ padding: '4px 10px' }} onClick={() => setScanError(null)}>
              <X size={14} />
            </button>
          </div>
        </div>
      )}

      {/* Filter bar: search + supplier + source.
          State is local to this view (not persisted), so each visit starts
          fresh — safer than hiding purchases you might not realize are filtered. */}
      <div className="mc-card" style={{ padding: 16, marginBottom: 16, display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
        {/* Free-text search */}
        <div style={{ position: 'relative', flex: 1, minWidth: 240 }}>
          <Search size={14} style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: palette.inkSoft }} />
          <input
            className="mc-input"
            placeholder="Rechercher (fournisseur, n° facture, libellé d'achat…)"
            value={searchQuery}
            onChange={(e) => setSearchQuery(e.target.value)}
            style={{ paddingLeft: 32, width: '100%' }}
          />
        </div>

        {/* Supplier dropdown */}
        <select
          className="mc-input"
          value={supplierFilter}
          onChange={(e) => setSupplierFilter(e.target.value)}
          style={{ minWidth: 160 }}
        >
          <option value="all">Tous les fournisseurs</option>
          {availableSuppliers.map((s) => (
            <option key={s} value={s}>{s}</option>
          ))}
        </select>

        {/* Source dropdown */}
        <select
          className="mc-input"
          value={sourceFilter}
          onChange={(e) => setSourceFilter(e.target.value)}
          style={{ minWidth: 140 }}
        >
          <option value="all">Toutes sources</option>
          <option value="invoice">Factures</option>
          <option value="cash">Achats cash</option>
          <option value="gift">Cadeaux / dons</option>
        </select>
      </div>

      {/* Active-filter status line */}
      {hasActiveFilters && (
        <div style={{
          marginBottom: 16, padding: '8px 12px',
          background: palette.paper, borderRadius: 6,
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          fontSize: 12, color: palette.inkSoft,
        }}>
          <span>
            <strong>{filteredPurchases.length}</strong> achat{filteredPurchases.length > 1 ? 's' : ''} sur {sortedPurchases.length} affiché{filteredPurchases.length > 1 ? 's' : ''}
          </span>
          <button
            className="mc-btn mc-btn-ghost"
            onClick={clearFilters}
            style={{ padding: '4px 12px', fontSize: 12 }}
          >
            Effacer les filtres
          </button>
        </div>
      )}

      <div className="mc-card" style={{ overflow: 'hidden' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr>
              <th className="mc-th">Date</th>
              <th className="mc-th">Fournisseur</th>
              <th className="mc-th">N° facture</th>
              <th className="mc-th">Lignes</th>
              <th className="mc-th">Total HT</th>
              <th className="mc-th"></th>
            </tr>
          </thead>
          <tbody>
            {visiblePurchases.map((purchase) => (
              <tr key={purchase.id} className="mc-row">
                <td className="mc-td">{formatShortDate(purchase.date, { withYear: true })}</td>
                <td className="mc-td" style={{ fontWeight: 500 }}>{purchase.supplier}</td>
                <td className="mc-td" style={{ fontSize: 12, color: palette.inkSoft }}>
                  {purchase.invoiceNumber || '—'}
                </td>
                <td className="mc-td" style={{ color: palette.inkSoft }}>{purchase.items.length}</td>
                <td className="mc-td" style={{ fontFamily: 'Fraunces, serif', fontWeight: 600 }}>
                  {formatEuro(purchase.total)}
                </td>
                <td className="mc-td" style={{ textAlign: 'right' }}>
                  <button className="mc-btn mc-btn-ghost" style={{ padding: '4px 10px' }} onClick={() => setEditingPurchase(purchase)}>
                    <Edit3 size={14} />
                  </button>
                  <button className="mc-btn mc-btn-danger" style={{ padding: '4px 10px' }} onClick={() => handleDelete(purchase.id)}>
                    <Trash2 size={14} />
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>

        {/* Empty state when filters return nothing */}
        {filteredPurchases.length === 0 && sortedPurchases.length > 0 && (
          <div style={{ textAlign: 'center', padding: 40, color: palette.inkSoft, fontSize: 13 }}>
            Aucun achat ne correspond aux filtres actifs.
            <div style={{ marginTop: 8 }}>
              <button className="mc-btn mc-btn-ghost" onClick={clearFilters} style={{ padding: '4px 12px', fontSize: 12 }}>
                Effacer les filtres
              </button>
            </div>
          </div>
        )}

        {/* Pagination footer */}
        {filteredPurchases.length > 0 && (
          <div
            style={{
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
              padding: '14px 20px',
              borderTop: `1px solid ${palette.rule}`,
              fontSize: 12,
              color: palette.inkSoft,
            }}
          >
            <span>
              {visiblePurchases.length} sur {filteredPurchases.length} factures affichées
            </span>
            {hasMorePurchases && (
              <button
                className="mc-btn mc-btn-ghost"
                onClick={() => setPurchasesVisibleCount((c) => c + PURCHASES_PAGE_SIZE)}
                style={{ padding: '6px 14px' }}
              >
                Charger {Math.min(PURCHASES_PAGE_SIZE, filteredPurchases.length - purchasesVisibleCount)} de plus
              </button>
            )}
          </div>
        )}
      </div>

      {editingPurchase && (
        <PurchaseModal
          initial={editingPurchase}
          onSave={handleSave}
          onClose={() => setEditingPurchase(null)}
          articles={articles}
          existingPurchases={purchases}
        />
      )}
      {scanResult && (
        <PurchaseModal
          initial={scanResult}
          onSave={handleSave}
          onClose={() => setScanResult(null)}
          articles={articles}
          fromScan
          existingPurchases={purchases}
        />
      )}
      {showBatchModal && (
        <BatchScanModal
          articles={articles}
          existingPurchases={purchases}
          onSavePurchase={handleSave}
          onClose={() => setShowBatchModal(false)}
        />
      )}
      {showImportClaudeModal && (
        <ImportClaudeModal
          articles={articles}
          setArticles={setArticles}
          existingPurchases={purchases}
          setPurchases={setPurchases}
          existingEnergy={energy}
          setEnergy={setEnergy}
          existingEquipmentPurchases={equipmentPurchases}
          setEquipmentPurchases={setEquipmentPurchases}
          existingEquipment={equipment}
          setEquipment={setEquipment}
          existingAssets={assets}
          setAssets={setAssets}
          onClose={() => setShowImportClaudeModal(false)}
        />
      )}
    </div>
  );
}

// ─── Purchase editor modal ────────────────────────────────────────────────

function PurchaseModal({ initial, onSave, onClose, articles, fromScan, existingPurchases = [] }) {
  const [form, setForm] = useState({
    date: initial.date || new Date().toISOString().slice(0, 10),
    supplier: initial.supplier || '',
    invoiceNumber: initial.invoiceNumber || '',
    items: initial.items || [],
    total: initial.total || 0,
    id: initial.id,
  });

  const [forceSave, setForceSave] = useState(false);
  const computedTotal = form.items.reduce((sum, item) => sum + (item.total || 0), 0);

  const duplicate = useMemo(
    () => detectDuplicate({ ...form, total: computedTotal }, existingPurchases),
    [form, computedTotal, existingPurchases]
  );

  const handleSaveClick = () => {
    if (duplicate && !forceSave) return;
    onSave({ ...form, total: computedTotal });
  };

  const addLine = () =>
    setForm({
      ...form,
      items: [
        ...form.items,
        {
          articleId: '', variantId: '', productName: '', label: '',
          rawQty: 0, rawUnit: 'kg', convertedQty: 0,
          pricePerMasterUnit: 0, total: 0, masterUnit: 'kg',
        },
      ],
    });

  const updateLine = (index, field, value) => {
    const updated = [...form.items];
    const numeric = ['rawQty', 'convertedQty', 'pricePerMasterUnit', 'total'];
    const newValue = numeric.includes(field) ? parseFloat(value) || 0 : value;
    updated[index] = { ...updated[index], [field]: newValue };

    if (field === 'convertedQty' || field === 'total') {
      if (updated[index].convertedQty > 0) {
        updated[index].pricePerMasterUnit = updated[index].total / updated[index].convertedQty;
      }
    }

    if (field === 'articleId') {
      // Reset variant to the first one of the new article
      const ing = articles.find((i) => i.id === value);
      updated[index].variantId = ing?.variants?.[0]?.id || '';
      // Clear any pending new-variant draft, since the article context changed
      updated[index].newVariantName = '';
      if (value) updated[index].productName = '';
    }

    if (field === 'variantId' && value !== '__NEW__') {
      // User picked an existing variant — drop any pending new-variant draft
      updated[index].newVariantName = '';
    }

    setForm({ ...form, items: updated });
  };

  const removeLine = (index) =>
    setForm({ ...form, items: form.items.filter((_, i) => i !== index) });

  return (
    <div className="mc-overlay" onClick={onClose}>
      <div className="mc-modal" style={{ maxWidth: 1000, padding: 32 }} onClick={(e) => e.stopPropagation()}>
        <h3 className="mc-display" style={{ fontSize: 22, fontWeight: 600, margin: '0 0 8px' }}>
          {initial.id ? 'Modifier' : 'Nouvelle'} facture
        </h3>

        {fromScan && (
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '6px 12px', background: palette.wine + '10', color: palette.wine, borderRadius: 6, fontSize: 13, marginBottom: 20 }}>
            <Star size={14} /> Données extraites par IA — vérifiez les conversions et variantes
          </div>
        )}

        {duplicate && (
          <DuplicateWarning duplicate={duplicate} forceSave={forceSave} onForceSave={() => setForceSave(true)} />
        )}

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 2fr 1fr', gap: 12, marginBottom: 20 }}>
          <div>
            <label className="mc-label">Date</label>
            <input type="date" className="mc-input" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} />
          </div>
          <div>
            <label className="mc-label">Fournisseur</label>
            <input className="mc-input" value={form.supplier} onChange={(e) => setForm({ ...form, supplier: e.target.value })} />
          </div>
          <div>
            <label className="mc-label">N° facture</label>
            <input className="mc-input" value={form.invoiceNumber} onChange={(e) => setForm({ ...form, invoiceNumber: e.target.value })} />
          </div>
        </div>

        <section style={{ marginBottom: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <label className="mc-label" style={{ margin: 0 }}>Lignes</label>
            <button className="mc-btn mc-btn-ghost" onClick={addLine}><Plus size={14} /> Ligne</button>
          </div>

          {form.items.map((item, index) => (
            <PurchaseLine
              key={index}
              item={item}
              index={index}
              articles={articles}
              onUpdate={updateLine}
              onRemove={removeLine}
            />
          ))}
        </section>

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: 16, background: palette.ink, borderRadius: 8, marginBottom: 24 }}>
          <span style={{ fontSize: 13, color: palette.cream, opacity: 0.7, textTransform: 'uppercase', letterSpacing: 0.5 }}>
            Total HT
          </span>
          <span className="mc-display" style={{ fontSize: 24, fontWeight: 700, color: palette.cream }}>
            {formatEuro(computedTotal)}
          </span>
        </div>

        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <button className="mc-btn mc-btn-ghost" onClick={onClose}>Annuler</button>
          <button
            className="mc-btn mc-btn-primary"
            onClick={handleSaveClick}
            disabled={duplicate && !forceSave}
            style={duplicate && !forceSave ? { opacity: 0.5, cursor: 'not-allowed' } : undefined}
          >
            <Save size={14} /> Enregistrer
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Purchase line with article + variant selectors ────────────────────

function PurchaseLine({ item, index, articles, onUpdate, onRemove }) {
  const matchedArticle = item.articleId ? articles.find((i) => i.id === item.articleId) : null;
  const matchedVariant = matchedArticle?.variants?.find((v) => v.id === item.variantId);
  const masterUnit = matchedArticle ? matchedArticle.unit : item.masterUnit || 'kg';

  return (
    <div style={{ padding: 14, background: palette.paper, borderRadius: 8, marginBottom: 8 }}>
      {item.label && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: palette.sage, marginBottom: 8 }}>
          <Tag size={11} /> <strong>Libellé facture :</strong> {item.label}
          {item.packagingDesc && <span style={{ color: palette.inkSoft }}>· {item.packagingDesc}</span>}
        </div>
      )}

      {/* Article + variant selectors side-by-side */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 8 }}>
        <div>
          <div style={{ fontSize: 11, color: palette.inkSoft, marginBottom: 4 }}>Article</div>
          <select className="mc-input" value={item.articleId} onChange={(e) => onUpdate(index, 'articleId', e.target.value)}>
            <option value="">
              {item.productName || item.label
                ? '→ Rattacher ou créer "' + (item.productName || item.label) + '"'
                : '— Choisir —'}
            </option>
            {articles.map((ing) => (
              <option key={ing.id} value={ing.id}>
                {ing.name} ({ing.unit}){(ing.variants?.length || 0) > 1 ? ` · ${ing.variants.length} variantes` : ''}
              </option>
            ))}
          </select>
        </div>
        <div>
          <div style={{ fontSize: 11, color: palette.sage, marginBottom: 4 }}>Variante</div>
          <select
            className="mc-input"
            value={item.variantId === '__NEW__' ? '__NEW__' : item.variantId}
            onChange={(e) => onUpdate(index, 'variantId', e.target.value)}
            disabled={!matchedArticle}
          >
            <option value="">— Choisir variante —</option>
            {matchedArticle?.variants?.map((v) => (
              <option key={v.id} value={v.id}>
                {v.name}{(v.aliases?.length || 0) > 0 ? ` (${v.aliases.length} alias)` : ''}
              </option>
            ))}
            {matchedArticle && (
              <option value="__NEW__">+ Nouvelle variante…</option>
            )}
          </select>
        </div>
      </div>

      {/* Inline new-variant input: shown only when the user picked "+ Nouvelle variante…" */}
      {matchedArticle && item.variantId === '__NEW__' && (
        <div
          style={{
            display: 'flex',
            alignItems: 'center',
            gap: 8,
            padding: 10,
            background: palette.sage + '10',
            border: `1px dashed ${palette.sage}`,
            borderRadius: 6,
            marginBottom: 8,
          }}
        >
          <Layers size={14} style={{ color: palette.sage, flexShrink: 0 }} />
          <span style={{ fontSize: 12, color: palette.sage, fontWeight: 600 }}>
            Nouvelle variante de "{matchedArticle.name}" :
          </span>
          <input
            className="mc-input"
            style={{ flex: 1 }}
            placeholder="Ex: Suzi Wan 250ml"
            value={item.newVariantName || ''}
            onChange={(e) => onUpdate(index, 'newVariantName', e.target.value)}
            autoFocus
          />
        </div>
      )}

      {/* Quantity / conversion / price */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 24px 1fr 1fr 1fr 32px', gap: 8, alignItems: 'center' }}>
        <div>
          <div style={{ fontSize: 11, color: palette.inkSoft, marginBottom: 4 }}>Qté brute (facture)</div>
          <div style={{ display: 'flex', gap: 4 }}>
            <input type="number" step="0.01" className="mc-input" value={item.rawQty} onChange={(e) => onUpdate(index, 'rawQty', e.target.value)} />
            <input className="mc-input" style={{ width: 80 }} value={item.rawUnit} onChange={(e) => onUpdate(index, 'rawUnit', e.target.value)} />
          </div>
        </div>
        <div style={{ textAlign: 'center', paddingTop: 20 }}>
          <RefreshCw size={14} style={{ color: palette.amber }} />
        </div>
        <div>
          <div style={{ fontSize: 11, color: palette.amber, marginBottom: 4 }}>Qté convertie</div>
          <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
            <input type="number" step="0.01" className="mc-input" value={item.convertedQty} onChange={(e) => onUpdate(index, 'convertedQty', e.target.value)} />
            <span style={{ fontSize: 12, fontWeight: 600, color: palette.amber }}>{masterUnit}</span>
          </div>
        </div>
        <div>
          <div style={{ fontSize: 11, color: palette.inkSoft, marginBottom: 4 }}>Total HT</div>
          <input type="number" step="0.01" className="mc-input" value={item.total} onChange={(e) => onUpdate(index, 'total', e.target.value)} />
        </div>
        <div>
          <div style={{ fontSize: 11, color: palette.inkSoft, marginBottom: 4 }}>Prix/{masterUnit}</div>
          <div className="mc-display" style={{ fontSize: 18, fontWeight: 700, color: palette.ink, paddingTop: 4 }}>
            {item.pricePerMasterUnit > 0 ? formatEuro(item.pricePerMasterUnit) : '—'}
          </div>
        </div>
        <div style={{ paddingTop: 20 }}>
          <button className="mc-btn mc-btn-danger" style={{ padding: '6px 8px' }} onClick={() => onRemove(index)}>
            <X size={14} />
          </button>
        </div>
      </div>

      {matchedArticle && matchedVariant && (
        <div style={{ marginTop: 8, fontSize: 12, color: palette.sage, display: 'flex', alignItems: 'center', gap: 4 }}>
          <Link2 size={10} /> {matchedArticle.name} → variante <strong>{matchedVariant.name}</strong>
          {item.label && item.label !== matchedVariant.name && ' — alias mémorisé'}
        </div>
      )}

      {matchedArticle && item.variantId === '__NEW__' && (
        <div style={{ marginTop: 8, fontSize: 12, color: palette.sage, display: 'flex', alignItems: 'center', gap: 4 }}>
          <Plus size={10} /> Nouvelle variante "<strong>{item.newVariantName || '...'}</strong>" sera créée dans <strong>{matchedArticle.name}</strong>
        </div>
      )}

      {!item.articleId && (item.productName || item.label) && (
        <div style={{ marginTop: 8, display: 'flex', alignItems: 'center', gap: 8 }}>
          <span className="mc-pill" style={{ background: palette.amber + '20', color: palette.amber }}>
            <Plus size={10} /> Nouvel article + variante seront créés
          </span>
          <input
            className="mc-input"
            style={{ maxWidth: 240 }}
            placeholder="Nom"
            value={item.productName || ''}
            onChange={(e) => onUpdate(index, 'productName', e.target.value)}
          />
        </div>
      )}
    </div>
  );
}

    <div className="mc-card" style={{ padding: 16, marginBottom: 20, background: config.color + '10', borderColor: config.color + '50', borderWidth: 2 }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 12 }}>

        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: config.color, marginBottom: 4 }}>
            ⚠ {config.label}
          </div>
          <div style={{ fontSize: 13, color: palette.inkSoft }}>
            {config.description} <strong>Motif :</strong> {reason}.

      </div>

      <div style={{ padding: 12, background: 'white', borderRadius: 6, border: `1px solid ${palette.rule}`, marginBottom: 12 }}>
        <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 0.5, color: palette.inkSoft, marginBottom: 8 }}>
          Facture existante
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, fontSize: 13 }}>
          <div>
            <div style={{ color: palette.inkSoft, fontSize: 11 }}>Date</div>
            <div style={{ fontWeight: 500 }}>{formatShortDate(match.date, { withYear: true })}</div>
          </div>
          <div>
            <div style={{ color: palette.inkSoft, fontSize: 11 }}>Fournisseur</div>
            <div style={{ fontWeight: 500 }}>{match.supplier}</div>
          </div>
          <div>
            <div style={{ color: palette.inkSoft, fontSize: 11 }}>N° facture</div>

            <div style={{ color: palette.inkSoft, fontSize: 11 }}>Total</div>

              {formatEuro(match.total)}
            </div>
          </div>
        </div>
      </div>

      {!forceSave ? (
        <button
          onClick={onForceSave}
          style={{

        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '8px 14px', borderRadius: 6, fontSize: 13, fontWeight: 500, background: palette.sage + '15', color: palette.sage }}>
          ✓ Vous avez confirmé l'enregistrement
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//   INVOICE IMPORT FLOWS — Import Claude (copier-coller) + Batch Scan (auto)
// ═══════════════════════════════════════════════════════════════════════════
//
// Cette section contient DEUX flux d'import distincts, dans cet ordre :
//
//   1. IMPORT CLAUDE FLOW (copier-coller manuel via claude.ai)
//      - DEFAULT_IMPORT_CLAUDE_PROMPT  : prompt à coller dans claude.ai
//      - ImportClaudeModal             : modale principale (wizard 2 étapes)
//      - ImportClaudeInputStep         : étape 1 — saisie du JSON
//      - ImportClaudeReviewStep        : étape 2 — revue avant import
//      - ImportClaudeInvoiceRow        : ligne d'une facture dans la revue
//
//   2. BATCH SCAN FLOW (scan IA direct des PDF/images, max 10)
//      - BatchScanModal                : modale principale
//      - BatchScanItem                 : ligne d'un fichier dans la liste
//
// Les deux flux partagent : detectDuplicate, findArticleByLabel, mcToast.

const BATCH_MAX_FILES = 10;
const BATCH_PARALLELISM = 3;

/**
 * Status of a single file in the batch:
 *   'pending'   → waiting for a worker slot
 *   'scanning'  → currently being analyzed by Claude
 *   'success'   → AI scan succeeded, ready to save (unless duplicate)
 *   'duplicate' → success but a similar invoice already exists
 *   'error'     → AI scan failed (after auto-retry)
 *   'saved'     → user clicked "Tout enregistrer" and this one was committed
 *   'ignored'   → user clicked "Ignorer cette facture"
 */

// ─── IMPORT CLAUDE FLOW (copier-coller depuis claude.ai) ──────────────────
//
// Lets the user import multiple invoices at once via a JSON pasted from
// Claude.ai. The workflow:
//
//   1. User sees the prompt to use in Claude.ai (with copy button)
//   2. User pastes the resulting JSON into the textarea
//   3. "Analyser" runs a dry-run: parse, match labels, detect duplicates,
//      list new articles to be created
//   4. Review screen: user sees what will happen, can toggle duplicate
//      overwrites and article creations
//   5. "Importer tout" applies everything in one transaction
//
// The matching pipeline reuses the same logic as the AI scan flow:
//   - findArticleByLabel for existing labels/aliases
//   - For unknown labels, auto-creates article + variant (Q2 = D)
//   - For duplicates, the existing purchase is OVERWRITTEN (Q4 = A with warning)

const DEFAULT_IMPORT_CLAUDE_PROMPT = `Voici une ou plusieurs factures fournisseur de mon restaurant.
Pour chacune, extrais les informations dans UN SEUL JSON au format exact ci-dessous :

{
  "invoices": [
    {
      "date": "YYYY-MM-DD",
      "supplier": "nom du fournisseur",
      "invoiceNumber": "numéro de facture",
      "items": [
        {
