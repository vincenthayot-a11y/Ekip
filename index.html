/* ═══════════════════════════════════════════════════════════════════════════
   MODAL — ☁ Google Drive (configuration Apps Script)
   ───────────────────────────────────────────────────────────────────────────
   Permet de connecter/déconnecter un endpoint Apps Script utilisé pour
   persister les plannings hors localStorage. L'URL est stockée dans
   localStorage sous la clé "gas_url".
   ═══════════════════════════════════════════════════════════════════════════ */

function mDrive(box) {
  mHdr(box, '☁ Connexion Google Drive');
  const currentUrl = GAS_URL;

  // Description + lien vers Apps Script
  const desc = document.createElement('p');
  desc.className = 'drive-desc';
  desc.innerHTML =
    "Pour synchroniser le planning sur Google Drive, collez l'URL de votre " +
    "Apps Script ci-dessous.<br>" +
    "<a href='https://script.google.com/home' target='_blank' " +
    "class='drive-link'>→ Ouvrir Google Apps Script</a>";
  box.appendChild(desc);

  // Input de l'URL
  const urlInput = document.createElement('input');
  urlInput.type = 'text';
  urlInput.value = currentUrl;
  urlInput.placeholder = 'https://script.google.com/macros/s/.../exec';
  urlInput.className = 'form-input--sm';
  box.appendChild(urlInput);

  // Bloc d'instructions repliable
  const instructions = document.createElement('details');
  instructions.className = 'drive-instr';
  const summary = document.createElement('summary');
  summary.className = 'drive-instr-sum';
  summary.textContent = "📋 Comment configurer l'Apps Script ?";
  instructions.appendChild(summary);

  const steps = document.createElement('div');
  steps.className = 'drive-instr-steps';
  steps.innerHTML =
    '1. Aller sur <b>script.google.com</b> → Nouveau projet<br>' +
    '2. Coller le code Apps Script (fourni séparément)<br>' +
    '3. Cliquer <b>Déployer → Nouveau déploiement</b><br>' +
    '4. Type : <b>Application Web</b><br>' +
    '5. Accès : <b>Moi uniquement</b> ou <b>Tous (dans votre organisation)</b><br>' +
    "6. Copier l'URL générée et la coller ici";
  instructions.appendChild(steps);
  box.appendChild(instructions);

  // Bouton "Tester la connexion"
  const testMsg = document.createElement('div');
  testMsg.className = 'drive-test-msg';

  const testBtn = mBtn('🔗 Tester la connexion', false, () => {
    const url = urlInput.value.trim();
    if (!url) { toast("Collez d'abord une URL", 'inf'); return; }
    testMsg.innerHTML =
      "<span style='color:#f59e0b'>⏳ Test en cours...</span>";
    gasRequest(url + '?action=load', 'GET', null, (result) => {
      if (result !== null) {
        testMsg.innerHTML =
          "<span style='color:#16a34a'>✅ Connexion réussie !</span>";
      } else {
        testMsg.innerHTML =
          "<span style='color:#dc2626'>" +
          "❌ Échec — vérifiez l'URL et les droits d'accès</span>";
      }
    });
  });
  box.appendChild(testBtn);
  box.appendChild(testMsg);

  // Footer : Déconnecter (si URL présente) / Annuler / Enregistrer
  const foot = document.createElement('div');
  foot.className = 'modal-foot';

  if (currentUrl) {
    const clearBtn = mBtn('Déconnecter', false, () => {
      GAS_URL = '';
      localStorage.removeItem('gas_url');
      setSaveStatus('local');
      toast('Drive déconnecté', 'warn2');
      closeModal();
    });
    clearBtn.classList.add('btn-danger-outline');
    foot.appendChild(clearBtn);
  }
  foot.appendChild(mBtn('Annuler', false, closeModal));
  foot.appendChild(mBtn('Enregistrer', true, () => {
    const url = urlInput.value.trim();
    GAS_URL = url;
    if (url) localStorage.setItem('gas_url', url);
    else     localStorage.removeItem('gas_url');
    toast(url ? 'Drive configuré ✓' : 'Drive déconnecté', 'ok');
    closeModal();
    setSaveStatus(url ? 'ok' : 'local');
  }));
  box.appendChild(foot);
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL — Effacer entièrement le planning du mois
   ───────────────────────────────────────────────────────────────────────────
   Vide toutes les affectations du mois courant pour permettre une
   regénération from scratch. Les indispos, CP, maladies, notes, fermetures
   et configuration ne sont PAS touchées.
   ═══════════════════════════════════════════════════════════════════════════ */

function mClearMonth(box) {
  mHdr(box, '🗑️ Effacer le planning du mois');

  const k = mk();
  const planning = S.pl[k] || {};
  let totalAssigns = 0;
  Object.values(planning).forEach(day => {
    Object.values(day || {}).forEach(eid => {
      if (eid != null) totalAssigns++;
    });
  });

  const warning = document.createElement('div');
  warning.style.cssText =
    'background:#fef2f2;border:1px solid #fecaca;border-radius:8px;' +
    'padding:14px;margin:8px 0 16px 0;color:#991b1b';
  warning.innerHTML =
    '<div style="font-weight:600;margin-bottom:8px">⚠️ Action irréversible</div>' +
    '<div>Toutes les affectations du planning de <b>' + MN[S.m] + ' ' + S.y +
    '</b> vont être supprimées (' + totalAssigns + ' affectation' +
    (totalAssigns > 1 ? 's' : '') + ').</div>' +
    '<div style="margin-top:8px;font-size:13px">Conservés : indispos, ' +
    'congés, maladie, notes, fermetures, configuration.</div>' +
    '<div style="margin-top:6px;font-size:13px">Vous pourrez ensuite ' +
    'relancer une génération automatique.</div>';
  box.appendChild(warning);

  const foot = document.createElement('div');
  foot.className = 'modal-foot';
  foot.appendChild(mBtn('Annuler', false, closeModal));

  const clearBtn = mBtn('🗑️ Tout effacer', true, () => {
    pushUndo();
    S.pl[k] = {};
    save();
    closeModal();
    render();
    toast('Planning de ' + MN[S.m] + ' ' + S.y + ' effacé', 'success');
  });
  clearBtn.style.background = '#dc2626';
  clearBtn.style.borderColor = '#dc2626';
  foot.appendChild(clearBtn);
  box.appendChild(foot);
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL — Affecter un employé à un (jour, poste)
   ───────────────────────────────────────────────────────────────────────────
   Liste les employés éligibles (canAssignPost = OK) pour ce poste et ce jour.
   - "busy" = déjà affecté ailleurs ce jour-là (non sélectionnable)
   - Champ de recherche filtre la liste sur le nom
   ═══════════════════════════════════════════════════════════════════════════ */

function mAssign(box) {
  const d = S.modal.d;
  const pc = S.modal.pc;
  const post = PM[pc];
  const assignedToday = assignedOnDay(d);
  const current = getSlot(d, pc);

  // Header avec badge coloré du poste
  const badgeStyle =
    'background:' + post.hbg + ';border-top:2px solid ' + post.acc;
  mHdr(
    box,
    'Assigner <span class="assign-post-badge" style="' + badgeStyle + '">' +
    post.l + '</span> — ' + DN[dow(S.y, S.m, d)] + ' ' + d
  );

  // Bouton "retirer" si un employé est déjà affecté
  if (current !== null) {
    const removeBtn = mBtn('✕ Retirer ' + eName(current), false, () => {
      setSlot(d, pc, null);
      closeModal();
    });
    removeBtn.classList.add('btn-icon-sm', 'btn-danger-outline');
    removeBtn.style.marginBottom = '12px';
    box.appendChild(removeBtn);
  }

  // Liste des candidats éligibles
  const available = S.emps.filter(e => canAssignPost(e, d, pc));

  // Champ de recherche
  const search = document.createElement('input');
  search.type = 'text';
  search.placeholder = 'Rechercher un employé...';
  search.className = 'form-input--search';
  box.appendChild(search);

  const list = document.createElement('div');
  list.style.maxHeight = '280px';
  list.style.overflowY = 'auto';

  function renderList(filter) {
    list.innerHTML = '';
    const filtered = available.filter(e =>
      !filter || e.n.toLowerCase().indexOf(filter.toLowerCase()) >= 0
    );

    if (!available.length) {
      list.innerHTML =
        "<p style='color:#9ca3af;font-size:12px;padding:1rem 0'>" +
        "Aucun employé disponible.</p>";
      return;
    }
    if (!filtered.length) {
      list.innerHTML =
        "<p style='color:#9ca3af;font-size:12px;padding:.5rem 0'>" +
        "Aucun résultat.</p>";
      return;
    }

    filtered.forEach(e => {
      const busy = assignedToday[e.id] && e.id !== current;
      const isExtra = (e.t || 'contrat') === 'extra';
      const col = eColor(e.id);
      const absent = isAbsent(e.id, d);
      const icon = absIcon(e.id, d);

      const opt = document.createElement('div');
      opt.className = 'eopt' +
        (e.id === current ? ' sel' : '') +
        (busy ? ' busy' : '');
      opt.style.opacity = absent ? '0.75' : '1';

      const extraTag = isExtra
        ? "<span class='ctag tex ctag-sm'>Extra</span>" : '';
      const polyTag = e.ec
        ? "<span class='ctag tp ctag-sm'>P.</span>" : '';
      const iconSpace = icon ? ' ' + icon : '';
      const checkmark = e.id === current ? ' ✓' : '';

      // Jauge d'heures : permet de voir qui est sous/au-dessus de son contrat
      const hW = workedHours(e.id);
      const pctH = e.h ? Math.min(100, Math.round(hW / e.h * 100)) : 0;
      const gaugeColor = pctH >= 100 ? '#16a34a' : pctH >= 70 ? '#3b82f6' : '#f59e0b';

      opt.innerHTML =
        "<span style='display:flex;align-items:center;gap:6px;flex:1;min-width:0'>" +
          "<span class='emp-dot' style='background:" + col.bg +
            ';border:2px solid ' + col.text + "'></span>" +
          "<span style='font-weight:600'>" + e.n + '</span>' +
          extraTag + polyTag + iconSpace +
        '</span>' +
        "<span style='display:flex;align-items:center;gap:8px'>" +
          "<span class='eopt-gauge' title='" + hW + 'h / ' + e.h + "h'>" +
            "<span class='eopt-gauge-fill' style='width:" + pctH +
              '%;background:' + gaugeColor + "'></span>" +
          '</span>' +
          "<span style='font-size:11px;color:var(--text-3);min-width:30px;text-align:right'>" +
            workedDays(e.id) + 'j' + checkmark +
          '</span>' +
        '</span>';

      if (!busy) {
        opt.onclick = ((eid) => () => {
          setSlot(d, pc, eid);
          closeModal();
        })(e.id);
      }
      list.appendChild(opt);
    });
  }

  renderList('');
  search.oninput = () => { renderList(search.value); };
  setTimeout(() => { search.focus(); }, 80);
  box.appendChild(list);

  const foot = document.createElement('div');
  foot.className = 'modal-foot';
  foot.appendChild(mBtn('Fermer', false, closeModal));
  box.appendChild(foot);
}

/* Construit les deux sections (cuisine / salle) en cartes lisibles.
   Réutilisé par la vue Équipe. */
function buildEmpsSections() {
  const scroll = document.createElement('div');
  scroll.className = 'emps-scroll emps-scroll--page';

  ['cuisine', 'salle'].forEach(section => {
    const sectionEmps = S.emps.filter(e => e.s === section);

    const sectionDiv = document.createElement('div');
    sectionDiv.style.marginBottom = '18px';

    const sectionHeader = document.createElement('div');
    sectionHeader.className = 'emps-section-header ' +
      (section === 'cuisine'
        ? 'emps-section-cuisine' : 'emps-section-salle');
    sectionHeader.innerHTML =
      (section === 'cuisine' ? '🍳 Cuisine' : '🍽 Salle') +
      " <span class='emps-count-hint'>" +
      sectionEmps.length + ' pers.</span>';
    sectionDiv.appendChild(sectionHeader);

    const cards = document.createElement('div');
    cards.className = 'emps-cards';

    sectionEmps.forEach(e => {
      const col = eColor(e.id);
      const isExtra = (e.t || 'contrat') === 'extra';

      const card = document.createElement('div');
      card.className = 'emp-card';
      card.style.borderLeftColor = col.bg;

      // Haut : pastille + nom + badges
      const top = document.createElement('div');
      top.className = 'emp-card-top';
      top.innerHTML =
        "<span class='emp-dot emp-dot--lg' style='background:" + col.bg +
          ';border:2px solid ' + col.text + "'></span>" +
        "<span class='emp-card-name'>" + e.n + '</span>';

      const badges = document.createElement('div');
      badges.className = 'emp-card-badges';
      badges.innerHTML =
        (isExtra
          ? "<span class='emp-badge emp-badge--extra'>Extra</span>"
          : "<span class='emp-badge emp-badge--contrat'>Contrat</span>") +
        (e.ec ? "<span class='emp-badge emp-badge--poly'>Polyvalent</span>" : '') +
        (e.noAutoGen
          ? "<span class='emp-badge emp-badge--manual'>✋ Manuel</span>" : '');
      top.appendChild(badges);
      card.appendChild(top);

      // Stats : heures contrat · salaire · priorité
      const salTxt = (e.salaire != null && e.salaire !== '')
        ? fmtEur(e.salaire)
        : "<span class='emp-stat-val--missing'>à saisir</span>";
      const salClass = (e.salaire != null && e.salaire !== '')
        ? 'emp-stat-val' : '';
      const prio = e.prio !== undefined ? e.prio : '—';

      const stats = document.createElement('div');
      stats.className = 'emp-card-stats';
      stats.innerHTML =
        "<div class='emp-stat'><div class='emp-stat-val'>" + (e.h || 0) +
          "h</div><div class='emp-stat-lbl'>Contrat</div></div>" +
        "<div class='emp-stat'><div class='" + salClass + "'>" + salTxt +
          "</div><div class='emp-stat-lbl'>Salaire</div></div>" +
        "<div class='emp-stat'><div class='emp-stat-val'>" + prio +
          "</div><div class='emp-stat-lbl'>Priorité</div></div>";
      card.appendChild(stats);

      // Actions
      const actions = document.createElement('div');
      actions.className = 'emp-card-actions';

      const editBtn = mBtn('✏️ Modifier', false, null);
      editBtn.classList.add('btn-icon-sm');
      editBtn.onclick = ((eid) => () => {
        S.modal = { type: 'editEmp', empId: eid };
        render();
      })(e.id);

      const deleteBtn = mBtn('✕', false, null);
      deleteBtn.classList.add('btn-icon-xs', 'btn-danger-outline');
      deleteBtn.onclick = ((eid, name) => () => {
        S.modal = {
          type: 'confirm', danger: true,
          confirmLabel: 'Supprimer',
          title: 'Supprimer ' + name,
          msg: 'Confirmer la suppression de <b>' + name + '</b> ?',
          onOk: () => {
            S.emps = S.emps.filter(x => x.id !== eid);
            const key = mk();
            if (S.pl[key]) {
              Object.keys(S.pl[key]).forEach(day => {
                AP.forEach(p => {
                  if (S.pl[key][day][p.c] === eid) S.pl[key][day][p.c] = null;
                });
              });
            }
            save();
            S.view = 'emps';
            S.modal = null;
            render();
          }
        };
        render();
      })(e.id, e.n);

      actions.appendChild(editBtn);
      actions.appendChild(deleteBtn);
      card.appendChild(actions);

      cards.appendChild(card);
    });

    sectionDiv.appendChild(cards);
    scroll.appendChild(sectionDiv);
  });

  return scroll;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL — Éditer un employé (création ou modification)
   ───────────────────────────────────────────────────────────────────────────
   Formulaire complet avec :
     • Nom, téléphone, email
     • Picker de couleur (14 couleurs dans ECOLS)
     • Heures mensuelles, CP annuels, priorité (1→99)
     • Type (contrat / extra)
     • Section (cuisine / salle)
     • Jours travaillés (tous / semaine / we / custom avec picker 7 jours)
     • Polyvalence (salle uniquement) → active la liste "postes cuisine"
     • Postes maîtrisés (cuisine) et postes autorisés (salle)
     • Affectations fixes (jour de semaine → poste)
   Les états transitoires du form sont stockés dans S.modal._xxx pour
   survivre aux re-renders déclenchés par les boutons.
   ═══════════════════════════════════════════════════════════════════════════ */

function mEditEmp(box) {
  const isNew = S.modal.empId === 'new';

  // Employé de base : soit un nouveau template, soit l'existant à éditer
  const baseEmp = isNew
    ? {
        id: 'new', n: '', s: 'cuisine', t: 'contrat', h: 169, jt: 'all',
        jours: [], r: [], rs: [], ec: 0, fixed: [], col: 'blue',
        tel: '', email: '', cpTotal: 25
      }
    : findEmp(S.modal.empId);
  if (!baseEmp) { closeModal(); return; }

  // État transitoire (_xxx sur S.modal) → persistant au re-render
  const sec    = S.modal._sec    !== undefined ? S.modal._sec    : baseEmp.s;
  const type   = S.modal._t      !== undefined ? S.modal._t
                                               : (baseEmp.t || 'contrat');
  const jt     = S.modal._jt     !== undefined ? S.modal._jt
                                               : (baseEmp.jt || 'all');
  const jours  = S.modal._jours  !== undefined ? S.modal._jours
                                               : (baseEmp.jours || []);
  const poly   = S.modal._poly   !== undefined ? !!S.modal._poly
                                               : !!baseEmp.ec;
  const eCol   = S.modal._col    !== undefined ? S.modal._col
                                               : (baseEmp.col || 'blue');
  const tmpName = S.modal._name  !== undefined ? S.modal._name  : baseEmp.n;
  const tmpH    = S.modal._h     !== undefined ? S.modal._h     : baseEmp.h;
  const fixed   = S.modal._fixed !== undefined ? S.modal._fixed
                                               : (baseEmp.fixed || []);
  const roles = baseEmp.r  || [];
  const rs    = baseEmp.rs || [];

  mHdr(box, isNew ? 'Nouvel employé' : 'Modifier — ' + baseEmp.n);

  const form = document.createElement('div');
  form.className = 'form-col';

  // Helper : crée un input standardisé
  function makeInput(value, placeholder, inputType) {
    const i = document.createElement('input');
    i.type = inputType || 'text';
    i.value = value || '';
    i.placeholder = placeholder || '';
    i.className = 'form-input';
    return i;
  }
  // Helper : enveloppe un input avec son label
  function field(label, el) {
    const d = document.createElement('div');
    d.innerHTML = "<div class='lbl'>" + label + '</div>';
    d.appendChild(el);
    return d;
  }

  // ── Nom ─────────────────────────────────────────────────────────────────
  const nameInput = makeInput(tmpName, 'Prenom ou nom');
  form.appendChild(field('Nom', nameInput));

  // ── Tel / Email ─────────────────────────────────────────────────────────
  const telInput   = makeInput(baseEmp.tel   || '', 'ex: 0696 xx xx xx');
  const emailInput = makeInput(baseEmp.email || '', 'ex: prenom@mail.com',
                               'email');
  const infoRow = document.createElement('div');
  infoRow.className = 'form-grid-2';
  infoRow.appendChild(field('Téléphone', telInput));
  infoRow.appendChild(field('Email', emailInput));
  form.appendChild(infoRow);

  // ── Picker de couleur ───────────────────────────────────────────────────
  const colorDiv = document.createElement('div');
  colorDiv.innerHTML = "<div class='lbl'>Couleur</div>";
  const picker = document.createElement('div');
  picker.className = 'color-picker';
  ECOLS.forEach(c => {
    const swatch = document.createElement('div');
    swatch.title = c.l;
    swatch.className = 'color-swatch' +
      (eCol === c.id ? ' color-swatch--selected' : '');
    swatch.style.background = c.bg;
    swatch.style.borderColor = eCol === c.id ? c.text : '#e5e7eb';
    swatch.onclick = ((cid) => () => {
      S.modal._col  = cid;
      S.modal._name = nameInput.value;
      S.modal._h    = parseFloat(hoursInput.value) || 169;
      render();
    })(c.id);
    picker.appendChild(swatch);
  });
  colorDiv.appendChild(picker);
  form.appendChild(colorDiv);

  // ── Heures mensuelles + CP annuels + Priorité ───────────────────────────
  const hoursInput = makeInput(tmpH, '', 'number');
  hoursInput.min = '1';
  hoursInput.max = '230';
  hoursInput.step = '0.01';
  hoursInput.classList.add('form-h-input');

  const daysSpan = document.createElement('span');
  daysSpan.className = 'form-hint';
  daysSpan.textContent = '≈' + Math.round(tmpH / RL.hpj) + 'j/mois';
  hoursInput.oninput = () => {
    const h = parseFloat(hoursInput.value) || 0;
    daysSpan.textContent = '≈' + Math.round(h / RL.hpj) + 'j/mois';
  };

  const hoursDiv = document.createElement('div');
  hoursDiv.className = 'form-inline';
  hoursDiv.appendChild(hoursInput);
  hoursDiv.appendChild(daysSpan);

  const cpInput = makeInput(baseEmp.cpTotal || 25, '', 'number');
  cpInput.min = '0';
  cpInput.max = '50';
  cpInput.classList.add('form-cp-input');

  const prioInput = makeInput(
    baseEmp.prio !== undefined ? baseEmp.prio : 50, '', 'number'
  );
  prioInput.min = '1';
  prioInput.max = '99';
  prioInput.className = 'form-prio-input';

  const prioWrap = document.createElement('div');
  prioWrap.className = 'form-prio-wrap';
  prioWrap.appendChild(prioInput);
  const prioHint = document.createElement('span');
  prioHint.className = 'form-hint-sm';
  prioHint.innerHTML = '1 = premier servi<br>99 = dernier servi';
  prioWrap.appendChild(prioHint);

  /* Tableau explicatif de la priorité */
  const prioTable = document.createElement('div');
  prioTable.style.cssText =
    'margin-top:10px;border:1px solid #e7e5e4;border-radius:8px;' +
    'overflow:hidden;font-size:11px;';
  prioTable.innerHTML =
    "<div style='background:#f5f5f4;padding:5px 10px;font-weight:600;" +
    "color:#57534e;border-bottom:1px solid #e7e5e4'>💡 Fonctionnement de la priorité</div>" +
    "<table style='width:100%;border-collapse:collapse'>" +
    "<thead><tr style='background:#fafaf9'>" +
    "<th style='padding:5px 8px;text-align:left;color:#78716c;border-bottom:1px solid #e7e5e4'>Employé</th>" +
    "<th style='padding:5px 8px;text-align:center;color:#78716c;border-bottom:1px solid #e7e5e4'>Prio</th>" +
    "<th style='padding:5px 8px;text-align:left;color:#78716c;border-bottom:1px solid #e7e5e4'>Comportement</th>" +
    "</tr></thead><tbody>" +
    "<tr style='border-bottom:1px solid #f0eeed'>" +
    "<td style='padding:5px 8px;color:#292524'>Contrat</td>" +
    "<td style='padding:5px 8px;text-align:center;font-weight:600;color:#4f46e5'>30</td>" +
    "<td style='padding:5px 8px;color:#57534e'>Servi en priorité</td></tr>" +
    "<tr style='border-bottom:1px solid #f0eeed'>" +
    "<td style='padding:5px 8px;color:#292524'>Extra</td>" +
    "<td style='padding:5px 8px;text-align:center;font-weight:600;color:#78716c'>60</td>" +
    "<td style='padding:5px 8px;color:#57534e'>Servi après les contrats</td></tr>" +
    "<tr style='border-bottom:1px solid #f0eeed'>" +
    "<td style='padding:5px 8px;color:#292524'>Extra prio = 10</td>" +
    "<td style='padding:5px 8px;text-align:center;font-weight:600;color:#16a34a'>10</td>" +
    "<td style='padding:5px 8px;color:#57534e'>Passe avant tous les contrats</td></tr>" +
    "<tr>" +
    "<td style='padding:5px 8px;color:#292524'>Contrat prio = 80</td>" +
    "<td style='padding:5px 8px;text-align:center;font-weight:600;color:#dc2626'>80</td>" +
    "<td style='padding:5px 8px;color:#57534e'>Passe après tous les extras</td></tr>" +
    "</tbody></table>";

  const cpRow = document.createElement('div');
  cpRow.className = 'form-grid-3';
  cpRow.appendChild(field('Heures / mois', hoursDiv));
  cpRow.appendChild(field('CP annuels (j)', cpInput));
  cpRow.appendChild(field('Priorité (1→99)', prioWrap));
  form.appendChild(cpRow);

  // ── Rémunération (selon type : contrat = mensuel, extra = horaire) ───────
  const remuTitle = document.createElement('div');
  remuTitle.className = 'form-section-sep';
  remuTitle.textContent = '💶 Rémunération';
  form.appendChild(remuTitle);

  // Salaire mensuel (contrats)
  const salInput = makeInput(
    baseEmp.salaire !== undefined && baseEmp.salaire !== null ? baseEmp.salaire : '',
    'ex: 1800', 'number');
  salInput.min = '0';
  salInput.step = '0.01';
  salInput.id = 'emp-salaire-input';

  // Montant horaire heures supplémentaires (contrats)
  const hsInput = makeInput(
    baseEmp.tauxHS !== undefined && baseEmp.tauxHS !== null ? baseEmp.tauxHS : '',
    'ex: 14.50', 'number');
  hsInput.min = '0';
  hsInput.step = '0.01';
  hsInput.id = 'emp-tauxhs-input';

  // Taux horaire (extras)
  const tauxInput = makeInput(
    baseEmp.taux !== undefined && baseEmp.taux !== null ? baseEmp.taux : '',
    'ex: 12.50', 'number');
  tauxInput.min = '0';
  tauxInput.step = '0.01';
  tauxInput.id = 'emp-taux-input';

  const remuRow = document.createElement('div');
  remuRow.className = 'form-grid-3';
  remuRow.appendChild(field('Salaire mensuel (€)', salInput));
  remuRow.appendChild(field('Montant h. supp. (€/h)', hsInput));
  remuRow.appendChild(field('Taux horaire extra (€/h)', tauxInput));
  form.appendChild(remuRow);

  const remuHint = document.createElement('p');
  remuHint.className = 'form-hint';
  remuHint.style.marginTop = '4px';
  remuHint.innerHTML = type === 'extra'
    ? '➡ <b>Extra</b> : seul le <b>taux horaire</b> est utilisé (payé à l\'heure réelle).'
    : '➡ <b>Contrat</b> : <b>salaire mensuel</b> fixe + <b>heures supp.</b> au-delà des heures contrat.';
  form.appendChild(remuHint);

  // ── Prime couvert ─────────────────────────────────────────────────────────
  const primeMode = S.modal._primeCouv !== undefined ? S.modal._primeCouv
    : (baseEmp.primeCouv || 'aucune');

  const primeWrap = document.createElement('div');
  primeWrap.style.marginTop = '10px';
  const primeSel = document.createElement('select');
  primeSel.className = 'form-input--sm';
  primeSel.id = 'emp-primecouv-select';
  [
    ['aucune', 'Aucune prime couvert (cadre / plonge)'],
    ['standard', 'Standard : couverts du mois ÷ 3'],
    ['juliette', 'Spéciale Juliette : (couv. resto ÷ 2) ÷ 6,55957']
  ].forEach(([v, lbl]) => {
    const o = document.createElement('option');
    o.value = v; o.textContent = lbl;
    if (v === primeMode) o.selected = true;
    primeSel.appendChild(o);
  });
  primeWrap.appendChild(field('Prime couvert', primeSel));
  form.appendChild(primeWrap);

  form.appendChild(prioTable);

  // ── Type (contrat / extra) ──────────────────────────────────────────────
  const typeDiv = document.createElement('div');
  typeDiv.innerHTML = "<div class='lbl'>Type</div>";
  const typeBtns = document.createElement('div');
  typeBtns.className = 'choice-row';
  ['contrat', 'extra'].forEach(tp => {
    const btn = document.createElement('button');
    btn.className = 'tb';
    btn.innerHTML = tp === 'contrat' ? '📋 Contrat' : '⭐ Extra';
    btn.style.borderColor = type === tp ? '#2563eb' : '#d1d5db';
    btn.style.background  = type === tp ? '#eff6ff' : 'transparent';
    btn.style.color       = type === tp ? '#1d4ed8' : '#6b7280';
    btn.onclick = ((t) => () => {
      S.modal._t    = t;
      S.modal._name = nameInput.value;
      S.modal._h    = parseFloat(hoursInput.value) || 169;
      render();
    })(tp);
    typeBtns.appendChild(btn);
  });
  typeDiv.appendChild(typeBtns);
  form.appendChild(typeDiv);

  // ── Section (cuisine / salle) ───────────────────────────────────────────
  const secDiv = document.createElement('div');
  secDiv.innerHTML = "<div class='lbl'>Section</div>";
  const secBtns = document.createElement('div');
  secBtns.className = 'choice-row';
  ['cuisine', 'salle'].forEach(se => {
    const btn = document.createElement('button');
    btn.className = 'sb';
    btn.innerHTML = se === 'cuisine' ? '🍳 Cuisine' : '🍽 Salle';
    const selected = sec === se;
    const isCuis = se === 'cuisine';
    btn.style.borderColor = selected
      ? (isCuis ? '#ea580c' : '#2563eb') : '#d1d5db';
    btn.style.background = selected
      ? (isCuis ? '#fff7ed' : '#eff6ff') : 'transparent';
    btn.style.color = selected
      ? (isCuis ? '#c2410c' : '#1d4ed8') : '#6b7280';
    btn.onclick = ((s) => () => {
      S.modal._sec  = s;
      S.modal._poly = false;  // Changement de section → polyvalence reset
      S.modal._name = nameInput.value;
      S.modal._h    = parseFloat(hoursInput.value) || 169;
      render();
    })(se);
    secBtns.appendChild(btn);
  });
  secDiv.appendChild(secBtns);
  form.appendChild(secDiv);

  // ── Jours travaillés (all / weekdays / weekends / custom) ──────────────
  const jtSelect = document.createElement('select');
  jtSelect.className = 'form-select';
  jtSelect.style.width = '100%';
  [
    ['all',      'Tous les jours'],
    ['weekdays', 'Semaine (Lu-Ve)'],
    ['weekends', 'Week-ends (Sa+Di)'],
    ['custom',   'Jours spécifiques...']
  ].forEach(opt => {
    const o = document.createElement('option');
    o.value = opt[0];
    o.textContent = opt[1];
    if (jt === opt[0]) o.selected = true;
    jtSelect.appendChild(o);
  });
  jtSelect.onchange = () => {
    S.modal._jt    = jtSelect.value;
    S.modal._jours = S.modal._jours || [];
    S.modal._name  = nameInput.value;
    S.modal._h     = parseFloat(hoursInput.value) || 169;
    render();
  };
  const jtDiv = document.createElement('div');
  jtDiv.appendChild(jtSelect);

  // Si "custom" : picker de 7 jours (Lu→Di dans cet ordre)
  if (jt === 'custom') {
    const pillsDiv = document.createElement('div');
    pillsDiv.className = 'pill-row';
    [1, 2, 3, 4, 5, 6, 0].forEach(dv => {
      const pill = document.createElement('span');
      pill.className = 'dp' + (jours.indexOf(dv) >= 0 ? ' on' : '');
      pill.textContent = DN[dv];
      pill.onclick = ((dayValue) => () => {
        const j = (S.modal._jours || jours).slice();
        const ix = j.indexOf(dayValue);
        if (ix >= 0) j.splice(ix, 1); else j.push(dayValue);
        S.modal._jours = j;
        S.modal._name  = nameInput.value;
        S.modal._h     = parseFloat(hoursInput.value) || 169;
        render();
      })(dv);
      pillsDiv.appendChild(pill);
    });
    jtDiv.appendChild(pillsDiv);
  }
  form.appendChild(field('Jours travaillés', jtDiv));

  // ── Polyvalence (affiché seulement pour salle) ─────────────────────────
  if (sec === 'salle') {
    const polyLabel = document.createElement('label');
    polyLabel.className = 'poly-checkbox';
    polyLabel.style.border = '1.5px solid ' + (poly ? '#7c3aed' : '#d1d5db');
    polyLabel.style.background = poly ? '#f5f3ff' : 'transparent';

    const polyChk = document.createElement('input');
    polyChk.type = 'checkbox';
    polyChk.checked = poly;
    polyChk.dataset.polyval = '1';
    polyChk.onchange = () => {
      S.modal._poly = polyChk.checked;
      S.modal._name = nameInput.value;
      S.modal._h    = parseFloat(hoursInput.value) || 169;
      render();
    };

    const polySpan = document.createElement('span');
    polySpan.className = 'poly-label';
    polySpan.style.color = poly ? '#7c3aed' : '#111827';
    polySpan.textContent = 'Peut travailler en cuisine';

    polyLabel.appendChild(polyChk);
    polyLabel.appendChild(polySpan);
    form.appendChild(polyLabel);
  }

  // ── Postes cuisine maîtrisés (cuisine OU salle polyvalent) ─────────────
  if (sec === 'cuisine' || (sec === 'salle' && poly)) {
    const roleDiv = document.createElement('div');
    roleDiv.innerHTML = "<div class='lbl'>Postes cuisine maîtrisés</div>";
    const roleList = document.createElement('div');
    roleList.className = 'roles-col';
    PC.forEach(p => {
      const lbl = document.createElement('label');
      lbl.className = 'role-item';
      lbl.style.background = roles.indexOf(p.c) >= 0 ? p.bg : '#fff';
      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.dataset.role = p.c;
      if (roles.indexOf(p.c) >= 0) chk.checked = true;
      chk.style.accentColor = p.acc;
      lbl.appendChild(chk);
      lbl.appendChild(document.createTextNode(' ' + p.l));
      roleList.appendChild(lbl);
    });
    roleDiv.appendChild(roleList);
    form.appendChild(roleDiv);
  }

  // ── Postes salle autorisés (liste vide = tous autorisés) ───────────────
  if (sec === 'salle') {
    const spDiv = document.createElement('div');
    spDiv.innerHTML =
      "<div class='lbl'>Postes salle autorisés</div>" +
      "<p class='form-hint-sm' style='margin-bottom:5px'>" +
      'Tout coché = pas de restriction</p>';
    const spList = document.createElement('div');
    spList.className = 'roles-col';
    // Si rs est vide, on affiche tous les postes comme cochés
    const checkedRs = rs.length === 0 ? PS.map(p => p.c) : rs;
    PS.forEach(p => {
      const lbl = document.createElement('label');
      lbl.className = 'role-item';
      lbl.style.background = checkedRs.indexOf(p.c) >= 0 ? p.bg : '#fff';
      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.dataset.srole = p.c;
      if (checkedRs.indexOf(p.c) >= 0) chk.checked = true;
      chk.style.accentColor = p.acc;
      lbl.appendChild(chk);
      lbl.appendChild(document.createTextNode(' ' + p.l));
      spList.appendChild(lbl);
    });
    spDiv.appendChild(spList);
    form.appendChild(spDiv);
  }

  // ── Affectations fixes (jour de semaine → poste) ───────────────────────
  const fixDiv = document.createElement('div');
  fixDiv.innerHTML = "<div class='lbl'>📌 Affectations fixes</div>";

  const fixList = document.createElement('div');
  fixList.className = 'fix-list';
  if (!fixed.length) {
    fixList.innerHTML =
      "<span class='fix-list-empty'>Aucune règle</span>";
  }
  fixed.forEach((f, idx) => {
    const post = PM[f.pc];
    const tag = document.createElement('div');
    tag.className = 'fix-tag';
    tag.style.background = post ? post.bg : '#f1f5f9';
    tag.style.border = '1px solid ' + (post ? post.acc : '#d1d5db');
    tag.innerHTML = DNF[f.dow] + ' → ' + (post ? post.l : f.pc);
    const rmBtn = document.createElement('button');
    rmBtn.innerHTML = '✕';
    rmBtn.className = 'fix-tag-remove';
    rmBtn.onclick = ((i) => () => {
      S.modal._fixed = fixed.filter((_, j) => j !== i);
      S.modal._name  = nameInput.value;
      S.modal._h     = parseFloat(hoursInput.value) || 169;
      render();
    })(idx);
    tag.appendChild(rmBtn);
    fixList.appendChild(tag);
  });
  fixDiv.appendChild(fixList);

  // Ligne d'ajout : jour + poste + bouton
  const fixRow = document.createElement('div');
  fixRow.className = 'fix-row';

  const dowSelect = document.createElement('select');
  dowSelect.className = 'fix-dow-select';
  DNF.forEach((dn, i) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = dn;
    dowSelect.appendChild(o);
  });

  const pcSelect = document.createElement('select');
  pcSelect.className = 'fix-post-select';
  AP.forEach(p => {
    const o = document.createElement('option');
    o.value = p.c;
    o.textContent = p.l;
    pcSelect.appendChild(o);
  });

  const addFix = document.createElement('button');
  addFix.textContent = '+ Ajouter';
  addFix.className = 'fix-add-btn';
  addFix.onclick = () => {
    S.modal._fixed = [].concat(fixed).concat([
      { dow: parseInt(dowSelect.value), pc: pcSelect.value }
    ]);
    S.modal._name = nameInput.value;
    S.modal._h    = parseFloat(hoursInput.value) || 169;
    render();
  };

  fixRow.appendChild(dowSelect);
  fixRow.appendChild(document.createTextNode(' → '));
  fixRow.appendChild(pcSelect);
  fixRow.appendChild(addFix);
  fixDiv.appendChild(fixRow);
  form.appendChild(fixDiv);

  box.appendChild(form);

  // ── Footer : Annuler / Enregistrer ─────────────────────────────────────
  const foot = document.createElement('div');
  foot.className = 'modal-foot modal-foot--spaced';
  foot.appendChild(mBtn('Annuler', false, () => {
    S.view = 'emps';
    S.modal = null;
    render();
  }));
  foot.appendChild(mBtn('Enregistrer', true, () => {
    const newName = nameInput.value.trim();
    if (!newName) return;
    const newH    = parseFloat(hoursInput.value) || 169;
    const newJt   = jtSelect.value;
    const newJours = S.modal._jours || jours;
    const newSec  = sec;
    const newType = type;
    const newCol  = eCol;
    const newCp   = parseInt(cpInput.value) || 25;
    const newPrio = Math.max(1, Math.min(99, parseInt(prioInput.value) || 50));
    const newTaux = tauxInput.value !== '' ? (parseFloat(tauxInput.value) || 0) : null;
    const newSalaire = salInput.value !== '' ? (parseFloat(salInput.value) || 0) : null;
    const newTauxHS = hsInput.value !== '' ? (parseFloat(hsInput.value) || 0) : null;
    const newPrimeCouv = primeSel.value || 'aucune';

    // Polyvalence : récupère l'état réel de la checkbox dans le DOM
    let newEc = false;
    const polyChkEl = box.querySelector('[data-polyval]');
    if (polyChkEl) newEc = polyChkEl.checked;

    // Rôles cuisine cochés
    const newR = [];
    box.querySelectorAll('[data-role]:checked').forEach(c => {
      newR.push(c.dataset.role);
    });

    // Postes salle cochés ; si tous cochés → on stocke [] (pas de restriction)
    const newRsAll = [];
    box.querySelectorAll('[data-srole]:checked').forEach(c => {
      newRsAll.push(c.dataset.srole);
    });
    const newRs = newRsAll.length === PS.length ? [] : newRsAll;

    const newFixed = S.modal._fixed !== undefined ? S.modal._fixed : fixed;

    if (isNew) {
      // Attribution d'un nouvel id = max(ids) + 1
      const newId = Math.max.apply(null,
        [0].concat(S.emps.map(x => x.id))
      ) + 1;
      S.emps.push({
        id: newId, n: newName, s: newSec, t: newType, h: newH,
        jt: newJt, jours: newJours, r: newR, rs: newRs,
        ec: newEc ? 1 : 0, col: newCol, fixed: newFixed,
        tel: telInput.value, email: emailInput.value,
        cpTotal: newCp, prio: newPrio, taux: newTaux,
        salaire: newSalaire, tauxHS: newTauxHS, primeCouv: newPrimeCouv
      });
    } else {
      const emp = findEmp(S.modal.empId);
      if (emp) {
        emp.n       = newName;
        emp.h       = newH;
        emp.jt      = newJt;
        emp.jours   = newJours;
        emp.s       = newSec;
        emp.t       = newType;
        emp.ec      = newEc ? 1 : 0;
        emp.r       = newR;
        emp.rs      = newRs;
        emp.col     = newCol;
        emp.fixed   = newFixed;
        emp.tel     = telInput.value;
        emp.email   = emailInput.value;
        emp.cpTotal = newCp;
        emp.prio    = newPrio;
        emp.taux    = newTaux;
        emp.salaire = newSalaire;
        emp.tauxHS  = newTauxHS;
        emp.primeCouv = newPrimeCouv;
      }
    }
    save();
    S.view = 'emps';
    S.modal = null;
    render();
  }));
  box.appendChild(foot);
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL — Absences / indisponibilités (3 types : ind, cp, mal)
   ───────────────────────────────────────────────────────────────────────────
   Grille employés × jours. Chaque cellule cliquable toggle l'absence.
   - Auto-init : les "extras" sont marqués indisponibles sur tout le mois
     la première fois que la modal s'ouvre.
   - Bouton "+" par ligne : bascule tous les jours ON/OFF
   - Bouton "🗑 Tout effacer ce type" réinitialise toutes les absences
     du type sélectionné pour les employés filtrés.
   - Scroll vertical/horizontal préservé lors du re-render interne.
   ═══════════════════════════════════════════════════════════════════════════ */

function mIndispos(box) {
  const D = dim(S.y, S.m);
  const filter  = S.modal.flt     || 'tous';
  const absType = S.modal.absType || 'ind';

  // Motif de rayures pour cellules "jour non travaillé par contrat"
  const stripes =
    'repeating-linear-gradient(45deg,#f1f5f9,#f1f5f9 3px,' +
    '#e2e8f0 3px,#e2e8f0 6px)';

  // Table des 3 types avec accesseur d'array et couleurs associées
  const TYPES = {
    ind: {
      label: 'Indisponible', color: '#fbbf24', bg: '#fef3c7',
      arr: (k, eid) => {
        if (!S.ind[k]) S.ind[k] = {};
        if (S.ind[k][eid] === undefined) S.ind[k][eid] = [];
        return S.ind[k][eid];
      }
    },
    cp: {
      label: 'Congé payé', color: '#4ade80', bg: '#dcfce7',
      arr: (k, eid) => {
        if (!S.cp[k]) S.cp[k] = {};
        if (!S.cp[k][eid]) S.cp[k][eid] = [];
        return S.cp[k][eid];
      }
    },
    mal: {
      label: 'Maladie', color: '#fda4af', bg: '#ffe4e6',
      arr: (k, eid) => {
        if (!S.mal[k]) S.mal[k] = {};
        if (!S.mal[k][eid]) S.mal[k][eid] = [];
        return S.mal[k][eid];
      }
    },
    pm: {
      label: '🌅 Dispo après-midi', color: '#a78bfa', bg: '#ede9fe',
      arr: (k, eid) => {
        if (!S.pm[k]) S.pm[k] = {};
        if (!S.pm[k][eid]) S.pm[k][eid] = [];
        return S.pm[k][eid];
      }
    }
  };

  // Auto-init des extras : tous les jours du mois marqués indisponibles
  S.emps.forEach(e => {
    if ((e.t || 'contrat') === 'extra') {
      if (!S.ind[mk()]) S.ind[mk()] = {};
      if (S.ind[mk()][e.id] === undefined) {
        const arr = [];
        for (let i = 1; i <= D; i++) arr.push(i);
        S.ind[mk()][e.id] = arr;
      }
    }
  });

  // Filtrage employés
  let emps = S.emps;
  if (filter === 'cuisine') {
    emps = S.emps.filter(e => e.s === 'cuisine');
  } else if (filter === 'salle') {
    emps = S.emps.filter(e => e.s === 'salle');
  } else if (filter === 'avecindispos') {
    emps = S.emps.filter(e =>
      getInd(e.id).filter(d => d >= 1 && d <= D).length > 0 ||
      getCp(e.id).length > 0 ||
      getMal(e.id).length > 0 ||
      getPm(e.id).length > 0
    );
  }

  const days = [];
  for (let i = 1; i <= D; i++) days.push(i);
  const DL = ['D', 'L', 'M', 'M', 'J', 'V', 'S'];

  box.classList.add('mo--wide-absences');
  mHdr(box, '🗓 Absences — ' + MN[S.m] + ' ' + S.y);

  // ── Tabs : types + filtres section ─────────────────────────────────────
  const typeRow = document.createElement('div');
  typeRow.className = 'abs-type-row';
  Object.keys(TYPES).forEach(tk => {
    const tp = TYPES[tk];
    const btn = document.createElement('button');
    btn.className = 'abs-type-btn';
    btn.style.border = '1.5px solid ' +
      (absType === tk ? tp.color : '#e5e7eb');
    btn.style.background = absType === tk ? tp.bg : '#fff';
    btn.style.color = absType === tk ? '#374151' : '#9ca3af';
    btn.innerHTML =
      "<span style='display:inline-block;width:8px;height:8px;" +
      "border-radius:50%;background:" + tp.color +
      ";margin-right:4px'></span>" + tp.label;
    btn.onclick = ((t) => () => {
      S.modal.absType = t;
      const curBox = document.querySelector('.mo');
      if (curBox) { curBox.innerHTML = ''; mIndispos(curBox); }
    })(tk);
    typeRow.appendChild(btn);
  });

  const filterRow = document.createElement('div');
  filterRow.className = 'abs-filter-row';
  [
    ['tous',         'Tous'],
    ['cuisine',      '🍳 Cuisine'],
    ['salle',        '🍽 Salle'],
    ['avecindispos', 'Avec absences']
  ].forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'abs-filter-btn';
    btn.style.border = '1px solid ' +
      (filter === t[0] ? '#ea580c' : '#e5e7eb');
    btn.style.background = filter === t[0] ? '#ea580c' : '#fff';
    btn.style.color      = filter === t[0] ? '#fff'    : '#9ca3af';
    btn.textContent = t[1];
    btn.onclick = ((k) => () => {
      S.modal.flt = k;
      const curBox = document.querySelector('.mo');
      if (curBox) { curBox.innerHTML = ''; mIndispos(curBox); }
    })(t[0]);
    filterRow.appendChild(btn);
  });
  typeRow.appendChild(filterRow);
  box.appendChild(typeRow);

  // ── Comptes de jours absents par colonne (pour le pied de tableau) ─────
  const dayCounts = {};
  days.forEach(d => {
    dayCounts[d] = 0;
    S.emps.forEach(e => {
      if (TYPES[absType].arr(mk(), e.id).indexOf(d) >= 0) dayCounts[d]++;
    });
  });

  // ── Tableau ────────────────────────────────────────────────────────────
  const tblWrap = document.createElement('div');
  tblWrap.id = 'ind-wrap';
  tblWrap.className = 'abs-wrap';

  const table = document.createElement('table');
  table.className = 'abs-table';

  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  headRow.className = 'abs-thead-row';
  const th0 = document.createElement('th');
  th0.className = 'abs-th-emp';
  th0.textContent = 'Employé';
  headRow.appendChild(th0);

  days.forEach(d => {
    const w = dow(S.y, S.m, d);
    const we = w === 0 || w === 6;
    const tod = isTod(S.y, S.m, d);
    const th = document.createElement('th');
    th.className = 'abs-th-day' + (tod ? ' abs-th-day--today' : '');
    const dayColor  = tod ? '#1d4ed8' : (we ? '#9ca3af' : '#374151');
    const nameColor = we ? '#94a3b8' : '#6b7280';
    th.innerHTML =
      "<div class='abs-th-day-name' style='color:" + nameColor + "'>" +
        DL[w] + '</div>' +
      "<div class='abs-th-day-num' style='color:" + dayColor + "'>" +
        d + '</div>';
    headRow.appendChild(th);
  });

  const thTotal = document.createElement('th');
  thTotal.className = 'abs-th-total';
  thTotal.textContent = 'Total';
  headRow.appendChild(thTotal);
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  const curType = TYPES[absType];

  // Helper : re-render interne tout en préservant le scroll
  function innerRerender() {
    const curBox = document.querySelector('.mo');
    if (!curBox) return;
    const scrollTop    = curBox.scrollTop;
    const innerWrap    = document.getElementById('ind-wrap');
    const innerScrollL = innerWrap ? innerWrap.scrollLeft : 0;
    const innerScrollT = innerWrap ? innerWrap.scrollTop  : 0;
    curBox.innerHTML = '';
    mIndispos(curBox);
    curBox.scrollTop = scrollTop;
    const newWrap = document.getElementById('ind-wrap');
    if (newWrap) {
      newWrap.scrollLeft = innerScrollL;
      newWrap.scrollTop  = innerScrollT;
    }
  }

  emps.forEach((e, i) => {
    const arr = curType.arr(mk(), e.id);
    const indCount = arr.filter(d => d >= 1 && d <= D).length;
    const allOn = indCount === D;
    const col = eColor(e.id);
    const rowBg = i % 2 === 0 ? '#fff' : '#fafafa';

    const tr = document.createElement('tr');
    tr.className = 'abs-row';

    // Cellule nom (sticky left)
    const td0 = document.createElement('td');
    td0.className = 'abs-name-cell';
    td0.style.background = rowBg;

    const nameInner = document.createElement('div');
    nameInner.className = 'abs-name-inner';
    nameInner.innerHTML =
      "<span class='emp-dot' style='background:" + col.bg +
      ';border:2px solid ' + col.text + "'></span>" +
      "<span class='abs-name-label'>" + e.n + '</span>';

    // Bouton "+/-" : bascule tous les jours
    const toggleBtn = document.createElement('button');
    toggleBtn.innerHTML = allOn ? '−' : '+';
    toggleBtn.className = 'abs-toggle-btn';
    toggleBtn.style.border = '1px solid ' +
      (allOn ? curType.color : '#d1d5db');
    toggleBtn.style.background = allOn ? curType.bg : '#f9fafb';
    toggleBtn.style.color = allOn ? '#374151' : '#6b7280';
    toggleBtn.onclick = ((eid) => () => {
      const k = mk();
      const arr2 = curType.arr(k, eid);
      const allOn2 = arr2.filter(d => d >= 1 && d <= D).length === D;
      const nArr = [];
      if (!allOn2) {
        for (let x = 1; x <= D; x++) nArr.push(x);
      }
      // Mutuelle exclusivité : si on active des jours d'un type,
      // on retire ces mêmes jours de tous les autres types.
      if (nArr.length) {
        if (!S.ind[k]) S.ind[k] = {};
        if (!S.cp[k])  S.cp[k]  = {};
        if (!S.mal[k]) S.mal[k] = {};
        if (!S.pm[k])  S.pm[k]  = {};
        const otherTypes = ['ind','cp','mal','pm'].filter(t => t !== absType);
        otherTypes.forEach(t => {
          const tgt = (t === 'ind' ? S.ind : t === 'cp' ? S.cp : t === 'mal' ? S.mal : S.pm);
          if (tgt[k][eid]) {
            tgt[k][eid] = tgt[k][eid].filter(d => nArr.indexOf(d) < 0);
          }
        });
      }
      if (absType === 'ind') {
        S.ind[k][eid] = nArr;
      } else if (absType === 'cp') {
        if (!S.cp[k]) S.cp[k] = {};
        S.cp[k][eid] = nArr;
      } else if (absType === 'mal') {
        if (!S.mal[k]) S.mal[k] = {};
        S.mal[k][eid] = nArr;
      } else if (absType === 'pm') {
        if (!S.pm[k]) S.pm[k] = {};
        S.pm[k][eid] = nArr;
      }
      save();
      innerRerender();
    })(e.id);
    nameInner.appendChild(toggleBtn);
    td0.appendChild(nameInner);
    tr.appendChild(td0);

    // Cellules par jour
    days.forEach(d => {
      const on = arr.indexOf(d) >= 0;
      const cw = canWork(e, S.y, S.m, d);
      const td = document.createElement('td');
      td.className = 'abs-day-cell';
      td.style.background = rowBg;

      const cell = document.createElement('div');
      cell.className = 'abs-day-dot';
      cell.style.background = on ? curType.color : (!cw ? stripes : '#fff');
      cell.style.color = on ? '#374151' : 'transparent';
      cell.style.cursor = (cw || on) ? 'pointer' : 'default';
      if (on) cell.textContent = '×';

      if (cw || on) {
        cell.onclick = ((eid, day) => () => {
          const k = mk();
          const arr3 = curType.arr(k, eid);
          const ix = arr3.indexOf(day);
          if (ix >= 0) {
            arr3.splice(ix, 1);
          } else {
            // Mutuelle exclusivité : retirer ce jour de tous les autres types
            if (!S.ind[k]) S.ind[k] = {};
            if (!S.cp[k])  S.cp[k]  = {};
            if (!S.mal[k]) S.mal[k] = {};
            if (!S.pm[k])  S.pm[k]  = {};
            ['ind','cp','mal','pm'].forEach(t => {
              if (t === absType) return;
              const tgt = (t === 'ind' ? S.ind : t === 'cp' ? S.cp : t === 'mal' ? S.mal : S.pm);
              if (tgt[k][eid]) {
                const i = tgt[k][eid].indexOf(day);
                if (i >= 0) tgt[k][eid].splice(i, 1);
              }
            });
            arr3.push(day);
          }
          save();
          innerRerender();
        })(e.id, d);
      }
      td.appendChild(cell);
      tr.appendChild(td);
    });

    // Total ligne (sticky right)
    const tdTotal = document.createElement('td');
    tdTotal.className = 'abs-total-cell';
    tdTotal.style.background = rowBg;
    tdTotal.style.color = indCount ? '#374151' : '#9ca3af';
    tdTotal.textContent = indCount || '—';
    tr.appendChild(tdTotal);
    tbody.appendChild(tr);
  });

  // Pied de tableau : total par jour
  const tfoot = document.createElement('tr');
  tfoot.className = 'abs-foot-row';
  const tf0 = document.createElement('td');
  tf0.className = 'abs-foot-label';
  tf0.textContent = 'Total / jour';
  tfoot.appendChild(tf0);

  let total = 0;
  days.forEach(d => {
    const td = document.createElement('td');
    td.className = 'abs-foot-day';
    const labelColor = dayCounts[d] ? curType.color : '#d1d5db';
    td.innerHTML =
      "<span class='abs-foot-day-label' style='color:" +
      labelColor + "'>" + (dayCounts[d] || '.') + '</span>';
    tfoot.appendChild(td);
    total += dayCounts[d];
  });
  const tfTot = document.createElement('td');
  tfTot.className = 'abs-foot-total';
  tfTot.style.color = curType.color;
  tfTot.textContent = total;
  tfoot.appendChild(tfTot);
  tbody.appendChild(tfoot);

  table.appendChild(tbody);
  tblWrap.appendChild(table);
  box.appendChild(tblWrap);

  // Footer : "Tout effacer" + Fermer
  const foot = document.createElement('div');
  foot.className = 'modal-foot--between';
  const clearBtn = mBtn('🗑 Tout effacer ce type', false, () => {
    const k = mk();
    emps.forEach(e => {
      if (absType === 'ind') {
        if (!S.ind[k]) S.ind[k] = {};
        S.ind[k][e.id] = [];
      } else if (absType === 'cp') {
        if (!S.cp[k]) S.cp[k] = {};
        S.cp[k][e.id] = [];
      } else if (absType === 'mal') {
        if (!S.mal[k]) S.mal[k] = {};
        S.mal[k][e.id] = [];
      } else if (absType === 'pm') {
        if (!S.pm[k]) S.pm[k] = {};
        S.pm[k][e.id] = [];
      }
    });
    save();
    innerRerender();
  });
  clearBtn.classList.add('abs-clear-btn');
  foot.appendChild(clearBtn);
  foot.appendChild(mBtn('Fermer', false, closeModal));
  box.appendChild(foot);
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL — Configuration des postes actifs par jour de semaine
   ───────────────────────────────────────────────────────────────────────────
   Stocké dans S.dc[moisKey]["__week__"][dow] = {cuisine:[...],salle:[...]}
   Des valeurs par défaut sont utilisées si aucune config custom n'existe.
   Le bouton "Copier vers tous les jours" applique la conf courante à chaque
   jour de la semaine.
   ═══════════════════════════════════════════════════════════════════════════ */

/* Vue pleine page Paramètres : Drive, données, paie, IA, sécurité, reset. */
function rParametres() {
  const outer = document.createElement('div');
  outer.className = 'caisse-wrap';

  const bar = document.createElement('div');
  bar.className = 'caisse-bar';
  bar.innerHTML = '<div class="caisse-bar-title">⚙ Paramètres</div>';
  outer.appendChild(bar);

  const sectionWrap = (title) => {
    const s = document.createElement('div');
    s.className = 'params-section';
    s.innerHTML = '<h3 class="params-h">' + title + '</h3>';
    return s;
  };

  // ── Synchronisation Google Drive ────────────────────────────────────────
  const secDrive = sectionWrap('☁ Synchronisation Google Drive');
  const driveDesc = document.createElement('p');
  driveDesc.className = 'params-desc';
  driveDesc.innerHTML = GAS_URL
    ? "Drive connecté. Les données se synchronisent automatiquement."
    : "Colle l'URL de ton Apps Script pour synchroniser sur Google Drive.";
  secDrive.appendChild(driveDesc);

  const urlInput = document.createElement('input');
  urlInput.type = 'text';
  urlInput.value = GAS_URL;
  urlInput.placeholder = 'https://script.google.com/macros/s/.../exec';
  urlInput.className = 'form-input--sm';
  urlInput.style.width = '100%';
  secDrive.appendChild(urlInput);

  const testMsg = document.createElement('div');
  testMsg.className = 'drive-test-msg';
  const driveBtns = document.createElement('div');
  driveBtns.className = 'params-data-grid';
  driveBtns.style.marginTop = '10px';

  const testBtn = mBtn('🔗 Tester la connexion', false, () => {
    const url = urlInput.value.trim();
    if (!url) { toast("Colle d'abord une URL", 'inf'); return; }
    testMsg.innerHTML = "<span style='color:#f59e0b'>⏳ Test en cours...</span>";
    gasRequest(url + '?action=load', 'GET', null, (result) => {
      testMsg.innerHTML = (result !== null)
        ? "<span style='color:#16a34a'>✅ Connexion réussie</span>"
        : "<span style='color:#dc2626'>❌ Échec — vérifie l'URL et les droits</span>";
    });
  });
  const saveDriveBtn = mBtn('💾 Enregistrer', true, () => {
    const url = urlInput.value.trim();
    GAS_URL = url;
    if (url) localStorage.setItem('gas_url', url);
    else localStorage.removeItem('gas_url');
    toast(url ? 'Drive configuré ✓' : 'Drive déconnecté', 'ok');
    setSaveStatus(url ? 'ok' : 'local');
    render();
  });
  driveBtns.appendChild(testBtn);
  driveBtns.appendChild(saveDriveBtn);
  if (GAS_URL) {
    const clearBtn = mBtn('Déconnecter', false, () => {
      GAS_URL = '';
      localStorage.removeItem('gas_url');
      setSaveStatus('local');
      toast('Drive déconnecté', 'warn2');
      render();
    });
    clearBtn.classList.add('btn-danger-outline');
    driveBtns.appendChild(clearBtn);
  }
  secDrive.appendChild(testMsg);
  secDrive.appendChild(driveBtns);
  outer.appendChild(secDrive);

  // ── Données — import / export ───────────────────────────────────────────
  const secData = sectionWrap('🗂 Données — import / export');
  const dataGrid = document.createElement('div');
  dataGrid.className = 'params-data-grid';
  [
    { icon: '⬇', txt: 'Exporter le planning', fn: () => { S.modal = { type: 'export' }; render(); } },
    { icon: '📥', txt: 'Importer historique CA', fn: () => { S.modal = { type: 'importCA' }; render(); } },
    { icon: '🗂', txt: 'Exporter historique CA', fn: () => { exportCAHistoryJSON(); } }
  ].forEach(it => {
    const b = document.createElement('button');
    b.className = 'btn bg params-data-btn';
    b.innerHTML = "<span class='params-data-ico'>" + it.icon + '</span> ' + it.txt;
    b.onclick = it.fn;
    dataGrid.appendChild(b);
  });
  secData.appendChild(dataGrid);
  outer.appendChild(secData);

  // ── Règles de paie ──────────────────────────────────────────────────────
  const secPaie = sectionWrap('💶 Règles de paie');
  const paieDesc = document.createElement('p');
  paieDesc.className = 'params-desc';
  paieDesc.innerHTML = 'Seuil de contrat au-delà duquel les heures ' +
    'supplémentaires ne sont pas payées mensuellement (reportées en fin ' +
    "d'année).";
  secPaie.appendChild(paieDesc);
  const seuilRow = document.createElement('div');
  seuilRow.className = 'params-inline-row';
  const seuilInput = document.createElement('input');
  seuilInput.type = 'number';
  seuilInput.min = '0';
  seuilInput.step = '1';
  seuilInput.value = HS_SEUIL_CONTRAT;

function mConfig(box, asView) {
  const monthConfig = S.dc[mk()] || {};
  const weekConfig = monthConfig['__week__'] || {};
  const selDay = asView
    ? (S.cfgDay !== undefined ? S.cfgDay : 1)
    : (S.modal._cfgDay !== undefined ? S.modal._cfgDay : 1);

  // Défauts : config typique restaurant (dimanche plus chargé + aide)
  const defaults = {
    0: { cuisine: ['CH','DC','CR','DS','AI'],
         salle:   ['S1','S2','S3','S4','S5','S7','EX'] },
    1: { cuisine: ['CH','DC','CR','DS'], salle: ['S1','S2','S3','S4'] },
    2: { cuisine: ['CH','DC','CR','DS'], salle: ['S1','S2','S3','S4'] },
    3: { cuisine: ['CH','DC','CR','DS'], salle: ['S1','S2','S3','S4'] },
    4: { cuisine: ['CH','DC','CR','DS'], salle: ['S1','S2','S3','S4'] },
    5: { cuisine: ['CH','DC','CR','DS'], salle: ['S1','S2','S3','S4'] },
    6: { cuisine: ['CH','DC','CR','DS','AI'],
         salle:   ['S1','S2','S3','S4','S5'] }
  };

  const curCfg = weekConfig[selDay] || defaults[selDay];
  const ac  = curCfg.cuisine || [];
  const as_ = curCfg.salle   || [];

  if (!asView) mHdr(box, '⚙ Config postes — ' + MN[S.m] + ' ' + S.y);

  const descP = document.createElement('p');
  descP.className = 'stats-desc';
  descP.textContent =
    'Configurez les postes actifs par jour de la semaine.';
  box.appendChild(descP);

  // ── Tabs jours de la semaine ───────────────────────────────────────────
  const tabsRow = document.createElement('div');
  tabsRow.className = 'cfg-tabs';
  const dnFull = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
  [1, 2, 3, 4, 5, 6, 0].forEach(dv => {
    const btn = document.createElement('button');
    const isSel = selDay === dv;
    const isWe = dv === 0 || dv === 6;
    const hasCfg = !!weekConfig[dv];
    btn.className = 'cfg-tab-btn';
    btn.style.border = '1.5px solid ' +
      (isSel ? (isWe ? '#ea580c' : '#2563eb') : '#e5e7eb');
    btn.style.background = isSel
      ? (isWe ? '#fff7ed' : '#eff6ff') : '#fff';
    btn.style.color = isSel
      ? (isWe ? '#c2410c' : '#1d4ed8')
      : (isWe ? '#ea580c' : '#374151');
    btn.innerHTML = dnFull[dv] + (hasCfg
      ? "<span class='cfg-tab-has-cfg'></span>" : '');
    btn.onclick = ((d) => () => {
      if (asView) { S.cfgDay = d; render(); }
      else { S.modal._cfgDay = d; const curBox = document.querySelector('.mo'); if (curBox) { curBox.innerHTML = ''; mConfig(curBox); } }
    })(dv);
    tabsRow.appendChild(btn);
  });
  box.appendChild(tabsRow);

  // ── Compteurs (cuisine / salle / total) ────────────────────────────────
  const countsRow = document.createElement('div');
  countsRow.className = 'cfg-counts-row';

  function makeCountTile(value, label, variant) {
    const tile = document.createElement('div');
    tile.className = 'cfg-count-tile cfg-count-tile--' + variant;
    tile.innerHTML =
      "<div class='cfg-count-value cfg-count-value--" + variant + "'>" +
        value + '</div>' +
      "<div class='cfg-count-label'>" + label + '</div>';
    return tile;
  }
  const cTile = makeCountTile(ac.length,            'Cuisine', 'cuisine');
  const sTile = makeCountTile(as_.length,           'Salle',   'salle');
  const tTile = makeCountTile(ac.length + as_.length,'Total',   'total');
  cTile.id = 'cCnt';
  sTile.id = 'sCnt';
  tTile.id = 'tCnt';
  countsRow.appendChild(cTile);
  countsRow.appendChild(sTile);
  countsRow.appendChild(tTile);
  box.appendChild(countsRow);

  // ── Section cochable de postes (factoriseur) ──────────────────────────
  function buildPostSection(posts, selected, label, color, secKey) {
    const div = document.createElement('div');
    div.className = 'cfg-section';
    const h = document.createElement('div');
    h.className = 'cfg-section-title';
    h.style.color = color;
    h.textContent = label;
    div.appendChild(h);

    const grid = document.createElement('div');
    grid.className = 'cfg-post-grid';
    posts.forEach(p => {
      const row = document.createElement('div');
      row.className = 'cfg-post-row';
      row.style.background = selected.indexOf(p.c) >= 0 ? p.bg : '#fff';

      const left = document.createElement('span');
      left.className = 'cfg-post-label';
      left.innerHTML =
        "<span class='cfg-post-swatch' style='background:" +
        p.acc + "'></span>" + p.l;

      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.dataset.sec = secKey;
      chk.dataset.pc  = p.c;
      if (selected.indexOf(p.c) >= 0) chk.checked = true;
      chk.style.width  = '16px';
      chk.style.height = '16px';
      chk.style.cursor = 'pointer';
      chk.style.accentColor = p.acc;

      chk.onchange = () => {
        const c = box.querySelectorAll("[data-sec='cuisine']:checked").length;
        const s = box.querySelectorAll("[data-sec='salle']:checked").length;
        cTile.querySelector('div').textContent = c;
        sTile.querySelector('div').textContent = s;
        tTile.querySelector('div').textContent = c + s;
        row.style.background = chk.checked ? p.bg : '#fff';
      };
      row.appendChild(left);
      row.appendChild(chk);
      grid.appendChild(row);
    });
    div.appendChild(grid);
    return div;
  }

  box.appendChild(
    buildPostSection(PC, ac, '🍳 Cuisine', '#c2410c', 'cuisine')
  );
  box.appendChild(
    buildPostSection(PS, as_, '🍽 Salle', '#1d4ed8', 'salle')
  );

  // ── Bouton "Copier vers tous les jours" ────────────────────────────────
  const copyBtn = document.createElement('button');
  copyBtn.textContent = 'Copier vers tous les jours';
  copyBtn.className = 'cfg-copy-btn';
  copyBtn.onclick = () => {
    const newAc = [], newAs = [];
    box.querySelectorAll("[data-sec='cuisine']:checked").forEach(c => {
      newAc.push(c.dataset.pc);
    });
    box.querySelectorAll("[data-sec='salle']:checked").forEach(c => {
      newAs.push(c.dataset.pc);
    });
    if (!S.dc[mk()]) S.dc[mk()] = {};
    if (!S.dc[mk()]['__week__']) S.dc[mk()]['__week__'] = {};
    for (let d = 0; d <= 6; d++) {
      S.dc[mk()]['__week__'][d] = {
        cuisine: newAc.slice(),
        salle:   newAs.slice()
      };
    }
    save();
    if (asView) { render(); }
    else { const curBox = document.querySelector('.mo'); if (curBox) { curBox.innerHTML = ''; mConfig(curBox); } }
  };
  box.appendChild(copyBtn);

  // ── Footer : Réinitialiser / Annuler / Enregistrer ─────────────────────
  const foot = document.createElement('div');
  foot.className = 'modal-foot';
  const resetBtn = mBtn('Réinitialiser', false, () => {
    if (!S.dc[mk()]) S.dc[mk()] = {};
    if (!S.dc[mk()]['__week__']) S.dc[mk()]['__week__'] = {};
    delete S.dc[mk()]['__week__'][selDay];
    save();
    if (asView) { render(); }
    else { const curBox = document.querySelector('.mo'); if (curBox) { curBox.innerHTML = ''; mConfig(curBox); } }
  });
  resetBtn.classList.add('abs-clear-btn');
  foot.appendChild(resetBtn);
  if (!asView) foot.appendChild(mBtn('Annuler', false, closeModal));
  foot.appendChild(mBtn('Enregistrer', true, () => {
    const newAc = [], newAs = [];
    box.querySelectorAll("[data-sec='cuisine']:checked").forEach(c => {
      newAc.push(c.dataset.pc);
    });
    box.querySelectorAll("[data-sec='salle']:checked").forEach(c => {
      newAs.push(c.dataset.pc);
    });
    if (!S.dc[mk()]) S.dc[mk()] = {};
    if (!S.dc[mk()]['__week__']) S.dc[mk()]['__week__'] = {};
    S.dc[mk()]['__week__'][selDay] = { cuisine: newAc, salle: newAs };
    save();
    if (asView) { render(); }
    else { const curBox = document.querySelector('.mo'); if (curBox) { curBox.innerHTML = ''; mConfig(curBox); } }
  }));
  box.appendChild(foot);
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL — 📌 Note + fermeture pour un jour donné
   ───────────────────────────────────────────────────────────────────────────
   Deux fonctions combinées :
   - Toggle "Restaurant fermé" → marque le jour comme fermé (isClosed)
     Aucune affectation ne sera possible ni auto-générée ce jour-là.
   - Textarea : note libre pour ce jour (ex: "Banquet privé +30 couverts")
   ═══════════════════════════════════════════════════════════════════════════ */

function mNote(box) {
  const d = S.modal.d;
  const current = getNote(d);
  let closed = isClosed(d);

  mHdr(box,
    '📌 Note — ' + DN[dow(S.y, S.m, d)] + ' ' + d + ' ' + MN[S.m]
  );

  // ── Toggle "Restaurant fermé" ────────────────────────────────────────────
  const closedDiv = document.createElement('div');
  closedDiv.className = 'closed-toggle';
  if (closed) closedDiv.classList.add('closed-toggle--active');

  closedDiv.innerHTML =
    "<div class='closed-toggle-label'>" +
      "<span class='closed-toggle-icon'>🔒</span>" +
      '<div>' +
        "<div class='closed-toggle-title'>Restaurant fermé</div>" +
        "<div class='closed-toggle-subtitle'>" +
          'Aucune affectation ne sera possible ce jour</div>' +
      '</div>' +
    '</div>';

  const toggle = document.createElement('div');
  toggle.className = 'closed-toggle-switch' +
    (closed ? ' closed-toggle-switch--on' : '');

  const knob = document.createElement('div');
  knob.className = 'closed-toggle-knob' +
    (closed ? ' closed-toggle-knob--on' : '');
  toggle.appendChild(knob);
  closedDiv.appendChild(toggle);

  closedDiv.onclick = () => {
    closed = !closed;
    closedDiv.classList.toggle('closed-toggle--active', closed);
    toggle.classList.toggle('closed-toggle-switch--on', closed);
    knob.classList.toggle('closed-toggle-knob--on', closed);
    // Mettre à jour la couleur du titre
    const titleEl = closedDiv.querySelector('.closed-toggle-title');
    if (titleEl) titleEl.classList.toggle('closed-toggle-title--on', closed);
  };
  // Appliquer la couleur initiale si déjà fermé
  if (closed) {
    const titleEl = closedDiv.querySelector('.closed-toggle-title');
    if (titleEl) titleEl.classList.add('closed-toggle-title--on');
  }
  box.appendChild(closedDiv);

  // ── Plage de fermeture (visible quand "fermé" est activé) ────────────────
  const D_MAX = dim(S.y, S.m);
  const rangeWrap = document.createElement('div');
  rangeWrap.style.cssText =
    'margin:8px 0 12px;padding:10px 12px;background:#fef2f2;' +
    'border:1px dashed #fecaca;border-radius:8px;font-size:12px;' +
    'display:' + (closed ? 'block' : 'none');

  const rangeLabel = document.createElement('div');
  rangeLabel.style.cssText = 'color:#991b1b;font-weight:600;margin-bottom:6px';
  rangeLabel.innerHTML = '📅 Étendre la fermeture sur une plage';
  rangeWrap.appendChild(rangeLabel);

  const rangeRow = document.createElement('div');
  rangeRow.style.cssText = 'display:flex;align-items:center;gap:6px;flex-wrap:wrap';

  const fromTxt = document.createElement('span');
  fromTxt.style.cssText = 'color:#57534e;font-size:12px';
  fromTxt.textContent = 'Du jour ' + d + ' jusqu\'au jour';
  rangeRow.appendChild(fromTxt);

  const rangeInput = document.createElement('input');
  rangeInput.type = 'number';
  rangeInput.min = String(d);
  rangeInput.max = String(D_MAX);
  rangeInput.value = String(d);
  rangeInput.style.cssText =
    'width:60px;padding:4px 6px;border:1px solid #d6d3d1;' +
    'border-radius:6px;font-size:13px';
  rangeRow.appendChild(rangeInput);

  const applyRangeBtn = document.createElement('button');
  applyRangeBtn.textContent = 'Appliquer la plage';
  applyRangeBtn.style.cssText =
    'background:#dc2626;color:#fff;border:none;border-radius:6px;' +
    'padding:5px 10px;cursor:pointer;font-size:12px;font-weight:600';
  applyRangeBtn.onclick = () => {
    const to = Math.min(D_MAX, Math.max(d, parseInt(rangeInput.value) || d));
    if (to <= d) {
      toast('Choisis un jour de fin supérieur à ' + d, 'warn2');
      return;
    }
    pushUndo();
    if (!S.closed[mk()]) S.closed[mk()] = [];
    const arr = S.closed[mk()];
    let added = 0;
    for (let x = d; x <= to; x++) {
      if (arr.indexOf(x) < 0) { arr.push(x); added++; }
    }
    save();
    toast('🔒 Fermeture appliquée du j.' + d + ' au j.' + to +
      ' (' + added + ' nouveaux jours)', 'ok', 4000);
    closeModal();
  };
  rangeRow.appendChild(applyRangeBtn);

  rangeWrap.appendChild(rangeRow);

  const rangeHint = document.createElement('div');
  rangeHint.style.cssText = 'color:#a8a29e;font-size:11px;margin-top:6px';
  rangeHint.textContent =
    'Ex: vacances annuelles, fermeture exceptionnelle. Tous les jours de la plage seront fermés.';
  rangeWrap.appendChild(rangeHint);

  box.appendChild(rangeWrap);

  // Mettre à jour la visibilité de la plage selon le toggle
  const _origClickHandler = closedDiv.onclick;
  closedDiv.onclick = () => {
    _origClickHandler();
    rangeWrap.style.display = closed ? 'block' : 'none';
  };

  // ── Textarea : note du jour ──────────────────────────────────────────────
  const textarea = document.createElement('textarea');
  textarea.value = current;
  textarea.placeholder =
    'Ajouter une note pour ce jour... ' +
    '(ex: Banquet privé, +30 couverts...)';
  textarea.className = 'form-textarea';
  textarea.style.height = '80px';
  box.appendChild(textarea);

  // ── Footer : Supprimer note (si existe) / Annuler / Enregistrer ─────────
  const foot = document.createElement('div');
  foot.className = 'modal-foot';

  if (current) {
    foot.appendChild(mBtn('🗑 Supprimer note', false, () => {
      if (!S.notes[mk()]) S.notes[mk()] = {};
      delete S.notes[mk()][d];
      save();
      closeModal();
    }));
  }
  foot.appendChild(mBtn('Annuler', false, closeModal));
  foot.appendChild(mBtn('Enregistrer', true, () => {
    pushUndo();
    // 1. Note
    const txt = textarea.value.trim();
    if (!S.notes[mk()]) S.notes[mk()] = {};
    if (txt) S.notes[mk()][d] = txt;
    else     delete S.notes[mk()][d];
    // 2. Fermeture
    if (!S.closed[mk()]) S.closed[mk()] = [];
    const arr = S.closed[mk()];
    const idx = arr.indexOf(d);
    if (closed && idx < 0)   arr.push(d);
    if (!closed && idx >= 0) arr.splice(idx, 1);
    save();
    closeModal();
  }));
  box.appendChild(foot);
}

/* Helper réutilisable : ouvre une fenêtre d'impression avec un titre et un

  const css =
    'body{font-family:Arial,Helvetica,sans-serif;margin:24px;color:#1f2937}' +
    'h1{font-size:18px;margin:0 0 4px}' +
    '.sub{color:#6b7280;font-size:12px;margin:0 0 18px}' +
    'h2{font-size:14px;margin:16px 0 6px}' +
    'table{border-collapse:collapse;width:100%;margin:10px 0;font-size:12px}' +
    'th,td{border:1px solid #e5e7eb;padding:5px 8px;text-align:right}' +
    'th{background:#f3f4f6;font-weight:700}' +
    'th:first-child,td:first-child{text-align:left}' +
    'tfoot td{font-weight:700;background:#f9fafb}' +
    '.kpis{display:flex;gap:18px;flex-wrap:wrap;margin:10px 0 4px}' +
