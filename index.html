let _tourIdx = 0;

function startTour() {
  _tourIdx = 0;
  showTourStep();
}

function showTourStep() {
  closeTour();
  const step = TOUR_STEPS[_tourIdx];
  if (!step) return;

  const overlay = document.createElement('div');
  overlay.className = 'tour-ov';
  overlay.id = 'tour-ov';

  const card = document.createElement('div');
  card.className = 'tour-card';

  // Dots de progression
  let dots = '';
  for (let i = 0; i < TOUR_STEPS.length; i++) {
    dots += "<div class='tour-dot" + (i <= _tourIdx ? ' on' : '') + "'></div>";
  }

  const isLast = _tourIdx === TOUR_STEPS.length - 1;
  const isFirst = _tourIdx === 0;

  card.innerHTML =
    "<div class='tour-icon'>" + step.icon + '</div>' +
    "<div class='tour-title'>" + step.title + '</div>' +
    "<div class='tour-body'>" + step.body + '</div>' +
    "<div class='tour-progress'>" + dots + '</div>' +
    "<div class='tour-actions'>" +
      "<button class='tour-skip' id='tour-skip'>" +
        (isLast ? '' : 'Passer') + '</button>' +
      "<div class='tour-nav'>" +
        (isFirst
          ? ''
          : "<button class='tour-btn ghost' id='tour-prev'>Précédent</button>") +
        "<button class='tour-btn' id='tour-next'>" +
          (isLast ? 'Terminer ✓' : 'Suivant →') + '</button>' +
      '</div>' +
    '</div>';

  overlay.appendChild(card);
  document.body.appendChild(overlay);

  document.getElementById('tour-next').onclick = () => {
    if (isLast) { finishTour(); }
    else        { _tourIdx++; showTourStep(); }
  };
  if (!isFirst) {
    document.getElementById('tour-prev').onclick = () => {
      _tourIdx--;
      showTourStep();
    };
  }
  document.getElementById('tour-skip').onclick = finishTour;
}

function closeTour() {
  const t = document.getElementById('tour-ov');
  if (t) t.remove();
}

function finishTour() {
  closeTour();
  localStorage.setItem(TOUR_KEY, '1');
}

/* ═══════════════════════════════════════════════════════════════════════════
   IMPORT HISTORIQUE — CA & couverts depuis un fichier JSON
   ───────────────────────────────────────────────────────────────────────────
   Plus aucune donnée n'est codée en dur : l'historique se charge depuis un
   fichier .json choisi par l'utilisateur (menu Partage ▸ Données).

   Format attendu (le plus simple à maintenir dans un tableur) :
     {
       "format": "ca-history",
       "version": 1,
       "jours": [
         { "date": "2026-01-01", "ca": 3713.5, "caN1": 4961, "couv": 111, "couvN1": 149 },
         ...
       ]
     }
   Formats aussi acceptés (tolérance) :
     • un tableau brut de jours [ { "date": ..., "ca": ... }, ... ]
     • un objet par mois { "2026-01": { "1": { "ca": ... }, ... }, ... }
       (ancien format interne) — directement ou sous une clé "data".

   Import NON destructif : un jour déjà renseigné dans l'app n'est jamais
   écrasé (il est ignoré et signalé). Annulable via Ctrl+Z (pushUndo avant).
   ═══════════════════════════════════════════════════════════════════════════ */

/* Lit un texte JSON et le normalise vers { 'AAAA-MM': { jour: {ca,caN1,couv,couvN1} } }.
   Lève une Error avec un message clair si le contenu est inexploitable. */
function parseCAImportJSON(text) {
  let raw;
  try {
    raw = JSON.parse(text);
  } catch (e) {
    throw new Error('Fichier illisible : ce n’est pas du JSON valide.');
  }

  // Repérer la forme : liste de jours OU objet par mois
  let jours = null, byMonth = null;
  if (Array.isArray(raw)) {
    jours = raw;
  } else if (raw && Array.isArray(raw.jours)) {
    jours = raw.jours;
  } else if (raw && raw.data && typeof raw.data === 'object') {
    byMonth = raw.data;
  } else if (raw && typeof raw === 'object') {
    const ks = Object.keys(raw);
    if (ks.length && ks.every(k => /^\d{4}-\d{2}$/.test(k))) byMonth = raw;
  }

  const out = {};
  function addDay(mk, day, rec) {
    const d = parseInt(day, 10);
    if (!/^\d{4}-\d{2}$/.test(mk) || !(d >= 1 && d <= 31)) return;
    const o = {};
    ['ca', 'caN1', 'couv', 'couvN1'].forEach(k => {
      const v = rec[k];
      if (v === undefined || v === null || v === '') return;
      const n = typeof v === 'number'
        ? v
        : parseFloat(String(v).replace(/\s/g, '').replace(',', '.'));
      if (!isNaN(n)) o[k] = n;
    });
    // Encaissements réels (caisse) et théoriques Clyo : objets de nombres
    function numObj(src) {
      if (!src || typeof src !== 'object') return null;
      const res = {};
      Object.keys(src).forEach(k => {
        const v = src[k];
        const n = typeof v === 'number'
          ? v
          : parseFloat(String(v).replace(/\s/g, '').replace(',', '.'));
        if (!isNaN(n) && n !== 0) res[k] = n;
      });
      return Object.keys(res).length ? res : null;
    }
    const reel = numObj(rec.reel);
    if (reel) o.reel = reel;
    const clyo = numObj(rec.clyo);
    if (clyo) o.clyo = clyo;
    // Heures par employé : { "<empId>": heuresDécimales }
    if (rec.heures && typeof rec.heures === 'object') {
      const h = {};
      Object.keys(rec.heures).forEach(eid => {
        const v = rec.heures[eid];
        const n = typeof v === 'number'
          ? v
          : parseFloat(String(v).replace(/\s/g, '').replace(',', '.'));
        if (!isNaN(n) && n > 0) h[eid] = n;
      });
      if (Object.keys(h).length) o.heures = h;
    }
    if (Object.keys(o).length) {
      if (!out[mk]) out[mk] = {};
      out[mk][d] = o;
    }
  }

  if (jours) {
    jours.forEach(r => {
      if (!r || typeof r !== 'object') return;
      let mk = null, day = null;
      if (typeof r.date === 'string' && /^\d{4}-\d{2}-\d{2}/.test(r.date)) {
        mk = r.date.slice(0, 7);
        day = parseInt(r.date.slice(8, 10), 10);
      } else if (r.mois && r.jour !== undefined) {
        mk = String(r.mois);
        day = r.jour;
      } else {
        return;
      }
      addDay(mk, day, r);
    });
  } else if (byMonth) {
    Object.keys(byMonth).forEach(mk => {
      const m = byMonth[mk];
      if (m && typeof m === 'object') {
        Object.keys(m).forEach(day => addDay(mk, day, m[day]));
      }
    });
  } else {
    throw new Error('Format non reconnu. Attendu : { "jours": [ ' +
      '{ "date": "AAAA-MM-JJ", "ca": …, "couv": … } ] }.');
  }

  const nDays = Object.keys(out).reduce((s, mk) => s + Object.keys(out[mk]).length, 0);
  if (!nDays) throw new Error('Aucune donnée exploitable trouvée dans le fichier.');
  return out;
}

/* Étiquette « Mois AAAA » à partir d'une clé 'AAAA-MM'. */
function caMonthLabel(mk) {
  const parts = mk.split('-');
  const idx = parseInt(parts[1], 10) - 1;
  return (MN[idx] || mk) + ' ' + parts[0];
}

/* Analyse ce qui serait importé vs déjà présent (sans rien modifier). */
function analyzeImportCA(data) {
  const months = [];
  let totDays = 0, totConflicts = 0, totCa = 0;
  Object.keys(data).sort().forEach(mk => {
    const src = data[mk];
    const existing = S.daily[mk] || {};
    let nNew = 0, nConflict = 0, caSum = 0;
    Object.keys(src).forEach(day => {
      caSum += src[day].ca || 0;
      const cur = existing[day];
      if (cur && cur.ca !== undefined && cur.ca !== null && cur.ca !== '') {
        nConflict++;
      } else {
        nNew++;
      }
    });
    months.push({ mk: mk, nNew: nNew, nConflict: nConflict, caSum: caSum,
      total: Object.keys(src).length });
    totDays += nNew; totConflicts += nConflict; totCa += caSum;
  });
  return { months: months, totDays: totDays, totConflicts: totConflicts,
    totCa: totCa };
}

/* Effectue l'import non destructif puis sauvegarde (+ synchro Drive). */
function doImportCA(data, force) {
  pushUndo();
  let added = 0, skipped = 0, hAdded = 0, hSkipped = 0;
  Object.keys(data).forEach(mk => {
    const src = data[mk];
    if (!S.daily[mk]) S.daily[mk] = {};
    const parts = mk.split('-');
    const yy = parseInt(parts[0], 10);
    const mm = parseInt(parts[1], 10) - 1;
    Object.keys(src).forEach(day => {
      const rec = src[day];
      // ── Heures par employé → S.real (en minutes) ──────────────────────
      if (rec.heures) {
        Object.keys(rec.heures).forEach(eid => {
          const eidN = parseInt(eid, 10);
          const dayN = parseInt(day, 10);
          const existing = getReal(yy, mm, dayN, eidN);
          if (!force && existing && existing.total != null) {
            hSkipped++; return;
          }
          setReal(yy, mm, dayN, eidN, {
            arr: null, dep: null,
            total: Math.round(rec.heures[eid] * 60), note: ''
          });
          hAdded++;

          // Reconstruction de présence : si l'employé n'est sur aucun poste
          // ce jour-là, on l'inscrit sur un marqueur "__import__" (poste
          // virtuel, invisible dans la grille) pour que le calcul du coût
          // main-d'œuvre le compte comme présent.
          if (!S.pl[mk]) S.pl[mk] = {};
          if (!S.pl[mk][day]) S.pl[mk][day] = {};
          const dayPl = S.pl[mk][day];
          const dejaPlanifie = Object.keys(dayPl).some(
            pc => pc.indexOf('__import__') !== 0 && dayPl[pc] === eidN);
          if (!dejaPlanifie) {
            dayPl['__import__' + eidN] = eidN;
          }
        });
      }
      // ── Données de caisse du jour → S.daily ───────────────────────────
      const cur = S.daily[mk][day];
      const dayRenseigne = cur && cur.ca !== undefined &&
        cur.ca !== null && cur.ca !== '';
      if (dayRenseigne && !force) {
        skipped++;
        return;                      // jour déjà saisi → on n'écrase pas
      }
      const base = cur || emptyDaily();
      const merged = Object.assign({}, base);
      ['ca', 'caN1', 'couv', 'couvN1'].forEach(k => {
        if (rec[k] !== undefined) merged[k] = rec[k];
      });
      if (rec.reel) {
        merged.reel = Object.assign({}, base.reel || {}, rec.reel);
      }
      if (rec.clyo) {
        merged.clyo = Object.assign({}, base.clyo || {}, rec.clyo);
      }
      if (rec.ca !== undefined || rec.couv !== undefined ||
          rec.reel || rec.clyo || rec.caN1 !== undefined ||
          rec.couvN1 !== undefined) {
        S.daily[mk][day] = merged;
        added++;
      }
    });
  });
  save();
  closeModal();
  render();
  const parts = [];
  if (added) parts.push(added + ' jour(s) de caisse');
  if (hAdded) parts.push(hAdded + ' pointage(s)');
  const detail = parts.length ? parts.join(' + ') + ' importé(s)'
    : 'rien de nouveau';
  const ign = [];
  if (skipped) ign.push(skipped + ' jour(s) déjà saisis');
  if (hSkipped) ign.push(hSkipped + ' pointage(s) déjà saisis');
  toast('Import terminé : ' + detail +
    (ign.length ? ' · ' + ign.join(', ') + ' ignoré(s)' : '') +
    ' · Ctrl+Z pour annuler', 'ok', 6000);
}

/* Exporte l'historique CA/couverts actuel (S.daily) au format JSON importable. */
function exportCAHistoryJSON() {
  const jours = [];
  Object.keys(S.daily).sort().forEach(mk => {
    if (!/^\d{4}-\d{2}$/.test(mk)) return;
    const m = S.daily[mk];
    Object.keys(m).map(Number).sort((a, b) => a - b).forEach(d => {
      const r = m[d] || {};
      const o = { date: mk + '-' + String(d).padStart(2, '0') };
      ['ca', 'caN1', 'couv', 'couvN1'].forEach(k => {
        if (r[k] !== undefined && r[k] !== null && r[k] !== '') o[k] = r[k];
      });
      if (Object.keys(o).length > 1) jours.push(o);   // au moins une valeur
    });
  });
  if (!jours.length) {
    toast('Aucune donnée CA à exporter pour le moment.', 'warn2');
    return;
  }
  const lines = jours.map(o => '    ' + JSON.stringify(o));
  const content = '{\n  "format": "ca-history",\n  "version": 1,\n' +
    '  "jours": [\n' + lines.join(',\n') + '\n  ]\n}\n';
  openDl(content, 'historique-ca.json', 'application/json');
}

/* Ouvre le sélecteur de fichier, parse le JSON et ré-ouvre le modal avec
   l'aperçu (ou l'erreur). */
function pickCAFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json,.json';
  input.style.display = 'none';
  input.onchange = () => {
    const f = input.files && input.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = parseCAImportJSON(String(reader.result));
        S.modal = { type: 'importCA', caData: data, caFile: f.name };
      } catch (err) {
        S.modal = { type: 'importCA', caError: err.message, caFile: f.name };
      }
      render();
    };
    reader.onerror = () => {
      S.modal = { type: 'importCA', caError: 'Lecture du fichier impossible.' };
      render();
    };
    reader.readAsText(f);
  };
  document.body.appendChild(input);
  input.click();
  setTimeout(() => input.remove(), 1000);
}

function mImportCA(box) {
  mHdr(box, '📥 Importer l’historique CA');

  const data = S.modal && S.modal.caData;
  const err = S.modal && S.modal.caError;

  // ── Aucun fichier encore chargé : explication + bouton de sélection ────────
  if (!data) {
    const intro = document.createElement('p');
    intro.className = 'drive-desc';
    intro.innerHTML =
      'Charge un fichier <b>.json</b> contenant ton historique de CA et ' +
      'couverts. L’import est <b>non destructif</b> : un jour déjà renseigné ' +
      'dans l’app n’est jamais écrasé.';
    box.appendChild(intro);

    if (err) {
      const w = document.createElement('div');
      w.className = 'warn warn--column';
      w.style.margin = '10px 0';
      w.innerHTML = '⚠ <b>Fichier non importé</b><br>' +
        '<span style="font-size:13px">' + err +
        (S.modal.caFile ? ' <i>(' + S.modal.caFile + ')</i>' : '') + '</span>';
      box.appendChild(w);
    }

    const fmt = document.createElement('details');
    fmt.style.margin = '10px 0';
    fmt.style.fontSize = '13px';
    fmt.style.color = 'var(--text-2)';
    fmt.innerHTML =
      '<summary style="cursor:pointer">Format attendu</summary>' +
      '<pre style="white-space:pre-wrap;background:var(--bg-2,#f1f5f9);' +
      'padding:8px 10px;border-radius:8px;margin-top:6px;font-size:12px">' +
      '{\n  "format": "resto-history",\n  "version": 2,\n  "jours": [\n' +
      '    {\n      "date": "2026-04-15",\n      "ca": 3593.5, "caN1": 3339,\n' +
      '      "couv": 109, "couvN1": 116,\n' +
      '      "reel": { "cb": 3201.5, "esp": 380, "depenses": 10 },\n' +
      '      "clyo": { "cb": 3201.5, "esp": 104 },\n' +
      '      "heures": { "1": 7.5, "4": 7, "5": 8.25 }\n    }\n  ]\n}</pre>' +
      '<div style="margin-top:6px;color:var(--text-3,#9ca3af)">' +
      'Champs facultatifs. <b>heures</b> : clé = identifiant employé, ' +
      'valeur = heures travaillées ce jour. CA/couverts et pointages ' +
      'déjà saisis ne sont jamais écrasés.</div>';
    box.appendChild(fmt);

    // ── Coller le JSON directement (plus rapide qu'un fichier) ──────────
    const pasteWrap = document.createElement('div');
    pasteWrap.style.margin = '4px 0 10px';
    const pasteLbl = document.createElement('div');
    pasteLbl.style.cssText =
      'font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:6px';
    pasteLbl.textContent = 'Ou colle le JSON ici :';
    pasteWrap.appendChild(pasteLbl);

    const ta = document.createElement('textarea');
    ta.id = 'ca-paste';
    ta.placeholder = '{ "format": "resto-history", "jours": [ … ] }';
    ta.style.cssText =
      'width:100%;min-height:110px;font-family:monospace;font-size:12px;' +
      'padding:8px 10px;border:1px solid var(--border,#d1d5db);' +
      'border-radius:8px;resize:vertical;box-sizing:border-box';
    if (S.modal.caPasteText) ta.value = S.modal.caPasteText;
    pasteWrap.appendChild(ta);

    const pasteBtn = mBtn('📋 Importer le texte collé', true, () => {
      const txt = (document.getElementById('ca-paste') || {}).value || '';
      if (!txt.trim()) {
        toast('Colle d\u2019abord le JSON dans le champ.', 'warn2');
        return;
      }
      try {
        const parsed = parseCAImportJSON(txt);
        S.modal = { type: 'importCA', caData: parsed, caFile: '(collé)' };
      } catch (e2) {
        S.modal = { type: 'importCA', caError: e2.message,
          caPasteText: txt };
      }
      render();
    });
    pasteBtn.style.marginTop = '8px';
    pasteWrap.appendChild(pasteBtn);
    box.appendChild(pasteWrap);

    const sep = document.createElement('div');
    sep.style.cssText =
      'border-top:1px solid var(--border,#e5e7eb);margin:6px 0 10px';
    box.appendChild(sep);

    const foot = document.createElement('div');
    foot.style.display = 'flex';
    foot.style.gap = '8px';
    foot.style.flexWrap = 'wrap';
    foot.style.justifyContent = 'flex-end';
    foot.style.marginTop = '8px';
    foot.appendChild(mBtn('⬇ Exporter l’historique actuel', false, exportCAHistoryJSON));
    foot.appendChild(mBtn('📁 Choisir un fichier JSON', true, pickCAFile));
    box.appendChild(foot);
    return;
  }

  // ── Fichier chargé : aperçu avant import ───────────────────────────────────
  const a = analyzeImportCA(data);

  const intro = document.createElement('p');
  intro.className = 'drive-desc';
  intro.innerHTML =
    'Fichier : <b>' + (S.modal.caFile || 'données.json') + '</b><br>' +
    'Import <b>non destructif</b> : un jour déjà renseigné dans l’app ' +
    'n’est jamais écrasé.';
  box.appendChild(intro);

  const tbl = document.createElement('table');
  tbl.className = 'saisie-table';
  tbl.style.margin = '12px 0';
  let html = '<thead><tr><th style="text-align:left">Mois</th>' +
    '<th>À ajouter</th><th>Déjà saisis</th><th>CA</th></tr></thead><tbody>';
  a.months.forEach(m => {
    html += '<tr><td style="text-align:left">' + caMonthLabel(m.mk) + '</td>' +
      '<td style="text-align:center">' + m.nNew + '</td>' +
      '<td style="text-align:center">' +
        (m.nConflict ? m.nConflict : '–') + '</td>' +
      '<td style="text-align:right">' +
        Math.round(m.caSum).toLocaleString('fr-FR') + ' €</td></tr>';
  });
  html += '</tbody>';
  tbl.innerHTML = html;
  box.appendChild(tbl);

  const summary = document.createElement('p');
  summary.style.fontSize = '13px';
  summary.style.color = 'var(--text-2)';
  summary.innerHTML = '<b>' + a.totDays + ' jour(s)</b> seront ajoutés' +
    (a.totConflicts
      ? ' · <b>' + a.totConflicts + '</b> jour(s) déjà saisis seront ignorés'
      : '') +
    ' · Total CA importé : <b>' +
    Math.round(a.totCa).toLocaleString('fr-FR') + ' €</b>.';
  box.appendChild(summary);

  const foot = document.createElement('div');
  foot.style.display = 'flex';
  foot.style.gap = '8px';
  foot.style.flexWrap = 'wrap';
  foot.style.justifyContent = 'flex-end';
  foot.style.marginTop = '8px';
  foot.appendChild(mBtn('Annuler', false, closeModal));
  foot.appendChild(mBtn('📁 Autre fichier', false, pickCAFile));
  const forceBtn = mBtn('⟳ Forcer (écrase, heures incluses)', false, () => {
    doImportCA(data, true);
  });
  forceBtn.title = 'Réimporte tout en écrasant les jours déjà saisis ' +
    '(utile si les heures manquent). Ctrl+Z pour annuler.';
  foot.appendChild(forceBtn);
  const okLbl = a.totDays ? 'Importer ' + a.totDays + ' jour(s)' : 'Rien à importer';
  const okBtn = mBtn(okLbl, true, a.totDays ? () => doImportCA(data) : closeModal);
  if (!a.totDays) okBtn.disabled = true;
  foot.appendChild(okBtn);
  box.appendChild(foot);
}

/* ═══════════════════════════════════════════════════════════════════════════
   INITIALISATION DE L'APPLICATION
   ───────────────────────────────────────────────────────────────────────────
   1. load() charge l'état depuis localStorage/Drive
   2. Si première installation (aucune donnée persistée), on applique les
      contrats de référence (CONTRAT_H) sur les employés par défaut
   3. On restaure les règles spéciales qui pourraient avoir été perdues à
      la sérialisation (Agnès "pas de Chaud weekend", Natacha "toujours
      Ouverture le dimanche")
   4. save() + render() pour afficher l'app
   5. renderAiWidget() ajoute le FAB et le panneau de l'assistant IA
   6. Si premier accès (pas de flag TOUR_KEY), on lance le tour après 400ms
   ═══════════════════════════════════════════════════════════════════════════ */

load();

// N'appliquer CONTRAT_H qu'au premier lancement (sinon on écraserait les
// modifications de contrat faites par l'utilisateur via le modal employé)
if (!_empsFromStorage) {
  S.emps.forEach(e => {
    if (CONTRAT_H[e.id] !== undefined) e.h = CONTRAT_H[e.id];
  });
}

// Règle spéciale Agnès (id 9) : pas de Chaud le dimanche.
// Le samedi est autorisé en renfort (soulage Julie/Patricia).
const _agnes = findEmp(9);
if (_agnes) {
  // Force chNoDow à [0] uniquement (dimanche). On retire le 6 (samedi).
  _agnes.chNoDow = [0];
}

// Migration : Monique (id 5) — ne travaille pas le jeudi (dow=4)
// Force jt:custom avec jeudi exclu, quel que soit l'état stocké.
// Migration : Juliette (id 14) — max 4j consécutifs + PM-only le dimanche
const _juliette = findEmp(14);
if (_juliette) {
  _juliette.maxConsec = 4;
  _juliette.pmDow = [0]; // 0 = dimanche
}

const _monique = findEmp(5);
if (_monique) {
  _monique.jt = 'custom';
  _monique.jours = [0, 1, 2, 3, 5, 6]; // 0=Di 1=Lu 2=Ma 3=Me 5=Ve 6=Sa — pas 4=Je
}

// Règle spéciale Natacha (id 11) : toujours Ouverture le dimanche
const _natacha = findEmp(11);
if (_natacha) {
  if (!_natacha.fixed || !_natacha.fixed.length) {
    _natacha.fixed = [{ dow: 0, pc: 'S1' }];
  }
}

// Migration : DORO (18) et VINCENT (25) ne sont plus en placement manuel.
// Sur les installations existantes, le flag noAutoGen peut être encore
// présent dans localStorage/Drive — on le retire au chargement.
const _doro = findEmp(18);
if (_doro && _doro.noAutoGen) delete _doro.noAutoGen;
const _vincent = findEmp(25);
if (_vincent && _vincent.noAutoGen) delete _vincent.noAutoGen;
// Migration : VINCENT est désormais "bouche-trou" — exclu de la génération
// principale, utilisé par la phase 5 pour combler les postes restés vides.
if (_vincent && !_vincent.bouchTrou) {
  _vincent.bouchTrou = 1;
  save();
}

// Migration : Albertine (17) passe de S7 → PL (Plonge).
// Le code S7 est désormais "Salle 7" (7e poste de service).
// On corrige les données sauvegardées si elles viennent d'une ancienne version.
const _albertine = findEmp(17);
if (_albertine) {
  if (!_albertine.rs || _albertine.rs.length === 0
      || (_albertine.rs.length === 1 && _albertine.rs[0] === 'S7')) {
    _albertine.rs = ['PL'];
  }
  if (_albertine.fixed) {
    _albertine.fixed = _albertine.fixed.map(
      f => ({ dow: f.dow, pc: f.pc === 'S7' ? 'PL' : f.pc })
    );
  }
}

save();
render();
renderAiWidget();

// Recalcule la hauteur du header (pour le calage des en-têtes sticky) quand
// la fenêtre change de largeur — les boutons peuvent passer sur plusieurs
// lignes et modifier la hauteur du header.
window.addEventListener('resize', () => {
  if (typeof measureHeaderHeight === 'function') measureHeaderHeight();
});

// Tour d'onboarding désactivé au démarrage : il reste accessible
// manuellement via le bouton ❓ du header (ou la touche "?").
